body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十一世天童禮禪師法嗣寧波府育王橫川如珙禪師永嘉林氏子父崇夫有處士名季父為沙門曰正則師年十五從其祝髮受具戒於廣慈初參石田薰癡絶冲無所入繼登太白謁滅翁咨決所疑翁舉南山筀笋東海烏賊話師擬對翁便打師豁然有省久之為斷橋所重請分座復舉出世鴈山之靈巖次遷能仁瑞光至元癸未被旨住育王僧問如何是教外別傳底句師曰不落玄妙曰恁麼則一超直入如來地師曰且緩緩問如何是學人行履處師曰你適才從甚處上來曰如何得報四恩去師曰你且從適才路上下去問如何是聞復翳根除師曰一不成二不是曰如何是塵消覺圓淨師曰漏木杓破笊篱問僧問趙州如何是祖師西來意州曰庭前柏樹子問慶雲雲曰庭前無柏樹一等是問西來意為甚所答不同師曰不是闍黎問老僧也不知上堂地大水大火大風大若一念無疑地不能礙若一念無愛水不能溺若一念無瞋火不能燒若一念無喜風不能飄如此即是無依道人佛從無依生若悟無依佛亦無得中秋上堂馬祖與百丈智藏南泉玩月各呈自己見解於月有甚交涉月輪有圓有缺孤光透徹謂之月光菩薩照破山河大地昏暗開一切衆生心地昏暗老僧出母胎時正當今夜拈却門前大案山放你諸人東去西去上堂魯祖三昧最省力才見僧來便面壁育王三昧更省力才見僧來便合掌南山北山如牛拽磨腳瘦草鞋寬地肥茄子大上堂妙明心印印佛則一手指天一手指地印法則狗銜赦書諸侯避道印僧則箇箇盂口向天還有自印者麼若能自印則行住坐臥一一明了上堂本無纖塵法礙你眼睛何得自昧東西不辨南北不分千聖不傳底事只在你目前不可錯過上堂先佛有頂𩕳一機祖師有末後一句總向諸人面前拈出破知解窠窟截生死根株正體獨露妙用全真一塵中現寶王剎毛端上轉大法輪開爐上堂僧出曰丙丁童子來求火師曰歸去生柴帶葉燒乃曰古鏡濶一丈火爐濶一丈火𦦨為三世諸佛說法三世諸佛立地聽你諸人長連牀上𡋲地聽上堂百千三昧門百千神通門百千妙用門你總入不得為你被三昧礙神通礙妙用礙直饒不礙也入不得夜參少室無門戶如何便得通夜深寧耐立聽我話西東室中垂語曰南山筀笋東海烏賊有僧遽掩師口曰請和尚更道師以手托開曰朝看東南暮觀西北舉黃龍三關話頌曰佛手驢腳容易見最難道處是生緣黃梅不是周家子七歲傳衣便會禪舉魯祖面壁話頌曰人來面壁成何事要得心開現本源空劫已前諸佛子話頭不舉自然圓師痛宗教濫觴古響瘖鬱於是引宗據祖屏遏時學崖聳標立不隨俗好惡其住育王能仁皆自公選不依阿苟榮一日謂衆曰病叟今年六十六死日將至火化好土化好西堂唯菴曰山前有片荒地師即命疊石為塔復自銘曰天生一穴藏吾枯骨骨朽成土土能生物結箇葫蘆挂趙州壁永脫輪回超三世佛將示寂書訣衆語而化世壽六十八僧臘五十三時至元己丑三月十八日也奉全身瘞焉有三會語録行世杭州府淨慈石林行鞏禪師初住安吉上方遷思溪法寶隆興黃龍吳郡承天後住淨慈上堂橫眸碧漢萬國風清垂手紅塵千峰日出才恁麼便不恁麼所以道我此法印為欲利益世間故說在所游方勿妄宣傳橫按拄杖曰佛滅二千二百單六載沙門行鞏今於苕霅盡頭鼓鐘清處顯示此印絲毫無有妄者卓拄杖曰謹白上堂山靜課華蜂股重林空含籜笋肌明倚欄不覺成癡兀又得黃鸝喚一聲思溪恁麼道好喫拄杖六十何故為他不合隨聲逐色上堂水鄉水廓地多溼六月華蚊𭪿如鐵夜半起來笑不輟煩惱不輟作甚麼牀頭一柄扇無端又打折上堂三家村裡牛動尾巴搖拂子曰與者箇相去多少擲拂子曰洎合停囚長智上堂雪峰輥毬禾山打鼓祕魔擎叉道吾作舞一切賢聖皆以無為法而有差別喝一喝下座示衆盡大地是箇金剛正體向甚處著上座芭蕉聞雷而抽且道是有情是無情南屏山下壁立三關透不過者一錯百錯透得過者千難萬難忽有不甘底出來道既透得過因甚麼也難去明日來與你仔細相看問僧如何是你自己僧擬對師便推出舉黃龍見慈明因緣頌曰錯錯戲海驪龍冲霄俊鶴老慈明無著摸笑裡重重露栓索佛手一展日月昏大江從此風濤惡嘉興府天寧氷谷衍禪師上堂朔風何蕭蕭吹彼嵒下衣家業久荒蕪遊子胡不歸人生百歲豈長保昨日少年今已老翻憶寒山子十年歸不得忘却來時道上堂劫石可消恩情難斷拍膝一下曰蒿冢青松下年年挂紙錢上堂冷風疏雨做新年寂寞寒冰古㵎邊暖閣地爐煨榾柮送窮不用火燒錢聖節上堂心正安六國通天地濶車書同風從虎雲從龍深惟海高惟嵩萬靈無處參化工但知一氣復鴻濛擊拂子下座蘇州府虎丘雲耕靖禪師上堂我若不說破恐汝不回頭我若說破又恐諸人日後罵我去上堂山僧若真正舉揚河步亭無汝著腳分且抑下威光隨汝根器未說超宗異目若知得虎丘山高一百三十尺舍利塔是隋朝建立也許汝有箇入處甘心下劣又爭怪得老僧上堂龍門無宿客箇箇無退步底道理矮疏山三千里外賣布單跛雲門被拶折腳一等恁麼行腳豈是等閒不似汝輩只管悠悠過日浴佛上堂我觀如來前際不來後際不去今亦不住且道大殿裡香湯沐浴箇甚麼若也會得手中杓子拈放自由其或未然明年此日依舊胡潑亂潑上堂冷如氷霜細如米末水不能漂火不能熱王母畫下雲旗翻子規夜啼山竹裂上堂古人道依經解義三世佛冤離經一字還同魔說依與離既不可得畢竟如何卓拄杖曰漁人只看絲綸上不見蘆華對蓼紅上堂拈拄杖曰雲耕看山玩水拄杖子亦看山玩水雲耕渾身病苦拄杖子亦渾身病苦雲耕脫體輕安拄杖子亦脫體輕安卓拄杖曰擘開華嶽易除却愛憎難道場巖禪師法嗣杭州府徑山虗堂智愚禪師四明人首參運菴顏言下了旨出世嘉禾興聖遷光孝婺之寶林明之顯孝延福瑞巖育王柏巖杭之淨慈咸淳末被旨住徑山歷住十剎室中垂語曰己眼未明底因甚將虗空作布袴著畫地為牢因甚透者箇不過入海算沙底因甚向針鋒頭上翹足僧問聲前一句不墮常機轉位就功如何相見師曰問訊不出手曰且道天子萬年又作麼生師曰瑞草生嘉運靈華結早春曰直得九州四海雷動風飛師曰出門惟恐不先到上堂春風如刀春雨如膏衲僧門下何用忉忉上堂言而足終日言而盡道言而不足終日言而盡物且道道與物是一是二若道是一為甚麼客山高主山低若道是二怎奈云天地一指萬物一馬箇裡緇素得出還你草鞋錢其或不然但願來年蠶麥熟羅睺羅兒與一文結夏上堂有一人日消萬兩黃金同此聖制只是無人識得若有人識得許伊日消萬兩黃金上堂寶林初無門牆與人近傍亦不置之於無何有之鄉只要諸人如鐵入土與土俱化然後可以發越其如運糞入者吾末如之何上堂舉松源臨寂告衆曰久參兄弟正路上行者有只不能用黑豆法臨濟之道將泯絶無聞傷哉師曰鷲峰老人大似倚杖騎馬雖無僵仆之患未免旁觀者醜晚住淨慈入院日參徒問答次忽天使傳旨問趙州因甚八十行腳虗堂因甚八十住山師乃舉趙州行腳到臨濟話頌曰趙州八十方行腳虗堂八十再住山別有一機恢佛祖九重城裡動龍顏天使以頌回奏上大悅舉東寺示衆心不是佛智不是道劍去久矣爾方刻舟話頌曰昨日因過竹院西鄰家稚子隔溪啼山寒水肅半黃落無數歸鴉卜樹棲舉大慈上堂曰山僧不解答話祇解識病時有僧出慈便歸方丈話頌曰輕如毫末重如山地角天涯去復還黃葉隕時山骨露水邊依舊石生班十月初八日示寂塔於徑山直嶺下曰天然高麗國嘗請師供養八載問法弟子嘗隨千指嘉靖間王遣法嗣來山掃塔寧波府天童石帆衍禪師舉陸亘大夫問南泉何姓泉曰姓王曰還有眷屬也無泉曰四臣不昧曰王居何位泉曰玉殿苔生曰玉殿苔生時如何泉曰不居正位話頌曰金鴨香消更漏深沉沉玉殿紫苔生高空有月千門照大道無人獨自行舉大顛擯首座因緣頌曰一串摩尼覿面當機賺殺首座疑殺昌黎弄盡許多窮伎倆春秋元自不曾知金山開禪師法嗣杭州府徑山石溪心月禪師西蜀眉州人舉僧問九峰如何是學人自己峰曰更問阿誰曰便恁麼承當時如何峰曰須彌還更戴須彌話頌曰自家冷暖自家知祖意何須更問誰全體承當全體是須彌頂上戴須彌舉晦堂因黃山谷問捷徑處乞師指示堂曰祇如仲尼道二三子以我為隱乎吾無隱乎爾太史居常如何理論谷擬對堂曰不是不是谷迷悶不已一日侍堂山行時方巖桂盛放堂曰太史聞木稚香麼谷曰聞堂曰吾無隱乎爾谷釋然即禮拜曰和尚得恁麼老婆心切堂笑曰祇要公到家耳頌曰渠儂家住白雲鄉南北東西路渺茫幾度欲歸歸未得忽聞巖蕙送幽香舉龐居士有男不婚有女不嫁話頌曰收拾山雲海月情團圞鼻直眼眉橫龜毛拂子兔角杖敲得虗空嚗嚗聲舉龐公訪大同提笊籬因緣拈曰普濟把定被龐公痛處一錐直得左轉右側前依後隨笊籬提起處相呼作舞時若言依樣畫猫兒定把黃金鑄子期僧問如何是佛師曰矮子看戲送僧還雙林偈曰未到雙林見舊遊眉橫新月眼橫秋寒暄未舉宜先問因甚橋流水不流宋六月初九日示寂華藏通禪師法嗣杭州府徑山虗舟普度禪師維揚江都史氏子稍長無處俗意母識其志俾依郡之天寧出家會與畢將運舟遇共語畢大奇之曰此兒短小精捍音吐如鐘他日法門爪牙也携歸武林從東堂院祖信受業經五年去參方初見鐵牛印於靈隱時無礙唱道薦福師特往叩礙問不與萬法為侶者是甚麼人師曰金香爐下鐵崑崙礙曰將謂者矮子有長處師曲躬作禮曰謝和尚證明天童晦巖光大慈石巖璉虎丘石室迪相見皆器異淳祐初出世金陵半山次遷潤之金山潭之鹿苑撫之疏山蘇之承天景定間補天竺旨升靈隱咸淳乙丑詔住徑山上堂邪人說正法正法悉皆邪正人說邪法邪法悉皆正卓拄杖曰邪耶正耶又卓一卓曰說耶不說耶向者裡揀辨得出黃金為屋未為貴玉食錦衣何足榮上堂萬法是心光諸緣惟性曉本無迷悟人只要今日了既無迷悟了箇甚麼卓拄杖曰千言萬語無人會又逐流鶯過短牆上堂舉雲門示衆曰汝等諸人在此過夏山僧深不欲向你道惜取眉毛好師曰雲門靈龜曳尾拂跡跡生靈隱即不然汝等諸人在此過夏山僧直截向你道口是禍門舉臨濟道有一人論劫在途中不離家舍有一人離家舍不在途中那箇合受人天供養話頌曰兔馬有角牛羊無角寸尺毫𨤲天地寥廓潘閬倒騎驢攧殺黃番綽住徑山值火餘志圖恢復將有緒俄示微恙索筆大書曰八十二年駕無底船踏翻歸去明月一天擲筆而逝時四月二十四日也全身塔寺東十里罘罳塢之陽瑞巖嵒禪師法嗣蘇州府萬壽訥堂辨禪師上堂釋迦老子降誕王宮初生下來不妨令人疑著及乎道天上天下唯吾獨尊敗闕了也後來冷地羞慚四十九年三百餘會救搭也救搭不來收拾也收拾不上諸仁者要見釋迦老子底敗闕處麼是非只為多開口煩惱皆因強出頭上堂你也在者裡我也在者裡人夫交接兩得相見時清休唱太平歌一貫文糴三斗半米二貫五百文買一箇大絹好諸禪德雖然如此廚中有剩飯路上有饑人上堂僧問古德萬境來侵時如何德曰坐却著古德有障斷狂瀾底手段未免勞心費力或有問金山萬境來侵時如何只向他道我既無心於萬物何妨萬物常圍繞上堂我若與你說破將後必然罵我我若不與你說破又恐你因循蹉過忽有箇漢出來道長老話墮了也只向他道老僧罪過寄無準偈曰鱉與猿交割不開兄呼弟應似忘懷及乎說到誵訛處又却心肝不帶來蘇州府虎丘清溪義禪師送僧偈曰台山萬疊入眉青途路同行各奔程清曉雞啼茅店月是誰先起喚師兄雪竇謙禪師法嗣蘇州府承天覺菴夢真禪師宣州人八歲為僧十九受具二十行腳所見尊宿皆不能了決慕無準遂登徑山叩見每到室中輒戰怖且忘却話頭自此不去入室晝夜只是坐禪一日廊下行聞火板鳴有省自以為得於是入室準問你是喫粥喫飯僧參禪學道僧師抗聲曰喫粥喫飯僧準曰更須飽喫始得師曰謝和尚供養自此只是看狗子無佛性話既無入作處乃過雪竇見大歇歇問甚處來師曰徑山來歇曰火後事作麼生師曰五峰依舊插天高歇曰那事還曾壞麼師叉手向前曰幸喜不曾動著遂挂搭歸堂一夜更深舉首見琉璃燈豁然大悟從前所得一時氷消瓦解次日入室歇舉如何是佛三腳驢子弄蹄行聲未絶師曰一任𨁝跳歇曰甚處與楊岐相見師曰當面蹉過歇曰猶隔海在師拍手呵呵大笑而出久之開法永慶遷連雲升何山主承天上堂將心學佛攝入魔宮擬心參禪墮在陰界直饒嫌佛不肯做被拄杖子穿過髑髏恁麼看來直是無你用心處拍案曰携取詩書歸舊隱野花啼鳥一般春上堂庭前翠竹青青砌下黃花鬱鬱喚作真如體又是般若用喚作般若用又是真如體忽有箇出來道我見從上佛祖說了萬千體用不似承天者樣蹊蹺莫是智過佛祖耶杜撰臆說耶卓拄杖曰好向暮天沙上望西風驚起鴈行斜上堂韶國師道通玄峯頂不是人間心外無法滿目青山大衆韶國師好箇頌子只是打成兩橛承天亦有箇頌雙峨峰頂上是青天夜半捉烏雞伸手不見掌喝一喝上堂三伏熱不似人心熱行路險不似人心險萬斛清風碧玉盤不知誰共倚闌干忽有箇出來道長老正恁麼時如何是祖師西來意向他道作賊人心虗舉世尊初生雲門曰我當時若見一棒打殺與狗子喫貴圖天下太平話頌曰生來自恨錯同條鐵鑄心肝也合消還你獨尊三界內奈何今日又明朝至元間有賢首宗講主奏請江南兩浙名剎易為華嚴教寺奉旨南來抵承天次日師升座博引華嚴旨要縱橫放肆問柝諸師論解纖微若指諸掌講主聞所未聞大沾法益且謂承天長老尚如是矧杭之巨剎大宗師耶因回奏遂寢前旨府慧巖象潭泳禪師舉無著至五臺與老翁喫茶次翁拈起玻瓈盞問南方還有者箇麼著曰無翁曰尋常將甚麼喫茶著無對因緣頌曰五臺凝望思遲遲白日青天被鬼迷最苦一般難理會玻瓈盞子喫茶時一關溥禪師舉馬祖令僧問大梅曰和尚見馬祖師得箇甚麼便住此山梅曰大師道即心即佛我便向者裡住因緣頌曰只將馬祖鉛刀子裂破縵天鐵網羅碧沼夜敲荷葉雨至今貧恨一身多台州府國清溪西澤禪師普說其略曰參玄上士行腳高流撥草瞻風到一處所便乃供下入門口謂之生死事大無常迅速衆兄弟生死若是有從古至今無有一人能免生死若是無爭奈目前遷變何生死亦有亦無不有不無當恁麼時還有漏網底麼既是走透無門臘月三十日撞到面前畢竟如何支準等是踏破草鞋歲月飄忽不可把玩要須窮教去處分明與前來入門口欵相應始得示衆便只恁麼歇去則適來說出許多絡索甚處安著直饒諸人一時不受打疊得淨盡山僧却有箇古話舉似諸人記得長慶道淨潔打疊了却須近前來就我覓有一棒到你當生慙愧無一棒到你又作麼生雪竇曰淨潔打疊了却須近前來就我覓有一棒到你則屈著你無一棒到你與你平出二大老好一棒未免作得失論量天封則不然淨潔打疊了却須近前來就我覓有一棒到你華鋪錦上無一棒到你霜加雪上且道前頭為人後頭為人辨明得出後次挂牌時却來通吐一上寧波府雪竇霍山昭禪師上堂即心即佛嘉眉果閬懷裡有狀非心非佛筠袁䖍吉頭上插筆不是心不是佛不是物漳泉福建頭匾似扇只可聞名不可見面淨慈道禪師法嗣蘇州府萬壽高峰嶽禪師題初祖像曰開旗展陳入梁未覩天顏早已降縱有神通難轉欵翩翩一葦渡長江徑山範禪師法嗣袁州府仰山雪巖祖欽禪師一字慧朗閩漳州人五歲出家十六剃染十八行腳初參雙林洎妙峰善石田薰諸老無所發明聞滅翁住淨慈懷香請益翁示臨濟三頓痛棒話亦無所入遂上徑山謁無準鋭志咨參封被脅不至席者數載一日上蒲團忽然面前豁開如地陷時中淨裸裸地靜悄悄地浮逼逼地動相不生者半月餘自茲坐定礙膺十年尋常入室遇舉主人公話便可打𨁝跳若教舉起衲僧巴鼻佛祖爪牙更無下口處後同忠石梁過天目擡眸見古柏觸著向來所得境界和底一時揚下礙膺之物始𪹼然而散從此不疑生不疑死不疑佛不疑祖徹見徑山老人立地處後出世潭之龍興次遷湘西道林處州佛日台州護聖湖州光孝咸淳己巳始主席仰山上堂少林一曲五傳至於六祖山深水寒發太古之清音調翻南嶽九世至於慈明唱高和峻奏絶聽之希聲所以佛法盛於江西湖南恢恢然浩浩然不可得而名焉豈料三百年來土曠人稀道隨時變黃鍾大呂寂而不作鄭音衛響亦乃不聞欽上座固無長處既在浙江那畔被一陳業風吹到潭州城裡只得改腔換調向十字街頭重翻此曲去也且道是何節拍擊拂子曰萬年歡復舉趙州曰金佛不度爐木佛不度火泥佛不度水真佛內裡坐師曰揭示如來正體發明向上宗猷趙州固是好手單是不合強生節目新龍興見處又且不然金佛度爐木佛度火泥佛度水真佛聻切忌話墮忽有箇漢出來道你恁麼正是強生節目拍膝一下曰將謂無人證明上堂一見便見一得永得展手曰撒開兩手大家看畢竟明明是何物潭州內外有一十八座城門白日行人千千萬萬往往來來一任東西南北謝首座維那上堂人天眼目佛祖綱維千差萬別一以貫之如何見得克賓法戰不勝南泉斬却猫兒上堂春日曉燒痕青布穀催耕處處鳴雖然底事最分明只是不得將眼看并耳聽何故才有一絲頭便有一絲頭上堂石門𡾟嶮玉峽潺湲未到此間不妨疑著到則到矣平展一句又作麼生古路鐵蛇橫浴佛上堂四月八生悉達九龍吐水浴金軀雲門一棒要打殺是大神呪是大明呪是無上呪汝等諸人還見黃面老子麼以拄杖一時打散上堂杜䳌啼血滿華枝底事匆匆苦勸歸歸到故鄉還似客村村緑暗與紅稀函蓋乾坤句隨波逐浪句截斷衆流句向者裡薦得一串穿却楊岐驢子三隻腳上堂才恁麼不恁麼有來繇沒來繇十里灘頭廖胡子釣得一雙紅鱗錦尾放下却是條鰍因甚如此斷岸孤舟上堂落華三月雨殘夢五更鐘聲色都消盡玄關又一重却不得道更須直下盡底掀翻何故須彌山上堂是亦剗非亦剗令下無私棒頭有眼因思黃檗道汝等諸人與麼行腳何處有今日也是睦州擔板上堂水不洗水金不博金青天白日自古自今山僧到者裡直是插手不入汝等諸人還信自己是仰山麼曹溪波浪如相似無限平人被陸沉上堂道在日用日用不知饑只喫飯寒只添衣晴天曖日挂枯梨點檢溪頭梅樹向陽偷放南枝上堂春雨溟濛春雲靉靆忽然杲日當空天不能遮地不能載正恁麼時如來禪且置祖師禪未在因甚如此只許參不許會上堂呼六為五破二作三眼觀東北意在西南仰山門下却不用者般茶飯何故佛法不怕爛上堂純清絶點正是真常流注打破鏡來未免一場狼藉不若遇飯喫飯遇茶喫茶曉來獨立空庭外閒對寒梅幾樹花上堂熏風自南來殿閣生微凉諸佛出身處切忌錯商量縱使言前薦得句外承當仰山敢道未在何故嫩竹敲風鳴翡翠芰荷翻雨潑鴛鴦上堂海水不可斗量虗空不可尺度淨地不可撒沙爛泥不可著腳者四轉語轉轉有落處且道落在甚麼處東京大相國寺裡有樹芭蕉風吹雨打一似破袈裟上堂有句無句如藤倚樹白鷺下田千點雪黃鸝上樹一枝花三千里外賣却布單不遠而來因甚放下泥盤呵呵大笑毗婆尸佛早留心直至如今不得妙上堂禪樹上呌喧喧道門前風浩浩冷地思量真好笑且道笑箇甚麼等閒拾得鄭州梨看來却是青州棗上堂箇事本成現覓則不可見白圭本無瑕琢磨翻成玷執之以實法空中生閃電視之為等閒腳下添紅線珍重學道人好好看方便作麼生急須著眼看仙人莫看仙人手中扇僧問如何是德山棒師曰穿過你髑髏曰如何是臨濟喝師曰還聞麼問如何是溈仰宗師曰父慈子孝曰如何是臨濟宗師曰迅雷不及掩耳曰如何是曹洞宗師曰三更不借夜明簾曰如何是雲門宗師曰體露金風曰如何是法眼宗師曰山自青木自緑曰五家宗派蒙師指向上宗乘事若何師曰頭頂天腳踏地師憫綱宗失據因為提挈拈頌激揚敲唱見諦超宗一時宗風為之振起元世祖賜賚尊禮至元丁亥寄竹篦麈拂及緑水青山一同授記與高峰原妙以讚示曰上大今已無人雪巖可知禮也虗名塞破乾坤分付原妙侍者壽七十餘示𡧯
