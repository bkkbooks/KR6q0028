body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十三保寧茂禪師法嗣蘇州府靈巖南堂了菴清欲禪師台州臨海朱氏子初出世中山之開福繼遷本覺三主靈巖開堂日僧問丹山鸞鳳九苞文地位清高隔五雲四海具瞻時一見願聞真唱答明君師曰千峰朝岱嶽萬派肅滄溟曰萬方有道歸明主一句無私利有情師曰黃河九曲水出崑崙曰祝贊已蒙師指示向上宗乘事若何師曰眼不見鼻孔問曹溪流非止水一滴忽來千波競起時如何師曰退後退後曰平生不解藏人善到處逢人說項斯師曰莫謗山僧好問天不言四時行地不言萬物生學人有疑願聞開示師曰萬人遐仰處紅日在天心曰野老不知堯舜力鼕鼕打鼓祭江神師曰眼見如盲口說如啞曰千古華山山脚下又添潘閬倒騎驢師便喝問仲冬嚴寒年年事運推移事若何師曰昨夜日輪飄桂華今朝月窟生芝草曰仰山近前叉手意旨如何師曰奴見婢殷勤曰香嚴叉手近前又作麼生師曰大家廝淈𣸩曰去此二途請師別道師曰無人處斫額望汝問單傳直指已涉離微坐斷千差請師答話師曰破鏡不重照落華難上枝曰便恁麼去時如何師曰烏龜鑽敗壁曰即色明心附物顯理時如何師曰癩馬繫枯樁曰三九二十七牛頭南馬頭北如何是接手句師曰百華深處鷓鴣啼問一不做二不休時如何師曰水底撈明月曰退一步又作麼生師曰相逢盡道休官去林下何曾見一人問如何是佛師曰面前案山子曰法即不問如何是僧師曰三頭兩面得人憎僧禮拜師却問曰如何是法僧曰明年更有新條在惱亂春風卒未休師曰洎不問過問陰極陽生則不問祖師門下事如何師曰石筍抽條長丈二曰牛頭未見四祖時如何師曰華陰山前百尺井曰見後如何師曰祝融峰頂萬年松曰去此二途願聞法要師曰休將閒學解埋沒祖師心問舉一不得舉二放過一著落在第二時如何師曰懷州牛喫禾益州馬腹脹曰雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生師曰西川斬畫像陝府人頭落問牛頭未見四祖時如何師曰處處綠楊堪繫馬曰見後如何師曰家家門首透長安曰見與未見時如何師曰鮎魚上竹竿俊鶻趂不及問說法不應機總是非時語作麼生得應機去師曰夜半起來失却牛天明起來失却火問如何是通宗通途師曰東去西去曰如何是叶帶叶路師曰南來北來問蟭螟蟲吞却虎時如何師曰賞你大膽曰恁麼則退身三步師曰漳泉福建頭匾如扇僧擬議師便打曰一任舉似諸方問如何是德山棒師曰義出豐年曰如何是臨濟喝師曰儉生不孝問臘人氷鐵彈子即且置如何是金剛圈栗棘蓬師曰我早知你吞透不下曰豈無方便師喝曰棒上不成龍問佛未出世時如何師曰釋迦自釋迦曰出世後如何師曰彌勒自彌勒曰承師有言釋迦不受然燈記畢竟受甚麼人記師曰自家肚皮自家畫問離四句絕百非請師直指西來意師曰拈燈籠來佛殿裡將山門安燈籠上曰還有為人處也無師曰若無舉鼎拔山力千里烏騅不易騎問雲門放洞山三頓棒意旨如何師曰沙裡無油曰鳥窠吹起布毛又作麼生師曰石中有髓上堂夜來州中琴堂上般雜劇也有端嚴奇特也有醜陋不堪鬼面神頭亦自好笑且道笑箇甚麼我觀世間人是箇大雜劇所謂文武醫卜士農工商各逞己能互相欺誑逗到臘月盡頭不覺一場敗闕具眼旁觀掩口不暇喝一喝曰元正啟祚萬物咸新岸柳搖金梅破玉萬一氣轉洪鈞下座巡堂喫茶上堂絕羅籠脫羈鎖雖是善因而招惡果咄老松源與麼說話唱教門中足可觀光要作臨濟兒孫未得在開福莫有長處麼擊拂子曰星河秋一鴈碪杵夜千家上堂舉松源示眾古者道拈起也天回地轉放下也草偃風行冶父則不然拈起也乾坤黯黑放下也瓦礫生光忽有一箇半箇驀然𭣟瞎頂門眼達磨一宗未至寂寥在師曰老松源只見錐頭利不見鑿頭方壽山即不然拈起也南山起雲放下也北山下雨不拈不放時如何三級浪高魚化龍癡人猶戽夜塘水上堂南泉斬貓趙州戴草鞋而出興化法戰克賓設饡飯便行是皆發揮本有靈光要且不借別人鼻孔出氣所以前日首座說法高聳人天今朝道伴相過光揚宗眼且道山僧鼓兩片皮成得甚麼邊事拍禪牀曰從前汗馬無人識只要重論葢代功清明上堂冬至寒食一百五今朝正是三月六山又青水又綠一聲欵乃漁家曲山僧昨日偶爾郊行作得一偈舉似大眾華冠不整舍那衣禿帚還隨破畚箕五箇老婆三箇醜一雙紅杏換消棃下座上堂藥山久不陞座院主椎鐘擊鼓分明盡底掀翻猶道一詞不措本覺據令提綱不作者般調度今朝月旦拈香撥開向上一路誰敢射虎不真枉發千鈞之弩滿散青苗上堂佛以一音演說法眾生隨類各得解靈山會上退席五千逝多林中半聾半啞眼空四海必有商量心洞十方孰辨真假卓拄杖曰綠楊陰裡戴嵩牛芳草渡頭韓幹馬喝一喝下座上堂春日晴黃鶯鳴大藏小藏鼻孔眼睛木馬嘶泥牛舞壽山不打者破鼓便下座上堂一大藏教束之高閣長期短期無繩自縛莫更紛紛紜紜直須灑灑落落楊岐一頭驢只有三隻脚潘閬倒騎歸攧殺黃番綽五味拈來饡秤錘別有香風滿寥廓喝上堂八月秋何處熱達磨老臊胡有語非干舌齧鏃破關斬釘截鐵父子雖親不傳未是神仙妙訣喝上堂正覺山前明星現時釋迦世尊與大地眾生一時成佛祖師門下蹉口道著佛字𠻳口三日前行不到末後太過各與二十拄杖忽有箇不顧危亡底漢出來道本覺與麼判斷合喫二十拄杖山僧却須分付明窓下安排何故佛滅二千歲比丘少慚愧上堂如來不出世亦無有涅槃以本大願力示現自在法拈柱杖曰不是大願力卓拄杖曰不是自在法舉起也千身彌勒放下也隨處釋迦只為諸人眨上眉毛却入娑羅雙樹間去也靠拄杖曰見之不取千載難忘至正丁未八月二十五日示寂於秀之南堂世壽七十寧波府瑞雲清凉實菴松隱懋禪師奉化鄭氏子幼喜習禪年十八投杭之傳法寺希顏出家既剃落稟戒昭慶慧參方見南㵎泉於雲居一夕松下經行聞巖泉聲微有所觸泉命往永福謁古林林問來作甚麼師曰生死事大特求出離林曰明知四大五蘊是生死根本何緣入此革囊師擬對林便打師豁然悟入久之林命典第一座逾年回浙會月江印主道場延師分座說法至正壬午出主明之瑞雲一日有僧問答未竟以手拍地而笑師曰滯貨何煩拈出僧噓一聲師厲聲便喝一住十五年後退隱東堂影不出山元明良師之猶子也迎歸天童之此軒一日示微疾集眾訣別眾請偈師舉手指自曰此中廓然何偈之為端坐憑几握右手為拳枕額而逝火葬有天華之祥舍利無數塔於瑞雲西岡世壽八十五僧臘七十諡佛光普照大師溫州府僊巖仲謀猷禪師謝藏主侍者上堂一默相酬雷轟電激三呼領旨玉轉珠回七十三八十四築著磕著礙塞煞人拈拄杖曰昨夜西風枕簟凉無數蟬聲噪高樹蘇州府定慧大方因禪師至正丙申春出世定慧時方兵興占住佛屋緇徒戚戚師曰何不休去歇去嗣是語嘿跌宕不可測識一日謝院事僑居靈巖華首座寮盛稱總管周侯義卿之賢且曰我將火化須侯作證明戊戌九月八日侯以郡事登靈巖師聞欣然出迎陪侯夜話曰某將此月十四日即此山火化侯其為我證明兼吾教下衰侯念為法外護慎無忘此言至十三日復以偈寄侯曰昨日巖前拾得薪明朝幻質不能存慇懃寄語賢侯道碧落雲收月一痕侯未深信師復以偈別眾是夜請於華乞以燥薪疊高棚仍借一龕坐去翌晨登殿與眾僧別即升柴棚燥薪得火烈焰熾然於大火聚中且祝香曰靈苗不屬陰陽種根本元從劫外來不是休居親說破如何移向火中栽於烈熾中度數珠與華曰聊當記憶如是四眾始驚信拜禮煙焰所至多舍利且聞異香薪盡舌根齒牙不壞侯聞驚怛不已為悼章二建塔於靈巖其別眾偈曰前身元是石橋僧故向人間供愛憎憎愛盡時全體現鐵蛇火裡嚼寒氷具如鄭明德銘中紹興府龍華會翁海禪師台之臨海人年三十棄家投徑山虎巖祝髮初挂搭栴檀林或譏其舉止山野乃發憤往天目參中峰久之無所入時東州居虎丘古林居開元東嶼居寒山師出入三老之門有年後出住龍華拈香嗣古林年九十三往育王守橫川祖塔偶損左足艱於步履日牀坐每至清夜朗吟古人偈語其徒文渙曰和尚一生參學至此不能受用託吟詠自遣耶師笑曰大慧道癡子呻吟便不是耶渙乃禮拜既寂火化異香襲人塔於靈隱海禪師法嗣杭州府徑山悅堂顏禪師出家於婺之寶林得法東嶼初住崑山之東禪次遷萬壽陞淨慈後主徑山璽書錫金襴法衣法語失錄建寧府斗峰大圭正璋禪師福州福清人禮湖南絕聽祝髮參東嶼聞頌俱胝竪指話言下頓悟遂上方丈呈所得嶼曰作麼師曰古今現成事何必涉思惟嶼曰既不涉思惟汝更來者裡作麼師曰請和尚證明嶼俾頌狗子無佛性話師遽曰狗子佛性無覰著眼睛枯瞥爾翻身轉唵悉哩蘇嚧嶼撫而印之後結茅斗峰漸成叢席上堂顧視左右良久曰黃金雖貴入眼成塵便下座上堂玉宇霜清瓊林葉落一句全提萬機𥨊削作者好求無病藥上堂舉青州布衫話頌曰昨夜三更裡雨打虗空溼狸奴知不知倒上樹梢立元旦上堂元正啟祚萬物咸亨喚作新年頭佛法瞎却你眼不喚作新年頭佛法結却我舌畢竟作麼生便下座臨終說偈曰生本不生滅亦無滅幻化去來何用分別大眾珍重不在言說遂合掌而逝蘇州府椔塘明因天淵湛禪師甞依鳳山一源分座說法一日呈秉拂語曰翔鳳山前行看白雲乍舒乍捲禺泉亭畔坐聽流水或抑或揚眼處作耳處佛事耳處作眼處佛事便見非唯觀世音我亦從中證鳳山指便見兩字曰有此二字便是別人說話師不覺解顏點首禮謝而退出語人曰還丹一粒點鐵成金堂頭老漢之謂也寧波府育王大千慧照禪師永嘉麻氏子年十五出家邑之瑞光禮了定落髮受具後首謁晦機於淨慈一日閱真淨頭陀石被莓苔裹擲筆峰遭薜茘纏語默識懸解遂謁東嶼於薦嚴嶼問東奔西走將欲何為師曰特來參禮嶼曰天無四壁地無八荒汝向甚麼處措足師拍案而退嶼復召至反覆勘辨遂留執侍天曆戊辰出世樂清之明慶示眾佛法欲得現前莫存知解參禮看教皆為障礙何如一法不立而起居自在乎德山棒臨濟喝亦有大不得已爾至正乙未遷寶陀未幾主育王室中垂三關語以驗來學一曰山中猛虎以肉為命何故不食其子二曰虗空無背向何緣有東西南北三曰飲乳等四大海水積骨如毗富羅山何者是汝最初父母越九年退居妙喜泉上築室曰夢菴掩關獨處凝塵滿案泊如也洪武癸丑十月沐浴更衣索紙書偈恬然坐逝世壽八十五僧臘七十茶毗牙齒目睛不壞設利五色塔於夢菴之後杭州府徑山月林鏡禪師本郡人受業於無傳久依東嶼因參本來人有省述偈曰本來人本來人無腦無頭作麼尋驀然揪著箇鼻孔細看元來是白丁時有老宿睨視曰可是師與一摑由是名振叢林後主徑山至元己卯示寂壽八十六塔凌霄東崖寧波府育王雪窓悟光禪師字公實蜀新都楊氏子初出世白馬繼遷開元育王復領天童虞文靖公集甞贊師為佛果一枝鳳毛麟角宋文憲公濂有四會語錄序讀之可以見師之半天寧曇禪師法嗣三空道人自幼具丈夫志不為富貴所奪見竺雲雲示趙州無字話俾參閱數年一日復見雲問生死到來時如何雲曰生是誰耶死是誰耶空乃低頭問訊雲覺其異於常乃再以前話徵之空又低頭問訊雲呵之曰切忌死在者裡空拈起槵子曰數珠一百八不數日示微疾說偈而化火後得舍利無算徑山伏禪師法嗣杭州府徑山南楚悅禪師隆興人上堂聞聲悟道見色明心驀拈拄杖曰者箇是色卓一下曰者箇是聲諸人總見總聞且道那箇是明底心那箇是悟底道喝一喝曰貪他一粒米失却半年糧敕諡佛慈法喜禪師寧波府育王月江正印禪師郡之慈水劉氏子年十三禮月溪受業後參虎巖遂獲印可出住苕之道場繼遷育王僧問如何是千丈舍那身師曰肥不露肉瘦不露骨曰如何是丈六紫磨金色身師曰切忌認奴作郎曰和尚且莫壓良為賤師曰山僧從來柳下惠問有句無句如藤倚樹此意如何師曰無齒大蟲當路坐曰疎山道忽若樹倒藤枯句歸何處嬾安呵呵大笑又作麼生師曰曹娥讀夜曰後來明招為他點破還端的也無師曰臨崖看滸眼特地一場愁曰今日學人問和尚樹倒藤枯句歸何處未審如何指示師喝一喝僧禮拜問朝離東土暮往西天是甚麼人師曰十字街頭石敢當曰昨日有人從天台來因甚向南嶽去師曰鮎魚上竹竿曰有一人常在途中不離家舍有一人離家舍不在途中且道孰優孰劣師曰兔馬有角牛羊無角曰恁麼則庭前一葉落天下盡知秋師曰知時別宜堪作闍黎問達磨面壁意旨如何師曰餿飯泥茶爐曰六祖踏碓又作麼生師曰兔子喫牛嬭曰一人道不識一人道不會意在甚麼處師曰鳳林吒之問師唱誰家曲宗風嗣阿誰師曰風吹石臼念摩訶曰恁麼則已得真人好消息人間天上更無疑師曰水底捉麒麟曰如何是奪人不奪境師曰西天人不會唐言曰如何是奪境不奪人師曰有馬騎馬無馬步行曰如何是人境兩俱奪師曰新羅打鼓大唐齋曰如何是人境俱不奪師曰鬧市裡拋碌甎曰人境已蒙師指示向上宗乘事若何師曰有水皆含月無山不帶雲曰只如楊岐道踏著秤錘硬似鐵啞子得夢向誰說須彌頂上浪滔天大洋海底遭火熱明甚麼邊事師曰如驢覰井如井覰驢問如何是金佛不度爐師曰蘇嚧蘇嚧曰如何是木佛不度火師曰悉利悉利曰如何是泥佛不度水師曰趙州東院西曰如何是真佛內裡坐師曰嵩山破竈墮問如何是一生二師曰元首明股肱良曰如何是二生三師曰黃河三千年一度清曰如何是三生萬物師曰山河無隔礙光明處處通曰只如新年頭佛法還有者箇消息也無師曰樊噲踏鴻門都寺辦齋上堂雲門喫餬餅齩著帝釋鼻孔雲峰喫䬪飥齩著憍梵提舌頭諸人二時過堂喫粥喫飯合作麼生忽然齩破一箇鐵餕餡方知帝釋鼻孔即是憍梵提舌頭憍梵提舌頭即是帝釋鼻孔不見道一切智智清淨無二無二分無別無斷故喝一喝請頭首上堂善哉三下版知識盡來參既善知時節吾今不再三古人與麼道大似按牛頭喫草雲峰則不然善哉三下版收足上蒲團脊梁生鐵鑄透過祖師關一氣轉一大藏教背手拈却須彌山七處徵心無心可覓八還辨見無見可還夢入天宮猶未醒金鷄啼上玉闌干行化歸上堂有佛處不得住無佛處急走過三千里外逢人不得錯舉趙州老人大似抱橋柱澡洗把纜放船山僧一出四十餘日有佛處與他錐破卦文無佛處也曾勘過歷了三州五縣逢人也曾錯舉來只是土曠人稀知音者少摘楊華摘楊華青山忽憶便歸去塵世要看還下來上堂麻三斤乾屎橛蠟人氷鵞護雪貓有歃血之功虎有起屍之德趙州親見老南泉臨濟未是白拈賊青苗會上堂常啼菩薩賣却心肝學般若則易破一微塵出大經卷則難破一微塵出大經卷則易攝大千經卷入一微塵則難一掬水可以漲滔天之浪一簣土可以成九仞之山也不易也不難青山長伴白雲閒赴育王上堂拕犂拽杷幾經年鼻孔撩天不受穿業債依然逃不得又吹鐵笛過鄞川臘八上堂我觀大地眾生具有如來智慧德相但以妄想執著不能證得釋迦老子與麼道大似蟭螟蟲向蚊子眼睫上昨窠向十字街頭揚聲大呌道土曠人稀相逢者少檢點將來也是噇酒糟漢上堂舉僧問五祖一大藏教是箇切脚未審切甚麼字祖曰囉孃應菴問密菴如何是正法眼密曰破沙盆師曰閩蜀同風肚裡有蟲上堂不著佛求不著法求不著僧求燈籠發笑露柱點頭雲門拈出胡餅投子道箇油油腰纏十萬貫騎鶴上揚州上堂熏風自南來殿閣生微凉老玅喜錯認驢鞍橋作阿爺下頷帶累多少人向者裡卜度還知諸佛出身處麼黃河三千年一度清卓拄杖下座上堂朝忽忽暮忽忽盂開口只要噇空南泉打破鍋子甘贄禮拜烝籠擊拂子曰萬里八九月一身西北風結夏小參瑯琊點出五病西院商量兩錯井蛙不足以語東海夏蟲不可以語氷霜若是捎空俊鶻便合乘時止濼困魚徒勞激浪是故從上若佛若祖天下老和尚莫不向刀山劍樹上鑊湯爐炭中成等正覺拔濟有情若約山僧看來也是秤錘蘸酢喝一喝解夏上堂初秋夏末兄弟家東去西去如壯士展臂不假他力師子遊行不求伴侶葢為人人脚跟下有條通天活路三世諸佛六代祖師天下老和尚與你把手共行豈不見雲門大師問洞山近離甚處查渡夏在甚處湖南報慈幾時離彼八月二十五門曰放你三頓棒洞山次日上方丈問昨蒙和尚放三頓棒不知過在甚麼處門曰飯袋子江西湖南便恁麼去山於言下大悟雲門提出倚天長劍凜凜神鋒不易洞山敢將赤身挨他白刃正與麼時如何金烏破瑠璃殻玉兔衝開碧海門至正間奉旨金山建水陸大會命師陞座說法特降御香綵縀晚年菴居榜曰松月自號松月翁天童坦禪師法嗣江寧府天界孚中懷信禪師明奉化姜氏子年十五出家為大僧竺西坦由華藏遷天童師往質疑室中舉興化打克賓因緣問師師曰俊哉獅子兒西頷之俾掌維那職後出世明之觀音遷補陀詔賜廣慧妙悟智寶弘教禪師至正間遷中竺繼住天童御史臺奉疏命主大龍翔集慶寺明兵下金陵僧徒竄散師宴坐一室上親幸嘉之敕改龍翔為大天界寺一日晨興沐浴更衣趺坐謂左右曰吾歸去矣遂瞑目侍僧撼之請說偈師瞋目叱之遂握筆書曰平生為人列挈七十八年漏洩今朝撒手便行萬里晴空片雪書畢復瞑己酉八月廿四日也時上統兵江陰夢師謁見問師來何為對曰將西歸告別耳上還聞師遷化與夢符異之詔出內府帛幣助喪且命卜藏龕之地於伏牛舉龕之日上親致奠送出郡門茶毗舍利如菽貯以寶瓶光發瓶外世壽七十八臘六十四寧波府天寧舜田明牧禪師台之黃巖人出家仙居正學寺首參天童竺西西問達磨不來東土二祖不往西天意旨如何師曰金不博金水不洗水西異之謂左右曰此法門爪牙也復徧參名宿古林茂竺元道東州永元叟端東嶼海咸器重之時日溪泳居天寧師相與激揚元泰定初出世天台淨慧次遷仙居廣度處州連山尋隱居鴈山丞相列怯里不華強起主天寧錫號佛智普慧禪師并錫金襴法衣師氣肅如秋甞即中峰闢室以居蓄一鶴自號鶴松主人一日鶴忽死師以詩悼之踰年師亦示寂玉山珍禪師法嗣江寧府蔣山曇芳忠禪師南康人因寺菑翌日梁王登山謂師曰興復若何師曰賴有大檀越在王曰寺既矣佛依何住師曰古佛過去今佛再來主大喜復笑而言曰衲子所謂蔣薄粥者何也師曰將謂殿下忘却後王賜號廣慧圓悟大師
