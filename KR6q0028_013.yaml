body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十一世太原益禪師法嗣汾州筏渡普慈禪師初參徑山端高峰妙各有契處後北還遊燕如五臺禮文殊感大士放光居臺二年入太原參益和尚尚問曰行腳高士發足甚處師曰五臺尚曰文殊與汝説甚麼師曰腳下草鞋唱成一百文尚曰腳跟為甚麼不落地師曰且喜老漢見得親切尚曰老僧罪過師喝一喝而出自此常造室中久之益囑曰汝緣當在本處他後設大法藥宜號筏渡禮謝歸汾州天曆己巳出住祥符上堂靈鋒寶劍覿露現前照夜神珠隨機變轉誰家竈裏無煙不曾欠多欠少只為面前路徑稍窄一身毛竅太多障蔽自己一段光明慶劫已來空被埋沒如今事不獲已為諸仁略露些子光鋩俾汝等樂業榮家乃以拄杖橫肩曰看看老漢入葛藤窩裏去也至正壬寅六月一日偶示微疾沐浴更衣書偈曰性海波澄太虗寥廓報與諸人無法可説端坐而逝閲世八十有八夏六十有五葬全身于祥符之西崦徑山端禪師法嗣杭州府靈隱竹泉法林禪師別號了幻台之寧海黃氏子依法安太虗同出家因看睦州語有省往參元叟於中竺機契俾掌藏鑰行省左丞相請主萬壽遷中竺至佛殿曰撥塵見佛誰知佛亦是塵罕逢穿耳客多見刻舟人上堂法是常法道是常道拶破面門點即不到雪峰一千七百人善知識朝夕只輥三箇木毬趙州七百甲子老頭陀見人只道喫茶去中峰居常見兄弟相訪只是敘通寒溫燒香叉手若是金毛師子子三千里外定誵訛至元戊寅遷靈隱上堂舉僧問趙州萬法歸一一歸何處州曰我在青州做一領布衫重七斤師曰趙州雖則善用太阿截斷者僧舌頭未免傷鋒犯手靈隱則不然忽有僧問萬法歸一一歸何處只向他道今日熱如昨日上堂古杭管內靈隱名山肇建於東晉咸和年間慧理法師為第一代今日上元令節諸處放燈知事直歲各各照管風燭便下座為森監寺秉炬森羅及萬象一法之所印即今為汝拈却金剛圈栗𣗥蓬了也喚甚麼作一法二由一有一亦莫守火裡烏龜作師子吼大龍翔虗席星吉大夫三返往遣幣聘師辭不赴避會稽山中行院知不可強乃具疏請師仍領靈隱三年退處了幻菴至正乙未春感微疾二月二日集衆敘平生行腳本末且誡衆曰佛法下衰無甚今日宜各努力吾世緣止於斯矣索筆書偈曰七十二年虗空釘橛末後一句不説不説遂奄然而化留龕十日顏色不變葬全身於松源塔西杭州府徑山古鼎生銘禪師奉化應氏子受業金峩得度會竺西坦主天童往依之典內記復走閩歸浙適元叟住靈隱師往參謁一日入室請益黃龍見慈明因緣叟詰曰只如趙州道臺山婆子被我勘破慈明笑曰是罵耶你道二老用處是同是別師曰一對無孔鐵鎚叟曰黃龍直下悟去又且如何師曰也是病眼見空華叟曰不是不是師擬進語叟便喝師當下廓然年五十四始出主隆教遷寶陀次中竺至正丁亥遷徑山順帝錫師慧性文敏宏覺普濟禪師號僧問祖意教意是同是別師曰破畚箕禿苕帚僧禮拜曰謝師指示師曰昨夜三更失却牛天明起來失却火問如何是佛師曰稱鎚蘸酢曰如何是向上事師曰仰面不見天曰記得僧問雲門如何是佛門曰乾屎橛又作麼生師曰雲門不是好心曰乾屎橛與稱鎚蘸酢相去多少師曰鑊湯無冷處僧擬進語師便喝上堂將十方世界安向諸人眼睫上絲毫不動把四大海水傾向諸人腳跟底涓滴不流會醫還少病知分不多愁上堂舉大愚示衆大家相聚喫莖虀若喚作一莖虀入地獄如箭射師曰宗師為人如蠱毒之家置毒於飲食中未嘗不欲斷人命根雖然是冤對者能有幾人中竺用貞良謂師嘗闡化是山請歸了幻菴至正戊戌將遷寂遺書囑丞相外護復書偈曰生死純真太虗充滿七十九年搖籃繩斷擲筆而逝茶毗舌根數珠皆不壞舍利無數徑山隆教寶陀三處分而塔焉世壽七十九僧臘五十五有四會語録暨外集行世台州府天台國清夢堂曇噩禪師慈溪王氏子祖父皆名宦母周師幼有遠志稍長博通經史藻思濬發年二十三白母出家訪道吳楚渡江從雪庭傳於長蘆遂剃染受具昭慶教相諸宗靡不研究及雪庭遷靈隱師往依侍踰年雪庭寂元叟由中竺來補其席一見吻契即命掌內記至元己卯出世慶元之保聖遷慈之開壽台之國清最後住象山之瑞龍上堂竪拂子曰只者箇在溈仰則父慈子孝用劍刃事施陷虎機在臨濟則大機大用卷舒擒縱殺活自由在曹洞則家風綿密金針玉線明投暗合在雲門則孤危聳峻格外提持言前定奪在法眼則箭鋒相拄心空法了情盡見除五家提唱雖則金聲玉振邁古超今然而總是門庭施設直截一句不曾道著且道作麼生是直截一句高聲曰看腳下上堂一二三四五六七七六五四三二一黃河九曲出崑崙摩訶般若波羅蜜嘗誡諸徒曰研究空宗當外形骸忘寢食以消纍劫宿習然後心地光明耳自是日惟一食終夜凝坐達旦洪武庚戌徵江南有道僧館於天界師居首奏對罷上憫師老賜令還山癸丑二月甲申無疾忽戒浴易衣集衆説偈曰吾有一物無背無面要得分明涅槃後看言畢危坐而逝世壽八十有九門人智巖等茶毗以骨石塔於國清嘉興府天寧楚石梵琦禪師明州象山朱氏子元貞丙申六月丁巳母夢日墜懷而生方襁褓有神僧摩師頂曰此兒佛日也他日當振揚佛法燭照昏衢因以曇曜字之早失怙恃九歲入永祚寺受業十六受具戒族祖晉翁洵自崇恩遷道場師依之為侍者繼典藏鑰一日閲楞嚴至緣見因明暗成無見不明自發則諸暗相永不能昏處有省歷覽群籍恍如宿契時元叟唱道雙徑師往參之問如何是言發非聲色前不物叟遽曰言發非聲色前不物速道速道師擬進語叟震威一喝師錯愕而退會英宗召高衲金書大藏師應詔入京一夕睡起聞彩樓鼓聲豁然大悟拊几笑曰徑山敗缺處為我識破了也因成偈曰崇天門外鼓騰騰驀劄虗空就地崩拾得紅爐一點雪却是黃河六月氷後歸徑山叟迎笑曰西來密意喜子已得之矣處以第二座泰定中出世海鹽福臻天曆戊辰遷天寧至元乙亥遷杭報國上堂僧問不愁念起惟恐覺遲如何是覺師曰牛角馬角曰如何是念師曰四五二十也不識問一大藏教是箇切腳未審切箇甚麼字師曰切箇不字曰只如不字又切箇甚麼字師曰莫錯舉似人曰謝師指示師曰石羊頭子向東看問佛祖因緣即不問君臣慶會事如何師曰瑞草生嘉運靈花結早春曰如何是君師曰莫觸龍顏曰如何是臣師曰量材補職曰如何是臣向君師曰赤心片片曰如何是君視臣師曰如月入水曰如何是君臣道合師曰俱問晷運推移日南長至阿那箇是常住法師曰冬不寒臘後看曰教學人如何履踐師曰獨木橋子問西天以蠟人為驗未審此間以何為驗師曰驗甚麼碗曰和尚豈無方便師曰子過新羅問一年將盡夜萬里未歸人還許歸去也無師曰十里長亭五里短亭曰與麼則不歸去也師曰直須歸去曰作麼生是到家一句師曰天寒日短兩人共一碗問日從東上月向西沒作麼生是不遷義師曰柳絮隨風自西自東曰年年是好年日日是好日師曰瞎老婆吹火問護明大士未降王宮釋迦老子在甚麼處師曰眨上眉毛曰謝師答話師曰恰值拄杖不在問盡大地是箇佛身向甚麼處安居禁足師曰錦上鋪華又一重曰竹密不妨流水過山高豈礙白雲飛師曰隨語生解漢問如何是先照後用師曰劈開華嶽連天色放出黃河到海聲曰如何是先用後照師曰劍為不平離寶匣藥因救病出金瓶曰如何是照用同時師曰定光金地遙招手智者江陵暗點頭曰如何是照用不同時師曰三月懶遊華下路一家愁閉雨中門僧禮拜師曰更問一轉豈不好問大悲菩薩用許多手眼作甚麼師曰春風不裹頭修佛殿次師問掌事僧者殿是甚麼年中蓋造僧摑露柱曰何不祗對和尚師曰克繇叵耐倒來者裡捋虎鬚三十棒一棒也不恕曰容某甲伸説便禮拜師曰且放過一著芟草次僧問有根草任和尚芟無根草作麼生芟師鋤地一下僧便放身倒師曰諸方火葬我者裡活埋僧起走師呵呵大笑上堂未離兜率已降皇宮未出母胎度人已畢三世諸佛歷代祖師天下老和尚説心説性舉古舉今總是無風匝匝之波實情好與二十拄杖新福臻今日不是盡法無民打頭不遇作家到底翻成骨董若相委悉拈却炙脂帽子脫却鶻臭布衫其或未然明朝後日大有事在上堂巖頭道須是一一從自己胸中流出與我蓋天蓋地去恁麼道被他掘窖深埋了也茫茫宇宙人無數那箇男兒是丈夫男兒丈夫相去多少待你出窖來却向你道上堂彌勒真彌勒分身千百億時時示時人時人自不識拈拄杖曰衝開碧落松千尺截斷紅塵水一溪上堂米裡有蟲麥裡有廚庫僧堂山門佛殿盞子撲落地楪子成七片上堂若論生佛未具以前一段大事只在諸人腳跟下動便踏著只是不知起處你道從甚麼處起掀翻四大海踢倒五須彌正覓起處不得豈不見東山演祖道山僧昨夜入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了仔細看來元來青布幕裡有人山僧忍俊不禁乃問長史高姓他道老和尚看便了問甚麼姓師曰誰家別館池塘裡一對鴛鴦畫不成上堂眉毛雖長不礙眼鼻孔雖高不礙面諸佛雖悟無二心衆生雖迷無二見見不見倒騎牛兮入佛殿上堂兔角不用無牛角不用有兩兩不成雙三三亦非九夜來空手把鋤頭天明面南看北斗上堂大樹大皮裹小樹小皮纏若不同牀睡焉知被底穿上堂驢事未去馬事到來貓兒上露柱鐵鋸舞三臺大唐天子呵呵笑移取眉毛眼上栽上堂舉祖師道在胎名身處世名人在眼曰見在耳曰聞在鼻嗅香在舌談論在手執捉在足運奔遍現俱該法界收攝在一微塵識者知是佛性不識喚作精魂師曰書頭教娘勤作息書尾教娘莫瞌睡還識娘面㭰麼玉容寂寞淚闌干梨花一枝春帶雨喝一喝上堂一道圓光阿誰無分貓兒若無分為甚麼解捉老鼠若有分為甚麼做貓兒千年田八百主浴佛上堂清淨法身簸土揚塵圜滿報身倚富欺貧千百億化身弄假像真三身中浴那一身謝三娘稱銀上堂頭上是天腳下是地青山是青山白雲是白雲你若會得有馬騎馬無馬步行若不會夜行莫踏白不是水便是石上堂無手人行拳無舌人解語忽若無手人打無舌人無舌人連忙道箇不必良久曰只箇不必天下衲僧跳不出上堂箇箇抱荊山之璧人人懷滄海之珠幹旋佛祖樞機提掇衲僧巴鼻盡謂頂門眼正肘後符靈殊不知靈龜負圖自取喪身之兆出格一句作麼生朝霞不出市暮霞行千里上堂黃檗手中棒剜肉作瘡大愚肋下拳喫鹽救渴速則易改久則難追選佛若無如是眼假曉千載亦奚為喝一喝上堂拈却盂匙箸喫飯不得屏却咽喉脣吻出氣不得色身安法身不可不安法身色身是一是二華須連夜發莫待曉風吹上堂俱胝竪一箇指頭雪峰輥三箇木毬石鞏張弓架箭華亭短棹孤舟鳳山無法可説不妨坐斷杭州就中却有箇好處好在甚麼處四五百條華柳巷二三千所管絃樓上堂大事未明如喪考妣大事已明如喪考妣你道有成褫無成褫常因送客處憶得別家時上堂聞聲悟道塞却你耳根見色明心換却你眼睛蒲團上端坐針眼裡穿線西風一陳來落葉兩三片至正甲申遷禾之本覺丁亥帝師錫號佛日普照慧辨禪師適符昔日神僧之言後自光孝退歸天寧上堂一毫吞却山河大地則易山河大地吞却一毫則難也不難也不易鋪箇破席日裡睡料想上方兜率宮也無如此日炙背築西齋為終老計自號西齋老人洪武戊申秋九月詔江南大浮屠十餘人於蔣山建大法會命師升座説法上大悅己酉春復召師説法賜齋文樓下親承顧問暨行出內府白金以賜庚戌秋上以鬼神情狀幽微難測意召問僧中博通三藏者師與夢堂噩行中仁等應詔至京館大天界寺師援經據論成書將進忽示微疾越四日沐浴更衣索筆書偈曰真性圓明本無生滅木馬夜鳴西方日出書畢謂夢堂曰我去矣堂曰何處去師曰西方去堂曰西方有佛東方無佛耶師乃震聲一喝而逝時辛亥七月二十六日也上聞嗟悼久之時禁火葬以師故特從闍維例火餘齒舌數珠不壞舍利五色紛綴遺骼弟子文晟奉骼及諸不壞者歸西齋塔焉計世壽七十五僧臘六十三杭州府徑山愚菴智及禪師字以中別號西麓蘇之吳縣顧氏子幼出家穹窿海雲院受具聽賢首法師講法界觀未終篇輒笑曰一真法界圓同太虗但涉言詞即成賸法縱獲天雨寶華於我奚益哉遂謁笑隱於建業隱文章道德傾動一時師微露文彩得交相延譽有嶼上人訶曰子才若此不思擔荷正法乃甘作騷壇奴隸乎師舌噤不能答旋歸海雲胸襟礙塞目不交睫者踰月忽一日見秋葉墜庭豁然有省走雙徑謁寂照呈所證照可之至正壬午出世昌國之隆教尋領普慈戊戌遷淨慈後領徑山僧問不與萬法為侶者是甚麼人師曰十字街頭石敢當僧擬再問師曰更要第二杓惡水在問如何是賓中賓師曰君向瀟湘我向秦曰如何是賓中主師曰常在途中不離家舍曰如何是主中賓師曰常在家舍不離途中曰如何是主中主師曰橫按鏌鋣全正令太平寰宇斬癡頑曰賓主已蒙師指示向上宗乘事若何師曰三年一閏九日重陽問衆生為解礙菩薩未離覺和尚作麼生師曰天寒日短兩人共一碗問釋迦已滅彌勒未生正當今日佛法委付何人師曰老僧打退鼓曰前無釋迦後無彌勒還有參學分也無師曰風不來樹不動問佛法禪道相去多少師舉手曰展則成掌握則成拳僧禮拜師曰狂狗趂塊問如何是清淨法身師曰月色和雲白松聲帶露寒問竺土大仙心東西密相付如何是密付底心師曰九秋黃葉亂飄金曰和尚莫將境示人師曰老僧罪過問擬心即差動念即乖不擬不動還有過也無師曰有曰畢竟如何則是師曰莫認自己清淨法身問如何是毗盧師師曰斷跟草鞋曰如何是法身主師曰尖簷席帽曰學人不會師曰現成行貨有甚麼不會僧擬議師便喝問至道無難唯嫌揀擇不揀擇時如何師曰遇飯即飯遇茶即茶僧禮拜師曰放汝三十棒問蓮華未出水時如何師曰寒則普天普地寒曰出水後如何師曰熱則普天普地熱曰如何是佛法大意師曰門前一湖水問心佛及衆生是三無差別還端的也無師曰的曰不是心不是佛不是物是箇甚麼師曰不識問佛身無為不墮諸數因甚有千百億化身師竪拂子曰你道者箇是第幾身僧擬進語師便喝問元正啓祚萬物咸新如何是新年頭佛法師曰日日香華夜夜燈曰蒲團靜倚無餘事永日寥寥謝太平師曰知恩方解報恩問如何是本身盧舍那師曰不離闍黎所問曰如何保任師曰彼自無瘡勿傷之也問不起一念時如何師曰道者合如是曰與麼則依而行之師曰虗生浪死漢問如何是一句中具三玄師曰萬仞峰頭駕鐵船曰如何是一玄中具三要師曰眼裡瞳人吹木呌問如何是和尚家風師曰吹折門前一株松曰學人不問者箇風師曰汝問甚麼風曰家風師曰我者裡大功不竪賞問牛頭未見四祖時如何師曰深山藏毒虎曰見後如何師曰淺草露群蛇曰見與未見時如何師曰日出東方夜落西問三世諸佛不知有狸奴白牯却知有未審知有箇甚麼師曰師姑元是女人做問聲聞見性如夜見月菩薩見性如晝見日和尚見性如箇甚麼師曰黃河九曲水出崑崙曰直指人心見性成佛還端的也無師曰問取達磨大師僧擬議師曰子過新羅問達磨未來時如何師曰眼在鼻上曰來後如何師曰腳在肚下問如何是學人自己師曰腳板大如手掌曰如何是衲僧行腳事師曰緊捎草鞋問如何是先照後用師曰拈起少林無孔笛等間吹出萬年歡曰如何是先用後照師曰雕弓已挂狼煙息萬里歌謠賀太平曰如何是照用同時師曰泥牛吼處天關轉木馬嘶時地軸搖曰如何是照用不同時師曰猶握金鞭問歸客夜深誰共御街行上堂冬至月頭賣被買牛冬至月尾賣牛買被一年三十六旬有六日以閏月定四時成歲移易一𮈔毫不得東頭買貴西頭賣賤三十年後破草鞋向甚處著上堂時維三月節屆清明不寒不暖半陰半晴落華啼鳥一聲聲驀拈拄杖曰穿却解空鼻孔𭣟瞎達磨眼睛踏破草鞋赤腳走好山猶在最高層佛成道日上堂舉趙州問南泉如何是道泉曰平常心是道州曰還假趨向否泉曰擬向即乖州曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之道廓如太虗豈可強是非耶師曰王老師過犯彌天將釋迦世尊六年雪山千苦萬辛所得無上大道等間華劈殆盡合與二十拄杖當時趙州眼光爍破四天下面被熱瞞則且置今日衆中莫有為世尊本底麼如無隆教不是為他間事長無明忝為遺教遠孫未免出隻手去也拽拄杖下座一時打散上堂拈拄杖曰十地驚心二乘罔測卓一卓曰子承父業賺殺多少人靠拄杖下座上堂趙州道箇洗去其僧豁爾知歸鳥窠吹起布毛侍者當下領旨阿呵呵囉囉哩達磨老臊胡打落當門齒上堂世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知普慈三昧諸人不知諸人三昧各各不知所以道譬如河中水川流競奔逝各各不相知諸法亦如是喝一喝曰將謂合有與麼説話上堂舉雪峰問德山從上諸聖以何法示人山曰我宗無語句亦無一法與人雪峰從此有省後有僧問雪峰曰和尚見德山得箇甚麼便休去峰曰我當時空手去空手回東山演曰白雲今日説向透未過者有兩箇人從東京來問他甚處來他却道蘇州來問伊蘇州事如何他道一切尋常雖然如是瞞白雲不過何故只為語音不同畢竟如何蘇州菱邵白藕師曰老東山可謂長於譬喻詞不逼切雖然如是要且只説得德山雪峰影子邊事若是齊眉共躅並駕齊驅未敢相許何故閩蜀同風肚裡有蟲佛涅槃上堂湖光瀲灔晴偏好山色空蒙雨亦奇淨法界身無出沒不須惆悵怨芳時上堂舉東山演示衆曰祖師説不著諸佛看不見四面老婆心為君通一線師曰若教頻下淚滄海也須乾上堂今日又是八月一萬壑千巖儼秋色牛帶寒鴉過別村善財何處尋彌勒有誣師以事詣部使者不滿意文致其罪師竟不與之辨且毫無慍色踰年省憲白師冤復劄請再住徑山入院拈劄曰前佛性命後佛紀綱總在者裡凜然如朽索之馭六馬危乎猶一髮之引干鈎若非大丞相赤手提持全肩擔荷何處更有今日諸人還委悉麼車不橫推理無曲斷帝師錫號明辨正宗廣慧禪師洪武癸丑詔有道沙門十人集大天界師居首以病不及召對賜還穹窿戊午九月索筆書偈而逝茶毗火焰五色香氣襲人齒牙數珠皆不壞遺骨紺澤如青琉璃舍利交綴塔於所居之陰復分爪髮歸徑山葬於無等才塔右壽六十八臘五十一蘇州府萬壽行中至仁禪師自號淡居子又號熙怡叟鄱陽吳氏子父仲華為江州廣文師生五歲俾從州之報恩寺真牧純受業七歲得度識見超穎會西土指空赴英宗召憩報恩見師異之授以毗尼屬令參元叟叟視師軒渠一笑師罔措遂失展尼師壇叟叱曰參堂去次日叟問何處人師曰鄱陽叟曰鄱陽湖深多少濶多少師展手作量勢叟曰不是不是師曰合取臭口遂命掌記室叟嘗謂人曰仁書記虎而翼者也後出世蘄之德章遷越之雲頂崇報吳之虎丘萬壽嘗室中拈木枕子問僧者箇是甚麼僧曰也知和尚老婆心切師擲枕於地僧擬議師便喝出示衆幻軀將逼從心年松下經行石上眠珍重北山龍象衆普通年話幾時圜上堂疊疊遠山青迢迢江水緑盡日小吳軒倚闌看不足驀喚侍者曰收取拂子便下座上堂禪性無生離生禪想禪性無住離住禪寂五臺山上雲焏飯佛殿階前狗尿天剎竿頭上煎䭔子三箇猢猻夜簸錢洪武初上以鬼神之事問師師以佛旨撰書而對上大悅癸丑蒲圻魏觀為蘇郡守三致書延師興復萬壽使三返師乃應晚歲養間於松林蘭若洪武壬戌三月望示疾十九日同參如愚仲訊候曰師行矣諸子在旁盍賜一言為末後訓乎師曰十方薄伽梵一路涅槃門曰與師諦交五十秋矣此別直詣淨土相見師厲聲曰盡大千界是箇淨土何處不相見良久索筆書偈泊然而逝世壽七十四僧臘六十七
