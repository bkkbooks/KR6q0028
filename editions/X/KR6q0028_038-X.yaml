body:
  text: 南海普陀嗣祖沙門西蜀性統編集曹洞宗大鑑下第三十五世廩山忠禪師法嗣建昌府新城壽昌無明慧經禪師撫之崇仁斐氏子生而穎異性無嗜好九歲入鄉校便問浩然之氣為何物塾師異之長依廩山常疑金剛四句為必有指據偶閱傅大士錄有若論四句偈應當不離身之句不覺灑然時年二十四知有此事遂辭山結廬峩峰閱燈錄於興善章僧問如何是道善曰大好山有疑日夜提究至忘寢食一日因搬石正極力推次忽然有得走呈山山詰之應對有緒遂與剃染受具當萬曆乙亥自是二十年不出山有偈曰野獅不噉人間食十二巫峰得自由養就縱橫無礙力崑崙翻轉作灜洲偶一僧問曾見甚麼人來便住此山師以總未行脚對僧曰豈可以一隅而小天下乎師然其言急擔囊首謁少室會無言主席與論旦夕言喜師出語奇特因與當道尚父熊公請就寺示眾一時緇白歎未曾有尋入五臺訪瑞峰通南還受閩建董巖結制請一香為廩山拈出也後遷壽昌寶方峩峰三剎三剎得師唱道皆煥然一新上堂諸佛常時說法不須擬議猜詳且道說的是甚麼法天地玄黃宇宙洪荒不論通宗透教祇貴直下承當承當箇甚麼雲騰致雨露結為霜蛟龍不宿死水猛虎肯行道旁透得者些關棙何須願往西方不問先佛後祖鼻孔一樣放光作麼生放光化被草木賴及萬方釋迦不肯漏泄達磨九年覆藏峩峰不惜口業直下為你宣揚且作麼生宣揚罔談彼短靡恃己長上堂拍案一下曰向上一宗難為措置大用大機怎容擬議等閒垂一句如太阿鋒離匣觸之者死不移時似塗毒鼓受撾聞之者喪不旋踵所以道妙峰峻峙異獸難藏寶樹晶光靈禽莫泊其用也單趂金毛歸野窟直追鐵額入深山掃天下之攙搶拂世間之孽屑提墮阬落壍之類揭迷封滯殻之流其功也使法界世界虗空界一體同觀俾佛道人道地獄道萬法融會雖然猶未是向上事須知更有出格限量外一句且作麼生是量外一句正令未施先斬首大機纔展佛魔悲上堂南泉道三世諸佛不知有黧奴白牯却知有恁麼則三世諸佛齊立下風且道黧奴白牯有甚長處首座曰為他金烹大冶玉出藍田師曰寶坊者裡總與趂出何故秉綱立紀振叢林海晏河清正令行好漢盡驅歸寶所化城推倒不留人座曰某甲則不然師曰汝作麼生座曰閒擔布袋渾無事笑等街頭一箇人師曰也是閒絃子師登古希尚混勞侶耕鑿不息丈室翛然唯作具而已甞有偈曰冐雨衝風去披星戴月歸不知身有苦唯慮行門虧益王嚮師道德屢加褒敬甞曰去聖時遙幸遺此老萬曆丁巳臘八前一日自田中歸謂眾曰吾自此不復砌石矣眾莫諭其旨除夕示眾曰今年只有茲時在試問諸人知也無那事未曾親磕著切須痛下死工夫云云末復曰此是老僧最後分付切宜珍重明正三日示微恙遂不食其教誡諄諄倍常時眾環侍不懌師諭以偈曰人生有受必償莫謂老病死慌拈却無生法忍自然業識消亡一時雲淨常光發佛祖皆安此道場十四作書辭道俗十六書舉火偈次晨盥漱拭身已索筆大書曰今日分明指示擲筆端坐而逝七眾為失依茶毗頂骨牙齒不壞塔方丈後世壽七十一僧臘四十四憨山清云師不唯法眼圓明一振頹綱而峻節孤風誠足以起末俗葢實錄也大鑑下第三十六世大覺念禪師法嗣紹興府雲門顯聖湛然圓澄禪師別號散木會稽夏氏子生明嘉靖辛酉八月祖千徒以孝聞師生而穎悟具辨才觸事解了性不羈雖人所苦難賤簡事率躬親無所諱憚親沒走投隱峰知有參禪事看念佛是誰三晝夜有省趨似峰峰叱之退覺有物礙膺年廿四往投天荒從妙峰薙髮脇不就席者三年乙酉聞僧誦傅大士偈向者礙膺物為之脫然便能記持解甚深義秉聚雲棲還掩關寶林因憶乾峰舉一不得舉二話豁然大悟有頌明之曰舉一舉二別端倪箇裡原無是與非雪曲調高人會少獨許韶陽和得齊二老何曾動舌諸方浪自攢眉擬議過新羅刻舟求劍原迷又頌雲門十五日話自是出語皆能脫去窠臼在雲棲值送茶毗歸棲問亡僧遷化向什麼處去師出曰多謝大師挂念棲頷之至半堂訪有無念問古人道如紅爐上飛片雪相似且道還具透關眼也未念曰我不見有甚麼古人師急指曰背後聻念休去神宗萬曆辛卯慈舟和尚來自京師說法會稽止風塗師以所得質之舟問止風塗向青山近越王城畔滄海遙時如何師曰月穿滄海破波斯不展眉舟復以洞上宗旨次序徵詰師對以偈曰五位君臣切要知箇中何必待思惟石女慣弄無絲線木偶能提化外機井底紅塵騰靄靄山頭白浪滾飛飛誕生本是無功用不覺天然得帝基舟曰子日後開兩片皮截斷天下人舌頭有分在遂命入室印以偈曰曹源一滴水佛祖相分付吾今授受時大地為甘露咄五乳峰頭無鏃箭射得南方半箇兒太史陶君石簣太學張君𤃒元請興復顯聖住持三十年惟弘道是任在越祖庭首稱其盛甲寅主廣孝乙卯主徑山丙辰主東塔上堂前山頭鴉鳴後山頭鵲噪祇是者沉思即不妙妙不妙啞子喫黃連有口不解道上堂值谿鳴乃曰金雞上座為汝等先轉第一義諦根本法輪了也更要討甚麼盌還會麼若不會山僧為諸人再舉一上卓拄杖曰有耳定非聾漢竪起曰有眼定非瞎漢還會麼頻呼小玉元無事只要檀郎認得聲復卓拄杖一下上堂喚二作三指七為八倒秉太阿佛魔盡殺却憶東村王大孃翻著西村李公襪見者聞者皆笑殺拍手曰噫嘻噓阿喇喇上堂若人識得心大地無寸土不信女媧氏天缺鍊石補然則山僧今日登此座上又何所為良久曰舉意碎鐵無心射石虎上堂老儂不識字錯讀已巳己去問大大人答道彌是禰且道識字的是不識字的是良久曰若是獅子終不逐塊上堂一拽石二挨磨日用云為切忌蹉過玄沙本是謝三郎休向前村覓李大大眾作麼生是不蹉過底事只見六龍爭鬬舞豈知丹鳳入青霄上堂西風正獰惡萬籟俱蕭索枝葉盡凋零露出者一著大眾且道者一著是箇甚麼良久曰夜來何處火燒出古人墳上堂寂寂直言寂寂惺惺直言惺惺泥牛空裡翻筋斗木女巖前喫大驚且道是何意旨玉兔懷胎當午照金雞抱子五更鳴小參煙雨盜將山色去溪風送得水聲來本來法法皆成現莫教心識強安排大眾若作境會許你具一隻眼若作佛法會打碎你頭顱拄杖子未歇手在何故我王庫內無如是刀示眾若論此事直得三乘膽喪十地魂驚就是等覺大士到者裡也只好隔羅望月大眾且道衲僧家有甚過人處敢爾大言不見道如將梵位直授凡庸非常之旨人焉廋哉示眾儒者然藜苦讀田者帶雨耕鋤雖則勞逸有異要且同是工夫祇如沙門輩不田而食不蠶而衣畢竟成得箇什麼邊事卓拄杖曰雨滋三草秀是處唱堯歌示眾毛端現剎塵轉法輪芥納須彌粟藏世界冷眼看來未是吾人本分事且道如何是本分事惟獨自明了餘人所不見示眾含珠報德按劍者自癡抱璞呈君刖足者不智眾中還有感恩懷報者麼若有不得辜負老僧示眾未達境唯心起種種分別達境唯心已分別即不生現前山明水秀鵲噪鴉鳴是分別不是分別試斷看示眾舉不顧即差互擬思量何劫悟雲門大師拈山門向佛殿裡即且置移須彌納芥子孔中且道是什麼人示眾舉拂子曰雲門大師來也向道拂子昨夜變作龍吞却百億須彌百億日月百億香水海了也諸人那裡知得山僧今日饒舌再與你通箇消息擲拂子曰無風荷葉動決定有魚行示眾門外竛竮子何意事閒遊家財無可託長者日添愁噫爭似酒樓聽歌妓你若無心我便休師初在嘉熈寺同紫栢月川陶石簣黃慎軒諸公翫月次軒問馬祖與南泉西堂百丈翫月因緣乞師一語師曰你坐我立不得為說軒亟起謝過川曰內翰錯過了也栢曰我下語不及此老雪嶠信問和尚在此作甚麼師曰殺人信曰有者等手段師曰五年不見只道你鼻孔向上了一日同石簣基隆圍爐次簣曰無念師在此阿師得力句乞為舉似師曰向火背猶寒巡漕蘇雲浦問鴛鴦繡出從君看不把金針度與人如何是金針師曰我在京師走一遭不曾遇著一人浦擬進語師曰金針失也僧參師問行脚事作麼生僧劃一圓相師劃破僧敲桌三下師却畫一圓相僧又敲桌三下師又重畫三圓相僧抹却師曰離此之外別道一句僧擬議師喝出問萬法歸一一歸何處師拈絲絛示之曰此是杭州六分銀買得的問南泉斬猫意旨如何師曰莫謗他好曰作麼生得不謗去師曰蒼天蒼天問祖意教意是同是別師曰一輪明月照姑蘇問麻谷參章敬章敬道是意旨如何師曰拈一放一不是好手問清淨本然云何忽生山河大地師曰為你有者一問問和尚常教人放下未審放下箇甚麼師曰優羅華三千年開一遍晚參舉鼓山赴閩王請因緣曰一人死中得活好手手中呈好手一人半路抽身得便宜處失便宜雪峰道好隻聖箭射入九重城裡去早是拋鈎擲釣孚上座云待某甲勘過始得盲龜跛鼈納敗缺了也孚趂至中路歸舉似雪峰大似把髻投衙峰云他有語在須知不是好心孚云老凍膿猶有鄉情在祇知貪程不覺錯路峰便休無齒大蟲傷人不知痛大眾徑山與麼批判久參上士定知雪峰做處若是初機切不得向他三人分上著脚直須自己有箇活路始得師生平不為律縛脫略軌儀腸直如絃舌快如矢遇人無貴賤新故一皆以本色鉗錘山東德王刺血修書請至府問道受戒師應之凡有利益人者無不從事熹宗丙寅臘月朔作付囑語數紙四日過天華示眾罷有僧告假師曰老僧今日亦欲起程晚復為眾垂語諄諄至夜半丑時右脇而寂門人奉全身塔於顯聖之南山世壽六十六僧臘四十有三少室道禪師法嗣河南府登封嵩山少室心悅慧喜禪師字寒灰金臺滿城劉氏子從普濟昇剃度十六請益盤山參究工夫矢志不倦者至忘寢食一日閱燈錄僧問玄沙如何是無縫塔沙曰者一縫大小師豁然有省嗣是徧見慈雲松谷淨淵諸鉅衲會無言主法少林師參之有契典維那久之言以偈囑曰密法無法付當傳何以傳無傳無付處明暗妙相參尋隱燕野有年言既寂登封令請師繼其席師以明熹宗甲子入院僧問如何是君師曰千金之子坐不垂堂曰如何是臣師曰流人去國行遠思深曰如何是君臣道合師曰寰中天子絲綸降塞外將軍報捷歸崇禎癸酉周藩請入汴寓給苑香林士夫問道無虗日兵憲曹應秋問和尚年登七十色若孺子可謂有德師曰居士何得以德贊壽曹曰有德斯有壽師曰顏淵豈無德耶曹曰顏子德固有之只因太殺聰明所以無壽師曰然則孔子之聰明乃不若顏子乎曹無以對師辨才敏捷類如此己卯冬辭歸少室示微疾眾環問疾師屈指曰臘月十五日即愈至期命浴安坐而逝壽七十六門人海寬等建塔於寺迤西壽昌經禪師法嗣廣信府博山無異元來禪師廬州舒城沙氏子誕明萬曆乙亥生而白衣重包十六遊講肆有聲忽歎曰求之在我豈區區事文句哉遂走五臺投靜菴通剃落修空觀五年知非乃參壽昌看船子藏身處沒踪跡話一日於閩白雲峰閱趙州有佛處不得住因緣有省還見昌昌問蟻子解尋腥處走青蠅偏向臭邊飛是君邊事臣邊事師曰臣邊事昌叱之師不懌尋居一室倍加死工一日聞護法神倒地不覺豁然以偈呈昌曰玉山誘一言心灰語路絕幾多玄解會如沸湯澆雪沒巴鼻金針好因緣時節梅蕋綻枯枝桃花開九月觸目如休辨別急水灘頭拋探竿溺殺無限英靈客昌笑紿之曰子一到多門又到門師曰也不消得然終不自肯一日如廁覩人上樹始大悟亟趨見昌昌曰子近日事作麼生師曰有箇活路只是不許人知昌曰既是活路為甚麼不許人知師曰不知不知昌遽曰婆子具何手眼便燒菴趂僧師曰只要黃金增色昌曰僧問玄則龍吟霧起虎嘯風生公案試頌看師立頌曰殺活爭雄各有奇糢糊肉眼曷能知吐光不遂時流意依舊春風逐馬蹄昌笑曰子今日方信吾不汝欺也師曰向後還有事也無昌曰老僧只知二時粥飯子後得坐披衣幸無籌䇿足矣壬寅師年二十八出住博山次主閩之董巖大仰鼓山崇禎己巳赴金陵天界請法席稱至盛上堂諸佛出世為一大事因緣幾幅素縑描不出博山出世亦為一大事因緣一條白練驀頭穿破顏老漢曾相委多少人天被熱瞞諸昆仲須知此事不從功行得不從修證得不從思惟得不從禪定得饒你將自己身心鍊得如枯木寒灰百年在定終是一箇死人本分中事全沒交涉所以道直饒到澄潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事諸昆仲直須向花柳街前逴得九衢春色芙蓉岸上帶來八面秋風始有應用無虧隨緣自在的日子諸昆仲還知博山今日的行履處麼良久曰自有一雙窮相手未曾輕揖等閒人上堂不與萬法為侶者是甚麼人紅塵堆裡露全身了知萬象空無物那見山河礙眼睛三歲孩兒頭似雪神光萬里一條鐵底事分明說與知當戶連山也太奇兼帶位中親迸出巖前石虎夜生兒生兒則且置且道是甚麼時子丑寅卯辰巳午未申酉戌亥乾三連坤六斷離中虗坎中滿屈指顛倒數來依舊寸長尺短上堂真不掩偽曲不藏直大千沙界黑如漆揭開雲霧見青天男兒肯向他尋覓一語中具三玄新婦騎驢阿家牽一玄中具三要跛脚猢猻多躑跳有照有用砂盆打著連底凍立主立賓相將携手過西秦唯有東村王太乙一番拈起一番新上堂博山今日不說有法不說無法不說亦有亦無法不說非有非無法離四句絕百非石人點頭青山皺眉深寒博得三春暖破霧披雲入翠微上堂天地與我同根萬法與我一體肇公祇知全身拶入要且不會轉位旋機殊不知說箇一體已成兩橛不見道喚作如如早是變了也諸昆仲須知古佛堂前曾無異說夜明簾外別有家傳分明月照金沙喜見庭生瑞草家風笑展從他野渡無人寶樹風清須信白雲有主向者裡別有生涯可與古人把手其或未然博山有箇方便卓拄杖曰急著眼薦小參宗門中事難以措辭盡力道不得底句作麼生開口三乘十二分教有人說去了也即心即佛有人說去了也非心非佛有人說去了也不是心不是佛不是物有人說去了也且道與諸昆仲分析箇什麼即得良久曰黃金自有黃金價肯為和沙賣與人珍重小參長慶道萬象之中獨露身為人自肯乃相親即今山河大地樓臺池館滿目青黃是萬象喚什麼作獨露的身拈拄杖曰還會麼莫只圖他山色好須知別有故園春卓拄杖一下僧問如何是和尚的具眼處師曰善逝橋邊逢聖主曰未是和尚具眼處師曰三十棒趂出僧一喝師曰者一喝落在甚處僧擬議師直打出法堂問一口氣不來向甚處安身立命師曰毗盧閣後鳳凰山問如何是無量壽師曰烏龍潭上浪滔天曰恁麼則有量也師曰天池一滴水怎與眾同流問諸佛國土亦復皆空畢竟向甚麼處莊嚴淨土師曰青龍山上鹿兒肥曰不會師曰流鶯雖有語天籟聽無人問向上一著如何道師曰石頭城外垂楊柳曰者是眾生眼如何是和尚眼師曰吹盡殘花色愈鮮曰某甲參學二十年今日學得一拜師曰三十棒且待別時問不得敲唱雙舉請示正中妙挾師曰高低雲遶樹曰謝師答話師曰遠近鳥銜花師行道三十年門庭莊重法道森嚴兢兢慎重大法座下雖英傑鱗集始終不輕許可甞曰寧不得人勿授非器即不得人嗣雖絕而道真自無傷於大法苟授非器名雖傳而實偽得無欺于佛祖顧諸方罕有能及庚午示疾首座問和尚尊候如何師曰儘有些子受用座曰還有不病者也無師曰熱大作麼座曰來去自由請道一句師為書歷歷分明四字擲筆而逝塔全身於本山酉峰壽五十六臘四十建寧府東苑晦臺元鏡禪師別號湛靈郡之建陽馮氏子生明萬曆丁丑六月幼而穎篤於孝友甲辰投虎嘯巖麗空祝髮讀楞嚴知見無知處有得遂摳衣參壽昌於寶方呈所見昌為痛呵曰墮大嶮坑漢師驚悸失所守於是奮志參究不知味者久之一日閱維摩經至此室何以空無侍者曰諸佛國土亦復皆空處豁然大徹第覺行與解左復疑作後閱圓覺隨順覺性章而一切疑礙始得永是年庚戌竟趨壽昌求質曰元鏡特以此事求和尚著眼昌曰但言此事此事何憑師彈指一下昌曰猶疑你在師即呈偈曰可憐摸索幾多年識破不直半文錢宗流特煞瞞人甚剛道祖師別有禪昌復詰曰且道甚處是趙州勘破婆子處師曰和尚莫作怪昌為大笑曰衲僧家到恁田地始不受人牢籠師遂掩兩耳昌囑曰子此後宜深隱自有好時節到來若強出便可惜也因付以偈有正令相持時刻慎逢人唯勘印其心之句師拜受而歸乙卯會無異說法閩之大仰師特訪之相見次異曰禮佛著師端坐異又曰禮佛著師把住曰那箇是佛異曰者是那裡來底師拓開曰者是那裡來底異就坐師大笑便出又喫茶次異曰聞師兄親見壽昌且道壽昌和尚當年命根斷在甚麼處所師劈面一掌曰且道在甚麼處所異不對師便出異曰三十棒可惜放過即日異上堂呼曰晦臺師將出眾異曰誰呌你師出震聲一喝異曰取棒來師曰宿食不必拈出且道馬祖一喝因甚百丈三日耳聾異曰金風多肅殺秋露愈加寒師拂袖歸眾異曰你只學得一箇走師不顧戊午出住書林東苑辛酉開法一枝菴上堂羽衣道道法本無多南辰貫北河祇消一箇字降盡世間魔且道是那一箇字喝一喝便下座尋歸隱武夷搆室石屏巖孤風絕侶人所難親間有衲子求見者師遽喝曰你者禿廝失了魂來者裡討甚麼盌甞躡嶮兀坐終日來者皆望崕而退崇禎庚午示疾一日指巖下謂行者曰此處可以埋我者曰設使死了埋了又作麼生分發師大笑一聲曰恰好恰好行者再問則師已蛻去時七月十三也壽五十四臘二十六塔於師所指石巖祠部黃端伯作銘勒於石建昌府新城壽昌見如元謐禪師字閴然郡之南城胡氏子生明萬曆己卯臘月幼端靜不喜章句之學二十一隨父謁無明于寶方若有舊識浹月再至求剃度不可走臨川禮金山鎧薙染次年再謁明于寶方充火頭父母戀戀不置師痛割之曰恩愛不斷生死不斷生死不斷親恩將焉而酬父母乃聽之一日明與僧論世尊良久因緣師近前曰是何道理僧曰者箇無你分師曰人人有分底為甚麼元謐獨無明曰你既有分為甚求人師無對於是力參苦究不間晝夜者久之忽念親恩莫報往白明明曰除是明心見性師求所以捷徑方便明曰父母未生汝已前是何面目師獃無所趨嗣是徹夜不臥衣不整帶者越月於拽磨次偶失手觸磨盤有省以偈呈明曰本來面目不須尋一點靈明亘古今要識生前端的句巾珍彬真欣鄰仁明曰前三句即不問後一句意作麼生師曰不可雪上更加霜也明曰今日且放過然於衷不敢自是復看如何是道一夜坐圃中至五更正猛提際忽聞蛙聲當下身心一空無以為喻從是得通身放下要覓一絲毫了不可得以偈呈明曰虗空逼塞一聲蛙水鳥含靈共一家十字街頭親著眼自歌自唱哩蓮花明頷之明一日忽問如何是佛師掩耳而出師坐禪次明巡堂問在此作甚麼師不對明曰莫啞麼師亦不對明曰真箇啞那師下禪牀曰和尚也不得向髓中覓骨明曰畢竟事作麼生師曰銚柄杓杷明曰三十棒且放過是冬居第二座明春事徧參潛行密用如愚若魯者二十年及歸明已示寂祠部黃端伯以壽昌席不可虗請繼之師入院一拈提間八面咸服龍湖寶方之新且剩事也師御人無少長高下有拜必答語意溫溫里紳公府皆服德欽風且願執弟子禮其道德感人如此順治己丑示寂壽七十一臘五十茶毗骨粒如銀雪置塔中級有指據錄行世法語外偈頌居多頌趙州狗子佛性無話曰泰山傾倒壓蟭螟氣絕心灰識浪平不是泥牛開隻眼焉知猛虎坐中廳而塔上之銘則有黎東古柱下史鄧澄撰福州府鼓山湧泉永覺元賢禪師建陽蔡氏子生明萬曆戊寅二十補邑庠讀書山剎聞僧唱云我爾時為現清淨光明身忽覺通身歡喜急請經閱之則又茫然莫曉乃往參壽昌於董巖昌令看乾矢橛話久之一日因僧舉南泉斬猫話有省成頌曰兩堂紛閙太無端寶劍揮時膽盡寒幸有晚來趙州老毗盧頂上獨盤桓呈昌昌曰此事切不得於一機一境上作解會須是向百帀千重處垂手直過尚當遇人所謂心雖已在千峰上猶更將身入眾藏始是參學眼也師唯唯丁巳年四十親歿乃棄家竟投壽昌剃染一日值昌田中歸師逆問曰如何是清淨光明身昌振衣而立師曰祇此更別有昌遂行師當下豁然隨入方丈拜起將通所得昌遽連打三棒曰向後不得草草次年昌寂圓戒博山居香爐峰三載每當酬酢皆當仁不讓山甞曰者漢生平自許他時天下人不奈渠何歸閩舟次劍津聞同行僧誦曰一時謦欬俱共彈指是二音聲徧至十方諸佛世界師忽大悟乃徹見壽昌用處作偈曰金雞破碧瑠璃萬歇千休祇自知穩臥片帆天正朗前山無復雨鳩啼嗣是居金仙菴閱藏三載次隱荷山崇禎甲戌出住鼓山乙亥開法開元瓣香為壽昌拈出矣丁丑出浙主真寂辛巳歸閩主寶善次結制開元復還鼓山上堂東海龍王與日月燈明佛大相爭戰勝負不分山僧將二人各與三十烏藤趕過北鬱單越去也諸人還委悉麼良久曰二人是非且置只如晴明陰雨外一句作麼生道咄上堂雪山老人指鹿為馬東西祖師證龜成鼈次第累及山僧亦不免將錯就錯今當端陽佳節不可虗度將太虗空揑作箇小粽子與諸人充腸果腹乃托起香盒曰大眾還嚼得碎麼若嚼得碎行也競龍舟歌楚些一任煙波自由不用飲蒲酒挂艾旗自然妖踪頓息如嚼不碎小粽子塞却諸人口門去也咦臨淵無限傷心事安得黃金鑄屈原上堂生從何處來鐵鋸舞三台死從何處去三台吞鐵鋸勿以明相覩勿以暗相遇坐斷兩頭關銀花開玉樹堪笑當年老凍膿不解放行只解把住山僧今日放行也諸人還會麼咦夜半石人方反側場好夢向誰言上堂諸方浩浩競談禪老僧常抱白雲眠今朝却被人唆哄無端走向法堂前算來無計施設只得將古人葛藤為諸人拈掇一上僧問古德如何是禪曰猢猻上樹尾連顛又僧問如何是禪曰猛火著油煎又僧問如何是禪曰碌磚此三轉語如駭雞犀八面玲瓏如大火聚棲泊不得如塗毒鼓聞者喪身失命諸人向者三句語透得三千七百則陳爛葛藤一揑粉碎但老僧者裡却不如此若有問如何是禪向道鳳山深處雨如煙又問如何是禪向道門前池水養新蓮又問如何是禪向道鷓鴣啼破白雲天若會得老僧底盡會得古人底會得古人底未必會得老僧底若會得老僧當別甑炊香飯供養你也小參直截根源不存知解當陽露出不費纖毫若也眨起眉毛早成蹉過纔落擬議便隔千山所以睦州見僧來便掩門魯祖見僧來便面壁可謂真實相為豈似我輩阿漉漉地說三道四問妙答玄祖師門下成箇甚麼雖然也須識古人誵訛始得祇如魯祖面壁羅山云我當時見好與五火抄何故為他解放不解收玄沙云我當時見也與五火抄且道與羅山是同是別二大老雖則各具手眼檢點將來總是借西家燈照東家壁山僧今日將三大老各與五火抄還會麼橫身當宇宙誰是出頭人小參曲如箭直如鈎小是海大是漚蚯蚓跳過東海跛鱉飛上雲霄參示眾臨濟喝收歸後架德山棒拋向前坑不用從前殘羹餿飯斬新條令一句作麼生只把一枝無孔笛夜深吹徹紫霄穹僧問如何是正中偏師曰古鏡自含光曰如何是偏中正師曰雪覆崑崙頂曰如何是正中來師曰不向死水蟠曰如何是兼中至師曰縱橫無忌諱曰如何是兼中到師曰古殿積煙雲問洞山三十年鬼神尋不見安平真人却來乞和尚戒此與古人是同是別師曰拯溺須臨水嘯月却登峰問如何是奪人不奪境師曰燈月交輝處公子醉扶歸曰如何是奪境不奪人師曰出戶一長嘯杳然天地空曰如何是人境兩俱奪師曰仙人既羽化丹竈亦坵墟曰如何是人境俱不奪師曰上林花似錦每帶馬蹄香問有道之臣因甚不用師曰無渠著力處問主人不出戶如何見客師曰自有侍者在問既是無垢淨光院因甚又作浴堂師曰淨地恐迷人問牛頭未見四祖時如何師曰破驢脊上足蒼蠅曰見後如何師曰鐵牛背上無蚊蚋僧參便喝師亦喝僧又喝師亦又喝僧復喝師曰饒你更喝八萬四千不如還我未喝前一句僧無語師曰掠虗頭漢好與三十棒師器宇峻特通內外典所著有䆿言禪餘內外集及諸法語生平慎重大法行道三十年未甞輕易許可順治丁酉九月朔示疾不食者二十餘日首座問末後一句如何分付師索筆書曰末後句親分付三界內外無可尋處越三日中夜引首座手書曰不有病了令扶起遂坐脫當十月十七子時也師所至異跡居多以非吾宗正茲不錄戊戌正月塔全身於山之西畬
