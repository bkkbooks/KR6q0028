body:
  text: 南海普陀嗣祖沙門西蜀性統編集曹洞宗大鑑下第十六世天童珏禪師法嗣寧波府雪竇足菴智鑒禪師滁之全椒吳氏子兒時喜讀佛書一日母與洗手瘍戲問是甚麼師曰佛手耳視母為大笑俄失二親走真州依長蘆了剃染參究厲精脇不至席者數年時大休珏典第一座目師為法器具戒後入象山之鄭行山縛菴而居山當海岸多妖怪有巨蟒入菴矯首怒視越數日復旋繞於牀師不顧蟒為引去變怪百出皆不可惑徐亦帖然一夕深定中自念此豈外物耶遂豁然大悟身心世界洞如瑠璃乃下山見延壽然曰日來肚大無物可餐菴小無牀可臥若能與食展菴則住否則去然曰者漢從甚處見鬼見神來者裡納敗師便喝於是反覆徵詰不能屈然乃曰鑒公徹人也復走見大休於嶽林機辯逸出休曰今後佛祖不奈爾何矣因令為眾行丐師荷二囊隨得即受備歷艱勤翠山宗白頭謂師曰為眾竭力得無勞耶師曰須知有不勞者曰尊貴位中收不得時如何師曰觸處相逢不相識曰者猶是途中賓主如何是主中主師曰丙丁吹滅火宗以手掩師口師拂袖而退宗遷雪竇挽師偕行時法堂新飭命師普說宗竊聽之歎曰吾生有耳未甞聞也出世繼其席上堂世尊有密語迦葉不覆藏一夜落花雨滿城流水香凡六坐道場皆王公大人推引紹熙辛亥謝事退居雪竇之東菴明年七月示恙誡眾曰吾行矣送終須務簡約勿素服哀慟言訖而逝閱世八十有八夏五十三塔全身于本山之左有藏其鬚髮者縷縷皆獲舍利道聲震海內而跡曾不越四明故自號足菴雪竇宗禪師法嗣揚州府泰州廣福微菴道勤禪師本郡俞氏子上堂舉僧問同安如何是和尚家風同安曰金鷄抱子歸霄漢玉兔懷胎入紫微曰忽遇客來將何祗待同安曰金果早朝猿摘去玉華晚後鳳銜來師曰廣福即不然有問如何是和尚家風祇向他道翠竹叢邊歌欵乃碧巖深處臥煙蘿忽遇客來將何祗待沒底籃兒盛皓月無心盌子貯清風善權智禪師法嗣紹興府超化藻禪師開爐上堂雪滿寒窓燒盡丹霞木佛氷交野渡凍殺陝府鐵牛直得寒灰發𦦨片雪不留任運縱橫現成受用諸禪德要會麼衲帔蒙頭坐冷煖了無知淨慈暉禪師法嗣常州府華藏明極慧祚禪師晚參舉洞山冬至夜請泰首座喫菓子山曰有一物上拄天下拄地黑似漆常在動用中動用中收不得且道過在甚麼處泰曰過在動用中山喚侍者掇退菓桌師頌曰洞山菓子誰無分掇退臺盤妙轉機今夜為君輕點破牡丹花下睡猫兒大鑑下第十七世雪竇鑑禪師法嗣寧波府天童長翁如淨禪師生而岐嶷不類常童長學出世法參足菴於雪竇菴令看庭前栢樹子話有省呈頌曰西來祖意庭前柏鼻孔寥寥對眼睛落地枯枝纔𨁝跳松蘿亮鬲笑掀騰菴頷之後出世屢遷名剎住淨慈時奉敕陞天童捧敕黃示眾曰雲開九天呈起曰看彩鳳銜出且道如何委悉急急如律令敕開爐上堂召眾打圓相曰箇是天童火爐近前則燒殺退後則凍殺忽有箇漢出來道合作麼生㘞火爐動也上堂霜風號肅殺木葉墮蕭𮨱舉拂子曰看惟有玲瓏巖崔嵬望轉高所謂天童滯貨今朝短販一遭莫有酬價底麼下座巡堂上堂外不放入內不放出痛下一槌萬事了畢且道如何太白峰前令斬新內外紀綱俱委悉謝新舊兩班上堂開無間地獄現閻羅大王聚夜叉一部列牛頭兩行與其進者劍樹上猛火進用與其退者刀山裡寒氷退藏且道理會甚事尀耐飯飽弄筯判斷矢急尿牀其或未然花柳春風入戲場上堂天童鐵臭老拳頭打殺江湖水牯牛夜深忽然生箇卵天明推出大日頭且道如何哂㫰諸人烝溼處免教行步滑如油完橋上堂去那邊去來者裡來中間絕壑斷崕且道如何相委以拂子作彎橋勢曰看依俙金磴濶彷彿彩虹彎人從橋上過又作麼生松蘿影裡開天巧翰墨光中入畵看上堂靈雲見處桃花開天童見處桃花落桃花開春風催桃花落春風惡靈雲且置莫有與天童相見者麼春風惡桃花躍浪生頭角新起妙嚴閣慶懺陞座推倒多年老鼠窠掃空平地笑呵呵稜𡾓榱桷插雲表萬億斯年葢覆多大眾見麼今朝成就大緣千古發揮大事且道如何卓拄杖曰斫額任他門外客到家還我箇中人復舉文殊問無著近離甚處曰南方殊曰南方佛法如何主持曰末法比丘少奉戒律殊曰多少眾曰或三百或五百師曰春風鈎引鷓鴣啼曰此間佛法如何主持殊曰凡聖同居龍蛇混雜曰多少眾殊曰前三三後三三師曰平地波㵎駕鐵船天童者兩轉語僅與諸方眉毛廝結更有兩轉語要為諸方點眼或三百或五百銅錢鐵錢省數足陌前三三後三三蘿葡芋艿淺貯滿擔諸方忽然眼開決定拍手大笑且道笑箇甚麼不笑巴叉便笑杜撰雖然笑者還稀或有人問天童多少眾便向道新起妙嚴誇第一團圞都在畵圖中上堂陸修靜陶淵明文殊普賢作圓相曰咦一欵具呈且道憑誰批判若是孔夫子吾無隱乎爾舉世尊初生公案頌曰無憂樹下浴嬰孩清曉薔薇帶露開轉過衲僧相見處後槽驢馬出胞胎舉初祖對武帝不識話頌曰金烏飛上玉欄干黑漆崑崙對面看畢竟者些傳不得落花流水大無端舉楊岐栗棘蓬金剛圈話頌曰肘後驀生閒落索風前忽布閙叉撐那吒八臂空惆悵夜半三更白晝行師六坐道場兩奉天旨法道之盛可想見也示寂說偈曰六十六年罪犯彌天打箇𨁝跳活陷黃泉門人塔全身於本山華藏祚禪師法嗣寧波府東谷光禪師舉世尊答波斯匿王問勝義諦中有世俗諦否話頌曰無聽無說意無窮鐵壁銀山一線通何處是渠真聖諦秋風昨夜到梧桐舉藥山指案山榮枯二樹話頌曰三三兩兩不相同携手行行入草中掇轉脚跟穿繡履何妨臘月鼓春風舉船子接夾山至覆船而逝話頌曰藏身處沒踪跡無影樹頭靈鳥宅沒踪跡處莫藏身不萌枝上春花拆有來由誰辨的天曉西風拂拂吹松釵一逕爭拋擲舉僧問曹山靈衣不掛時如何山曰曹山今日孝滿曰孝滿後如何山曰曹山好顛酒話頌曰曹山顛酒有誰諳醉語狂言不自慙夜半日頭當午照騎半背面著靴衫舉韶國師問龍牙天不能葢地不能載此理如何牙曰道者合如是話頌曰大海心中汎鐵船隨波逐浪浪滔天順風到岸無人識江北從來使鐵錢具如聯珠集中大鑑下第十八世天童淨禪師法嗣襄州鹿門覺禪師參長翁值翁上堂曰一箇烏梅似本形蜘蛛結網打蜻蜓蜻蜓落了兩片翼堪笑烏梅齩鐵釘師在眾中不覺失笑曰早知燈是火飯熟幾多時後承印可出住鹿門示眾曰盡大地是學人一卷經盡乾坤是學人一隻眼以者箇眼讀如是經千萬億劫常無間斷報恩秀曰看讀不易師甞作五位頌曰正中偏月黑雲籠午夜天佛祖無踪凡聖盡箇中誰辨往來源偏中正金井玉盤秋水冷海天紅日已生東餘輝不照毗盧頂正中來戴角披毛知幾回應物轉身全得妙雲收終不露崔嵬偏中至覿面誰能容擬議手提妙印不當風大用繁興豈凝滯兼中到無舌兒童方會道撥塵何處得逢源撒手回途還得妙東谷光禪師法嗣寧波府天童直翁一舉禪師語載增集續傳燈第一卷二十七紙以版失欠錄俟搜討出當補入大鑑下第十九世鹿門覺禪師法嗣青州普照一辨禪師精究教相旨趣後棄去往參鹿門得言外旨出世中都萬壽室中甞設百問勘驗諸方一曰聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己又曰二邊純莫立中道不須安且道甚麼處相見得箇端的又曰回途轉位直須戴角披毛喚作畜生得麼又曰念念釋迦出世步步彌勒下生為甚麼擬心即錯動念即乖又曰有口贊不盡無言心自明是則裂破虗空不是則鬼家活計上人端的處道將一句來如是憧憧籌室契其機者鮮焉師甞作四賓主頌賓中賓天涯奔走幾經春負學論功日轉貧行海淵深須徧涉義天空濶不容塵賓中主衣穿瘦骨露無餘獨鎮寰區暉太初三尺匣中誅劍百篇囊裡薦賢書主中賓丹墀鞭靜九宮開萬里江山絕點埃脫却襴衫戴席帽聲聲只道那邊來主中主重巖幽𨗉鎖煙岑古洞龍吟霧氣深石女唱歸紅焰裡木人運步覓知音又頌浮山示投子十六題一識自宗問答休將句偈酬到頭佛祖一齊收九年面壁已多事立雪神光亦強求二死中活今時及盡更何親雲鎖幽巖凍鎖津堪羨嶺頭增意氣雪中獨綻一枝春三活中死合頭相似喜人情水月空華鏡象榮荒徑客迷芳草渡擬將石火當天明四不落死活到頭採汲不虗施運水搬柴自合時燕語未歸簾幕靜曉鶯啼處綠楊垂五背捨三峰華嶽總平治雪壓寒林折凍枝一念不生全體現纖毫纔動落堦墀六不背捨路濶巖高碧㵎流山華開徧接雲樓雨餘何處鶯聲囀不顧殘春語未休七活人劍耳聽無如眼聽親南山下雨北山雲動容舉止方圓異大賞將軍不語勳八殺人刀凜凜霜風刮地生千山氷雪路難行未萌已落威音際纔擬玄微墮穽坑九平常春來幽谷水冷冷䇿杖優游傍釣汀好箇太平無事客汨羅未必獨惺惺十利道拔生少室靈山事宛然不曾談教不安禪回光一句超今古大丈夫兒誰後先十一言無過失默時似說說時無迷悟剛令與道疎莫謂人根有利鈍麤言細語不關渠十二透脫雪後風和曉霽天鶯啼華笑柳含煙鳳樓不宿桃源客半夜穿鞋人市廛十三透脫不透脫劈箭機鋒著眼看當陽趂妙哂傍觀雲橫谷口迷巢鳥雪擁柴門去路難十四稱揚寒潭不與月為期萬古松聲韻不移眼聽耳觀如會得方知佛祖密傳持十五降句當臺明鏡影難藏露柱燈籠自舉揚千聖不曾留半偈少林已是不相當十六方入圓携琴玉女夜歸時鳳轉丹霄入紫微香霧噴華煙靄重汀洲漁棹月依稀又五位頌曰正中偏斗柄初橫半夜前密室不燃龍鳳燭廣寒宮殿月當天偏中正木女手提無字印失曉崑崙暗皺眉自然羞覩秦時鏡正中來劍樹刀山也自摧玉馬嘶聲離月殿九重依舊鎖蒼苔偏中至大用縱橫無巧智漁歌樵唱謁金門太平不是將軍致兼中到頭角完全無異號脫珍著弊入來縱橫踏破今時道天童舉禪師法嗣寧波府天童雲外岫禪師郡之昌國衛人逸其氏依直翁得度發明從上宗旨遂嗣之初住慈谿石門歷象山智門郡之天寧次繼西竺坦席後遷天童上堂閙市紅塵裡有閙市紅塵裡佛法深山巖崖中有深山巖崖中佛法山僧昨日出城門閙市紅塵裡佛法一時忘却了也行到二十里松雲滿目便見深山巖崖中佛法大眾且道如何是深山巖崖中佛法良久云白雲澹泞出沒太虗之中青蘿夤緣直上寒松之頂便下座上堂以拂子打圓相曰摩訶衍法離四句絕百非又打一圓相曰禮之用和為貴先王之道斯為美又打一圓相曰摩尼珠人不識如來藏裡親收得諸人還見麼所見不同互有得失天童者裡毋固毋必一日問眾曰天童今日大死去也汝輩作麼生救無印證出曰請和尚喫飯師曰天童今日大死去也汝不要相救證曰䆿語作麼師曰天童今日大死去也阿誰與我同行證曰和尚先行大證後隨師呵呵大笑遂示寂塔全身於本山大鑑下第二十世天童岫禪師法嗣寧波府雪竇無印大證禪師饒州鄱陽史氏子幼穎異依州之昌國寺智節剃染初謁荊石琰於圓通不契時思菴睿居閒房師委身日就鍛鍊嗣聞雲外唱道天童往依之得入室師資唱和有若大溈之得寂子至治癸亥應詔金書大藏英宗賜織金屈眴南還江浙丞相脫歡請師主衢之南禪繼領光孝遷信之祥符明之定水後領雪竇上堂千說萬說不若覿面一見昨日二十九今朝七月一報汝參禪人此中有深秘孃生兩隻眼箇箇如黑漆急急急回頭覰破天真佛良久曰且道是甚面目下座巡堂喫茶上堂妙妙妙衲僧鼻孔無多竅玄玄玄剎竿頭上挂青天智士寧容袖手良馬豈待揮鞭全超棒喝不落蹄筌百鳥不來春又去巖前贏得日高眠舉世尊纔陞座文殊遽白椎云諦觀法王法法王法如是世尊便下座話頌曰春風乍扇已天涯是處根莖競發芽何必子規更饒舌重教啼血染山花元順帝至正庚子退居定水之圓明菴明年九月廿一示寂闍維牙齒數珠不壞舍利明瑩門人景雲等建塔於菴之後壽六十五普照辨禪師法嗣磁州大明寶禪師甞作五位頌曰正中偏月鎖深宮午夜前燭殘人靜丹墀冷一片虗明照碧天偏中正曉天不挂秦臺鏡金烏纔擬出扶桑依稀還被輕煙映正中來深夜寒梅雪裡開馥馥幽香無間斷頭頭觸處絕纖埃偏中至大用全彰無忌諱携手相將賀太平熙熙風物從來異兼中到妙盡功忘非善巧枯木龍吟大地春靈根秀出寒巖草慈雲覺禪師普照室中垂問曰聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己師曰半夜石人無影象縱橫誰辨往來源問不見一法始是半提作麼生是全提底道理師曰石馬驟千山問喫飯忘其饑力充忘其飽作麼是力充底人師曰巨靈擡手無多子分破華山千萬重問直得不恁麼來者猶是兒孫邊事如何是向上人師曰半夜烏雞雪裡啼問行玄體妙落在今時究理窮源關山萬里只如未知有底人如何趨向師曰牀窄先臥問迷時千卷少悟後一言多且道悟了底人如何履踐師曰出不由戶坐不當堂問岸如欲止先停棹車若不行須打牛如今打牛也車行也未師曰下載清風付與誰大鑑下第二十一世大明寶禪師法嗣太原府王山體禪師參大明一日見子生飯師乃拍手一下飛去大明適後至亦於師背上打一掌師驚顧明曰還是子辜負你你辜負子師罔措明曰幸是可憐生却乃互相辜負去師豁然有省於是典侍者戮力十年秘重深嚴不見參學一日抽單罔不疑怪或問明侍者何往明曰諸方來諸方去何介意哉曰參學何如明曰道有參學栽他頭角道無參學減他威光一眾方疑後受囑隱山西太原府府運兩衙請主王山上堂者裡莫有衝流度刃者麼試出來相見看僧出從東過西又從西過東師曰未得一場榮先刖兩脛足曰也知和尚慣用此機師曰罪不重科僧擬議師便打僧為吐舌師曰棺材裡瞠甚眼睛乃曰似者等行脚祖師門下有甚交涉同安老祖道孤峰逈秀不掛煙蘿片月行空白雲自異衲僧家到者裡劍甲未施賊身已敗豈不屈辱先宗山僧今日若不痛與鍼錐達磨一宗堪作甚麼喝一喝曰逢人不得錯舉師甞謂學者曰獅子有三種第一超宗異目第二齊眉共躅第三影響不真超宗異目者見過於師堪為種草齊眉共躅者減師半德落在今時若影響不真則狐犴猥勢羊質虎皮祖師門下有甚用處又甞發明洞上宗旨曰既有尊貴之位須明尊貴底人須知尊貴底人不處尊貴之位方明尊貴不落階級五位頌曰正中偏夜深古殿鎖輕煙寂爾苔封臣不立密密光輝未兆前偏中正玉人不覩臨臺鏡子夜星河霧氣濃依舊青山不露頂正中來木人携杖火中回趂起泥牛耕練色放教石馬步蒼苔兼中至轉側相逢全意氣交輝終不犯鋒鋩大用縱橫無變異兼中到明暗盡時光不照石女有智妙難窮解栽絕頂無根草府仁山恒禪師久待大明深入堂奧明一日以衣法付之師曰恒不是恁麼人明曰不是恁麼人自不殃及伊師乃唯唯受之葢法乳恩深也明囑曰汝既如是第一不得容易出世若躁進輕脫中間必有坎坷厚養久之乃出住焉僧問洞山已邈雲巖真因甚到過水覩影始云大悟師曰不是深心人不知曰如何是深心人師曰十八女兒不繫腰復示以頌曰柳底黃鸝送好音輕輕喚著愈傷心闌干倚徧無聊賴夢裡如何許我尋無路尋怨殺月明花下影依俙拂斷枕頭琴普照寶禪師法嗣順天府大慶壽寺虗明教亨禪師濟州任城王氏子先是有汴州慈濟寺僧福安者山居有年於邙山村倚樹而化王氏母夢其求託宿遂生師焉七歲出家十五遊方參普照未有所入一日以事往睢陽宿趙渡於馬上憶擊板因緣疑情百結將抵河津同行警曰此河津也師忽有省下馬悲喜交集至隕涕歸以告照照曰此僵臥人似欲轉動日面佛月面佛意旨如何師復茫然無所對後聞板聲乃大悟以頌呈照曰日面月面星流電卷少或遲疑面門著箭咄照曰吾今後瞞汝不得也後出世五坐道場末繼席普照尋奉旨主慶壽金興定己卯七月十日索筆書偈端坐而化其偈失錄尚記其末云咦一二三四五六七塔於大鑑下第二十二世王山體禪師法嗣彰德府磁州大明雪巖滿禪師初參普照寶寶曰兄弟年後正宜參扣老僧當年念念以佛法為事師遽避席進曰和尚而今如何寶曰如生冤家相似師曰若不得此語幾累我枉行千里寶下禪牀握師手曰作家那師與勝默光同參有所逆甞跪受呵斥或問其故師曰今諸方師資法屬諍訟招譏獅子身中蟲自食其肉滿雖不肖復敢蹈覆轍邪聞者咸歎以為賢後造王山山舉洞山覩影話師疑甚山曰不疑言句是為大病子今既疑則病發矣子知此病則子藥也師一日讀五位頌至折合終歸炭裡坐忽大悟曰今日方知病即藥也呈山山曰料掉沒交涉師曰和尚此回瞞不得也山可之俾接踵住持上堂舉洞山解夏曰秋初夏末兄弟東去西去直須向萬里無寸草處去良久曰祇如萬里無寸草處作麼生去石霜曰出門便是草太陽曰直饒不出門亦是草漫漫地師曰三箇老漢雖然異口同音未免撞頭磕頟何故一人大開口了合不得一人高擡脚了放不下一人緊閉門了出不去王山即不然徧十方界非外全在一微塵在一微塵非內徧十方界祇者一微塵及盡不可得也向那裡安門甚處入草還委悉麼休侵洞嶺初秋草請看疎山﨟月蓮下座僧問高郵定透網金鱗以何為食定曰乾屎橛僧無語師代曰謝供養師於金泰和六年丙寅十月寂當宋寧宗開禧二年其頌語最多茲僅錄正偏五位如左曰正中偏𨗉洞沉沉鎖翠煙午夜碧空清似鏡一輪明月上層巔偏中正欲曉雲濃封古徑雪屋靈明夢未惺冥然又若寒宵永正中來木人携錫下崔嵬縱橫不履今時地石徑祥蓮襯足開兼中至高提妙印無真偽碧紗叢裡恣情眠一任巖前花雨墜兼中到突兀三光曾未照夢手敲空聽者稀逈然不落宮商調順天府慶壽勝默光禪師初參鄭州寶後參王山得法出世開堂甞謂眾曰傳法當如船子求法當如可祖苟不然者其何以荷如來之大法哉上堂我宗無語句亦無一法與人德山齒不關風納盡敗缺要識綱宗先須識句巖頭腦後見腮莫與往來總好與三十痛棒還有不甘者麼如無莫怪壓良為賤示眾舉麻谷到章敬遶禪牀三帀振錫一下卓然而立敬曰是是谷又到南泉遶禪牀三帀振錫一下卓然而立泉曰不是不是師曰是無可是非無真非是非無主萬善同歸梟雞晝夜徒自支離我無三寸鱉得喚龜迦葉不肯一任攢眉僧問如何是祖意師曰鍼頭削鐵曰如何是教意師曰佛面剝金舉九峰不肯首座話頌曰元座徒亡一炷煙九峰不是抑高賢若將一色為承紹辜負先師不借緣仁山恒禪師法嗣彰德府磁州大明詮禪師依仁山得旨賦性瀟灑排諧談笑仁山常囑定侍者拘檢之師曰人生一夢而已快樂一世是好夢拘檢一世是惡夢我寧作好夢耳人以為佳言徒單二駙馬赴南京任道過大明入堂見一僧面壁而坐駙馬曰好箇澹漢師曰今日被駙馬著鹽醬也慶壽亨禪師法嗣開封府大覺西溪弘相禪師沂水王氏子初棄家事祖照通經得僧服恣覽內外典凡十年乃棄參虗明於普照又十年始獲印記出世住鄭州之大覺嵩山之少林沂州之普照最後住清凉元遺山好問與師同遊蘭若峰道中偶談及避𡨥事時師以為凡出身以對世能外生死然後有所立生死雖大事視之要如翻覆手然則坎止流行無不可者此須從靜工中來念念不置境當自熟耳時雪途石滑師失跌同行莫能救直下數十尺僅礙大樹而止遺山驚問師方神色自若徐曰學禪四十年脚跟乃為石頭取勘聞者笑服因漢境熟之言果其日用事純而不妄也年六十四示寂有語錄文集行世大鑑下第二十三世雪巖滿禪師法嗣順天府報恩寺萬松行秀禪師河內人族蔡氏氣骨不凡幼便超然有出世志父母難之然知終不可以世相奪因携送刑州淨土寺禮贇允落髮秉具後決力參究擔囊距燕歷潭柘過慶壽參勝默老人老人曰學此道如鍛金滓穢不淨則精金不顯觀君眉宇間大有物在此物非一番寒徹骨不能放下子後自見不在老僧多言且令看長沙轉自己歸山河大地話半載無所入默曰我只願你遲會久之一日忽有省於玄沙未徹語尚未透次參雪巖滿於磁之大明言下忽悟曰得恁麼近從前伎倆一火而燼始知勝默為人處依雪巖二年盡得其底蘊巖付衣偈勉以流通大法自是兩河三晉皆欽師名於是法門隱然倚以為重尋歸淨土搆萬松菴寺中耆宿敦請開法師應之次住中都萬壽金明昌癸丑章宗詔入禁庭陞座帝躬自迎禮聞法感悟賜錦綺大僧伽衣承安丁巳詔住大都仰山棲隱寺以繼開山玄冥顗席次移錫報恩洪濟元太宗庚寅復奉敕主中都之萬壽晚年退居從容菴數遷鉅剎大振洞上之宗道化稱極盛焉上堂舉昔有跨驢人問僧何往僧曰道場去人曰何處不是道場僧以拳毆之曰者漢沒道理向道場裡跨驢不下其人無語師曰盡道者漢有頭無尾能做不能當殊不知却是者僧前言不副後語汝既知舉足下足皆是道場何不悟騎驢跨馬無非佛事萬松要斷者不平公案更與花判道喫拳沒興漢茅廣杜禪和早是不尅己那堪錯過他道場惟有一佛法本無多留與闍黎道戶唵薩哩嚩棲隱上堂蓮宮特作梵宮修聖境還須聖駕遊雨過水澄禽汎子霞明山靜錦蒙頭成湯也展恢天網呂望稀垂釣月鉤試問風光甚時節黃金世界桂花秋上堂所謂道人者不知月之大小不知歲之餘閏山僧即不然今年三百八十四日前月大盡此月小盡即今閏四月一日辰末巳初忽有箇漢出來道疏通伶俐知時按節即不無要且無道人氣息山僧以手掩鼻道退後退後為甚麼聻道人氣息太煞熏人示眾機輪轉處智眼猶迷寶鏡彰時纖塵不度開拳不落地應物善知時兩刃相逢時如何回互咄示眾踢翻滄海大地塵飛喝散白雲虗空粉碎嚴從立令猶是半提大用全彰如何施設示眾去即留住住則遣去不去不住渠無國土何處逢渠在在處處且道是甚麼物得恁麼奇特示眾動則埋身千尺不動則當處生苗直須兩頭撒開中間放下更買草鞋行脚始得示眾向上一機鶴冲霄漢當陽一著過新羅直饒眼似流星未免口如匾擔且道是甚麼宗旨僧問諸佛不出世為甚却降誕王宮師曰青山常舉足曰亦無有涅槃為甚却滅度雙林師曰白日不移輪問明與無明其性無二如何是無二之性師曰天曉不露問撒手那邊的人為甚麼不居正位師曰大功不宰曰回途者邊的人為甚麼不墮偏方師曰至化無為問向道莫去歸來背父如何得不背父去師曰切忌回頭問心心放下難如何是放下底人師曰擔取去問僧洞山道龍吟枯木異響難聞如何是異響曰不會師曰善解龍吟問是處是慈氏無門無善財為甚麼却道瑠璃殿上無知識師曰拆殿了相見瞎全真問某甲三十年來打疊妄心不下乞師方便師曰汝妄心有來多少時也未審本來有妄心否祇如妄心作麼生斷只者妄心斷即是不斷即是真聞廓然作禮而去晚年幽居多暇甞拈掇宏智百頌曰從容菴錄又著請益錄踵碧巖後塵開寶鏡重垢甚有補於宗門師天資敏利百家之學無不淹通三閱大藏首尾熟貫有祖燈錄六十二卷釋氏新聞鳴道集辨宗說心經風鳴禪悅法喜集若干卷淨土仰山洪濟萬壽四剎皆有錄行世以元定宗元年丙午後四月五日示疾七日書偈曰八十一年只此一語珍重諸人切莫錯舉遂逝世壽八十一生宋乾道二年丙戌僧臘六十茶毗於通玄門外舍利無數諸方門人分而塔焉府竹林巨川海禪師有風鈴頌曰銅脣鐵舌太尖新樓角懸來不記春言外百千三昧法因風說與箇中人學士陳秀王甞問萬松彌勒菩薩為甚麼不修禪定不斷煩惱松曰真心本淨故不修禪定妄想本空故不斷煩惱又問香山大潤潤曰禪心已定不須更修斷盡煩惱不須更斷後持以問師師曰本無禪定煩惱公曰惟此為快耳
