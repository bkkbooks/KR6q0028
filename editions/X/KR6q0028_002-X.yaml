body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十六世昭覺勤禪師法嗣寧波府育王山佛智端禪師紹興府錢氏子吳越王後裔也生而岐嶷眉目淵秀十四驅烏大善寺十八得度受具往依淨慈一未幾聞僧擊露柱曰你何不說禪師微有省去謁龍門遠甘露卓泐潭祥皆以頴邁見推晚見圓悟於鍾阜悟問誰知正法眼藏向者瞎驢邊滅却即今是滅不滅曰請和尚合取口好悟曰此猶未出常情師擬對悟擊之師頓去所滯侍居天寧掌記室尋命分座初開法丹霞次遷虎丘徑山謝事菴於平江之西華閱數稔敕居建康保寧後移蘇城萬壽及閩中玄沙壽山西禪復被旨補靈隱仍歸西華舊隱紹興戊辰秋赴育王之命上堂德山入門便棒多向皮袋裡埋蹤臨濟入門便喝總在聲塵中出沒若是英靈衲子直須足下風生超越古今途轍拈拄杖卓一下喝一喝曰祇者箇何似生若喚作棒喝瞌睡未惺不喚作棒喝未識德山臨濟畢竟如何復卓一下曰總不得動著上堂盡大地是沙門眼徧十方是自己光為甚麼東弗于逮打鼓西瞿耶尼不聞南贍部洲點燈北鬱單越暗坐直饒向箇裡道得十全猶是光影裡活計撼拂子曰百雜碎了也作麼生是出身一路擲下拂子曰參上堂動則影現覺則氷生直饒不動不覺猶是秦時𨍏轢鑽到者裡便須千差密照萬戶俱開毫端撥轉機輪命脈不沈毒海有時覺如湛水有時動若星飛有時動覺俱忘有時照用自在且道正恁麼時是動是覺是照是用還有區分得出底麼鐵牛橫古路觸著骨毛寒上堂行時絕行跡說時無說蹤行說若到則垛生招箭行說未明則神鋒劃斷就使說無滲漏行不迷方猶滯殻漏在若是大鵬金翅奮迅百千由旬十影神駒馳驟四方八極不取次㗖不隨處埋身且總不依倚還有履踐分也無剎剎塵塵是要津上堂易填巨壑難滿漏巵若有操持了無難易拈却大地寬綽有餘放出纖毫礙塞無路忽若不拈不放向甚麼處履踐同誠共休戚飲水亦須肥僧問如何是賓中賓師曰你是田厙奴曰如何是賓中主師曰相逢猶莽鹵曰如何是主中賓師曰劍氣爍愁雲曰如何是主中主師曰敲骨打髓高宗紹興庚午十月初示微疾至十八日首座法全請遺訓師曰盡此心意以道相資語絕而逝火後目睛齒舌不壞其地發光終夕得設利者無計踰月不絕黃冠羅肇常平日問道於師適外歸獨無所獲道念勤切方與客食咀噍間若有物吐哺則設利也大如菽色若琥珀好事者持去遂再拜於闍維所聞香匳有聲亟開所獲如前門人奉遺骨分塔於鄮峰西華諡大悟禪師長沙府大溈佛性法泰禪師漢州李氏子僧問理隨事變該萬有而一片虗凝事逐理融等千差而咸歸實際如何是理法界師曰山河大地曰如何是事法界師曰萬象森羅曰如何是理事無礙法界師曰東西南北曰如何是事事無礙法界師曰上下四維上堂推真真無有相窮妄妄無有形真妄兩無所有廓然露出眼睛眼睛既露見箇甚麼曉日爍開巖畔雪朔風吹綻臘中梅上堂寶劍拈來便用豈有遲疑眉毛剔起便行更無回互一切時騰今煥古一切處截斷羅籠不犯鋒鋩亦非顧鑑獨超物外則且置萬機喪盡時如何良久曰八月秋何處熱上堂涅槃無異路方便有多門拈起拄杖曰看看山僧拄杖子一口吸盡西江水東海鯉魚𨁝跳上三十三天帝釋忿怒把須彌山一摑粉碎堅牢地神合掌讚歎曰諦觀法王法法王法如是以拄杖擊禪牀下座上堂達得人空法空未稱祖佛家風體得全用全照亦非衲僧要妙直須打破牢關識取向上一竅如何是向上一竅春寒料峭凍殺年少上堂今朝正月已半是處燈火繚亂滿城羅綺駢闐交互往來遊翫文殊走入閙籃中普賢端坐高樓看且道觀音在甚麼處震天椎畵鼓聒地奏笙歌上堂渺渺邈邈十方該括坦坦蕩蕩絕形絕相目欲眎而睛枯口欲談而詞喪文殊普賢全無伎倆臨濟德山不妨提唱龜吞陝府鐵牛蛇齩嘉州大像嚇得東海鯉魚直至如今肚脹嘻祈雨上堂火雲燒田苗泉源絕流注娑竭大龍王不知在何處以拄杖擊禪牀曰在者裡看看南山起雲北山下雨老僧更為震雷聲助發威光令遠布乃高聲曰閧弄閧弄上堂開口有時非開口有時是麤言及細語皆歸第一義釋迦老子碗鳴聲達磨西來屎臭氣唯有山前水牯牛身放毫光照天地上堂得念失念無非解脫是甚麼語話成法破法皆名涅槃料掉沒交涉智慧愚癡通為般若顢頇佛性菩薩外道所成就法皆是菩提猶較些子然雖如是也是楊廣失駱駞上堂欲識佛去處祇者語聲是咄傅大士不識好惡以昭昭靈靈教壞人家男女被誌公一喝曰大士莫作是說別更道看大士復說偈曰空手把鉏頭步行騎水牛人從橋上過橋流水不流誌公乃呵呵大笑曰前頭猶似可末後更愁人上堂憶昔遊方日獲得二種物一是金剛鎚一是千聖骨持行宇宙中氣岸高突兀如是三十年用之為準則而今年老矣一物知何物擲下金剛鎚擊碎千聖骨拋向四衢道不能更惜得任意過浮生指南將作北呼龜以為鼈喚豆以為粟從他明眼人笑我無繩墨台州府護國此菴景元禪師永嘉楠溪張氏子年十八依靈山希拱圓具後習台教棄謁圓悟於鍾阜聞僧讀死心錄曰既迷須得箇悟既悟須識悟中迷迷中悟迷悟雙忘却從無迷悟處建立一切法師疑甚即趨佛殿以手托開門扉豁然大徹繼而執侍機辯逸發悟目為聱頭元侍者遂自題肖像付之曰生平只說聱頭禪撞著聱頭如鐵壁脫却羅籠截脚跟大地撮來墨漆黑晚年轉復沒刁刀奮金剛椎碎窠窟他時要識圓悟面一為渠儂併拈出悟歸蜀師還浙東鏟彩埋光不求聞達括蒼守耿延禧甞問道於圓悟因閱其錄至題肖像得師為人乃致開法處州之南明僧問三聖道我逢人即出出則不為人意旨如何師曰八十翁翁嚼生鐵曰興化道我逢人則不出出即便為人又作麼生師曰須彌頂上浪翻空問天不能葢地不能載是甚麼物師曰無孔鐵鎚曰天人羣生類皆承此恩力也師曰莫妄想問三世諸佛說不盡底句請師速道師曰眨上眉毛問未舉先知未言先見如何是溈仰宗師曰推不向前約不退後曰昔年三平道場重興是日圓悟高提祖印始自師傳如何是臨濟宗師曰殺人活人不眨眼曰建化何妨行鳥道回途復妙顯家風如何是曹洞宗師曰手執夜明符幾箇知天曉曰目前抽顧鑑領略者還稀如何是雲門宗師曰頂門三眼耀乾坤曰三界唯心萬法唯識如何是法眼宗師曰箭鋒相直不相饒曰向上還有路也無師曰有曰如何是向上路師曰黑漫漫地僧喝師曰貪他一粒粟失却半年糧上堂威音王已前者一隊漢錯七錯八威音王已後者一隊漢落二落三而今者一隊漢坐立儼然且道是錯七錯八是落二落三還定當得出麼舉拂子曰吽吽浴佛上堂釋迦老子初生下來便作箇笑具一手指天一手指地云天上天下唯我獨尊雲門道我當時若見一棒打殺與狗子喫貴圖天下太平尚有人不肯放過却道讚祖須是雲門始得且道那裡是讚他處莫是一棒打殺處麼且喜沒交涉今日南明祇得放過若不放過盡大地人竝須乞命如今事不獲已且同大眾向佛殿上每人與他一杓何故豈不見道乍可違條不可越例以拂子擊禪牀下座上堂野干鳴師子吼張得眼開得口動南星蹉北斗大眾還知落處麼金剛堦下蹲神龜火裡走後退居西山耿龍學請就淨光院陞座靈峰古舉白雲見楊岐岐令舉茶陵悟道頌公案請師批判師乃曰諸禪德楊岐大笑眼觀東南意在西北白雲悟去聽事不真喚鐘作甕檢點將來和楊岐老漢都在架子上將錯就錯若是南明即不然我有明珠一顆切忌當頭蹉過雖然覿面相呈也須一鎚打破舉拂子曰還會麼碁逢敵手難藏興詩到重吟始見工示疾日請西堂應菴華為座元付囑院事示訓如常俄握拳而逝茶毗得五色舍利齒舌右拳無少損塔於寺東劉阮洞前壽五十三福州府玄沙僧昭禪師上堂天上無彌勒地下無彌勒且道彌勒在甚麼處良久曰夜行莫踏白不是水便是石蘇州府南峰雲辯禪師本郡人依閩之瑞峰章得度旋里謁穹窿圓忽有得遂通所見圓曰子雖得入未至當也切宜著鞭乃辭扣諸席後參圓悟值入室纔踵門悟曰看脚下師打露柱一下悟曰何不著實道取一句師曰師若搖頭弟子擺尾悟曰你試擺尾看師飜筋斗而出悟大笑由是知名住後僧問如何是奪人不奪境師曰霸王到烏江曰如何是奪境不奪人師曰築壇拜將曰如何是人境兩俱奪師曰萬里山河獲太平曰如何是人境俱不奪師曰龍吟霧起虎嘯風生曰向上還有事也無師曰當面蹉過曰真箇作家師曰白日鬼迷人一日入城與道俗行至十郎巷有問曰巷在者裡未審十郎在甚麼處師奮臂曰隨我來成都府正法建禪師上堂兔馬有角牛羊無角絕毫絕釐如山如嶽針鋒上師子翻身藕竅中大鵬展翼等閒突過北俱盧日月星辰一時黑江寧府華藏密印安民禪師嘉定朱氏子初講楞嚴為成都義學所歸時圓悟居昭覺師與奉勝為友因造焉聞悟小參舉國師三喚侍者因緣趙州拈云如人暗中書字字雖不成文彩已彰那裡是文彩已彰處師心疑之告香入室悟問座主講何經師曰楞嚴悟曰楞嚴有七處徵心八還辨見畢竟心在甚麼處師多呈義解悟皆不肯師復請益悟令一切處作文彩已彰會偶僧請益十玄談方舉問君心印作何顏悟厲聲曰文彩已彰師聞而有省悟復示以本色鉗鎚師則罔措一日白悟曰和尚休舉話待某說看悟諾師歷舉楞嚴語以合拈椎竪拂下喝敲牀等用悟笑曰你元來在者裡作活計乃點之曰你豈不見經中道玅性圓明離諸名相師於言下釋然悟出蜀居夾山師侍行悟夜參舉古帆未挂因緣師聞未領遂求決悟曰你問我師舉前話悟曰庭前栢樹子師頓契無疑乃曰古人道如一滴投於巨壑殊不知大海投於一滴悟笑曰奈者漢何未幾令分座後謁佛鑑於蔣山鑑問佛果有不曾亂為人說底句曾與你說麼師曰合取狗口鑑震聲曰不是者箇道理師曰無人奪你鹽茶袋呌作甚麼鑑曰佛果若不為你說我為你說師曰和尚疑時退院別參去鑑呵呵大笑師未幾開法保寧遷華藏旋里領中峰上堂眾賣華兮獨賣松青青顏色不如紅算來終不與時合歸去來兮翠藹中可笑古人恁麼道大似逃峰赴壑避溺投火爭如隨分到尺八五分钁頭邊討一箇半箇雖然如是保寧半箇也不要何故富嫌千口少貧恨一身多冬至上堂舉玉泉皓曰雪雪片片不別下到臘月再從來年正月二月三月四月五月六月七月八月九月十月依前不歇凍殺餓殺免教胡說亂說師曰不是罵人亦非贊嘆高出臨濟德山不似雲居羅漢且道玉泉意作麼生良久曰但得雪消盡自然春到來後示寂本山闍維設利頗賸細民穴地尺許皆得之尤光明瑩潔心舌亦不壞成都府昭覺徹菴道元禪師綿州鄧氏子圓具後東游謁大別道因看廓然無聖語忽失笑曰達磨元來在者裡道譽之往參佛鑑佛眼次依圓悟於金山以所見告悟弗許悟徙雲居師從之雖有信入終以鯁膺物未去為疑會悟問參徒生死到來時如何僧曰香臺子笑和尚次問師汝作麼生師曰艸賊大敗悟曰有人問你時如何師擬答悟憑陵曰艸賊大敗師即徹證悟以拳擊之師撫掌大笑悟曰汝見甚麼便如此師曰毒手未報永劫不忘悟歸昭覺命師首眾悟將順世命以師繼席焉杭州府中天竺堂中仁禪師洛陽人少依東京奉先院出家宣和初賜牒於慶基殿落髮進具後往來三藏譯經所諦窮經論特於宗門未之信時圓悟居天寧走謁之悟方為眾入室師見敬服奮然造前悟曰依經解義三世佛冤離經一字即同魔說速道速道師擬對悟劈口擊之因墜一齒即大悟留天寧由是師資契合請問無間後開法大覺遷中天竺次徙靈峰上堂九十春光已過半釀華天氣正融和海棠枝上鶯聲好道與時流見得麼然雖如是且透聲透色一句作麼生道金勒馬嘶芳草地玉樓人醉杏華天上堂舉狗子無佛性話乃曰二八佳人刺繡遲紫荊花下囀黃鸝可憐無限傷春意盡在停針不語時淳熈甲午四月八日孝宗詔入內賜座說法帝舉不與萬法為侶因緣俾拈提師拈罷頌曰秤鎚搦出油閒言長語休腰纏十萬貫騎鶴上揚州己亥中陞堂告眾而逝眉州彭山象耳山袁覺禪師郡之袁氏子出家傳燈試經得度本名圓覺郡守填祠牒誤作袁字疑師慊然戲謂之曰一字名可乎師笑曰一字已多郡守異之既受具出蜀徧謁有道尊宿後依大溈佛性入室陳所見性曰汝忒煞遠在然知其為法器俾充侍者掌賓客師每侍性性必舉法華開示悟入四字令下語又曰直待我竪點頭時汝方是也偶不職被斥制中無依寓俗士家一日誦法華至亦復不知何者是火何者為舍乃豁然制罷歸省性見首肯之圓悟再住雲居師詣以所得白悟悟呵曰本是淨地屙屎作麼師所疑頓釋紹興丁巳眉之象耳虗席眾舉師應聘師常語客曰東坡曰我持此石歸袖中有東海山谷曰惠崇煙雨蘆鴈坐我瀟湘洞庭欲喚扁舟歸去傍人謂是丹青此禪髓也又曰我敲牀竪拂時釋迦老子孔夫子都齊立在下風有舉此語似佛海遠者遠曰此覺老語也我此間即不恁麼眉州青神中巖華嚴祖覺禪師嘉州楊氏子幼聰慧書史過目成誦著書排釋氏惡境忽現因悔過出家依慧目能未幾疽發膝上五年醫莫愈因書華嚴合論畢夜感異夢旦即捨杖步趨一日誦至現相品曰佛身無有生而能示出生法性如虗空諸佛於中住無住亦無去處處皆見佛遂悟華嚴宗旨洎登僧籍府帥請講於千部堂詞辨宏放眾所歎服適南堂靜過門謂師曰觀公講說獨步西南惜未解離文字相耳儻問道方外何讓于周金剛乎師欣然罷講南游依圓悟於鍾阜一日入室悟舉羅山道言有時踞虎頭收虎尾第一句下明宗旨無言時覿露機鋒如同電拂作麼生會師莫能對參究之久忽有省作偈呈悟曰家住孤峰頂長年半掩門自嗟身已老活計付兒孫悟見許可次日入室悟又問昨日公案作麼生師擬對悟便喝曰佛法不是者箇道理師復留五年愈更迷悶後於廬山棲賢閱浮山遠削執論乃大悟作偈寄悟曰出林依舊入蓬蒿天網恢恢不可逃誰信業緣無避處歸來不怕語聲高悟大喜持以示眾曰覺華嚴徹矣住後僧問最初威音王末後婁至佛未審參見甚麼人師曰家住大梁城更問長安路曰只如德山擔疏鈔行脚意在甚麼處師曰拶破你眼睛曰與和尚悟華嚴宗旨相去幾何師曰同途不同轍曰昔日德山今朝和尚也師曰夕陽西去水東流上堂舉石霜遷化眾請首座繼踵住持䖍侍者所問公案乃曰宗師行處如火消氷透過是非關全機亡得喪盡道首座滯在一色侍者知見超師可謂體玅失宗全迷向背殊不知首座如鷺鷥立雪品類不齊侍者似鳳翥丹霄不縈金網一人高高山頂立一人深深海底行各自隨方而來同會九重城裡而今要識此二人麼竪起拂子曰龍臥碧潭風凜凜垂下拂子曰鶴歸霄漢背摩天僧問如何是一喝如金剛王寶劍師曰血濺梵天曰如何是一喝如踞地師子師曰驚殺野狐狸曰如何是一喝如探竿影草師曰騐得你骨出曰如何是一喝不作一喝用師曰直須識取把針人莫道鴛鴦好毛羽長沙府福嚴文演禪師成都楊氏子僧問如何是定林正主師曰坐斷天下人舌頭曰未審如何親近師曰覰著則瞎上堂當陽坐斷凡聖跡絕隨手放開天回地轉直得日月交互虎嘯龍吟頭頭物物耳聞目眎安立諦上是甚麼還委悉麼阿斯吒咄蘇州府西山明因曇玩禪師溫州黃氏子徧參罷宣和庚子回抵鍾阜適朝廷改僧為德士師與同志數人入頭陀巖食松自處久之圓悟被旨居是山親至巖所令去鬚髮及悟詔補京師天寧師與俱往命掌香水海未幾因舉枹擊鼓頓明大法凡有所問皆對曰莫理會住後上堂汝有一對眼我也有一對眼汝若瞞還自瞞汝若成佛作祖老僧無汝底分汝若做驢做馬老僧救汝不得眾檀越入山請上堂說偈曰我無長處名虗出謝汝殷勤特地來明因無法堪分付謾把山門為汝開蘇州府虎丘雪庭元淨禪師雙溪人上堂知有底人過萬年如一日不知有者過一日如萬年不見死心道山僧行脚三十餘年以九十日為一夏增一日也不得咸一日也不得取不得捨不得不可得中祇麼得翠雲見處又且不然山僧行脚三十來年誰管他一日九十日也無得也無不得處處當來見彌勒且道彌勒在甚麼處金風吹渭水落葉滿長安上堂說得須是見得見得須又說得見得說不得落在陰界見解偏枯說得見不得落在時機墮在毒海若是翠雲門下直饒說得見得好與三十棒說不得見不得也好與三十棒翠雲恁麼道也好與三十棒遂高聲召大眾曰嶮上堂日日日東出日日日西沒是時人知有自古自今如麻似粟忽然捩轉話頭亦不從東出亦不從西沒且道從甚處出沒若是透關底人聞恁麼道定知五里牌在郭門外若是透不過者往往道半山熱瞞人僧問如何是到家一句師曰坐觀成敗問不與萬法為侶者是甚麼人師曰遠親不如近鄰曰待汝一口吸盡西江水即向汝道又作麼生師曰近鄰不如遠親問亡僧遷化向甚麼處去師曰糞堆頭曰意旨如何師曰築著磕著衢州府天寧訥堂梵思禪師蘇臺朱氏子上堂趯翻生死海踏倒涅槃岸世上無活人黃泉無死漢遂拈拄杖曰訥堂今日拄杖子有分付處也還有承當得者麼試出來擔荷看有麼有麼良久擲拄杖下座上堂知有底也喫粥喫飯不知有底也喫粥喫飯如何直下驗得他有之與無是之與非邪之與正若騐不出參學事大遠在喝一喝下座上堂山僧是楊岐五世孫者老漢有箇三脚驢子弄蹄行公案雖人人舉得祇是不知落處山僧不惜眉毛為諸人下箇注脚乃曰八角磨盤空裡走杭州府靈隱瞎堂慧遠佛海禪師眉山彭氏子年十三從藥師院為僧依靈巖徽微有省會圓悟復領昭覺師即之悟普說舉龐公問馬祖不與萬法為侶因緣師忽領悟仆於眾眾掖之師曰吾夢覺矣至夜小參師出問淨躶躶空無一物赤骨力貧無一錢戶破家亡乞師賑濟悟曰七珍八寶一時拏師曰禍不入慎家之門悟曰機不離位墮在毒海師隨聲便喝悟以拄杖擊禪牀曰喫得棒也未師又喝悟連喝兩喝師便禮拜自此機鋒峻發無所牴牾悟寂師東下由虎丘奉詔住臯亭崇先復被旨補靈隱孝宗召對賜佛海禪師上堂新歲有來由烹茶上酒樓一雙為兩脚半箇有三頭突出神難辨相逢鬼見愁倒吹無孔笛促拍舞涼州咄上堂好是仲春漸煖那堪寒食清明萬疊雲山聳翠一天風月良鄰在處華紅柳綠湖天浪穩風平山禽枝上語諄諄再三瑣瑣碎碎囑付叮叮嚀嚀你且道他叮嚀囑付箇甚麼卓拄杖曰記取明年今日依舊寒食清明上堂舉僧問睦州以一重去一重即不問不以一重去一重時如何州曰昨日栽茄子今日種冬瓜師曰問者善問不解答答者善答不解問山僧今日向饑鷹爪下奪肉猛虎口裡橫身為你諸人說箇樣子登壇道士羽衣輕呪力雖窮法轉新拇指破開天地闇蛇頭攧落鬼神驚僧問十二時中教學人如何用心師曰蘸雪喫冬瓜問浩浩塵中如何辨主師曰木杓頭邊鐮切菜曰莫便是和尚為人處也無師曰研椎撩䬪飥問即心即佛時如何師曰頂分丫角曰非心非佛時如何師曰耳墜金鐶曰不是心不是佛不是物又作麼生師曰禿頂修羅舞柘枝問東山水上行意旨如何師曰初三十一不用擇日問文殊是七佛之師為甚麼出女子定不得師曰擔頭不挂針問菴內人為甚麼不知菴外事師曰拄杖橫挑鐵蒺藜問不與萬法為侶者是甚麼人師曰脚踏轆轤一日鳴鼓陞堂師潛坐帳中侍僧尋之師忽撥開帳曰祇在者裡因甚麼不見僧無對師曰大斧斫三門問僧一大藏教是惡口如何是本身盧舍那僧曰天台普請南嶽游山師別曰阿耨達池深四十丈濶四十丈淳熈乙未秋示眾曰淳熙二年閏季秋九月旦閙處莫出頭冷地著眼看明暗不相干彼此分一半一種作貴人教誰賣柴炭向你道不可毀不可讚體若虗空沒涯岸相喚相呼歸去來上元定是正月半都下喧傳而疑之明年忽感微疾果以上元揮偈安坐而化偈曰拗折秤鎚掀翻露布突出機先鵶飛不度留七日顏色不異塔全身於寺之烏峰壽七十四坐五十九夏
