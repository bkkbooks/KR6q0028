body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第三十五世磬山天隱修禪師法嗣鎮江府竹林林臯本豫禪師崑山陳氏子丱歲禮堯峰湛川老宿出家受具後徧歷諸方參博山山曰未入金籠貯誰家野兒師曰鶴有九皐翀碧漢馬無千里謾追風山曰運斤非郢未免傷痕師曰諸方拈椎竪拂又成甚麼邊事山曰片雲橫海嶽樵子盡迷歸師曰怪來巖下虎特地暗驚人便出師至金粟值天晚便問夜宿投人時如何粟曰者裡歇不得師曰豈無方便粟拈拄杖擬打師接住一推曰看破了也便出後參磬山山曰那裡來師曰武林山曰怎知我者裡師曰臭名難瞞山曰汙汝耳師便喝山曰喝後如何師曰猶是不知山曰老僧不知汝知箇甚麼師擬掌山曰莫掠虗一日侍次山曰今時學人不肯真參實悟所以法門寥落師曰雖然如是亦在知識如黃龍不得慈明痛打爭知道出常情山厲聲曰豈口耳所傳受耶師自此服膺親炙三載住後上堂僧問和尚未見磬山時如何師曰盂口向天曰見後如何師曰拄杖頭卓地曰見與未見又如何師曰細腰鼓子兩頭打曰和尚今日住淨雲如何酬答師曰別置一問來乃曰一大藏教是用不盡底故紙千七百則祖意總是引蔓牽枝伶俐漢不向者裡著脚直得清風帀帀膏雨濛濛吹太虗為一漚揑沙界為隻眼諸人在裡許作甚麼喝一喝曰空生不解巖中坐惹得天花動地來上堂熊耳峰前常面壁無位真人乾矢橛德山臨濟太無端棒頭有眼明如日驀拈拄杖曰看看臨濟德山來也卓拄杖曰臨濟德山被淨雲拄杖一卓直得懡㦬而退達磨大師在背後欵欵道官不容針私通車馬時如何復卓拄杖下座上堂柳眼舒桃臉笑春風吹落花多少若是知音便轉身雲門扇子忽𨁝跳驚起枝頭百舌鳥聲聲報道不如歸去好擲拄杖元宵上堂卓拄杖曰過去燈明佛本光瑞如是又卓一下曰未來燈明佛本光瑞如是復卓一下曰現在燈明佛本光瑞如是良久顧左右曰癡人面前不得說夢便下座上堂一人向千峰頂上築著磕著無處躲避一人在十字街頭橫眠倒臥無出身路識得二人落處便知龐公問馬祖曰不與萬法為侶者是甚麼人祖曰待汝一口吸盡西江水即向汝道公乃契入也是惡水驀頭澆者裡說甚菩提涅槃真如解脫二十五有一十八界淨盡滌除會則金毛師子變作狗不會踢出楊岐三脚驢參上堂若見諸相非相即見如來竪起拂子曰者是諸相如何是非相復竪起拳曰者是非相如何是如來拍禪牀曰相識滿天下知心能幾人上堂三界無安猶如火宅眾苦充滿甚可怖畏歸宗斬却活蛇丹霞燒却木佛普化踢倒飯牀安國擊破竈墮且道怖畏也無黃鸝上樹一枝花白鷺下田千點雪擊拂子下座上堂僧問多子塔前共談何事師曰六耳不同謀乃曰石虎山巔吼泥牛海底行不知何所以拄杖得人爭卓拄杖曰能縱能奪能殺能活連卓拄杖下座上堂舉乾峰道舉一不得舉二放過一著落在第二雲門出眾曰昨日有人從天台來却往徑山去峰召維那曰來日不得普請乾峰曲高和寡若不得雲門幾成狼藉雖然祇如乾峰道來日不得普請意落在甚處會麼夜坐連雲石春栽帶雨松上堂熏風吹暑氣蒸囊高挂碧崚嶒三世諸佛摸索不著歷代祖師失却眼睛無位真人忍俊不禁撫掌大笑且道笑箇甚麼良久曰破木杓上堂拈拄杖曰摩竭國中親行此令多年滯貨誰酬價熊耳峰前單提向上大似賣狗懸羊頭又何曾舉著者一著子若是特達英靈不妨入滄溟窟攀折驪龍角登巨峰頂捋斷猛虎鬚還有麼有即出來喫山僧痛棒何也大鵬展翅非凡鳥九萬搏風擘海濤上堂第一句道得合醬添油第二句道得和鹽賣醋第三句道得蒿湯代茶驀竪拂子曰臨濟大師來也遂震聲一喝僧出師便打僧喝師又打僧又喝師連打趂乃呈拄杖曰今日堯峰性命在諸人手裡諸人性命在堯峰手裡連卓拄杖下座問如何是大海無魚師曰脚跟下過多少曰如何是大地無草師曰法堂前深一丈曰如何是大富無糧師曰喫家飯放野屎曰如何是大悟無道師曰莫妄想問明月堂前花開枯木是賓家句主家句師曰石女哭蒼天問如何是秘魔叉師舉數珠曰者是番菩提曰未問已前請師答師和聲便打問亡僧遷化向甚麼處去師曰炎炎三尺火僧曰不會師曰冷冷一堆灰師一日染微恙時山門大興土木徧往觀之旋至法堂鳴鼓集眾敘出世行由即欲趨寂一眾悲戀主事白曰山主他往未歸願和尚稍遲一日師俛首回寢室翌日山主至師復登座陳謝付諸後事畢即於座上說偈而終門弟子營窣堵波於古竹林之後岡杭州府天目玉林通琇禪師生而穎異童子時出語不凡年十九投磬山芟染受具執事巾缾夜則隨眾坐香一夕未開靜即進方丈山曰今晚香完何早師曰自是我不去坐香也山曰見甚道理不去坐師曰即今亦無不坐山驀拈几上石屋語錄問曰者是甚麼師曰却請和尚道山曰你不道教老僧道師曰情知和尚不敢道山曰石屋錄為甚不敢道師曰隨他去也山曰贓誣老僧師者裡透不過直得大淚如雨一晚目不交睫至五鼓山呼曰不用急我為你舉則古話龐居士初見馬祖便問不與萬法為侶者是誰祖曰待汝一口吸盡西江水即為汝道師曰某有一頌山曰汝頌云何師呈頌曰不侶萬法的為誰誰亦不立始親渠有意馳求轉暌隔無心識得不相違山曰不問你不侶萬法要你會一口吸盡師於言下大徹拂袖便出山後凡有徵詰師皆當機不讓山深肯有再來之稱山遷報恩未幾即趨寂師遂繼席焉上堂拈拄杖曰先師和尚今日在山僧拄杖頭上示現全身舉揚大法還有共見共聞底出來互相激揚僧出師便打又僧問臨濟照用師卓拄杖曰喚作拄杖子又是先和尚喚作先和尚又是拄杖子汝作麼生分析僧喝師便打僧又喝師直打出法堂問如何是奪人不奪境師曰洪武門前紅檔中如何是奪境不奪人師曰踢破鴻門樊噲怒如何是人境兩俱奪師曰推倒須彌山揑殺恒沙佛如何是人境俱不奪師曰一花一國土一葉一釋迦僧曰四句已蒙指末後事如何師便喝問如何是有拄杖子與拄杖子師曰別人爭不得如何是無拄杖子奪拄杖子師曰你儂怪不得乃植杖顧眾曰有人代得一轉語麼眾無語師擲杖曰報恩今日失利便下座上堂舉僧問雲門大師如何是諸佛出身處門曰東山水上行又有問龍池幻師翁如何是諸佛出身處翁曰西河火裡坐報恩則不然今日若有問如何是諸佛出身處但向道我是蓉城楊四郎上堂報恩新長老今年纔廿四黃面老瞿曇是吾最小子古往今來多少居曲彔牀的大善知識凡於四月八日播弄瞿曇小老的矢臭氣有分還曾夢見瞿曇的師麼向者裡緇素得不虗親到報恩若緇素不得直饒親到報恩未免對面白雲萬里驀喝一喝下座上堂師拈拄杖曰奇特因緣須奇特人拈出驚群句子於驚群處舉揚今日既遇奇特人且道驚群句作麼生舉驀召眾曰吳中石佛大上堂舉高峰大師上堂曰喫粥了也洗盂去矢上加尖一場敗露西峰今日忍俊不禁却要向鷺鷥腿上割股良久曰便恁麼去咄哉箇老漢一生盲修瞎鍊師資未盡其妙大法終未明在召眾曰要會洗盂話麼腦後見𦞙莫與往來上堂維那白椎竟師驀喝一喝下座上堂拈拄杖曰先聖道有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪高聲召眾曰是甚麼所在驀擲拄杖下座上堂僧問世尊覩明星悟箇甚麼師曰狗齩枯骨乃高聲召眾曰能仁是汝之奴大雪設禹門幻老和尚供師翁面目雪滿千山先師儀表春回大地春回大地也雪滿千山非當年久侍者不知雪滿千山也春回大地三十年後有人共見今日某孫應時獻一杯茗罪過彌天何故不合當面觸犯示眾舉翠巖真禪師上堂曰臨陣抗敵不懼生死者將軍之勇也入山不懼虎兕者獵人之勇也入水不懼蛟龍者漁人之勇也作麼生是衲子之勇拈拄杖曰者箇是拄杖子拈得把得動得三千大千世界一時搖動若拈不得把不得動不得文殊自文殊解脫自解脫參翠巖老人恁麼舉揚雖然竭力提撕未免傷神費氣報恩則不然坐致太平者仁王之大勇也道高虎伏德重龍馴者至人之大勇也袖手凭几曰衲僧之大勇又作麼生竹戶松龕濃睡穩花開花落聽東風示眾驀踢出一鞵曰諸人向者裡道一句看一僧曰某甲雖與人合席不與人同被師便喝良久顧左右曰只者一句人也難道便拽杖歸方丈示眾透脫末後牢關雲菴正罵洞達歷祖綱宗妙喜猶呵汝等諸人趣向者箇法門大須仔細前溪水急魚行澀後嶺風高鳥宿難示眾有一無手阿師握天目山來報恩禪堂把高峰中峰斷崖三大老靈骨揑得粉碎撒滿在諸人眉毛鼻孔上汝等諸人為甚晚晚坐香盡皆開眼瞌睡不瞌睡底道將一句來示眾舉德山因一僧相看乃近前作相撲勢山曰與麼無禮合喫山僧手中棒僧拂袖便行山曰直饒如是也只得一半僧轉身便喝山打曰須是我打你始得僧曰諸方有明眼人在山曰天然有眼僧劈開眼曰猫便出山曰黃河三千年一度清人聞德山入門便棒將謂舉鼎拔山氣吞寰宇誰知揖讓升降折旋中禮有如此夫僉云待其作相撲勢時便與劈脊棒出令其別轉機謀是則固是若只與麼安得不今暴虎憑河者狐假熊威語云臨事而懼好謀而威德山之謂與晚參老窓敗屋紙帳青燈此中有人得些子意味否夜來風色峭釀雪已三分禮塔歸晚參若人識得心大地無寸土天目代出明心見性祖師因甚却有許多奇松怪石眾良久師以禪版拍案曰人歸大國方知貴水到瀟湘一樣清晚參山僧說得一篇佛法懸在雨華橋上大眾各去看取良久曰伯樂曾三顧千金誰解增贈君君不納完璧倚枯藤早參拈拂子曰擁門黃葉深三尺氷齒寒泉懸萬尋禁得苦寒忘閴寂梅開不待嶺頭春隨聲擊拂子喝一喝婆子燒菴頌谿頭逐日飯王孫臨岐咄咄好生驚白眼阿婆能將將夾路桃花風雨聲師於世祖章皇帝時兩召內廷問道錫大覺普濟禪師封號紫衣金印而玉林則叢林中法號也開堂說法四十年乙卯秋遊五臺途次示疾說偈而終春秋六十有二僧臘四十有三門人迎歸全身塔於潛陽天目山之東塢與高峰中峰兩祖塔相望焉杭州府南㵎理宗箬菴問禪師生緣吳江世居荊溪父羨長俞處士晚憂無子建百日無遮大會應禱而生少游藝林究心理學偶過山寺閱楞嚴經至此身及心外洎虗空山河大地咸是妙明真性中物有所觸發走謁磬山示以父母未生前話後因婚事苦逼遂宵遁至武林投法雨大師落䰂旋歸磬山晨參暮扣一夕聞大風迸崖而悟有偈曰千玄萬妙隔重重箇裡無私總不容一種沒絃琴上曲寒巖吹落五更風山曰玄妙即不問如何是不隔底句師擬對山便打又服勤數載洞徹大法山證以偈有他年起我臨濟宗殺活縱橫開天目之句後因受業順世武林紳衿請回南㵎為開法第一世焉司理黃元公問和尚幾時到者裡師曰臘月二十曰曾在那裡會過師曰忘却了那曰在磬山在報恩師曰當面錯過茶次公問如何是下載清風師曰知音者少曰非師不委師曰且請茶曰作家師曰逢人切忌錯舉徑山雪嶠大師至見曰你是那邊為甚又在者邊師曰一點水墨兩成龍雪曰未會興雲布霧在師曰今日且放過雪曰我只教人誦金剛經師曰多少人錯會大師意雪曰直饒不錯會大遠在師曰莫瞞人好至山門前見狗子吠雪曰者無佛性東西師曰却搔著大師癢處雪乃呵呵大笑師亦大笑而別僧問如何是奪人不奪境師曰藏盡楚天月猶存漢地星如何是奪境不奪人師曰花落亂流稀村翁坐遲暮如何是人境兩俱奪師曰干戈既息狼煙掃誰唱江南折柳詞如何是人境俱不奪師曰拍手向君開笑臉大家齊上木蘭舟問一貧赤骨時如何師曰有件破衲頭要便與你僧擬議師曰穿不著問大悲千手眼那隻是正眼師曰急水灘頭下釣絲問如何是西來意師曰破木杓僧問一口氣不來向甚處安身立命師曰鑊湯爐炭僧罔措師曰你害怕又僧問若人欲識佛境界當淨其意如虗空如何是佛境界師曰爐炭鑊湯僧低頭師曰你却害羞問興化打克賓意旨如何師曰金將火試曰既罰錢因甚又趂出師曰龍門無宿客結夏上堂盡十方世界是衲僧行履處盡十方世界是衲僧安身處檢點將來隔三千里萬機寢削一句孤危峻峭峭絕承當淨躶躶沒可把於諸人分上猶間一線道須是箇中人方明箇中事驀拈拄杖曰看看釋迦老子在山僧拄杖頭上現大威光道天上天下惟我獨尊復有雲門大師忍俊不禁直下打殺與狗子喫貴圖天下太平以拄杖畫一畫曰總被山僧一線穿却不容絲毫走作若有人知得落處朝打三千暮打八百若也不知釋迦老子向諸人脚跟下過去了也喝一喝卓拄杖上堂舉臨濟大師曰我有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪和泥合水屈曲垂慈立境立人有奪有縱臨濟大師嚼飯餵嬰兒即得若道激揚向上宗乘直是未在時有僧問為甚臨濟大師道奪人不奪境師曰不斬蕭何令不行為甚奪境不奪人師曰築壇拜相為甚人境兩俱奪師曰王令森嚴諸侯避道為甚人境俱不奪師曰四海五湖逢化日何人不唱凱歌回僧曰既然如是和尚適來恁麼拈提莫不辜負臨濟大師麼師曰却是你辜負僧擬議師便打復召眾曰還有救得者僧者麼眾無語師擲拄杖下座祈雨上堂師拈拄杖曰萬里無片雲青天也須喫棒以杖指曰那邊雲生也驀擲下曰一雨普滋上堂僧問昔年此日去今已屆周期未審先竹林即今向甚處出沒師曰在鼻孔裡曰八面玲瓏底因甚借他鼻孔出氣師曰你作他兒孫未得在曰今日營齋還來受供也無師曰待你道得即來乃曰我與竹林同條生不與竹林同條死同條生易不同條死難不同條死易同條死難同條死千人萬人一時活却不同條死千人萬人一時死却死却活底活却死底時如何落花臺上重鋪錦瑪瑙堦前布赤砂喝一喝上堂咬破鐵餕餡百味具足跳得金剛圈吞得栗棘蓬方能事事無礙氷稜上行劍刃上走也祇是衲僧尋常游戲設若己眼未開大法未明底竪拂子曰只者箇尚奈何他不得青黃不辨菽麥不分魔說瞎說盈衢載道你還知祖師門下底劍麼擲拂子曰誰敢正眼覰著金山入院上堂指法座曰須彌寶座高廣無量無邊由旬拄杖子亦高廣無量無邊由旬且道向甚麼處著足一聲霹𮦷風雲起便陞拈香白椎竟師曰一椎擊碎是第二義未舉一椎是第三義若是第一義佛祖難窺人天罔測具眼衲僧出眾相見僧問昔日善財參德雲七日不見意旨如何師曰坐斷天下人舌頭曰七日後從別峰相見又作麼生師曰金不博金曰恁麼則昔日德雲今朝和尚師曰掣開金殿鎖撞動玉樓鐘曰即今建立法幢又將何法接人師曰劄問闡揚古佛家風決斷現成公案如何是古佛家風師曰郭璞墓前江水黑曰龍吟霧起虎嘯風生去也師曰看脚下曰忽遇傾湫倒嶽時如何師曰放汝三十棒乃曰神龍窟宅古佛名藍我二十世圓悟禪師重開正覺之場十八高人打失鼻孔眼睛一回徹證之地洵江南之巨剎誠衲子之寶坊不勞彈指樓閣門開無所希求風雲際合據此位者顯示不言正令導此機者激揚向上宗乘明如杲日皎若太虗一語歸宗千差坐斷迴千百年既倒之瀾挽今時世已隳之轍直得臨濟有喝倒退三千德山有棒未敢動著抹過建化門裂破囫圇句風高浪涌水沸波騰正當恁麼時且妙高已到寶所親登剎影高揚誰遭毒手劈開華嶽連天色放出鯨濤動地雷卓拄杖下座謙侍者供法衣上堂披如來衣坐如來座行如來事三脚蝦蟆著錦襠風吹不動堦前樹馬祖扭鼻野鴨子沒處去百丈捲席大用現前不存規矩堪竺南陽老國師負汝負吾成指注點即不到到即不點三十年後莫道金山者為有屈無呌處上堂靈雲見桃華香嚴聞擊竹推落萬仞坑向那裡撈摸從緣入者永無退失聽事不真喚鐘作甕玄沙道諦當甚諦當敢保未徹在醉我落花天借他絃管裡檢點將來者一隊漢總出金山圈繢不得若出得未具參方眼在拍禪牀下座謝兩序上堂著草鞋住院負栲栳為人動若行雲止若谷神初無心於彼此豈有意於去來所以綱宗在握賞罰惟公正令當行進退有序其進也高山可仰其退也湛水長閒若有一絲毫情存繫戀便屬泥犁渣滓金剛圈栗棘蓬吞得跳得須是其人且開先啟後果滿功圓一句作麼生道橫擔楖栗千峰上已有人提折脚鐺住磬山上堂四十九年全成露布末後一句曳尾靈龜西天四七東土二三總是接響承虗據實而論諸佛諸祖無出頭分自古至今無語話分翻轉劫初田地撥開向上宗猷突出頂𩕳一機顯示金剛正眼臨濟三玄三要不消一劄洞山五位君臣不直一唾迴真風於既墜續慧命於將殘還他實地行來自然有本可據拈起也剷斷天下人命根放下也棙轉衲僧鼻孔饒伊牙如劍樹口似血盆底到來也須讓他一頭地何故綱宗在握寶劍橫揮正印全提十方坐斷莫有同明大機同徹大用為先師吐氣者麼驀擲拄杖曰三十年後上堂僧問曉樹穿雲碧寒泉弄月明此是尋常境如何是磬山境師曰切忌道著曰耳傾四大海眼著五須彌此是等閒人如何是磬山人師曰高著眼曰當臺一鑑明如日鐵額銅頭也皺眉師便喝乃曰雨洗巖花白煙籠嶽色寒乍歸雲滿室莫作等閒看人與境會理得事彰明明一段風光灼灼不從他得既不從他得有眼共見有耳共聞若道聞底便是孤負你生來眼若道見底便是孤負你生來耳既不孤負雲門放洞山三頓棒合作麼生商量莫把是非來入耳從前知己反為讐拽拄杖下座到龍池上堂昔年未見師翁面問上座却被師翁絆入葛藤窠裡沒頭沒腦及乎親見師翁後師翁却被問上座絆入葛藤窠裡沒頭沒腦者段公案正要向明眼人前判斷今日既到師翁法窟承堂頭和尚為眾推出登師翁堂踞師翁座問上座豈敢掩耳偷鈴請諸仁者為問上座判斷看若判斷得諸仁者合喫問上座三十棒若判斷不得問上座合喫我堂頭和尚三十棒者兩頓棒有一頓棒堪與佛祖為師有一頓棒堪與人天為師若也不甘自救不了卓拄杖下座上堂有漏無漏笊篱木杓小乘大乘錢貫井索一不成單二不成兩明眼衲僧作何伎倆磬山門下論實不論虗爭不足讓有餘踢出楊岐三脚驢小參一僧自呈會得臺山婆子驀直話師曰你作麼生會僧轉身便行師曰祇如道好箇師僧又恁麼去聻僧曰豈有第二箇師曰趙州勘破聻僧無語師呵呵大笑召僧近前曰我會臺山婆子驀直話與你逈別你轉身便行我只坐了要與婆子相見婆子道好箇師僧又恁麼去趙州道勘破總出我者裡不得你還會麼僧復無語師又大笑曰我一發再與你說破你便是者僧我便是婆子拈起竹篦曰者箇便是趙州你作麼生會我不妨再與你說你轉身便行豈不與者僧一般我不肯你豈不是婆子道好箇師僧又恁麼去一般只是趙州勘破竹篦子却不肯與你說一僧曰料和尚說不出師擲下竹篦時珍侍者在傍有省呈頌師曰頌且置那裡是趙州勘破處珍曰者老賊師便打珍作禮曰勘破了也師復大笑歸方丈小參舉昔有一院主忽見鬼使來追主曰某身為主事未暇修行乞容七日得否使云待回白王若允七日後來不允須臾立至果七日後覓其僧了不可得者僧逴得箇隱身符子如羚羊挂角杳無蹤跡可尋何異高峰大師道大海無魚大地無草大富無糧大悟無道到者田地也不易搆得若到磬山門下正好買草鞋行脚何故諸人要在山僧者裡作主事須是將閻羅老子捺在掌心鬼使縛在脚尖上要你上天便上天要你入地便入地任他追逐過百千萬億不可說不可說恒河沙國土經歷百千萬億不可說不可說無量阿僧祇劫登劍樹刀山入鑊湯爐炭永不退失方許入磬山室與古人吐口毒氣眾中莫有恁麼人麼若有臨濟一燈未致寂寥在洸院主問如何是大海無魚師曰負命者上鈎來恁麼則擎頭戴角去也師曰與你三十棒如何是大地無草師曰前不搆村後不迭店洸曰含元殿裡說甚長安師曰爭奈罕遇其人如何是大富無糧師曰少甚麼洸曰恁麼則不勞拈出師曰刺破汝眼如何是大悟無道師曰迅雷不及掩耳洸禮拜師曰腦後見腮莫與往來師一日閱雪竇錄至竇與數僧遊山次見牯牛舉頭竇問牯牛舉頭作甚麼令眾下語院主曰侍者將束草來師不肯眾問師師曰是伊喫飽首座曰行昱亦有一語師曰你作麼生座曰他却識人師為撫掌順治乙未秋師謝絕雲水一棹夷猶至九月廿三日上報恩掃塔預別玉林和尚交磬山院事廿七日舟次南潯辭謝諸檀護暮宿應天寺寺即范蠡宅命侍者灑掃一室沐浴淨䰂更衣趺坐怡然而逝門弟子扶龕歸㵎茶毗入塔遵遺命也有五會語錄十二卷續燈二十卷並行於世衡州府南嶽山茨通際禪師初參天童於金粟問客散堂空時如何童曰是甚麼時節師便喝童便打師又喝童又打師禮拜曰今日起動和尚後參磬山一見契合一日侍次山問只如百丈於馬祖喝下得箇甚麼師曰若有得即鈍罵馬祖山曰他道三日耳聾聻師曰某不可更作野狐見解山休去又一日山舉巖頭四藏鋒句問如何是就理藏鋒師曰梁皇殿上道不識如何是就事藏鋒師曰今朝雨落堦前溼如何是理事俱藏鋒師曰行不出戶坐不當堂如何是俱不涉理事藏鋒師曰八角磨盤空裡走山曰此四轉語可紹先覺雖然也是搕七搭八住東明掃旵祖塔拈香曰者老漢二百年來在此藏身人天罔知佛祖難近今日脚下兒孫到來親遭勘破且道以何為驗顧左右插香示眾古人道恁麼也不得不恁麼也不得恁麼不恁麼總不得諸兄弟畢竟作麼生即得良久曰簷前滴瀝非關雨溪㵎奔雷不是聲示眾舉僧問雲門和尚如何是雲門一曲門曰臘月二十五臘月二十五今日為君舉著意會應難藍田射石虎示眾本是無羈身偶向煙霞宿暑寒已七過刀耕種深谷帶水復拖泥衲破通身目無法向人前一任東西卜元同嶺上雲無心去來逐大眾既無心去來且出門一句作麼生道曳拄杖曰不涉程途句灼然草鞋步步踏苔綠住長沙南源示眾舉楊岐會禪師曰薄福住楊岐年來氣力衰寒周凋敗葉猶喜故人歸囉囉哩拈上死柴頭且向無煙火門庭冷峻語脉藏鋒此我遠祖楊岐和尚荷擔法道綱維叢社之典型山僧忝為後裔亦有一頌薄福住南源霜風茅屋寒擁衲爐頭坐灰形似懶殘赤骨𩪸不用瞞煩汝諸人掃黃葉千峰月上煑氷團示眾舉一不得舉二白雲萬里放過一著落在第二白雲萬里昨日有人從天台來今朝却往徑山去白雲萬里維那明日不得普請白雲萬里有人向四箇白雲萬里處薦得管取一生參學事畢示眾舉趙州勘臺山婆子因緣高峰曰檢點將來正是婆子勘破趙州畢竟以何為驗以手指曰驀直去高峰老人恁麼批判未免見處偏枯山僧則不然婆子趙州只具一隻眼師同爾瞻圍爐次舉僧問夾山撥塵見佛時如何山曰直須揮劍若不揮劍漁父棲巢汝作麼生會瞻曰太費力生師曰是夾山費力者僧費力瞻曰任師分別師曰情知汝會者話不得瞻起身便行玄慈省覲至門首敲門師曰誰慈曰問路底師開門曰錯走了也慈進前擬掌師曰噁師問且菴先聖教人參活句莫參死句如何是活句菴舉茶壺曰不可喚作茶壺師曰猶是死句在菴擲茶壺便出師舉女子出定頌曰積翠煙濃撥不開三三兩兩畵樓臺不知已洩春多少猶向杜䳌啼處猜文殊三處度夏頌一箇文殊尚不容那堪千萬面相同當時擲下金鎚看縱使瞿曇也不中殃崛救產難頌故園花不開躊躇凭闌立多少守花人言藉春風力師開法杭之東明因事即棄去緇素遮留不住竟登匡廬歷衡嶽遂結茆繼隱綠蘿有年後避亂長沙南源未幾遷化楚中法道湮沒數百賴師重振焉陽山松際通授禪師久依磬山一日聞畵眉鳥聲有省即見山山竪拳曰道道師曰版鳴也請和尚赴堂山頷之後結茆陽山僧問南山白額虎驀面相逢時如何師曰作馬騎曰倘不馴時如何師便打僧禮拜師曰馴也問如何是末後句師曰且待來年未幾疾作忽自起沐浴更衣趺坐書偈曰昔年五十知非予年五十知止莫云日出事生須信分明直指遂擲筆而逝普明玅用禪師法嗣建寧府紫雲峯衡石悟鈞禪師錢塘潘氏子幼而頴悟慧性不凡總角時矢志出塵二十受具即徧歷諸方雖有所契終不自諾復謁佛日方深得洞上微旨佛日與鴛湖友善鴛晚年多疾以不得其嗣為己憂佛日效道吾與夾山故事遂指師參鴛湖於普明洞徹圓常一日鴛問化人問幻士谷響答泉聲欲識吾宗旨泥牛水上行意旨如何師曰夢眼見空花鴛曰臨濟有一句子你又作麼生師便喝鴛便打師又喝鴛又打師禮拜鴛曰元來是瞎驢師拂袖便出鴛命掌院事崇禎辛巳開法雲峯上堂僧問昔日無趣老人今朝衡石和尚如何是源遠流長古今不異師曰開池見明月揮麈動清風曰雲峯一滴水大地盡承恩師曰會取未來的乃曰雲生寶樹風敲翠竹勘破鷄鳴徧地塗毒者是無趣老人的落處即今還有知落處的麼有即出來通箇消息良久擊拂子下座順治乙酉間隆武仰師道風詔至內掖詳問法要師以本色奏對隆大悅賜紫並號及追諡鴛湖廣覺大師塔曰玅莊嚴丙戌四月初四日示寂世壽三十四僧臘一十五有演義答響等錄十五卷行世嘉興府金明介菴悟進禪師字覺先姓張本郡人母賀氏夢日輪入懷而誕幼不從兒嬉喜遊寺院見佛像則依依不忍去及冠習舉子業常繙內典志慕禪宗禮龍池微禪師祝髮因病臥聞匠斧斫大木聲有省參鴛湖纔跨門鴛云是甚麼師擬對鴛震威一喝師豁然契悟乃掩耳而出一日鴛欠安師侍次鴛命茶問曰汝字覺先喚甚麼作先師曰喜今日得自在鴛曰如何是覺後師曰請和尚尊重鴛曰汝還分得先後麼師良久鴛便喝師曰只管喫茶鴛曰如何是喫茶的事師曰柿棗腐乾都在者裏鴛曰意作麼生師曰一口吞盡鴛曰是甚麼滋味師曰甜者甜鹹者鹹鴛曰未在更道師禮拜曰謝茶鴛肯而印之崇禎癸未出住徑山遷餘杭廣福武康天池鐘溪太平尋主金明結制上堂問堯天舜日野老謳歌諸護臨筵欣聞法要師曰天長地久曰一句語中含日月片言自此振宗風師曰却被上座道著乃曰今日諸方結制未免攢花簇錦巧玅尖新縵天布網打鳳羅龍底句子賺誤於人徑山別資一路為汝諸人鉗口結舌冷愀愀去寒巖枯木去一念萬年去任他機似鐵牛句如電閃管取崖州萬里上堂今朝又是五月五大鬼拍手小鬼舞驀然撞著桃符神雙手搥胸呌冤苦大慧老人恁麼道恰似官債未了被鈎人一拶神頭鬼面一齊現出太平與你些子禁方卓拄杖曰今朝正值五月五不用雄黃並艾虎理能伏豹澤藏山雲散青天日卓午復卓一卓上堂娑婆世界以音聲為佛事香積世界以香飯為佛事金明者裏以破院為佛事還見麼破禪堂灰頭土面破佛殿馬額驢腮破山門擎拳持杵破佛閣待月眠雲破鐘樓知音者少令一隊破衲僧居此以破破不破破破不破不破不破底運用無窮直教七通八達若是超宗異目向者裏輕輕拶著拍拍相應呼之以牛自能拖犁拽耙喚之以馬便以銜鐵負鞍山僧只得另眼相看將破破底相待眾中有斫不開劈不破底麼出來金明與你破破去也良久以拄杖旋風打散歸方丈上堂問按倚天長劍奮踞地獅威學人上來請師一接師便喝僧曰者是方便門頭句如何是正令全提句師又喝僧擬進語師便打乃舉白雲端曰若端的得一回汗出便向一莖草上現瓊樓玉殿若未端的得一回汗出縱有瓊樓玉殿被一莖草葢却師曰白雲不是好心金明者裏向不與人枷鎖你諸人端的得一回汗出頭頭玉殿處處瓊樓端的一回汗不出頭頭總玉殿處處亦瓊樓還知落處麼甜瓜徹蒂甜苦瓠連根苦示眾東熱閙西熱閙忙忙業識不知老苦他烈𦦨熾炎炎獨我陶朱靜悄悄夏蟲若解識寒氷鐵牛決不被蚊咬忽被咬驚起楊岐三脚驢百億須彌都踏倒僧參師曰你是高峯僧那曰是師曰既是高峯僧因甚在我脚下僧無語師便打出甞垂三問勘騐學者一曰既是天封室理應絕此絕彼為甚有迎有送獅子窟中因甚有狗范蠡越國大夫因甚居吳地康熈癸丑九月二十三日沐浴更衣書偈辭眾而逝世壽六十有二僧臘三十有七茶毗骨白如玉牙齒不壞骨塔於隱川大慈菴齒塔於楚黃石門之黃荊嘉興府永正寺一初悟元禪師姓曹郡之當湖人生而岐嶷端敏喜趺坐十歲乞父教佛經能解玅義十五即參究宗乘二十豁然大悟禮興善弘遠為師參普明執侍久之明一日問我心裏不安你還得太平也未師曰蒼天蒼天又一日入室明竪拳曰道一句看師便掌明大笑師禮拜於是機契返興善掩關十有餘載順治辛卯出住永正上堂花笑春風格外真規頓現漁歌曲水就中消息全彰向上拈提不礙通人唱和隨宜施設何妨達者商量寒時添衲熱則披襟休云覓火和烟得饑來喫飯倦即打眠莫道擔泉帶月歸握一拳大千香水海攝盡無餘舒一掌百億須彌盧拈來有據所以道大人得大機大智得大用設或情塵未脫翳眼猶存示眾以拄杖卓一下云道得也被他穿却鼻孔道不得也被他穿却鼻孔時有僧問道不得穿却鼻孔即且止道得因甚也穿却鼻孔師擲拄杖便歸方丈舉六祖曰我有一物無頭無尾無名無字無背無面諸人還識麼時荷澤會出眾曰是諸法之本源乃神會之佛性頌曰橫將玉笛遡風吹不犯宮商調自奇最惜能邀仙子曲被人喚作鷓鴣辭僧參舉雪峯淘米話未了師劈頭打云殘羹餿飯不勞拈出僧罔措師云學語之流直打出康熈戊午五月十九日柬通諸檀咸集畢師合掌敘別而逝壽六十四臘四十二塔於丈室
