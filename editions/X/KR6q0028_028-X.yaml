body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十七世鄧尉持禪師法嗣杭州府東明虗白慧旵禪師楚王氏子父為丹陽稅課司遂家焉幼穎悟年十四從玅覺湛然受業適作務次然問汝在此作甚麼師曰切蘿蔔然曰汝只會切蘿蔔師曰也會殺人然引頸師曰降將不斬然異之會然遷撫之疎山師聞唯菴唱道松隱將往見至一小菴自誓曰此行若不徹證決不復回一定六日忽舉首睹松豁然有省遂返晝夜危坐端如鐵幢諸方因號旵鐵脊後抵姑蘇鄧尉謁果林林指令參寶藏具迷悟由藏曰佛法如大海轉入轉深那裡泊在者裡一日室中侍立藏問心不是佛智不是道汝云何會師向前問訊叉手而立藏呵曰汝在此許多時猶作者般見解師遂發憤寢食俱廢至第二夜驀然徹證遂述偈曰一拳打破太虗空百億須彌不露踪借問箇中誰是主扶桑涌出一輪紅藏笑曰時節若至其理自彰雖然也須善自護持師受囑辭去於天目之平山堂結侶坐千日長期後遊安溪古道山峰巒秀遂有終焉志一住三十餘載影不出山宿衲爭趨成大精藍宣德乙卯敕額東明禪寺嗣領眾重修淨慈大殿正統辛酉六月廿七忽集眾敘謝訣別眾請偈師曰一大藏教無人看著爭用得者幾句閒言語廿九辰刻跏趺而逝茶毗舍利無算塔於本山東塢壽七十臘五十有五壽昌來禪師法嗣建寧府天界雪骨會中禪師大闡參師問何處來闡曰逼塞虗空都無來去師曰既無來去阿誰拕皮袋到者裡闡曰內外俱空皮袋何有師曰如何是祖師西來意曰西來豈有意邪師曰臘月三十日到來向何處安身立命曰信脚踏翻乾坤獨露師乃示以偈曰的是金毛親出窟法輪掉轉入廛來一聲驀地遙空吼野犴聞之腦裂開道林悟禪師法嗣安慶府桐城投子楚山幻叟荊璧紹琦禪師蜀之安唐雷氏子幼從玄極通受業首參無際一日聞版聲有省復參壞空有賊不打貧家一段語正統癸亥再參無際際問數年以來在甚麼處住師曰廓然無定際曰有何所得師曰本自無失何得之有際曰者是學得來底師曰一法不有學自何來際曰莫落空耶師曰我尚非我誰落誰空際曰畢竟事作麼生師曰水落石出雨霽雲收際曰莫亂道只如佛祖來也不許縱爾橫吞藏海現百千神通到者裡更是不許師曰和尚雖則把住要津其奈勞神不少際拍膝一下師便喝際曰克家須是破家兒恁麼幹蠱也省力師掩耳而出至晚復召師詰曰汝將平昔次第發明處說來看師從實具對際曰還我無字義來師呈偈曰者僧問處偏多事趙老何曾涉所思信口一言都吐露翻成特地使人疑際曰如何是汝不疑處師曰青山綠水燕語鶯啼歷歷分明更疑何事際曰未在更道師曰頭頂虗空脚踏實地際乃記莂焉壬申抵金陵訪月溪海舟出住後僧問如何是天柱境師曰㵎濶雲歸晚山高日出遲曰如何是境中人師曰額下眉遮眼腮邊耳搭肩曰如何是天柱家風師曰雲甑炊松粉氷鐺煑月團問如何是祖師西來意師曰海神撒出夜明珠曰學人不會師曰文殊失却波璃盞問如何是佛師曰生鐵秤鎚曰如何是法師曰石頭土塊曰如何是僧師曰黑漆拄杖景泰乙亥遷投子上堂僧問遠離皖山來據投子海眾臨筵請師祝聖師曰鼎內長生篆峰頭不老松曰祝聖已蒙師的旨投子家風事若何師曰提瓶穿市過不是賣油翁曰只如祖師道不許夜行投明須到還端的也無師曰雖然眼裡有筋爭奈舌頭無骨曰趙州道我早猴白渠更猴黑意作麼生師曰不因弓矢盡未肯竪降旗問和尚今日陞座說法未審有何祥瑞師曰麒麟步驟丹霄外優華開烈焰中曰如何是祖師西來意師曰雪消山頂露風過樹頭搖問寶劍未出匣時如何師曰神號鬼哭曰出匣後如何師曰佛祖吞聲曰出與未出時如何師曰無鬚鎖子兩頭搖僧提起坐具師便喝僧擬議師便打乃曰毒蛇頭上揩癢猛虎口裡橫身也須是恁般人始得適來者僧大似一員戰將敢來者裡奪鼓攙旗惜乎龍頭蛇尾死在棒下若解轉身活路自然不犯鋒鋩所以道弄蛇須是弄蛇手不會弄蛇蛇齩殺復舉法燈開堂日葢為清凉老人有未了公案話畢師曰大凡宗師出世先要拈出己見然後方可定斷古今看他法燈如此作略美則美矣了則未了幻叟今日亦為蠶骨老人有未了公案出來為渠了却若有問蠶骨老人有甚不了公案應聲便喝他若眼目定動連棒打出大眾山僧恁麼提持且道與法燈用處還有優劣也無若緇素得出許他是箇同參上堂拈拄杖曰只者些子誵譌多少師僧到者裡開口不得思量不及舉揚不出即今落在山僧手裡橫也由我竪也由我提起放下卷舒殺活總由我以拄杖空中點一點曰正當恁麼時從上佛祖天下老和尚到者裡只得乞命有分眾中莫有為佛祖出氣者麼良久卓拄杖一下曰𭣟瞎金剛正眼靠倒空王寶座汝等諸人討甚麼盌便下座上堂眾集師斂衣就座良久曰大眾分明記取便下座示眾選佛場開定祖機辨明邪正在鉗鎚禹門浪暖風雷動正是魚龍變化時眾中莫有衝波激浪者麼良久以拂子打圓相曰機先一著覿面全提擊禪牀一下曰句外一言和聲揭露不許停思顧佇那容擬議分疎眨得眼來劍去久矣縱饒佛祖到來也只攢眉有分何故葢為非言路可通非心識可測若是英俊衲僧向未舉以前便當點首一笑猶較些子近世人心不古學者不務真參實悟惟是接響承虗以學識依通為悟明穿鑿機緣為參究破壞律儀為解脫夤緣據位為出世以致祖風凋弊魔說熾然塞佛祖之坦途瞽人天之正眼使吾祖教外別傳之道於斯委地大覺世尊於二千年外早已識得眾生心病預設多方曲垂規則故曰末世眾生希望成道無令求悟惟益多聞增長我見又曰眾生未悟作何方便普令開悟所以結制安居尅期取證過三期日隨往無礙故知解結之有時也諸大德於九十日中還曾證悟也無已悟者且置勿論未悟者則此一期又是虗喪了也若是真正道流以十方法界為圓覺期場無論百日千日結制解制但以舉起話頭為始一年不悟參一年十年不悟參十年乃至二十年三十年盡平生不悟決定不移此志直要見箇徹頭徹尾真實究竟處方是放參之日所謂時節若至其理自彰豈虗語哉驀竪起拂子曰還知落處麼幻叟今日不辭饒舌更為諸人下箇註脚猛火鑄成金彈子當機揑碎乃渾圇等閒得失俱拈却風送潮音出海門師到園見冬瓜問園頭者箇無口因甚長得如許大頭曰某甲不曾怠惰一時師曰主人公還替你出些力氣也無頭曰全承渠力師曰請來與老僧相見頭便禮拜師曰者猶是奴兒婢子在頭轉身拈篾縛架師乃呵呵大笑回顧侍者曰菜園裡有蟲性空首座請益蒙山三關語曰蟭螟蟲吸乾滄海魚龍蝦蟹向何處安身立命師曰長安路上金毛臥曰水母飛上色究竟天入摩醯眼裡作舞因甚不見師曰五鳳樓前鐵馬嘶曰蓮湖橋為一切人直指明眼人因甚落井師曰明月照見夜行人曰請師頌出師曰好與痛棒曰棒則甘領頌則乞師不吝師乃大笑頌曰當機把斷聖凡津擬議知渠屈未伸欲識蒙山端的旨垂鉤意在釣金鱗天順丁丑由匡廬歸蜀韓都侯於方山建雲峰寺迎師住持成化癸巳三月中示微疾眾請末後句師展兩手曰會麼復曰今年今日推車撞壁撞破虗空青天霹𮦷阿呵呵泥牛吞却老龍珠澄澄性海漚華息泊然而逝世壽七十僧臘六十一建塔天成雲南府古庭歸化善堅禪師本郡昆明丁氏子十九參栢巖宣德庚戌走金陵參無隱道道示以萬法歸一一歸何處話苦心窮究未有所入乙卯抵貴州雍蘿山入蜀脇不至席者數年始大悟正統間袖香走隆恩參無際際曰子見處因甚與老僧不同師展兩手曰者箇非別際頷之一日辭際際曰甚處去師曰十字街頭訶佛罵祖去際曰子還來否師曰不違和尚尊顏禮拜便行初遊金臺止大容山復南還住金陵天界天順間遷皖桐浮山示眾汾陽無業道古德道人得意後茅茨石屋向折脚鐺煑飯喫過二三十年名利不干懷財寶不為念大忘人世隱跡巖叢君王召而不來諸侯請而不赴豈同吾輩貪利愛名汩沒世途如短販人有少希求便忘大果誠哉是言我等惟掠虗頭妄自尊大無明三毒潛結于心逆惡境緣知無解脫據實而論且莫管你是知識非知識除却一切施為動靜語默文字生死到來畢竟作麼生脫去不得認著箇死搭搭向良久處妄想不得執著箇轉轆轆向活脫處狂蕩但有絲毫差別見覺直饒你脊梁似生鐵鑄就機辯如懸河瀉水未免閻老子打入阿波波阿吒吒八寒八熱萬死萬生灼然灼然擊拂子曰昨夜蟭螟吞六合虗空撲碎落巖前復召大眾曰珍重後歸里古庭建歸化禪林以弘治癸丑七月二十日示寂古庭與盤龍南北竝峙至今二大士肉身存焉田素菴大士法嗣府佛跡頤菴真禪師示眾青山疊疊綠水滔滔於斯會得獨步高超雖然也是尋常茶飯古人道欲窮千里目更上一層樓機不離位墮在毒海語不驚群陷於流俗若向擊石火裡辨緇素掣電光中明殺活可以坐斷千差壁立萬仞諸兄弟還知有恁麼時節也無今時諸方說禪浩浩盡謂脚跟點地鼻孔撩天究竟具正眼者落落罕聞所以偏正不一各立異端堅執己解弗通實理所謂正法難扶邪說競興古人道信有十分則疑有十分疑有十分則悟有十分可將盡平生眼裡所見耳裡所聞惡知惡解奇言玅句禪道佛法貢高我慢等心徹底傾瀉莫存毫末只就未明未了公案上立定脚跟竪起脊梁無分晝夜無參處參無疑處疑直得東西不辨南北不分獃椿椿地却如箇有氣底死人相似心隨境化觸著還知打破髑髏不從他得豈不慶快平生者哉大鑑下第二十八世東明旵禪師法嗣江寧府東山翼善海舟永慈禪師成都余氏子生洪武甲戌幼孤見僧輙喜一日聞生死事大遂發心出家奮志參尋知識首見太初初問父母未生前那箇是汝本來面目師即從東過西叉手而立初曰未在更道師曰兩眼對兩眼宣德丁未出峽遊燕京南詢至武林謁東明問無相福田衣何人合得披明便掌師曰作麼明又掌師曰一掌不作一掌用又如何明復掌師曰老和尚名不虗傳遂展具三拜未幾復遊金陵正統丁巳太監袁誠請師住持翼善庚申五月二十八日東明遺偈曰分付慈海舟訪我我無酬明年之明日西風笑點頭明年辛酉東明如期果寂成化丙戌師示寂壽七十三臘五十餘塔於寺左蘇州府水心月江覺淨禪師姑蘇范氏子年十五從古䂐芟染永樂壬寅參峴山宗後見東明親依最久一日問如何是祖師西來意明曰你那裡去來師進前曲躬曰和尚那裡去來明便喝師亦喝明打出後菴居天目天順間遷里之水心成化己亥正月十九日戒飭徒眾說偈而逝壽七十九臘五十一天界中禪師法嗣邵武府君峰大闡慧通禪師建寧邵氏子從斗峰祝髮往參雪骨中一夕有省成偈曰手把龜毛索毗盧頂上推三千諸佛祖一串穿將來旦詣丈室見中中曰還我話頭來師復衝口曰坐斷恒沙界全心一物無浮雲都散盡獨耀一輪孤中可之後住君峰二十餘年清遠之風從化者眾弘治辛酉二月十七日集眾說偈曰人生七十古來稀更添一歲事尤奇若問老僧何處去虗空獨露笑嘻嘻沐浴更衣趺坐而逝投子琦禪師法嗣順天府𣵠州金山寶禪師參楚山山問面南看北斗且道明甚麼邊事師曰和尚合取口好山曰未在師曰瞞別人即得山曰如何是透關眼師振聲一喝山曰向上一機又作麼生師曰青天日卓午山曰未夢見在師曰木童拈玉綫石女度金鍼山曰轉身一句速道速道師曰雨添山色秀風來竹影移山拈拄杖師便喝拂袖而出山曰放汝三十棒師轉身作禮曰謝和尚慈悲山曰子雖有滔天之浪且無湛水之波師俛首默然山肯之府唐安湛淵奫禪師依楚山最久一日入室次山問如何是至理一言師曰有口說不得山曰松風流水為甚麼却說得師曰為渠無口山曰你道他說些甚麼師曰和尚適來問甚麼山曰祇如絕音響處還有說也無師曰有則灼然有只是聞不及山曰聞即且置你道他說箇甚麼師乃竪起拳頭山曰還有聞得及者麼師以手指香爐曰是渠却聞得山曰因甚渠却聞得師曰為渠有耳山曰汝亦有兩耳為甚聞不得師曰雖然聞不得瞞他一點不得山曰放汝三十棒師便禮拜襄陽府大雲興禪師久侍楚山一日山出郡歸眾途迎山曰我不曾下山亦未甞出郡且道甚處去來師曰大眾久立請和尚回寺山曰那裡是寺師曰鐘聲響得好山呵呵大笑師便禮拜後山付偈曰躬自西州定宗旨親從投子付袈裟他年出世提綱要不立孤危是作家順天府房山石經海珠祖意禪師掩關次一日楚山到關前擊門一下曰請關主相見師斂手鞠躬而立山曰趙州無字作麼生師曰只為婆心切肝膽向人傾山曰不涉有無時如何師曰某甲到者裡却不會山曰待汝出關與汝一頓師曰某甲即今亦不在關內山指關門曰爭奈者箇何師便喝山曰天氣炎烝善加保護師便禮拜府長松大心真源禪師三池張氏子謁楚山問從上佛祖言不及處行不到處請師直指山拈拄杖曰聻師便喝山便打師又喝山又打師便禮拜一日室中侍立次山曰向父母未生前道一句來師曰道不得山曰因甚道不得師曰他沒口山曰大好沒口師曰謝師答話府松藩大悲崇善一天智中國師彭縣人體貌奇異年十二從月光受業後居松藩一日楚山過其廬師述悟由山曰如何是無字意師曰出匣吹毛劍寒光射斗牛山曰趙州因甚道無師曰波斯嚼氷雪不覺齒牙寒山曰拈過有無如何湊泊師曰夜深誰把手同共御街遊山曰向上奇特一句作麼生師曰秋夜家家月春來處處花一雙青白眼何用撒泥沙山印可之府中溪隱山昌雲禪師參楚山山問汝名甚麼師曰昌雲山曰號聻師曰隱山山曰雲在山中隱如何又出山師曰只因夜來鶴帶過嶺頭關山曰化為霖雨時如何師曰徧潤寰區山曰忽被猛風吹散時如何師曰依舊青天白日山呵呵大笑順天府房山石經豁堂祖裕禪師成都巨氏子久從楚山遊一日山閱經次師詣前曰和尚看底是甚麼山喝一喝曰你道是甚麼聻師亦喝山舉起經曰百千三昧無量妙義皆從者一卷經流出且道者一卷經從甚處得來師彈指一下山便休去府三池月光常慧禪師簡州李氏子參楚山山曰久聞上座甞覽大藏是否師曰和尚莫謗某甲好山曰白底是紙黑底是墨畢竟如何是經師曰和尚太殺不本分山曰作麼生是不本分底道理師曰經聻山曰似即似是即未是師便禮拜府翠微悟空禪師關西人久依楚山一日入室次山問踏翻大地無寸土徹底窮源事若何師曰有星皆拱北無水不朝東山曰還假履踐功用也無師曰履踐則不無功用即不可得山曰只箇不可得處亦不可得子又作麼生師擬進語山震威一喝師曰恩大難酬便禮拜江寧府高座古溪覺澄禪師蔚州人從雲中天暉昶芟染閱大藏歷五寒暑於無字話染指乃叩月溪復往投子見楚山親炙久之得盡其旨隱固始之南山有年明天順間住金陵高座結制小參三條椽下坐堆堆把定身心若死灰撥出爐中些子火驚天動地一聲雷還有不惜眉毛者麼良久乃曰有時三世諸佛與火爐說法覓火和煙得有時火爐說法三世諸佛諦聽擔泉帶月歸於斯會得芥子納須彌也得須彌納芥子也得正眼觀來兩箇火爐三世諸佛結住于青州布衫一粒芥子百億須彌收歸於雲門胡餅兩堂雲水穿又穿不得齩又齩不得大眾正當恁麼時畢竟作麼生還會麼拍案曰眉間拶出金剛𦦨露柱燈籠盡放光成化癸巳八月九日集眾訣別端坐而逝少頃眾泣師復開目曰不須如是復瞑目長往珪菴祖玠侍者因病次楚山入寮躬視時值心上座來山顧師曰如何是心師曰開口不容情山曰未在師返顧心曰何不禮拜和尚心便就禮一拜山休去後病革有痛苦聲山曰平日得力句到者時節還用得著麼師魁首山曰既用得著又呌喚作麼師曰痛則呌癢則笑師曰只如三寸氣斷向何處安身立命師曰雨過天晴青山依舊山曰從今別後再得相見否師曰曠劫不違今何有間山曰恁麼則子不曾病耶師曰病與不病總不相干山復執師手曰者是甚麼師便合掌曰某當行矣振身端坐而逝廣善潭禪師法嗣鳳陽府槎山護國無用文全禪師濟南商河劉氏子年十九投靈巖祝髮初見月天次參別傳有省入傳問虗空粉碎大地平沉汝在甚麼處安身立命師曰昨夜泥牛吞皓月今朝木馬吐清風傳曰一歸何處聻師曰一自白牛歸雪嶺直至如今不見蹤傳頷之復往金山謁無極極囑師見寶月月問有草鞋錢麼師曰青山不露頂曰如何是應物現形師曰孤光明月普天輝萬象森羅全體現一日月入堂坐次呌曰寒寒師便搬火爐向前月曰如何是火爐邊事師敲火爐三下月微笑而出入室次月拈拄杖子者是拄杖子且道主在甚麼處師奪拄杖擲地叉手而立月曰看者漢撞却拄杖子了也師拂袖便出月為印可後出世槎山上堂法不孤起仗境方生道本無言因言顯道今來龍象交參諸山共處感皇上之洪恩賢士大夫之護佑安立禪期助斯聖化命山僧舉揚宗眼令末運得種善根雖然猶未是衲衣下事且作麼生是衲衣下事僧問三乘即不問直指事如何師曰雙峰頂上鶴棲樹九龍山下鳥啼花曰西來祖意蒙師指東土相傳事若何師曰嶺上青松千古秀㵎邊流水萬年清問如何是白水境師曰一片荒田堆四野三間茅屋壯諸山曰如何是境中人師曰白虎頭邊天子廟黑龍潭上帝王基曰人境兩忘時如何師曰蘇武不知青羝意七郎常恨白鴉歸僧禮拜師拍案一下江寧府崇福大慧覺華禪師維揚劉氏子初見海舟有省復參寶月於繁昌獲印證住後上堂舉拂子曰威音那畔只是者箇如今目前也只是者箇若喚作拂子瞎却人天眼目不喚作拂子亦瞎却人天眼目大眾畢竟喚作甚麼若也直下見得便知迦葉微笑得紹如來傳燈二祖覓心堪續祖宗正脈驀竪拂子曰還見得麼良久曰千聖不能識擊拂子下座河南府伏牛翠峰德山禪師關陝西夏人幼質朴年三十始出家從雲南牛首海為弟子海寂師得遍參而礙膺之物終苦未除因古峰指參寶月潭潭曰子期心固遠特欠一番徹骨在過此從死中活來向人出言吐氣始有著落不然總沒交涉也師聞於是入伏牛苦心六年始得大悟出世瓣香為潭公拈出也異日在都門吉祥時以眾廣朝廷聽讒言致怒師為捨眾歸伏牛眾益盛說法凡三十年一日謂眾曰歸歟歸歟吾北人歸化首丘願也遂還京居延壽未幾示寂年八十有一弟子奉全身瘞於寺普同之後有贊師像曰有風斯清有月斯明猗歟翠峰玉振金聲大岡澄禪師法嗣杭州府天真毒峰季善禪師鳳陽吳氏子父宦遊廣東雷陽而生年十七出家初遇源明明示以無字話師當下便能領解舉陳明明曰我二十年看箇無字如蚊子上鐵牛子纔學做工夫便有許多知見復曰觀子根器雖異切莫被人哄去作長老悞汝大事師蒙誨誓此生以悟為期正統壬戌入川參無際會際赴召入京遂掩關關中不設臥具惟置小凳昏重并去凳一日聞鐘聲有省說偈曰沉沉寂寂絕施為觸著無端吼似雷動地一聲消息盡髑髏粉碎夢初回其時適際遷化遂依月溪溪曰佛法不是鮮魚怕爛却那日惟東敲西擊暗垂勘驗一日侍溪園中坐次溪曰你向來看甚麼話頭師曰無字溪曰如何是無師曰如今看來恰似口金剛王寶劍溪曰如何是金剛王寶劍師曰寒光𦦨𦦨耀古騰今溪曰還我劍來師曰擬動則犯他鋒鋩溪曰橫按當軒時如何師曰佛來也殺祖來也殺溪曰老僧來聻師曰亦不相饒溪曰殺後如何師曰且喜天下太平溪曰畢竟如何是無字意師曰贓賊分明溪曰賊即且置還我贓來師曰六六三十六溪曰未在更道師曰夜短睡不足日長饑有餘溪曰牛過窓櫺頭角四蹄都過了因甚尾巴過不得師曰了無一法當情瞥爾通身露地溪曰你即今向甚麼處安身立命師曰何處不稱尊後辭溪抵浙掩關天目萬峰菴月溪亦蒙旨欽賜歸金陵大岡遣書召師付囑師適因事他出溪臨委息命送衣拂𢍁之師住山凡四十餘載天順間建西湖之三塔洎天目之招明吳山之寶蓮南山之甘露成化初掩關石屋後住慈雲嶺天真僧問如何是和尚家風師曰前江潮急魚行澀後嶺峰高鳥泊難僧請益曰高峰道海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽此四句內有一句能殺能活能縱能奪若人檢點得出一生參學事畢未審是那一句師曰待汝悟即向汝道曰不會師曰不見道你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子示眾寶劍全提日用中高揮大抹肯從容卷兮魂膽迎風喪舒也髑髏徧地橫萬死萬生渾不顧一鎗一騎便收功趙州性命分明也血刃參天不露鋒以拂子拂一拂曰虗空廓徹無消息萬里無雲天漢碧拶得須彌入藕絲彌勒釋迦齊叫屈倒騎鐵馬逐西風驚得泥牛從海出諸仁者若作奇特會孤負己靈不作奇特會抱贓呌屈且作麼生會良久曰解藏天下於天下始見林梢挂角羊成化壬寅示寂於天真塔建本山太原府五臺山普濟孤月淨澄禪師西河張氏子首參月溪溪令看趙州無字話三日有省溪異之復入蜀獨居飛雪山三年一日炊飯定去覺時飯已成醭以地坐久足為冷濕所侵不能起得人荷至後山調息始愈一日坐木上聞𪹼竹聲豁然大悟自是一切時中洞然明妙謁廣福呈所得福問大死底人却活時如何師曰眉毛橫眼上鼻孔大頭垂曰大地平沉虗空粉碎汝又向甚處安身立命師曰雲消山巖露日出海天清明天順丁丑還清凉代王延詣內掖問道尊禮之令旨建寺於華嚴谷額曰普濟命師住持有山居偈曰甘貧林下思悠悠竹榻高眠枕石頭格外生涯隨分足都緣胸次一無求自住丹崖綠水傍了無榮辱與閒忙老僧不會還源旨一任山青葉又黃臨寂坐脫於本山江寧府大岡夷峰寧禪師付法偈曰祖祖無法付人人本自有汝證無授法法法無前後潼川州蓬溪智林天淵福湛禪師以勤苦入道獲記月溪及開堂弘化大為楚蜀禪學所歸壽七十七寂時有倒騎鐵馬吼西風明月清風一樣同之句葢辭世偈也有天淵錄二卷行世
