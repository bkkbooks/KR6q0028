body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十七世大慧杲禪師法嗣福州府雪峰崇聖普慈蘊聞禪師洪州沈氏子示眾栴檀叢林栴檀圍繞師子叢林師子圍繞虎狼叢林虎狼圍繞荊棘叢林荊棘圍繞大眾四種叢林合向那一種叢林安居好若也明得九十日內管取箇箇成佛作祖其或未然般若叢林歲歲凋無明荒草年年長處州府連雲道能禪師成都漢州何氏子僧問鏡清六刮意旨如何師曰穿却你鼻孔曰學人有鼻孔即穿無鼻孔又穿箇甚麼師曰抱贓呌屈曰如何是就毛刮塵師曰筠袁䖍吉頭上插筆曰如何是就皮刮毛師曰石城虔化說話廝罵曰如何是就肉刮皮師曰嘉眉果閬懷裡有狀曰如何是就骨刮肉師曰漳泉福建頭匾如扇曰如何是就髓刮骨師曰洋瀾左蠡無風浪起曰髓又如何刮師曰十八十九癡人夜走曰六刮已蒙師指示一言直截意如何師曰結舌有分杭州府靈隱最菴道印禪師漢州人上堂大雄山下虎南山鼈鼻虵等閒撞著抱賞歸家若也不惜好手便與出重牙有麼有麼上堂五五二十五擊碎虗空鼓大地不容針十方無寸土春生夏長復何云甜者甜兮苦者苦中秋上堂舉馬大師與西堂百丈南泉翫月話師曰馬祖垂絲千尺意在深潭西堂振鬣百丈擺尾雖則衝波激浪未免上他鉤線南泉自謂躍過禹門誰知依前落在巨網即今莫有絕羅籠出窠臼底麼也好出來露箇消息貴知華藏門下不致寂寥其或未然此夜一輪滿清光何處無建寧府竹原宗元菴主本郡連氏子久依大慧分座西禪丞相張浚帥三山以數院迎之不就歸舊里結茆號眾妙園宿衲士夫交請開法示眾若究此事如失却鎖匙相似祇管尋來尋去忽然撞著噁在者裡開箇鎖子便見自家庫藏一切受用無不具足不假他求別有甚麼事示眾諸方為人抽釘拔楔解黏去縛我者裡為人添釘著楔加繩加縛了送向深潭裡待他自去理會示眾主法之人氣吞宇宙為大法王若是釋迦老子達磨大師出來也教伊叉手向我背後立地直得寒毛卓竪亦未為分外一日舉世尊初生天上天下唯我獨尊話師曰見怪不怪其怪自壞垂語曰者一些子恰如撞著殺人漢相似你若不殺他他便殺了你杭州府徑山了明禪師身長八尺腹大十圍所至人必聚觀之始妙喜謫梅州州縣防送甚嚴師為荷枷以行間關辛苦未曾少怠既至貶所衲子追隨問道者以數百計杲以食不給且慮禍勉之令去師輙不肯以身任齋粥每自肩栲栳行乞至晚食用之屬成列以歸如是者十七年如一日及被旨復僧衣住育王皆未常離妙喜室中不許衲子下喝師入室必振聲一喝而退妙喜榜曰下喝者罰一貫錢師乃密具千錢於袖至室中先頓於地高聲一喝便出如是者數矣妙喜無如之何再榜曰下喝者罰當日堂供一中師乃往庫司語曰和尚要十兩金主事不疑即與之師袖入方丈復頓於地高聲一喝喜大駭入室罷徐問知其然喜為一笑且曰你者肥漢如是會禪驢年也未夢見在久之舉令出世舒州投子先是投子諸庄牛遭疫死斃幾盡師以願力化牛二百隻以實之連歲大稔倍常頗有異跡遷住長蘆衲子輻凑及妙喜住徑山師來省覲洎歸長蘆妙喜送以偈曰人言棒頭出孝子我道憐兒不覺醜長蘆長老恁麼來妙喜空費一張口從教四海妄流傳野干能作師子吼孰云無物贈伊行喝下鐵圍山倒走後奉詔住徑山先是楊和王夢一異僧長大皤腹緩行言欲化蘇州一庄覺而異之翌旦師至和王出見與夢無異遽呼其眷屬出觀之眷屬竝炷香作禮茶罷師首言大王庄田至多可施蘇州一庄以為徑山供佛齋僧王未有可否因令辦齋師飯罷便出更無他語時內外傳言和王以蘇州庄施徑山孝宗聞會和王入朝上曰聞卿捨蘇州一庄施徑山朕當為蠲免稅賦和王謝恩歸次日以書請師而師前二日已遷化矣自是和王宴居寤寐之際或少倦交睫即見師在前曰六度之大施度為先善始善終斯為究竟和王即以庄隸本山師有大因緣所在衲子臻萃佛事殊勝江浙兩湖因號布袋和尚再來云近禮侍者三山人久侍大慧甞默究竹篦話無所入一日入室罷求指示慧曰你是福州人我說箇喻向你如將名品茘枝和皮殻一時剝了以手送在你口裡祇是你不解吞師不覺失笑曰和尚吞却即禍事慧後問師曰前日吞了底茘枝祇是你不知滋味師曰若知滋味轉見禍事溫州府淨居尼妙道禪師延平尚書黃裳之女上堂問答罷乃曰問話且止直饒有傾湫之辯倒嶽之機衲僧門下一點用不著且佛未出世時一事全無我祖西來便有許多建立至今累及兒孫山僧於人天眾前無風起浪語默該不盡底彌亘大方言詮說不及處徧周沙界通身是眼覿面當機電卷星馳如何湊泊有時一喝生殺全威有時一喝佛祖莫辨有時一喝八面受敵有時一喝自救不了遂喝一喝曰且道者一喝是生殺全威邪是佛祖莫辨邪是八面受敵邪是自救不了邪若向者裡辨別得堪報不報之恩脫或未然山僧無夢說夢去也拈起拂子曰還見麼若見被見刺所障擊禪牀曰還聞麼若聞被聲塵所惑直饒離見絕聞正是二乘小果跳出一步葢色騎聲全放全收主賓互換所以道欲知佛性義當觀時節因緣敢問諸人即今是甚麼時節蕩蕩仁風扶聖化熙熙和氣助昇平擲拂子下座問如何是佛師曰非佛曰如何是佛法大意師曰骨底骨董問言無展事語不投機時如何師曰未屙已前墮坑落壍蘇州府資壽尼無著妙總禪師丞相蘇頌孫女也年三十許厭世浮休脫去緣飾咨參諸老已入正信作夏徑山大慧陞堂舉藥山初參石頭後見馬祖因緣師豁然省悟慧下座馮濟川逐段著語曰恁麼也不得囌囉娑婆訶不恁麼也不得㗭哩娑婆訶恁麼不恁麼總不得囌囉㗭哩娑婆訶慧舉似師師曰曾見郭象註莊子識者曰却是莊子註郭象慧見其語異復舉巖頭婆子話問之師答偈曰一葉扁舟泛渺茫呈橈舞棹別宮商雲山海月都拋却贏得莊周蝶夢長慧休去馮疑其所悟不根後過無錫招至舟中問曰婆生七子六箇不遇知音祇者一箇也不消得便棄水中大慧老師言道人理會得且如何會師曰已上供通竝是詣實馮大驚慧挂牌次師入室慧問古人不出方丈為甚麼却去莊上喫油餈師曰和尚放妙總過妙總方敢通箇消息慧曰我放你過你試道看師曰妙總亦放和尚過慧曰爭奈油餈何師喝一喝而出於是聲聞四方孝宗隆興癸未舍人張孝祥來守是郡以資壽挽開法入院上堂宗乘一唱三藏絕詮祖令當行十方坐斷二乘聞之怖走十地到此猶疑若是俊流未言而諭設使用移星換斗底手段施攙旗奪鼓底機關猶是空拳豈有實義向上一路千聖不傳學者勞形如猿捉影靈山付囑俯徇時機演唱三乘各隨根器山僧今日與此界他方乃佛乃祖山河大地草木叢林現前四眾各轉大法輪交光相羅如寶絲網若一草一木不轉法輪則不得名為轉大法輪所以道於一毫端現寶王剎坐微塵裡轉大法輪乘時於其中間作無量無邊廣大佛事周遍法界一為無量無量為一小中現大大中現小不動步游彌勒樓閣不返聞入觀音普門情與無情性相平等不是神通妙用亦非法爾如然於此倜儻分明皇恩佛恩一時報足且道如何是報恩一句天高羣象正海濶百川朝上堂舉雲門示眾十五日已前則不問十五日已後道將一句來自代云日日是好日師曰日日是好日佛法世法盡周畢不須特地覓幽玄祇管盂兩度溼問如何是奪人不奪境師曰野華開滿路徧地是清香曰如何是奪境不奪人師曰茫茫宇宙人無數幾箇男兒是丈夫曰如何是人境俱不奪師曰處處綠楊堪繫馬家家門首透長安曰如何是人境兩俱奪師曰雪覆蘆華舟橫斷岸曰人場已蒙師指示向上宗乘事若何師便打侍郎無垢居士張九成未第時因客談楊文公呂微仲諸名儒所造精妙皆由禪學而至於是心慕之聞寶印明居淨慈往問入道之要明曰此事唯念念不捨久久純熟時節到來自然證入乃舉趙州栢樹子話令時時提撕公久無所省辭謁善權清問此事人人有分箇箇圓成是否清曰然曰為甚麼九成毫無箇入處清於袖中出數珠示之曰此是誰底公俛仰無對清復袖之曰是汝底則拈取去纔涉思惟即不是汝底公悚然一夕如廁聞蛙鳴釋然契入有偈曰春天月夜一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭脚痛有玄沙屆明謁法印一機語頗契適私忌就明靜菴供雲水主僧惟尚纔見乃展手公便喝尚批公頰公趍前尚曰張學錄何得謗大般若公曰某見處祇如此和尚又作麼生尚舉馬祖陞堂百丈卷席話詰之敘語未終公推倒桌子尚大呼張學錄殺人公躍起問旁僧曰汝又作麼生僧罔措公毆之顧尚曰祖禰不了殃及兒孫尚大笑公獻偈曰卷席因緣也大奇諸方聞舉盡攢眉臺盤趯倒人星散直漢從來不受欺尚答曰從來高價不饒伊百戰場中奮兩眉奪角衝關君會也叢林誰敢更相欺紹興癸丑魁多士復謁尚於東菴尚曰浮山圓鑑云饒你入得汾陽室始到浮山門亦未見老僧在公作麼生公叱侍僧曰何不祗對僧罔措公打僧一掌曰蝦蟆窟裡果沒蛟龍丁巳秋大慧董徑山公閱其語要嘆曰是知宗門有人持以語尚恨未一見及為禮部侍郎偶劉參政請慧說法於天竺公三往不值暨慧報謁公見但寒暄而已慧亦默識之尋奉祠還里至徑山與馮給事諸公議格物慧曰公祇知有格物而不知有物格公茫然慧大笑公曰師能開諭乎慧曰不見小說載唐人有與安祿山謀叛者其人先為閬守有畵像在焉明皇幸蜀見之怒令侍臣以劍擊其像時閬守居陝西首忽墮地公聞頓領深旨題不動軒壁曰子韶格物妙喜物格欲識一貫兩箇五百慧始許可後守邵陽丁父難過徑山飯僧秉鈞者意慧議及朝政遂竄慧於衡陽令公居家守服服除安置南安丙子春蒙恩北還道次新淦而慧適至與聯舟劇談宗要未甞語往事繼鎮永嘉丁丑秋丐祠枉道訪慧於育王越明年慧得旨復領徑山謁公於慶善院公曰某每於夢中必誦語孟何如慧舉圓覺曰由寂靜故十方世界諸如來心於中顯現如鏡中像公曰非老師莫聞此論也其頌黃龍三關曰我手何似佛手天下衲僧無口縱饒撩起便行也是鬼窟裡走諱不得我脚何似驢脚又被黐膠粘著翻身直上兜率天已是遭他老鼠藥吐不出人人有箇生緣處鐵圍山下幾千年三災直到四禪天者驢猶自在旁邊煞得工夫參政李邴居士字漢老醉心祖道有年聞大慧排默照為邪禪疑怒相半及見慧示眾舉趙州庭栢垂語曰趙州栢樹子今日重新舉打破趙州關特地尋言語敢問大眾既是打破趙州關為甚麼却特地尋言語良久曰當初祇道茆長短燒了方知地不平公領悟謂慧曰無老師後語幾蹉過後以書咨決曰某比蒙誨答備悉深旨某自騐者三一事無逆順隨緣即應不留胸中二宿習濃厚不加排遣自爾輕微三古人公案舊所茫然時復瞥地此非自昧者前書大法未明之語葢恐得少為足當廣而充之豈別求勝解耶淨勝現流理則不無敢不銘佩寶學劉彥修居士字子羽出知永嘉問道於大慧慧曰僧問趙州狗子還有佛性也無趙州道無但恁麼看公久之發明有頌曰趙州栢樹太無端境上追尋也大難處處綠楊堪繫馬家家門底透長安提刑吳偉明居士字元昭久參真歇得自受用三昧為極致後訪大慧於洋嶼隨眾入室慧舉狗子無佛性話為問公擬答慧以竹篦便打公無對遂留咨參一日慧謂曰不須呈伎倆直須啐地折嚗地斷方敵得生死若祇呈伎倆有甚了期即辭去道次延平倏然契悟連書數頌寄慧皆室中所問者有曰不是心不是佛不是物通身一具金鎖骨趙州親見老南泉解道鎮州出蘿蔔慧即說偈證之曰通身一具金鎖骨堪與人天為軌則要識臨濟小廝兒便是當年白拈賊門司黃彥節居士字節夫號妙德於大慧一喝下疑情頓脫慧印之甞舉首山竹篦話至葉縣奪得拗折擲向堦下曰是甚麼山曰瞎公曰妙德到者裡百色無能但記得甞作蠟梅詩有曰擬嚼枝頭蠟驚香却肖蘭前村深雪裡莫作嶺梅看秦國夫人計氏法真自寡處屏去紛華甞蔬食習有為法因大慧遣謙禪致問其子魏公公留謙以祖道誘之真一日問謙曰徑山和尚尋常如何為人謙曰和尚祇教人看狗子無佛性及竹篦子話祇是不得下語不得思量不得向舉起處會不得向開口處承當狗子還有佛性也無無祇恁麼教人看真遂諦信於是夜坐力究忽爾洞然無滯謙辭歸真親書入道槩略作數偈呈慧其後曰逐日看經文如逢舊識人莫言頻有礙一舉一回新大鑑下第十八世教忠彌光禪師法嗣泉州府法石中菴慧空禪師贛州蔡氏子春日上堂拈拄杖卓一下曰先打春牛頭又卓一下曰後打春牛尾驚起虗空入藕絲孔裡釋迦無路潛蹤彌勒急走千里文殊却知落處拊掌大笑歡喜且道歡喜箇甚麼春風昨夜入門來便見千花生碓𭪿上堂千家樓閣一霎秋風祇知襟袖凉生不覺園林落葉於斯薦得觸處全真其或未然且作寒溫相見上堂釋迦老子道爾所國土中所有眾生若干種心如來悉知何以故如來說諸心皆為非心是名為心要會麼春風得意馬蹄疾一日看盡長安花僧問先佛垂範禁足安居未審是何宗旨師曰瑠璃內拓須彌僧便喝師便打杭州府淨慈混源曇密禪師天台盧氏子依資福道榮出家十六圓具習台教棄參大慧於徑山次謁雪巢一此菴元入閩留東西禪無省發之泉南參教忠聞舉香嚴擊竹因緣豁然契悟述偈呈忠忠以玄沙未徹語詰之無滯忠曰子方可見妙喜即辭往梅陽服勤四載住後上堂諸佛出世打劫殺人祖師西來吹風放火古今善知識佛口虵心天下衲僧自投籠檻莫有天然氣槩特達丈夫為宗門出一隻手主張佛法者麼良久曰設有也須斬為三段上堂德山小參不答話千古叢林成話問話者三十棒慣能說訶說夯時有僧出的能破的德山便打風流儒雅某甲話也未問頭上著枷脚下著匣你是那裡人一回相見一傷神新羅人把手笑欣欣未跨船舷好與三十棒依前相廝誑混源今日恁麼批判責情好與三十棒且道是賞是罰具參學眼者試辨看上堂舉雲門問僧光明寂照徧河沙因緣頌曰平地摝魚鰕遼天射飛鶚跛脚老雲門千錯與萬錯後示寂塔於本山吉安府青原信菴唯禋禪師福州長樂李氏子幼出閩依盱江禪悅廣獲僧服一日廣以佛國白五十三知識頌授諸維那師侍其旁聞止住林有時要見十方佛無事閒觀一片心之句便得要領廣異之還閩謁鼓山佛心才及東禪月菴果西禪嬾菴需諸老時晦菴住龜山師往叩一日夜半模索淨巾次恍然大徹黎明趨方丈呈偈曰業識茫茫本無所據昨夜三更回頭一覰一段靈光本來獨露菴頷之復出嶺見顏卍菴於薦福入室應對敏捷顏厲聲曰者福州子被人教壞了也未幾復往梅陽見大慧慧曰如何是佛師曰覿面相逢更無別有慧曰如何保任師曰饑來喫飯困來打眠既而隨慧北還住育王遷徑山慧一日問許多人入室幾人道得著幾人道不著師曰唯禋只管看慧忽展手曰我手何似佛手師曰天寒且請和尚通袖慧遽打一竹篦曰且道是賞你罰你師遂以佛祖機緣頌十數則呈慧其世尊初生曰撞出頭來早自錯那堪開口更稱尊當時若解深藏舌免得閒愁到子孫慧為擊節後開法天台真如遷報恩豫章上藍吉州青原僧問三聖道我逢人則出出則不為人意旨如何師曰移華兼蝶至曰興化道我逢人則不出出則便為人又作麼生師曰買石得雲饒上堂舉僧問雲門樹凋葉落時如何門曰體露金風師曰雲門袖頭打領腋下剜襟不妨好手子細看來未免牽絲帶綫或問報恩樹凋葉落時如何只向他道來年更有新條在惱亂春風卒未休上堂拈拄杖曰十方國土中唯有一乘法者箇是橫泉拄杖子那箇是一乘法卓一下曰千峰勢倒嶽邊止萬派聲歸海上消宋光宗紹熙壬子六月示疾十九日書偈曰末後一句覿面分付擬議思量世諦流布遂跏趺而逝羅湖瑩仲溫狀其行東林顏禪師法嗣荊州府公安遯菴祖珠禪師南平人上堂不是心不是佛不是物瀝盡野狐涎趯翻山鬼窟平田淺草裡打起焦尾大蟲太虗寥廓中放出遼天俊鶻阿呵呵露風骨等閒拈出眾人前畢竟分明是何物咄咄上堂玉露垂青草金風動白蘋一聲寒鴈呌喚起未惺人汀州府報恩法演禪師果州人上堂舉俱胝竪指因緣頌曰佳人睡起懶梳頭把得金釵插便休大抵還他肌骨好不塗紅粉也風流杭州府淨慈肯堂彥充禪師於潛盛氏子幼依明空院出家首參大愚宏智正堂大圓諸老後聞東林示眾曰我此間別無玄妙祇有木札羹鐵釘飯任汝咬嚼師竊喜之直造焉陳所見林曰據汝見處正坐在鑒覺中師於是遂將從前所得底一時颺下一日聞僧舉南泉時人見此一株華如夢相似語默有所覺曰打草祇要蛇驚次日入室林問那裡是巖頭密啟其意處師曰今日捉敗者老賊林曰達磨大師性命在汝手裡師擬開口林攔胸一拳師大悟直得汗流浹背點首自謂曰臨濟道黃檗佛法無多子豈虗語邪遂呈頌曰為人須為徹殺人須見血德山與巖頭萬里一條鐵林然之住後上堂世尊不說說迦葉不聞聞卓拄杖曰水流黃葉來何處牛帶寒鴉過遠村上堂舉雪峰示眾盡大地是箇解脫門因甚把手拽不入師曰大小雪峰話作兩橛既盡大地是箇解脫門用拽作麼上堂一向與麼去法堂前草深一丈一向與麼來脚跟下泥深三尺且道如何即是三年逢一閏鷄向五更啼上堂舉卍菴先師道坐佛牀斫佛脚不敬東家孔夫子却向他鄉習禮樂師曰入泥入水即不無先師爭奈寒蟬抱枯木泣盡不回頭卓拄杖曰灼然有不回頭底淨慈向升子裡禮汝三拜上堂三世諸佛無中說有䕞𦿆拾花針六代祖師有裡尋無猿猴探水月去此二途如何話會儂家不管興亡事盡日和雲占洞庭元菴受智者請引座曰南山有箇老魔王烱烱雙眸放電光口似血盆呵佛祖牙如劍樹罵諸方幾度業風吹不動吹得動雲黃山畔與嵩頭陀傅大士一火破落戶依舊孟八郎賺他無限癡男女開眼堂堂入鑊湯忽有箇衲僧出來道既是善知識為甚賺人入鑊湯只向他道非公境界後示寂塔於寺之南菴金華府智者元菴真慈禪師潼川李氏子初依成都正法出家具戒後聽講圓覺至四大各離今者妄身當在何處畢竟無體實同幻化因而有省作頌曰一顆明珠在我者裡撥著動著放光動地歸以呈其師師舉狗子無佛性話詰之師曰雖百千萬億公案不出此頌也其師以為不遜乃叱出師因南遊至廬山圓通挂搭時卍菴為西堂為眾入室舉僧問雲門撥塵見佛時如何門曰佛亦是塵師隨聲便喝以手指胸曰佛亦是塵師復頌曰撥塵見佛佛亦是塵問了答了直下翻身勸君更盡一杯酒西出陽關無故人又頌塵塵三昧曰裡飯桶裡水別寶崑崙坐潭底一塵塵上走須彌明眼波斯笑彈指笑彈指珊瑚枝上清風起卍菴深肯之成都府昭覺紹淵禪師上堂鎔瓶盤釵釧作一金攪酥酪醍醐成一味直是主賓道合內外安和放行則細雨濛濛把住則朔風凜凜且道放行為人好把住為人好復曰等閒一似秋風至無意凉人人自凉上堂舉僧問雲門樹凋葉落時如何門曰體露金風師曰雲門具逸羣三昧擊節叩關向閃電光中與人解粘去縛不妨好手細檢將來大似與賊過梯昭覺即不然忽有問樹凋葉落時如何只答他道落霞與孤鶩齊飛秋水共長天一色上堂舉趙州初見南泉問如何是道泉曰平常心是道曰還假趣向也無泉曰擬向即乖曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之道廓然如太虗空無有障礙師曰奇怪趙州雖是沙彌初學一撥便轉南泉如善射者發箭箭箭中的若不是趙州也大難承當是他便能向平常心是道處撥轉關棙子去却胸中物喪却目前機頭頭上明物物上顯信脚行信口道等閒拈出著著有出身之路以何為騐豈不見僧問如何是祖師西來意庭前栢樹子萬法歸一一歸何處我在青州作一領布衫重七斤如何是趙州東門西門南門北門與人解粘去縛抽釘拔楔坐斷天下人舌頭穿過天下人鼻孔且不是飣鬬底言語排疊底章句推人在死水裡者箇便是沙彌底樣子應當學欲行千里一步為初白日青天快著精彩徽州府簡上座參大慧於徑山時卍菴為首座一日為眾入室問師一二三四五六七明眼衲僧數不出你試數看師便喝菴曰七六五四三二一你又作麼生師擬對菴便打曰你且莫亂道師於言下有省述偈曰你且莫亂道皮毛卓竪寒只知梅子熟不覺鼻頭酸頌狗子無佛性話曰趙州老漢渾無面目言下乖宗神號鬼哭年僅三十而終蘇州府崑山資福遂翁處良禪師山陰劉氏子十三游方初為妙喜侍者長從卍菴顏為書記能善文詞人咸以良書記稱甞居秀州法喜院拈香為卍菴嗣再歲廬會稽海山尤太常守臨海起師領紫櫜次領崑山薦嚴資福淳熙丁未六月戊寅以疾逝遺言藏骨廬山智林寺寺為卍菴與師所同建也西禪需禪師法嗣福州府鼓山木菴安永禪師閩縣吳氏子弱冠為僧首謁懶菴於雲門一日入室菴曰不問有言不問無言世尊良久不得向世尊良久處會隨後便喝師當下契悟作禮曰不因今日問幾喪目前機菴許之師住後上堂要明箇事須是具擊石火閃電光底手段方能嶮峻巖頭全身放捨白雲深處得大安居如其覰地覓金針直下腦門須迸裂到者裡假饒見機而作不犯鋒鋩全身獨脫猶涉泥水祇如本分全提一句又作麼生道擊拂子曰淬出七星光燦爛倒拈天下任橫行上堂舉睦州示眾曰諸人未得箇入處須得箇入處既得箇入處不得忘却老僧師曰恁麼說話面皮厚多少木菴則不然諸人未得箇入處須得箇入處既得箇入處直須颺下入處始得上堂拈拄杖曰臨濟小廝兒未曾當頭道著今日全身放憨也要諸人知有擲拄杖下座僧問須彌頂上翻身倒卓時如何師曰未曾見毛頭星現曰恁麼則傾湫倒嶽去也師曰莫亂做僧便喝師曰雷聲浩大雨點全無乾道癸巳八月卒瘞骨于鼓山之西崦溫州府龍翔栢堂南雅禪師上堂瑞峰頂上棲鳳亭邊一杯淡粥相依百衲蒙頭打坐二祖禮三拜依位而立已是周遮達磨老臊胡分盡髓皮一場狼籍其餘之輩何足道哉栢堂恁麼道還免諸方檢責也無拍繩牀曰洎合停囚長智上堂大機貴直截大用貴頓發縱有嚙鏃機一鎚須打殺何故我王庫內無如是刀上堂紫蕨伸拳笋破梢楊華飛盡綠陰交分明西祖單傳句黃栗留鳴燕語巢者裡見得諦信得及若約諸方決定明窓下安排龍翔門下直是一槌槌殺何故不是與人難共住大都緇素要分明福州府天王志清禪師上堂竪起拂子曰只者箇天不能葢地不能載徧界徧空成團成塊到者裡三世諸佛向甚麼處摸索六代祖師向甚麼處提持天下衲僧向甚麼處名邈除非自得自證便乃敲唱雙行雖然如是未是衲僧行履處且作麼生是衲僧行履處是非海裡橫身入豺虎叢中縱步行延平府劍門安分菴主少與木菴同肄業安國後依懶菴未有深證辭謁徑山大慧行次江干仰瞻宮闕聞街司喝侍郎來釋然大悟作偈曰幾年箇事掛胸懷問盡諸方眼不開肝膽此時俱裂破一聲江上侍郎來遂徑回西禪懶菴付以伽黎後菴劍門化被嶺表學者從之所作偈頌走手而成凡千餘首盛行於世示眾者一片田地問汝諸人且道天地未分已前在甚麼處直下徹去已是鈍置你不少更若擬議思量何啻白雲萬里驀拈拄杖打散示眾上至諸佛下及眾生性命總在山僧手裡山僧有沒量罪過還有檢點得出者麼卓拄杖一下曰冤有頭債有主良久左右顧視曰自出洞來無敵手得饒人處且饒人示眾十五日以前天上有星皆拱北十五日以後人間無水不朝東以前以後總拈却到處鄉談各不同乃屈指曰一二三四五六七八九十十一十二十三十四諸兄弟今日是幾良久曰本店買賣分文不賒東禪岳禪師法嗣福州府鼓山宗逮禪師上堂世尊道應如是知如是見如是信解不生法相遂喝曰玉本無瑕却有瑕杭州府徑山寓菴德灊禪師興化人初住徑山至山門彈指一下便入福州府鼓山石菴知玿禪師僧問坐斷雲山事已彰可憐雲水自茫茫今日石門通一綫端然衣錦便還鄉且道還鄉一曲作麼生唱師曰罕遇知音曰祇如未跨石門一句作麼生道師曰百襍碎曰已跨石門又作麼生師曰依舊却囫圇曰直得大頂峰點頭屴崱峰震動師曰未為分外曰祇今晏國師撫掌呵呵大笑曰幸得與老師相見也師曰不是冤家不聚頭僧禮拜師曰放汝三十棒上堂昔在東溪日華開葉落時幾擬以黃金鑄作鍾子期古人恁麼道大似焦桐挂壁罕遇知音白雲今日幸遇李深卿陳仲齡二知音到來正值六合風清萬籟俱息不免再理朱絃試彈一曲橫按拄杖曰諸人還聞麼聞即不無且道是何曲調卓拄杖曰太古希聲無限意知音知後更誰知上堂語是謗默是誑不語不默轉增虗妄喝一喝春風吹落桃李華淡煙疎雨籠青嶂頌趙州鎮州蘿蔔話曰些兒活計口皮邊點著風馳紫電旋謾說鎮州蘿蔔大何曾親見老南泉西禪淨禪師法嗣福州府乾元鈍菴宗穎禪師上堂卓拄杖曰性燥漢祇在一槌靠拄杖曰伶俐人不勞再舉而今莫有伶俐底麼良久曰比擬張麟兔亦不遇興化府華嚴別峰雲禪師初住福州支提次遷福泉華嚴上堂千種言萬般解只要教君長不昧且道不昧箇甚麼喚作竹篦則觸不喚作竹篦則背上堂彌勒大士朝入伽藍暮成正覺總似者般鈍漢有甚用處直饒隔山望見支提雙童峰便回去脚跟下好與三十上堂舉真淨道也無禪也無道也無玄也無妙快活須明者一竅師曰既無禪道又無玄妙甚處得者一竅若有一竅可明如何得快活去諸人即今要得快活麼便下座上堂過去諸如來斯門已成就是甚語話現在諸菩薩今各入圜明誣人之罪未來修學人當依如是法莫鈍置他好其奈茫茫宇宙人無數幾箇男兒是丈夫福州府中濟無禪立才禪師上堂雪竇道三分光陰二早過靈臺一點不揩磨貪生逐日區區去喚不回頭爭奈何雪竇老漢顢顢頇頇儱儱侗侗更添三十年也未會禪在然雖如是土曠人稀試聽下箇註脚瞎却摩醯三隻眼南北東西路不分千林落葉無人掃獨自松門展脚眠上堂舉趙州喫茶去話師曰趙州逢人喫茶誰知事出急家翻手作雲作雨順風撒土撒沙引得洞山無意智問佛也道三斤麻示眾南海波斯持密呪千言萬語少人知春風一陣來何處吹落桃華三四枝開善謙禪師法嗣建寧府仙州山吳十三道人每以己事叩諸禪宿無所入及開善歸結茅附近日勤參究紹興庚申三月八日夜釋然啟悟占偈呈善曰元來無縫罅觸著便光輝既是千金寶何須彈兒善答曰啐地折時真慶快死生凡聖盡平沉仙州山下呵呵笑月老風高萬古心
