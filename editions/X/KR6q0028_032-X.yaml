body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第三十五世天童密雲悟禪師法嗣長沙府溈山五峰如學禪師臨潼任氏子丱歲失怙從五臺天齊薙髮圓具於澄律師遂徧歷諸方參天童於金粟一夕話次童驀伸脚曰你作麼生師以脚踢之童笑曰未在師曰和尚道看童倒臥師曰也只是困童曰又與麼去也師禮拜一日辭行童握拂曰喚作拂子則觸不喚作拂子則背不得拈起不得放下不得下語不得無語不得錯舉若不錯舉即分付汝師連跳曰不要不要童曰猶是亂呌亂跳更試舉看師轉身曰某甲去也童乃付後掩關弘濟寺僧問如何是烏龍一滴水師曰虗涵萬象僧擬議師以杖趂曰不宿死屍問釋迦出世端為何事師曰貧兒思舊債僧禮拜師曰何不再問僧拂具便出師曰癡漢又恁麼去也僧參師敲門一下僧擬開口師即閉却門問文殊起佛見法見聲未絕師曰闍黎當受山僧頂禮僧擬開口師以手掩却師出關率眾至烏龍潭以拄杖探水曰因甚龍不見侍者向前禮拜師便打者便喝師以兩手掩耳者打筋斗而立師哂之師至大溈同慶寺祖塔坐次明維那禮塔來師曰禮者枯骨作麼明曰將謂忘却便禮拜師遂起去一日普請擇菜明維那曰我要止靜去師曰那裡不是靜明打師一掌師曰作麼明曰那裡不是靜師大笑癸酉春出山抵金陵中丞余集生請駐錫祇陀林緇白聽法者萬指未幾染微恙至七月二十二日午刻書偈擲筆而逝法嗣養拙明迎歸靈骨建窣堵波於大溈之麓蘇州府鄧尉山漢月法藏禪師生緣梁溪蘇氏自幼圓顱於本邑德慶及長讀高峰錄有疑歷十餘秋至三峰掩死關聞折竹聲忽然大徹時天童旺化金粟師往謁焉值童上堂舉僧問古德朗月當空時如何德曰猶是階下漢僧曰請師接上階德曰月落後相見童乃顧師曰且道月落後又如何相見師拂具便出開爐即命首眾住後上堂僧問如何是第一玄師曰不是涅槃心如何是第二玄師曰亦非正法眼如何是第三玄師曰三世諸佛只自知六代祖師口難宣僧作禮師曰汝既知時節吾今不再三乃舉盤山曰向上一路千聖不傳慈明曰向上一路千聖不然徑山曰向上一路熱盌鳴聲師曰不傳不然熱盌鳴聲我今無說汝亦無聞下座以拄杖旋風打散上堂年年冬寒夏熱朝朝夜暗晝明使得十二時辰看看能有幾人喝一喝曰太平本是將軍致不許將軍見太平病起上堂山僧前日通身是病晝夜攢簇不得何啻四百四病正當病時病亦是病藥亦是病那知更有箇不病者及至病退身安從前寒熱眾苦相貌總不知向甚處去也三百骨節八萬毛竅一一抖得乾乾淨淨徧覓病源了不可得始信者髑髏皮袋裡面直是安置伊不得病與不病是甚麼閑大眾祇是一箇身子且道因甚有兩樣喝一喝曰夜塚髑髏原是水客盃弓影竟非蛇箇中無地容生滅笑把遺編篆縷斜上堂未離兜率已降王宮未出母胎度人已畢拈起拄杖曰者上座甚麼劫中成佛來僧出眾曰容某甲說道理得麼師曰大喻三千小喻八百祇要恰者上座意便了僧曰拘留孫佛劫中某却與者上座同參直至如今團不圓分不開無數知識出世例皆懡㦬放過和尚明鑒是神通是三昧師曰眼若不睡諸夢自除僧掀倒几案師下座顧大眾曰三峰今日死中得活上堂露柱脚跟穩密燈籠眼界光明閱徧五湖禪客握草盡作黃金驀然枕子墮落𡎺殺堅牢地神一向點胸點肋到此漫不關情山僧真實相告又道平地陷人喝一喝曰海枯終見底人死不知心師舉百丈再參馬祖被祖一喝丈直得三日耳聾頌曰盡道英雄志可伸長驅席捲見精神葫蘆谷斷燎天火一馬為龍得幾人僧問如何是安隱境師曰石幢倒卓門前水樹骨橫撐殿後山曰如何是安隱家風師曰黑袈裟下雲承座白楖𣗖邊風逗人曰如何是安隱禪師曰坐到月圓香未過臥教日出粥方粘曰如何是安隱事師曰鐘聲過後催廚版經韻消時接夜香曰無眼耳鼻舌身意意旨如何師曰牀下龍眠雲半夜石邊鳥宿露初更問未雨已前時如何師曰凍草帶殘雪寒花夾野雲曰正雨時如何師曰陰陰煙霧裡落落數家村曰忽然傾倒時如何師曰大江初漲白孤嶼不停雲曰雨收雲散又作麼生師曰芒鞵携短杖隨意過橋東師室中甞舉竹篦子話勘驗學者稍或擬議便痛打出崇禎乙亥七月示疾侍者問如何是身後事師曰牀頭老鼠偷殘藥壁上孤燈照舊衣者復問師舉手曰放下幔子著遂酣睡至中夜索浴更衣而逝塔建本山破山海明禪師西蜀蹇氏子也弱冠得度從慧法主聽楞嚴咨疑不決遂出蜀住破額山單丁三載忽於經行之際見一平世界不覺墮巖損足至半夜翻身痛劇忽省呌曰屈屈一居士曰師脚痛耶師劈面掌曰非汝境界尋參博山雲門後謁天童童問那裡來師曰雲門曰幾時起身師曰東山紅日出童曰東山紅日出干汝甚麼事師曰老老大大猶作者箇語話童曰你者些絡索從那裡得來師震威一喝便出次日同僧入方丈童命裡首坐師曰昨日走得今日走不得也童曰作賊人心虗師曰是賊識賊童頷之命蒞第二座入室次童問內不放出外不放入正恁麼時以何為界師曰竿頭絲綫從師弄不犯清波意自殊便出崇禎己巳出世禾之東塔入院上堂拈香祝聖畢復拈曰此一瓣香斧斫不開刀劈不破一任風吹雨打遂成乾屎橛撞著忤逆兒孫不辭拈出爇向爐中供養現住金粟廣慧傳曹溪正脉三十四世密雲悟和尚用酧法乳斂衣坐曰香已拈了更要說箇甚麼山僧素志本欲深棲巖竇隱跡過時不意撞夥鐵面皮居士善具辣手慣會拏雲拽入者保社開張臭口說幾句燥皮胃話以光法門山僧自揣愚劣不會打葛藤只好舉則古人住院因緣以塞來命昔日簡禪師入院曰圓通不開生藥舖單單只賣死猫頭不知那箇無思算喫著通身冷汗流者老漢住院還有箇死猫兒頭賣弄腥羶遂引蒼蠅成群作隊山僧今日到院也無死猫頭賣亦無生藥舖開以手作擎缾勢曰單單只有者箇大眾且道者箇是甚麼曹山好顛酒破山喫著曹山酒醉得通身俱是口瞎禿光兒罵上天又來拈棒打顛狗驀拈拄杖卓一卓曰還知麼知則途中受用不知則世諦流布喝一喝下座後住夔州萬峰太平禪寺據室曰萬峰山頂別人間上有梧桐開合歡不是假鷄棲泊處箇中唯許鳳凰參顧視左右曰有麼有麼時一居士向前問訊師曰鷄棲鳳巢非吾同類上堂僧問不參禪不念佛只學無心應萬物師曰那裡是汝無心處進曰無心豈有處師驀頭一棒曰者箇聻僧無語乃曰者箇事二乘膽喪十地魂驚所以古人道有一物明歷歷黑漆漆上拄天下拄地常在動用中動用收不得大眾既在動用中為甚麼收不得速道速道上堂值驢鳴師曰平地起骨堆虗空墮地走撞著瞎驢鳴將謂獅子吼震威一喝下座石帆岳司馬問法臘多少師竪一拳岳勃然變色曰我東南水窟地方人民老實莫在者裡惑亂人師曰貧道行脚十五年今日惑亂者一箇岳曰惑亂我則可只恐惑亂愚人師曰阿誰是愚人岳瞪目視之曰我也是路見不平見你年幼未是你做底時節師曰釋迦老子初出母胎指天指地難道也是年幼未是時節麼岳曰所以雲門要一棒打殺我今日一棒打殺你且作麼生師乃作怕勢曰貧道性命幾乎喪在門下岳躍然拜別僧問如何是一六開天師曰竹密山齋冷曰如何是二五成性師曰荷開水殿香問迷者迷醒者醒如何是獨脫一句師曰八角磨盤空裡走曰不會師曰不會別參曰參箇甚麼師曰八角磨盤空裡走問學人終日喫飯不曾齩著一粒米時如何師曰一箇斑鳩九隻鳥月潭法主問還是悟有悟無師曰放下有無來向你道主作聽勢師曰慣會裝聾作啞主曰我是真聾師曰真龍何不上天去師不安維那問曰和尚尊候如何師曰七七八八那曰七七八八還是好耶不好耶師曰一任卜度康熙六年丁未示寂於梁山雙桂堂世壽七十一僧臘四十四有語錄十二卷行世杭州府徑山費隱通容禪師閩之福清何氏子年十四依鎮東慧山落䰂首參壽昌提無字話工夫純切遽忘寢食忽一日覺身世俱空話頭脫落目前虗逼逼地問昌曰今日看破和尚家風了也昌曰汝有甚麼見處師便喝次參雲門博山往返至再不能了手天啟壬戌聞天童寓吼山師冒雨往謁問覿面相提事若何童便打師曰錯童又打師震威一喝童復打師又喝至第七棒平生伎倆知見泮然氷釋後上天台省覲童問熏風自南來殿閣生微涼汝作麼生會師曰水向石邊流出冷風從花裏過來香曰離此又如何師曰放和尚三十棒曰除却棒又作麼生師便喝曰喝後聻師曰更要重說偈言童休去既而隨童赴黃檗未幾命師繼席焉開堂日僧問昔從黃檗去今向黃檗來作麼生道箇無來去底事師曰頭頂天脚踏地曰黃檗消息更如何師便喝曰砂盆雖破家風猶在師曰與闍黎無干問如何是奪人不奪境師曰打教髑髏穿曰如何是奪境不奪人師曰掀翻坐具地曰如何是人境兩俱奪師曰一并收下曰如何是人境俱不奪師曰一任𨁝跳上堂今朝初一好箇消息若還不會又是明日所以道舉一不得舉二放過一著落在第二山僧舉一了也是汝諸人如何委悉便下座上堂向上無門撥不開折旋俯仰幾多回等閒踏倒珊瑚樹格外風光特地來如是則轉短壽為長年改粟柄為禾莖不是曩劫培成亦非今時造就且道端的在甚麼處千紅萬紫從君看那把春風度與人上堂全身擔荷赤體提持要是夙有器骨英靈漢子於尋常日用活卓卓地不將奇特言句貼於額頭玄妙理致蘊於底裡專用格外鉗錘獨距宗門牙爪生擒猛虎活捉獰龍縱有言超佛祖行過舍那入此閫域未免橫身拶出其餘之輩觀心作念著意思惟塵寂光生而有神穎妙慧自作去就畢竟搆他語脉不上要有者等丁卓始可別行教外單傳直指主持棒喝全行正令而與從上瞎驢蹄角相似且正當恁麼時回機就位一句作麼生道本來不借修行得那說心明與法通卓拄杖下座臘八上堂凍餓雪山欲斷腰明星忽現便成妖當時我若同斯會劈脊攔腮定不饒何以家無白澤之圖必無如是妖怪雖然如是還有為釋迦老漢出氣者麼有則不負今日供養其或不然莫怪山僧揩死蛇頭好遂以拄杖一時打散住天童上堂入大寶剎登大法壇吹大法螺擊大法鼓演大法義顯揚臨濟宗猷提持向上一路指縱則萬別千差透脫固一字也無到者裡先師面目現在太白風規猶古摧邪挽正據真鋤偽直得四海沸騰五嶽起舞佛祖於是歡呼龍象自此奔馳乃至若貴若賤是凡是聖四眾普集俱在一處人天交接兩得相見都教箇箇機契單傳人人悟同本得然則即此大寶剎大法壇鐘鼓喧天法雷震地靈山勝會宛然見深沐皇恩不等閒便下座住徑山上堂天空地濶山高水長如鵬博萬里扶搖自在朝陽峰下祥光滿目晏坐當軒八面玲瓏盂峰頂香積成堆更有大人擁護其間頭頭彰寶所一一顯真機心目所知手足所到無非是格外乾坤古佛家風從緣薦得帀地優曇就體消停荊棘橫生所以學道人貴乎緣境會心從心了境心境一如方名解脫始信古人謂通玄峰頂不是人間心外無法滿目青山忽然灑落時又作麼生山月如銀牽我興閒行不覺到峰西卓拄杖下座小參舉雪峰示眾曰南山有一條鼈鼻蛇汝等諸人切須好看師曰蛇無頭不行長慶曰今日堂中大有人喪身失命師曰張開蛇口雲門以拄杖攛向面前作怕勢師曰露出蛇斑僧舉似玄沙沙曰須是我稜兄始得師曰與蛇揩癢雖然如是我却不與麼僧曰和尚作麼生沙曰用南山作麼師曰跳出蛇窟乃曰當時雪峰會裡者一群蛇今日被山僧挑向拄杖頭上要教他生也得要教他死也得要教他不生亦得要教他不死亦得所謂把住則四方無路放行則草叢裡輥現前兄弟還有與古人出氣者麼有則出來為蛇畵足無則山僧放者一群蛇齩殺汝諸人去也以拄杖一時打退小參舉古人曰百丈三日耳聾不在馬祖一喝邊黃檗吐舌不在百丈耳聾處是汝諸人還識百丈黃檗麼若識得他二人到方丈來喫一鍾茶一僧隨後至曰裝聾作啞師曰那箇裝聾是誰作啞僧無語師曰將成九仞猶欠一簣師問靈機曰興化打克賓意旨如何機曰憐兒不覺醜師曰既打趂何謂憐兒機曰也要和尚具隻眼師便掌曰要我具隻眼那機曰不是某甲恁麼道爭見得和尚又一日問機曰世尊拈花意旨如何機驀竪一拳師曰不得喚作拳頭又作麼生機打師一拳師打機一棒曰且道是賞是罰機曰少賣弄師頷之師每問眾曰衣帶下一綫清風意旨如何僧多答師皆不諾於順治庚子二月十九日寂於福嚴壽六十九依法闍維得舍利光燦者無數嗣法弟子輩分散舍利建塔金粟福嚴黃檗諸處有語錄二十卷行世嘉興府金粟石車通乘禪師金華朱氏子依天真海藏脫白稟具顯聖徧參諸方終不自肯後謁天童於金粟頓契玄旨呈偈曰我手何似佛手赤脚蓬頭便走直透向上玄關管教合取狗口童肯之執侍七載先出世杭之隆慶次繼席金粟上堂諸佛出世為一大事因緣達磨西來直指人心見性成佛金粟不諳老婆禪只要諸人棒下見血若也恁麼會得觸處逢渠纖毫不立垂手人間和光化物既然觸處逢渠且道渠是阿誰毫釐有差天地懸隔喝一喝上堂僧問人天交接兩得相見如何是相見底事師曰相逢不相識如何是賓中主師曰對面未相許如何是主中賓師曰一棒沒疎親如何是主中主師曰腦後掇乾坤賓主已蒙師指示頂𩕳一著事如何師曰穿過鼻孔僧禮拜乃曰問在答處互作主賓答在問處同氣相親且問諸人無問無答合作麼生直饒神光不昧萬古唯真若恁麼會驢年未夢見在大眾畢竟作麼生道驀拈拄杖畫一畫曰畫斷多年爛葛藤括地清風赤骨𩪸上堂玄機透徹左右逢源以心契心流通正脉統三界以為家作四生之依怙宏開不二之門揭示頂門正眼放出陝府鐵牛踏殺嘉州大象正當恁麼時且道甚麼人證據顧左右曰任從滄海變終不與君通上堂少室真機人天普育直指父母未生面目大眾有眼皆見有耳普聞且作麼生是未生前面目良久曰牆外鳥啼聲已碎盡在搖頭不語中喝一喝上堂不寒不熱火柴頭撥動些兒𪹼地流從此一番親煅煉縱橫無礙任悠悠若也見得不須畫地為牢其或未然燒却眉毛有幾莖解制上堂拄杖本無彼此趂出一群獅子驀然擲地翻身休得人前露齒騰騰獨步大方不涉和泥合水正當恁麼時還有翻擲底麼擲拄杖曰橫身芳草綠回顧落花紅小參扶揚宗乘須恁麼人知恁麼事具格外眼透頂透機敲骨取髓不落窠臼如奔流度刃石火電光非真獅子那堪翻擲豈不見臨濟初至河北住院時對普化克符二上座曰我欲於此建立黃檗宗旨汝二人可成褫我二人便珍重下去三日後普化問曰和尚三日前說甚麼師便打又三日後克符問曰和尚打普化作甚麼師亦打三尊宿一挨一拶摩觸家風威神凜凜天魔膽喪文殊普賢削迹吞聲天下老和尚聞風結舌正恁麼時且道還有建立宗旨底麼良久喚侍者者應諾師打曰普請喫茶僧問如何是父母未生前師曰無孔鐵錘曰生後如何師曰髑髏粉碎問向上一句即不問歷代相傳事若何師曰鼻孔拖地曰如何是無得無傳底句師便掌問如何塵中能作主師曰撒手見青天曰如何化外自來賓師曰一棒一條痕崇禎戊寅春示疾僧問此後向甚處與和尚相見師曰徧界不曾藏僧作禮曰恁麼則向者裡相見去也師曰莫錯認遂泊然而逝世壽四十有六塔於本山之左贛州府寶華朝宗通忍禪師毗陵望族幼習儒業輙念生死弱冠投靖江獨知披剃遂謁天童於金粟童舉大千禪師垂語曰山中猛虎以肉為命何故不貪其子被童逼拶坐臥不安經兩旦驀然除去礙膺之物趨見童下語曰惟人自肯乃方親童曰亦未在師笑曰和尚只做得大千兒孫便出已而聞童自答曰自肉食不盡方大徹翌日童上堂師問直下知歸則不問如何大用現前一句童纔拈棒師指曰者老漢伎倆不忘一釣便上拂具而出出住曹山上堂僧問如何是心識不到處師曰逼塞虗空曰轉機不圓時如何師曰橫抽寶劍乃舉世尊因文殊起法見佛見被世尊威神攝向二鐵圍山白雲端和尚曰大眾世尊當時無大人相如今有向承天者裡起法見佛見承天終不敢動著他何謂如此但得雪消去自然春到來五祖演和尚曰白雲則具大慈悲遂拍手曰曼殊室利普賢大士不審今後更敢也無自曰一度被蛇傷怕見斷井索世尊白雲五祖三大老將謂扶竪綱宗要且未透末後句在曹山則不然忽有向者裡起法見佛見每人分半院與他何謂如此一掌不獨拍兩掌鳴聒聒同死亦同生還如虎戴角卓拄杖下座住曹溪上堂拈香畢乃曰諸佛諸祖惟以一大事因緣不用開口不用動念直下一一天真一一明妙祇貴直截契證超越死生不離見聞緣超然登佛地所以世尊於明星祇得一覩六祖於金剛經直用一聞諸公若也得恁麼一回去便堪傳佛心印方為佛祖嫡骨兒孫所以靈山會上世尊拈花迦葉微笑便乃親傳世尊之印謂之正法眼藏西天四七東土二三傳至第三十三世本山六祖大師謂之吾有一物後得南嶽讓禪師道箇喚作一物則不中便乃親傳六祖之印自讓為始直下傳至三十五世不肖孫通忍於天童和尚自肉食不盡言下打破漆桶親蒙印授潛心操履有年方乃深契佛祖之道方不媿為六祖嫡孫所以本山乃六祖說法之地今日承南都諸護法會合本省現任諸護法命本山耆舊不遠三千餘里迎不肖歸祖師之舊室登祖師之舊堂陞祖師之舊座舉揚祖師底現成舊公案直令千年舊事頓現目前曹溪一會儼然未散試問諸人既是現成舊公案又用舉作甚麼迴機同本得一舉一回新復舉六祖傳衣之後隱於四會獵中十五年一日忽念說法時至遂至廣州法性寺暮夜風揚剎旛聞二僧對論一曰旛動一曰風動往復不已祖曰不是風動不是旛動仁者心動一眾竦然二僧平地起干戈一得一失六祖按牛頭喫草雙放雙收檢點將來總欠一著在竪拂子召大眾曰還見麼只者本來真面目風旛未動絕安排下座浴佛上堂舉徑山大慧禪師上堂曰毗藍園裡不曾生雙林樹下何曾滅不生不滅見瞿曇眼中又是重添屑徑山老人雖然把斷要津大似只見錐頭利曹溪則不然毗藍園裡不生生雙林樹下不滅滅生生滅滅見瞿曇分明惡水當頭潑眼既無屑又用水潑作麼若是接物利生打頭也少者一杓不得乃顧左右喝一喝曰你諸人因甚一箇箇水漉漉地下座元旦上堂召大眾曰無位真人又添一歲了也你們今日到處與人拜年還曾與無位真人拜拜也未若也拜得方知恩大難酬若也未曾寶華今日為諸人立箇榜樣乃起身拱揖曰恭喜恭喜便下座復有僧問正當拱揖時無位真人在甚麼處師曰不見道兒孫得力室內不知小參僧問明歷歷露堂堂更有甚麼師曰猶是鬼窟裡底活計僧打一圓相曰脫體無依去也師曰依舊跳不出問譬如本色真金未入洪爐煅煉時如何師曰光明燦爛曰煅煉後如何師曰燦爛光明曰石頭土塊還堪煅煉也無師打曰且道是真金是土塊問日輪正當午虗空絕點埃時如何師曰喚甚麼作日輪曰更無別箇師曰添了一點也僧一喝師打曰更無別箇尚道添了一點又喝作甚麼僧無語乃曰日輪正當午虗空絕點埃若道更無別箇早添一點了也所以認箇明歷歷露堂堂猶是鬼窟裡底活計到者裡須有箇透脫處方得光明燦爛燦爛光明情與無情一時成佛真金土塊煅與未煅向甚麼處分若也未透須是全身放下不教一物存留自然一踏到底倘不放下未免迷頭認影若已透得亦不可放過倘一放過所謂一刻不在如同死人直得如大死却活一般無一點氣息無一毫滲漏二六時中似水合水似空合空方有少許相應分曹溪今日說平實禪汝等諸人還委悉麼菴內不知菴外事歸家穩坐絕商量小參僧問巍巍堂堂澂澂湛湛當下不能承當未審過在甚麼處師曰只為多了者些閒家具曰檢點將來也不多師打曰為甚麼不承當僧無語師乃曰若論此事須是雲開日出方得無分別智現前從無分別中終日分別正分別此無分別底謂之無舌人語以無分別中能生種種分別謂之根本智從無分別智後得有分別所以有分別智謂之後得恁麼也不得不恁麼也不得恁麼不恁麼總不得者裡何處著得思惟分別來若也透得豈不是無分別智恁麼也不得不恁麼也不得恁麼不恁麼總不得只者豈不是分別然正分別此無分別底所以曰善能分別諸法相於第一義而不動喚作竹篦則觸不喚作竹篦則背不得有語不得無語不得向意根下卜度不得颺在無事甲裡不得向舉起處承當一切總不得速道速道纔開口便打出者裡又何處著得思惟分別來若也透得豈不是無分別智喚作竹篦則觸不喚作竹篦則背不得有語不得無語不得向意根下卜度不得颺在無事甲裡不得向舉起處承當纔開口便打出只者豈不是分別者無分別底所以從上古人亦有領略其旨未能得到無分別田地命根不斷活了不死不得受用所以道如人斫樹須根上一刀則命根方斷又有得到無分別境界一坐坐住快活自在更不理會雖或解截斷天下人舌頭不解無舌人語總皆死了不活所以曰懸崖撒手自肯承當絕後再甦欺君不得到者裡截斷天下人舌頭正是無舌人語無舌人語正截斷天下人舌頭若非死盡偷心㘞地一下透脫淨盡安得有此真實受用從上為人方便已盡情向諸人傾倒了也只是者下子無人替汝著力珍重師遊琵琵街回僧問如何是善知識師曰琵琶街上行曰如何不是善知識師曰你不信也去行一行來問如何是寂然不動師曰七縱八橫曰如何是感而遂通師曰推門落臼居士問月缺一條還補得麼師曰補得曰將甚麼補師曰但將缺底補問狗子佛性趙州因甚道無師曰一字入公門九牛拔不出天主教問人是佛否師曰是佛曰以何為佛師曰自性即佛曰師還拜佛否師曰拜佛曰若然則拜自己也師曰西天外道果然靈利曰世間那有自己拜自己底事師曰疑則別參宛委王鎮國請齋於金陵報恩寺時司𡨥錢勳卿張璽卿趙廷尉葉冏卿同泰如講主契玄僧錄俱在座講主曰達磨西來不立文字後來以楞伽四卷印心也是自相矛盾師曰將謂楞伽經是文字麼主無語一眾大笑問債女離魂那箇是真底師便打僧無語師曰會麼僧擬議師又打曰切忌私奔師問僧那裡人曰蘇州師踢椅曰是甚麼僧無語師曰虎丘山也不識乃叱出順治戊子示寂弟子依法茶毗頂骨牙齒衣環不壞建塔於龔公山右常州府龍池萬如通微禪師嘉禾張氏子出家興善後遊方參天童入門便喝童曰胡喝亂喝師又喝童曰胡喝亂喝師禮拜童打曰再喝喝看師曰蒼天蒼天茶畢禮出童曰我直下疑你者兩喝道道看師曰歇歇與和尚道便行崇禎十三年開法如如次移曹山後補龍池上堂前三三後三三箇中消息許誰諳春風處處花成錦秋水澄澄月一灣喚作真如不壞法此人曾未踏鄉關喚作無常生死法管教累劫受餘殃敢問諸人畢竟如何即是以拂子打圓相曰生佛未形消息在不知幾箇肯擔當遂擲下拂子上堂宗門一著離言說萬象森羅早漏洩睦州擔版趙州無看來猶是多饒舌不饒舌頓超越陝府鐵牛吼一聲滄州獅子喫一跌旁觀撫掌笑呵呵六月炎天飛白雪喝一喝上堂威音那畔空劫已前者一著子未甞動著一絲毫及乎萬姓紛紜千差顯露者一著子亦未甞動著一絲毫只貴靈利漢子直下承當便能得大受用苟或三搭不回豈免沉迷苦海祇如龍潭吹滅紙燈德山見甚道理便爾自肯蝦蟆吞大蟲上堂舉法眼問覺鐵嘴近離甚處覺曰趙州眼曰承聞趙州有栢樹子話是否覺曰無眼曰往來皆謂僧問如何是祖師西來意州曰庭前栢樹子上座何得道無覺曰先師實無此語和尚莫謗先師好龍池有五十拄杖十拄杖打者僧不合問祖師西來意十拄杖打趙州不合道庭前栢樹子十拄杖打法眼不合道有此語十拄杖打覺鐵嘴不合道無此語還有十拄杖待打箇人忽有師僧出來山僧劈脊便棒曰只者漆桶上堂水中鹽味色裡膠青決定是有難見其形拈拄杖曰拄杖子朝到西天暮歸東土窮年歷歲不曾遇著一人何故從來無伴侶在處獨稱尊上堂廣額屠兒放下屠刀曰我是千佛一數平地登高易文殊師利乃七佛之師於迦文會裡作弟子從空放下難不落因果五百生墮野狐身為甚麼却作人語不昧因果當下脫野狐身猶有野狐氣息在眾中還有知得龍池落處者麼苟或知得不妨出來剖露看如其未然不見道釋迦彌勒是他奴上堂卓拄杖喝一喝曰棒非棒喝非喝用出當陽活鱍鱍聞時何啻三日聾觸著直教親見血若是知恩解報恩丈夫意氣天然別金毛獅子奮全威野干狐狼俱屏跡大眾且道屏跡後如何天下太平各安其業舉溈山問雲巖曰承聞子在藥山是否巖曰是溈曰藥山大人相作麼生巖曰涅槃後有溈曰如何是涅槃後有巖曰水灑不著雲巖却問百丈大人相作麼生溈曰巍巍堂堂煒煒煌煌聲前非聲色後非色蚊子上鐵牛無汝下嘴處雲巖摹擬藥山大人相竭力形容只得一半溈山形容百丈大人相雖是當陽不昧可惜裝點太多如有人問龍池天童大人相作麼生即向伊道僧繇難下手道子枉勞心舉洞山曰須知有佛向上事僧問如何是佛向上事洞山曰非佛雲門曰名不得狀不得所以言非二老漢恁麼道只道得佛向下事若是佛向上事恐未得在且道如何是佛向上事拈拄杖卓一下曰父母所生口終不為汝說舉保寧勇禪師曰風鳴條雨破塊曉來枕上鶯聲碎蝦蟆蚯蚓一時鳴妙德空生都不會三箇成群四箇作隊向前村後村折得棃花李花一佩兩佩保寧恁麼道雖則風流逸格事理雙彰未免向百花爭艶處著脚若是秋空皎月木落飄金千山露骨萬水澄渟總未知消息在僧問樹凋葉落時如何師曰過蟻難尋穴歸禽易見巢問日落西山去林中事若何師曰虎行樵子徑鳥宿故枝頭師闡化龍池十有餘載順治丁酉冬告寂塔建本山
