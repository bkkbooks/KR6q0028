body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十七世育王諶禪師法嗣台州府萬年心聞曇賁禪師永嘉人上堂一見便見八角磨盤空裡轉一得永得辰錦朱砂如墨黑秋風吹渭水已落雲門三句裡落葉滿長安幾箇而今不被瞞竪拂子曰瞞得瞞不得總在萬年手裡還會麼華頂月籠招手石斷橋水落捨身巖住江心病起上堂維摩病說盡道理龍翔病咳嗽不已咳嗽不已說盡道理說盡道理咳嗽不已汝等諸人還識得其中意旨也未本是長江湊風冷却教露柱患頭風僧問百丈卷席意旨如何師曰賊過後張弓四明太守以雪竇請師辭以偈曰鬧藍方喜得抽頭退鼓今方打未休莫把乳峰千丈雪重來換我一雙眸寧波府天童慈航了朴禪師福州人上堂酷暑如焚不易禁炎炎赫赫欲流金夜明簾外無人到靈木迢然轉綠陰上堂久雨不晴半睡半醒可謂天地合其德日月合其明四時合其序鬼神合其吉㐫遂喝曰住住內掛已成更求外象卓拄杖曰適來擲得雷天大壯如今變作地火明夷上堂牛皮鞔露柱露柱啾啾呌燈籠佯不知虗明還自照殿脊老蚩吻聞得呵呵笑三門側耳聽就上打之遶譬如十月菊開徹阿誰要阿呵呵未必秋香一夜衰慰斗煎茶不同銚室中問僧賊來須打客來須看祇如三更夜半人面似賊賊面似人作麼生辨上堂觀音巖玲玲瓏瓏太白石丁丁東東西園菜蟥似不堪食東谷花發却無賴紅且道是祖意教意途中受用世諦流布若辨不出雪峰覆却飯桶若辨得出甘贄禮拜烝籠參上堂德山入門便棒臨濟入門便喝臨濟喝處德山棒頭耳聾德山棒時臨濟喝下眼瞎雖然一搦一擡就中全生全殺遂喝一喝卓拄杖一下曰敢問諸人是生是殺良久曰君子可入延平府西巖宗回禪師婺州人久依無示深得法忍因寺僧以茶禁聞有司吏捕知事師謂眾曰此事不直之則罪坐於我若自直彼復得罪不忍為也令擊鼓陞座說偈曰縣吏追呼不暫停爭如長往事分明從前有箇無生曲且喜今朝調已成言訖而逝高麗國坦然國師少嗣王位欽慕宗乘因海商方景仁抵四明錄無示語歸師閱之啟悟即棄位圓顱作書以語要反四威儀偈令景仁呈無示示答曰佛祖出興於世無一法與人實使其自信自悟自證自到具大知見如所見而說如所說而行山河大地草木叢林相與證明其來久矣後復通嗣法書其略曰生死海中曠劫難渡得遇本分宗師以三要印子騐定其法實謂盲龜值浮木孔耳杭州府龍華無住本禪師廣德人上堂舉雲門拈起胡餅曰我祇供養兩浙人不供養向北人眾無語門自代曰天寒日短兩人共一椀師曰韶陽老漢言中有響痛處著錐檢點將來翻成毒藥諸人要會麼半在河南半河北一片虗凝似墨黑冷地思量愁殺人叵耐雲門者老賊賊賊下座更不巡堂道場明禪師法嗣臨江府東山吉禪師因李朝請與甥薌林向居士子諲過謁問家賊惱人時如何師曰誰是家賊李竪起拳師曰賊身已露李曰莫塗糊人好師曰贓證見在李無語師示以偈曰家賊腦人孰奈何千聖回機祇為他徧界徧空無影跡無依無住絕籠羅賊賊猛將雄兵收不得疑殺天下老禪和笑倒鬧市古彌勒休休不用將心向外求回頭瞥爾賊身露和贓捉獲世無儔世無儔真可仰從茲不復誇伎倆怗怗安家樂業時萬象森羅齊撫掌道場慧禪師法嗣杭州府靈隱懶菴道樞禪師吳興四安徐氏子初住何山次移華藏隆興初詔居靈隱孝宗召至內殿問禪道至要師答曰此事在陛下堂堂日用應機處本無知見起滅之分聖凡迷悟之別第護正念則與道相應情却物則業不能繫盡去沉掉之病自忘問答之意矧今補處現在佛般若光明中何事不成現邪上為首肯示眾仙人張果老騎驢穿市過但聞蹄撥剌誰知是紙做後退居明教永安蘭若逍遙自適有偈題於壁曰雪裡梅華春信息池中月色夜精神年來不是無佳趣莫把家風舉似人淳熙丙申八月示微疾書偈而逝塔於永安光孝慜禪師法嗣廣德州光孝悟初首座分座日示眾舉風幡話至仁者心動處乃曰祖師恁麼道賺殺一船人今時衲僧也不可恁麼會既不恁麼會畢竟作麼生良久曰六月好合醬切忌著鹽多大鑑下第十八世淨慈一禪師法嗣寧波府天童息菴達觀禪師義烏趙氏子初參應菴於天童次見無菴於道場後於淨慈水菴室中明得二老垂手處一語破的而返至龍翔栢堂分第一座後開法嚴州靈巖閱四剎自金山被旨陞靈隱上堂舉二祖問達磨安心公案頌曰長安深夜雪漫漫欲覓心安轉不安縱使言前開活眼那知已被老胡謾袁州府仰山簡菴嗣清禪師上堂舉達磨大師一日謂門人曰時將至矣汝等盍各言所得乎最後慧可出禮三拜依位而立磨曰汝得吾髓師頌曰揑目生華立問端得他皮髓被他謾者般瞎漢能多事六月無霜也道寒道場全禪師法嗣常州府華藏伊菴有權禪師昌化祁氏子年十四得度十八參佛智於靈隱時無菴居第一座室中以從無住本建一切法為問師久而有省答曰暗裡穿鍼耳中出氣菴可之遂密付心印甞夜坐達旦行粥者至忘展鄰僧以手觸之師感悟說偈曰黑漆崑崙把釣竿古帆高挂下驚湍蘆華影裡弄明月引得盲龜上釣船佛智常問心包太虗量廓沙界時如何師曰大海不宿死屍智撫其座曰此子他日當據此座呵佛罵祖去在師益自韜晦復見應菴於歸宗參大慧於徑山洎無菴住道場命師分座住後上堂今朝結却布袋口明眼衲僧莫亂走心行滅處解翻身噴嚏也成獅子吼栴檀林任馳驟剔起眉毛頂上生剜肉成瘡露家醜上堂禪禪無黨無偏迷時千里隔悟在口脣邊所以僧問石頭如何是禪頭曰㼾甎又僧問睦州如何是禪州曰猛火著油煎又僧問首山如何是禪山曰猢猻上樹尾連顛大眾道無橫徑立處孤危此三大老行聲前活路用劫外靈機若以衲僧正眼看來不無優劣一人如張良入陣一人如項羽用兵一人如孔明料敵若人辨白得可與佛祖齊肩忽有箇衲僧出來道長老話作兩橛適來道道無橫徑無黨無偏而今又却分許多優劣且作麼生祗對還委悉麼把手上山齊著力咽喉出氣自家知宋孝宗淳熈庚子秋示微疾書偈趺坐而逝茶毗齒舌不壞獲五色舍利無數塟於橫山餘骼塔萬年寺左焦山體禪師法嗣寧波府天童癡鈍智穎禪師舉達磨見武帝因緣頌曰提起須彌第一鎚玉關金鎖擊難開重施背踏空勞力應悔迢迢萬里來茨菴堯應入此增集載一卷二十七紙以版失無從錄入徑山印禪師法嗣鎮江府金山退菴道奇禪師僧問雪峰道望州亭與汝相見了也意旨如何師曰左眼半斤曰烏石嶺與汝相見了也聻師曰右眼八兩曰僧堂前與汝相見了也又且如何師曰鼻孔大頭向下曰只如鵞湖驟步入方丈保福入僧堂又作麼生師曰水向石邊流出冷風從華裏過來香上堂此段大事無處不周新焦山未離東霞時已與諸人相見了也且道相見底事作麼生幾多頭角成龍去蝦蟹依前努眼睛上堂至道本乎無心心法本乎無住無住心體靈知不昧性相寂然所以道吾打鼓四大部洲同參拄杖橫也挑幹乾坤大地盂展也覆却恒河沙界到者裡象王行處狐兔絕蹤水月現時風雲自異古今收不得歷劫不知名千聖立下風誰敢當頭道咄我王庫內無如是刀鎮江府金山蓬菴自聞永聰禪師杭之於潛徐氏子幼依本邑資福出家十五從父遊徑山慕別峰機辯警拔白父願學焉峰器之育王天童當䂐菴密菴全盛時師往來兩公間十餘年後遊閩越江東西湖南北凡遇名流反復博約雍容婉辭盡底蘊廼已出世台州淨慧徙金陵保寧蔣山轉金山終焉壽六十五臘五十七雙林用禪師法嗣金華府三峰印禪師上堂舉百丈野狐話頌曰不落不昧誣人之罪不昧不落無繩自縛可憐柳絮隨風舞有時自西還自東龜峰光禪師法嗣杭州府徑山蒙菴元聰禪師福州朱氏子於晦菴會中得心要眾推為高弟慶元丁巳自福之雪峰被旨遷徑山上堂舉藥山首造石頭次參馬祖有悟乃曰某甲在石頭如蚊子上鐵牛機緣頌曰倒腹傾腸說向伊不知何故尚遲疑只今便好猛提取莫待天明失却雞上堂舉趙州一日在東司上見文遠過驀召文遠遠應諾州曰東司上不可與汝說佛法頌曰明明道不說此理憑誰識春風一陣來滿地華狼藉送行者求僧偈曰山前麥熟雨初晴桑柘青連柳色新毫髮不存風骨露頭頭總是比丘身十月十四日示寂塔本山大溈行禪師法嗣常德府德山子涓禪師潼川人上堂見見之時見非是見見猶離見見不能及喝一喝曰鯨吞海水盡露出珊瑚枝眾中忽有箇衲僧出來道長老休寐語却許伊具一隻眼上堂橫按拄杖曰一二三四五六七七六五四三二一循環逆順數將來數到未來無盡日因七見一見一亡七踏破虗空鐵牛汗出絕氣息無踪跡擲下拄杖曰更須放下者箇始是參學事畢上堂拈拄杖曰有時奪人不奪境拄杖子七縱八橫有時奪境不奪人山僧七顛八倒有時人境兩俱奪拄杖子與山僧削迹吞聲有時人境俱不奪卓拄杖曰伴我行千里携君過萬山忽然撞著臨濟時又且如何喝一喝曰未明心地印難透祖師關大洪證禪師法嗣蘇州府萬壽月林師觀禪師福州侯官黃氏子僧問三聖道逢人則出出則不為人意作麼生師曰錯曰興化道逢人則不出出則便為人又作麼生師曰錯曰興化旗鎗倒卓三聖肝膽齊傾師曰引不著曰只如今日和尚作麼生為人師曰一棒一條痕舉玄沙三種病話頌曰盲聾瘖瘂捉敗了也更問如何盲聾瘖瘂雲居會禪師法嗣萬松壞衲大璉禪師讚釋迦出山像曰行滿功圓徹骨窮不勝羸瘦髮髼鬆彌天罪過今無數毗舍耶中一欵供萬年賁禪師法嗣溫州府龍鳴在菴賢禪師上堂舉法眼道識得凳子周匝有餘雲門道識得凳子天地懸殊師曰法眼老漢坐殺天下人雲門大師走殺天下人龍鳴則不然識得凳子四脚著地要坐便坐要起便起上堂舉趙州勘婆話頌曰氷雪佳人貌最奇常將玉笛向人吹曲中無限傷心事祇許佳人獨自知長沙府大溈咦菴鑑禪師會稽人上堂木落霜空天寒水冷釋迦老子無處藏身拆東籬補西壁撞著不空見菩薩請示念佛三昧也甚奇怪却向道金色光明雲參退喫茶去上堂老胡開一條路甚生徑直祇曰歇即菩提性淨明心不從人得後人不得其門一向奔馳南北往復東西極歲窮年無箇歇處諸人還歇得麼休休上堂舉晦堂一日問僧甚處來曰南雄州堂曰出來作甚麼曰尋訪尊宿堂曰不如歸鄉好曰未審和尚令某歸鄉意旨如何堂曰鄉里三錢買一片魚鮓如手掌大師曰寧可碎身如微塵終不瞎箇師僧眼晦堂較些子有般漢便道熟處難忘有甚共語處上堂舉賓國王問師子尊者蘊空話頌曰尊者何曾得蘊空賓徒自斬春風桃華雨後亂零落染得一溪流水紅寧波府天童雪菴從瑾禪師永嘉楠溪鄭氏子從普安子回落髮謁心聞於瑞巖聞舉紅爐片雪話問師師擬答聞一喚師忽領旨留侍三年入閩見佛智于西禪智問甚處來師曰四明智曰曾見憨布袋麼師便喝智便打師接住棒曰和尚不得草草智曰瞎漢過者邊立心聞主江心師歸省命充維那一日問師一喝分賓主照用一時行如何是一喝分賓主師便喝聞曰者一喝是賓是主師曰賓則始終賓主則始終主聞笑曰汝又眼華了師即呈偈曰一喝分賓主依然又眼華倒翻筋斗去踏殺死蝦蟇初住儀真靈巖後遷天童僧問如何是靈巖境師曰鹿跑泉冷浸明月龍鬬港深藏白雲問如何是祖師西來意師曰夜半須彌安鼻孔曰如何是禪師曰仰面不見天曰如何是道師曰全身入荒草曰作家師曰收上堂金剛圈裡翻身築著帝釋鼻孔懸崖頭上撒手突出達磨眼睛往復三回興猶未盡機輪一轉勢不可停倒拈蝎尾婢便聲聞順捋虎鬚奴呼菩薩釋迦已滅彌勒未生佛法祖令總屬新天童手裡且把住放行如何施設良久曰無孔鐵槌當面擲普天匝地起清風上堂金槌運動三世諸佛不敢當頭法令施行外道天魔悉皆拱手峭巍巍本無攀仰淨躶躶不用安排行住坐臥不用猜疑好惡是非一時放下然後和泥合水拽杷牽犂任運縱橫總無妨礙正恁麼時且道太平一曲作麼生唱良久曰鐵船橫古渡重整舊家風宋寧宗慶元庚申七月廿三日索浴更衣書偈投筆而寂壽八十四臘七十全身塟心聞塔右有頌古最佳溫州府智門谷菴景蒙禪師溫之平陽邵氏子幼喜聞鐘梵十三披緇習台教以名相學不足了大事棄之參佛智於育王王問貴鄉師曰永嘉王曰還識永嘉大師否師擬答王喝出遂兀然如癡不知寢食者累月一日聞鐘聲忽有悟上方丈王曰還識永嘉大師否師曰即日伏惟和尚起居萬福王曰向上事又作麼生師擬對王熱棒趂出次日又上方丈王方發問師抗聲曰老漢今日敗闕也一拍而出因歸里省親見龍翔翔問言無展事語不投機承言者喪滯句者迷試向言詮不及處通箇消息師以左手畵相翔以拂左擊師以右手畵相翔以拂右擊師又畵相于中兩手托呈翔以拂畫兩畫師拜起而立翔笑曰三十年揀貓貓今日得此烏喙尋還鹿園翔以谷名師菴又甞謁顯寧志初出住智門次遷瑞巖師孤高絕俗弱不勝衣而嚴冷峻峭不可挹酌大鑑下第十九世天童觀禪師法嗣蘇州府虎丘堂善濟禪師題魚籃觀音像曰雲𩯭濃粧苦強顏為他閒事入塵寰携來活底無人買只作尋甞死貨看華藏純菴善淨禪師舉六祖風旛話頌曰不是風兮不是旛白雲盡處見青山可憐無限英靈漢開眼堂堂入死關紹興府天衣嘯巖文蔚禪師上堂舉雲門示眾人人盡有光明在看時不見暗昏昏作麼生是諸人自己光明自代曰廚庫山門又曰好事不如無師曰人人盡有光明在看時不見暗昏昏踢倒山門與廚庫此時明暗自然分栢巖凝禪師有破衲頌曰零零落落幾經年隨手拈來搭半肩午夜定回和束倒通身贏得是青天天童穎禪師法嗣杭州府徑山荊叟如珏禪師婺州人初見癡鈍鈍問如何是佛師曰爛冬瓜復呈頌曰如何是佛爛冬瓜齩著氷霜透齒牙根蔕雖然無窖子一年一度一開華又甞作偈呈癡鈍曰鍾山白刃赤身挨幾度曾經被活埋一自人亡家破後了知無位可安排住後歲旦上堂新歲擊新鼓普施新法雨萬物盡從新一一就規矩普賢大士忻歡乘時打開門戶放出白象王徧地無尋處拈拄杖曰是甚麼千年桃核裡元是舊時仁結夏小參我此一宗正令全提如暴風卒雨鼓蕩無前石火電光追奔不及舉意即迷源擡眸已錯過不是目前法莫生種種心縱汝三種互修尅期取證第二頭第三頭萬拄千撐轉見氣急殊不知髑髏未具己眼先明呱地一聲千了萬當雖然如是親證者萬無一二錯會者數有河沙佛成道頌曰六年雪嶺成何事打失從前鬼眼睛滿面慚惶無著處至今生怕見明星福建府雪峰大夢德因禪師作憨布袋贊曰杖挑布袋走紅塵底事何曾見得親業識茫茫無本據欲來開口笑他人金山奇禪師法嗣杭州府靈隱高原祖泉禪師舉鏡清在雪峰普請峰曰溈山道見色便見心還有過也無清曰古人為甚麼事峰曰雖然如是我要共你商量清曰若與麼不如某甲钁地去師曰雪峰探竿在手影草隨身若不是鏡清普請幾乎狼藉舉九祖伏䭾密多問八祖佛䭾難提父母非我親誰是最親者諸佛非我道誰是最道者話頌曰父母分明非我親祖師肝膽向人傾直下若能親薦得優曇華發火中春贈黃漢嶺開接待偈曰路繞懸崖萬仞頭行人到此盡生愁驀然得箇休歇處重疊關山任意遊萬壽觀禪師法嗣南昌府黃龍無門慧開禪師杭州良渚梁氏子母宋氏從天龍肱受業參月林於萬壽林令看狗子無佛性話經六年逈無入處乃奮志自誓曰若去睡眠爛却我身每至困時繞廊而行昏則以頭磕柱一日聞齋鼓聲有省述偈曰青天白日一聲雷大地羣生眼豁開萬象森羅齊稽首須彌𨁝跳舞三臺次日入室欲通所得林遽曰何處見神見鬼師便喝林亦喝師又喝自此機用脗合寧宗嘉定戊寅出世安吉報國次遷隆興天寧黃龍翠巖蘇之開元靈巖鎮江焦山金陵保寧理宗淳祐丙午奉旨開山護國仁皇禪寺上堂若人識得心大地無寸土古人恁麼道黃龍即不然若人識得心大地盡是土上堂是非長短耳邊風切莫於中覓異同要得八風吹不動放教心地等虗空慈受老人只解順水張帆不能逆風把柁黃龍又且不然是非都去了是非裡薦取何故聻幾度黑風翻大浪未曾聞道釣舟傾上堂三分光陰二早過懷州牛喫禾靈臺一點不揩磨益州馬腹脹貪生逐日區區者天下覓醫人喚不回頭爭奈何灸豬左膊上於斯薦得參學事畢其或未然木上座與諸人說破乃卓拄杖下座上堂趙州道南來者與他下載北來者與他上載大似世情看冷暖人面逐高低慈受道南來者與他一面笑北來者與他一面笑大似歡喜廝散笑裡有刀若是焦山又且不然南來者以平常待之北來者以平常待之也不瞋也不笑也無下也無高何故清平世界不用干戈朝陽偈曰寒時急用底物趂暖著些鍼綫忽然臘月到來免致脚忙手亂對月偈曰始見些兒光影要了末後一段若是無門拳頭不打者般鈍漢師晚年倦于槌拂菴居西湖學者猶眾理宗召入選德殿說法祈雨感應敕賜金襴法衣佛眼之號長沙府石霜竹巖妙印禪師進賢萬氏子受業於龍塘紹曇徧參留龍門光癡鈍穎最久抵蘇州萬壽謁月林入室次林問如何是祖師西來意師曰老鼠齩破燈盞林頷之歷住數剎後移石霜對月看經偈曰未動舌頭文彩露五千餘卷一時周若言待月重開卷敢保驢年未徹頭晚年築菴曰紫霞丞相趙葵燕居里第甞延師論道理宗寶祐乙卯八月二十三日書偈曰六十九年一場大夢歸去來兮珍重珍重書畢泊然而逝塔於紫霞興化府囊山孤峰德秀禪師福州連江陳氏子祝髮蘇之寒山上堂舉僧問雪峰如何是第一句峰良久僧舉似長生生曰此是第二句峰令僧問生如何是第一句生曰蒼天蒼天師曰二大老與麼提掇淚出痛腸若是第一句要且未夢見在忽有人問怡山如何是第一句只向他道劍去久矣上堂真淨道頭陀石被莓苔裹擲筆峰遭薜茘纏羅漢寺裡一年度三箇行者歸宗寺裡參退喫茶師曰大眾要會麼聽取一頌天晴日頭出雨落地下溼盡情都說了只恐信不及大鑑下第二十世華藏淨禪師法嗣福州府雪峰石翁玉禪師禮雪峰塔偈曰入閩早是四旬餘象骨崖前縛屋居誰道開平年代後春疇煙雨幾犂鋤寧波府天童西江謀禪師被敕住天童歷四十年貌枯瘁涖眾孤峻機語峭音如洪鐘理宗朝三被寵錫其示眾曰春日晴黃鸝鳴最親切誰解聽癡絕主玉几時甞寄偈有千丈飛流氣象新巖前一吼盡無塵之句將入滅顧侍僧曰一笑翻身日面月面遂閣筆而逝徑山珏禪師法嗣杭州府中竺空巖有禪師室中甞垂語曰黃金鑄就鐵真人東海湧甞頌曰錦衣公子醉田家熟睡柴牀日未斜熱渴呼漿無所得便將玉帶換甌茶杭州府淨慈千瀨善慶禪師嚴陵彭氏子丱歲而孤萍蹤無寄就舅氏業儒往見懷楚楚知為法器問能出家否師曰固本願耳楚遂度之爰具戒品律身甚嚴徧歷諸方無所證後聞荊叟主淨慈遂往親依一日聞舉洞山麻三斤話忽悟深旨出世宜興保安次遷嘉禾天寧後陛淨慈甞著扶宗顯正論仁宗覽而嘉之賜金襴袈裟徽號慧光普照文明通辯及謝事築室曰歸休宴息其間泊如也元至元戊寅八月三日化去壽七十九靈隱泉禪師法嗣金華府寶林無機禪師上堂舉妙喜頌圓覺居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實曰荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨華蛺蝶飛師曰妙喜可謂桃花李花總成一家雙林則不然客舍并州已十霜歸心日夜憶咸陽無端更度桑乾水却望并州是故鄉上堂蘆花對蓼紅木落山露骨彷彿揚州依希越國拈拄杖卓一下曰為君卓破精靈窟無位真人赤骨律黃龍開禪師法嗣杭州府護國臭菴宗禪師上堂舉豐干謂寒山拾得曰你與我去遊五臺便是我同流寒山曰你去遊五臺作麼干曰禮拜文殊山曰你不是我同流師曰豐干開口不在舌頭上寒山同坑無異土檢點將來兩箇駝子廝撞著世上由來無直人上堂舉岳林振示眾市袋口開還有買底麼僧曰有林曰不作賤不作貴你作麼生買僧無語林曰老僧失利師曰岳林設箇問端也甚奇特及至被人道箇有字直得東遮西掩囊藏不迭護國今日布袋口開還有買底麼良久曰闌干雖共倚山色不同觀杭州府慧雲無傳祖禪師上堂佛佛廣說大智莫能知祖祖相傳凡情距能測先天後地成壞長存入死出生去來不變於斯薦得已涉支離其或未然山僧更為下箇註脚以拂子擊禪牀曰啼得血流無用處不如緘口過殘春溫州府華藏瞎驢無見禪師舉興化打克賓話頌曰興化打克賓言親語亦親棒頭如雨點敲出玉麒麟杭州府放牛余居士淳祐間參無門凡有問門皆劈面截住曰不是不是及見臭菴曰吾師何所見敢對人天顛倒是非耶菴曰我在無門處無法可得無道可傳只得兩箇字士曰是甚兩字菴曰不是不是士大悟始知無門為人處甞設是非關以見所得其言曰直指人心見性成佛回光返照迥絕遮攔纔擬思量白雲萬里逢人品藻遇物雌黃重古輕今貴耳賤目任伊卜度沉吟未夢見是非關在作麼生透且看如何是第一義對答不得打折齒却逞神通暗渡江有分奔波不近貴將心來與你安大痛無聲徹骨寒摘葉尋枝非好手西天依舊黑漫漫有佛處不得住燕子銜將春色去杜宇鳴時雪滿天落紅萬點相思雨無佛處急走過覺皇寶殿不肯坐修行六載出山來方信斧頭是鐵做安吉州沈道婆問是非關有幾句士曰有四句婆曰四句作麼生舉士曰第一句有是有非則不可第二句無是無非又不可第三句是是非非也不可第四句非是是非亦不可若離得此四句始見本地風光曰我離得否士曰汝離不得曰人人有分我何離不得士曰嫁雞逐雞飛嫁狗逐狗走曰如何是本地風光士曰月子彎彎照幾洲幾人歡喜幾人愁曰不問者箇風光士曰問那箇風光曰無男女相底士曰既無男女相問甚是非關曰別有向上事也無士曰有曰如何是向上事士曰馬蝗丁住鷺鷥脚你上天時我上天囊山秀禪師法嗣福州府鼓山皖山正凝禪師舒州太湖李氏子年十七二親俱喪投黃州雙泉道瑛剃落旋受具于鄂渚開元首參三祖環菴璉次參鍾山癡絕沖長蘆南山哲皆不契後參雙塔無明性明問達磨九年面壁意旨如何師曰有理難伸明劈胸一拳師忽有省乃曰我生平用底遭者老漢一拳瓦解氷消了也入閩禮孤峰峰舉狗子無佛性話師不能答踰半載乃得臻閫奧呈頌曰趙州道無箭不虗發築著磕著全活全殺峰曰你也得只是未在一日峰舉德山見龍潭話問那裡是德山親到處師以手掩峰口曰潭不見龍不現全身已在空王殿夢回忽聽曉鶯啼春風落盡桃華片峰曰汝今日方知泗洲大聖不在揚州出現遂俾侍香洎峰遷西禪囊山師皆隨侍峰歸寂往登石鼓次依雪峰雙林果居板首寶祐丁巳出世福州釣臺遷萬歲久之太傅賈平章請住鼓山上堂入院方三日追陪人事忙燈籠與露柱密密細商量且道商量箇甚麼拍禪牀曰昨夜碧天風浪靜一輪明月映螺江上堂六月旦夏巳中荷華開水面茘子映山紅無位真人處處相逢擬議雲山千萬重鼓山入院上堂拈拄杖曰颺下住山鈯斧拈起國師聖箭卓一卓曰一簇破三關機鋒如掣電左右逢原全機殺活直得大頂峰小頂峰望空斫額白雲亭湧泉亭笑裡點頭正與麼時且道功歸何所靠拄杖曰雕弓已挂狼煙息萬國來朝賀太平示眾萬機不到千聖攢眉正令當行阿誰敢擬便恁麼會已落第二義諦大似望梅林止渴有甚快意處衲僧家將黑豆子換人眼睛把斷貫索穿人鼻孔未為分外且道衲僧見箇甚麼道理卓拄杖曰選佛若無如是眼宗風那得到于今舉雪峰示眾曰此事不從脣吻得不從黃卷上得不從諸方老宿得合從甚麼處得也須子細話頌曰一滴真珠紅潑醅殷勤相勸兩三回到頭欲盡東君意吞却臨行上馬杯將終集兩序示遺誠索筆書偈曰八十四年一夢相似夢破還空也無些事端坐而逝金華府雙林一衲介禪師題傅大士像曰非儒非道亦非禪杜撰修行忒可憐擔閣一身三不了至今八百有餘年海西海禪師法嗣順天府大慶壽寺中和璋禪師室中示徒或握木劍或執錦蛇因海雲簡參問某甲不來而來作麼生相見師曰參須實參悟須實悟莫打野榸曰因擊火迸散乃知眉橫鼻直師曰吾此處別曰如何表信師曰吾牙是一口骨耳乃兩片皮曰將謂別有師曰錯簡喝曰草賊大敗師便休次日師舉臨濟兩堂首座齊下喝至賓主歷然話問曰與麼說話汝作麼生會簡曰打破秦時鏡磨尖上古錐龍飛霄漢外何必更鍼錐師曰汝只得其機不得其用簡便掀倒禪牀師曰途路之樂終未到家簡與一掌曰精靈千載野狐窟看破如今不直錢師打一拂曰汝只得其用不得其體簡進前曰青山聳寒色月照一溪春師曰汝只得其體不得其智簡曰流水自東西落華無向背師曰汝雖善語言三昧要且沒交涉簡竪拳拍一拍直得丈室震動師曰如是如是簡拂袖便出葛廬覃禪師舉僧問石溪如何是佛溪曰矮子看戲話頌曰巍巍丈六紫金容百戲場中有變通矮子看來眉卓竪鐵錐無孔舞春風
