body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十七世虎丘隆禪師法嗣寧波府天童應菴曇華禪師蘄州江氏子生而奇傑年十七於東禪去髮首依水南遂染指法味因遍歷諸老門牆至雲居禮圓悟悟一見痛與提䇿及入蜀指見彰教教移虎丘師侍行未半載頓明大事去謁此菴分座連雲開法妙嚴屢遷巨剎住歸宗日大慧在梅陽有僧傳師垂示語慧見以偈寄贈曰坐斷金輪第一峰千妖百怪盡潛蹤年來又得真消息報道楊岐正脈通其歸重如此上堂九年面壁壞却東土兒孫隻履西歸鈍置黃面老子以拄杖畫一畫曰石牛欄古路一馬生三寅上堂德章老瞎禿從來沒滋味拈得口失却鼻三更二點唱巴歌無端驚起梵王睡喝一喝曰我行荒草裡汝又入深村上堂臨濟在黃檗處三度喫棒底意旨你諸人還覷得透也未直饒一咬便斷也未是大丈夫漢三世諸佛口挂壁上天下老和尚將甚麼喫飯上堂十五日已前水長船高十五日已後泥多佛大正當十五日東海鯉魚打一棒雨似盆傾直得三千大千世界一切衆生悉皆歡喜謂言打者一棒不妨應時應節報恩不覺通身踊躍遂作詩一首舉似大衆蜻蜓許是好蜻蜓飛去飛來不暫停被我捉來摘却兩邊翼恰似一枚大鐵釘上堂若作一句商量喫粥飯阿誰不會不作一句商量屎坑裡蟲子笑殺闍黎拈拄杖曰拄杖子罪犯彌天貶向二鐵圍山且道薦福還有過也無卓拄杖曰遲一刻上堂明不見暗暗不見明明暗雙忘無異流俗阿師野干鳴師子吼師子吼野干鳴三家村裡臭猢猻價增十倍驪龍頷下明月珠分文不直若作衲僧巴鼻甚處得來三十年後換手捶胸未是苦在上堂飯籮邊漆桶裡相唾饒你潑水相罵饒你接𭪿黃河三千年一度清蟠桃五百年一次開花鶴勒那咬定牙關朱頂王呵呵大笑歸宗五十年前有一則公案今日舉似諸人且道是甚麼公案王節級失却帖上堂喫粥喫飯不覺嚼破舌頭血濺梵天四天之下霈然有餘玉皇大帝怒發追東海龍王向金輪峰頂鞠勘頃刻之間追汝諸人作證見也且各請依實供通切忌回避倘若不實喪汝性命上堂趙州喫茶我也怕他若非債主便是冤家倚牆靠壁成群隊不知誰解辨龍蛇上堂五百力士揭石義萬仞崖頭撒手行十方世界一團鐵虗空背上白毛生直饒拈却炙脂帽子脫却鶻臭布衫向報恩門下正好喫棒何故半夜起來屈膝坐毛頭星現衲僧前上堂三世諸佛眼裡無筋六代祖師皮下無血明果咬定牙關𨁝跳也出他圈䙡不得何故南泉斬猫兒上堂參禪人切忌錯用心悟明見性是錯用心成佛成祖是錯用心看經講教是錯用心行住坐臥是錯用心喫粥喫飯是錯用心屙屎送尿是錯用心一動一靜一往一來是錯用心更有一處錯用心歸宗不敢與諸人說破何故一字入公門九牛拽不出上堂良工未出玉石不分巧冶無人金沙混雜縱使無師自悟向天童門下正好朝打三千暮打八百驀拈拄杖曰喚作拄杖玉石不分不喚作拄杖金沙混雜其問一箇半箇善別端由管取平步丹霄苟或未然卓拄杖曰急著眼看僧問婆子問巖頭呈橈舞棹則不問且道婆手中兒子甚處得來巖頭扣船舷三下意旨如何師曰燋磚打著連底凍曰當時若問和尚如何對他師曰一棒打殺曰者老和尚大似買帽相頭師曰你向甚處見巖頭曰劄師曰杜撰禪和曰婆生七子六箇不遇知音祇者一箇也不消得擲向水中又且如何師曰少賣弄曰巖頭當時不覺吐舌意作麼生師曰樂則同歡問僧問雲門如何是清淨法身雲門曰華藥欄此意如何師曰深沙努眼睛問祇者是埋沒自己祇者不是孤負先聖去此二途和泥合水處請師道師曰玉筯撐虎口曰一言金石談來重萬事鴻毛脫去輕師曰莫謾老僧好問人皆畏炎熱我愛夏日長薰風自南來殿閣生微凉時如何師曰倒戈卸甲虎丘忌日拈香曰平生沒興撞著者無意智老和尚做盡伎倆凑泊不得從此卸却干戈隨分著衣喫飯二十年來坐曲彔木懸羊頭賣狗肉知他有甚憑據雖然一年一度燒香日千古令人恨轉深師於室中能鍛鍊耆艾故世稱大慧與師居處為二甘露門嘗誡徒曰衲僧家著草鞋住院何啻如蚖蛇戀窟乎宋孝宗隆興癸未六月十三日奄然而化塔全身於本山大鑑下第十八世天童華禪師法嗣寧波府天童密菴咸傑禪師福州鄭氏子母夢廬山老僧入舍而生幼穎悟出家不憚遠遊遍參知識後謁應菴于明果應菴孤硬難入屢遭呵一日入室菴問如何是正法眼師遽曰破沙盆菴頷之踰年辭回省親菴送以偈曰大徹投機句當陽廓頂門相從今四載徵詰洞無痕雖未付袋氣宇吞乾坤却把正法眼喚作破沙盆此行將省覲切忌便躲跟吾有末後句待歸要汝遵後出世衢之烏巨次遷祥符蔣山華藏未幾詔住徑山復遷靈隱晚居太白僧問虗空消殞時如何師曰罪不重科上堂牛頭橫說竪說不知有向上關棙子有般漆桶輩東西不辨南北不分便問如何是向上關棙子何異開眼尿牀華藏有一轉語不在向上向下千手大悲摸索不著雨寒無處曬㫰今日普請布施大衆良久曰達磨大師無當門齒上堂世尊不說說拗曲作直迦葉不聞聞望空啓告馬祖即心即佛懸羊頭賣狗肉趙州勘菴主貴買賤賣分文不直祇如文殊是七佛之師因甚出女子定不得河天月暈魚分子槲葉風吹鹿養茸上堂卓拄杖曰迷時祇迷者箇復卓一下曰悟時祇悟者箇直饒迷悟雙忘糞掃堆頭重添擸𢶍莫有向東涌西沒全機獨脫處道得一句底麼若道不得華藏自道去也擲拄杖曰三十年後上堂舉金峰示衆曰老僧二十年前有老婆心二十年後無老婆心時有僧問如何是二十年前有老婆心峰曰問凡答凡問聖答聖曰如何是二十年後無老婆心峰曰問凡不答凡問聖不答聖師曰烏巨當時若見但冷笑兩聲者老漢忽若瞥地自然不墮凡聖窠臼上堂舉婆子燒菴話師曰者婆子洞房深穩水泄不通偏向枯木上糝華寒灰中發焰箇僧孤身逈逈慣入洪濤等閒坐斷潑天潮到底身無涓滴水子細簡點將來敲枷打鎖則不無二人若是佛法未夢見在烏巨與麼提持畢竟意歸何處良久曰一把柳絲收不得和煙搭在玉闌干上堂動絃別曲葉落知秋舉一明三目機銖兩如王秉劍殺活臨時猶是無風匝匝之波向上一路千聖把手共行合入泥犂地獄正當與麼時合作麼生江南兩浙春寒秋熱上堂盡乾坤大地喚作一句子擔枷帶鎖不喚作一句子業識茫茫兩頭俱透脫淨裸裸赤灑灑沒可把達磨一宗掃土而盡所以雲門道盡乾坤大地無纖毫過患猶是轉句不見一法始是半提更須知有全提底時節大小雲門劍去久矣方乃刻舟後示寂塔於寺之中峰衢州府光孝百拙善登禪師和州烏江閔氏子僧問世尊生下一手指天一手指地曰天上天下唯吾獨尊意旨如何師曰一人傳虗萬人傳實曰有意氣時添意氣不風流處也風流師曰讚歎也讚歎不及曰只如雲門道我當時見一棒打殺與狗子喫貴圖天下太平畢竟具甚麼眼目師曰腦後薦取上堂白日鬧浩浩夜後靜悄悄長廊走波波步步無缺少不識主人翁全身入荒草撞著傅大士問訊維摩老臥疾毗耶城幾箇知天曉若是過量人不向那邊討為甚麼如此喝一喝曰下坡不走快便難逢南書記福州人久依應菴於狗子無佛性話豁然契悟有偈曰狗子無佛性羅睺星入命不是打殺人被人打殺定菴稱其脫略紹興末示寂於歸宗侍郎李浩居士字德遠號正信幼閲楞嚴如遊舊國造明果投誠入室應菴揕其胸曰侍郎死後向甚麼處去士駭然汗下菴喝出士退參不旬日徑躋堂奧以偈寄同參嚴康朝曰門有孫臏鋪家存甘贄妻夜眠還早起誰悟復誰迷有鬻胭脂者亦久參應菴頗自負士贈以偈曰不塗紅粉自風流往往禪徒到此休透過古今圈䙡後却來者裡喫拳頭湖州府長興教授嚴康朝居士嘗問道薦福雪堂及見應菴始得旨嘗有頌曰趙州狗子無佛性我道狗子佛性有驀然言下自知歸從茲不信趙州口著精神自抖擻隨人背後無好手騎牛覓牛笑殺人如今始覺從前謬大鑑下第十九世天童傑禪師法嗣杭州府靈隱松源崇嶽禪師處州龍泉吳氏子幼卓犖不凡年二十三棄家首造靈石妙繼見大慧杲於徑山慧升堂稱蔣山應菴為人徑捷師聞不待旦而行既至朝夕咨請一日菴問世尊有密語迦葉不覆藏汝作麼生師曰鈍置和尚菴厲聲一喝師便禮拜菴大喜說偈勸使祝髮隆興甲申得度於臨安之白蓮遍參諸大老罕當其意乃入閩見木菴永永舉有句無句如藤倚樹話問師師曰裂破永曰琅琊道好一堆爛柴聻師曰矢上加尖永曰觀公下語老僧不能過其如未在他日拂柄在手為人不得驗人不得師曰為人者使博地凡夫一超入聖城固難矣驗人者打向面前過不待開口已知渠骨髓何難之有永舉手曰明明向汝道開口不在舌頭上後當自知逾年見密菴於衢之西山隨問即答密菴但微笑而已師切於究竟至忘寢食密菴移蔣山華藏徑山師皆從之會入室次問僧不是心不是佛不是物師侍側豁然大悟乃曰今日方會木菴道開口不在舌頭上自是機辨縱橫密菴遷靈隱師遂分座旋出世平江澄照徙江陰之光孝無為之冶父饒之薦福明之香山平江之虎丘慶元丁巳被旨補靈隱上堂大凡扶竪宗乘須具頂門正眼懸肘後靈符只如寶壽開堂三聖推出一僧寶壽便打三聖道與麼為人瞎却鎮州一城人眼去在保壽擲下拄杖便歸方丈二尊宿等閒一挨一拶發明臨濟心髓殊不知性命總在者僧手裡還有檢點得出者麼昔年覓火和煙得今日擔泉帶月歸歲旦示衆元正改旦萬事成現有時放行有時坐斷不惜兩莖眉和坐盤掇轉佛法世法都盧一片既是佛法世法如何得成一片但辦肯心必不相賺示衆古者道拈起也天回地轉放下也草偃風行冶父則不然拈起也乾坤黯黑放下也瓦礫生光忽有一箇半箇驀然𭣟瞎頂門眼達磨一宗未至寂寥示衆舉臨濟如蒿枝拂公案雪竇拈曰臨濟放處太危收來太速師拈拄杖曰臨濟據令而行不知孤負黃檗雪竇盡力擔荷也只見得一邊且道薦福節文在甚麼處擲下拄杖示衆舉汾陽曰識得拄杖子行腳事畢師曰汾陽雖則開口見膽爭奈落在第二頭驀拈拄杖曰者箇不得喚作拄杖子漆桶參上堂舉保寧勇上堂大方無外大圜無內無內無外聖凡普會瓦礫生光須彌粉碎無量法門百千三昧拈拄杖曰總向者裡會去蘇盧蘇盧悉利悉利師曰大小保寧業識茫茫不奈船何打破戽斗示衆明眼衲僧因甚打失鼻孔有賊無贓後居靈隱六年晚退居東菴臨寂作手書別諸公卿又遺書嗣法少室睦掩室開囑以珍重大法復書偈曰來無所來去無所去瞥轉玄關佛祖罔措跏趺而寂實嘉定己巳八月四日也得年七十有一坐夏四十奉全身塔於北高峰之原夔州府臥龍破菴祖先禪師廣安王氏子聞緣老宿住昭覺往參扣語契令奉圓悟香火一日從方丈前過緣問菴頭有人麼師曰無人緣劈胸一拳曰你聻師忽有省出峽從德山涓祝髮尋受具遍叩諸方抵蘇之萬壽值雪夜坐自念行腳數年未得安穩正悶悶不已忽聞鐘動趨後架舉首見照堂二字疑情頓釋既而見水菴一於雙林水曰師子尊者被罽賓斬却頭且置你道西天鬍子為甚麼無鬚師曰非雙林不舉此話水曰作家禪客師曰心不負人面無慚色水遂以手拓開師曰勘破了也逮水菴謝事往參密菴於烏巨菴命典客一日菴室中舉不是風動不是幡動話師豁然大悟次日菴遇師於寮前謂師曰你總不得作伎倆試露箇消息來師應聲曰方丈裡有客菴呵呵大笑洎菴遷蔣山師侍行親炙凡五載辭還蜀菴送以偈曰萬里南來川藞䕢奔流度刃叩玄關頂門𭣟瞎金剛眼去住還同珠走盤師至夔門尚書楊輔以臥龍請師出世未幾棄去復遊吳中首衆於徑山靈隱後住常州薦福真州靈巖蘇州秀峰穹窿湖州資福最後約齊張公鎡請為廣壽慧雲開山凡六坐道場上堂楊岐乍住屋壁疏滿牀盡撒雪珍珠縮却項暗嗟吁翻憶古人樹下居楊岐鬬勝不鬬劣秀峰鬬劣不鬬勝秀峰乍住沒親疏箇箇盡懷滄海珠滿眼湖山看不足釋迦彌勒是他奴上堂密菴先師道有問冬來事京師出大黃貪他一粒米失却半年糧秀峰則不然有問冬來事京師出大黃只圖一粒米却得百年糧或被知事道長老長老莫道百年糧只得半年不少也得只向他道但辦肯心決不相賺上堂舉東山道如何是禪閻浮樹在海南邊近則不離方寸遠則十萬八千畢竟如何禪禪師曰穹窿也有箇道處如何是禪閻浮樹在海南邊撑天拄地拄地撐天巧說不得只要心傳畢竟如何禪禪上堂不是心不是佛不是物山僧忍俊不禁為諸人作箇撇脫拈拄杖卓一下曰流水暗消溪畔石勸人除却是非難上堂十五日已前明似鏡十五日已後黑似漆正當十五日又且如何鶯遷喬木頻頻語蝶戀芳叢對對飛示座主偈曰見猶離見非真見還盡八還無可還木落秋空山骨露不知誰識老瞿曇師將示寂作手書別交游復書偈曰末後一句已成忉怛寫出人前千錯萬錯書訖端坐而逝實嘉定辛未六月九日也時客寓徑山遺命散骨林間住持石橋收骨建塔於別峰塔之右壽七十六臘四十九饒州府薦福曹源道生禪師南劍人分座雲居出世饒之妙果徙龜峰上堂佛法二字人人知有狼毒砒霜那容下口直饒透過威音前也是癡狂外邊走山僧已是拖泥帶水諸人合作麼生喝一喝上堂今朝八月十五天色半晴半雨幾多門外遊人不覩月圓當戶也好笑又堪嗟爭似西湖寺裡一隊古佛參退歸堂喫茶上堂春風東扇西扇春雨似晴不晴淺碧深紅爛鋪錦繡鶯聲燕語互奏笙簧一一揭示圓通妙門頭頭流通正法眼藏擬心湊泊依前萬水千山直下知歸便見七穿八穴拍禪牀下座上堂雨雪落紛紛簷頭水滴滴良哉觀世音草裡跳不出也大屈水底烏龜鑽鐵壁咄上堂月生一拶倒銀山并鐵壁月生二土宿騎牛穿閙市月生三屋頭幽鳥語喃喃不是葛藤露布亦非入理深談正恁麼時賓主交參一句作麼生道萬仞懸崖垂隻手百華叢裏現優曇上堂平旦清晨三月朝南山蒼翠插雲霄不須更覓西來意門外數聲鶯語嬌拍膝一下曰好大哥詠靈雲石偈曰雲去雲來非有意雲來雲去亦無心有無截斷靈何在突兀一峰青到今晚住薦福逾月示寂寧波府天童枯禪自鏡禪師福州長樂高氏子首參木菴永水菴一或菴體諸老後謁密菴於靈隱針芥相契開法隆興上藍遷建康旌忠撫州白楊福州太平西禪寶慶乙酉被旨升靈隱復移天童上堂有句無句如藤倚樹樹倒藤枯句歸何處良久曰長憶江南三月裡鷓鴣啼處百華香上堂一拽石二搬土夜半日輪正卓午老安曾牧溈山牛南泉不打鹽官鼓報君知莫莽鹵火裡蝍蟟吞却虎上堂舉鶴林因僧扣門林曰阿誰僧曰是僧林曰非但是僧我者裡佛也不著曰因甚佛來也不著林曰無他棲泊處師曰天童若有人扣門即大開了待他入來便攔胸搊住曰道道若擬開口便與劈胸一拳在者裡轉得身吐得氣便請明下安排杭州府淨慈潛菴慧光禪師上堂舉趙州狗子佛性無話頌曰狗子無佛性全提摩竭令才擬犯鋒鋩喪却窮性命化鹽偈合水和泥一處烹水乾泥盡雪華生乘時索起遼天價公驗分明孰敢爭太平府隱靜萬菴致柔禪師潮州陳氏子母黃妙喜南遷道經潮其祖父暹延禮甚謹母因夢僧入舍遂懷妊及誕父母誓不以俗纍羈師甫十歲俾從壽受業越九載芟染初見木菴永於鼓山會菴升座曰國師再來也師微笑有省次參密菴於蔣山菴室中舉釋迦彌勒猶是他奴且道他是阿誰師曰無地頭漢菴曰千聞不如一見師便毆一拳菴擒住厲聲曰者小鬼子見箇甚麼胡打亂打師曰更要喫一拳在菴連揮兩拳曰打者無地頭漢師豁然大悟無何以母老歸省旋出世廣法後移太平隱靜上堂起道樹詣鹿苑不是向上機傳少室續曹溪未為正法眼直得無依無欲無一法當情猶落第二見放過一著卷舒在我縱奪臨時於把住處放行露柱燈籠活鱍鱍於放行處把住釋迦彌勒是他奴卓拄杖曰且道是放行是把住一氣不言含有象萬靈何處謝無私上堂舉天衣懷曰鴈過長空影沉寒水話頌曰長空孤鴈一聲秋獻寶波斯鼻似鈎風捲白雲歸別嶂黃昏月挂柳梢頭上堂毗盧師法身主若要動地放光且來搬柴運土嗄將謂忘却上堂百丈不再參馬祖爭得三日耳聾臨濟不到大愚焉知老婆心切仰山將得鎮海明珠為甚到東寺面前叉手當胸却道無理可伸無言可對咄直饒傾下一栲栳敢保老兄猶未徹上堂饑荒老鼠咬葫蘆巧計猢猻倒上樹要透報恩向上關直須一步低一步既是向上關因甚却要一步低一步待你踏著却向你道上堂東山道空門有路人皆到到者方知旨趣長心地不生閒草木自然身放白毫光師曰東山只解無中覓有不解有裡尋無隱靜則不然空門有路人難到到者方知礙處通石上栽華還結果須知元不假春風將臨終集衆囑曰老僧生平無長物只依海衆常例安寢堂兩日足矣復書偈端坐而化世壽七十臘五十二杭州府靈隱笑菴了悟禪師姑蘇人舉僧問睦州以一重去一重即不問不以一重去一重時如何州曰昨日栽茄子今日種冬瓜公案頌曰昨日栽茄子今日種冬瓜一聲河滿子和月落誰家江寧府蔣山一翁慶如禪師福州長樂范氏子上堂春雨如膏春雲似鶴春鳥關關春泉濯濯揭却觀音腦蓋踢倒慈氏樓閣切莫將錯就錯拍禪牀曰參上堂過去諸如來斯門已成就一盲引衆盲現在諸菩薩今各入圓明蝦跳不出斗未來修學人當依如是法賺殺一船人上堂意能剗句句能剗意意句交馳討甚巴鼻盡力道不得底句不是河南便是河北衲僧聞得與麼告報十箇有五雙鼻孔裡冷笑拈拄杖曰雲居拄杖子黨理不黨親卓一下曰雪巢初冷夜雲𩯭未梳時上堂霜明萬壑月皎千家達磨不會却返流沙拍膝曰好大哥歸堂喫茶上堂天地造化有陰有陽有晦有朔聖人治世有禮有樂有刑有政衲僧門下有殺有活有擒有縱其擒也縱也殺也活也總在黃龍指甲縫裡汝若擬議不消一掐然雖如是笑我者多哂我者少上堂一句截流萬機寢削且道是那一句良久卓拄杖曰歸堂喫茶上堂久雨忽晴天清地寧雲收嶽面月落波心拈拄杖卓一下曰恁麼會去達磨一宗掃土而盡上堂諸佛不出世人人舉足踏著祖師不西來人人滿口道著既踏著又道著畢竟是箇甚麼有般漢東西不辨南北不分便道明明不覆藏切忌從他覓殊不知拋却真金隨群撮土上堂豁開戶牖當軒無人撾動雷門憑誰側耳裴相國印心於老黃檗溫伯雪目擊於魯仲尼衲僧門下猶在半途知縣學士今日到來雲居如何與伊相見拈拄杖畫一畫曰萬重關鎖盡一劍倚天寒晚年退隱南昌西山示寂塔於定林壽六十八夏四十九蘇州府承天鐵鞭允韶禪師上堂一五二五機輪無阻南山起雲北山下雨有底却道錦上鋪花有底又道泥裡洗土有底又道離此二途便見丹霄獨步若總如斯論量山僧未敢相許畢竟如何良久曰逢人不得錯舉師住泉州光孝開堂祝聖白槌畢師曰喚甚麼作第一義莫有旁不甘者麼出來道看時有僧出問話語未竟師拈拄杖卓一卓曰住住今日開堂不比尋常佛事設問答到彌勒下生勾鎖連環盛水不漏也祇是空鼓粥飯氣于自己了沒交涉所以道問不在答處答不在問處問答交馳如青天轟霹𮦷看者不容眨眼那堪更向言中定旨句下分宗大似緣木求魚守株待兔殊不知我宗無語句亦無一法與人者裡徹去皇恩佛恩一時報畢其或未然更為錦上鋪華復卓拄杖一下下座佛涅槃日上堂老漢當年臘月八三更半夜顛狂發剛把長釘釘眼睛直至如今無人山僧今日下毒手為他去也看便下座杭州府直祕閣學士張鎡居士字功甫別號約齊聞鐘聲得悟述偈曰鐘一擊耳根塞赤肉團邊去箇賊有人問我解何宗舜若多神面目黑後捨宅建寺曰慧雲請破菴先開山疏曰捨林居為阿蘭若夫豈小緣請宗師據曲彔牀只因大事幾度遍參遭密菴打失鼻孔一朝拈出向冷泉捋下面皮不謂馨香奚煩鄭重辭青松於北㵎穿幾重出岫之雲封緑水於南湖祝萬歲如山之壽寧宗嘉定壬申復請滅翁相繼闡法今專祠尚在
