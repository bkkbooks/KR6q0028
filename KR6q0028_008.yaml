body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十一世中竺有禪師法嗣嘉興府石門真覺元翁信禪師真覺開山上堂向上一機末後一訣佛祖不傳千聖結舌者裡莫有轉身吐氣者麼出來通箇消息僧問鈯斧開山從古有師今新啓石門關借路經過不妨一問師曰把將公驗來曰如何是關中主師曰鏌鎁橫在手專慣斬癡頑僧擬議師便喝僧禮拜師曰癡頑漢乃曰滿目溪山絶點埃無邊剎海自周圍毗盧樓閣重重現誰覩門門有善財卓拄杖曰石門關啓真覺場開一任南來與北來小參建法幢立宗旨明明佛敕曹溪是大衆建法幢則固然如何是立的宗旨莫是三轉五轉竪拳下喝麼莫是默然據座拂袖便行麼莫是語言文字確古論今麼莫是灰頭土面長坐不臥麼切須仔細若是正眼不明盡墮偏邪執滯所以道醍醐上味為世所珍遇斯等人翻成毒藥我祖師門下盡十方世界是箇無縫鐵壁達磨不識盡十方世界是箇無孔鐵鎚迦葉不知無汝擬議處無汝承當處旋天轉地換斗移星雙放雙收透頂透底還會麼龍袖拂開全體現象王行處絶狐蹤僧問畢竟如何是立的宗旨師曰少間向你道風幡中禪師法嗣呂鐵船居士母秦國夫人夢公安二聖住持福巖佑至舍而生弱冠時便參空山一日山問曾見趙州麼士厲聲曰無山休去每稱於人曰某再來人也士嘗任江淮都總管乃於蘇之嘉定建永壽寺以延雲水其賡和永明山居詩及他偈言皆超倫邁俗達磨忌拈香曰西來不稱梁王旨西去空携一隻履若言妙用與神通真正衲僧誰數你九年面壁尋出場接得一人又無臂衣盂連纍到盧能從此葛藤生不已罪過有彌天源流無滴水今朝七百八十六年逢忌辰那箇兒孫不痛徹骨髓一爐香篆一甌茶報恩却是孤恩底欲把拳頭舉似伊憐渠已沒當門齒華藏見禪師法嗣蘇州府陽山金芝嶺鐵𭪿念禪師示衆靈山付囑天下葛藤樁少室單傳諸方是非窟安心懺罪破漆桶又要重光付法傳衣滯行貨徒勞索價溈仰團圞無縫罅壁立絶中邊臨濟棒頭開正眼拳下示生涯曹洞錦帳繡鴛鴦行人難得見雲門三句可辨一鏃遼空法眼大地山河俱為妙用看來世界清平何用強生節目金芝今日為諸人斷者公案去也看看以拄杖畫一畫曰四海浪平龍睡穩九天雲淨鶴飛高舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人話頌曰誰謂家風分兩邊一條拄杖兩人牽休觀千嶂凌雲勢好看銀河落九天舉舍利弗入城月上女出城話頌曰出城入廓兩相逢來去誰云路不同回首涅槃臺上望九州四海一家風直翁圓禪師法嗣廬州府無為州天寧無能教禪師門懸一牌云謹防惡犬竺源參才跨門便曰老和尚為我趕狗師便入去閉却門智首座出迎同坐少時方丈會茶智起白曰此上人得得來見和尚師曰已相見了也既而師訶蒙山不合引兄弟禮懺施食源曰實際理地不受一塵佛事門中不捨一法師曰不然我宗門中合提何事如何是佛麻三斤如何是佛乾屎橛當提此事始得源曰蒙山和尚嘗問學者道栽松道者不具二緣而生達磨大師葬熊耳却携隻履西歸為復是神通妙用為復是法爾如然如此提唱和尚以為何如師曰汝莫作禪會去麼源當下如夢忽醒金牛真禪師法嗣安慶府太湖普明無用寬禪師結夏上堂諸方結制有甚巴鼻太湖梁山冷氷氷地二百箇鐵額銅頭無用分作兩處提起放下吞聲飲氣擬議之間頂門著地卓拄杖曰何似晴空轟霹靂下座佛成道日上堂六年雪山錯忽覩明星錯走下山來錯錯錯假使九州之鐵也難鑄此一錯更說甚麼大地含靈同成正覺中峰至上堂明明百草頭明明祖師意天目山古佛輝天并鑒地虎咬大蟲蛇吞鱉鼻擲拄杖曰直下來也急著眼覷大衆懷香拜請幻住大和尚慈悲開示便下座鼓山凝禪師法嗣松江府澱山蒙山德異禪師高安盧氏子初參承天孤蟾瑩瑩命看趙州無字話一日蟾問亡僧遷化向甚麼處師罔措悱發參究因首座入堂墜香盒作聲豁然有省述偈曰沒興路途窮踏翻波是水超羣老趙州面目只如此尋謁雪巖退耕虗舟諸老舟問不是心不是佛不是物是甚麼師曰所供並是語實又問南泉斬猫意旨如何師曰剖腹傾心舟曰趙州戴草鞋出去又作麼生師曰手腳俱露一日室中舟問雪覆千山為甚麼孤峰不白師曰別是一乾坤舟大稱賞勸謁皖山山問光明寂照遍河沙豈不是張拙秀才語師擬答山震威一喝師當下釋然一日山舉宋太宗問僧甚處來僧曰廬山臥雲太宗曰朕聞臥雲深處不朝天因甚到者裡話問師師曰有道則見山深肯之承天覺菴處以第一座後隱居蓮湖橋休休菴出世澱山僧問寶壽開堂三聖推出一僧意旨如何師曰兩彩一賽曰寶壽便打又作麼生師曰為人須為徹曰三聖道恁麼為人非但瞎却者僧眼瞎却鎮州一城人眼去在是肯他不肯他師曰兜率陀天一晝夜人間四百年上堂昨日十四今日十五靈利衲僧吞却佛祖從教謝三郎月下自搖櫓阿呵呵莫莾鹵甜瓜徹蒂甜苦瓠連根苦示衆蘇州有常州有八角磨盤空裡走日面佛月面佛覿面和盤都托出便與麼掀倒禪牀拂袖散去法門幸甚或有猶豫之者只得把手牽汝歸家聞聲悟道見色明心竪拂子曰見麼見底是色那箇是心喝一喝曰聞麼聞底是聲那箇是道直下正眼豁開方得入門猶是脫白沙彌要與衲僧齊驅並駕更須進竿頭一步慶壽璋禪師法嗣順天府大慶壽海雲印簡禪師山西嵐谷寧遠宋氏子生而神悟七歲父授孝經開宗明義章師曰開者何宗明者何義父異之於是俾從中觀沼受業年十一衲具戒十二沼聽參問一日侍沼行沼曰法燈道看他家事忙且道承誰力汝作麼生會師將沼手一掣沼曰者野狐精師喏喏沼曰更須別參始得十八元兵破寧遠四衆逃散師侍沼如故沼察其誠囑曰子向去朔莫有大因緣吾將與子北渡至赤城元世祖至元庚辰五月沼無疾而逝師為乞食造塔一夕聞空中呼師名師為矍然乃遷居三峰道院一日復聞人告曰大事將成毋滯於此黎明遂䇿杖之燕過松鋪值雨宿崖下因擊火大悟曰今日始知眉橫鼻直信道天下老和尚不寐語明日至景州見本無玄玄問從何所來師曰雲收幽谷玄曰何處去師曰月照長松玄曰孟八郎漢便恁麼去也師諾諾趨出逮入燕謁慶壽壽先夕夢異僧䇿杖徑趨方丈踞座天明師至壽笑曰此夜來所夢者師問不來而來作麼生相見壽曰參須實參悟須實悟莫打野榸師曰某甲因擊火迸散乃知眉橫鼻直壽曰吾此處別師曰如何表信壽曰牙是一口骨耳是兩片皮師曰將謂別有壽曰錯師喝曰草賊大敗壽休去次日壽舉臨濟兩堂首座齊下喝僧問還有賓主也無濟曰賓主歷然汝作麼生會師曰打破秦時鏡磨尖上古錐龍飛霄漢外何勞更下槌壽曰途路之樂終未到家師曰精靈千載野狐魅看破如今不直錢壽曰如是如是師拂袖便出遂命掌記尋密付焉壽謂師曰吾有如來正法眼藏密付於汝毋令湮沒師掩耳而出及開法後兩主慶壽自元太祖世祖皆以師道事之有孔子之裔元措者渡河謁師請復曲阜廟祀師為言於忽都護曰孔子以大中至正之道三綱五常之禮正心誠意之本教人自孔子至今襲封五十一代繼承祀事未嘗有缺忽都護遂奏命復襲封爵年五十六忽患風痺仁宗延祐丁巳閏四月一日集衆說偈畢泊然而逝茶毗獲舍利無算諡佛日圓明大師大鑑下第二十二世真覺信禪師法嗣建寧府天寶鐵關法樞禪師溫之平陽林氏子年十七往常州華藏寺禮竺西坦受業十九得度二十受具初參中峰次謁及菴皆不契乃見元翁於石門翁示以三不是話於是力參三年一日忽大悟述偈曰不是心佛物拶出虗空骨金毛獅子兒豈戀野狐窟喝一喝咄咄咄即詣方丈翁問作甚麼師曰南泉被我捉敗了也翁曰不是心不是佛不是物是箇甚麼師曰牙齒一具骨耳朵兩片皮翁曰不是不是別道將來師曰鶯啼燕語鵲噪鴉鳴翁曰錯師亦曰錯翁曰南泉即今在甚麼處師便喝翁曰離却者一喝南泉畢竟在甚麼處師拂袖便出繇是遍謁諸方首見虗谷陵於大仰後謁海印如於薦福才上方丈印問誰師曰暫到相看印曰甚麼處來師曰江西印曰江西近日有甚麼事師曰集雲峰下藤條被人拗折了也印曰莫亂統師曰不因亂統爭得到者裡印曰且道者裡事作麼生師叉手進前曰即日恭惟堂頭和尚尊候起居萬福印曰不涉泥水一句又作麼生師喝一喝曰風從虎雲從龍印曰一喝不作一喝用是何意旨師曰兩箇泥牛鬬入海直至如今無消息印曰錯師亦曰錯印喚侍者點茶來師曰不受者供養印曰不受者供養受那箇供養師曰謝和尚盛情印曰曾見甚麼人來師曰不曾見人印曰既不曾見人那裡得者箇消息師曰若見人即無者箇消息於是服勤為淨頭印嘗謂衆曰永嘉樞侍者是煅了底金嗣遊東林參澤山咸值咸開室為衆舉竹篦因緣聲未絶師奪却竹篦過左邊立曰喚作甚麼即得咸曰掠虗漢師以竹篦打一下拗折而出次日咸復開室師問泗州大聖因甚在揚州出現咸曰南山起雲北山下雨師又捉住竹篦曰南山起雲北山下雨意旨如何咸喝一喝師曰者是鬼窟裡活計畢竟意旨如何咸曰掠虗漢師以竹篦一送曰見說洛陽華似錦拂袖便出後歸石門省元翁翁才見便曰南泉向甚麼處去也師曰說甚南泉釋迦老子來也翁曰不是心不是佛不是物是甚麼師曰劍去久矣翁曰趙州無聻師曰龍生金鳳子衝破碧琉璃翁曰古人與麼道過的你別道看師喝一喝翁曰錯師又喝翁曰錯錯師遂禮拜翁乃曰放汝三十棒師於是潛衆十五年延祐戊午出世閩之天寶帝師錫寺額加號妙覺真空大師後遷松溪普載上堂當陽一句截斷根源把住放行全機歷落坐斷千聖頂𩕳鑿開衲僧眼睛疾焰過風奔流度刃直得妙峰𨁝跳慧海波騰正當恁麼時且道開堂祝聖一句作麼生道擊拂子曰龍袖拂開全體現象王行處絶孤蹤小參金剛正印率土咸歸佛祖鉗鎚人天罔措階梯不立知解不存德山棒通上徹下臨濟喝絶後光前一明一切明一用一切用大丈夫秉吹毛劍懸肘後符雙放雙收全殺全活拈拄杖曰鶴有九臯才翥翼馬無千里謾追風佛誕上堂毗藍園降生八十種隨好行作象王行吼作獅子吼拈拄杖曰雲門大師來也復卓一卓曰阿爺阿爺上堂舉三聖問雪峰透網金鱗以何為食峰曰待汝出網來即向汝道聖曰千五百人善知識話頭也不識峰曰老僧住持事繁師曰三聖大似毒龍攪海白浪滔天若不是雪峰慣入洪波爭得驪珠在握擊拂子下座謝殿主上堂如何是佛殿裡底悉哩蘇盧蘇盧悉哩江國春風吹不起鷓鴣啼在深華裡擊拂子舉臨濟無位真人是甚麼乾屎橛話頌曰無位真人乾屎橛臨濟未是白拈賊千古長如白練飛一條界破青山色舉牛過窗櫺話頌曰浪靜風恬意轉殊滿天星斗月輪孤時人休戀一泓水來上扁舟泛五湖舉香嚴上樹話頌曰上樹未上樹鐵蛇橫古路覿面笑呵呵苦瓠連根苦居三載謝歸天寶以嗣法善儔主寺事至元庚辰八月示微疾作手書邀諸所與遊者入山如期畢至求法施者隨其所欲了無倦色正午沐浴端坐書偈曰本無來去一句全提紅霞穿碧落白日繞須彌擲筆而逝壽六十三臘四十五全身塔於瑞雲院普明寬禪師法嗣常州府宜興龍池一源永寧禪師別號虗幻子淮東通州朱氏子世宦族九歲師淵模於廣慧寺寺故淮海肇說法處前一夕寺衆夢迎肇次日師至識者異之十二歲剃髮尋受具戒參中峰海於蘇之萬壽入穹窿謁克翁紹紹俾掌藏時年始十九偕明極於焦子山習定五年極曰藏主所詣如此宜亟往見人於是至淮西太湖謁無用寬方入門用厲聲叱之師作禮門外久之乃許入見問何處人師曰通州曰淮海近日盈虗若何師曰沃日滔天不存涓滴用便喝出師退徹夜不寐一日聞用舉雲門須彌山話聲未絶忽有省急趨前用便打曰趙州無字作麼生師遽曰趙州狗子無佛性萬象森羅齊乞命無底籃兒盛死蛇多添少減無虗剩用嗒然繇是執侍左右者三年用始以斷崖義所贊己像親署書授師曰汝緣在南師遂受命南還時虗谷陵元叟端瀨翁慶幻住本皆各據名山師皆叩擊無不吻合延祐庚申住廣德大洞洞左有實相寺馬祖弟子澄公道場師為起廢時有宿衲無一全者遁跡石溪溪與洞相望人謂廣德二甘露門云至治癸亥宜興龍池疏請師師欣然赴之命曰禹門居久復至絶巘築室足不越限者三年帝師降號弘教普濟禪師泰定乙丑遷九里寺至順庚午再遷李山元統甲戌主常之天寧萬壽八年復錫號本覺妙明真淨至正壬午歸龍池尋召入京宣命龍光殿升座說法上悅賜金襴法衣加號佛心了悟庚子出領善權洪武己酉夏六月示微疾囑弟子裁紙製內外衣且曰吾將逝矣索筆書偈曰七十八年守䂐明明一場敗闕泥牛海底翻身六月炎天飛雪書畢吉祥而逝先一月池水忽竭及師順寂噴湧異常時茶毗現五色光牙齒舌輪皆不壞設利無數門人分餘骨與不壞者就龍池太平齊山紫雲麻蕻五所建塔藏焉世壽七十八僧臘六十五天寧教禪師法嗣杭州府妙果竺源水盛禪師別號無住翁饒州樂平范氏子十七依羅山常出家尋謁月庭於蔣山時孤舟居第一座諄諄誨師不置師每自奮且發願曰吾此生不作佛當入無間獄過匡廬止東林一日夜半不覺如出荊棘林洎歸羅山默舉公案如鏡照鏡師自以為開悟及掌藏鑰東林閲妙喜語有明心見性非桑門事則又復致疑不能自釋越五載重會孤舟於蔣山其後謁無能始得脫盡玄妙知解回觀從前所悟宛如一夢能撫之曰子後當大弘吾宗也於是東遊至薦福分座說法久之居南巢天曆己巳出世西湖之妙果寺示衆凡學道人當洞明諸佛心宗行解相應歲久月深具大無畏如透水月華萬浪千波觸之不散方始不被生死陰魔所惑未幾復還南巢至正丁亥戒飭徒衆且曰世尊有言我今背痛將入涅槃吾其時矣侍僧捧紙求偈師揮叱曰何以偈為端坐而逝世壽七十三僧臘五十三澱山異禪師法嗣袁州府慈化鐵山瓊禪師十八歲出家首參雪巖一日偶頭痛欲煎藥手提瓶子遇覺赤鼻曰你須是那吒太子析骨還父析肉還母然後為父母說法始得師有省乃述偈曰一莖草上現瓊樓識破古今閒話頭拈起集雲峰頂月人前拋作百花毬無何巖示寂往謁東巖巖問心不是佛智不是道上座作麼生會師曰抱贓呌屈巖曰不是心不是佛不是物是甚麼師曰眉間迸出遼天鶻復謁蒙山屢入室呈解山但曰只是缺在一日忽觸著缺字身心豁然徹骨徹髓乃跳下禪牀擒住山曰我缺少箇甚麼山打三掌師禮拜山然之次典首座冬節秉拂曰冬至月頭賣被買牛冬至月尾賣牛買被卓拄杖曰者裡無尾無頭中道齊休行也休休坐也休休住也休休臥也休休睡眼豁開五雲現瑞光風霽月無處不周梅綻枯枝古渡頭風前時復暗香浮雖然向上一路萬里崖州何以見得靠拄杖曰休休後示寂塔於觀音閣後府孤舟濟禪師時月庭忠居蔣山師為第一座竺源至首座寮師問曰蒙山嘗言栽松道者不具二緣而生達磨葬熊耳後隻履西歸為復是神通妙用是法爾如然子作麼生會源曰形神俱妙師叱曰不然子他日當自知之源後以師語請益無能始釋然大悟大鑑下第二十三世大慈成禪師法嗣衢州府烏石傑峰世愚禪師郡之西安余氏子弱冠投蘭溪顯教寺剃染受具足戒謁古崖石門斷崖中峰諸大老佩受法訓棲止南屏三年不踰戶限時止巖倡道大慈師往謁巖舉南泉不是心不是佛不是物是甚麼師茫然於是仍返南屏一夕聞鄰僧誦證道歌至不除妄想不求真處豁然如釋重負乃曰佛法元在目前人自遠之耳即述偈曰時時覿面不相逢氣力娘生幾喫窮夜半忽然忘月指虗空迸出一輪紅走見止巖巖才見便喝曰何處見神見鬼來師曰今日捉了賊也巖曰贓在何處師便喝巖曰開口合口都不是向上道將來師曰遍界明明不覆藏巖拈竹篦師便掀倒禪牀巖曰敢來者裡捋虎鬚連打三下因命為侍者至順辛未出世里之烏石一十六載遷廣德石溪開堂日僧問遠離烏石嶺來赴石溪山開示人天路如何透祖關師曰龍生金鳳子衝破碧琉璃曰與麼則覿面不相識千里可同風師曰重疊關山路曰達磨西來不立文字直指人心見性成佛既然不立文字何得流傳至今師曰官不容針私通車馬曰直指人心指那箇心師曰開口不在舌頭上曰見性成佛性在甚麼處師曰太湖三萬六千頃夜夜波心月色明曰記得傅大士道空手把鋤頭步行騎水牛人從橋上過橋流水不流此意如何師曰切忌當面蹉過曰與麼則有意氣時添意氣不風流處也風流師曰毫釐有差天地懸隔曰此事且止經中道大富長者即是如來為復是纍劫中來為復是今生契證師曰㵎深華落遠山高樹影長曰今日直心居士營建石溪道場請和尚住是同是別師曰師子吼時芳草緑象王行處百花紅曰既然如是得何果報師曰生生歸佛地世世樂人天上堂大道無形離名絶相不勞修證豈涉言詮一千七百祖師關仔細看來只者是依他作解障自悟門若欲掃去葛藤截斷露布直須向黃面老子方欲拈花之際金色頭陀未曾微笑之時便與掀倒禪牀喝散大衆免使後代兒孫做盡許多伎倆山僧今日更不指東畫西直截與諸人通箇消息良久曰天高羣象正海濶百川朝洪武庚戌十二月示微疾書偈曰生本不生滅本不滅撒手便行一天明月擲筆而逝全身藏烏石慈雲塔院壽七十臘五十天寶樞禪師法嗣杭州府淨慈逆川智順禪師溫之瑞安陳氏子母奉智者大師像甚謹一夕夢僧項有圓光遡江流而上曰我當為汝子寤而有娠師生而美質宿成年七歲從仲父沙門慧光于崇興及長受具遍歷義海忽棄去入閩參天寶鐵關求依住關叱曰丈夫漢不于大叢林相頡頏乃思局此耶抽身便入師下旦過悲泣關聞乃命參堂師由是壁立萬仞晝夜不辨踰月因如廁覩園中瓠瓜觸發頓覺大地平沉走見關關曰此才入門耳向上一著千里萬里又踰半載一日忽厲聲告關曰南泉敗關今已見矣關曰不是心不是佛不是物是甚麼師曰地上甎鋪屋上瓦覆關曰南泉即今在甚麼處師曰子過新羅關曰錯師亦曰錯關曰錯錯師禮拜而退俾典藏鑰尋命分座說法關趨寂師繼領院事未幾棄去渡江入淮禮諸祖塔由建業回浙旋返永嘉開報恩於瑞安遷主江心復開歸原於平陽朝廷賜院額及金襴袈裟號佛性圓辨禪師平章燕只不華鎮閩請住東禪雪峰洪武初詔徵有道高僧十人於鍾山建會師應詔命升座說法上幸臨慰勞備至南還升主淨慈六年復召入京俄示微疾沐浴說偈坐逝縉雲真禪師法嗣太原府五臺山靈鷲碧峰寶金禪師乾州永壽石氏子為邑名胄父母崇善有桑門授以觀音像未幾生師誕時白光盈室甫六歲即命出家剃染後遍歷講肆忽嘆為非遂更衣謁如海真于縉雲晝夜精勤偶携筐擷蔬忽凝坐不動歷三時方寤真曰入定耶師曰然真曰何所見師曰有所悟真曰悟處如何師舉筐示之真曰不是師置筐於地拱手而立真又曰不是師便喝真攔胸擒住曰道道師揑拳便築真曰未在此塵勞暫息耳必使心路絶祖關透然後大法始明師由是脅不沾席者三年一日聞伐木聲汗下如雨乃曰古人道大悟一十八遍小悟無數豈欺我哉未生前事今日方知亟見真真不諾師掀倒禪牀而出翌日復見真真于地上畫一圓相師以袖拂去真復畫一圓相師于圓相中畫一畫又拂去真再畫一圓相師于圓相中畫十字又拂去真復畫如前師于十字隅作卍字又拂去真大笑曰參學悟者世豈無之能明大機用寧復幾人遂授記莂命往朔方道當大行先是師嘗於定中見一山秀麗重樓傑閣金碧絢爛諸菩薩行道其中有招師者曰此祕魔巖也爾修道其中何遽忘之後師遊臺山道逢蓬首女子身被五彩弊衣赤足徐行一黑獒隨後師問何之答曰入山師曰入山何為答曰一切不為言訖而沒叩同行者皆不見知為文殊化身也師因就山建靈鷲菴以待方來僧俗聞風趨赴嘗至萬指至正戊子冬召入內廷值大雪夜有紅光自師室中直透霄漢上驚嘆賜金襴伽黎明年禱雨輒應敕賜寂照圓明大禪師號詔住海印寺洪武初詔師至京住天界問法稱旨辛亥設普濟會於鍾山命師涖其事賜伊蒲饌上親幸臨御翰賜詩壬子六月沐浴更衣集衆言別弟子請偈師曰三藏十二部尚為故紙吾言何為端坐遂瞑目世壽六十五僧臘五十九茶毗舍利成五色齒牙皆不壞慈化瓊禪師法嗣汝州香嚴無聞思聰禪師香山人初參獨峰令看不是心不是佛不是物話同雲峰月山等六人立盟互相究竟次見淮西無能教教示無字話令參一日晤同參敬上座敬問你六七年來有甚見處師曰每日只是目前無一物敬曰你者一絡索從甚處來師罔然乃問畢竟明此大事應作麼生敬曰不見道要知端的意北斗而南看說了便去師被一拶直得不知行坐者七日偶到淨頭寮疑情不解食頃乃覺胸次輕清目前人物一切不見直是通身汗流遂見敬敬舉扇曰速道速道師遽曰舉起分明也妙哉清風匝匝透人懷箇中消息無多子直得通身歡喜來自此下語作頌都無滯礙及至向上一路又不得灑落乃入香嚴山過夏復謁無方普普問萬法歸一一歸何處師曰鼻竪眼橫普曰者是學得底師曰雞寒上樹鴨寒下水普曰不問者箇如何是你父母未生前面目師竪起拳曰看普曰好與三十拄杖師拂袖便出適值鐵山從高麗回至石霜師往見山問仙府何處師曰汝州山曰風穴面目如何師將二十年工夫通說一遍山把定咽喉問如何是無字師曰近從潭州來不得湖北信山曰未在更道師曰和尚幾時離高麗山曰未在更道師喝一喝拂袖便出山曰者兄弟都好只一件大病道我發明了師聞而感激復入光州山中十七年方得穎脫嘗示衆曰法無定相遇緣即宗秉金剛劍吞栗棘蓬截斷衲僧舌頭坐却毗盧頂𩕳拈一莖草作丈六金身將丈六金身作一莖草直教寸絲不挂月冷秋空寒灰發焰到者裡喚作佛法入地獄如箭射不喚作佛法入地獄如箭射諸仁者畢竟作麼生會不見船子道藏身處沒蹤跡沒蹤跡處莫藏身雖然恁麼正眼觀來盡是閒家具衲僧分上料掉沒交涉常州府宜興玉峰寂照無極導禪師吳興趙氏子生時白光盈室者三夕值元兵下江南母計氏為游兵俘去師長以求母持大士名至切遍尋十餘年得之河間於是偕禮普陀從鐵山瓊落髮次謁及菴信于道場無隱元于淨慈因泛湖聞漁歌脫然有省呈元元曰此間無你棲泊處師拂衣去尋築菴辨山之陽母終葬畢一夕空中有白衣人語曰緣在宜興於是得玉峰山建寂照禪院邑人翕然宗之至順壬申正月六日無疾趺坐而逝世壽六十五僧臘三十闍維舍利無數分塔於寂照中隱二處中隱在邑之東北亦師所創也大鑑下第二十四世烏石愚禪師法嗣江寧府靈谷非幻無涯道永禪師衢之西安浮石吳氏子父夢明果至門誕之投烏石傑峰出家峰問何處來師應聲曰虗空無向背峰指鐘示師師信口成頌曰百鍊爐中滾出來虗空元不惹塵埃如今挂在人頭上觸著洪音遍九垓時年始十二峰大奇之旋為祝髮居下版服勤積久疑滯盡釋得無礙辨峰為印可永樂間敕住靈谷會朝廷建大齊有禮官董事甚嚴師若不經意者左右怪問之師曰自家有一大事甚緊無暇他及沐浴更衣趺坐書偈曰生死悠悠絶世緣蒙恩永樂太平年者回撒手歸空去雪霽雲消月正圓投筆而逝上聞遣中官致祭茶毗舍利遍布七衆歎未曾有溫州府護龍太初啓原禪師日本國源氏子父官方宰九歲送入建長寺出家十八請旨南詢歷三年抵福州時吳元之丙午二月進京貢上引師見上上喜敕見季潭泐泐指令遍參後謁傑峰一日峰上堂曰雪覆千山因甚麼孤峰不白師出衆曰雷聲隱隱雨點全無峰曰草菴上蓋琉璃瓦石室中藏瑪瑙瓶師曰大蟲騎却南山虎峰曰虎生七子阿那箇無尾巴師曰第七箇峰曰且放汝三十棒由是許入室後辭結茅廬阜復移石龍出世廣度遷羅陽三峰再遷護龍嘗垂三關語一曰舜若多神因甚麼向平地上拖泥帶水二曰金翅鳥王劈海取龍吞因甚麼被泥鰍吞却三曰三世諸佛說不得因甚麼狸奴白牯念摩訶永樂丁亥三月朔集衆說偈曰生也鐵面皮死也鐵面皮一擊百雜碎白日繞須彌遂坐逝塔於南院
