body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十九世天童派禪師法嗣寧波府天寧無鏡徹禪師舉僧問巖頭浩浩塵中如何辨主頭曰銅沙鑼裡滿盛油話頌曰百萬雄兵入漢關威如猛虎陳如山單刀直取顏良首不是關公也大難福州府金鰲峰定禪師題玄沙像曰青蓑不肻換金章千古風流屬謝郎釣得錦鱗人不薦夜寒沙上聽鳴榔育王印禪師法嗣湖州府道場別浦法舟禪師嘗作魚籃觀音讚曰月眉斜印海門孤逐浪隨波不丈夫雙手向人提掇起却將魚目換明珠無極觀禪師題世尊出山像曰王宮不住箇癡呆半夜逾城真怪哉苦行六年誰采你計窮只得出山來育王瑞禪師法嗣寧波府瑞巖無量崇壽禪師舉白侍郎問鳥窠如何是佛法大意窠曰諸惡莫作衆善奉行侍郎曰三歲孩兒也解與麼道窠曰三歲孩兒雖道得八十老人行不得頌曰惡無相貌善無形皆自心田長養成不露鋒鋩輕點破菩提煩惱等空平舉世尊夜覩明星悟道機緣頌曰明星現處眼皮穿漢語胡言萬萬千暴富乞兒休説夢誰家竈裡火無煙何山清禪師法嗣福州府雪峰北山信禪師舉世尊覩星悟道機緣頌曰六年凍得眼無光一見明星雪後霜擔水出山頻喚賣不知江海白茫茫育王堪禪師法嗣饒州府薦福無文燦禪師吉安泰和柳塘人從育王得法理宗寶慶丁亥六月受請住薦福次遷開先紹定己丑復主薦福據室山僧今日開地獄門普請盡大地人造地獄業證地獄果若有一人成佛作祖我誓不成正覺上堂拈香畢乃曰天高地厚日盈月昃全提半提天地懸隔燦上座平生只會著衣喫飯聞人説佛法二字如風過樹頭如水澆頑石今日裂破面門喚作長老也欲與諸人論説一上無端冒五六月大熱行二千里修途一時打失了也雖然賴有拄杖子在拈拄杖曰拄杖子試説看卓一下曰清平世界切忌訛言當晚小參鼓棹揚帆駕沒底船橫行海上神頭鬼面用無文印勘驗諸方二千里遠來住山單單地提持此事舉拂子曰看看印文已露劃一劃曰錦縫已開若佛若祖若聖若凡盡向者裡一印印定直得盡乾坤大地風颯颯地衆中忽有箇犯衆出來道長老你且莫大驚小怪我在威音王佛世已證是三昧又作麼生以拂子擊禪牀下座上堂雲門放洞山三頓棒黃檗打臨濟三頓棒減竈添兵傷鹽費醬一不成單二不成兩多少蘆華對蓼紅時人只看絲綸上上堂諸佛法門祖師要妙夜來四簷雨説得盛水不漏汝等諸人若向者裡承當者裡保任以手搖曳曰料掉料掉開爐併謝耆舊踏田上堂趙州無賓主話田地穩密底開口便道著信腳便踏著若是東西不辨南北不分未免被人侵疆越界薦福門下總是田地穩密底人拈起香匙放下火筯一一天真因甚如此公驗分明上堂臨濟處半杓拄山處半杓玉本無瑕妄自雕琢有年無德老睦州無端拶折雲門腳端午上堂符不書藥不採起死禁不祥拈拄杖曰幸有者箇在卓一下曰滿院熏風夏日長人在藕華香世界開先結夏小參大華藏海渺無邊際江河溪澗流入其中咸失本名魚龍蝦蟹遊泳其中咸失本性三世諸佛於中成等正覺一切衆生於中流浪生死現前大衆於中成就無功用學拈拄杖卓一下曰開先拄杖子一口吸乾了也三世諸佛一切衆生現前大衆畢竟向甚麼處行履良久曰曹溪波浪如相似無限平人被陸沉冬至小參滴水氷生未可歇去崖崩石裂正好進程直饒會得一線長要且未會長一線直饒會得長一線要且未會一線長所以鄉談相似州縣不同開先則不然擾擾匇匇晨雞暮鐘喚冬作夏喚夏作冬一線短長誰管得雪霜盡處是春風再住薦福當晚小參去去實不去是法住法位來來實不來世間相常住山僧屈指五載重到東湖荷盡已無擎雨蓋春風猶在柳梢頭無一絲毫去來相無一絲毫新舊相見則與諸人共見聞則與諸人共聞箇中忽有箇出來道無文將常住物作自己用固有之你也忒煞忒煞嗄元來衆中有人在復舉德山小參不答話鉤在不疑之地時有僧出著了也山便打果然僧曰某甲話也未問因甚便打不識痛癢漢山曰你是甚處人第二下鐵鎚來也僧曰新羅人和聲送出山曰未跨船舷好與三十棒雷聲浩大雨點全無大衆大小德山龍頭蛇尾却引者僧向草窠裡頭出頭沒當時待他道某甲話也未問因甚打某甲腳跟下痛與三十何故為人須為徹上堂風蕭蕭雨蕭蕭天高地厚水濶山遙達磨大師無端遊梁歷銀二祖大師平白失了一臂水潦和尚不合喫馬大師一踏天下大禪佛枉自喫了四藤條説著令人恨不消上堂佛祖未興時天然一句子不東不西不橫不竪衲僧家東咬西嚼從朝至暮橫也無奈何竪也無奈何拍膝一下曰若向者裡進得一步自然和聲送出兩手分付若祇向册子上學得來印板上脫將去山無重數水無重數結夏上堂百不知百不會飽喫飯熟打睡要得尅期取證須證如是三昧師嘗與其友知無聞書曰住院何足道哉近年敕差堂除者何限可挂齒牙者能幾人使吾有口可以吞三世諸佛則曲彔牀終身不坐又何慊無聞以為何如某昔者入衆見識字人多不修細行遂決意不作書記諸老據位稱師者又多看不上眼遂無意出世今皆不遂其初矣住院十年名為長老只是舊時燦上座飲食起居與堂僧無異相從衲子歲不下百數十人遇五日撾鼓升堂以平時在諸老間所得細大法門隨分東語西話斷不敢以脫空語籠學者亦不敢以過頭語欺謾學者説到無巴鼻無滋味處欣然自笑聽者不必解笑也士大夫多相知然所知者不過謂其讀書也能文也解起廢也硬脊梁也蓋膽毛幾莖則知者鮮矣大鑑下第二十世淨慈明禪師法嗣太原苦口良益禪師參淨慈慈問曰近離甚處師曰瑞光慈曰正與麼時光在甚麼處師便喝慈曰且止汝道西湖水深多少師擬議慈便打趂出久之契悟獻投機頌曰臨機一句不露絲頭吹毛才展大地全收慈曰從上心印汝今得之宜處深谷俟時行化咸淳癸酉出住中山靈鷲上堂臨濟德山雲騰致雲趙睦二州合水和泥拆東籬補西壁眼觀東南意在西北一箇箇祇有愛壁之心且無割城之意引得後來一些沒勾當底長老連類比事磨稜合縫説黃底説黃論黑底論黑平白地上一堆一擔看來真箇好笑若是喉中有氣底斷不走恁般蹊徑時有數僧競出師拈拄杖一時打散徑山珍禪師法嗣杭州府徑山元叟行端禪師臨海何氏子母陳世業儒師生而秀拔十二從族叔茂于餘杭化城院得度十八受具戒一切文字不由師授初參藏叟於徑山叟問甚處人師曰台州叟便喝師展坐具叟又喝師收坐具叟曰放汝三十棒參堂去師於言下頓悟後典第一座于徑山元大德庚子出世湖之資福特旨賜號慧文正辨禪師次主中竺皇慶壬子遷靈隱有旨設水陸會于金山命師説法事竣入覲便殿加賜佛日普照陛辭南歸養高于良渚之西丘至治壬戌徑山虗席請師補處焉僧問如何是正法眼師曰十字街頭石敢當曰只者便是麼師曰月似彎弓少雨多風上堂舉僧問趙州狗子還有佛性也無州曰無又僧問狗子還有佛性也無州曰有師曰若以無為究竟後來因甚道有若以有為諦當前面因甚道無者裡捉敗趙州許你天上天下上堂心不是佛兔馬有角智不是道牛羊無角驀拈拄杖畫一畫曰一夜落華雨滿溪流水香上堂秋風涼秋夜長未歸客思故鄉拍禪牀曰自是不歸歸便得五湖煙景有誰爭上堂邊戍朝鳴角空山夜答鐘人人皆共聽何處不圓通元宵上堂并謝監收浴主維那千粒萬粒從一粒生只者一粒從甚麼處生千燈萬燈從一燈起只者一燈從甚麼處起識得一燈千燈萬燈燈燈不疑識得一粒千粒萬粒粒粒無礙三腳驢子弄蹄行踏破無邊香水海拈拄杖卓一下曰頂門也少者一下不得問新到何方聖者甚處靈祇僧曰臨朕砧師曰杜撰禪和如麻似粟參堂去問住僧棋盤石斫破你腦門盂池浸爛你腳板僧擬答師便喝問僧擘開華嶽連天秀放出黃河徹底清即且置平實地上道將一句來僧擬開口師便打師以呵叱怒罵為慈誘之誨以不近人情行大公之道凡有利物皆陰為之沒齒不言生宋寶祐乙卯以至正辛巳八月四日示微疾沐浴更衣書偈訣衆曰本無生滅焉有去來氷河發焰鐵樹華開投筆垂一足而化留龕七日顏色如生世壽八十七僧臘七十六以是月十一日奉全身葬於寂照塔院分爪髮建塔化城淨慈穎禪師法嗣溫州府江心一山了萬禪師臨川金氏子貌瘠而弱年十五業程文有聲去從金溪常樂院祝髮遊方謁偃溪聞荊叟珏簡翁敬諸老皆相吻合東叟領南屏命師掌記偶經神祠見紙灰旋起脫然忘所證亟以白叟叟詰之有緒為印可焉遊天台衆請開法寒巖踰三年遷仙居紫籜又十年遷疏山因事即撾退鼓江淮總統會諸山以開先迎師至叢林鼎新又十年遷住江心少拂意即棄去會廬山月澗明迎師歸東溪明寂衆復以開先請師力却不可勉應之上堂靜悄悄鬧浩浩渾不涉階梯已踏向上道萬里無寸草出門便是草撞著賣柴翁便是栽松老琉璃殿上月團團珊瑚枝上日杲杲上堂逢堯舜則陳典謨要立生涯遇桀紂則用殺伐盡掃窠臼吾輩人乾𭨃曝硬糾糾淨裸裸赤灑灑何曾有許多事可怪陳睦州見僧入門便道現成公案放汝三十棒子細看來也是窮急計生上堂拈拄杖曰此拄杖子西天四七東土二三天下老和尚拈弄不出今日落在開先手裡無頭無尾能放能收離相離名能縱能奪雖然如是也只為中下之機忽遇上上人來時如何以拄杖畫一畫曰放過一著皇慶壬子十一月二十六日遘疾危坐閲七日命具浴更衣書訣衆語泊然而逝闍維收五色舍利如菽無數目睛齒牙頂骨俱不燼時改作豫章烏遮塔江西行省丞相幹赤命以舊藏世尊舍利奉于中遣使分師之目睛舍利貯之銀盒陪葬焉其餘分葬東溪寧波府奉化嶽林栯堂益禪師溫州人開法婺之天寧遷饒之薦福後主明州大平復升彰聖晚住嶽林上堂古者道我者裡無法與人只是據款結案彰聖者裡亦無法與人亦不據款結案拈拄杖曰如何是佛赤腳踏蓮花如何是佛向上事雕梁畫棟擲下拄杖便歸方丈二月十五日上堂擊拂子曰彰聖今日將三十年前冷灰裡𪹼出底烏豆換老胡眼睛去也喝一喝曰設有一法過於涅槃我此一喝不作一喝用上堂魯祖面壁麻谷閉門二大老雖與天寧相去數百年今日要各與他二十拄杖何故譬如油蠟作燈燭不以火點終不明示衆諸上座出息不保入息二六時中切莫將身心別處雜用饒你掉臂也是祖師西來意腳尖頭也踢出一尊古佛來不如無事好上堂舉黃龍三關話師曰黃龍老漢頭匾所以説漳泉福建話逼真謾得天下人過謾漳泉福建人不過上堂以手指左邊曰者是香爐指右邊曰者是華瓶能以一義作無量義以無量義為一義陳尊宿織蒲鞋鄧師伯打瓦鼓上堂諸上座步步是諸人證明處須是自肯方可歸家穩坐若不然者𧑀蛣腹蟹水母目蝦上堂五千四十八卷只作一句道却遂起身曰立地待諸人搆取便下座上堂一切世間諸所有物皆即菩提妙明元心石脾入水即乾出水即溼獨活有風不動無風自搖臨終書偈曰八十三年甚麼巴鼻柏樹成佛虗空落地茶毗舍利瑩然齒牙數珠不壞金華府智者雲屋自間禪師括蒼葉氏子烏巨行九世孫也初參荊叟珏於靈隱次謁東叟穎於淨慈掌記室一日因撰佛成道疏曰發見精於午夜叟曰何不道泯見精於午夜師不覺股栗汗下如發蒙蔀徹見叟垂手為人處自是韜晦甚堅雖雙林遷智者兩提鈯斧乃為人所強耳皇慶壬子十月二十五日與客語笑次忽命侍僧取筆書偈而逝無方安禪師法嗣枯木榮禪師有三祖贊曰風恙纏身世莫醫家貧遭劫更堪悲誰知覓罪了無處正是賊歸空屋時育王觀禪師法嗣杭州府徑山佛智晦機元熙禪師豫章唐氏子師與兄元齡俱習舉業齡既登第師乃從西山山明祝髮將遊方母具白金為裝師謂財足喪志辭之依物初於玉几初與語驚異後謁東叟穎於南屏典記室至元間楊璉真加奉旨取育王舍利躬詣師求記因招與俱師辭曰我有老母兵後存亡不可知遂辭歸江西元齡死難獨母在堂師奉之以孝聞元貞丙申出世百丈至大初繼席淨慈上堂雲門道箇普字盡大地人不奈何殊不知雲門四稜踏地當時若與震威一喝待他惡發徐徐打箇問訊道莫怪觸忤好非但扶起此老管取話行天下上堂三界無法何處求心白雲為蓋流水作琴古今無間誰是知音擊拂子曰一曲兩曲無人會雨過夜塘秋水深上堂獨坐大雄峰寒灰撥不紅一星螢火出孤鶴過遼東結制上堂以手作結布袋勢曰南山今日結却布袋口了也汝等諸人各各於其中身心安居平等性智忽有箇衝開碧落撞倒須彌底莫道結子不堅密良久曰漫天網子百千重舉太原孚聞角聲悟道話頌曰琴生入滄海太史遊名山從此揚州城外路令嚴不許早開關延祐甲寅復遷徑山已而杖䇿歸南屏而百丈大仰爭來迎請師不獲已遂返仰山居三年將示寂手書辭所與遊者復書偈訣衆擲筆而化當元仁宗延祐己未閏八月十七日世壽八十二全身瘞於金雞石下復分爪髮塔於淨慈西隱徑山聞禪師法嗣杭州府徑山雲峰妙高禪師福之長溪人世業儒母阮夢池上嬰兒合爪坐蓮華心手捧得之覺而生師因名夢池神彩秀徹嗜書力學尤耽釋典依雲夢澤剃染受具戒首參癡絶次見無準後之育王見偃溪典藏鑰一日溪舉譬如牛過窗櫺頭角四蹄都過了因甚尾巴過不得師劃然有省遽曰鯨吞海水盡露出珊瑚枝溪曰也只道得一半會溪遷南屏師與俱後出世住宜興大蘆繼遷江陰勸忠霅川何山奉朝命居蔣山十三載德祐乙亥寺被兵軍士有逼師求金者以刃擬師師延頸曰欲殺即殺吾頭非汝礪刃石辭色了無怖畏軍士感化棄刃而去元至元庚辰遷徑山先是寺罹回祿草創才什一不數年遂還舊觀示衆前念是凡後念是聖一刀兩段更莫遲疑是以涅槃會上廣額屠兒放下屠刀便言我是千佛一數雖然若無舉鼎拔山力千里烏騅不易騎示衆言前辨旨句下明宗東計山熾然説法湛瀆水專為流通者裡搆得未免相鈍置若或尚存觀聽擾擾匇匇晨雞暮鐘上堂聲色為無生之鴆毒受想乃至人之坑穽者般説話阿誰不知然粗餐易飽細嚼難飢上堂世界未形乾坤泰定生佛未具覿體全真無端鏡容大士向鷹巢躍出擘破面皮早是遭人描邈那更缺齒老胡不依本分遙望震旦國有大乘根器迢迢十萬里來意在攙行奪市直得鳳樓鼓響阿閣鐘鳴轉喉觸諱插足無門合國難追重遭揭露新蔣山迫不得已跨他船舷入他界分新官不理舊事畢竟如何拍禪牀曰戍樓靜貯千峰月塞草間鋪萬里秋上堂五峰峭峙到者須是其人一鏡當空無物不蒙其照祖師基業依然猶在衲僧活計何曾變遷著手不得處正好提撕措足無門時方堪履踐直得山雲淡濘澗水潺湲一曲無私萬樂業正恁麼時功歸何所車書自古同文軌四海如今共一家至元戊子春僧録楊輦真加奉旨集江南教禪諸德朝覲論道上問禪以何為宗師進前奏曰禪也者淨智妙圓體本空寂非見聞覺知之所可知非思量分別之所能解上又曰禪之宗裔可歷説乎師曰禪之宗裔始於釋迦世尊在靈山會上拈金色波羅華普示大衆惟迦葉一人微笑世尊曰吾有正法眼藏涅槃妙心分付於汝迦葉受囑由此代相授受而至菩提達磨達磨望此東震旦國有大乘根器航海而來止少林九年而得慧可不立文字直指人心見性成佛是為禪宗也上嘉之師因從容奏曰禪與教本一體也譬如百千異流同歸於海而無異味又如陛下坐鎮山河天下一統四夷百蠻隨方而至必從順承門外而入到得黃金殿上親覩龍顏方可謂之到家若是教家只依文字語言不達玄旨猶是順承門外人若是禪家雖坐破六七箇蒲團未得證悟亦是順承門外人謂之到家俱不可也是則習教者必須了達玄旨習禪者必須頓悟自心如臣等今日親登黃金殿上親覩龍顏方可稱到家人也上喜賜食而退陛辭南歸會徑山復危熒惑師為竭力營建煥然一新癸巳六月十七日書偈而逝師生於嘉定己卯二月十七日世壽七十五僧臘五十九塔於寺之西麓湖州府何山鐵鏡至明禪師福唐長溪黃氏子首謁堯叟蓂於嘉禾天寧復見偃溪於淨慈久之獲印證訪清溪沅於虎丘藏叟珍於雙徑至元辛巳出世何山移大梅大德庚子復歸何山上堂著意馳求驢年見面盡情放下瞥爾現前香嚴聞擊竹聲徹見本來面目即不問且道恁麼熱向甚麼處回避歸堂喫茶去上堂原野秋陰寒螿悉吟楓林落葉片片赤心達磨頂門無骨兒孫海底摸針忽然摸著時如何誰道龍王宮殿深上堂達磨不來東土官路少人行二祖不往西天私酒多人喫何山門前一條大路南來北往知是幾多只是中間一塊石頭未曾有人踏著衆中莫有踏著者麼擲下拄杖曰看腳下上堂今朝八月二十五記得洞山離查渡落在雲門網子中有屈至今無處訴竪起拂子曰雲門大師來也合喫何山手中棒且道過在甚麼處不合鼓弄人家男女仁宗延祐乙卯十一月十五日呼其徒囑後事索紙大書曰絶羅籠沒回互大海波澄虗空獨露擲筆翛然而逝壽八十六寧波府天童止泓鑒禪師初住信州真如移席天童上堂諸佛不真實説法度羣生菩薩有智慧見性不分明白雲無心意灑為世間雨大地不含情能長諸草木古德與麼提唱於四諦法中開鑿人天不妨善巧若據衲僧分上何啻白雲萬里上堂拈拄杖曰一有多種二無兩般枯桑知天風海水知天寒拄杖子聞與麼道不覺欣欣笑曰出身猶可易脫體道應難擲拄杖下座舉太陽玄問梁山如何是無相道場山指大士幀子曰者是吳處士畫底玄擬進語山急索曰者是有相底那箇是無相底玄遂有省便作禮山曰何不道取一句玄曰道即不辭恐上紙筆山笑曰此語上去在頌曰真空無相絶名模空底精兮畫底粗道即不辭難上紙西天鬍子沒髭鬚天童阡禪師法嗣九江府廬山圓通雪溪逸禪師題興化像曰中原一寶有來由拶得君王引幞頭到此若無青白眼當機誰敢謾輕酬雙林朋禪師法嗣杭州府靈隱悅堂祖誾禪師南康周氏子端平甲午八月一日生年十三依郡之嘉瑞僧偃剃髮受具一日閲華嚴至惟一堅密身一切塵中現忽有省即往見別山智於蔣山山問近離何處師曰江西山曰馬大師安樂否師叉手進前曰起動和尚未幾至杭見斷橋倫於淨慈慈問臨濟三遭黃檗痛棒是否師曰是慈曰因甚大愚肋下築三拳師曰得人一牛還人一馬慈頷之慈逝柏山介石補其處一日石室中舉庭前柏樹子話師擬議石抗聲曰何不道黃鶴樓前鸚鵡洲師言下頓悟即命侍香久之歸廬山東嚴日住圓通延師分座九江守聘師出世西林至元甲午遷開先又遷東林元貞初奉詔入對稱旨賜璽書通慧禪師號并金襴法衣大德乙巳遷住靈隱嘗勘一僧曰微塵諸佛在你舌頭上三藏聖教在你腳跟底何不瞥地僧罔措師便喝問僧釋迦彌勒是他奴他是阿誰僧擬對師便打問新到何處來曰閩中師曰彼處佛法如何住持曰飢即喫飯困則打眠師曰錯僧曰未審和尚此間如何住持師拂袖歸方丈至大己酉一日集衆訣別説偈曰緣會而來緣散而去撞倒須彌虗空獨露乃泊然而逝世壽七十六僧臘五十三靈隱濟禪師法嗣寧波府天童石門來禪師嘗作剪刀頌曰渾鋼打就冷光浮兩刃交鋒未肯休直截當機為人處何曾動著一絲頭寧波府雪竇野翁炳同禪師新昌張氏子參大川一日入室次川舉臘月火燒山話師擬開口川遽拈竹篦拄之師豁然悟旨後縛茅仗錫峰日扄戶書法華嘗有老來非厭客靜裡欲書經之句晚應雪竇送僧之華頂見溪西偈曰高高峰頂屹雲中八十溪翁眼界空相見莫言行腳事纍他雙耳又添聾成宗大德壬寅中秋日升座辭衆而逝天寧徹禪師法嗣嶽州府灌溪昌禪師山居偈曰間來石上玩青松百衲禪衣破又縫今日不憂明日供生涯只在盂中雪峰信禪師法嗣紹興府大慶尼了菴智悟禪師生福州王氏幼禮祥山普升得度誦維摩經至諸佛國土亦復皆空豁然頓悟時北山退漳之南院間居鼓山西菴師往參叩山問上座甚麼處住師曰不住南臺江邊山曰畢竟住在甚麼處師不審便行山叱曰走作甚麼合喫山僧手中棒師面熱汗下次日復往請益曰某甲昨日祇對和尚有甚麼過山厲聲曰更來者裡覓過在師釋然曰月明照見夜行人山顧旁僧曰看渠根器不凡遂贈以偈有相逢若問其中事風攪螺江浪拍天之句後出世蘇之西竺一日癡絶來訪乃問子悟處如末山見大愚忽然撞著灌溪來時如何師曰大海不讓細流癡絶一笑而已寶祐戊午住大慶僧問灌溪道我在臨濟爺爺處得半杓末山娘娘處得半杓畢竟是有是無師曰八花毬子上何用繡紅旗上堂拈拄杖曰天垂十二闌干角風滿三千世界中熱惱變成清淨境禪心頓覺悟真空靠拄杖曰有甚共語處上堂太陽門下日日三秋明月堂前時時九夏古人恁麼道未免坐在者裡大慶即不然山轉疑無路溪回別有村上堂柳絮飄風杏葉沐雨好箇生機快須薦取以拂子擊禪牀曰咄三十年後不得錯舉薦福燦禪師法嗣福州府支提愚叟澄鑒禪師寧德張氏子參無文於薦福遂得入室後出世白雲至元辛卯世祖敕住支提賜號通悟明印大師其示寂曰沐浴更衣書偈曰八十二年落賺世緣躍翻筋斗應迹西乾擲筆危坐而逝
