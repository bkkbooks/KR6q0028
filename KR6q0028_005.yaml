body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十六世長蘆卓禪師法嗣寧波府育王無示介諶禪師溫州張氏子謝知事上堂尺頭有寸鑑者猶稀秤尾無星且莫錯認若欲定古今輕重較佛祖短長但請於中著一隻眼果能一尺還他十寸八兩元是半斤自然內外和平家國無事山僧今日已是兩手分付汝等諸人還肯信受奉行也無良久曰尺量刀剪遍世間誌公不是閒和尚下座上堂文殊智普賢行多年曆日德山棒臨濟喝亂世英雄汝等諸人穿僧堂入佛殿還知嶮過鐵圍關麼忽然踏著釋迦頂𩕳磕著聖僧額頭不免一場禍事上堂我若說有你為有礙我若說無你為無礙我若橫說你又跨不過我若竪說你又跳不出若欲叢林平怗大家無事不如推倒育王且道育王如何推得倒去召大眾曰著力著力復曰苦哉苦哉育王被人推倒了也還有路見不平拔劍相為底麼若無山僧不免自倒自起擊拂子下座師性剛毅涖眾有古法時以諶鐵面稱之湖州府道場慧琳普明禪師福州人上堂有漏笊籬無漏木杓庭白牡丹檻紅芍藥因思九年面壁人到頭不識者一著且作麼生是者一著以拄杖擊禪牀下座上堂一即多多即一毗盧頂上明如日也無一也無多現成公案絕誵訛拈起舊來氈拍版時清共唱太平歌湖州府道場無傳居慧禪師本郡吳氏子上堂鍾馗醉裡唱凉州小妹門前祇點頭巡海夜叉相見了大家拍手上高樓大眾若會得去鎖却天下人舌頭若會不得切不得謂老僧別有奇特上堂百尺竿頭弄影戲不唯瞞你又瞞天自笑平生岐路上投老歸來沒一錢上堂舉臨濟示眾曰一人在高高峰頂無出身之路一人在十字街頭亦無向背且道那箇在前那箇在後師曰更有一人不在高高峰頂亦不在十字街頭臨濟老漢因甚不知便下座杭州府顯寧松堂圓智禪師上堂蘆花白蓼花紅溪邊修竹碧煙籠閒雲抱幽石玉露滴巖叢昨夜烏龜變作鼈今朝水牯悟圓通咄湖州府安吉州烏回唯菴良範禪師上堂塵劫已前事堂堂無背面動靜莫能該舒卷快如電莫道凡不知佛也覰不見決定在何處合取皮兩片薦不薦更為諸人通一線良久曰天下太平皇風永扇上堂舉僧問趙州至道無難唯嫌揀擇是時人窠窟否州曰曾有人問老僧直得五年分疎不下師召眾曰趙州具頂門眼向擊石火裡分緇素閃電光中明縱奪為甚麼却五年分疎不下還委悉麼易分雪裡粉難辨墨中煤溫州府本寂靈光文觀禪師本郡葉氏子上堂過去諸如來斯門已成就好事不如無現在諸菩薩今各入圓明好事不如無未來修學人當依如是住好事不如無還知麼除却華山陳處士何人不帶是非行參上封才禪師法嗣福州府普賢元素禪師建寧人上堂兵隨印轉三千里外絕煙塵將逐符行二六時中淨躶躶不用鐵旗鐵鼓自然草偃風行何須七縱七擒直得無思不服所謂大丈夫秉慧劍般若鋒兮金剛焰非但能摧外道心早曾落却天魔膽正恁麼時且道主將是甚麼人喝一喝上堂南泉道我十八上便解作活計囊無繫蟻之絲廚乏聚蠅之糝趙州道我十八上便解破家散宅南頭買賤北頭賣貴點檢將來俱好與三十棒且放過一著何故曾為蕩子偏憐客自愛貪杯惜醉人上堂未開口時先分付擬思量處隔千山莫言佛法無多子未透玄關也大難祇如玄關作麼生透喝一喝下座福州府鼓山山堂僧洵禪師本郡阮氏子上堂黃檗手中六十棒不會佛法的的大意却較些子大愚肋下築三拳便道黃檗佛法無多子鈍置殺人須知有一人大棒驀頭打他不回頭老拳劈面槌他亦不顧且道是誰上堂朔風掃地卷黃葉門外千峰凜寒色夜半烏龜帶雪飛石女谿邊皺兩眉卓拄杖曰大家在者裡且道天寒人寒喝一喝曰歸堂去福州府鼓山別峰祖珍禪師興化林氏子母陳氏夢曾遺以明珠因詢何來僧曰余黃涅槃也覺而有姙生有奇相通身毛長二寸常謁鼓山鑒淳尋參佛心於東山及心移鼓山師典第一座心去師為繼席又遷泉之法石僧問趙州遶禪牀一匝轉藏已竟此理如何師曰畵龍看頭畵蛇看尾曰婆子道比來請轉全藏為甚麼祇轉得半藏此意又且如何師曰人無遠慮必有近憂曰未審甚麼處是轉半藏處師曰不是知音者徒勞話歲寒上堂尋牛須訪跡學道貴無心跡在牛還在無心道易尋竪起拂子曰者箇是跡牛在甚麼處直饒見得頭角分明鼻孔也在法石手裡上堂向上一路千聖不傳卓拄杖曰恁麼會得十萬八千畢竟如何桃紅李白薔薇紫問著春風總不知示眾大道祇在目前要且目前難覩欲識大道真體不離聲色言語卓拄杖曰者箇是聲竪起拄杖曰者箇是色喚甚麼作大道真體直饒向者裡見得也是鄭州出曹門示眾若論此事如人喫飯飽則便休若不飽必有思食之心若過飽又有傷心之患到者裡作麼生得恰好去良久曰且歸巖下宿同看月明時師甞造七佛塔於法石工畢遂去隱夾嶺之白水巖將寂說偈曰生本無生死本無死生死二途無彼無此茶毗舍利不可以數計塟法石焉黃龍逢禪師法嗣饒州府薦福常菴擇崇禪師寧國人上堂舉僧問古德生死到來如何免得德曰柴鳴竹𪹼驚人耳曰不會德曰家犬聲獰夜不休師曰諸人要會麼柴鳴竹𪹼驚人耳大洋海底紅塵起家犬聲獰夜不休陸地行船三萬里堅牢地神笑呵呵須彌山王眼覰鼻把手東行却向西南山聲應北山裡千手大悲開眼看無量慈悲是誰底良久曰頭長脚短少喜多瞋上堂問侍者曰還記得昨日因緣麼曰記不得復顧大眾曰還記得麼眾無對却竪起拂子問還記得麼良久曰也妄却了也三處不成一亦非有諸人不會方言露柱且莫開口以拂子擊禪牀下座上封秀禪師法嗣文定公胡安國字康候自號草菴居士久依上封得言外旨崇寧中過藥山有禪人舉南泉斬貓話問公公以偈答曰手握乾坤殺活機縱橫施設在臨時玉堂兔馬非龍象大用堂堂又豈知寄上封偈曰祝融峰似杜城天萬古江山在目前須信死心元不死夜來秋月又同圓萬年一禪師法嗣嘉興府報恩法常首座開封人丞相薛居正之裔徽宗政和丁酉依長沙益陽華嚴元軾下髮徧依叢林于楞嚴深入義海自湖湘至萬年謁雪巢機契命掌牋翰後首眾報恩室中唯一矮榻餘無長物宣和庚子九月中語寺僧曰一月後不復留此十月二十一往方丈謁別將曉書漁父詞於室門就榻收足而逝詞曰此事楞嚴甞露布梅華雪月交光處一笑寥寥空萬古風甌語逈然銀漢橫天宇蝶夢南華方栩栩斑斑誰跨豐干虎而今忘却來時路江山暮天涯目送鴻飛去黃龍震禪師法嗣常德府德山無諍慧初禪師常州靖江人上堂顧視大眾曰見麼在天成象在地成形在日月為晦為朔在四時為寒為暑鼓之以雷霆潤之以風雨且道在衲僧分上又作麼生一趯趯翻四大海一拳拳倒須彌山佛祖位中留不住又吹漁笛汨羅灣上堂九月二十五聚頭相共舉瞎却正法眼拈却雲門普德山不會說禪贏得邨歌社舞阿呵呵邏囉哩遂作舞下座嶽山祖禪師法嗣南康府廬山延慶叔禪師僧問多子塔前共談何事師曰一回相見一回老能得幾時為弟兄僧禮拜師曰唐興今日失利雲巖游禪師法嗣杭州府徑山塗毒智䇿禪師天台陳氏子年十六落髮十九造國清謁寂室光灑然有省次謁大圓於明州萬壽圓問甚處來師曰天台來曰見智者大師麼師曰即今亦不少曰因甚在汝脚跟下師曰當面蹉過圓曰上人可謂不耘而秀不扶而直往豫章謁典牛道由雲居風雪塞路坐閱四十二日午初版聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼來師曰雲居聞版聲來牛曰是甚麼師曰打破虗空全無柄靶牛曰向上事未在師曰東家暗坐西家廝罵牛曰嶄然超出佛祖他日起家一麟足矣辭去菴淮西烏崖大圓移大溈請師居第一座一日有相者謂師無後大圓不懌曰吾期子濟濟多眾如雪峰溈山不謂子僅如是奈何師曰參學唯恐無本苟有本對泥像說法亦高出諸方圓乃歎曰子器識過人玄酒大羹非常流所能知味也東歸分座國清出世住黃巖普澤次應台之太平吉之祥符越之等慈及大能仁後自護國赴徑山上堂瞿曇道若以色見我以音聲求我是人行邪道不能見如來雖然恁麼正是捕得老鼠打破油甕天衣道你眼在甚麼處雖則識破釋迦老子爭奈拈䭔䑛指若是塗毒即不然色見聲求總不妨百華影裡繡鴛鴦自從拾得金針後一任風吹滿路香將示寂陞座別眾囑門人以文祭之師危坐傾聽至尚饗為之一笑越兩日沐浴更衣集眾說偈曰四大既分飛煙雲任意歸秋天霜夜月萬里轉光輝俄頃泊然而逝壽七十六夏六十塔全身於東岡之麓信相顯禪師法嗣成都府金繩文禪師僧問如何是大道之源師曰黃河九曲曰如何是不犯之令師曰鐵蛇鑽不入僧擬議師便打圓通旻禪師法嗣九江府廬山圓通密印守慧禪師興化陳氏子初住圓通次遷潭州大溈上堂但知今日復明日不覺前秋與後秋平步坦然歸故里却乘好月過滄洲咦不是苦心人不知政和中三入內庭說法徽宗喜甚賜冲真密印通慧六字號南昌府黃龍道觀禪師上堂古人道眼色耳聲萬法成辦你諸人為甚麼從朝至暮諸法不相到遂喝一喝曰牽牛入你鼻孔禍不入慎家之門左丞范冲居士字致虗由翰院守豫章過謁圓通茶罷曰某行將老矣墮在金紫行中去此事稍遠通呼內翰公應喏通曰何遠之有公躍然曰乞師再垂指誨通曰此去洪都有四程公佇思通曰見即便見擬思即差公乃豁然有省樞密吳居厚居士擁節歸鍾陵謁圓通曰某頃赴省試過此過趙州關因問前住訥老透關底事如何訥曰且去做官今不覺五十餘年通曰曾明得透關底事麼公曰八次經過常存此念然未甚脫灑在通度扇與之曰請使扇公即揮扇通曰有甚不脫灑處公忽有省曰更請末後句通乃揮扇兩下公曰親切親切通曰吉獠舌頭三千里諫議彭汝霖居士手寫觀音經施圓通通拈起曰者箇是觀音經那箇是諫議的經公曰此是某親寫通曰寫底是字那箇是經公笑曰却了不得也通曰即現宰官身而為說法公曰人人有分通曰莫謗經好公曰如何即是通舉經示之公拊掌大笑曰嗄通曰又道了不得公禮拜中丞盧航居士與圓通擁爐次公問諸家因緣不勞拈出直截一句請師指示通厲聲揖曰看火公急撥衣忽大悟對曰灼然佛法無多子通喝曰放下著公應喏喏左司都貺居士問圓通是法非思量分別之所能解當如何湊泊通曰全身入火聚公曰畢竟如何曉會通曰驀直去公沈吟通曰可更喫茶麼公曰不必通曰何不恁麼會公契旨曰元來太近通曰十萬八千公占偈曰不可思議是大火聚便恁麼去不離當處通曰咦猶有者箇在公曰乞師再垂指示通曰便恁麼去鐺是鐵鑄公頓首謝之天童交禪師法嗣寧波府蓬萊圓禪師住山三十年足不越閫道俗尊仰之師有偈曰新縫紙被烘來暖一覺安眠到五更聞得上方鐘鼓動又添一日在浮生勝因靜禪師法嗣淮安府萬壽夢菴普信禪師上堂殘雪既消盡春風日漸多若將時節會佛法又如何且道時節因緣與佛法道理是同是別良久曰無影樹栽人不見開華結果自馨香蘇州府慧日默菴興道禪師上堂彤雲欲雪未雪曖日似暉不暉寒啾啾閙籬落朔風冽冽舞簾帷要會韶陽親切句今朝覿面為提撕卓拄杖下座廣德州光孝果慜禪師常德桃源人上堂舉南泉斬貓話乃曰南泉提起下刀誅五臂修羅救得無設使兩堂俱道得也應流血滿街衢雪峰需禪師法嗣福州府雪峰毬堂慧忠禪師上堂終日忙忙那事無妨作麼生是那事良久曰心不負人面無慚色明招慧禪師法嗣揚州府石塔宣秘禮禪師僧問山河大地與自己是同是別師曰長亭凉夜月多為客鋪舒曰謝師答話師曰網大難為鳥綸稠始得魚僧作舞歸眾師曰長江為硯墨頻寫斷交書上堂舉百丈野狐話乃頌曰不是翻濤手徒誇跨海鯨由基方撚鏃枝上眾猿驚上堂至座前師搊一僧上法座僧慞惶欲走師遂指座曰者棚子若牽一頭驢上去他亦須就上屙在汝諸人因甚麼却不肯以拄杖一時趕散顧侍者曰嶮祥符立禪師法嗣長沙府報慈淳禪師上堂青眸一瞬金色知歸授手而來如王寶劒而今開張門戶各說異端可謂古路坦而荊棘生法眼正而還自翳孤負先聖埋沒己靈且道不埋沒不孤負正法眼藏如何吐露還有吐露得底麼出來吐露看如無擔取詩書歸舊隱野花啼鳥一般春浮山真禪師法嗣眉州峨嵋靈巖徽禪師僧問文殊是七佛之師未審誰是文殊之師師曰金沙灘頭馬郎婦淨因成禪師法嗣台州府瑞巖佛燈如勝禪師上堂人人忽略釋迦箇箇平欺達磨及乎問著宗綱束手盡云放過放過即不無祇如女子出定趙州洗盂又作麼生話會鶴有九臯難翥翼馬無千里謾追風廬州府無為州冶父實際道川禪師崑山狄氏子初為縣之弓級聞東齋謙首座為道俗演法往從之習坐不倦一日因不職遭笞忽於杖下大悟遂辭職依謙謙名以道川且曰汝舊呼狄三今名道川川即三耳汝能竪起脊梁了辦箇事其道如川若放倒則依舊狄三也師銘於心建炎初圓頂游方至天封與語鋒投封稱善歸憩東齋道俗愈敬有以金剛般若經請問者師為頌之今盛行於世隆興改元殿撰鄭喬年漕淮西適冶父虗席迎師開法上堂羣陰剝盡一陽生草木園林盡發萌唯有衲僧無底依前盛飯又盛羹上堂舉雪峰一日登座拈拄杖東覰曰東邊底又西覰曰西邊底諸人還知麼擲下拄杖曰向者裡會取師曰東邊覰了復西觀拄杖重重話歲寒帶雨一枝華落盡不煩公子倚欄干大鑑下第十七世育王禪師法嗣福州府清涼坦禪師有僧舉大慧竹篦話請益師示以偈曰徑山有箇竹篦直下別無道理佛殿廚庫三門穿過衲僧眼耳其僧言下有省杭州府淨慈水菴師一禪師婺州馬氏子十六披削首參雪峰照照舉藏身無迹話問之師有省呈偈曰藏身無迹更無藏脫體無依便廝當古鏡不勞還自照淡煙和露溼秋光照復質曰畢竟那裡是藏身無迹處師曰嗄照曰無蹤迹處因甚麼莫藏身師曰石虎吞却木羊兒照深肯之乾道辛卯自寶林遷淨慈住後上堂舉圓悟師翁道參禪參到無參處參到無參始徹頭水菴則不然參禪參到無參處參到無參未徹頭若也欲窮千里目直須更上一層樓上堂凍雲欲雪未雪普賢象駕崢嶸嶺梅半合半開少室風光漏泄便恁麼去猶是半提作麼生是全提底事無智人前莫說打你頭破額裂上堂舉法眼示眾曰盡十方世界明皎皎地若有一絲頭即是一絲頭師竪起拂子曰還見麼穿過髑髏猶未覺法燈曰盡十方世界自然明皎皎地若有一絲頭不是一絲頭師曰夜來月色十分好今日秋山無限情上堂寂然不動感而遂通古人恁麼說話大似預搔待痒若教渠踏著衲僧關棙管取別有生涯喝一喝卓拄杖下座淳熙戊戌退淨慈有偈曰六年灑掃皇都寺瓦礫翻成釋梵宮今日功成歸去也杖頭八面起清風己亥浴佛日入內觀堂投老嘉禾報恩為終焉計未幾示疾作書別郡官端坐而逝茶毗得五色舍利齒拳不壞其辭世偈曰平生要用便用死蛇偏解活弄一拳粉碎虗空佛祖難窺罅縫湖州府安吉州道場無菴法全禪師姑蘇陳氏子投東齋川落髮久依佛智每入室智問狗子無佛性話師罔對一日聞僧舉五祖頌曰趙州露刃劍忽大悟有偈曰鼓吹轟轟袒半肩龍樓香噴益州船有時赤脚弄明月踏破五湖波底天住後上堂欲得現前莫存順逆卓拄杖曰三祖大師變作馬面夜叉向東弗于逮西瞿耶尼南贍部洲北鬱單越却來山僧手裡首身元來只是一條黑漆拄杖還見麼直饒見得入地獄如箭射卓拄杖下座上堂拈拄杖曰汝等諸人箇箇頂天立地肩橫楖栗到處行脚勘騐諸方更來者裡覓箇甚麼纔輕輕拶著便言天台普請南嶽游山我且問你還曾收得大食國裡寶刀麼卓拄杖曰切忌口銜羊角僧問牛頭未見四祖時如何師曰天下無貧人曰見後如何師曰四海無富漢宋孝宗乾道己丑七月二十五日將入寂眾求偈師瞪目下視眾請益堅遂書無無二字棄筆而逝火後設利五色塔于金斗峰福州府鼓山寒巖道升禪師延安吳氏子十九披削參佛智有悟侍智移靈隱居元座還里結菴曰寒巖閩帥問諸山佛智之嗣傑出為誰僉以師對遂出住支提次遷承天黃龍泐潭後主鼓山上堂喝一喝曰盡十方世界會十世古今都盧在裡許畐畐塞塞了也若乃放開一針鋒許則大海西流巨嶽倒卓黿鼉魚龍蝦蟹蚯蚓盡向平地上湧出波瀾游泳鼓舞然雖如是更須向百尺竿頭自進一步則步步踏轉無盡藏輪方知道鼻孔搭在上脣眉毛不在眼下還相委悉麼復喝一喝曰切忌轉喉觸諱結夏後一日忽問侍者今日何日曰十六日又問是何日辰曰辛卯即入室坐脫壽六十九塔香爐峰下大溈泰禪師法嗣長沙府慧通清旦禪師蓬州嚴氏子初出關至德山值泰上堂曰趙州道臺山婆子已為汝勘破了也且道意在甚麼處良久曰就地撮將黃葉去入山推出白雲來師聞釋然翌日入室山問前百丈不落因果因甚麼墮野狐後百丈不昧因果因甚麼脫野狐師曰好與一𡊫埋却住後上堂說佛說祖正如好肉剜瘡舉古舉今何異殘羹餿飯一聞便悟已落第二頭一舉便行早是不著便須知箇事如天普葢似地普擎師子游行不求伴侶壯士展臂不借他力佛祖拈掇不起衲僧願見無門迷悟雙忘聖凡路絕且道從上諸聖以何法示人喝一喝曰莫妄想佛性忌日上堂三脚驢子弄蹄行步步相隨不相到樹頭驚起雙雙魚拈來一老一不老為憐松竹引清風其奈出門便是草因喚檀郎識得渠大機大用都推倒燒香勘證見根源糞埽堆頭拾得寶叢林浩浩謾商量勤君莫謗先師好岳州府澧州靈巖仲安禪師壯游講肆後謁圓悟於蔣山時佛性為座元師扣之有所得逮性住德山遣師至鍾阜通嗣書圓悟問千里馳來不辱宗風公案現成如何通信師曰覿面相呈更無回互曰此是德山底那箇是上座底師曰豈有第二人曰背後底聻師投書悟笑曰作家禪客天然有在師曰付與蔣山次至僧堂前師捧書問訊首座座曰玄沙白紙此自何來師曰久默斯要不務速說今日拜呈幸希一覧座便喝師曰作家首座座又喝師以書便打座擬議師曰未明三八九不免自沉吟師以書復打一下曰接時圓悟與佛眼見悟曰打我首座死了也佛眼曰官馬廝踢有甚憑據師曰說甚官馬廝踢正是龍象蹴踏悟喚師至曰我五百人首座你為甚麼打他曰和尚也須喫一頓始得悟顧佛眼吐舌眼曰未在却顧師問空手把鋤頭步行騎水牛人從橋上過橋流水不流意作麼生師鞠躬曰所供並是詣實眼笑曰元來是屋裡人又往見五祖自通法眷書祖曰書裡說箇甚麼師曰文彩已彰曰畢竟說箇甚麼師曰當陽揮寶劍曰近前來者裡不識幾箇字師曰莫詐敗祖顧侍者曰是那裡僧曰此上座向曾在和尚會下去祖曰怪得恁麼滑頭師曰被和尚鈍置來祖乃將書於香爐上熏曰南無三曼多沒陀南師近前彈指而已祖便開書回德山日佛果佛眼皆有偈送之未幾靈巖虗席衲子投牌乞師住持遂嗣大溈焉上堂參禪不究淵源觸途盡為留礙所以守其靜默澄寂虗閒墮在毒海以弱勝強自是非他立人我量見處偏枯遂致優劣不分照不構用用不離窠此乃學處不玄盡為流俗到者裡須知有殺中透脫活處藏機佛不可知祖莫能測所以古人道有時先照後用且要共你商量有時先用後照你須是箇漢始得有時照用同時你又作麼生抵當有時照用不同時你又向甚麼處湊泊還知麼穿楊箭與驚人句不是臨時學得來成都府正法灝禪師上堂舉永嘉到曹溪因緣乃曰要識永嘉麼掀翻海嶽求知己要識祖師麼撥動乾坤建太平二老不知何處去卓拄杖曰宗風千古播嘉聲成都府昭覺辯禪師上堂毫釐有差天地懸隔隔江人唱鷓鴣詞錯認胡笳十八拍要會麼欲得現前莫存順逆五湖煙浪有誰爭自是不歸歸便得護國元禪師法嗣台州府天台國清簡堂行機禪師本郡楊氏子年二十五棄家學出世法晚見此菴密有契證單丁筦山者十七年每以未穩為懷一日偶看斫樹倒地忽大悟平昔礙膺之物泮然氷釋初出世住江州圓通登座說法曰圓通不開生藥舖單單只賣死貓頭不知那箇無思算喫著通身冷汗流上堂單明自己樂是苦因趣向宗乘地獄劫住五日一參三八普說自揚家醜更若問理問事問心問性克由叵耐若是英靈漢窺藩不入據鼎不甞便於未有生佛已前轉得身却於今時大官路上捷行濶步終不向老鼠窟草窠裡頭出頭沒若也根性陋劣要去有滋味處咬嚼遇著義學阿師遞相錮鏴直饒說得雲興雨現也是蝦蟆化龍下稍依舊喫泥喫土堪作甚麼上堂無隔宿恩可參臨濟禪有肯諾意難續楊岐派窮廝煎餓廝炒大海祇將折筯攪你死我活猛火然鐺煑沸喋恁麼作用方可撐門拄戶更說聲和響順形直影端驢年也未夢見上堂仲秋八月旦庭戶入新凉不露風骨句愁人知夜長僧問三聖問雪峰透網金鱗未審以何為食峰云待汝出網來即向汝道意旨如何師曰同途不同轍曰三聖道一千五百人善知識話頭也不識峰云老僧住持事繁又作麼生師曰前箭猶輕後箭深曰祇如雪竇道可惜放過好與三十棒者棒一棒也較不得直是罕遇作家意又作麼生師曰陣敗說兵書曰者棒是三聖合喫雪峰合喫師以拂子擊禪牀曰者裡薦取示眾衲僧拄杖子不用則已用則如鴆鳥落水魚鼈皆死正按旁提風颯颯地獨步大方殺活在我所以道千人排門不如一人拔關若一人拔關千人萬人得到安樂田地還知麼鴛鴦繡出從君看不把金針度與人示眾觀色即空成大智故不住生死觀空即色成大悲故不證涅槃生死不住涅槃不證漢地不收秦地不管且道在甚麼處安身立命莫是昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分麼莫是起坐鎮相隨語默同居止麼若恁麼總是髑髏前敲磕須知過量人自有過量用且作麼生是過量用北斗藏身雖有語出羣消息少人知退國清居景星嵒與吳芾友淳熙戊戌又自景星赴隱靜鎮江府焦山或菴師體禪師台州羅氏子初參此菴舉十方同聚會箇箇學無為此是選佛場菴遽震威一喝師大悟有以天封勉師出世者師搖手曰我不解懸羊賣狗也即遯去乾道初瞎堂住國清於江心稠人中得請師為第一座後出住平江覺報淳熙移焦山上堂舉臨濟示眾四喝公案乃召眾曰者箇公案天下老宿拈掇甚多第恐皆未盡善焦山不免四稜著地與諸人分明注解一徧如何是踞地師子咄如何是金剛王寶劍咄如何是探竿影草咄如何是一喝不作一喝用咄若也未會拄杖子與焦山吐露看卓一下曰笑裡有刀又卓一下曰毒蛇無眼又卓一下曰忍俊不禁又卓一下曰出門是路更有一機舉話長老也理會不得上堂熱月須搖扇寒來旋著衣若言空過日大似不知時上堂年年浴佛在今朝目擊迦維路不遙果是當時曾示現宜乎惡水驀頭澆上堂道生一無角鐵牛眠少室一生二祖父開田說大義二生三梁間紫燕語呢喃三生萬物男兒活計離窠窟多處添少處減大蟲怕喫生人膽有若無實若虗爭掩驪龍明月珠是則是祇如焦山坐斷諸方舌頭一句作麼生道肚無偏僻病不怕冷油韲拍禪牀下座僧問如何是即心即佛師曰鼎州出獰爭神曰如何是非心非佛師曰閩蜀同風曰如何是不是心不是佛不是物師曰窮坑難滿問起滅不停時如何師曰謝供養問我有沒絃琴久居在曠埜不是不會彈未遇知音者知音既遇未審如何品弄師曰鐘作鐘鳴鼓作鼓響曰雲門放洞山三頓棒意旨如何師曰和身倒和身攂曰他道飯袋子江西湖南便恁麼去又作麼生師曰淚出痛腸曰真金須是紅爐煆白玉還他玅手磨師曰添一點也難為室中甞舉苕帚柄問學者曰依俙苕帚柄髣髴赤斑蛇眾皆下語不契有僧請益師示以頌曰依俙苕帚柄髣髴赤斑蛇棒下無生忍臨機不識爺己亥八月朔示微疾染翰別郡守夜半書偈辭眾曰鐵樹開華雄雞生卵七十二年搖籃繩斷擲筆示𡧯常州府華藏湛堂智深禪師武林人佛涅槃日上堂兜率降生雙林示滅掘地討天虗空釘橛四十九年播土揚塵三百餘會納盡敗缺盡力布網張羅未免喚龜作鼈末後拘尸城畔槨示雙趺冷眼看來大似弄巧成䂐卓拄杖曰若無者箇道理千古之下誰把口說且道是甚麼道理癡人面前切忌漏洩杭州府上竺證悟圓智禪師台州林氏子依白蓮僊問具變之道蓮指行燈曰如此燈者離性絕非本自空𡧯理則具矣六凡四聖所見不同變則在焉師不契後因掃地誦法華經至知法常無性佛種從緣起始諭旨告蓮蓮然之師領徒以來常患本宗學者囿名相膠筆錄至以天台之傳為文字學南宗鄙之乃謁此菴夜語次師舉東坡宿東林偈且曰也不易到此田地菴曰尚未見路徑何言到耶師曰祇如他道溪聲便是廣長舌山色豈非清淨身若不到此田地如何有者箇消息菴曰是門外漢耳師曰和尚不吝可為說破菴曰却祇從者裡猛著精彩覰捕看若覰捕得他破則亦知本命元辰落著處師通夕不𥧌及曉鐘鳴去其祕畜以前偈別曰東坡居士太饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人持以告此菴菴曰向汝道是門外漢師禮謝有化馬祖殿瓦者求語發揚師書曰寄語江西老古錐從教日炙與風吹兒孫不是無料理要見氷消瓦解時此菴見之笑曰須是者闍黎始得參政錢端禮居士字處和號松牕從此菴發明己事凡宗門旨趣一一極之淳熙丙申冬簡堂歸住平田遂與往來丁酉秋微恙修書召堂及國清瑞巖主僧有訣別之語堂與二禪詣榻次公起趺坐言笑移時即書曰浮世虗幻本無去來四大五蘊必歸終盡雖佛祖具大威德力亦不能免者一著天下老和尚一切善知識還有跳得過者無葢為地水火風因緣和合暫時湊泊不可錯認為己有大丈夫磊磊落落當用處把定立處皆真順風使帆上下水皆可因齋慶贊去留自在此是上來諸聖開大解脫一路涅槃門本來清淨空寂境界無為之大道也今吾如是豈不快哉塵勞外緣一時掃盡荷諸山垂顧咸願證明伏惟珍重置筆顧簡堂曰某坐去好臥去好堂曰相公去便了理會甚麼坐臥公笑曰法兄當為祖道自愛遂斂目而逝
