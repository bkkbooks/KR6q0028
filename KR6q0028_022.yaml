body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十一世徑山範禪師法嗣杭州府淨慈斷橋妙倫禪師台州黃巖徐氏子母劉夢月而孕年十八落髮永嘉廣慈院初見谷源道於瑞巖聞舉麻三斤話疑之遍叩諸方一日於雲居見山堂閲楞嚴至蚊蟲螻蟻無有言説而能辦事釋然有省曰趙州柏樹子話可煞直截然不以語人旋謁無準於雪竇準問從何處來師曰天台曰還過得石梁橋麼師曰一腳踏斷了也自是人呼為斷橋一日準以狗子因何有業識令師下語凡三十轉不契師曰可無方便乎準以真淨所頌示之師竦然良久聞板聲通身汗下於是脫然無疑準移育王雙徑師皆分座出世祇園遷瑞巖國清後主淨慈上堂荊山有玉獲得者不在荊山赤水有珠拾得者不在赤水衲僧有無位真人證得者出入不在面門驀拈拄杖橫按曰會麼幽州江口石人蹲上堂舉慈明室中安一盆水盆上置一劍劍畔安一緉草鞋凡見僧來便指擬議便打因緣頌曰百華叢裡躍鞭過俊逸風流有許多未第儒生偷眼覷滿懷無奈舊愁何上堂德山低頭夾山點頭俱胝竪起手指頭玄沙築破腳指頭拈拄杖曰都來不出山僧拄杖頭何以見得卓拄杖曰一葉落天下秋上堂舉達觀穎曰七佛是性隸萬法是心奴且道主人翁在甚麼處自喝曰七佛已下出頭又自諾曰各自祗候師曰喚七佛為性隸指萬法是心奴達觀自謂有出身路及乎自喝自諾又是奴隸邊事主人翁何曾夢見大衆要見主人翁麼以拂子拂一拂曰曉來一陳春風動開遍園林百樣華將終與衆入室罷作手書辭諸山及魏國公公饋藥不受又使人問師曰師生天台因甚死淨慈師答曰日出東方夜落西遂嗒然而化世壽六十一僧臘四十四塔於寧波府天童西巖了慧禪師蓬州羅氏子垂髫與群兒戲必喜為佛塔像一日玉掌山祖燈至其舍師向之合掌父母以師資宿契遂令出家燈授以般舟三昧非其志辭往成都謁瓌菴照於昭覺覺器之屬令南詢乃參浙翁琰於徑山聞高原泉為人徑直往叩之適原赴台之瑞巖師與俱往一日原問山河大地是有是無師擬開口原即喝出復以偈呈原原曰沒交涉師一日偶書白楊示衆語原閲之笑曰寫字與做言句儘得爭奈沒交涉何師憤然原曰汝緣不在此可往雪竇見準公師秉命造謁自陳來歷準呵曰熟睡去既而令充不釐務侍者一日準謂師曰覷不透處只在鼻尖頭道不著處不離脣皮上討之則千里萬里師抗聲曰將謂有多少準遷育王師侍行盡得其要逮準移徑山師居第二座蘇州牧節齋趙觀文舉師開法定慧次遷永嘉能仁江州東林後至天童佛涅槃上堂拈拄杖召衆曰黃面瞿曇乃竺乾猛將以慈悲為弓矢以智慧為戈矛統百萬雄兵勇不可當布三百餘陳勢不可敵如是四十九年演出五千餘卷兵書雖流落人間未嘗有一字漏泄因與生死魔軍為冤為對遂於跋提河邊築一巨城題名涅槃於其城中先以紫磨金軀犒賞諸兵令其瞻仰取足再三撫諭而又散以八斛四斗珍珠其謀意無他必欲普與盡大地衆生打破生死牢關共行通天活路得到大安隱大解脫場而後已豈謂二千餘載猶未遂其志未奏其功山僧既知其力盡計窮不免劍相助去也以拄杖畫一畫曰四海浪平龍睡穩九天雲淨鶴飛高芙蓉長老至上堂舉唐芙蓉訓訪實性大師實性上堂右邊拈拄杖向左邊曰若不是芙蓉師兄也大難委悉話頌曰陪盡老精神杯盤越樣新誰知村店酒難勸玉樓人舉泐潭常面壁坐南泉至乃撫常背常曰阿誰泉曰普願常曰如何泉曰也尋常常曰汝何多事因緣頌曰面壁堆危引客過問誰那更問如何道尋常已成多事檢點儂家事更多依妙峰於靈隱時嘗題兩廊畫壁曰幸是十方無壁落誰將五彩畫虗空善財眼裡生華翳去却一重又一重晚年退居幻智菴將終戒執事已問曰今何時對曰二鼓矣遂放身而逝實宋理宗景定壬戌三月十一日也壽六十五夏四十七杭州府靈隱退耕寧禪師初住嘉興崇聖次遷蘇之報恩慧日承天萬壽後遷靈隱上堂目前無法意在目前雨餘山色翠風暖鳥聲喧拍禪牀曰堪笑老胡無轉智少室峰前坐九年上堂舉石門因僧問年窮歲盡時如何門曰東村王老夜燒錢師曰王老燒錢言端語端綿包特石鐵裹泥團上堂極目千峰鎖翠滿空柳絮飛綿可憐無位真人一向草宿露眠啞三春看又過何日是歸年舉僧問趙州和尚何姓州曰常州有曰甲子多少州曰蘇州有頌曰蘇州有常州有三月江南啼鷓鴣堪笑有年無德漢被人拶著強分疏舉巖頭問欽山如何是真言欽曰南無佛陀耶頌曰隨機有問隨機答不是禪兮不是玄後代無端翻譯出却將梵語作唐言寧波府天童別山祖智禪師蜀順慶楊氏子年十四得度初聞僧誦華嚴彌勒樓閣入已還閉遂恍如夢覺便得頌靈雲見桃花因緣有萬緑叢中紅一點幾人歡喜幾人愁之句遍叩浙翁琰無際派高原泉淳菴淨妙峰善諸老最後見無準於雪竇準知是法器待之彌峻時或棒喝交下一語不少貸師擬對輒噤不能發繇是知解都喪久之作而言曰吾生平伎倆皆死法也今見此翁始行活路既而準移徑山命師分座宋嘉熙戊戌出住洞庭天王寶祐丙辰天童州帥吳公潛奏師道行師被旨携一囊一至縛茆以居寧郡久不雨師禱之輒應繇是人情奔湊不三年百廢具舉天童始還舊觀上堂舉世尊將入涅槃文殊請再轉法輪世尊咄曰吾四十九年未嘗説一字汝請吾再轉法輪是吾曾轉法輪耶公案頌曰老漢平生大脫空將無作有誑盲聾臨行一語方真實也是闍黎飯後鐘景定庚申九月旦忽示衆曰雲淡月華新木脫山露骨有天有地來幾箇眼睛活有省問者師曰不及相見各自努力越十日夜分呼侍者囑後事叉手而寂壽六十有八夏五十四塔全身於中峰密菴窣堵波之右福州府雪峰環溪一禪師舉大通智勝佛十劫坐道場佛法不現前不得成佛道話頌曰劫初鑄就毗盧印古篆雕蟲尚宛然堪笑堪悲人不識却嫌字畫不完全題憨布袋讚曰逢人乞一文袋裡敵國富不是下生遲嫌佛不肯做舉即心即佛話頌曰即心即佛砒霜狼毒起死回生不消一服寧波府天童月坡明禪師舉僧問雲門久雨不晴時如何門曰劄師頌曰雲門者一劄吹毛光透匣若不是張華徒勞眼眨眨舉良遂參麻谷因緣頌曰携鋤不顧便好回去誰人敢道你是座主舉離四句絶百非話頌曰離四句絶百非相推過幾曾知者僧擔一擔懵懂換得兩頭淈𣸩歸舉熏風自南來殿閣生微涼公案頌曰賣扇老婆手遮日一種風流出當家説與途中未歸客何須向外喫波吒寧波府雪竇希叟紹曇禪師西蜀人出世佛隴上堂僧問向上宗乘事若何師曰簷頭滴滴分明歷歷乃曰西子湖邊泛渺茫一堤寒緑鎖垂楊誰知業債難逃避開眼隨人入鑊湯到者裡如何即得擬欲爛煨黃獨不顧紫泥未免蹈古人腳迹擬欲關空鎖夢塞路斷橋又恐坐在葛藤窠裡不如隨分納些些俯順時宜去也拈拄杖曰竪窮三際橫亘十方靠拄杖曰碧眼黃頭會不得野梅風定暗浮香上堂三月春云暮韶華似酒濃鶯啼楊柳雨蝶弄海棠風若作境會過山尋蟻迹不作境會度水覓魚蹤畢竟如何故鄉歸路遠日暮泣途窮住雪竇上堂一宿覺三擔土腳未跨門丰骨已露等間舉一步危徑結寒華信彩示一機斷崖飛瀑布雖然要跨乳峰門即易要入乳峰室即難何故鴻飛冥冥弋人何慕上堂發得一機活出得一言當萬里無片雲青天合喫棒不待春風著意開暗香已在梅花上舉僧問南泉師居方丈將何指南泉曰昨夜三更失却牛天明起來失却火話頌曰奴顏婢膝走人間羞見羊裘七里灘文叔雖為天子貴子陵元作故人看寄天童偈曰翁翁八十再生牙爛嚼虗空吐出查撒向玲瓏巖畔樹枝枝葉葉是曇華福州府雪峰絶岸可湘禪師舉僧問曹山雪覆千山為甚麼孤峰不白山曰須知有異中異曰如何是異中異山曰不墮諸山色頌曰言中彼此帶幽玄盡向言中辨正偏孤負一條官驛路茫茫沉在月明前舉僧問歸宗如何是玄旨宗曰無人能會曰向者如何宗曰有向即乖曰不向者如何宗曰誰求玄旨又曰去無汝用心處曰豈無方便門令學人得入宗曰觀音妙智力能救世間苦曰如何是觀音妙智力宗敲鼎蓋三下曰子還聞麼曰聞宗曰我何不聞僧無語宗以棒趂下頌曰三聲鼎蓋普門開苦海勞生喚不回九十春光今已半空飛華片點莓苔漁浦接待偈曰吳山那畔越山前有飯充飢有榻眠到此便能休歇去帝鄉猶隔一潮船紹興府光孝石室輝禪師上堂舉城東老姥與佛同生不欲見佛公案頌曰平生不願佛相逢十指尖頭現紺容夾路桃花風雨後馬蹄何處避殘紅台州府國清靈叟源禪師上堂舉僧問趙州真如凡聖皆是夢言如何是真言州曰唵部臨𠷑師曰趙州禪只在口皮邊看他與麼也是喚鐘作甕忽有問國清却向他道飢時但喫飯且道與古人是同是別良久曰西天梵語此土唐言上堂炎自炎涼自涼法無二法不用商量只如人人鼻孔在面上則固是知有我更問你別沼荷香何似深村稻香防意如城偈曰六門長鎖舊封疆已是攀緣萬慮忘昨夜貧家忽遭劫元來禍起自蕭牆守口如瓶偈曰明明只在鼻孔下動著無非是禍門直下放教如木棎青天白日怒雷奔九江府廬山東林指南直禪師送僧還成都偈曰智不到處道一句一句當機便到家宿鷺亭前風擺柳錦官城畔雨催華靈隱薰禪師法嗣杭州府淨慈愚極慧禪師參石田於靈隱隱一日室中舉雲門念七話連舉十數轉無人下語忽有一僧才跨門田遽曰雪峰輥毬師侍旁豁然領情遂衝口説偈曰雲門念七雪峰輥毬白蘋紅蓼明月孤舟田頷之住北禪日謝劍南儒藏主雲谷慶藏主無則珍藏主上堂舉白雲開堂拈香曰衆中衣道友有一言半句利益我者同伸報謝山僧乍住二三故人遠來相訪又非一言半句者此豈無片香以為供養燒楓香是著菩提邊事燒黃熟是著説佛説祖邊事而今猛焫一爐也要盡大地人知道浙西管內嘉興府川原道地且道燒底是甚麼香良久曰不下閣送寧禪人偈曰心未寧時為汝安落花小雨釀春寒斷橋流水孤山路楊柳絲絲拂畫欄杭州府中竺雪屋珂禪師上堂枯桑知天風海水知天寒且道衲僧知箇甚麼知道飯是米做直饒恁麼閻羅老子索飯錢有日在師以宋鼎既遷即謝寺事金山賢默菴雅知師且尊其道行時元兵下江南默菴被總兵伯顏脅置幕中從至武林默菴言於伯顏請師住靈隱親持請疏扣門師抽關露半面問曰汝為誰默菴曰和尚故人某甲也師落關曰我不識你蓋師雖處世外而以忠節自持故不屑靈隱之命斷江恩有詩曰雪屋今亡四十年高風凜凜尚依然伯顏丞相拜牀下不肯為渠來冷泉徑山沖禪師法嗣福州府神光北山隆禪師示衆即心即佛有水有竹屋便好非心非佛不襪不冠身自繇不是心不是佛不是物間倚闌干立清曉紅芭蕉引碧牽牛禮鏡清塔偈曰慣問門前甚麼聲池蛙笑汝自蛙鳴年來荒却天華寺正令方才一半行府高臺此山應禪師上堂舉大隨菴側有一龜僧問一切衆生皮裹骨者箇衆生因甚骨裹皮隨拈草履覆龜背上僧無語師頌曰休將皮骨強分張得六藏時且六藏隻履盡情都蓋了者僧無事可思量寧波府天童簡翁敬禪師上堂舉大梅即心即佛話頌曰郎心葉薄妾氷清郎説黃金妾不應假使偶然通一笑半生誰信守孤燈舉文殊問菴提遮女生以何為義話頌曰問處分明答處端當機覿面不相謾死生生死元無際月上青天玉一團育王照禪師法嗣湖州府道場龍源介清禪師福州長溪王氏子得度於義興法藏齊造育王謁寂窗入室契旨典侍司復掌藏鑰出世四明壽國遷開壽遷道場上堂三春云暮緑暗紅稀動為境轉靜為法迷不以色蓋不以聲騎風前間聽杜鵑啼上堂終日忙忙那事無妨顯而不露隱而不藏大衆且道如何是隱而不藏底道理玉梅結子浮青樹石筍抽條上緑窗大鑑下第二十二世育王珙禪師法嗣蘇州府崑山薦嚴竺元妙道禪師寧海陳氏子幼患右目母携禱觀音像師仰見像之右目有小蛛窠乃為揭去目患遂愈父母以為於佛有緣俾投杭之六和正嚴得度嚴令學百法論師曰一法不學學百法乎遂謁育王橫川珙一日聞舉乾屎橛話豁然大悟呈偈曰雲門乾屎橛光明照十方鄮峰才發足五日到錢塘珙謂衆曰此子再來人也至元己丑出主邑之慈源遷崑山薦嚴一晚與衆會茶舉東坡訪玉泉泉問大儒高姓士曰姓稱泉曰是甚麼稱士曰稱天下長老底稱泉喝一喝曰且道者一喝重多少士無語師命衆代語時別源源遽起剪燭了堂一咳嗽一聲師笑曰源藏主剪燭一侍者咳嗽一僧請師自代師曰洎不過此又一晚新古帆上方丈請益趙州無字話師厲聲曰夜深下去古帆歸堂惡發曰不與我説便休何用見瞋或以告師師曰他向後自悟去在古帆聞之當下廓然仁宗詔升黃巖鴻福賜號定慧圓明延祐丙辰淨慈靈隱兩剎爭欲致之俱不就年逾七十懷紫籜之幽絶乃往終焉江寧府保寧古林清茂禪師年十三為大僧聆老宿舉高菴勵僧語不覺洟淚交下乃知有出生死超聖凡一著子淬志參訪遍歷門庭橫川居育王師往叩鎚拂之下始知觸淨出世吳之開元遷鄱陽永福後主金陵保寧上堂僧問毛吞巨海芥納須彌是衲僧分上事不是衲僧分上事師曰拈却門前大案山曰鯨吞海水盡露出珊瑚枝師曰金剛腦後鐵蒺藜曰只如教中道我得無諍三昧人中最為第一如何是無諍三昧師曰放你三十棒曰仁義盡從貧處斷世情偏向有錢家師曰知恩者少負恩者多問記得昔日舉上座到琅琊問近離甚處舉曰兩浙琊曰船來陸來舉曰船來琊曰船在甚處舉曰埠下意旨如何師曰開口見膽曰琅琊云不涉程途一句作麼生道如何是不涉程途底句師曰前不構村後不迭店曰只如舉上座以坐具摵云杜撰長老如麻似粟又作麼生師曰焦甎打著連底凍曰後來琅琊問侍者此是甚麼人者曰舉上座琅琊遂親下旦過問云莫是舉師叔麼莫怪適來相觸忤作麼生是觸忤處師曰爛泥裡有刺曰舉喝云長老何年到汾陽我在浙中早聞你名見解如此何得名喧宇宙琅琊遂作禮曰某甲罪過那裡是他罪過處師曰若不登樓望焉知滄海深曰後來大慧道二老相見如日月麗天龍象蹴踏未審還端的也無師曰土上加泥又一重曰琅琊後遇慈明舉此話明曰舉見處才能自了而汝負墮如何為人為復肯伊不肯伊師曰一點水墨兩處成龍曰可謂龍得水時添意氣虎逢山勢長威獰師曰無人處斫額望汝問如何是佛師曰釘釘膠黏曰如何是祖師西來意師曰蟻子不食鐵曰如何是正中偏師曰草滿法堂曰如何是偏中正師曰苔封古殿曰如何是正中來師曰獼猴帶席帽曰如何是兼中至師曰日上月下曰如何是兼中到師曰截水停輪曰五位君臣蒙指示夜明簾外事如何師曰趂曉不歸家黃昏候日出上堂若説佛法供養大衆未免鬚眉墮落若説世法供養大衆入地獄如箭射去此二途畢竟説箇甚麼三寸舌頭無用處一雙空手不成拳小參舉僧問靈雲如何是佛法大意靈曰臨鴆砧井底種林檎僧曰學人不會靈曰今年桃李貴一顆值千金大慧道者箇公案從古至今無人拈出山僧不惜口業更為諸人注破臨鴆砧臨鴆砧井底種林檎今年桃李貴一顆值千金師曰大衆靈雲答者僧話且道與臨濟在黃檗問佛法的的大意三度喫六十拄杖是同是別若道是同法無同相若道是別佛法豈有兩般常愛大慧道我者裡蚌蛤禪開著口便見心肝五臟只者便是雖然也是大都城裡撮馬糞漢小參古人道九旬禁足魚遊網三月安居鳥入籠生殺盡時蠶作繭如何透得者三重卓拄杖曰將成九仞之山不進一簣之土開元入寺小參舉雪峰問德山從上諸聖以何法示人山曰我宗無語句亦無一法為人後有僧問雪峰和尚見德山得箇甚麼便休去峰曰我當時空手去空手歸五祖拈曰如今説向透未過者有兩人從東京來問伊近離何處却曰蘇州便問蘇州事如何伊曰一切尋常雖然謾山僧不過何故只為語音不同畢竟如何蘇州菱邵伯藕師曰從門入者不是家珍自己流來還同瓦礫老東山依模脫墼殊不知二大老正是食飽傷心雖然既是東京來因甚却説蘇州話上堂舉洞山冬夜喫果子次問泰首座曰有一物上拄天下拄地黑似漆常在動用中動用中收不得過在甚麼處泰曰過在動用中山遂喚侍者掇退果桌師曰者箇説話在今諸方每至冬夜未嘗不拈出注解一上然於正文未曾道著一句有底道洞山只見錐頭利不見鑿頭方抑屈人作麼有底道泰首座不得果子喫要且盡大地人皆不得喫成人者少敗人者多殊不知洞山有偏正回互不犯底手腳直饒泰首座道不在動用中也不得他果子喫在良久曰水流黃葉來何處牛帶寒鴉過別村除夕小參今夜年盡月盡日盡世事悠悠何時是盡明朝年新月新日新千變萬化又見重新所以道窮則變變則通垂鉤四海只釣獰龍三千威儀八萬細行諸人固是不知若得聲和響順各守祖父田園知道飯是米做免向瞎驢邊滅却吾宗卓拄杖曰從前汗馬無人識只要重論蓋代功永福入寺小參紅塵閙市十字街頭百草頭邊孤峰頂上若作佛法商量入地獄如箭射直得萬機休罷千聖不携聲前非聲色後非色檢點將來正是髑髏前妄想借使打破髑髏揭却腦蓋踢倒須彌踏翻大海腳跟下推勘得出也是落七落八通方上士出格高人除非自作生涯終不守他窠窟現前大衆冀善參詳山僧二千里水陸間關來此聚頭不為別事冬至重建寢堂小參豁開戶牗重新舊日規模當軒者誰坐斷聖凡途轍碧眼胡僧罔措釋迦彌勒猶是他奴燈籠露柱掀眉文殊普賢權作走使描不成畫不就撲落非他物華簇簇錦簇簇縱橫不是塵逴得便去山河并大地踏著便瞋全露法王身自古自今説玄説妙緇素不分者如稻麻竹葦就理就事變通逸格者能有幾人伶俐漢沒窠臼知是般事便休且道知底是甚麼事寒來暑往陰極陽生庭前玉樹華開早也勝東山水上行卓拄杖喝一喝上堂舉育王夜參曰少室無門戶如何便得通夜深寧耐立聽我話西東師召大衆也有權也有實也有照也有用只是不得恁麼會珍重除夕小參一年三百六十日今夜方始到頭是汝諸人於自己分上事亦須知有到頭時節若未得到頭直須向前決擇豈不見大隨參七十餘員善知識具大眼目者只一二人且如何是具大眼目者五祖海上參尋數十員尊宿洎至浮山圓鑑會中直是開口不得後到白雲咬破一箇鐵餕餡方得百味具足遂云華發雞冠媚早秋誰人解染紫絲頭有時風動頻相倚似向階前鬬不休喝一喝曰修心未到無心地萬種千般逐水流保寧入院小參當軒大坐百匝千重一句全提該天括地佛眼覷不見海口難宣今古不同途凡聖罔測直得麒麟現瑞鳳凰來儀山色呈祥人煙雜遝其奈梁寶公蹉過達磨雖曰觀音大士傳佛心印畢竟不識者箇消息是汝諸人還猛省麼卓拄杖曰若不同牀睡焉知被底穿小參舉死心示衆曰行腳高人解開囊卸却包笠去却藥忌一人所在也須到半人所在也須到無人所在也須親到師曰者般説話如黑石蜜中邊皆甜雖然不因夜來鴈爭見海門秋除夕小參今宵歲盡何曾盡明日年來實不來三十六旬如轉轂幾番潮去又潮回機輪轉處掣電猶迷大用現前誰當辨的廓情塵於未兆忘至理於言詮人人鼻孔撩天各各安家樂業文殊普賢起佛見法見貶向二鐵圍山燈籠露柱突出金剛眼睛呵呵大笑麻三斤乾屎橛諸人若作佛法商量入地獄如箭射到者裡言思道斷心行處滅一種平懷泯然自盡正與麼時如何良久曰東風昨夜消殘雪枯樹枝頭又著花結制小參明日結夏來臨只管悠悠過日及乎打鼓升堂直是思量不出諸人簇簇上來未免將南作北七佛以前初無者箇消息七佛以後雖有者箇消息終是不能圓悟如來無上菩提不能證入圓覺伽藍身心安居平等性智以致諸人九十日內惟務口體不務修持背覺合塵虗延歲月五祖道達磨大師信腳來信口道後代兒孫翻成計較計較得成天清地寧雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾楚雞不是丹山鳳愛向梧桐樹上鳴嘗垂示曰向上更有事在露出獅子爪牙其間別有商量未免當門按劒只者靈鋒阿誰敢擬師辭鋒峻拔手眼卓越應菴而後師殆第一人乎嘗續宗門統要示寂保寧紹興府天衣斷江覺恩禪師慈溪顧氏子依雲門廣孝祝髮從明之延慶聞習四教儀七日能通聞嘆異往參育王橫川室中機契掌內記德業日彰一時賢士大夫皆樂與之遊出世蘇之天平後遷開元及明之保福越之天衣一日室中衆侍立次忽扶杖而言曰老僧嵌空倚杖藜分明畫出須菩提顧左右曰會麼良久擲下拄杖倚蒲團而逝淨慈鞏禪師法嗣杭州府靈隱東嶼德海禪師台州臨海陳氏子年十四從蜀僧安石出家參石林鞏於承天林問如何是汝自己師擬議林便推出師懷疑一日入室林問盡大地是金剛正體何處著上座師擬對林便打從此徹證林遷淨慈命居侍司一日室中舉國師三喚侍者話師曰不是失却貓兒定是失却狗子林曰是狐負是不孤負師曰瞞人自瞞林以竹篦擊之曰亢吾宗者海子也至元庚寅出世天台寒巖大德乙巳遷姑蘇寒山至大己酉再遷崑山東禪辛亥敕賜金襴法衣皇慶癸丑復遷中竺延祐乙卯詔主淨慈至山門曰清淨慈門一湖秋水入得入不得虎咬大蟲蛇吞鱉鼻室中垂語曰手握利刃劍因甚猢猻子不死嚙破鐵餕餡因甚路上有飢人魚以水為命因甚死在水中衆答皆不契嘗頌俱胝竪指因緣曰深深無底高高絶攀思之轉遠尋之復難泰定乙丑復遷靈隱丁卯九月示微疾召弟子付囑訖跏趺而化世壽七十二僧臘五十八帝嘗賜號明宗慧忍禪師塔於育王後山之麓嘉興府天寧竺雲景曇禪師浦江嚴氏子久依石林後住婺之治平蘇之北禪禾之天寧上堂金烏東上玉兔西沉伶俐衲子東討西尋忽然撞破虗空曠劫只在如今卓拄杖下座僧問三賢未達十聖難知如何是此宗師曰無孔笛氈拍板曰知音者誰師曰聾人爭得聞曰也知和尚慣有此機師曰子過新羅問如何是涅槃心師曰須彌山曰如何是差別智師曰四大海蘇州府虎丘東州壽永禪師送僧偈曰動靜無非一大禪何須更透未生前故園千里今歸去陸有征途水有船舉張約齋入道話頌曰一擊鐘聲透耳根三千剎海一時昏賊從赤肉團邊去明日依然不離門徑山愚禪師法嗣蘇州府虎丘間極雲禪師久依虗堂於徑山居第一座一日寶葉源請益虗堂德山末後句曰若謂之有德山焉得不會若謂之無巖頭又道德山未會乞和尚慈悲指示堂曰我不會汝去問首座源詣師值師遊山歸索水濯足源亟進水復委身為師摩捋因仰面舉前話叩之師乃掬水澆潑曰有甚麼末後句源不契復上見堂堂曰首座如何向汝道源舉似前話堂曰那那我向你道他會得源於是釋然領旨舉興化酬唐莊宗中原寶價因緣頌曰君王寶自難酬價興化何曾敢借看天地既無私蓋載至今留得鎮中原舉陸亘問南泉弟子家中一片石也曾坐也曾臥擬鐫作佛得麼泉曰得亘曰莫不得麼泉曰不得因緣頌曰坐臥曾經幾度春半封苔蘚半籠雲無稜無縫難提掇空把肝腸説向人紹興府定水寶葉妙源禪師象山陳氏子秉具觀方遇僧流逐物遺道者則憂見於色虗堂以不肯下吳潛潛怒繫之獄以辱之師奉事惟謹有疑輒問隨問而解久之廓然一日虗堂曰源乎汝今太平矣及堂領徑山俾師首衆後出主平江薦嚴遷泉州水陸次遷定水舉世尊五通仙人因緣頌曰那一通你問我口是禍門招因帶果慚愧慈悲大法王丙丁離壬不屬火上堂舉張䂐參石霜霜問秀才高姓曰姓張名䂐霜曰者裡覓巧尚不可得䂐自何來䂐言下大悟話頌曰進前峭壁三千丈退後懸崖十萬重珍重天唐張䂐老鐵鎚無縫舞春風後居雲頂以至元辛巳示寂塔雲頂世壽七十有五徑山月禪師法嗣府南叟茂禪師舉巖頭擺渡婆子拋兒話頌曰鄂渚渡邊窮鬼子全機錯在扣舷時何如別下一轉語救取婆婆第七兒舉夾山參船子話頌曰無相無瑕便倒戈只因輕信智頭陀若還不到華亭上鐵鑄船橈奈汝何舉龐居士下橋喫撲靈照相扶話頌曰孝順藏忤逆人前醜莫遮今生親骨肉宿世惡冤家徑山度禪師法嗣杭州府徑山虎巖淨伏禪師淮安人至元間嘗召見有偈進上其略曰過去諸如來安住祕密藏現在十方佛成道轉法輪未來諸世尊一切衆生是由妄想執著結煩惱蓋纏迷成六道身枉受三塗苦惟念過現佛不敬未來尊與佛結冤讐或烹宰殺害不了衆生相全是法性身昔有常不輕禮拜於一切言我不輕汝汝等當作佛若能念自他同是未來佛現世增福壽生生生佛國上覽大悅問從上帝王有戒殺者否師曰宋仁宗一日語羣臣曰朕夜來飢甚思欲燒羊因慮後來遂為常例寧耐一時之飢不忍啓無窮之殺羣臣皆呼萬歲上嘉納即受帝師戒寧波府天童竺西坦禪師問僧從何方來曰金鵝師曰金鵝山高多少僧曰不見頂師呵斥之一日升座舉世尊拈華公案其僧言下有省
