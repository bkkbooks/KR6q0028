body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第三十五世天童密雲悟禪師法嗣寧波府天童山翁道忞禪師潮州茶陽林氏子也幼沈毅有夙慧讀書一目五行俱下總角以藝文擅名鄉曲試為生員然性不躭世好飄然有塵外想及冠讀大慧錄忽憶前身雲水參方歷歷如見即走匡廬開先投若昧芟染昧以師志不羣使參憨山清黃檗有輩數尊宿皆深契之終不自肯後參天童於金粟因閱殃崛產難機緣忽大徹從上關鍵童命掌記室親炙十有四稔崇禎壬午七月童示寂眾請繼席開法天童上堂目擊道存鋒鋩不犯頭頭顯露物物全彰猶是因高就下曲為今時況復言中取則句裡呈機舉古明今拈三播兩大似鄭州出曹門何異南轅而北轍殊不知當人脚跟下立地一著子如天普葢似地普擎抽一機則千機頓赴展一目則萬目畢張透聲透色絕遮攔亘古亘今無處所還生死得伊麼還染汙得伊麼還榮枯得伊麼還推遷得伊麼總有德山棒如雨點也則打他不著臨濟喝似雷奔也則無伊下口處更說甚麼百問雲興千酬瓶瀉一毫端際出現無盡身雲一舉步間遊歷無邊國土正是泥裡洗土塊鰕跳不出斗諸仁者從上既有如此廣大門風穩密田地何不推他阿爺向後放出渠儂一頭與麼直截承當去正恁麼時接續流通一句作麼生道天高羣象正海濶百川朝上堂天童寺裡開爐以虗空為爐牀四大部洲為爐脚須彌盧為火筯七金山為炭團其餘森羅萬象日月星辰赤縣神洲山川人物為引火黃葉且道火種聻以拄杖畫一畫曰饒爾向者裡薦得透脫分曉及乎施用未有其方也則是箇守死善道要得發焰聯輝正未可在當恁麼時發焰聯輝一句作麼生道喝一喝曰八萬四千非鳳毛三十三人入虎穴上堂拈拄杖橫按曰有時一喝如金剛王寶劍卓一下曰有時一喝如踞地獅子移拄杖過東復移向西曰有時一喝如探竿影草擲下拄杖曰有時一喝不作一喝用靈利漢若向者裡著得一隻眼臨濟老子不直半文錢其或未然莫怪海門風浪緊干戈原是太平基上堂哀哀三歎蓼莪章罔極無能一報償至竟吾門真大孝迴光直薦本爺娘灼然欲報至恩須是親見本生爺娘則於一切時如龍得水無一念落虗於一切處似虎靠山無絲毫走作縱橫收放全彰本地風光出沒卷舒獨露金剛正體便能不動塵際坐寶王剎不動舌頭轉大法輪俾人人達本生緣使各各知恩有地所以道輪轉三界中恩愛不能舍棄恩入無為真是報恩者大眾祇如山僧近日有人從嶺南來報道生身慈母已於辛巳冬朔遷化了也且道即今作麼生與本生爺娘相見山色翠濃春雨歇北堂萱草倚蘭開上堂百丈得大機黃檗得大用更有一人且道得箇甚麼喝一喝曰迥超今古格不共汝同盤卓拄杖下座上堂眾集驀拈拄杖擲下曰不得動著舌頭向者裡道一句看眾默然師曰死去十分便下座侍者向前拾起度與師師接得便打開爐上堂乾坤索然陡變高岸夷為平川木頭生了耳竈底沒了煙饑時饑得眼翻白凍時凍得手攣卷有底沒轉智只管窮廝炒餓廝煎橫吞栗棘蓬倒跳金剛圈有底訝郎當誇我能向鑊湯中澡浴爐炭裡安禪劍樹邊經行刀山上打眠朝悠悠暮悠悠誰解騎駿馬驟高樓蹋倒嘉州大象趯翻陝府鐵牛噓噓直饒如是也較山僧一籌何以衲被蒙頭萬事休上堂六戶無關鑰西風徹骨寒家家門首路一一透長安大眾外布施象馬七珍內布施頭目髓腦今日山僧盡情為諸人舍施了也其有饑餐未厭欲壑難填底道峰更倩拄杖子化作三十三天王為盧至長者破慳著拈拄杖卓一下曰那貴殊祥生九穗好看比屋盡黃金開爐上堂佛法無多子久長難得人山僧昔在茲山以不辦長久之念住凡四周寒暑散席他往東住天台南住於越西住吳興北住青齊已經十有一載無端遭人抑逼還復歸領住持則巖頭雲老室內氷枯正當今日開爐作麼生得接燄聯輝去拱手曰著力全在諸兄弟順治己亥夏師應召入京上命迎師進萬善殿駕隨到傳諭免禮賜坐上慰勞畢敕學士王熈馮溥曹本榮狀元孫承恩徐元文至上命學士問老和尚來自天童如何是天童得力句師曰奉皇上詔書特特到此問如何是正法眼藏師竪拳曰突出難辨又問如何是觀自在師鼓掌曰還聞麼復問大學之道在明明德朱子曰明明之也如何是明之底道理師曰問取朱文公去士皆無語上甚欣喜上曰老和尚因甚機緣悟道師曰長疑產難因緣後來有箇會處學士曰大慧也從此打失布袋者公案畢竟作麼生師曰明破即不堪又問女子出定公案請下一轉語師曰任從滄海變終不為君通士曰婆子請趙州轉藏經只轉得半藏那半藏作麼生轉師曰學士起身禮拜皇上著又問發心參禪即是善如何又說不思善不思惡既善惡都不思當何處著力師曰善惡總從心生心若不生善惡何著士沉吟師震威一喝上曰纔涉思惟總成意識邊事師曰大哉王言上問如何是悟後底事師曰待皇上悟後即知學士進曰悟即不問師曰問即不悟上首肯復問有箇雪嶠和尚聞渠真率不事事末後示寂甚超脫老和尚可知其人否師曰先法叔住開先時曾受西堂之職及示寂雲門遺命主後事乃述雪老人於丁亥年八月十九日示微疾次日封鐘版親書一紙示眾曰小兒曹生死路上須逍遙皎月氷霜曉喫杯茶坐脫去了至二十六日酉時果索茶飲唱雪花飛之句奄然坐逝然近代如林臯和尚之陞堂告眾箬菴和尚之預定逝期其事詳載塔銘皆忞所撰則又不止一雪嶠老人也上曰學道須是恁麼方好是日自辰至午方始回宮上一日問南泉斬猫意旨如何師曰直逼生蛇立化龍上曰趙州當日頂草鞋出去南泉許為救得猫兒若問老和尚合作麼生師曰老凍膿為他閒事長無明上一日手書大學之道在明明德拈起曰請老和尚下一轉語師曰日輪正卓午上問梁武帝見達磨問如何是聖諦第一義磨曰廓然無聖意旨如何師曰綿包特石上曰對朕者誰磨曰不識又作麼生師曰鐵裹泥團上曰今問老和尚如何是聖諦第一義師曰天無二日民無二王上曰對朕者誰聻師曰即日恭惟皇上聖躬萬福上自召見師後駕數幸萬善殿師屢辭還山上留法嗣旅菴月山曉皙開法善果隆安駕躬送出京錫弘覺禪師印號師南還謝天童金粟院事投老會稽化鹿之平陽鼎建寶坊于黃龍峰下為開山第一代焉至康熈甲寅六月廿有七日說偈吉祥而逝世壽七十九僧臘五十五有九會語錄布水臺集若干卷行世寧波府雪竇石奇通雲禪師婁東徐氏幼因篤疾陡現異境乃辭母脫白于南廣遇老宿令看父母未生前話游方至缾窑顯聖疑情大發後參天童屢呈所見童叱出忽一日入室未啟口童便棒于是大徹頓脫凝滯不離左右者十有三載崇禎辛巳童命住台之靈鷲僧問如何是靈鷲境師曰秀峰齊插耳曰如何是境中人師曰覿面案山橫曰如何是目前事師打曰腦後薦取問一口氣不來甚處安身立命師曰鼻孔撩天顧邑侯問宗門事從何門得入師曰從無門入曰儒家必從讀書門入無門如何得入師曰銅牆鐵壁曰那裡是銅牆鐵壁師曰刻刻在前師問正侍者寒時寒殺熱時熱殺你試道看正曰寒時由他寒熱時由他熱耿兵憲敘話次師曰公本分事相應也未曰要自家親到師曰如何是親到消息曰正要求指示師曰未舉步時三十棒次日耿呈頌師閱畢曰未在更道耿擬進語師驀掩其口上堂一二三四五六七逗到今朝是人日春風驀面忽相逢撲破鼻頭撞破額靈鷲寺裡今日有齋大眾開單展拈匙放筯則且置應時及節一句作麼生泥牛起舞春悠悠不風流處也風流受景星巖請陞座春山疊亂青春水漾虗碧寥寥天地間獨立望何極古德恁麼說話大似在孤峰頂上等箇人來大眾且道他要等箇甚麼人擊香几曰定光金地遙招手智者江陵暗點頭受雪竇請陞座杲日當空十虗普照清風帀地徧界全彰如是則景星與雪竇齊高乳峰與玉柱一體瀑飛千丈影含珠星墜半巖光映月無彼無此誰去誰來諸仁者若能會得不妨全明全暗全放全收放行把住自在縱橫一切臨時不容擬議正當恁麼時一句作麼生道明年自有新條在惱亂春風卒未休建法堂上堂臘月正窮冬日日是好日百草頭呈古佛家風一毫端現寶王剎直得普賢大士運斤成風文殊師利不拘繩墨所以道建大廈非一木之能濟巨川非一棹之力況慧日高懸法幢重建且道畢竟承誰恩力還委悉麼分明舉鼎調羹手撥轉如來正法輪上堂長安甚閙吾國晏然拈拄杖曰大眾不可道拄杖子不晏然也遂點曰低聲低聲解制上堂僧出叉手而立師曰且站一邊僧以拳加頭上師曰揑怪作麼僧又加一拳師曰不識羞僧繞禪牀彈指一下師便打乃曰正月十五泥牛輒舞布袋打開西秦東魯上堂一之日寒風急寸絲不挂底即乃頂門裂裂裂現出三頭六臂把主風神一摑直得須彌山倒地無數英俊𨁝跳禪和被他壓死不能轉身吐氣直待春雷起蟄驀地呌曰屈屈屈堪述絕後再甦真欺不得喝一喝上堂古人道者一片田地分付來多時了也我立地待你搆去是則是誣人之罪義所難容上堂五月十五榴花噴火寶王剎海高懸直得萬歲塔與乳峰山一齊起舞且道何故國有定亂之劍家有白澤之圖上堂舉僧問雲門一言道盡時如何門曰老僧在爾盂裡師乃呵呵大笑曰大眾分明記取法幢上座請上堂永嘉祖道場法幢乃重建宰護眾檀臨山光映佛面今日山僧來普請看方便竪起拄杖曰大眾見不見見則便與麼去隨處作主遇緣即宗當年本山真覺大師到曹溪時振錫三下卓然而立遂一宿而返今朝不妨有箇同參若不見山僧大似勞而無功所以宗師唱導譬如滄溟上客獨泛蘭舟月渚煙波隨情放曠欲拋香餌為待長鯨即今還有麼卓拄杖曰三千劍客分明在那許莊周致太平上堂月朔月望月圓月缺一句全提萬機寢削卓拄杖曰看看擲下來也咄小參舉五祖住太平時上堂曰太平不會禪一向外邊走臘月三十夜贏得一張口且道如何是太平口自曰兩片皮也不識五祖與麼賣弄口皮即得要是衲僧受用則未在山僧不恁麼雪竇不會禪一向家裡坐臘月三十夜分明成話墮扯索底扯索擡木底擡木谷應山鳴聲光轆轆呵呵呵夜深山寺煖烘烘箇箇寮房一爐火順治庚子師還南廣革應為禪浚鹽鐵河直達於寺以利舟楫閱三載將東歸乳峰未幾疾作命二侍舉時皆以子時對乃點首至午夜端坐而化門人迎龕返四明窆於妙高峰頂世壽七十臘四十有五嘉興府古南牧雲通門禪師常熟張氏子丱歲禮興福洞聞老宿為師初參博山次謁天童於金粟童問即今事作麼生師擬議童便打師禮拜童於背上築一拳曰你若作打會入地獄如箭自是發憤咨參後上天童題萬松關偈曰古路松陰廿里長過時誰覺骨清涼童曰何不道過時誰不骨清涼師於言下豁然又作活眼泉偈正思索時偶右手於左臂一觸忽然契悟久掌記室出住古南僧問臨濟初住院曰我欲於此建立黃檗宗旨如何是黃檗宗旨師打曰一棒血淋淋曰今日問和尚如何是天童宗旨又作麼生師又打曰再犯不容僧禮拜師復打曰恩大難酬師曰道得一半問不生不滅是如何師曰好人不肯做定要屎裡臥問天不能葢地不能載時如何師曰放下坐具著曰恁麼則天上天下唯我獨尊師打曰未到你在僧作禮曰彼既丈夫我亦爾師曰只恐不是玉上堂舉遵布衲於藥山浴佛次山問曰汝只浴得者箇還浴得那箇麼遵曰把將那箇來藥山便休藥山垂絲千尺意在深潭遵布衲鈎在不疑四楞塌地祇如藥山休去還有商量也無擲下拄杖曰不勞再勘上堂舉世尊一日陞座文殊白椎曰諦觀法王法法王法如是世尊便下座老將不談兵文殊特請纓一朝權在手便把令來行正當恁麼時山僧性命在諸人手裡其或眼目定動諸人性命却在山僧手裡卓拄杖下座上堂古南箇村僧性燥多瞋罵佛法嬾得說終日尋人打打打打上士笑呵呵下士便驚怕怕怕怕好事不出門惡事傳天下上堂供養百千諸佛不如供養箇無心道人釋迦老子好與三十棒有一人長年不喫飯不道饑有一人終日喫飯不道飽百丈老子略較些子便下座上堂拋下拄杖曰撲落非他物復擎起作舞曰縱橫不是塵汝諸人還見山河及大地全露法王身麼復擊香几曰一片榆楠木敲來響殺人上堂昨夜西風號不歇遠近山頭都是雪朝來依舊日頭紅嶺上石人凍得皮膚裂下座請首座上堂日南長至節屆書雲天心復見扶揚抑陰紫羅抹額繡裙腰甚生標致赫赤布裙無來替換家無滯貨不發所以烹金琢玉須知作者鉗錘荷教扶宗全仗本色兄弟揮佛日於西垂回狂瀾於既倒豈不是君子道長小人道消你大眾還見麼物宜求新樓前海棠花開却一朵兩朵人宜求舊即日堂中第一座少渠不得且阿那箇是第一座卓拄杖曰蘇州有住破山指山門曰石橋東鎖古㵎西來佛祖門戶古今洞開還見麼祥麟及瑞鳳盡入此山來佛殿三面好山中一所空王殿喝退麻三斤打開乾屎橛甚處與古佛相見以坐具打圓相曰交據室金剛圈拋來任你跳得栗棘蓬刺來儘你吞得山僧尚有三十棒在何故臨濟門下令不虗行卓拄杖上堂出山髮尚青還山齒半落入門仔細看青山宛如昨黃葉打頭來高林風索索馳騁不知休當初悔行脚昔有梵志出家白首而歸鄰人見之曰昔人尚存乎梵志曰吾猶昔人非昔人也鄰人皆愕然非其言大眾鄰人只知百年一身不知念念遷變新新不住梵志雖知當體無常有變有滅不知不變於出家法中尚欠一著且如何是不變者死生老病非他物渴飲饑餐祇舊人下座上堂戰馬聽鑼聲簇簇通身癢臨濟喫拄杖山河齊合掌好事不瞞人裁成憑郢匠拈拄杖旋轉曰山僧運斤也諸人試摸鼻孔上還有一點泥也無復卓拄杖曰多虗不如少實住極樂開爐上堂昭陽城外煙水茫茫極樂菴中紅爐焰焰向火焰中拈一莖毛貴圖大家知有脫若七十三八十四低頭打算算到盡未來際有甚了期還會麼擊拂子曰朝生子撲天飛上堂極樂極樂天涯海角舖子將收家私落索雪峰木毬普化鈴鐸搖搖打打捫捫摸摸仔細看來是何面目鐘鳴銅山崩劍舉蜀頭落還會麼雲門參見睦州會得秦時𨍏轢參住鶴林上堂僧問舊店新開人盡覩重光祖印乞師慈師曰殿前雙栢立進曰恁麼則山靈生色四眾沾恩師曰門外萬松排僧禮拜師乃曰楊子江心大浪飛白連天鐵甕城邊好山排青立地肇開香剎有此禪林縞衣聽法舞層霄烏帽逢僧閒半日寄奴泉信為王者所鑿杜䳌花浪傳仙子移歸法無定相遇緣即宗山僧今日借釋迦老子手中一華拈示大眾遂舉拂子曰見麼若也見去芳菲滿袖爛熳驚人若也不見却成當面蹉過眾中有具眼底莫被山僧謾好復舉玄素禪師住山時有僧敲門素曰誰僧應曰是僧素曰莫道是僧佛來亦不著僧問曰為甚不著素曰無汝棲泊處大眾玄素禪師傳牛頭一枝佛法不妨孤峻若是山僧待曰是僧即向道青天白日寐語作麼諸公若言下了然便見古人立地處其或未然下座同禮祖師三拜浙中歸上堂祖師一機深明向上當陽一句只在聲前提得則天上人間放則無處迴避所以道昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分到者裡流水桃花別通春色鷄鳴犬吠各露風光在處可作津梁無方不堪垂手是則是祇如維摩居士道法非文字言語斷故還有道得轉身句者麼良久曰青蛇上竹一種色黃鳥過牆無限情住天童開爐上堂僧問了明差別智方證涅槃心千七葛藤都拈却德山托意如何師曰年老成魔曰為甚被雪峰一拶直得低頭歸方丈師曰賺殺闍黎曰祇如巖頭曰大小德山未會末後句聻師曰好與三十棒曰密啟其意又如何師曰來日來向你道曰既會末後句因甚只得三年活師曰開眼作夢僧禮拜師乃曰今日開爐諸人還識開爐底意麼霜花點白山寮各下暖簾楓葉飛紅將見堅氷踵至通方上士鑒在機先得旨歸根去天寒人寒滴水滴凍隨流認得性無喜亦無憂不假炭煤宏開爐鞴直下化鈍鐵作良金鎔頑銅成法器妙手雖呈大功不宰驅溈山水牯直入欄圈打疎山木蛇橫鑽泥土且道甚麼時節是他出頭分莫看水草嫌枯淡好聽春雷換甲鱗下座立春上堂靈樞密運四序推移天地之間其猶橐籥看看冬到來即便春風至長連牀上學得底是第二機若是第一機天下老和尚未曾提著山僧又如何折合舉拂曰看看五彩畵頭黃金點額復擊一擊曰好好一隻春牛被山僧一鞭粉碎了也聞一知二從他徧界分身認影迷頭一任眼𥉌地上堂十五日已前野田祭婦鬼哭神號十五日已後鳥語如簧山花似錦正當十五日紅日三竿曲肱而枕佛法二字摸索全無山僧恁麼告報會得則途中受用不會則世諦流布上堂頂門隻眼明明非見脚跟一竅了了常知古者道從生至死祇是者箇回頭轉腦作麼正是憐兒不覺醜天童者裡還有回頭轉腦者麼拍膝曰且喜天下太平小參舉巖頭上堂曰吾甞究涅槃經七八年覩兩三段義似衲僧說話又曰休休時有一僧出禮拜請舉巖頭曰吾教義如𠁼字三點第一向東方下一點點開諸菩薩眼第二向西方下一點點諸菩薩命根第三向上方下一點點諸菩薩頂巖頭七八年看教指東畵西原來未會在乃信手點曰敢問諸人山僧點箇甚麼有僧進語師曰去無汝啗分冬至小參今之夕群陰極潭影藏山光黑無足之人欲夜行往往扶籬兼摸壁咄咄咄參玄客千言萬語喚歸家艱辛休向途中覓如何是到家消息幾箇烏鴉殿角棲一雙白鶴松邊立還會麼歸堂喫茶去示眾大海不宿死屍虗空不著五色大火聚中不藏蚊蚋無住法中不立迷悟汝等諸人圖參禪悟道三生六十劫示眾善知識無家以叢林為家十方衲子無家亦以叢林為家葢善知識以叢林為家者本為蓄養衲子續佛慧命衲子亦以叢林為家者本為親近知識發明大事故衲子尊知識為師知識視衲子為弟子尊為師有父道焉視為弟有子道焉既父子共住管理家業為子者自當知得我父山場許多在某處田園許多在某處乃至家私什物共有許多又當照管某山柴該養某山柴該斫某田該種某地該鋤不使荒蕪界限一一分明收藏一一牢固此真克家子也縱使其父後日過世外人無議不能侵佔何故葢為父子一體父之家業子自然有分亦為子平日肯照管得清楚不致忘失設使雖在其父蔭下自不留心山荒也不管地荒也不管無菜蔬喫也不管無柴燒也不管乃至杓柄短長家中事問著一總不知此子決不能向後紹父家業也何故為伊全靠著其父過日稼穡艱難出入經紀全不操心向後總把家業與他祖父田園四至界限都不能分曉又如何承當得去所以拋家失業自甘做箇客作賤人你要知克家之子麼從上大有樣子楊岐於慈明三十年任監院是也雲峰於大愚冐寒化米化炭是也演祖於白雲充磨頭是也佛眼大慧享大名於天下然在學地俱充化士奔走途中得益乃至雪峰飯頭溈山典座此纔入叢林者皆知得不必再舉師自謝事天童十餘秋隱遁無定居至康熈辛亥冬示寂於石湖靜室門人請命於弘覺禪師全身入塔於鶴林祖塔右不一載塔石迸裂其法嗣秀峰瑋拉諸同門啟塔視之洪水湧龕而出遂依法闍維獲舍利千餘顆光瑩如菽門人分歸營塔於西華西資鶴林諸處蘇州府遯村報恩浮石通賢禪師平湖人俗姓李幼不茹葷十九脫白歷扣真寂雲門懵無入路乃偕同志上鶯窠山頂掩死關聞舉屍在者裡其人何在忽有省後參天童得厥旨出住吳江之報恩上堂指法座當陽顯露達者方知從地昇高阿誰無分正恁麼時便乃掀翻寶座喝散大眾豈不俊哉其或未然怪山僧不得遂陞拈香畢乃曰假使頂戴百千劫身為牀座徧三千若不傳法度眾生畢竟無能報恩者竪拂子曰報恩今日傳法也大眾一齊擔荷擲拂子下座上堂舉世尊初生時一手指天一手指地周行七步目顧四方曰天上天下唯我獨尊雲門曰我當時若見一棒打殺與狗子喫貴圖天下太平世尊創業垂統道化萬方那慮後人之顛覆雲門鳳曆新頒肅清宇宙輙翻上祖之遺規雖則光先後有祖有孫檢點將來不無自累畢竟如何得恰好去卓拄杖曰天然習氣最難忘纔出頭時燄熾張將謂無人能抗拒誰知後代有韶陽上堂三春已過九夏初臨聚玄徒於林間扇真風於世外篆不雕之心印提出格之宗乘且道出格宗乘作麼生提還有道得者麼良久曰麥子頭垂春熟好荳花口吐莢前心上堂元旦一萬事吉衲僧不用加參管取通身眼徹何故不羨鐵牛耕陸地慣能井底種林檎上堂烏飛兔走急如梭明暗何曾昧得他箇裡本來無可說謂言無說已成多竪拂曰大眾且道是有說是無說擲拂子下座僧問牛頭未見四祖時如何師曰花園擺宴曰見後如何師曰茅屋疎籬問如何是西來意師曰風過樹頭搖問如何是一師曰賊曰學人為何是賊師曰抱贜呌屈問行住坐臥不離者箇如何是那箇師曰放汝三十棒曰過在甚麼處師曰垛生招箭問家親作祟是如何師曰只要箇護身符子曰如何是護身符子師曰但恁麼舉師居常以馬祖一喝百丈因甚三日耳聾勘驗來學罕有契其機者丁未七月示微疾危坐終日至二十五辰刻索浴坐化閱世七十有五僧臘五十六門人孤卓浚迎龕窆全身於徑山鵬搏峰下台州府通玄林野通奇禪師自幼窮研教典後出蜀南詢掩關當湖忽接天童參禪偈曰一念未生前試看底模樣疑情頓發一日失足墮樓有省遂破關參天童於吳門之清涼隨童住育王童上堂舉世尊初生下地便解指天指地汝等諸人猶向老僧擬討甚麼盌曳拄杖下座打散師自此全身脫落一日將破盌入庫取油童問你為甚打破常住盌師曰不是某打破底童曰為甚在汝手裡師曰城門失火殃及池魚童曰賠了盌去師便展兩手童休去崇禎癸未住通玄次居東塔棲真後遷天童上堂今朝吾佛降生却向金盤澡洗便乃指天指地大似不知羞耻更道唯吾獨尊山僧未敢相許且道山僧有甚長處便乃開許大口以拄杖卓曰當門不用栽荊棘後代兒孫惹著衣上堂舉丹霞訪忠國師值睡次公案侍者瞠眼寐語累他國師寢食不安丹霞雖解就地埋人殊不顧旁觀看破還有知得侍者喫棒丹霞喫驚底麼不辭頌出端居丈室獨安眠不意春花落檻前可恨游蜂胡亂採至今趕向草堤邊上堂汝等未到天童寺將謂天童異世間及乎到來親目擊依然松竹倚青山明明松竹林明明祖師意若或瞥爾情生未免觸途成滯且道不涉程途一句如何顯示驀卓拄杖曰還家盡是兒孫事祖父從來不出門上堂昔日先師會下萬指圍繞梁法味者頗多追法乳者誰切山僧舉揚般若以報先師莫大之恩可謂冤有頭債有主從前得力處一句超今古且道是甚麼句驀拈拄杖卓曰汗馬無人識重論葢代功復卓一下上堂山僧四大不強無能為眾說法遂拈拄杖曰惟者木上座雖則全無孔竅却能善說法要擊香几曰切莫隨伊顛倒師病中首座問曰古人臨末梢頭留下一言半句作將來眼目即今有何垂示師曰動即禍生曰官不容針私通車馬師曰多口作麼曰不為分外師驀面一拳座便禮拜師將示寂出冶自天台歸師急問曰汝來了冶曰適纔到師曰於今是甚麼時候冶曰午時師瞪目視之冶曰前蒙和尚記莂今請和尚更取法名師曰行果圓成冶禮謝師安祥而逝黃介子居士諱毓祺毗陵澄江聞人也慧業夙稟博綜內外典籍久遊天童磬山之門有所契入曾作語錄序有石磬音嘹亮聾人耳更聞斯言不我欺也昔漢武以兵法教去病病曰不在學古顧方略何如明皇示韓斡御府圖幹曰不願觀也去病胸中有活法韓幹胸中有活馬磬山胸中有活玄要猛虎口邊拾得毒蛇頭上安排為天下人抽釘楔豈口耳所能傳授耶我於是錄聊窺一斑云云後天童將順世以衲衣贈之至甲申鼎革士罹難南都獄中一日書偈扇頭寄同參牧雲禪師曰劍樹刀山掉臂過長伸兩脚自為摩三千善逝原非佛百萬波旬豈是魔潦倒不妨天亦醉掀翻一任水生波夜來夢作修羅手其奈雙丸忽跳何遂擲筆而終
