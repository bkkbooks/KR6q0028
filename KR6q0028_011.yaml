body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十八世育王光禪師法嗣杭州府靈隱妙峰之善禪師吳興劉氏子世居彭城上世皆登膴仕師生紈綺中資性高潔年十三辭家受業於德清齊政院凡經論一見輒了大意謁諸方參佛照於鄮山於風幡話契旨照贈以偈曰今日與君通一線斬釘截鐵起吾宗嗣是入武康結廬妙高峰下十年後分座鴈山能仁出世台州慧因遷洪福萬年諸剎退居臯亭劉寺者又十年復領明之瑞巖蘇之萬壽常之華藏晚居靈隱靈隱密邇行闕輪蹄湊集師掩戶無所將迎公卿貴人或見但寒溫而已僧問如何是不入衆流句師曰烏龜鑽破壁曰如何是體妙無私句師曰百匹馬中一頭驢曰如何是瞬目揚眉句師曰花雨巖前石點頭問如何是奇特事師曰紫薇花下紫薇郎曰學人不會師曰三十年後上堂應物現形如水中月信手拈來一時漏泄以拂子擊禪牀左邊曰者裡是鑊湯爐炭復擊右邊曰者裡是劍樹刀山前面是觀音勢至後面是文殊普賢中間一著還知落處麼又擊一擊曰毗婆尸佛早留心直至而今不得妙上堂舉雲門普請搬柴次乃拋下柴片曰一大藏教祇說者箇師曰大小雲門只見錐頭利不見鑿頭方上堂談玄說妙事如麻添得時人眼裡沙赤骨律窮挨得入潑狼潑賴是生涯懸羊頭賣狗肉喫官酒臥官街笑倒籬根破草鞋示衆久參高士眼空四海鼻孔撩天見也見得親說也說得親行也行得親用也用得親只是未曾識老僧拄杖子在何故將成九仞之山不進一簣之土師將示寂澡身趺坐書偈曰來也如是去也如是來去一如清風萬里書畢而逝實宋理宗端平乙未九月二十八日也壽八十四臘七十一火浴獲舍利無數瘞於靈隱之西岡杭州府淨慈北澗居簡禪師字敬叟潼川龍氏子世業儒依邑廣福院得度閲卍菴語有省後參佛照機契追隨一十五年出世台之般若遷報恩光孝大參真西山時為江東部使者以東林力致不可乃退隱飛來峰北澗十年故稱北澗起應霅之鐵佛西余常之顯慶碧雲蘇之慧日湖之道場後奉旨遷淨慈寺上堂識得一萬事畢了事衲僧一字不識直饒恁麼未稱全提禹力不到處河聲流向西上堂以大圓覺為我伽藍身心安居平等性智喫官酒臥官街當處死當處埋本來無位次何用強安排上堂舉密師伯與洞山在餅店坐次密於地上畫一圓相謂洞山曰把將去山曰拈將來保寧勇曰非但二老提不起盡大地人亦提不起師曰北澗敢道保寧計窮力盡上堂雲巖二十年在藥山只明此事澄潭不許蒼龍蟠趙州四十年不雜用心除二時粥飯是雜用心處兔子何曾離得窟上堂舉子湖一日入僧堂曰有賊有賊見一僧便捉住曰在者裡僧曰不是是某甲湖托開曰是即是祇是汝不肯承當師曰子湖收處太危放去太急淨慈則不然家賊難防家財必喪卓拄杖曰只可錯捉不可錯放上堂先佛照道棒頭撥著活衲僧正法眼藏增高價北澗則不然棒頭撥著活衲僧正法眼藏瓦解氷消且道與先佛照是同是別舉世尊初生話頌曰一聲哇地便吒哩突出如斯大闡提此土西天起殃害堂堂洗土不成泥舉楞嚴六解一亡話頌曰六用無功信不通一時分付與春風篆煙一縷閒清晝百鳥不來華自紅宋理宗淳祐丙午春示疾索筆書偈紙尾復書四月一日珍重六字至期索浴罷假寐而逝壽八十三臘六十二葬全身於月堂昌塔側遵遺命也有北澗集十九卷行世杭州府徑山浙翁如琰禪師台州周氏子上堂舉乾峰因僧問十方薄伽梵一路涅槃門未審路頭在甚麼處峰以拄杖畫一畫曰在者裡僧請益雲門門拈起扇子曰扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼師曰唱愈高和愈峻還他二老若是十方薄伽梵一路涅槃門總未踏著在上堂拈拄杖曰蔣山喚者箇作拄杖子諸人亦喚者箇作拄杖子還有緇素也無闌干雖共倚山色不同觀作維摩贊曰毗耶示疾放憨癡添得時人滿肚疑不是文殊親勘破者些毛病有誰知寧波府天童無際了派禪師上堂三五十五月圓當戶雖然匝地普天要且秋毫不露對景憑誰話此心令人翻憶寒山子上堂諸人十二時中上來下去折旋俯仰起居問訊瞞崇恩一點不得只今坐立儼然賓主交參面面相覩崇恩亦瞞諸人一點不得既然彼此不相瞞為甚麼自作障礙喝一喝曰因風吹火用力不多上堂昨夜安排一段禪天明起來都忘却而今打鼓衆雲臻對面臨時旋揑合乃回顧侍者曰記取者一著佛涅槃上堂釋迦老子昔向今辰入大寂定堪笑天下叢林刻舟求劍二千餘年區區不已崇恩今日不動神機捩轉瞿曇鼻孔不圖打草驚蛇只要大家相見汝等諸人各宜子細觀瞻莫教錯過遂合掌曰不審不審上堂佛法在你日用處在你著衣喫飯處在你語言酬酢處在你行住坐臥處在你屙屎送尿處擬心思量便不是了也咄啼得血流無用處不如緘口過殘春題郁山主像贊曰䇿蹇溪橋蹉跌時誤將踠豆作真珠兒曹不解藏家醜笑倒楊岐老古錐福州府東禪性空智觀禪師上堂舉僧問鹽官如何是本身盧舍那官曰與老僧過淨瓶來僧將淨瓶至官曰却安舊處著僧再問官曰古佛過去久矣師曰盲者難以與乎文彩聵者難以與乎音聲者僧既不薦來機鹽官只成虗設雲門道無朕迹扶鹽官不起雪竇道直得一手指天一手指地爭得無也扶鹽官不起以拂子畫一畫曰前來葛藤一時畫斷且道如何是本身盧舍那擲拂子下座上堂舉寶壽開堂日三聖推出一僧話師曰衆中商量道三聖有奔流度刃之作向平地上湧波瀾寶壽用疾焰過風之機向虗空裡轟霹靂二老各出一隻手扶竪臨濟正法眼藏與麼說話要作臨濟兒孫且緩緩東禪道蚊子如何擎大柱藕絲焉可繫須彌若是臨濟正法眼藏端的向二人邊滅却湖州府上方朴翁義銛禪師天資奇逸辨博無礙上堂舉僧問趙州狗子還有佛性也無州曰無頌曰狗子佛性無還他大丈夫是非雖入耳壁上挂葫蘆贊達磨像曰一言已出駟難追賴得君王放過伊楊子江心航折葦浪頭何似問頭危寧波府育王空叟宗印禪師西蜀人初住湖州崇先保壽僧問如何是本來身師曰風吹日炙曰意旨如何師曰釘釘膠粘上堂大道坦然離名離相剗除則失旨建立則乖宗從上佛祖古今知識顯大機彰大用盡是關空鎖夢過犯彌天印上座裂破面皮還免得麼良久拍禪牀曰不入驚人浪難逢稱意魚上堂二由一有一亦莫守平地上死人無數一心不生萬法無咎屎窖裡頭出頭沒孤逈逈峭巍巍華須連夜發莫待曉風吹上堂鐵崑崙兒喫一攧南海波斯舞不輟夜半失却攔腰帛笑倒東村王大伯拍禪牀下座上堂舉僧問長沙如何是上上人行履處沙曰如死人眼曰上上人相見時如何沙曰如死人手師曰死人眼死人手金烏飛玉兔走直截根源取之左右張翁醉倒臥官街元是李翁喫私酒杭州府淨慈退谷義雲禪師福州閩清黃氏子幼業儒從山堂淳祝髮遍參至吳首謁鐵菴一次參佛照於靈隱隨遷育王歷十年居第一座出住香山五年徙台州光孝又遷鎮江甘露平江虎丘萬壽及淮南長蘆晚補育王後退居香山朝命起蒞淨慈僧問三聖道我逢人則出出則不為人意旨如何師曰東斗西移曰興化道我逢人則不出出則便為人又作麼生師曰南斗北轉上堂奔流度刃疾焰過風啐同時崖州萬里有底道如人學射久習則巧殊不知未彀已前中的早涉迂回了也趙州到茱萸靠却拄杖即且置只如孚上座道聖箭折也意作麼生喝一喝曰若不同牀睡焉知被底穿上堂舉首山拈竹篦曰喚作竹篦則觸不喚作竹篦則背汝等諸人喚作甚麼葉縣省近前掣竹篦拗作兩橛拋向階下却曰是甚麼山曰瞎縣便禮拜師曰臨濟一宗掃土而盡宋寧宗開禧丙寅五月示寂壽五十八臘三十五塔於寺之北隅杭州府徑山少林妙嵩禪師建寧人上堂舉僧問睦州如何是展演之言州曰量才補職曰如何是不展演之言州曰伏惟尚饗師曰睦州古佛善應來機雖然如是只得八成或問徑山如何是展演之言即向他道問十答百有甚麼難如何是不展演之言喝一喝曰且莫屎窖沸寧波府育王秀巖師瑞禪師上堂舉道吾曰高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人妙喜曰高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是舊時人大衆二老隨機應用即不無若是衲僧門下未夢見在且道衲僧門下作麼生良久曰不是知音者徒勞話歲寒上堂舉灌溪參臨濟濟下禪牀搊住溪曰領領濟乃托開師頌曰雨散雲收後崔嵬數十峰倚闌頻顧望回首與誰同上堂舉演化問報慈如何是真如佛性慈曰誰無化不契復請益護國國曰誰有師曰誰無誰有全機道言下翻身不唧𠺕直饒未舉已先行錯認簸箕作尉斗阿呵呵若人自解倒騎驢一生不著隨人後寧波府育王孤雲權禪師上堂舉僧問雪峰古㵎寒泉時如何峰曰瞪目不見底曰飲者如何峰曰不從口入僧又問趙州古㵎寒泉時如何州曰苦曰飲者如何州曰死師曰一人隨波逐浪一人截斷衆流檢點將來總缺會在今日有人問育王古㵎寒泉時如何只對他道須是親見雪峰飲者如何問取趙州有送僧歸鳳山偈曰鳳凰山下鳳凰兒文彩才彰羽翼齊鐵網縵天攔不得歸心已在碧梧枝寧波府天童海門師齊禪師初住台州瑞巖奉旨遷天童每晨起童行捧香盒隨師各殿堂逐一行香畢還方丈望佛作回向語曰上來持誦大方廣佛華嚴經一部回向真如云云日以為常而舉寺未嘗信師乃謂衆曰汝以八十一人各執經一卷聽老僧誦衆依教師在座上誦其八十一人各聞所誦皆與手中所執一字一句毫無差漏衆疑方釋知為華嚴大菩薩再世者也石菴正玸禪師歸湖上有偈曰鳥不驚飛水不流碧潭空濶冷涵秋一絲頭上無香餌風輥蘆花落釣舟南康府雲居率菴梵琮禪師上堂舉百丈野狐話頌曰百丈野狐石女無夫一回淚出滄海乾枯浴佛上堂且喜今朝降獨尊率菴無物慶生辰只將一霎薔薇露洗出湖山淨法身杭州府靈隱鐵牛印禪師上堂舉南泉曰王老師自小養一頭水牯牛擬向溪東放不免食他國王水草向溪西放亦不免食他國王水草不如隨分納些些總不見得頌曰不如隨分納些些喚作平常事已差緑草溪邊頭角露一蓑煙雨屬誰家華藏演禪師法嗣湖州府何山月窟慧清禪師上堂舉天台韶初參法眼因僧問眼如何是曹源一滴水眼曰是曹源一滴水韶聞豁然開悟頌曰曹源一滴水相罵饒接𭪿鷃空啾啾驊騮已千里天童全禪師法嗣寧波府育王笑翁妙堪禪師慈溪毛氏子廣顙平頂骨氣清豪從野菴欽受業依息菴觀於金山參松源嶽於靈隱皆不契時無用居天童徑造其室用問行腳僧游山僧師曰行腳僧用曰如何是行腳事師以坐具便摵用曰此僧敢來者裡捋虎鬚俾參堂用一日以狗子無佛性話問師師擬開口用以竹篦劈口便𭣟師應聲呈偈曰大塗毒鼓轟天震地轉腦回頭橫尸萬里用頷之即命侍香已而報恩約致師分座後出世妙勝次遷金文移光孝及台之報恩閩之雪峰未幾詔住靈隱開山大慈次遷瑞巖應江心無何淨慈詔下丐辭不𠃔明年荊湖總臣奏令僧道買紫衣師號俾以師號住持師憤然謂曰若是則千金之子皆可主法我道殆矣奏疏殿陛上書廟堂其議遂𥨊詔徙天童力辭東歸翠巖育王虗席復有旨起師再辭不許乃奉詔表章大覺祖述妙喜秩然有序上堂膏雨及時江山如洗幽鳥語喬林殘紅隨遠水可憐盲聾瘖啞人不識此方真教體舉寶壽開堂三聖推出僧話頌曰一人客路如天遠一箇歸心似箭輕彼此征途雖有異須知同日到天庭舉汾陽識得拄杖子行腳事畢話頌曰平地無因立話端揭天聲撼怒濤寒直饒識得拄杖子也是封皮作信看時天童除書再至大參趙公復請主淨慈悉謝之示疾書偈曰業鏡高懸七十二年一椎擊碎大道坦然置筆泊然而逝杭州府靈隱石鼓希夷禪師舉琅琊覺法華舉相見話頌曰聞名不如見面見面不如聞名此地無金二兩俗人沽酒三升舉南泉曰文殊普賢昨夜三更起佛見法見每人與二十棒趂出院也趙州曰和尚棒教誰喫泉曰且道王老師過在甚麼處州禮拜而出頌曰春風吹落碧桃花一片流經十萬家誰在畫樓沽酒處相邀來喫趙州茶和梁山遠十牛圖頌一尋牛只管區區向外尋不知腳底已泥深幾回芳草斜陽裡一曲新豐空自吟二見跡枯木崖前差路多草窠裡輥覺非麼腳跟若也隨人去未免當頭蹉過他三見牛識得形容認得聲戴嵩從此妙丹青徹頭徹尾渾相似子細看來未十成四得牛牢把繩頭莫放渠幾多毛病未曾除徐徐驀鼻牽將去且要回頭識舊居五牧牛甘分山林寄此身有時亦踏馬蹄塵不曾犯著他苗稼來往空勞背上人六騎牛還家指點前坡即是家旋吹桐角出煙霞忽然變作還鄉曲未必知音肻伯牙七忘牛存人欄內無牛趂出山煙蓑雨笠亦空閒行歌坐樂無拘繫贏得一身天地間八人牛俱忘慚愧衆生界已空箇中消息若為通後無來者前無去未審憑誰繼此宗九返本還源靈機不墮有無功見色聞聲不用聾昨夜金烏飛入海曉來依舊一輪紅十入垂手者漢親從異類來分明馬頷與驢腮一揮鐵棒如風疾萬戶千門盡豁開福州府雪峰滅堂了宗禪師上堂空索索冷氷氷清虗之理畢竟無身為甚麼却有許多煙雨會得麼若會得七種供養諸人若會不得滴水難消寧波府雪竇野雲處南禪師上堂百計推尋了不見面一時休去在處逢渠長連牀上喫粥喫飯取飽為期我且問你常住一粒米是幾番過手上堂斬釘截鐵特地乖張就下平高衲僧笑具皇覺到此有理難伸未審諸公如何理論上堂摩醯正眼熙然赫然一處該通萬機頓赴縛虎擒龍驚天動地且平常一句又作麼生莫把是非來辨我浮生穿鑿不相干順天府薊州盤山思卓禪師上堂拈拄杖曰登山渡水全藉者人擲拄杖曰相見易得好共住難為情上堂寂寂惺惺有氣死人惺惺寂寂無用頑石嘻下載清風付與誰育王璞禪師法嗣寧波府育王妙智從廓禪師長溪林氏子幼穎悟不妄言年十五剃染見佛心才懶菴需後依大圓璞有得服勤數載圓撫之以為類己得參妙喜於回雁峰下復隨侍徙育王及圓繼席徑山師典第一座丞相沈公以廬山請出世而一香乃為大圓拈出也次遷育王孝宗即位詔舍利寶塔詣行在安奉禁中觀堂召師對碧琳堂問舍利從何發現師曰從陛下聖心發現上大悅賜師妙智禪師號日本國王閲師偈語自言有所發明歲修弟子禮且送材建舍利殿師晚投老於烏石山立笑月菴作終焉計淳熙庚子示微恙說偈而逝壽六十二臘四十七塔於菴之𥨊室雪峰然禪師法嗣如如顏丙居士有僧舉趙州見南泉有主沙彌話問者士以頌答曰解把一莖茅草喚作丈六金身會得頭頭皆是道眼中瞳子面前人頌子湖狗話曰貧家無所有只養一隻狗便是佛出來也須遭一口大鑑下第十九世青原禋禪師法嗣吉安府青原淨居正菴宗廣禪師僧問不在內不在外不在中間且道在甚麼處師曰逢人不得錯舉曰還有請益分也無師曰弄巧成䂐僧禮拜師曰却較些子上堂父子相承住此山叢林軌則沒多般主賓色色皆仍舊驀召大衆且道仍舊後如何一炷清香答聖顏下座上堂不用愛聖聖是假名不用厭凡凡是妄立但得聖凡情盡自然物我雙忘正恁麼時憑誰委悉拈拄杖曰石女穿針山色秀木人牽線海雲生乃卓一卓下座鼓山永禪師法嗣杭州府淨慈晦翁悟明禪師福州人上堂舉夾山會下一僧到高亭才禮拜亭便打僧曰特來禮拜師何打又拜亭又打趂出僧回舉似夾山山曰會麼曰不會山曰賴汝不會汝若會即夾山口啞去應菴曰高亭一期忍俊不禁爭奈拄杖放行太速者僧當時若是箇漢莫道高亭夾山便是達磨出來也斬為三段何故家肥生孝子國霸有謀臣師曰高亭夾山門庭施設各得其宜但中間一人較些子明果與麼道也是鞏縣茶瓶嘉定丁丑師纂修聯燈會要傳于叢林靈隱善禪師法嗣杭州府徑山藏叟善珍禪師泉州南安呂氏子年十三依郡之崇福落髮十六遊方至杭受具謁妙峰於靈隱入室悟旨後出世住里之光孝升承天次遷安吉之思溪圓覺福之雪峰復以朝命移育王與徑山據室者裡是問訊燒香了來老僧身邊立地底所住麼呆子你自鈍置猶可莫來鈍置老僧示衆古者道知之一字衆妙之門又有道知之一字衆禍之門只者二門入得更須出得三世諸佛出不得六代祖師出不得天下老和尚出不得何故變鐵成金易變金成鐵難上堂慧大地是紫磨金色身諸人每日開眼覷見釋迦老子心肝舉步踏著釋迦老子鼻孔說有說無是誑說生說滅是謗說即心非心是妄不誑不謗不妄春風吹落桃李華淡煙疏雨籠青嶂上堂春雪寒春宵短古佛心破燈盞正法眼乾紙撚抖擻精神只管看看到北斗西移南斗東轉上元依舊正月半上堂靈雲見桃華悟去玄沙道敢保老兄未徹香嚴聞擊竹悟去仰山道祖師禪未會禪和家十箇五雙道我此一門全無肻路與麼亦未知玄沙仰山舌頭落處在要見二大老麼醉我落花天借他管絃裡除夕小參舉僧問古德年窮歲盡時如何德曰依舊孟春猶寒師曰古德恁麼答話只恐諸人忘却今日忽有人問年窮歲盡時如何拈棒便打待他道因甚麼打某甲即向他道你更要我道孟春猶寒那嘗自題其像曰參禪無悟識字有數眼三角似燕山愁胡面百摺如趙婆呷酢一著高出諸方敢道飯是米做送忍書記偈曰𩯭絲不可織寒衣煮字那能療得饑別欲與君安樂法正忙却未有閒時生宋光宗紹熙甲寅十月十二日示寂於景炎丁丑五月二十一壽八十三閟全身於南塔院杭州府淨慈東叟仲穎禪師上堂切忌隨他覓無勞向己求縱橫活鱍鱍有放還有收是甚麼一葉落天下秋上堂迷生寂亂悟無好惡奉化縣裡契此翁凸箇肚矮雙足拖箇布袋十字街頭憨憨癡癡落落魄魄何似老龍牙手裡把柄破木杓上堂拈拂子畫一畫曰伏羲發天地之祕未明者消息又點三點曰瞿曇示圓伊之形未明者消息者消息如何辨的不見道冬至乃書雲節擊拂子上堂上不在天下不在地中不在人喝一喝曰且道者一喝落在甚麼處若也知得也有賓也有主也有照也有用若也不知參退巡堂喫茶上堂撾動鼓衆斯聚耳同聞目同覩超乾坤越今古夫何故五月五是端午上堂行者行坐者坐左之右之無可不可甘露園中蒺藜黃檗樹頭蜜果才與麼不與麼不與麼却與麼善賈之家不停滯貨吉安府吉水龍濟友雲宗鍪禪師廬陵王氏子幼喜趺坐年十二從寶壽海室淙出家十九剃髮受具二十二參妙峰於靈隱值佛涅槃日上堂峰拈拄杖曰釋迦老子來也諸人還見麼微妙淨法身具相三十二放下拄杖曰見你諸人不會入涅槃去也師於言下豁然契悟尋登吉水之東山佛頂得修山主故址木食㵎飲影不出山嘗自咏曰山僧有分住煙蘿無米無錢莫管他水似琉璃山似玉眼前儘有許來多後峰以法衣竹篦并自題肖像寄師曰妙峰孤頂草離離橫按竹篦三尺鐵只許佛頂龍濟知父子不傳真祕訣師嘗榜門曰除却眼耳鼻舌身意那箇是你自己若也道得許你親見龍濟其或未然且居門外雪巖嘗對曰和尚曾接得幾人師曰山僧從來不曾按牛頭喫草歲暮僧問臘月三十日到來時如何師曰門前無索債人元至元丁亥七月二十七日忽示疾集衆囑後事彈指一聲曰只此是別衆語也將二鼓衆請偈師索筆書曰一燈在望更無言說大地平沈虗空迸裂書畢泊然而寂世壽八十臘六十一全身塔於峰巔淨慈簡禪師法嗣寧波府育王物初大觀禪師鄞縣橫溪陸氏子參北澗於淨慈領旨典文翰晚住育王上堂一東二冬你儂我儂暗中偷笑當面脫空雖是尋常茶飯誰知米裡有蟲夜來好風吹折門前一株松上堂用黑豆法換人眼睛如恆河沙會火爐頭話能有幾箇九九九三世諸佛不知有翻身踢倒五須彌何用法身藏北斗藏北斗分明向外揚家醜上堂達磨正宗衲僧巴鼻充塞虗空無處回避堪笑迷流白日青天開却眼只管瞌睡更有黃面老人不識好惡入泥入水却道我於然燈佛所無一法可得而為我授記何異好肉剜瘡空華求蒂畢竟如何悉唎悉唎既順世塔於寺之西菴徑山琰禪師法嗣杭州府徑山偃溪廣聞禪師侯官林氏子母陳世業儒季父為沙門諱智隆住宛陵光孝往依之十八得剃染初見鐵牛印少室睦無際派諸老甚久後參浙翁於天童針芥雖投自知未穩及再參雙徑一夕坐簷間聞更三轉入堂曳履而蹶如夢忽醒翌朝造室翁舉趙州洗盂話師將啓吻翁遽止之遂當下廓然紹定戊子出住四明小淨慈次歷主香山萬壽雪竇育王淨慈靈隱徑塢八席開爐上堂舉趙州示衆老僧三十年前在南方火爐頭有箇無賓主話直至如今無人舉著師曰森羅萬象明暗色空日夜舉揚趙州古佛不是不知只為貪程太速上堂楊岐眼裡睛臨濟頂中髓一不成二不是點著不來白雲萬里佛成道上堂錯錯六載草繩空自縛了了開得眼來天大曉古今天地古今日月古今星辰拍掌一下曰劍去久矣切忌刻舟上堂雲門放洞山三頓棒嚼飯餧嬰兒黃檗打臨濟三頓棒按牛頭喫草只今不犯絲毫有箇方便良久曰大事為你不得小事自己擔當上堂非風幡動仁者心動浣盆浣盆非風鈴鳴我心鳴耳漆桶漆桶古往今來和泥脫墼有甚麼限還知萬壽落處麼劫石有銷日虗空無盡時上堂十字街頭石幢子無你遮護處一聲江上侍郎來無你回避處衲僧家朝出暮入腳前腳後也須仔細忽然築著磕著淨慈拄杖別有分付上堂一升三合拄杖頭邊萬水千山草鞋跟底未言先領誰家竈裡無煙撩起便行是處井中有水莫道空來又空去許多途路不相孤上堂繞禪牀一匝揮香案一下轉藏已竟講經已竟若具看經眼目方知落處其或未然依經解義三世佛冤離經一字還同魔說上堂趙州喫茶去金牛喫飯來龍門多上客有人續得末後句許你入阿字法門上堂一句絶離微囫圇無縫罅善財七日尋覓不得趙州五年分疏不下靈山今日快便難逢為通一線六月賣松風人間恐無價宋理宗景定癸亥六月十四日示寂世壽七十五僧臘五十八蘇州府虎丘枯樁曇禪師上堂舉大梅嘗問馬祖如何是佛祖曰即心是佛師曰要知馬祖落處麼水向石邊流出冷風從花裏過來香杭州府徑山淮海原肇禪師通州靜海潘氏子母陳幼從邑利和寺出家年十九受具參浙翁於徑山翁問汝何處人師曰淮東翁曰泗洲大聖為甚麼在揚州出現師曰今日又在杭州撞著翁曰且喜沒交涉師徐曰自遠趨風翁以師警敏欲大激發未許參堂才見便曰下一轉語來擬開口即喝出師以書上又以頌呈末句曰空教回首望長安翁曰者裡是甚麼所在師曰謝和尚挂搭於是密就入室之列命掌記室翁既寂師出世里之光孝遷吳城雙塔金陵清凉天台萬年蘇之萬壽永嘉江心而四明育王虗席廟堂以師補處復遷杭之淨慈靈隱徑山其住徑山值歉餘逋券山積僧殘屋老未幾樓閣矗霄雲衲踵至不減浙翁全盛氣象俄示疾囑其徒曰為吾祔一穴於東㵎見生死不忘奉師之意六月初十日浴訖書偈而逝嘗讚達磨像曰踏翻地軸與天關合國人追不再還去去一身輕似葉長江千古浪如山寧波府天童辨山阡禪師舉李大夫翱參藥山因緣頌曰貴耳而賤目背手抽金鏃仰面看青天箭過新羅國送僧歸鄉偈曰奪志南方問正因正因一字不曾聞七零八落袈裟角惹得凌霄幾片雲觀音像讚曰螺髻屈蟠春島碧緑衣零亂曉雲寒尋聲只麼隨流去說甚真觀清淨觀金華府雙林介石朋禪師上堂舉明招一日天寒上堂衆才集招曰風頭稍硬且歸暖室商量便歸方丈衆隨至立定招曰才到暖室便見瞌睡以拄杖一時趂下頌曰稍硬風頭早已乖更將暖室自沉埋反令千古成踪跡枉喫羅山白飯來因見郁山主畫像旁僧索讚師信筆書曰拾得明珠笑眼開為言塵淨轉生埃若無直下承當者孤負闍黎一撲來佛成道日示衆六載將身草裡埋當時有眼幾曾開果然見得明星現未到門庭冷似灰杭州府靈隱大川普濟禪師明州奉化人上堂舉僧問睦州如何是祖師西來意州曰一隊衲僧來一隊衲僧去師頌曰一隊衲僧來一隊衲僧去打破睦州關大地無寸土題世尊出山相曰龍章鳳質出王宮肘露衣穿下雪峰智願必空諸有界不知諸有自來空送僧偈曰雲遮劍閣三千里水隔瞿塘十二峰抖擻屎腸都說了莫教錯認甕為鐘蜘蛛頌曰一絲挂得虗空住百億絲頭殺氣生上下四圍羅織了待無漏網話方行師嘗纂修五燈會元蘇州府虎丘東山道源禪師福建連江黃氏子肄業郡之白雲游歷兩浙見知識二十餘員末後到蔣山見浙翁室中翁即心即佛話有省出世奉化清凉遷蘇州虎丘上堂拈拄杖曰德山棒臨濟喝總是用過了底閒家廢具且道虎丘將甚麼為人卓拄杖曰不假鉗鎚烹佛祖慣將折筯攪滄溟擲拄杖下座題蜆子像曰紙錢堆裡可憐生臭口才開便葛藤蕩盡鬼家窮活計至今古廟絶人行建安徐直翁帥三山以雪峰起師至建寧光孝寺遺偈而化淳祐己酉九月二十九日也壽五十九寧波府大慈芝嚴慧洪禪師越州新昌人姓朱誕時母夢前石佛入臥內而生年十六從石佛淨因剃染謁浙翁於蔣山翁問汝何處人師曰越州翁曰近離甚處師曰淨慈翁曰如何是行腳事師擬議翁色莊曰汝前來答我一一分曉問著行腳事則茫然為何所礙師曰今日來見和尚翁曰念汝新到參堂去翁遷天童師再參室中舉不是心不是佛不是物話師曰毒龍行處草不生翁曰且喜沒交涉師曰入水見長人翁便喝後應丞相忠獻越王之命出世崇報寺上堂住山懶慢百事無成教為剩語禪亦強名擊拂子曰夜來春睡重不覺到天明住石佛上堂紅塵堆裡四經秋驗盡諸方碗脫丘忽地船頭輕撥轉却來屋裡販揚州襴衫翻著曲唱還鄉坐斷千差壁立萬仞直得韶光溢目故園桃李爭妍瑞氣騰空本地風光顯現若也頓開千眼何妨把手同歸其或未然善財一去無消息樓閣門開竟日閒上堂若論此事如春行大地物物皆春若是焦芽敗種又爭怪得臨終書偈曰六十三年前六十三年後臘月火燒山虗空俱出醜跏趺而逝寧波府壽國夢嗣清禪師山陰于氏子出家天章佛涅槃上堂佛真法身猶若虗空因甚二月十五日却向雙林樹下做盡死模樣良久曰竹影掃階塵不動月穿潭底水無痕上堂舉白雲端示衆若端的得一回汗出一莖草上現瓊樓玉殿若未端的得一回汗出縱有瓊樓玉殿却被一莖草蓋却師曰要知白雲老人落處麼曾從塞北經鏖戰敢向江南說陳圖上堂德山入門便棒臨濟入門便喝逼龜成兆終不能靈寶陀者裡寂然不動感而遂通良久曰馬無千里謾追風上堂舉曹山辭洞山洞山曰子向甚麼處去曹曰不變異處去曰不變異處豈有去耶曹曰去亦不變異師曰雲藏無縫襖鳥宿不萌枝上堂春風如刀春雨如膏裁剪不得處桃花色轉嬌靈雲一見不疑去謝郎舞棹更呈橈上堂歸宗斬蛇祕魔擎叉禾山打鼓趙州喫茶十字街頭開鋪席見錢買賣且無賒上堂三十年來尋劍客幾回葉落又抽枝自從一見桃花後直至如今更不疑師曰尋嘗春夢無奇特獨有靈雲說向人只如玄沙道諦當甚諦當敢保老兄未徹在又作麼生若不同牀睡焉知被底穿上堂萬里無寸草頭上漫漫出門便是草腳下漫漫夜行只管貪明月不覺和衣渡水寒處州府遂昌龍溪文禪師示衆無相無形本寂寥擬擡眸處轉迢遙蒲團靜倚無餘事窗外一聲婆餅焦
