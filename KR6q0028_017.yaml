body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第三十世聚雲真禪師法嗣忠州萬松三目慧芝禪師郡之劉氏子落髮於本郡東明次參聚雲雲示以本色鉗錘力究數年方明心要初總院事後充西堂雲著源流唱和歌付之出住聚雲上堂貝葉樓前扣午鐘東風迎我華臺上懸羊雖是助春光何似堤柳舒金網莫妄想欲會大意西來須聽山僧平空揑謊不是謊一樹眉毛額下橫十箇指頭共兩掌上堂生死關頭鬼神莫覰魚遊水底搖腮鳥蹈虗空鼓翅石輥飄打楊華氷稜煙騰火氣何以盡情道破為報今朝解制上堂今朝仲冬十五好看禾山打鼓一椎粉碎虗空費盡麻纏索補以拂子擊禪牀三下臘八上堂子夜明星未出時日輪已挂兩莖眉靈雲乍見桃花笑且喜從前自不欺上堂敲竹篦云一聲擊破目前機是誰惺惺是誰迷青青竹映晴天日影入寒江上上機上堂睜眼看不見側耳聽不著却聞鐘鼓敲復觀黃葉落溪聲山色轉法輪總說別說塵剎說且道說箇甚麼喝一喝上堂石人作揖闡威儀鼻念真經眼麻迷東村駭殺蒼頭老笑落春梅第幾枝上堂依經解義三世佛冤離經別說即成魔說依也不得離也不得不依不離作麼生六月炎天凍雪花枯樁樹上結冬瓜虗空嚼啐無餘粒達者咸言是作家上堂血濺梵天至極之談龜哥眼赤鸚鵡嘴彎今日有來與劉老師打箇同參鼻頭上著艾脚版下出煙趙州東司不說法新婦騎驢阿家牽上堂舉聚雲老人道迷去猿猴探水月悟來䕞𦿆拾華針師云老人太煞道破喝一喝云迷不迷悟不悟三脚驢兒爬上樹石人把火燒龍池賓主相逢不回互不回互蒼頭老兒退三步上堂卓拄杖云一面登翻一面行殘梅落罷正初春猫兒也解當巡炤單為心腸毒似人良久以拄杖畵喝一喝下座上堂談心論性好肉剜瘡良久默然虗空掘窟只饒六十痛棒許多受他熱瞞道甚一覩明星至今錯會不少但凡老鼠不咬飯盆得來無漏猫兒不守舊窟廣運神通到者裡海底泥牛踏翻銀河斗柄不為分外天邊玉兔闖入蟭螟眼睛許透重關如斯證得不必內收外折截短裁長設或未然教中毗尼如法信受上堂卓拄杖云會麼竺土爛葛藤支那別撰記不似萬年藤橫竪撐天地未會的喚作孟哥季哥會得來不是張三李四是箇甚麼擲拄杖云提起話長晚住萬松上堂木人吹鐵笛石虎撞金鐘蝦蟆打口鼓螃蟹舞師公別是一般清子弟等閒不與世人同雨沙自是心相應聾瞽只作耳邊風召大眾有打鼓弄琵琶者麼僧問離名離相以何為宗師曰蟭螟眼裡推石輥曰學人不會師曰螃蟹腔中好泛船問如何是境師曰字水屏山綠如何是人師云聚雲有老僧如何是奪人不奪境師云佳人面帶十斗粉如何是奪境不奪人師云朝罷歸來打單裙如何是人境兩俱奪師云漁人夜半水中坐如何是人境俱不奪師云賣花人引蝶相隨問四大分離者箇在甚麼處師云此去臨江一渡河云虗空也解開口師云漁人鼓掉春波亂問如何是吹毛劍師喝一喝問鑿壁偷光事若何師云開門見山問三身中那一身說法師竪起拂子進云久雨不晴是何意旨師云當門一路滑問西來大意即不問今日開堂事若何師云石女持鏡江干照進云者句是承嗣聚雲的那句是中興大慧的師云泥牛向火水中紅寶峰三巴掌鐵眉慧麗禪師北直隸真定府趙州栢鄉縣李氏子始落髮於天台無盡楊禪師會下無盡所行乃杜多行鍊磨遊山師從之者十有六載崇禎六年率眾峩眉飯僧轉夔門值兵亂徒悉被害師僅以身免返忠城會郡牧少游馬公少游以書送聚雲雲見即曰是我家人來了師願領灑掃行初半載暗行玄學夜則面佛危坐伏月躶身露日問其故曰晒晒不生蟲耳時鐵壁和尚為首座指入方丈雲示以話頭苦參一載一日雲上堂師出問如何是佛雲曰拄杖撐著月如何是祖雲曰橫肩兩樣看如何是超佛越祖雲曰提起三十棒師不覺大喝雲撫掌三下座令參至二十五日無門可入座打數次師自誓曰就參死了罷從此工夫日勝一時時刻無間一日七炷香不知去處忽然省悟白座呈偈座徵曰見箇甚麼師曰我名三巴掌和尚座引見雲雲騐之機鋒俊逸應聲偈語了無滯礙雲將示滅書有鐵眉三巴掌實老僧趙州萬里外弟子之囑出住華嚴上堂竪拂子曰看又看不見尋又尋不看往返無蹤跡空向我摸索擲下拂子曰冷處著把火上堂句句有眼名為禪鼻唇直掛萬人看金針繡出鴛鴦帳大地山河共一天上堂十箇指頭是五雙綿州附子漢州薑會得海底撈明月露地白牛角生光上堂日月照臨不到天地覆載不著含元殿上問長安直捷便是逍遙路南山高北山低日出東來又轉西昨夜霜風露消息吹落林華三五枝示眾日用事無別一隻草鞋爛前後兩半節費了多少線如何是爛底道理雙頭驢兒三隻角一根龜毛重九斤除夕茶話去年有箇三十日今年有箇三十日來年有箇三十日大眾且道喚作甚麼老僧喚作過去現在未來若有箇阿師出來云過去未來即不問請和尚道箇現在底老僧即與三掌云者一掌是佛陀者一掌是達磨者一掌是僧伽那阿師無對佛陀達磨僧伽明朝元旦各下一語來你看佛也空空無說祖也默默無言僧也忘言兩眼紅似血衲僧又作麼生山僧生得粗魯那管初一十五問來舉起巴掌打底是佛是祖僧問爐鞴弘開未審雲來有甚消息師云半夜巖頭孤月靜曰和尚如何出手師云一聲高樹老猿啼曰學人分中得箇甚麼師云毫毛出大樹問第一義即不問開堂事作麼生師云緊水灘頭拋繡毬曰恁麼則學人有賴師云有緣遇著無緣錯過平山和尚問坐脫立亡工夫如何做師云默然全無事逍遙路可登山云默然消息錯會者多師云有錯的不錯的山云如何是錯師云黑山藏鬼窟如何是不錯師云烏龜炭裡走問和尚巴掌打在甚處師云須彌山曰太遠生師云近而不遠僧擬議師云子過新羅僧禮拜師便打問如何是體師云坐下如何是用師云起去體用雙彰時如何師云老僧無丈人古孝廉問和尚巴掌既長因甚打不著峭然師云豈但峭然古云長底如何師云打到平都古云短底如何師云打盡天下古云究竟聻師拍手三下破山禪師過訪竪指曰者一指與巴掌是同是別師曰一樹梨華靠粉牆崇禎甲申秋同工部熊自福入施衛一座主夢神人報曰淨掃殿堂迎趙州祖翌日師至師生平不識一字至於陞堂入室一舉一措暗應先德出之自然故當時名宿皆尊師為趙州後身丙戌轉錫南濵瑞光洞楚鳳衛侯牟公閱師錄嘆曰錯過此老遣使迎師師辭以疾公令僧俗以肩輿迓焉是時浙提陳公贊伯方及冠殷勤請法師授以偈雲衲市集至無所容葢師之直捷接人鉗拂不倦所感召也順治庚寅十月初十日以法付門人耳菴泊然而化壽六十五臘三十有二塔於觀音山熊耳菴後大鑑下第三十一世慶忠機禪師法嗣成都府石樓燈昱禪師益州人久參慶忠侍忠遊江上一夕月崖居士指舟頂圓相問曰馬船亦具三十二應師曰只作得仰山半箇兒孫忠曰如何是全底師曰若要全辜負仰山忠曰其奈圓相何師曰和尚亦辜負弟子忠曰那裡是辜負處師曰三十二應聻乃印之忠州東明眉山燈甫禪師彭山張氏子少時隨祖母食素初遊西山參鑑隨隨教觀心念佛師問曰正觀心時教誰人念隨曰者居士且觀心著次扣衡旨禪師旨便擊磬一椎師如放下百斤擔子遂將世業冷如死灰決志出家一日與內室揮鋤地中偶自嘆曰解脫之期得在何時室曰君要去即去何必在口師便長揖而別至夜自剃鬚髮尋造大峩洪椿坪雖在稠人中孜孜以一椎磬在念乃下山參尋知識至夾江遇一關主師問曰在此作麼主敲靜版三下掩却關師於此稍有所進乃於北坪效高峰死關乃自誓曰若話頭不開道不入手必不出關自丁丑二月一日入關至十九日忽如迅雷震地舉身都碎含笑未已隨即出關復返椿坪偶樓喜二上座自平山來得慶忠錄讀至木鐘玲瓏處從前所有洞然無滯遂順舟謁慶忠於平山入室次山顧師曰汝是峩山僧麼師曰是山曰普賢與汝說甚麼師曰恰遇和尚入室山曰委的恁麼說師曰有功則考無功考箇甚麼山即驀頭三竹篦從是灰心座下一日師問無絃琴有韻撫者是誰山作鳴琴聲師曰不犯宮商和曲調作麼生彈山曰摵碎去師曰恁麼則石輥夜吹笙山曰不是好手出住三教繼遷靈峰圓通石峰興隆東明草堂開化八席先聚雲諱日上堂秋風秋雨底離甚麼名相惱得龜哥眼紅眨眨地把溈仰雲門法眼曹洞翻湫倒嶽輥作一團東湧西沒獨是小廝兒眼疾手快跳入杖頭祖印上放身大笑曰快活快活今日當陽用得親鐵牛隊隊黃金角上堂昨夜摩醯首羅會觀音大士哩哩囉囉不休拄杖子旋來報道夢釋偉上座自南浙來不參禪不打坐三教靈峰慣白拈手言罷穩貼貼地跕在面前索箇偈子與伊解交去老僧即與一偈曰有心聞不得無耳却知音圓通掉背去和天徹地傾巴掌老和尚示寂上堂卓三卓曰驢頭不鬬馬嘴從三掌中得來且放過虗張聲勢從班步下聽來不堪計較直饒未出茅廬三分已定如龍如鬼底死退活走底咄看破了也除夕上堂小盡二十九大盡三十日鼠𨉖牛角尖到頭知委悉無鬚鎖子兩頭搖赤眼烏龜吹鐵笛明日又新春不用舊年曆上堂倒曳遼天拄杖牢拴三耳草鞋漫云結解為期尚有末後一著今與汝等解開布袋於中竹頭木屑囊藏不少若遇虗空落地處一任抖擻解制上堂曰佛華經破故紙文殊普賢田厙奴五十三員花酒店善財百一十城脚跟未動毗盧七處九會磕睡未惺咄毗盧了善財了文殊普賢了若凡若聖乃俗乃僧無不了了卓一卓曰了不可得僧俗凡聖不可得文殊普賢不可得善財不可得毗盧不可得不可得亦不可得到者裡莫謂聲聞二乘不見不聞佛眼覰亦無分問未生事如何師云劫風吹不起曰已生後如何師云逆水泛輕舠曰前後際斷又如何師云提起三十棒曰即今在甚麼處師便打問空劫前是誰承當師曰王大耳曰相見得麼師曰沒頭腦曰仲冬嚴寒伏惟尊重師打曰雪火恰投機問四十九年未曾說一字教從何來師曰如蟲禦木曰如何演唱師曰風和萬籟清問如何是雲門宗師曰辣如何法眼宗師曰瞎如何是溈仰宗師曰恰如何是臨濟宗師曰煞如何是曹洞宗師曰密師晚年罷席祖山遊鄂城訪臥雲退休於齊安之燕雲山雪堂所著有草堂規制金剛大義折疑略釋栗園典要三字經說內篇詮釋等書傳於叢林忠州福城山慶雲衡山燈炳禪師合江馮氏子落髮於寶峰洞然禪師偶得四家評唱至無義味處輙自喜之適萬和尚宗風大振時師方年少即隨業師禮聚雲未幾即許入堂經三七日無門可入乃對露柱曰吾此身若不與露柱同體者誓不肻休從暮至旦果獲如一一日偶舉曰佛殿入燈籠牛皮鞔露柱無二無二分無別無斷故未六十日忽然前後際斷走見雲雲曰子雖入矣三句四喝四賓主又當何如師又茫然時慶忠老人為首座一日隨忠山行次見磊石三座忠曰此不是三句前行又見四人忠曰此不是四賓主師當下釋然即拜之曰元來得恁麼近後二年先聚雲滅度慶忠廬墓師晨夕侍焉不踰年忠受平山請師充第一座時方在髫酆陵以蜀東第一名勝四方龍象一時會集者千有五百人師雖於稠人中更勤接納是時石樓昱眉山甫汾陽覺喬松億咸受煅煉焉除夕忠問師汝還脚忙手亂麼師曰大盡三十日忠曰意旨如何師曰小盡二十九出住吉祥上堂六三六四六五吉祥大震法鼓黃梅三擊祖意旛華羅列飛舞今乃諸護法建普利道場特請山僧陞座舉揚般若若論般若無說無聞向何處開口只聽得一尊宿在山僧拄杖頭上道大乘井索小乘錢索有漏笊籬無漏木杓德山臨濟無故入門便棒喝差甚麼使者雲行功曹傳奏大地草木咸放光明天龍鬼神歡喜信受卓拄杖曰知麼野人恒面壁三星拱吉祥午日示眾石輥嚼破虗空冤屈崑崙呌苦痛殺海上王郎到處敲鑼動鼓喝一喝家家蒲劍倚天寒報道今朝是端午僧問曹洞宗旨師指黑白二犬曰者不是曰那箇是正位師曰鷄向五更啼問如何是未生前事師曰我不曾與汝同參如何是已生後事師曰我曾與汝同參曰和尚恁麼得大自在師曰我恁麼得大自在問一心不異萬法一如如何是萬法之源師曰飯子僧看夾山參船子語師曰者漢若不是道吾幾乎半途而廢曰那裡是他底半途師指夾山語曰如何是法身師曰木魚兩箇口如何是法眼師曰香爐三隻脚問念佛底是誰師曰鷄鳴犬吠問和尚將甚麼為人師曰虗空頭戴角曰若遇盲聾瘖瘂三種人來如何師曰玉兔嚼寒氷僧禮拜師撫禪牀曰茫茫宇宙人無數幾箇男兒是丈夫康熙丁未師遊江浙至雙徑掃大慧祖塔二載乃歸退住忠之慶雲庚申六月十八日示微疾說偈而逝世壽七十僧臘五十三門人性珏分靈骨一半附葬于高峰祖塔之左餘皆塔於本寺之西岡忠州高峰開禧三山燈來禪師蜀墊江曾氏子自幼業儒少列黌序長食饌堂數次棘闈咸推名匠居恒喜讀佛書及先德語錄遇無意味話輙欣好不已樂與緇輩往來有僧傳聚雲古音王傳竝平山錄巴掌和尚錄讀之心醉甞自矢曰吾異日必為聚雲兒孫越數年從本邑弔巖山南浙二師祝髮避兵江南止東明寺聞慶忠住石峰師奉書於忠忠復書有似忍賢座不過之語師讀之嘆曰者老漢婆心太切遂入山參禮半月被南師強之入夜郎會伯兄憲副公宦旋接之返蜀每謂師曰修行固善但出處大事未可草草師笑而不答戊子再謁慶忠於青山時笑亭維那夢人持黃縀一端供忠忠命亭大書以此成正覺五字晨興白忠忠曰是必有繼佛真乘者來次日師果至忠一見便曰汝莫是曾不波耶師曰和尚莫眼華忠哂之眉山首座解衲相贈三日後命參堂忠示以沒得話頭語又戒不許看一文字時巴掌和尚亦在山中得以朝暮請益青山嚴冷枯淡坡事繁重師不以為難苦參兩月了無入處一夕啟掌和尚曰某近日坐不得行不得睡不得飲食不得昏悶幾於欲絕此事倘若無緣直可罷休掌曰汝果到此耶不久有消息了快參師佩其語功倍於前自戊子冬廿六日至己丑三月廿六夜適笑亭維那閱大慧錄至嚴陽問趙州一物不將來州答放下著師伸首見之不覺肢節俱解乃撫案大笑曰悔悔悔亭曰汝見箇甚麼便乃爾師驀與一掌亭儘力一推師即趨方丈忠曰作麼生師撫掌一下忠曰落在甚麼處師拂袖便出一日侍忠與掌山行次見浮雲飛度師問曰落在甚麼處忠向空一指云看掌打師一掌師方貼然己丑十月掌應施州鳳衛侯請師請充記室及到施州掌將袋付耳菴先期化去留偈示師師方通嗣法書於忠忠諭曰巴掌既卸擔於汝好好擔著近載始出山省忠於靈峰入室次忠曰末後句聻師擬對忠曰不是遲二期再進忠曰不是不是忠知其未穩示以本色鉗錘師忘寢食者三晝夜一宵開靜後忽然穎脫次早入室忠不與語周旋竟期亦不與語至夜忠登塌師作禮出脚纔跨門忠遽問曰末後句作麼生師方進語翌日忠上堂曰也大奇也大奇末後句妙難思汝諸人知麼那門外漢不是山僧悄地引則機緣又爭得進門聽吾偈全身放下隱山隈頭角纔成喜兩開展轉由吾相分付雷轟電掣出潛來即命首眾順治甲午歲出住忠州崇聖次遷梁山之興龍五雲緇衲逩驟向化侯譚公以夔州之曇華迎師道望彌著復創忠州之高峰戊申入浙領嘉禾之天寧上堂喝一喝曰雷以動之噓一聲曰風以散之卓拄杖曰雨以潤之畵相曰日以暄之此是衲僧機關因甚註以羲經妙義祇緣華野鄧居士具贊化才猷於茲飯眾祈嗣越例與諸人露箇消息還見麼先天弗違後天奉若彩鳳五色毛祥麟一隻角上堂松直棘曲𠒎短鶴長眉先鬚後舌柔齒剛點頭三下自肻承當承當箇甚麼績麻滿筐上堂三山不會佛法逢著虗空一摑拄杖眉長丈三拂子眼橫尺八四四三三七七八八上堂江水湯湯河流蕩蕩風敲翠竹日照堤楊觸境觀不足明明無回互卓拄杖曰莫將黃葉當金錢猫兒原解捉老鼠上堂此事如鬧市裡颺石頭著首者便知山僧今日颺下石頭了也還有著首者麼上堂上大人丘乙己圓是規方是矩看將來無彼此麥裡麵兮穀裡米止止佳作仁也可知禮上堂之乎也者難措一辭良久默然和盤托出委悉麼家有犢牛兒價直十二兩上堂一不成單二不雙六門緊閉沒收藏有時鬧市街頭過三歲孩兒喚作娘頭短小尾粗長既無背面又絕肝腸若人識得打他無妨罵他無妨慶忠老和尚圓寂上堂喝一喝云此是先師三十年來把釣持竿一句喝一喝云此是先師六十六後收綸轉棹一句且承先啟後一句又作麼生良久云浯水曲如帶翠山列似屏時時聚雲雨在在雙徑雲法雲密布法雨漓淋呿呬呿呬丘乙己上大人蓮社永開佐治平復喝一喝小參長三短五七縱八橫頭正尾正眼全足全會得分文不直不會疑則別參蒼天山僧生在萬曆四十二年小參者一句西天四七東土二三都來沒起口處山僧為汝道破逢人切忌錯舉小參雲行雨施品物流形太和元氣草木皆春今朝是二月一了看那金風到處勾者萌甲者拆萬物欣欣盡向榮面目本來不借借不借借為君決生前鼻孔何曾別非青非黃非赤非白名之不能狀之不得無物可倫無形可埒㘞地一聲恁麼來踏破東南與西北不問天寬何嫌地窄十方世界露全身到處釋迦與彌勒舉拄杖曰還見麼擲下曰翻身踢倒五須彌大地虗空如潑墨珍重示眾口不解說蜈蚣無脚耳不解聞木馬懸鈴眼不解見瞎驢磨麵者箇只尋常秦時𨍏鑠鑽看雨打梨華風吹柳線示眾石龍驗人有三句第一要迸開頂門第二要扭轉鼻孔第三要脫體逍遙須是不動唇皮分明道答還有同生同死底麼僧問如何是清淨法身師云泥猪獺狗問路逢達道人不將語嘿對未審將甚麼對師云今日見兩人舁野猪問如何是三世諸佛師云馬牛羊問如何是超生死不相干句師云山菌子問如何是生前面目師云描不成畵不就商州牧沈赤肩居士初任新寧參師師痛加錐劄士低首良久師云曾見夾山參船子機緣麼士云見師云試舉看士舉至夾山辭行頻頻回顧處師驀竪掌云將謂別有耶士當下釋然後見猫捕鷄鷄飛入草中師取磚一塊置地云是甚麼士作鷄鳴聲師云者話猶未圓在士將磚一脚踢去師乃印可曹秋嶽沈赤肩同師坐次話及布帒和尚機緣師向嶽索云乞我一文錢嶽云者一文急忙拈不出在赤肩云請向弟子乞看師云你做窮官底人向你乞箇甚麼晚居天寧二載緇素景從晨夕參請師與唱酬無倦一時達者稱為大慧再來康熙己酉編梓聚雲三世語錄附楞嚴大藏即返蜀為慶忠建塔於高峰乙丑歲七月十五日集眾謂曰汝等當訃聞同門十八日午時吾行矣至期命門人舁龕至丈室親書得大自在額懸於龕首端坐龕中手書遺偈云行年七十有二開堂四十有三生死瞥然無與去來有甚相干老僧直實而道一任諸人疑者疑信者信參者參雖然如是也不得放過咦擲筆泊然而逝闍維齒牙不壞舍利盈坎附葬於慶忠塔右與衡山塔并遵治命也有六會語錄宗旨纂要松林閑評三十卷行世梁山太平三空燈杲禪師蓬州鄭氏子初為郡吏一旦投華銀山南宗律師披剃即下山參聚雲時慶忠為首座師甞扣之忠出世平都吟翁東明青山師皆總院事當時名宿如破山明眉山甫咸下之葢其機辯穎逸出入宋元自印心於忠後出住棲賢一日燒畬次丈雪禪師過訪師曰水鎻雙溪峰高萬仞向甚處去雪曰行路倦了上棲賢歇歇去師曰看狗子及至雪曰請和尚奉禮師曰適纔相見了也傍僧曰莫眼花師喝曰非汝境界雪曰果然名不虗傳師曰喫茶去一日師遊忠路與敏樹禪師談及時事樹曰萬事俱要造化好師把住曰梅花不在樹枝上白雪豈從天降來且道還是造化不是造化樹曰普天匝地師曰須向者裡評論始得四方屢請陞座說法師叱曰我三空非布販子禪待五百人方說小參眾不盈千者誓不上堂後迎忠於太平忠一日謂曰諸方號汝為牙爪平時有甚機緣麼師曰古今語錄塞海堆山放過某甲一人罷師生平戮力叢林分寸不蓄與眾甘苦一事稍拂抽杖便行康熙癸卯尋匡山至隆興方伯余公迎居署內晨夕問道未及一載偶一字相違宵夜遁去公命人急追之已渡江矣丙午三月二日行化廬州病新起語眾曰八苦交煎四大分散如是而已侍僧曰和尚到此何如師曰老僧豈在古人之下今將行矣吾平生不離大海眾滅後以骸骨付諸水濵言畢而逝梁山高峰喬松燈億禪師鄰水馮氏子兒時每嘆曰做和尚去父兄俱以和尚呼之時有方士過門謂父曰此子命相不凡非池中物十七歲披剃於本邑慧空菴未久遇業師復初初自兩都回言南方禪席師拜會下同住邑之延福寺寺甞開經論師雖聽習大意明了而己躬下事未得穎脫時時在念後於五龍菴遇一禪客以青州公案雲門屎橛等語每每相問未決造華銀山謁南宗宗南堂丈中見聚雲老人像又得一貫別傳五冊從頭細看覺有所得遂約同志數人放舟東下至平山聞聚雲化去遂參慶忠忠時廬墓次年忠應平都請師願入侍寮一日入室次師纔入忠曰我不曾教汝師珍重便出脚纔跨門豁然領旨自此傾誠座下一十五載初住白巖上堂以拄杖橫肩曰會麼具眼者出來山僧有箇騐處僧問如何是萬物咸新句師便打如何是舜德堯仁句師亦打乃曰山花似錦㵎水如藍乾坤浩蕩日月高懸擲拄杖下座上堂連喝四喝曰喚作金剛王寶劍得麼喚作踞地獅子得麼喚作探竿影草得麼喚喚作一喝不作一喝用得麼咄臨濟老漢口門太窄示眾韶陽餅諗老茶猶是止饑接渴臨濟喝德山棒且非正令全提僧問如何是正令全提師曰拈案子山來曰學人不會師曰還安舊處著示眾撒手那邊回頭者畔聞鐘登殿擊鼓陞堂是即是且屙屎放尿畢竟在甚麼處請下一語謾道沒閒工夫好會麼以拂子作相云參師將往永興寶善居士問和尚向甚麼處去師曰岸南永興曰那邊事作麼生師劈面一掌士亦作掌勢師曰我打你也打士拱手師便行王太守問僧月到樹留影風停水不波是何意旨僧舉似師師曰會麼曰不會師曰石山子上虎耳草一居士問玉筯牙筯是同是別師曰放下著士放下師曰是同是別士罔措
