body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第三十一世治平鐵壁慧機禪師法嗣汾陽覺天燈啓禪師山西汾陽李氏子世錦衣脫白至蜀謁慶忠於平山依止十年忽爾開悟作偈曰跋涉勞心十載餘誰知家國盡丘墟而今喜得真消息平空白地結茆廬忠印之出住楚華嚴寺皖國劉公請上堂師升座公才禮拜起師便下座示衆一句通時句句通諸人因甚不玲瓏間談雜話偏然好問到生前兩目盲黑夜雨白晝風紅日西去又復東箇中何事頻相詢老虎元來是大蟲午日示衆上苑紅榴似火枝頭黃鳥如花中天節至隱蛙蝦打起鶯兒莫話一任龍舟競渡管他鼉鼓聲譁我儂瀟灑樂煙霞坐臥經行無價師嘗作十二時歌傳於叢林略曰雞鳴丑三箇老婆黑夜走忽然驚得木馬嘶抖擻又聽金牛吼一無舌一無口虗空撲地翻筋斗但只恁麼非恁麼管他知有不知有平旦寅只聞芻狗吠天明無人北去傳渠信有客南來問我津鼻頭痛喜還嗔野鴨去也不須尋玄提玄唱從茲定全放全收契獨尊日出卯那管他人醜與好臨流放曠沒高卑䇿杖逍遙隨拙巧也無憂也無惱從來一老一不老若人問我西來宗饑時喫飯寒加襖食時辰不求安飽不求榮萬緣放下無些子大地山河一口吞平息了莫厭貧緑水青山入眼塵十箇指頭兩隻手看來不是等閒人禺中巳摸著鼻頭無一事不向如來行處行男兒自有冲天志末法時勿造次閒居不妨頻遊戲大鵬入海老龍驚默默無端鼓雙翅日南午三更打罷月華吐匝地紅輪出海南驚惺曹山主中主甜瓜甜苦瓜苦不學道吾執笏舞釣魚船上謝三郎原是玄沙者老虎日昳未曹山之酒原不醉喫得三杯兩盞通打破愁城伸腳睡出乎類拔乎萃道人不賤亦不貴贏得春光度寸陰從來諸聖原無位晡時申絶煙野老來負薪到家不問廬陵米鍋裡無茶口內嗔明白了衣下珍眼中瞳子面前人鬧市臨流稱大隱竿頭慣釣赤稍鱗日入酉下坡路兒君知否明朝日出事如何依舊三三還是九象王行獅子吼狐狼野干無處走今日當陽漏逗開舌頭原來不出口黃昏戌獨坐茆菴勝石室靜觀跛足須彌山好笑長房千里術忘却年不記日只知屎橛千聖出懶下禪牀被人嗔文殊也曾遭貶叱人定亥柴門雖設無內外呼童討火月為燈照徹單前無被蓋喜還悲否還泰竹樹相敲生萬籟曹溪之路少人行若是知音還不會半夜子悟覩明星樹宗旨惱恨雲門棒下來至今敗闕成何濟山是山水是水遇直逢曲無彼此三更六代法衣傳五葉一華誰敢擬忠州玉山竹菴般若燈譜禪師郡之羅氏子少列黌序適慶忠闡化玉山師參扣有年未幾室氏亡故循亦剃髮一日忠於崇聖上堂師出問九重鐵鼓如何一箭便穿忠曰鼓聻師作呈勢忠曰穿也穿也師便禮拜遂結菴於玉山之南數年復開九峰焉忠州牛首雲巖野雲燈映禪師酆陵冉氏子參慶忠於平山一日忠與僧論議忠曰如汝是善打底人設有三人與汝藝同齊把住門你如何出去時僧下四十九轉語皆不契適師從外歸忠舉似師師喚曰外邊行者何人忠視師師曰出也忠頷之忠閲頌古次師曰和尚也被他瞞忠曰汝又作麼生師便喝忠曰來者裡呌喚師曰者裡不呌向何處呌忠曰汝當時跳巖跳坎只為父兄難汝而今也去尋箇事幹師作禮忠付以偈曰退後棲身地步寬殷勤好去到牛山客來切忌忘優待翠竹青松一任看潭州萬峰汝翁童真至善禪師蜀渝州江津江氏子少師文定公淵之後也生時母夢天鼓狀如日輪響入丹墀祖父夢僧携蒲團至庭翌午而師生八歲父守夔州師隨父詣任授以鄒魯章句輒能記之未久聞慶忠道播南濵師隨父詣寺先是忠夢大江一舟二人鼾𥨊於內忠登舟舟即化龍越山而過黎明忠語首座曰今日看有何人來未午而師隨父至忠異之父果以師落髮作沙彌三年從上座喬公諸經論律悉能背誦十三歲善頌偈遇事指物應口而成十五歲閲大慧祖録至竹篦子話起疑甲午參三山和尚於崇聖看萬法歸一一歸何處與竹篦子話自春及夏如醉如醒及忠轉江南師得朝夕參請於中秋夕與二僧擎茶偶壺蓋墜地忽爾前後際斷走見忠忠詰至婆子燒菴話師應聲稍遲忠曰未也子雖有得此處尚不能去不見道末後一句始到牢關把斷要津不通凡聖向老僧未開口前領得錯過了也經二年一日閲聚雲録至舉長沙問惠安公案雲曰若是寶峰則不然有問百尺竿頭如何進步向他道此去忠南二百里如云不會但道水路一半陸路一半師當下豁然從前所得一時淨盡走質於忠忠舉數誵訛師皆達旨遂印之命掌記室康熙初命師南下初住龍會遷長龍主萬峰上堂拈拄杖云辨龍蛇眼擒虎兕機固是衲僧日用尋常事新長龍號令初行條章約法不同小小所有僧堂裡風穴廚堂裡雪峰客堂裡重顯磨房裡法演侍寮裡洪準淨房裡佛日一齊歸向拄杖頭上任渠寬行大步隨緣自在也未得十分安穩且道奇特在甚麼處靠拄杖曰有意氣時添意氣不風流處也風流上堂譬如鴈過長空影沉寒水天衣老人大似抱贓呌屈看來看來真個真個何以故一二三四五屈指河沙數雪竇聞之倒退三千里緩緩只道得箇拈却一去却七上下四維無等匹臘八上堂縱橫截毗盧之印斷送渾家剔脫開少室之門風情越量若也於斯提去何勞扣戶椎門更若殢齒粘牙未免重樓次第先佛儀式權且聽著迎慶忠老人舍利還山上堂拈拄杖東覷西覷曰長龍不濟到處覓先師靈骨乃舉舍利曰者箇若是孤負先師者箇不是孤負長龍是與不是一筆勾下汝諸人還見師翁麼復云今辰比丘如法為先老和尚修設清供山僧特為舉揚須知此供不從天得不從地得不從人得畢竟從甚處得良久曰釋迦既然皆拱手何愁彌勒不揚眉解制上堂破落門戶件件缺短蓋古之常兄弟東去西去總為雲堂少剩不消老汾一陌紙兩塊肉斷送情魂慶快平生還知麼舊閣閒田消息在蒼池夜靜月華來示衆露一縷於千聖頂𩕳之上塵塵爾剎剎爾擲一塵於萬億剎海之中恢恢焉恍恍焉遠發千鈞弩倒弄金剛王也須退後三步衲僧門下事非小小拈竹篦曰者箇不屬塵不屬縷猛火燒虗空須彌藏北斗便恁麼去猶落今時窠臼未免喪我兒孫須是從前所得無量解脫一時蕩盡灑灑地作箇無依無倚道人火不曾燒著口風不曾吹倒樹無邊無中無前無後泥蛇飛入畫屏間野狐變作獅子吼卓一卓示衆高亭直超而去孤負德山趙州洗盂了瞞他作者直須揭却頂蓋剿絶根株一一妙明一一天真風清皇路月映江樓猶是無風匝匝之波務要掀天作用整葺頽綱挽他滹沱未墜之緒今日不免為諸人約法三章第一不得權實並用第二不得賓主齊來第三不得照用雙舉須向古德未屙已前驀行一步庶得祖風不墜千古生光還有具如是操略也無有則出來為古人雪屈時聞版聲鳴師拍案下座示衆龍以角聽蟻以身聽人以耳聽普賢大士以心聽拈拄杖曰此以誰為聽昨夜北風起寥聞打窗聲師侍慶忠於五雲一日忠入侍寮曰善侍者莫在此閒坐師曰爭敢忠曰莫瞌睡麼師作臥勢忠便打師便喝忠曰元來此處有人師便禮拜至晚忠復謂師曰國師三喚侍者侍者三應甚麼處是侍者孤負處師進曰始終作家忠曰還有與古人雪屈底麼師曰有誰是雪屈者師掩耳出謁破山和尚於金城山曰近離甚處師曰高峰山曰高峰近日如何師垂下一足山曰上座聻師曰不識山曳杖歸方丈師拂袖便出僧自溈山來師曰溈山近日何如曰儘利害師曰利害在甚麼處曰只為婆心太切師曰還知此間麼曰請師垂示師便打曰更利害師曰汝若恁麼會連我也是瞎漢隨後又打問僧溈山和尚為甚鼻孔缺了半邊僧指師鼻曰恰似師曰汝若喚者箇作是入地獄如箭曰畢竟作麼生師曰洞庭無蓋因僧舉臨濟兩堂首座齊下喝等語話猶未了師便喝僧擬議師拈拄杖推出復喝一喝忠州治平竺峰幻敏禪師酆陵徐氏子生而英俊敏慧過人十歲剃髮於母兄佛喜野雲二師與萬峰善禪師同作沙彌事慶忠當時慶忠會下以善敏二沙彌頗有機辨聲振一時師雖年少沉默寡言識者知其必成大器先是人傳善公善偈忠入堂值善圍火次令偈善曰赤光閃灼紫焰盤旋既能點雪又燦金蓮忠打一掌歸方丈復指燈命師作偈師曰光如閃電虗空可徹未來作燈是銅是鐵時三目和尚見之徵曰是銅是鐵師曰火裡波浪起忠異之問汝名甚麼師曰幻敏忠曰幻敏已前師曰海底青天外忠曰幻敏已後師曰佛法永無窮忠曰甚麼處見師曰靈峰山下在安期目曰期解後如何師曰虗空大地目曰落在甚處師頓足目曰有足頓無足頓箇甚麼師曰和尚也莫太認真忠大笑目復問善善曰火裡煉真金忠曰大衆何不看二沙彌答話師閲經次忠曰眼中常見如是經典只者便是為復別有師曰和尚直須恁麼會忠曰離却紙墨道將來師曰東邊風也不多忠曰者小師師自五雲歸忠曰聞汝慣打人師曰和尚仔細忠曰汝走路穿甚麼師曰草鞋忠曰獰牙生也未師翹足忠曰那箇聻師曰問者話作麼忠曰三空說汝掌他要將汝來處治師曰早與他說過了也忠曰作麼生說師曰盜一賠九忠曰吾助汝遠來善曰童真汝宜童行師事忠二十一年忠滅度衆請治平繼席上堂山僧自入者箇社火場頭惟具一行鐵脊骨一箇不變心至於禪道佛法毫無些子留滯胸中填塞肚裏今日被衆和尚以老人轉棹之故無端舉向人天衆前睜眼看者張耳聽著畢竟道箇甚麼以為承先啓後良久曰枝頭柳映千春茂樹裏華飄萬古香入塔歸上堂一番景過一番新梅綻金舒巧樣呈惟有者些渾四序都盧無變亦無更作麼生是無變無更底道理莫是寶塔重新總持不動喚作無變無更得麼錯莫是舍利流輝眼存青白喚作無變無更得麼錯莫是新長老搖唇鼓舌重打葛藤四衆等法誼如故道念恆存喚作無變無更得麼錯若會得者三錯堪報老人莫報之恩可了老人未了之業其或未然再揚家醜驀竪拳云四四三三七七八八佛成道日結制說戒上堂問聖明統御萬國咸寧道合君臣河清海晏正恁麼時和尚又作麼生師曰慣弄靈蛇勢赫赫萬層曰祇如本郡文武官宰紳襟四衆等迎請和尚開場選佛且道以何利益檀度師曰活捉生馬威昂昂千里曰恁麼則壽如山福如海瓜瓞連綿簪纓藹藹去也師曰諦當更諦當問聚雲心印臨濟綱宗如何是臨濟第一句師曰前三三後三三如何第二句師曰七不成八不就如何第三句師曰茶酙三箇棗曰恁麼不獨衲僧咸有慶文經武緯盡恩榮師曰且喜小出大遇問至道真乘本無言說應機接物須賴激揚至道真乘即不問應機接物事如何師曰曹溪有路人皆到曰即今隴畔寒梅新發秀山頭瑞雪鬬芳妍未審是神通妙用法爾如然師曰信是誰人得得來曰恁麼從此治平揚法化千萬國荷真風師曰今日恰遇同參乃拈拄杖卓一卓云恁麼恁麼幾度頻臨江上望黃梅花向雪中開不恁麼不恁麼嫩柳搖金線且要應時來試看釋迦老子明星一點奇哉三漢譬說喻說論教論宗以至調跛驢醫瞎馬不過應箇時節又看歷代宗師說甚麼謹嚴高古細密簡明親切轉身異類末後拈麈柄說脫空不過應箇時節祇如現前文武紳襟護法四衆請山僧開爐選佛結百二十期致令他人劃地為限又令披五條七條二十五條一歸依二歸依三歸依路從平地險人向靜中忙道是應時節不應時節良久復卓拄杖云本是瀟湘江上客自西自東自南北復舉波斯匿王問世尊勝義諦中還有世俗諦否若言其有智不應一若言其無智不應二一二之義其義若何佛言大王汝於過去龍光佛時曾問此義我今無說汝今無聞無說無聞是名一義二義看他波斯匿王意欲連科及第世尊即將名覆金甌今日衆中若有問第一義諦山僧但拍掌呵呵何故聻自從舞得三臺後拍拍原來總是歌忠州桐山普門燈顯禪師涪陵夏氏子少從應院初參萬松有年適松化去慶忠應白巖之請師謁焉一日同衆侍立次忠舉默然良久話驗衆師曰大似屋裡販揚州忠曰莫道無事好師曰和尚也是無端忠便打師便喝忠曰異時不得孤負老僧師作禮而退復侍慶忠於五雲一日病起呈偈曰改頭換面幾生來此日無端眼豁開分付目前皮袋子何妨馬腹與驢胎忠曰那箇是你開底眼師竪起拳頭忠曰放下著師才放下忠曰又在甚麼處師曰明日金城寺裡有齊忠曰放汝三十棒師珍重便出忠主席南城命師作監寺一日入方丈忠竪起拂子師便喝忠曰因甚即喝師曰無奈院事甚繁忠遂印之出住桐山上堂拈拄杖曰洪波浩渺白浪滔天珊瑚林裡擁金毛無漏國中懸明月覿面承當得來錯過了也還知麼歲曆已頒新日月無勞更唱太平歌卓拄杖一下下座夔州天元體如燈慧禪師郡之李氏子參慶忠於太平一日聞忠舉香嚴擊竹話師於言下有悟乃啐地曰原來只是恁麼顢頇多少英傑忠曰道甚麼師竪起拳頭忠曰是甚麼師於忠面前𡎺地三下拂袖便出住後上堂若論此事明明現成豈在升堂拋沙撒土為垂示耶但願諸人真實履踐自有入手時節即今還有真實履踐者麼出來與山僧相見僧問濟北宗旨諸家各答不同和尚作麼生師曰不打者鼓笛進曰既為宗師何得如此師便打僧問如何是第一句師曰虗空眉拖地如何是第二句師曰海底角接天如何是第三句師曰崑崙騎象走如何是金剛王寶劍師曰那吒帶血腥如何是踞地獅子師曰狐踪絶跡如何是探竿影草師曰莫作兩樣看如何是一喝不作一喝用師曰金剛與泥人擦背如何是賓中主師曰烏雞石上飛如何是主中賓師曰風吹松韻清如何是主中主師曰空谷石點頭又僧問臨濟賓主與洞山宗旨同別師曰一隊猢猻夜簸錢如何是正中偏師曰青山臥白雲如何是偏中正師曰雪嶺烏龜走如何是正中來師曰月移水底天如何是兼中至師曰寒梅夜發鴛鴦樹如何是兼中到師曰百昌已播舊時春如何是君師曰皇極開天運如何是臣師曰將相貴忠貞如何是君向臣師曰塞外不迎君如何是臣奉君師曰赤心惟報國如何是君臣道合師曰明良喜啓會聚風雲如何是誕生王子師曰九龍方吐水尊貴自天然如何是朝生王子師曰紫禁嵩呼遍端然致太平如何是末生王子師曰聖種賢才各不同如何是化生王子師曰腐草若無心螢光何處是如何是內生王子師曰不見妖梅放還疑上苑香僧再進師喝曰飯袋子好似些水老鴉捕魚囫圇吞囫圇吐何曾得些受用來夫五家宗旨非是教人冊子上記來徒衒虗名須知言句乃救病之良方貴親證親悟師家答處乃應病授藥所謂醫不執方合宜而用豈是局定死蛇頭令人墮坑落塹竪拄杖云三句四喝賓主偏正五位君臣五位王子都在山僧者裡汝還一口吞得下麼韓獹休逐塊獅子慣咬人卓一卓下座巫陽慈祥燈遠禪師本邑人上堂舉南嶽因僧問如鏡鑄像像成後光向甚麼處去嶽曰如大德為童子時相貌何在僧曰祇如像成後為甚麼不鑑照嶽曰雖然不鑑照瞞他一點不得頌曰新月如鈎一線懸白雲淡處露中天相看疑謂寒光薄箇裡誰知一鏡圓天峰燈南禪師忠州雷氏子示衆舉南嶽因馬祖闡化江西遣僧往探之乃命曰待伊上堂時但問作麼生伊道的語記將來僧至馬祖一如教問作麼生祖曰自從胡亂後三十年不少鹽醬僧回舉似嶽嶽然之頌曰知子莫若父當仁不讓師拋戈卸甲後千里暗投機惺徹燈法禪師上堂舉青原參六祖首問當何所務即得不落階級祖曰汝曾作甚麼來原曰聖諦亦不為祖曰落何階級原曰聖諦尚不為何階級之有頌曰金殿苔生劫外春更闌人靜月華明威音那畔絶消息豈著今時麟閣勳天寧燈九禪師讚達磨像曰對御談玄一字無九年冷坐石頭枯親將皮髓平分後那箇男兒不丈夫慶忠燈向禪師示衆舉雲蓋僧乞瓦因緣頌曰當初乞瓦向官人一問曾酬雲蓋僧公案于今重拈出不妨遍地布金磚大川燈濟禪師上堂舉三祖懺罪因緣頌曰風恙纏身已不堪何緣懺罪究根源因知罪性本空故秋水無痕月皎然暉白燈桂禪師舉風幡話頌曰迷悟關頭洵不同廊廡暮夜剎幡風二僧若也知消息推倒長干使化龍四維禪師舉三祖僧璨大師自二祖授法深自韜晦居無常處積十餘年人無知者四祖道信時為沙彌禮祖問曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信于言下大悟頌曰無人覷著歷多年為法深藏氣骨寒孰意沙彌無忌憚妄將一語廣流傳天長禪師南賓冉氏子久事慶忠志修淨業忠囑以偈云根苗奇異逈非同不屬西兮不屬東節候到時馨自若佛生一體有無中師呈偈云佛生一體無彼無此從苗辨地識人因語佳作仁可知禮妙德尼燈鑑禪師舉六祖本來無一物話頌曰本來無物惹塵埃米熟功成獨倩篩衣夜傳三鼓後一花五葉至今開工部熊汝學月崖居士豫章豐城人適懷宗皇帝毀大內銀銅佛俄以事感帝悟命公入蜀採買銅鉛時慶忠住平都法席大震公扣焉先是忠夢一人帳前拜謁傍僧曰是和尚弟子來了詰旦果至忠示以東山水上行話不踰年有悟獻臨濟宗旨頌曰霹靂晴空風舞䃺山門走入燈籠中問豫臨濟之宗旨今日牙疼未與通忠曰著著著又頌曹洞宗旨曰潛行密用及相續曹洞家風玄又玄舌上有機織出錦目前無我寫成篇古人落在今人手今日熱似昨日天要會二師真面目直須抹却五圈圈聚雲老人諱日拈香流水常存今古脈高山不斷去來雲青青巖桂華香遠歲歲秋風雨露痕今日是先師翁忌辰法孫燈紹萬里希遘拈香禮塔無物供養生平善笑聊以為敬阿呵呵且道笑箇甚麼忠問一毬三子是何義士曰三界大師四生慈父曰何不說法士曰說法已久自是和尚不聞曰我若聞非真說法也旁僧曰居士說法竟士指栗蓬忠謂僧曰汝無故架禍於人士呵呵大笑忠頷之為聚雲慶誕前月忌辰將甚去今朝生日自何來火燒不死金剛眼賺煞諸方盡活埋咦我若不是兒孫直教罵得骨出為敘州朱提山朝陽池和尚立石記曰月明老人得法於鐵牛傳大慧心印兀坐朝陽二十餘年待其人而後行聚雲吹萬師翁獨得其宗者繼往開來今有我師鐵壁矣水部尚書熊汝學為老人三傳法子也水木之思勒石垂遠章皇帝命以御史大夫未就隱終南總憲吳天谷保泰燈朗居士順天人撫蜀按涪陵見慶忠隨宜録作書遣使迎忠忠不往公親詣山中問道未久辭忠忠召公公應諾忠良久公於言下領悟回南濵致書於忠曰得侍吾師慶快平生但世緣相迫暫作六月之息居士一呼弟子回首相會時看說箇甚麼一日諭寮屬曰爾等莫謂本院尊大最尊大者和尚耳本院見鐵大師後方知吾孔聖朝聞之道自今以後矢志食素將身許國以酬太祖三百年養士之恩爾等各宜熏修遵崇三寶語罷該屬等稽首再拜泣淚如雨按察文葦菴居士早歲登第夙慕禪學及官按察一日聞衙司喝退堂聲有省拈偈呈忠曰踏著稱錘原是鐵從前錯認定盤星積卷如山休擬議且聽當陽喝一聲長陽侯胡屏山居士讚五祖像曰黃梅路接破頭山遇箇小兒非等閒佛性答來真奇特栽松能不憶他年副戎王一喝居士久參慶忠一日忠上堂云主山高案山低左青龍右白虎年年三百六月月二十五逆數順數數到牛首山雲巖寺大殿裡恰似佛幻三月前鞔的鹿皮鼓公于座下躍然打口鼓忠呵呵大笑公拂袖便出萬松芝禪師法嗣忠州萬松雲巖燈古禪師郡之江氏子少列黌序初參萬松於華嚴三載始剃髮請益於松松示偈曰閃灼電光寒欣然出寶匣曠劫無明根一時都抹殺次二年請充第一座松滅後衆請繼席萬松上堂門門有路金蛇飛電掣戶戶無私鐵馬弄雲騎脫或未然拄杖自有分曉打相佛身充滿於法界普現一切群生前隨緣赴感靡不周靠拄杖曰而恆處此菩提座衆中有超宗出格者麼出來為汝決擇僧才出師便喝僧以具搭肩歸衆師復喝乃曰有問有答氷壺推石輥無問無答雪屋守泥毬答亦問問亦答看看轆轤兩頭大輥出長街童稚歡當家兒子實瀟灑上堂竪拂子云這時節寒凜冽𤟤犬威獼獸掣雪人火裡笑嘻嘻石女低頭拜不歇拜不歇啞人嚼氷稜冷熱向誰說擊拂子云虗空拔楔太煞郎當眼裡添沙全沒交涉佛誕上堂周行目顧指地指天血口無端章成話墮將謂乾土擦壁那曉泥水通身惹得後代兒孫年年燒浴歲歲舌饒愈增葛藤重添垢膩今日為伊拔除不免大家觸忤卓拄杖云還識這杓惡水麼示衆舉永嘉大師云從他謗任他非把火燒天徒自疲我聞恰似飲甘露銷鎔頓入不思議永嘉恁麼道是即是未免推過別人山僧則不然誰為謗誰為非把火燒天也不疲無耳人聞傾甘露昨夜飄梧動地輝示衆行腳學人腳跟點地也未不然先要具一付潔淨肚皮一雙青白眼睛脊梁硬似鐵腳板快如風把自己如糞如泥猶冤猶敵然後遊人間世幻視萬緣把住作主有時崖下一食樹下一宿遇饑寒處變逆千態萬狀不動其心到此方呌做行得腳底人畢竟又看這一番是為著何事須要照管腳跟腳底瞥爾踏破草鞋踢翻土塊始不負行腳一遭至於檀度信施國王水草在在處處一任隨分受用別有一句路上逢人莫道山僧不曾與汝說得示衆出家無別法真實要離親割愛畢竟親如何離愛如何割視骨肉如生冤家謂之離把自己如真仇敵謂之割於是投在法門拜箇師長勿論寒暑勿論勞逸勿論變常勿論順逆服勞奉事左右追隨凡應對灑掃之宜迎賓待客之緒無別巨細都要應酬縱使幹不來做不上莫起厭煩勿生退墮更不可一時離師一日違衆或有時省親事長先期告假刻日就歸日久月親乃師觀其志向察其行履果是法門種草然後教他受戒學佛步步進道自茲至壯至老善始善終此一生算得過百生千生萬德莊嚴亦復如是所謂一子出家九族生天信矣宜矣若漫心法門為清淨向裡許混光陰圖便宜不曉佛為何人法為何物僧為何務師長如何承奉大衆如何酬對有功有施有勞有怨逞血氣弄精魂譬如烏鴉身在虗空心在糞草行是俗行說是俗說混俗和光靡所不至師長不能言善友不敢責日復一日愈趨愈下為僧至此久久自陷泥犁且不得度欲求一子出家九族生天得乎古德云絲毫失度便招黑暗之愆霎頃邪言即犯禁空之醜我爾大衆安肯虗消信施自恣放縱者耶山僧感傷末法不覺吐露至此一衆須知為慶忠老和尚拈香喝一喝曰三歲孩兒弄花鼓又喝一喝曰牛頭沒馬頭回復喝一喝曰不道不道大衆者裡見得滿眼滿耳盡是老人現前底受用縱爾年變月遷亦無增減今日乃我法伯老人三九之期畢竟將甚麼作供以手撫案曰四三一二五木馬逐風舞六七八九十日日大吉利信受奉行可知禮師生平律身以嚴其所說法絶不許人記録見之必火貌古形疏政黃牛之類也忠州聚雲覺樹燈世禪師郡之丘氏子少為書生謁萬松於楞伽得度命入侍寮經年始徹源底自印心後混跡浯江者十有六年康熙丙午慶忠移錫龍昌以聚雲久虗命師主之忠涅槃後師上堂拈香曰今朝初九道是老人二九今朝二九却是初九即今大衆設齊賓也有主也有且道賓主混融時作麼生是供養一句良久曰舌頭原來不離口岫巖燈燎禪師上堂舉婆子燒菴因緣頌曰枯木寒巖異草青凝眸坐却白雲深一朝鐵樹花開遍氷雪紅爐烈焰騰寶峰麗禪師法嗣忠州天寧耳菴燈嵩禪師鄷陵毛氏子始謁慶忠於平山忠命掌記室次參寶峰於熊耳隨請第一座峰滅後出住靈峰上堂百尺竿頭流赤水蟭螟眼淚哭雙疼葫蘆好似東瓜樣畫餅充饑豈是真喝一喝上堂撫掌云三世諸佛歷代祖師盡在山僧手中粉碎去也且作麼生折合又撫掌一下上堂羅漢走出山門土地却歸正殿撞倒我佛頻伽直當王四家大鐵鏆茶話若喚作茶欺三世佛祖不喚作茶背趙州公案舉杯曰畢竟喚作甚麼放杯撫掌三下為巴掌和尚畢九拈香九九八十一古今同此曆吾師無去來分明只者是示衆靈峰北頭南牛欄沒半邊王三布裩破打出大泥團喝一喝云是甚麼掉頭峰上看不見五更天示衆舉道吾云高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人徑山杲祖云徑山即不然高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是舊時人二老今日高低落在靈峰手裡饒他不過各與三十拄杖罰出三門去若有人問汝等但道低聲低聲示衆今朝六月初一諸佛也須忌諱直饒伶俐衲僧最怕當頭一句那一句縱使道得分明恰似東京王矮子屎糞氣師以五宗示五相隨申五頌磊磊落落老神仙一劈華山億萬年大鵬一激三千里傾湫倒嶽不為顛南山起雲北山雨自古長江不繫船一抑揚擡捺事紛紛不及當然一句親滿眼滿耳真消息隨機隨用絶留停岸回驚水急良馬見鞭行果是毗盧真教主何須纍劫更修因從來不向外邊行父子相知有幾人從體起用須知孺子攝用歸體必取老成窄路相逢人不語多時不遇有知音此處不從他處會必須夢裏再還魂深宮不見五雲封夾路桃華滿樹紅粉牆白虎應須辨炭裡烏龜事莫窮仙女却如貧女好野人番令主人同不言不語真君子一腔風月在其中知恩識義人間少反眼無情世上多鐵臉閻羅全不懼嘗將白眼看娑婆撩起便行兮却為真子四野謳歌兮口似懸河一句任從三貫二莫教子過新羅丙申秋偶示疾以衣親炙學侶等託高峰來和尚以續嗣焉未幾跏趺而化闍維得舍利七粒塔於天寧之東提督陳世凱燈靜居士字贊伯湖廣施州衛人弱齡穎異因父迎寶峰說法于熊耳公朝夕參叩峰開示偈語輒記憶不忘一語不愜于懷則端坐究參無晝夜必求惺悟而後已歷官至提督公事之餘恆與緇衲唱酬當時名宿咸禮下之公六十誕普陀遣使以祝公答之以偈曰金剛不壞方為壽舍利光明始見真萬法到頭渾似夢性原了處是長春
