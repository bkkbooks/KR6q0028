body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十二世仰山欽禪師法嗣杭州府西天目山高峰原妙禪師吳江徐氏子母夢僧乘舟投宿而孕才離襁褓即喜趺坐年十五投嘉禾密印寺出家十六剃髮十七受具二十二首謁斷橋倫倫令參生從何來死從何去話於是脅不至席口體俱忘雪巖寓北澗師懷香往謁方問訊即被打出閉却門再往始得親近令看趙州無字巖一日忽問阿誰與你拖箇死尸來聲未絶便打如是者不知其幾會巖赴南明師上雙徑夢中忽憶斷橋室中所舉萬法歸一一歸何處話疑情頓發時值少林忌隨衆諷經次擡頭覩五祖真讚曰百年三萬六千朝反覆元來是者漢驀然打破拖死尸之疑解夏詣南明巖一見便問阿誰與你拖箇死尸到者裡師便喝巖拈棒師把住曰今日打原妙不得巖曰為甚打不得師拂袖便出翌日巖問萬法歸一一歸何處師曰狗䑛熱油鐺巖曰你那裡學得者虗頭來師曰正要和尚疑著巖休去過雪竇見希叟曇曇問那裡來師拋下蒲團曇曰狗子無佛性上座作麼生師曰拋出大家看曇乃自送歸堂及巖挂牌道場開法天寧師皆隨侍一日巖問日間浩浩時作得主麼師曰作得主睡夢中作得主麼師曰作得主正睡著無夢無想無見無聞時主在甚麼處師無語巖囑曰從今日去也不要你學佛學法也不要你窮古窮今但只饑來喫飯困來打眠才覺來却抖擻精神我者一覺主人公畢竟在甚麼處安身立命師遂奮志入龍鬚越五載因同宿僧推枕墮地作聲廓然大徹自謂如泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處德祐丙子春入西天目之師子巖即洞營小室丈許榜曰死關後出住師子院開堂僧問十方同聚會箇箇學無為此是選佛場心空及第歸龐居士恁麼道還有為人處也無師曰有曰畢竟在那一句師曰試從頭問看曰如何是十方同聚會師曰龍蛇混雜凡聖交參曰如何是箇箇學無為師曰口吞佛祖眼蓋乾坤曰如何是選佛場師曰東西十萬南北八千曰如何是心空及第歸師曰動容揚古路不墮悄然機曰恁麼則言言見諦句句朝宗師曰你甚處見得僧喝師曰也是掉棒打月曰此事且止只如西峰今日十方聚會選佛場開畢竟有何祥瑞師曰山河大地萬象森羅情與無情悉皆成佛曰既皆成佛因甚學人不成佛師曰你若成佛爭教大地成佛曰畢竟學人過在甚麼處師曰湘之南潭之北曰還許學人懺悔也無師曰禮拜著僧禮拜師曰師子咬人韓獹逐塊示衆百千諸佛歷代祖師乃至天下老和尚以拂子擊禪牀曰總向者裡墮坑落塹還有跳得出底麼又擊一下曰三生六十劫上堂無邊剎境自他不隔於毫端十世古今始終不離於當念只如山僧每日在張公洞裡橫眠竪睡或歌或咏諸人還知麼諸人每日在選佛場中東行西行或瞋或喜山僧還知麼若也彼此知得不免分身碓搗拔舌犂耕若也彼此不知管取釋迦拱手彌勒歸依因甚如此不見道知之一字衆禍之門上堂萬法歸一一歸何處乃顧視左右便下座上堂盡十方世界是箇盂諸人喫粥喫飯也在裡許屙屎放尿也在裡許行住坐臥乃至一動一靜總在裡許若也識得達磨大師只與你做得箇洗腳奴子若也不識二時粥飯將甚麼喫參結制上堂大限九旬小限七日粗中有細細中有密密密無間纖塵不立正恁麼時銀山鐵壁進則無門退之則失如墮萬丈深坑四面懸崖荊棘切須猛烈英雄直下翻身跳出若還一念遲疑佛亦救你不得此是最上玄門普請大家著力山僧雖則不管閒非越例與諸人通箇消息雪巖忌拈香昔年瞎却我眼今朝穿却你鼻冤冤相報無休莫若克己復禮遂插香以袖掩面作哭聲復以坐具搭左肩上作女人拜曰非惟和光同塵免得相鈍置室中垂語曰大徹底人本脫生死因甚命根不斷佛祖公案只是一箇道理因甚有明與不明大修行人當遵佛行因甚不守毗尼杲日當空無私不照因甚被片雲遮却人人有箇影子寸步不離因甚踏不著盡大地是火坑得何三昧不被燒却元貞乙未十二月初一日黎明升座辭衆曰西峰三十年妄談般若罪犯彌天末後有一句子不敢纍及諸人自領去也衆中還有知落處者麼良久曰毫釐有差天地懸隔辰巳間復說偈曰來不入死關去不出死關鐵蛇鑽入海撞倒須彌山泊然而寂遺命塔全身於死關壽五十八臘四十三衡州府靈雲鐵牛持定禪師太和磻溪王氏子故宋尚書贄九世孫幼清苦剛介有塵外志年三十謁西峰肻菴得聞別傳旨尋依雪巖居槽敝服杜多行一日巖示衆曰兄弟家做工夫若也七晝夜一念無間無箇入處斫取老僧頭做舀屎杓師默領勵精奮發單持正念目不交睫者七日至夜半忽覺山河大地遍界如雪堂堂一身乾坤包不得有頃聞擊木聲豁然開悟遍體汗流旦詣方丈舉似巖巖反覆詰之無少疑遂命為僧一日巖上堂舉亡僧死了燒了向甚麼處去自代曰山河及大地全露法王身師於言下大悟即出衆作禮曰適來和尚舉揚般若驚得法堂前石獅子笑舞不已巖曰試道看師曰劫外春回萬物枯山河大地一塵無法身超出如何舉笑倒西天碧眼胡巖敲卓子曰山河大地一塵無者箇是甚麼師作掀倒勢巖笑曰一彩兩賽一日入室次巖曰親切處道將一句來師曰不道巖曰為甚麼不道師拈起香盒曰者箇不直半文錢巖曰多口漢巖巡堂次師以楮被裹身而臥巖召至方丈厲聲曰我巡堂汝打睡若道得即放過道不得即趂下山師隨口答曰鐵牛無力懶耕田帶索和犁就雪眠大地白銀都蓋覆德山無處下金鞭巖曰好箇鐵牛也因以為號一時行輩靡不推服至元戊子至酃縣桃源山成棲遁意未幾縣尹入山問道執弟子禮遂大唱雪巖之宗大德癸卯正月十五日示寂壽六十四臘二十六全身塔於寺北三十里沙潭其徒別流涇走浙江謁虞文靖公集求師塔銘虞問先有鐵耶先有牛耶涇曰先師親見仰山來虞笑曰吾試為汝模畫之杭州府徑山西白虗谷希陵禪師義烏何氏子年十九剃髮於東陽資壽院秉戒已往雙林謁虗舟遠次依東叟穎於淨慈掌內記石林補處師職侍者一日往叩雪巖於北澗巖舉黃龍見慈明因緣詰之對答吻合巖然之及巖遷大仰乃招師居第一座一日巖問臨濟在黃檗三度喫六十拄杖因甚向大愚肋下築拳師曰鈍置殺人巖便打師拂袖而出至元丙戌巖將示寂撫師肩曰吾以此擔纍汝師曰終不向者裡活埋却未幾巖化去衆隨請師繼席常垂三語以驗來學曰三乘十二分教拈向一邊蝦蟇口裡道將一句來狗子聞哇聲因甚咬破庫堂前露柱獺徑橋吞却集雲峰是第幾機鐵關樞行腳時嘗叩師值冬至小參師舉雲門糊餅因緣關呈四偈以進師問你是誰關曰樞上座師曰從那裡來關曰雲門師曰你是顛是狂關曰和尚眼在甚麼處師便喝關亦喝師揮一拳關進前迎住曰打即且置雲門糊餅意作麼生師奮手掠去關帽關曰錯師連揮數拳關曰拳頭無眼向後遭人檢點在師去關七條踏翻在地攔腰數棒曰教你知我手段關曰屈棒屈棒師高聲喚曰直歲鎖者漢送庫司著歲饑師每食必與衆共一日與客語過夜半饑不自勝侍者請取勺粟為飯師曰不可常住豈住持人得私延祐丙辰行省稟旨迎師主徑山僧問過去心不可得現在心不可得未來心不可得此意如何師曰親不相贈師早年嘗夢遊淨慈羅漢堂至東南隅忽見一尊者指楣梁間詩曰一室寥寥絶頂開數峰如畫碧於苔等閒翻罷貝多葉百衲袈裟自剪裁師初不解及自仰山遷雙徑始驗仰山有貝多葉經徑山有楊岐衣以一出一處皆前定也先是世祖召對說法稱旨賜號佛鑑禪師大德中加賜大圓逮主徑山仁宗加號慧照大辨至治壬戌四月十二日手書囑外護戒飭弟子說偈訣衆示寂於不動軒全身瘞菖蒲田世壽七十六僧臘五十七有瀑巖集及語録行世建昌府能仁天隱牧潛圓至禪師高安姚氏子父兄皆前進士師志慕空宗咸淳甲戌年十九投仰山慧朗芟染服勤數載元元貞間出住能仁二載棄去所著牧潛集有送妙智上人入浙序其略曰昔龍安悅公既首衆於洞山猶以己道為未至更匿其名潛出求之於食飲笑談之間聞素公一言之異則虗己自降踽踽為咨詢禮不以貶名為嫌卒能於立談之頃獲其終身之所欲豈獨雲菴之道恃以不墜使素公不賴悅以見於世世亦不識其為何類人矣蓋名者道之表也古之人有其表則求其實以應之而今之士反以表害實一居其名則崇高之勢傲然不可復屈雖內揆其不慊亦安肻降心以求其所未至耶噫此古今所以異道之所以衰歟云云大德戊戌示寂於廬山世壽四十有三﨟二十有四袁州慈化鐵山瓊禪師十八歲出家首參雪巖於大仰一日室中舉耶吒太子析骨還父析肉還母因緣有省述偈曰一莖草上現瓊樓識破古今閒話頭拈起集雲峰頂月人前拋作百華毬值巖示寂尋謁東巖東問心不是佛智不是道上座作麼生會師曰抱贓呌屈東曰不是心不是佛不是物是甚麼師曰眉間迸出遼天鶻復謁蒙山山請分座上堂冬在月頭賣被買牛冬在月尾賣牛買被卓拄杖者裡無尾無頭中道齊休行也休休坐也休休住也休休臥也休休睡眼豁開五雲現瑞光風霽月無處不周梅綻枯枝古渡頭風前時復暗香浮雖然到此向上一路萬里崖州何以見得靠拄杖休休後示寂塔於觀音閣後瓊嗣澱山異誤列此淨慈倫禪師法嗣台州府瑞巖方山寶禪師一日為衆挂牌入室垂語曰南泉斬却猫兒時如何衆下語皆不契適有一僕在旁曰老鼠做大師曰好一轉語只是不合從你口裡出示無見偈曰道人得得出山來盡把胸襟對我開坦坦平平如鏡面澄澄湛湛絶纖埃忽然得箇轉身句衲捲寒雲便歸去萬八千丈華頂峰一笑裂開鐵面具家山到後絶思惟拗折枯藤拄竹扉糞火堆中消息好芋香便是道香時府絶象鑒禪師舉洞山不安因緣頌曰洞山有路透雲巖絶處教通到者難拄杖頭邊開活眼方知不隔一毫端示衆舉投子問僧連日好雨且道雨從何處來僧無對後閲華嚴經有省頌曰陌路遊人競採芳不知眼底度春光夜來一陳落花雨一百十城流水香府永宗本禪師舉夾山參船子公案頌曰笑中棄却竹林寺將謂華亭有許多窮性命於橈下喪看來成敗自蕭何府竹屋簡禪師舉孚上座聖箭因緣頌曰青絲雙勒玉驄嘶淡白春衫緑帶圍夜半歸來華底月金鞭敲落亂紅飛又曰九重城裡本非遙射折重重箭倍饒忽遇三軍圍繞處分明有路直通霄舉臨濟訪平田公案頌曰目前條路平如砥何不堂堂掉臂行撩撥老婆牛性發赤身挨棒可憐生天童慧禪師法嗣寧波府天童東巖淨日禪師南康都昌廖氏子幼絶葷十五祝髮廬山之香林首參仰山石霜次入浙叩癡絶不契登徑山見無準準深器之後謁西巖慧於天童其提示一秉於準遂密契其旨俾守藏後為開先無文璨第一座繇是譽聞日彰景定中出主圓通繼領東林至元壬辰遷育王未幾歸隱雪竇大德庚子主天童師生宋嘉定辛巳終於元至大戊申將示寂書偈曰天為蓋兮地為函吾奚為乎塔與蓋灰吾骨兮山河言已矢兮勿鑱越二日沐浴端坐而逝就化齒根不壞塔於西巖之清風塢壽八十八臘七十有一無學元禪師法嗣江寧府蔣山月庭忠禪師舉僧問白雲舊歲已去新歲到來如何是不遷義雲曰眉毛在眼上頌曰落葉已隨流水去春風未放百華開青山面目依然在盡日橫陳對落暉舉文殊三處度夏迦葉白椎欲擯因緣頌曰錦衣公子遊春慣白首佳人懊恨多彼富尚嫌千口少自貧無奈一身何舉慈明冬日揭榜示衆話頌曰畫上畫下畫短畫長明明揭露浩浩商量何似京師出大黃育王彌禪師法嗣寧波府育王東生德明禪師甬東劉氏子年十六依仗錫月潭澄剃染首謁希叟曇於雪竇復參頑極彌彌舉文殊是七佛之師因甚出女子定不得罔明因甚出得師曰春色無高下花枝自短長彌器之命掌藏鑰出世育王賜號佛日普光頌船子覆舟公案曰清世悠悠據要津一橈活計重千鈞朱涇路上行人少滄海難同方寸深後示寂瘞洞雲塔壽八十四臘六十七淨慈傳禪師法嗣嘉興府三塔石湖至美禪師金陵畢氏子生而穎粹無經世意出家崇目院宋咸淳年得度受具鋭志遍參如玉㵎瑩雲峰高月坡明皆預其席稱上首最後見無文傳於淨慈師以傳為有道傾心事之盡揭源底元世祖至元丁亥出世吳之雙塔未幾遷禾之三塔不數年凡叢林大觀俱畢備焉既而又被旨住平江之靈巖又遷鄱陽之永福四明之育王至順辛未主淨慈所至孳孳以弘道建立為己任曾弗少懈忽一日召衆囑後事以前三塔東所築幻修菴更名四禪誡以名實相稱者處之端坐至夜半泊然而逝壽七十有四大鑑下第二十三世薦嚴道禪師法嗣台州府瑞巖空室恕中無慍禪師本郡臨海陳氏子從徑山寂照剃落參方首謁靈石於淨慈次參一元靈逾年歸覲照照命居擇木寮後遊四明見太白砥典藏一日偕木菴聰大宗興往台州紫籜謁竺元道擬以無字話問才開口被元一喝師豁然大悟直得通身汗下呈頌曰狗子佛性無春色滿皇都趙州東院裡壁上挂葫蘆元笑曰恁麼會又爭得師拂袖便出繇茲感激間語同參曰此事如人飲水冷暖自知決不在言語文字上我輩若不遇者老漢幾被知解埋沒一生他日設有把茅蓋頭當不忘所自後古鼎銘主徑山招師歸蒙堂日涉玄奧且為學者矜式無何以避兵還四明初出住象山之靈巖次主黃巖之瑞巖時夢堂噩居瑞龍覬師為寂照嗣師曰素志有在不可奪也開堂日拈香曰古人出世拈香酬法乳也今人出世拈香酬世恩也慍上座總不然昔年行腳到紫籜山中參箇老布衲彼亦無法可授我亦無法可受只向無授受中拈出供養前住崑山薦嚴禪寺竺元道和尚不圖報德酬恩只要大家知委僧問如何是瑞巖境師曰風吹不入曰如何是境中人師曰水灑不著曰人境已蒙師指示向上宗乘事若何師曰真不掩僞曰諸法寂滅相因甚舟行岸移雲駛月運師曰好箇消息只恐錯會曰兩重公案師曰海水不生氷問維摩丈室不以日月為明和尚丈室以何為明師曰物見主眼卓竪曰摩竭掩室毗耶杜詞相去多少師曰一坑埋却曰德山入門便棒臨濟入門便喝畢竟明甚麼邊事師曰塞北千人帳江南萬斛船問如何是函蓋乾坤句師曰猛虎口裡活兒曰如何是截斷衆流句師曰金剛手中八楞棒曰如何是隨波逐浪句師曰李白捉月張騫乘槎小參靈巖峭絶到者應難已到者享用安樂未到者竛竮孤露孤露底正好踏步向前享用底直須退步就己所以道事無一向有時拈頭作尾有時拈尾作頭收放縱橫寧存軌則摩竭掩室毗耶杜詞雖曰正令全提要且未臻其極山僧今夜入門之始聚首之初與汝諸人約法三章第一不得起佛見第二不得起法見第三不得道不起佛見法見若也依而行之管取眉毛廝結驀拈拄杖曰明眼漢沒窠臼高高處觀之不足低低處平之有餘卓拄杖曰鐵牛不喫欄邊草直向須彌頂上眠謝專使上堂達磨大師十萬里西來要作箇馳書達信漢及乎面對梁王盡力只道得箇不識拈拄杖曰有賓有主有禮有樂手面分開白月團頂門撼動黃金鐸上堂明月照高巖懸水響前嶺耳目一何清冥然了心境咄哉觀世音擔雪來填井下座上堂祖師意無別法下地走穿却鞋上牀眠脫却襪只恁麼太誵訛不恁麼無合煞溈山水牛百丈野鴨帶水拖泥不足觀腦後圓光最輝赫喝一喝上堂風不來樹不動心不生境不到僧問雲門如何是佛門曰乾屎橛僧問楊岐如何是佛岐曰三腳驢子弄蹄行好大衆向道是龍剛不信果然奪得錦標歸上堂禪和家道我無有不知無有不會忽有問如何是行腳事便口如匾擔病在於何病在多知多解恁麼參學不如三家村裡種田漢有問今歲稼穡如何一一道出如瓶瀉水蓋其無知解故無揀擇故秋氣正寒各自歸堂珍重上堂辭親割愛剃髮染衣入此門來合為何事若也如慚識愧是真出家一出塵俗恩愛家二出三界火宅家三出粗惑煩惱家四出細惑無明家出得四種家始稱衲僧家且道如何是衲僧家撞著冤家惡口小家上堂惟一堅密身一切塵中現拈拄杖曰釋迦老子來也三百六十骨節八萬四千毫竅一一放大光明照徹恆沙國土於其中間若聖若凡有情無情被其光者無不證大涅槃獲大安樂得大受用靠拄杖曰此時若不究根源直待當來問彌勒示衆巖寺春深草樹肥幾回特地啓柴扉行人只在青山外杜宇聲聲喚不歸上堂赤肉團上有一物昭昭靈靈恍恍惚惚隨事變通了無拘束要知來處分明不離舉足下足今時叢林中聞與麼道便道說老婆禪殊不知雲無心而出岫水盈科而或流遇高山而必止至大海而方休拍禪牀一下上堂諸佛出世是第二頭祖師西來是第三首饒你向威音那畔別立生涯百草頭邊全明殺活布袋裡老鴉未知有出身一路在且作麼生是出身一路拈拄杖曰祝融峰頂上露滴萬年枝開山忌拈香未見巖頭口似磉盤既見巖頭眼如木𣔻本然理拄地撐天何勞置問主人翁呼來喚去猶缺惺惺乃插香曰相逢不下馬各自奔前程散忌上堂法不孤起仗境方生今日是開山空照祖師入般涅槃之晨山僧將不可說不可說恆河沙世界作一筵席百億須彌廬山作一碗飯百億香水海作一碗羹聊陳供養正恁麼時且道將此筵席向甚麼處鋪設若向世界上鋪設世界已成筵席若向虗空鋪設虗空又如何鋪設衆中莫有出手措置者麼如無山僧自出手去也竪拂子曰恆河沙世界百億須彌山百億香水海華簇簇錦簇簇總在拂子頭上不寬不隘無缺無餘大衆且道空照祖師還來受供也無受與不受且置你道他即今在甚麼處安身立命擊拂子曰家家門前赫日月太平不用將軍威結夏小參圓覺伽藍人人具足在天同天在地同地自是諸人探頭太過不能搆得故勞釋迦調御曲開方便門立期立限如逼生蛇化龍要汝親證親悟龐公道十方同聚會箇箇學無為此是選佛場心空及第歸好大衆箭不虗發發必中的語不虗發發必全真針眼魚吞却嘉州大象即不問且道可大師三拜得髓還端的也無拍禪牀曰一年春又過臺榭緑陰多上堂相逢不拈出舉意便知有打失雙眼睛留得一張口孤峰頂上呵佛罵祖竅鑿頂門十字街頭掣風掣顛符懸肘後長沙虎子湖狗拈起粗辣藜好與劈脊摟上堂坐深井者不知太虗之寬廣忘偏見者方明至理之圓融與麼說話譬如大地作射垛挽弓所向無不中的衆中忽有人出來道如斯舉唱今古罕聞山僧喚侍者點一碗茶供養他更有出來道如斯舉唱未護全提亦喚侍者點一碗茶供養他且道還有為人處也無良久曰雪壓難推㵎底松風吹不動天邊月室中垂問穩坐家堂主人翁因甚不識掀翻大海摑碎須彌平地上因甚擡腳不起眼光爍破四天下自家眉毛落盡因甚不見一日謝事入松巖巖為秋江湛隱處萬山之巔人跡罕至師唯獨處洪武甲寅夏日本國遣使入貢響師道風奏請師化其國上召至闕師以老病辭上憫而不遣留處天界全室泐延致丈室時宋景濂方在翰林詣師談道是冬奉詔東還甲子門人居頂住鄞之翠山迎師就養四方叩謁者無虗日一日示微疾諄諄勉衆以祖道為重索筆書偈曰七十八年無法可說末後一句露柱饒舌咄書畢端坐而逝時洪武丙寅七月十日也壽七十有八臘五十有九遺命闍維煅骨散木竹間居頂不敢遵乃於唐嶴之原奉骨瘞焉師奉師惟謹常侍寂照立至三鼓不命不敢退杭州府徑山大宗興禪師台州人嘗與恕中木菴三人結伴參方罷遊紫籜纍歷名剎後遷徑山臨終忽嘆曰夫三十婦六齡畢竟偶不成遂坐脫去寧波府天童了堂一禪師至正壬午住台之紫籜次遷天寧天童上堂僧問昔日寶壽開堂三聖橫身相為臨濟住院普化盡力扶持畢竟明甚麼邊事師曰兩頭俱坐斷一劍倚天寒曰與麼則五位君臣齊列下三玄戈甲一時收師曰錯下名言僧喝師曰亂統禪和如麻似粟乃曰拈一莖草作丈六金身將丈六金身作一莖草好大衆不是苦心人不知便下座上堂最初一句末後一機直下搆得燈籠露柱動地放光其或未然竹山今日失利示衆樵歌來疊嶂帆影落汀洲猢猻戴席帽直上樹梢頭七星劍五雲樓毬打人兮人打毬萬事難把玩魚吞水面漚上堂長𭪿鳥芳樹不棲摩斯迦滄溟不入龍泉與鈯斧同鐵利鈍懸殊良驥與駑駘同途遲速有異以拂子畫一畫曰華須連夜發莫待曉風吹小參靈光不昧萬古徽猷智鑑洞明十虗普應時臨亞歲節屆書雲擊動法鼓大衆雲集一一天真一一明妙更說箇甚麼若說有法又被有礙若說無法又被無礙若說不有不無法又被不有不無礙若說不不有不不無法又被不不有不不無礙雲從龍風從虎聖人作而萬物覩日可冷月可熱衆魔不能壞真說以拂子畫一畫曰黃檗樹頭懸蜜果無言童子唱巴歌問文殊與普賢萬法悉同源如何是同源底法師曰胡張三黑李四曰一毛吞巨海於中更何言師曰不勞懸古鏡天曉自雞鳴曰是非不到處還有句也無師曰情知你亂會問名假法假人空法空請師直指師曰曾問幾人來曰無根樹子向甚麼處栽師曰更深猶自可午後更愁人曰只在目前為甚麼再三不覩師曰千年常住一朝僧
