body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十世靈隱嶽禪師法嗣寧波府天童滅翁天目文禮禪師杭臨安阮氏子家天目之麓故號天目六歲携籃隨母採桑俄念携之者誰遂有出家志年十六依真相寺智月剃落往淨慈參混源源舉現成公案放汝三十棒話不契乃謁育王佛照照問恁麼來者那箇是汝主人公師豁然領旨一日照問是風動是幡動者僧如何師曰物見主眼卓竪照曰不是風動不是幡動甚處見祖師師曰揭却腦蓋照喜其俊邁命典書記回杭聽一心三觀於上竺時松源嶽唱道薦福室中問僧不是風動不是幡動擬議即棒出師聞頓忘知解遂往見之獲印可辭去巡禮江淮間祖塔時浙翁琰主蔣山舉師立僧嘉定壬申張約齊請師開法慧雲次遷溫之能仁未幾退歸錢塘之西丘趙節齊微服過訪師與語終日而去翌日奏請師住持淨慈室中每舉南山筀筍東海烏鱡話學者擬議師便打莫有湊泊之者後遷福泉晚居天童上堂法不孤起仗境方生境既不生法從何立龍湫瀉千尺瀑布且不是境鴈峰聳萬丈高寒且不是法明眼衲僧到者裡合作麼生直饒倜儻分明山僧棒折也未放在何故殺人刀活人劍上堂事事無礙青山掩映斜陽外法法無差檻前古木閙群鴉君不見太原孚上座走天涯揚州五更聞畫角吹斷落梅花直至如今未到家冬至上堂黃鍾才起時九數從頭數相將幽谷鶯啼次第雕梁燕語田父祭勾芒叢祠敲社鼓農父狎牛郎村姑教蠶婦光陰老盡世間人冬至寒食一百五宏智忌日上堂夜明簾外寶鑑堂前元無兼帶豈有偏圓正恁麼時畢竟誰居正位古渡無人霜月冷蘆花風靜鷺鷥眠上堂長頸鳥喬林不棲橫飛天外穴鼻牛山田耕了直上峰頭天下衲僧仰望不及何故嘉州打大象上堂投子道迎之不見其首隨之罔眺其後大似徐六擔版天童則不然仰之彌高俯察非遙橫塘宿鷺斜飛起幾隻銀瓶挂樹梢上堂衆生本不曾迷夜闌雞向五更啼諸佛本不曾悟秋清鴈度長空去拍膝一下曰西窗昨夜月華明凉飈已到梧桐樹元宵上堂昨夜摩騰法師遍點蓮燈助佛光明直得善信真人失却光彩太白龍王出來道我從龍種上尊王佛時住此山未聞有者箇消息于是空中打箇閃電變作滿天黑風暴雨還委悉麼我見燈明佛本光瑞如此僧問牛頭未見四祖時如何師曰牛頭曰見後如何師曰牛頭牛頭僧問和尚見佛照時如何師曰石中有玉曰見松源後如何師曰沙裡無油來上座問某甲有狀告投和尚師曰對頭在那裡來曰和尚便是師曰老僧與汝有甚麼冤讐來無語師捉住曰冤家冤家問新到汝名甚麼僧曰智虎師退身作怕勢僧擬議師便歸方丈僧問觀方知彼去去者不至方意旨如何師曰前不搆村後不迭店舉楞嚴諸可還者自然非汝不汝還者非汝而誰頌曰不汝還兮復是誰殘紅流在釣魚磯日斜風定無人掃燕子銜將水際飛師尤𨗉於易乾淳諸儒大闡道學師與之遊直示心法朱晦菴問毋不敬師叉手示之楊慈湖問不欺之力師答以偈曰此力分明在不欺不欺能有幾人知要明象兔全提句看取升階正笏時其曉人類如此師主五剎通不過八九年而投閒於良渚之西丘歲月尤多然群衲參叩無異領衆時也將入寂謂侍者曰誰與我造箇無縫塔者曰請師塔樣師良久曰盡力畫不出遂怡然脫去闍維弟子收舍利并遺骨附葬於應菴塔左壽八十四臘六十八湖州府道場運菴普巖禪師題趙州像贊曰無端提起七斤衫多少禪人著意參盡向青州做窠窟不知春色在江南舉洞山冬夜喫果子公案頌曰洞山玷辱家風首座埋沒自己雙雙繡出鴛鴦寸舌扶持不起鎮江府金山掩室善開禪師上堂舉密菴破沙盆話頌曰法眼拈來早自謾無端錯對破沙盆而今遍界難遮掩殃害叢林子又孫府華藏無礙覺通禪師青苗會上堂破一微塵出大經鳶飛魚躍更分明不將眼看將心看已是重敲火裡氷掩黑豆昧平生直須劫外話豐登繅成白雪桑重緑割盡黃雲稻正青溫州府龍翔石巖希璉禪師潮陽馬氏子上堂舉廣慧璉與楊大年夜話次慧曰祕監曾與甚人道話來公曰某曾問雲巖諒監寺兩箇大蟲相咬時如何諒曰一合相某曰我祇管看未審恁麼道還得麼慧曰者裡則不然公曰請和尚別一轉語慧以手作拽鼻勢曰者畜生更𨁝跳在公於言下脫然無疑遂述偈曰八角磨盤空裡走金毛師子變作狗擬欲將身北斗藏應須合掌南辰後師曰內翰攀南辰倚北斗廣慧轉天關翻地軸寥寥千古許誰知斷絃須是鸞膠續僧問昔日佛照光因宋孝宗宣問釋迦佛入山六年所成何事光曰將謂陛下忘却此意如何師答以頌曰大根大器大熏修瞥轉機輪向上頭萬億斯年惟一佛雪山元不隔龍樓台州府瑞巖少室光睦禪師舉曹山霞因僧侍立次山曰道者可煞熱曰是乃問祇如熱向甚麼處回避山曰向鑊湯爐炭裡回避曰祇如鑊湯爐炭裡又作麼生回避山曰衆苦不能到師頌曰瞎却頂門三隻眼鑊湯爐炭裡優遊若言衆苦不能到端的何曾有地頭題四祖像贊曰破頭峰頂紫雲飛三却天書老翠微滯貨雖然無用處不應分付小孩兒湖州府道場北海悟心禪師舉黃檗在鹽官殿上禮佛時唐宣宗為沙彌問不著佛求不著法求不著僧求長老禮拜當何所求檗曰不著佛求不著法求不著僧求常禮如是事彌曰用禮何為檗便掌彌曰太粗生檗曰者裡是甚麼所在說粗說細隨後又掌頌曰曾施三掌觸君王佛法何曾有寸長粗行沙門封斷際至今無地著慚惶舉唐文宗蛤蜊因緣頌曰合水和泥底事忙被渠點破大乖張雖然契得君王意爭奈全身入鑊湯寧波府雪竇無相範禪師上堂舉趙州道才有是非紛然失心還有答話分也無僧舉似洛浦浦扣齒又舉似雲居居曰何必僧回舉似趙州州曰南方大有人喪身失命僧曰請和尚舉趙州方舉前話僧指旁僧曰者箇師僧喫却飯了作恁麼語話師頌曰坐底見立底立底見坐底咄哉老趙州白日眼見鬼台州府瑞巖雲巢嵒禪師舉經題字話頌曰以字不成八字非當陽拈起大家知釋迦老子舌無骨黃葉將來嚇小兒舉靈雲見桃花話頌曰三月桃花爛熳紅靈雲打失主人翁隨邪逐惡玄沙老半是真情半脫空寧波府雪竇大歇仲謙禪師義烏應氏子幼讀傅大士心王銘矢志出家初參息菴菴器而抑之曰汝儒者習氣不除焉能學道要到大休大歇田地須是如木偶人去師蒙激發益自奮勵一日忽有省遂以大歇自名後依松源嶽嶽室中舉祕魔擎叉話師豁然大悟出住後舉應菴問密菴如何是正法眼密曰破沙盆話頌曰白玉琢成泥彈子黃金鑄就鐵崑崙千年滯貨無人買未免如今纍子孫送維那偈曰興化當年打克賓叢林千載話猶存雲黃有棒且高閣只麼煎茶送出門杭州府淨慈谷源道禪師舉丹霞然初參石頭剗佛殿前草公案頌曰石頭剗草驗英豪懵懂丹霞眼不高若解轉身行活路至今應不纍兒曹蘇州府虎丘蒺藜曇禪師初住四明延慶遷蘇之穹窿震澤普濟鎮江甘露真州長蘆後住虎丘上堂舉僧問香林如何是衲衣下事林曰臘月火燒山師曰兔子何曾離得窠若有人問延慶如何是衲衣下事只對他道就船買得魚偏美踏雪沽來酒倍香上堂念念釋迦出世時時彌勒下生頓超天地未分之前不歷階梯掀翻寶所便恁麼去可以開無量法門可以演百千妙義驀拈拄杖卓一下曰無量法門百千妙義盡向者裡百雜碎了也還知虎丘落處麼靠拄杖曰祖禰不了殃及兒孫舉靈雲見桃花話頌曰三月桃華是處開靈雲雙眼盡塵埃謝郎重整釣鼇手未免將身一處埋諾菴肇禪師舉松源示衆曰明眼衲僧因甚打失鼻孔有賊無贓話頌曰殺人一萬損三千獨弄單提機不全萬頃滄波明月夜一聲短笛釣魚船贊二祖像曰覓心無處自欺謾甘受齊腰深雪寒三拜起來依位立誰知遍界是波瀾華亭懷古活計都盧一釣舟錦鱗入手便抽頭我來不覩師親訓柳岸依依蘸碧流祕監陸游居士字務觀號放翁山陰人嘗謁松源於靈隱問心傳之學可得聞乎源曰既是心傳豈從聞得士點首默契呈偈曰幾度驅車入帝京逢人一例眼雙青今朝始見宗門別說有言無要眼聽臥龍先禪師法嗣杭州府徑山無準師範禪師蜀梓潼雍氏子九歲依陰平山道欽出家紹熙甲寅登具戒明年遊成都坐夏正法請益瞎堂高弟堯首座坐禪法堯曰禪是何物坐底是誰師於是晝夜體究一日如廁有省明年謁佛照于育王照問何處人師曰劍州照曰帶得劍來麼師隨聲便喝照笑曰者烏頭子也亂做久之復至靈隱時破菴居第一座同遊石筍菴菴之道者請益猢猻子捉不住話菴曰用捉他作麼如風吹水自然成紋師侍旁有省未幾破菴掃塔天童師偕往復拉石溪月同遊台鴈至瑞巖雲巢留師分座夜夢偉衣冠者持把茅見授翌日明州清凉專使至師受請入院見所謂伽藍神姓茅衣冠與所夢無異升堂開法一香供破菴焉三年遷焦山次遷雪竇又三年被敕移育王又三年領嵩山少林次補徑山明年寺師不動容經意是冬十月旨下召入內廷上御修政殿引見師奏對詳明上賜金襴僧伽黎復宣詣慈明殿升座說法上垂簾而聽賜佛鑑禪師號三年寺成閲六年復而多助雲至不數年復還舊觀僧問趙州道三十年前在南方行腳火爐頭有箇無賓主話直至如今無人舉著此意如何師曰舌頭拖地曰畢竟如何是無賓主話師曰言滿天下曰祇如玄沙聞得乃曰者老漢腳跟未點地在又作麼生師曰一坑埋却曰可謂焦磚打著連底凍赤眼撞著火柴頭師以拄杖劃一劃上堂五峰門下百種全無禪牀迫窄堂供蕭踈腳下踏著底破磚頭碎瓦片面前撞見底王獦獠李麻胡恁麼薄福住山真箇孤負老胡良久曰雖然如是更點分明上堂一夏已滿無事不辦遂府盂卭州磁碗上堂靈山指月曹溪話月代相傳證龜成鱉範上座尋常一張口挂在壁上今日無端入者行戶未免拈出多年曆日說似諸人且要郭大李二鄧四張三知得江南兩浙春寒秋熱示衆若論箇事直是省要奈何諸人自作艱難自作障礙所以尋常東廊西廊見諸人和南問訊山僧便乃低頭相接其實無他只要諸人識得長老是西川隆慶府人氏若也識得便與諸人打些鄉談說些鄉話如今且未問你識得長老且各自知得自家鄉井也得還知麼明州六縣奉化八鄉淳祐戊申秋築室明月池上榜曰退耕乞老于朝己酉三月旦升堂示衆曰山僧既老且病無力得與諸人東語西話今日勉強出來將從前所說不到底盡情向諸人面前抖擻去也遂起身抖衣曰是多少十八日集兩序區畫後事親書遺表及遺書十數封言笑如平時其徒請遺偈乃執筆疾書曰來時空索索去也赤條條更要問端的天台有石橋移頃而逝停龕二七日奉全身葬於萬年正續之側去寺四十里塔曰圓照杭州府靈隱石田法薰禪師眉山彭氏子生而慧敏年十六從丹稜石龍山法寶院出家二十二剃髮受具戒游方至石霜禮雷遷塔述偈曰一念慈容元不隔何須特地肆乖張平高就下婆心切惱得雷公一夜忙師名由是大著聞穹窿破菴道望遂往依焉菴室中舉世尊拈華迦葉微笑話師曰焦磚打著連底凍赤眼撞著火柴頭菴異之師於是決志依棲與無準日相激礪久乃辭去事遍參靈隱嶽淨慈充華藏演咸稱賞之後出世蘇之高峰次遷寒山會蔣山虗席廟堂以師補之寶慶初遷淨慈端平乙未復遷靈隱上堂一徑直二周遮衲僧會得萬別千差庭前閒縱目春盡尚餘華老鬍不合過流沙拍膝一下便下座上堂大道體寬無易無難相頭買帽此土西天上堂識得心山嶽沉握金成土握土成金腳前腳後現成行貨少室峰前交點不過上堂石中有玉沙裡無油德山臨濟未出常流却憶寒山子時臨古渡頭上堂見聞覺知行住坐臥眨上眉毛早已蹉過赤腳唱山歌路上無人和上堂把定重關諸人性命在山僧手裡放開一線山僧性命在諸人手裡而今也不把定也不放開山僧即是諸人諸人即是山僧三十年後莫道蔣山和泥合水示衆劍刃翻身猶是鈍屋頭問路太無端楚雞不是丹山鳳何必臨風刷羽翰淳祐甲辰三月望示衆但得本莫愁末喚甚麼作本喚甚麼作末松柏千年青不入時人意牡丹一日紅滿城公子醉山僧恁麼道若有不肯底是我同參弟子師俊繪師像求贊有曰末後一句分付廚山衆訝之先是師嘗建接待院於西溪曰寶壽明日忽示疾又明日退歸寶壽趨辦終焉計訣衆而逝窆全身於院後壽七十五臘五十三南康府雲居即菴慈覺禪師西蜀人舉雪峰因閩王問擬欲蓋一所佛殿去時如何峰曰大王何不蓋取一所空王殿王曰請師樣子峰展兩手雲門曰一舉四十九話頌曰空王殿樣子雪峰展兩手添得老韶陽一舉四十九總是面南看北斗讚船子道影曰三十餘年在藥山鬼家活計豈能傳當時不得夾山老你且耐煩撐破船舉僧問葉縣省如何是密用心處縣曰閙市裡輥毬子曰意旨如何縣曰普請大家看話頌曰輥毬閙市大家看一陳清風吹面寒定亂不須雙刃劍活人何必九還丹師嘗遊雲居夜宿瑤田莊夢安樂神告曰師於此山只有一粥之緣明日午後到山晚參罷會旦過有二僧相毆新到例遭擯逐師竊訝之後數年雲居虗席州符起師補處師欣然承命且徵前夢方至瑤田莊未入院而寂焉寧波府大慈獨菴道儔禪師贈製鞋者偈曰透底工夫做已圓須知密處自心傳腳跟著地隨他轉踏到驢年也未穿薦福生禪師法嗣杭州府徑山癡絶道冲禪師武信長江荀氏子以進士業應詔不利遂於梓州妙音院受業游成都講肆習經論紹熙壬子出峽往謁松源嶽于薦福以歲儉不果會曹源生出世妙果師造見聆入門語有省參堂俾侍香朝夕老拳痛棒不少貸平生知見至是絶無影響曹源徙龜峰師侍行又三年以偈辭遊浙有尚餘窮相一雙手要向諸方癢處𭺗之句至浙值松源主靈隱門嚴戶峻八閲月不得入室或以失士告源曰我已八字打開自是他當面錯過師聞徹見曹源嘻笑怒罵皆為人善巧方便嘉定己卯由徑山第一座應嘉禾光孝請香拈曹源是時此菴元覺菴真逢菴原無相範石溪月等皆在會中道聞於朝忠獻衛王以堂帖除蔣山居十有三載嘉熙己亥鼓山來聘未行雪峰牒至領事半年而天童詔下衆集如海兼攝育王住持事上堂天童用底來育王用不著育王用底歸天童用不著雖然如是用不著處用有餘一箭雙鵰隨手落結夏上堂圓覺伽藍塵塵有路坐斷去來頓空今古那裡十三者邊十五後先不差毫髮許堪笑黃面瞿曇至今不知落處上堂有一人一念頓證墮在佛數有一人纍劫闡提不願成佛且道那箇合受人天供養良久曰蝶穿芳徑雙眉溼蜂掠殘華兩股肥上堂盡乾坤大地無絲毫許隔是汝諸人橫擔拄杖繞四天下行腳道我無處不到無事不知且道西天那爛陀寺戒賢論師今日說甚麼法便下座上堂僧問心佛及衆生是三無差別如何是過去心師曰放待冷來看曰如何是現在心師曰你問我答曰如何是未來心師曰後次上堂向你道曰如何是過去佛師曰去年梅曰如何是現在佛師曰今歲柳曰如何是未來佛師曰顏色馨香依舊曰如何是過去差別智師以拂子擊禪牀左邊曰如何是現在差別智師以拂子擊禪牀右邊曰如何是未來差別智師以拂子中間點一點僧曰心佛衆生無向背十方剎海一毫收便禮拜師乃曰過去心不可得現在心不可得未來心不可得三世既不可得喚甚麼作差別智若人見得徹去三世諸佛無一時不在諸人頂𩕳上轉大法輪更來者裡挨肩竝足討甚麼碗下座以拄杖一時打散未幾被旨遷徑山一日忽手書龕記并遺書且曰無準忌在三月十八吾十五行矣不能拈香修供令撾鼓升座辭衆舉世尊臨入涅槃告衆曰汝等善觀吾紫磨金色之身瞻仰取足毋令後悔今日即有明日即無師曰世尊四十九年作盡伎倆及至臨行求生不得求死不得山僧今日要行便行要去便去八臂那吒攔不住至夜分起坐侍者請偈師曰末後一句無可商量只要箇人直下承當移頃而逝壽八十二臘六十一茶毗舍利五色者無數遵遺命奉骨歸葬金陵玉山菴學者分其半塔於菖蒲田玉芝菴天童鏡禪師法嗣寧波府育王寂窗有照禪師福之閩縣鄧氏子從九峰榕菴慧得度時枯禪唱道怡山師往見之禪問自從一見桃花後直至如今更不疑那裡是他不疑處師大笑趨出禪深肯之禪遷靈隱師掌內記已而見大梅石巖虎丘蒺藜鄮峰無準金山大歇皆深契合以母老歸省謁雪峰癡絶留掌記室閩帥請開法東山大乘移福之黃檗時左史竹溪林希逸從師論心法拳拳服膺有老來得友如師少別去伊誰伴我閒之句次補江心後遷玉几朝廷降金帛鼎建舍利寶塔僧問如何是佛師曰八吉祥曰如何是法師曰六殊勝曰如何是僧師曰面目現在上堂六塵不惡還同正覺鴉鳴鴉鴉鵲噪鵲鵲江北江南潮生潮落春風三月花草香善財何處尋樓閣喝上堂如何是道木頭如何是禪碌磚古德與麼垂示十箇五雙恬不為事殊不知正抓著鄮峰癢處何故建造殿宇恰用得著杭州府淨慈清溪沅禪師上堂達磨西來一坐具地被他神光禮了三拜一時占了致令後代兒孫各自分疆列界衲僧家撥草瞻風朝吳暮越南天台北五臺拄杖頭草鞋底還曾踏著也未良久曰踏著即禍事泉州府法石愚谷智禪師山居偈曰栗色伽黎千百結倚松捫腹看雲飛有人問我居山趣向道春深筍蕨肥福州府西禪月潭圓禪師開爐上堂人人盡守甕中天地覆天翻我不然直下一椎星火迸螺江燒却謝郎船府報恩太古先禪師上堂若論此事不涉心思意想非干默照忘懷要得洞然明白須是汗出一回且道汗出後如何驀喚侍者曰將扇子來上堂夜冷清霜重風來寒更多因循時節過自己事如何拍禪牀曰不是知音者如何舉向他上堂衲僧家游方行腳撥草瞻風第一須識路徑始得路徑不錯東西南北到處為家稍涉迂回五里單牌十里雙堠那裡更在那裡擲下拄杖曰看腳下荊州府公安虎溪錫禪師上堂心心淺處實甚深道道幽遠無人到急行踏不著緩行成錯過少林幾坐華木春却憶西來胡達磨紹興府岊翁淳禪師佛誕偈曰毗嵐毒種毒華開添得雲門醉後杯今日柯橋風色惡淡煙疏雨洗黃梅隱靜柔禪師法嗣蘇州府虎丘雙杉元禪師舉宋太宗夜夢神人勸發菩提心凌晨宣廷臣問菩提心作麼生發群臣無對雪竇顯代曰實為今古罕聞別峰印代曰王言如絲其出如綸話頌曰萬里謳歌聖化成條風塊雨樂樵耕不因嵩嶽三呼後無象誰知真太平舉密菴破沙盆話頌曰五陵公子少年時得意春風躍馬蹄不惜黃金為彈子海棠花下打黃鸝書冷泉兩廊畫壁曰一一塵中堅密身改頭換面轉精神誰知東壁打西壁總是靈山會上人
