body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第三十一世荊門瑞禪師法嗣德安府隨州關子嶺龍泉無聞絶學明聰禪師邵武奚氏子母吳十七出家二十受具習止觀唯識論一日有宿衲相詰曰大通智勝佛十劫坐道場佛法不現前不得成佛道其意如何師依文而答宿譏訶之師從此疑情頓發坐臥不安經六載一日聞馬嘶大悟遂往見天奇奇可之住後上堂僧問雲門如何是一代時教門曰對一說龍泉則不然若有問如何是一代時教劈脊便打曰合取狗口僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也問今朝四月八日天下叢林皆慶如來聖誕未審如來何處降生師於几畫圓相示之笑巖寶侍師圍爐次師曰人人有箇本來父母子之父母今在何處巖曰一火焚之師曰恁麼則子無父母耶巖曰有則有佛眼覷不見師曰子還見不巖曰不見師曰為甚不見巖曰若見即非真父母師曰善哉巖復以偈呈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明呈似師師遂付以偈曰汝心即吾心吾心本無心無心同佛心佛心非吾心復囑曰汝當護持緣熟智愚皆度後示微疾訣衆說偈趺坐而逝全身塔於寺右漢陽府古巖禪師中年雙目失明笑巖參師問何所來巖曰親從關子嶺來師曰無聞老兄好麼巖曰好師曰如何見得好巖曰老來康健師曰爭見得康健巖曰著衣喫飯坐臥經行師曰與麼則不出常情巖曰要且常情莫測師仰面大笑翌日巖入室師曰嶺頭老兄先師嘗許他悟處見骨只是太朴無博學巖曰和尚博學乎師曰老僧亦非博學巖曰恁麼則一同也師曰亦有不同處巖曰如何是不同處師曰他有眼我無眼巖曰和尚若無眼爭得見渠無博學師又大笑囑曰子器非凡深根固蒂廣作利益非汝而誰惜吾衰老不及見矣巖拜謝而去河南府嵩縣伏牛濟菴大休實禪師新鄭李氏子幼投寶珠受業年二十訪老宿古心心示萬法歸一一歸何處話令參尋入火場打三有省述偈曰法身本無相法相本來空會得者消息處處顯家風後往謁天奇途遇天真月印二禪客同至關子嶺奇問你三人一路麼師曰雖然一路來處不同奇曰如何是你本來面目師便珍重奇曰未在更道師便喝奇曰父母未生前喝箇甚麼師無語而出自後數呈伎倆奇皆不諾一日侍奇於承天奇問藏身處沒蹤蹟沒蹤蹟處莫藏身你作麼生會師曰當堂不正坐那赴兩頭機奇為助喜住後升座須彌作舞海水騰波龍象交參人天共聚大地山河同宣妙句三賢十聖共證菩提眉藏寶劍起寒光袖隱金鎚行正令明殺活顯全機舉拂子曰還有明眼衲僧不顧危亡向前一肩擔荷得麼便下座笑巖參問如何是祖師西來意師竪起拂子巖曰此外更有指示也無師擲下拂子巖便禮拜復敘及參關子嶺話師曰怪道親見作家來巖便喝少頃師又問無聞別來四十年未知近日鼻孔如何巖曰與和尚鼻孔一般師曰上座還見老僧鼻孔麼巖曰見師曰向甚麼處見巖曰兩眼下口門上師曰有祕密句曾向上座道麼巖曰曾道師曰試舉看巖曰合取臭口師拈拂子巖便拂袖而出天池素禪師法嗣襄陽府大覺圓禪師漢川人儀貌豐碩聲如洪鐘參靜菴默有所契菴付以偈曰一枝正法眼列祖傳來付汝待時至馨香遍九垓師受囑後隱居襄西笑巖爽菴來求依侍師曰上座錯了也老䂐平生溫飽自適別無所長爽曰某等生死事大語未竟師約而笑曰老䂐亦有生死何獨爾有爽曰某恨晚進多無恆志和尚豈拒人哉師曰出家兒本自無事爾何無事生事少間曰粥飯自辦始得一日室中舉外道問佛不問有言不問無言世尊良久外道大悟語曰問既不涉有無良久亦是閒名正恁麼時外道悟箇甚麼巖擬進語師遽以手掩其口曰猶挂脣齒在巖乃釋然曰可謂東土衲僧不及西天外道占偈曰自笑當年畫模則幾番紅了幾番黑如今謝主老還鄉那管平生得未得師稱賞之後無疾而化世壽七十三僧臘五十三天寧濟禪師法嗣嘉興府胥山雲谷法會禪師嘉善懷氏子投大雲寺芟染時法舟掩室天寧師往參舟示以念佛是誰話一日齊次食器墜地豁然有省於是入天界韜晦三年復菴棲霞千佛嶺下又移天開巖弔影如初凡客見無論貴賤皆問以日用事略敘寒溫必展蒲團令坐返觀終日無雜話別時必叮嚀曰人命無常莫空過日再見必問別後用心如何以故歸向者日多僧問如何是祖師西來意師曰有水皆含月無山不帶雲曰莫更有奇特處麼師曰切忌喚龜作鱉問如何是吾人直捷用心處師曰舉不顧即差誤擬思量何劫悟居常不設臥具晝夜危坐四十餘年如一日萬曆乙亥正月五日示寂壽七十五臘五十六塔於大雲寺右嘉興府精嚴東溪方澤禪師嘉善任氏子首謁天寧法舟舟一日室中舉龍潭見天皇悟至何處不是指示汝心要話師言下有省後獲印可解制秉拂佛法雖遍一切世間而未嘗有絲毫透漏你作麼生結雖無絲毫透漏亦未嘗有絲毫囊藏你又作麼生解故知百丈曲引初機為此方便之辭其實莫能結莫能解也設使有箇孟八郎漢出來道我能向百丈結不得處一結結斷直使天下衲僧忘前失後求出無門亦能向百丈解不得處一解解開直使天下衲僧七縱八橫自由自在却甚奇特諸上座彼既丈夫我何不爾良久擊拂子一下曰吽天池聚禪師法嗣紹興府浮峰普恩上座山陰金氏子年十歲往從延福鑑湖受業至十九忽念生死事大奮志尋師初至大慈叩首座無際際示以心生則種種法生之語師當下有所契入呈偈曰返本還源便到家亦無玄妙可稱誇湛然一片真如性迷失皆因一念差復見法舟於天寧呈所見舟可之又謁萬松林於烏石峰松問何來師曰天寧松曰有何言句師舉前話松曰不是不是師曰天寧道是和尚如何道不是松曰天寧則是我則不是師疑不決後參玉芝復舉前話芝曰是與不是未出常情二俱喫棒有分師曰如何是出常情句芝與一掌師當下豁然平昔礙膺一時融釋芝曰汝既如是當善護持復以偈囑曰莫向支流辨濁清是非盡處出常情鐵鞭擊碎珊瑚月會看東山水上行東塔曉禪師法嗣嘉興府敬畏無趣如空禪師本郡秀水施氏子生弘治辛亥十月十八幼慕宗乘留心體究同法舟濟參訪數載後見野翁徹法源底啓關示衆自結玄關自活埋自吾閉也自吾開一拳打破玄關竅放出從前者漢來元宵示衆畫角聲中薦得觀音未是作家彩燈影裡捉得室利謾誇好手恁麼告報與諸人未免笑破虗空口諸人若也未瞥然再看鼇山顛倒走參小參衆立定師喝一喝曰禍出私門便歸方丈示衆言前薦得已天涯句下承當路轉賒一擊鐵圍如粉碎海天空濶鴈行斜除夕小參時窮何似日窮好日若窮來歲亦然三十六旬窮過了東村王老夜燒錢老漢雖無一物也要應箇時節因緣乃拈拄杖曰只者箇無窮無盡歷劫經年今夜隨時送去免教涉蔓相牽擲下拄杖曰歷劫得來今斷送拍雙空手接新年示衆佛是衆生屋裡了事人衆生是佛屋裡不了事漢誠能以佛與衆生一時放却則了與不了並為剩語卓拄杖曰但於事上通無事見色聞聲不用聾端陽示衆佳節端陽何曾訂約五月五日年年撞著風搖蒲劍碧楞楞日照榴華紅灼灼道在時節因緣豈論正法末法向來著意馳求通身是草今日信手拈來無不是藥竪拂子曰大衆且道此藥治甚麼人的病擊拂子曰不但老維摩藥王藥上也須一劑示衆豁開頂門眼照徹大千界既作法中王於法得自在便下座一日湖邊步月謂一僧曰明月與清風水天同一色人人在此中只是出不得僧曰打草驚蛇作麼師曰上座又作麼生曰看腳下師大笑曰將謂胡鬚赤更有赤鬚胡萬曆己卯仲冬謂門人性冲曰來歲仲秋十五六間吾行矣子宜知之庚辰八月十六日沖如斯而至師集衆說偈曰生來死去空華死去生來一夢皮囊付與丙丁公白骨斷橋隨衆阿呵呵明月清風吟弄語畢端坐而逝世壽九十石門海禪師法嗣德安府隨州七尖峰大休宗隆禪師青州益都賈氏子依郡之石佛剃髮後寓成都北寺為典座一日出街挑水忘所行忽頭撞壁有省衝口成偈曰大地山河體性空那分行走與西東偶然撞著無私句萬水千山總一同因就河南乾明寺無盡室中呈所得無盡乃印以偈曰道高不假修德重事理周一枝正法眼付與隆大休住後垂三關語以示學者一曰吹毛寶劍被石人持去挂在萬仞峰頭四壁無路如何取得二曰有一如意珠被木人擎來拋向大海波中不假舟航如何覓得三曰盡大地是箇火坑燒却了也惟有一莖眉毛在未審是何人見得在菜園次僧問如何是西來意師指菜曰黃瓜茄子僧不契下山見一尊宿宿曰你從何處來僧曰尖峰來曰大休有何言句僧舉前話尊宿合掌曰真大慈悲嘉靖壬寅十一月八日集衆書偈曰三際握來為拄杖十方原是舊袈裟泥牛石虎知消息踏破虗空便到家置筆端坐而逝華山定禪師法嗣廣信府鵝湖養菴廣心禪師字無它上饒鄭氏子偶過戚屬會道者談四生義遂了物我平等大意萬曆乙亥從洛太平寺剃染南還至焦山度臘聞江中推船聲有省述偈曰夜靜江空濶船推㘞㘞聲不知何所往擔子半邊輕次走見華山山拈一段生緣六不收話有疑猛提七日始得身心脫然歸里住靈山中臺除夕覩閩山野火始大悟嘗畫大圓相於壁曰內寫莫教塗黑外寫勿使傷白若能向圈裡圈外下得注腳許你學道無疑後遷鵝湖己亥以無異典元座室廊嘗置無門鎖以驗方來鎖旁書偈曰上古留傳鎖憑君智鑰開若無開鎖法相見不須來僧問嘗聞明心見性未審性作麼生見師曰今日有客忙不暇向汝道客去僧仍理前問師曰適來對客見麼曰見師曰向汝道不暇還在此作麼問打破虗空時如何師舉手約退曰走開走開僧走師曰可惜許癸丑說法建陽東山董巖天啓丁卯三月朔示微疾至二十八丑刻召衆至說偈曰八十餘年幻夢中鐵牛耕破太虗空臨行一句相分付半夜金烏帶日紅偈畢端坐而逝壽八十一臘五十三塔唐帽山斗峰琴禪師法嗣建寧府斗峰天真道覺禪師本郡建安張氏子看萬法歸一一歸何處話有省占偈曰一手拍兮一手鼓無位真人越格舞口中唱出無腔歌三千諸佛同一母往見古音音賞之旋囑以大事大方寬禪師法嗣河南府伏牛無礙明理禪師汾州和氏子參松竹大方隨衆打七有一聲虗空碎獨露法中王之句後同月菴大圓入終南一日菴舉高峰銀山鐵壁話師頓悟述偈曰一覺心空疑便消拈來放去自逍遙云云過謁大方方曰伏牛打七即不問終南靜室意如何師曰伏牛打七泥團土塊終南靜室放大光明方震威一喝曰即今光明何在師向前一掌方呵呵大笑曰如是如是大鑑下第三十二世龍泉聰禪師法嗣順天府善果月心笑巖德寶禪師金臺吳氏子生正德壬申臘月望日弱冠聽講華嚴至十地品不覺身心廓然歎曰千古同一幻夢耳遂決志出家從廣惠能祝髮明年受具雖深信知有不肯自休遍謁大川月舟古春古䂐諸老後至關子嶺參無聞問十聖三賢已全聖智如何道不明斯旨聞乃厲聲曰十聖三賢汝已知如何是斯旨速道速道師連下數語皆不契遂發憤寢食俱廢一日携籃臨㵎洗菜忽一菜葉墮水旋轉捉不住因有省提籃喜躍而歸聞立簷下問是甚麼師曰一籃菜聞曰何不別道師曰請和尚別問來至晚入室聞舉玄沙敢保老兄未徹話師曰賊入空室聞曰者則公案不得草草師喝一喝拂袖便出未幾復往見濟菴古巖大覺輩諸老皆器重之再參無聞乃授記莂復親炙年餘辭去回翔湘漢間後抵金陵寓淨海牛首高座等處數載還里居圓通次遷南寺鹿苑慈光善果諸剎端陽上堂大慧道今朝又是五月五大鬼拍手小鬼舞驀然撞著桃符神兩手槌胸呌冤苦大慧老漢大似少箇禁方向青天白日見神見鬼笑巖則不然今朝正是五月五雲從龍兮風從虎山僧要與現前諸大聖凡賭箇賭信手拈來百草頭甜者甜兮苦者苦拈拄杖曰驀然突出者一條穿過從上諸佛祖是你現前諸人百樣俱有為甚麼只少者一條忽有箇見義勇為底憤憤地向前道和尚且莫壓良為賤若論者一條敢道人人不缺分毫乃擲下拄杖曰汝宛不知何妨尖上更加尖堆上重添土上堂男兒固奮衝天志莫若從頭放下來直把髑髏枯死盡仍教死眼豁然開上堂舉南嶽一日遣僧去探馬祖且囑曰待渠上堂時便出問作麼生看渠有何言句可記將來僧往一如所教馬祖曰自從胡亂後三十年不少鹽醬僧回舉似嶽嶽深肯之師曰馬大師三十年不少鹽醬方可聚徒說法山僧者裡三十年不曾見箇鹽醬汝等在者裡討甚麼碗以拄杖一時趂散上堂當門一隻箭來者看方便擬通問如何穿過髑髏面僧參問從上千七百老凍儂某甲今日一串穿來獻與和尚伏請判斷時門外忽犬吠師遽顧侍者曰看是甚麼客來侍者出問話僧罔措師曰上座適才問甚麼僧擬重舉師與連棒打出一日有二尼參禮拜起左右各立師曰女子如來前入定有錢不解使臺山婆子驀直去解使却無錢你道者兩箇老婆禪如何得恰好去尼左者走過右邊右者走過左邊合掌相向各噓一聲師曰與麼非但解老婆禪更會鼓粥飯氣尼曰和尚惜取眉毛好師曰山僧眉毛且置周金剛買油餈點心食到口邊被婆子奪却劉鐵磨請溈山往臺山大會齊溈山不赴等是者箇時節你道為甚麼取舍不同二尼作禮曰某等若不來禮拜和尚爭得見古人神通大用師曰好各與三十棒恰值拄杖不在且歸茶堂喫茶僧問如何是文殊普見三昧師曰死人眼曰如何是觀音普聞三昧師曰死人耳曰如何是一言道盡底句師曰死人口一僧請益現世為人輕賤是人先世罪業應墮惡道話師曰汝有疑否曰有疑師曰有疑則為人輕賤無疑則應墮惡道僧沉吟師曰會麼曰不會師曰把出你不會底來看曰不會教某甲把出箇甚麼師曰汝之罪業劃然消矣僧禮謝而去問玄沙不出嶺保壽不渡河落第幾機師曰總落第二機曰如何是第一機師曰玄沙不出嶺保壽不渡河曰畢竟得箇甚麼師曰灼然畢竟得箇甚麼問祖意教意是同是別師曰柳影橫塘魚上樹槐陰地馬登枝僧曰與麼則形影兩分曲直自顯去也師曰未曾飽食廬陵米徒把蒲團認作天僧參問承聞諸佛出世為一大事因緣如何是大事因緣師曰著衣喫飯屙屎放尿僧不肻不拜而出師喚回示以偈曰諸佛出於世唯為大因緣屙屎竝放尿饑餐困打眠目前緊急事人只欲上天談玄共說妙遭罪復輸錢僧慚惶作禮而去有兩官人遊山入門哦曰茂松修竹回顧見師便問如何是道人家風師曰茂松修竹曰有何旨趣師曰自家觀不足留與客來看有士人閲師淨土偈乃問佛說是經則有六方諸佛出廣長舌相作證吾師說偈有何人證師曰居士舌頭亦不短又問何為不思議功德師曰前街人喚犬後巷罵猫兒又問老師今年高壽師曰論年不見箇葷腥作麼不槁瘦了僧問處處入法界念念見遮那如何是遮那師曰淨地不須屙舉趙州問投子大死底人却活時如何子曰不許夜行投明須到話頌曰三十六物都灰燼只遺一雙枯眼睛置向九衢深夜後無光明處作光明舉世尊拈華公案頌曰師資妙契芥投針似海如何無處尋石火光中曾著眼始知佛祖不傳心舉經題字頌曰黑白未分已墮偏那堪擬議費鑽研西乾此土諸賢聖鼻孔撩天總被穿示座主荷鉏到處費工夫三兩文錢足可圖鉏得他家田地淨自家田地盡荒蕪示僧法中幽趣眼中翳向上玄機境上塵黑漆桶邊篐子斷太平國內自由人靜坐寒巖此病難男兒爭肻自相瞞轉身一步無多子始信塵含法界寬室中垂語曰佛未出世祖未西來元無佛法世法之名迥出黑山鬼窟一句作麼生道又佛既出世祖已西來佛法世法相為建立不犯化門道將一句來又佛生凡聖對待之門世法佛法名言強立總拈過一邊衲僧本分一句試道將來又尋常間語言問答甚平易甚不思議剛被人問箇如何是汝本有底佛性為甚麼却反眼竪口啞又既為佛子志階佛地因甚一箇佛字最不喜聞晚年退居京城柳巷於萬曆辛巳正月十六日示寂奉全身塔於小西門外世壽七十僧臘四十八漢陽巖禪師法嗣九江府廬山大安禪師襄陽郝氏子幼禮古宗祝髮於梅林宗與古巖同出天奇之門而巖居終南龍象景附宗因使師就巖參學焉師至一語投機輒授衣後栖廬嶽三十年道風藹著楚人事之尤謹新都汪伯玉嘗從師質疑多有開發萬曆己卯五月朔說偈示寂弟子就廬傍築浮屠以藏舍利世壽七十有三僧臘五十有石州洪禪師法嗣太原府五臺山龍樹菴寶應禪師一日晨興覩明星有省述偈曰日出東山月沉西嶂昨日今朝曾無兩樣太原府五臺山楚峰禪師居怭魔巖十餘載木食㵎飲人不堪其憂師恬如也一日聞火𪹼聲大悟占偈曰眼睛突出死柴頭赫赫神光照四洲觸處現成人不委幾回春去又逢秋玉堂和尚僧問如何是道師曰看腳下曰如何行履師曰驀直去敬畏空禪師法嗣蘇州府車溪無幻古湛性沖禪師秀水張氏子初見無趣遂有所契尋棄家從趣芟染趣一日舉徑山三玄三要頌徹骨徹髓道一句三玄三要絶遮護之句問曰此二句中山僧欲取一句為法你道取那一句好師曰和尚適才問那一句趣瞋目叱曰得恁無記性師曰祇為和尚徹骨徹髓趣曰不然為汝一人即得爭奈大衆何師曰取即不辭孤負先聖喪我後人趣頷之師在徑山集無趣語録一日歸覲趣曰一向作得些甚麼事師曰某甲買得一段田收得原本契書特請和尚僉押即將集本呈上趣接得展看曰者是我底你底聻師曰和尚不得攙行奪市趣便將集本擲下師便趨出少頃呈偈趣曰者是你作底麼師曰某甲不解鼓粥飯氣若謂有所作孤負和尚不少趣點首住後示衆大道無向背至理絶言詮迥出三乘高超十地萬法不到處特地光輝生佛未分時靈源獨耀不落見聞不隨聲色直下無一絲毫頭遍界全彰奇特事直饒棒頭取證喝下承當猶是曲為今時更或光境俱忘契心平等究竟亦非的旨所以道向上一路千聖不傳學者勞形如猿捉影到者裡絶行絶解絶照絶用絶理絶事若倚天長劍凜凜神威如鐵牛之機羅籠不住今日明眼人前不敢囊藏被蓋八字打開去也拈拂子曰諸上座還委悉麼耀古騰今只者是大千沙界一閒身示衆孤峰頂上濶步大千十存街頭知音少遇不禮維摩詰不尊傅大士良久曰出頭天外看誰是箇般人示衆大道體寬長空絶跡按下雲頭別通消息同生同死風行草偃且道把住為人好放行為人好良久曰乾坤一合地胡餅日月兩輪天氣毬示衆明明百草頭明明祖師意笑殺老龐公至今猶瞌睡魯祖見人便面壁不解寒溫祕魔走到便擎叉全無禮義南山鱉鼻不若死鰌西院鑷刀渾如鈍鋸且道大悲如何為人輪王總未拋三寸遍界先聞刀斧聲示衆三界唯心萬法唯識卓拄杖曰昨宵時雨滴空階一片緑苔俱打濕浴佛上堂毗藍園裡曾呈醜古佛堂前又露形不是日光三昧力如何洗得你身清大衆釋迦老子今日誕生未審此時還曾落地也未一僧出曰落地了也師曰你見甚麼人說僧無語師曰杓卜聽虗聲僧問清虗之理畢竟無身時如何師曰道者合如是曰向上更有事也無師曰雪隱鷺鷥飛始見柳藏鸚鵡語方知問和尚百年後向甚麼處去師曰千株松下百草頭邊燒火次僧問如何是自性天真佛師曰與我般一束柴來僧肩柴至又問師曰者奴子好惡也不識便打問如何是最上一乘師曰藤穿篾縛曰意旨如何師曰三十年後僧參師問何處來曰廬山師曰古人道不向廬山尋落處象王鼻孔漫撩天如何是廬山落處曰請和尚尊重師便低頭休去火炮偈團圞無縫罅綿密不通風一點無明發分身剎土中示人動口全拋一片心擬思量處不知音百千年外看家話倒腹傾腸說與君起念求心心即念頓然無念念無心九重之內常為主徹古該今不動尊盡心竭力作工夫內外推尋實總無正恁麼時無計可忽聞村內一聲鴣即心即佛隔皮言非佛非心亦是權端的要知真實處直須吐盡野狐涎師菴居二十餘載萬曆庚戌受徑山請不數月疾作仍返車溪辛亥冬示寂茶毗塔於徑山世壽七十二僧臘三十鵝湖心禪師法嗣廣信府弋陽皓山慧濟次齊智季禪師饒州樂邑程氏子生萬曆戊子十一月三日産地無聲至月滿始啼年二十五染病甚苦有禪者告以生死不明其苦過上遂決志出俗投雲谷喜祝髮二十七參鵝湖心看念佛是誰話有省一日湖舉二鼠侵藤話師問枯藤斷了向甚處安身立命湖隨將熱茶劈面一潑師豁然大悟遂承付囑崇禎甲申開創皓山順治己丑遷峰頂丁酉衆請就皓山開堂結制上堂今朝結起布袋口七七從來四十九假若離斯擬別求昧却衣珠向外走喝一喝曰是野干鳴是獅子吼上堂佛法從來本現成吾人日用實相應只因不剔雙眉起大地純金不識金上堂拈拄杖曰者箇喚作拄杖即觸不喚作拄杖即背且道喚作甚麼卓一下曰點開千聖眼超出萬機先僧問如何是溈仰宗師曰深藏不肻露父子慎風規如何是臨濟宗師曰棒下無生忍臨機不見師如何是曹洞宗師曰金針穿玉線繡出錦鴛鴦如何是雲門宗師曰孤標高迥出佛祖類難齊如何是法眼宗師曰白雲歸碧岫紅日照青山問向上宗乘請師拈出師曰風吹牌子動
