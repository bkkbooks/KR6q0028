body:
  text: 南海普陀嗣祖沙門西蜀性統編集曹洞宗大鑑下第二十八世香嚴材禪師法嗣南陽府萬安松庭子嚴禪師河南之古緱氏縣樊氏子幼多病父母許以從釋十八秉具博通內外典凡詩文辭賦皆不學而能初參江月照息菴讓皆有所發次參淳䂐呈所解䂐曰子不聞蠱毒之家水莫嘗邪師曰也須吞得入吐得出始見好肚皮䂐曰蒼天中更添冤苦師曰却謝和尚記莂復以寶鏡三昧反覆徵辨豁然無疑䂐遂以大事囑之有五乳峰前獅子子光前耀後自超群之句適萬安虗席延師開法瓣香為香嚴拈出也次遷鄭州普照又遷大都天寧後退居浙之杭州雲福次領西京天慶洪武己酉主少室僧問地藏栽田博飰與和尚是同是別師曰闌干雖共倚山色不同觀曰百丈開田説大義但展兩手意旨如何師曰一般無語處誰識聲如雷問和尚升座人天駢集秦封槐為甚不來聽法師曰闍黎聽他説法有分其對機直截類是上堂瞿曇道唯一堅密身一切塵中現山河大地鵲噪鴉鳴折旋俯仰展開單豈不是一切塵諸人還見堅密身麼良久曰若教頻下淚滄海也須乾上堂今朝二月半百花開爛熳透過祖師關一一從頭判即心即佛狐狸戀窟非心非佛抱贓呌屈不是心不是佛不是物一船明月一竿竹釣盡五湖歸去來上堂作麼作麼夜叉呈獸面如是如是小兒誑閻羅恁麼中不恁麼靈龜曳尾不恁麼中却恁麼癩獺下深潭丈夫漢向者裡一躍躍翻上無衝天之計下無入地之謀不説常光現前自然壁立萬仞三世諸佛是甚豚沸碗鳴聲一大藏教盡是拭瘡疣故紙天下老和尚盡是奴兒婢子且道普照到者裡合作麼生良久曰將此深心奉塵剎是則名為報佛恩上堂大道無難言端語端倚門傍戶者食人涎唾丹霄獨步者宇宙宏寬寒鴉棲古木白鷺立沙灘紅蓼映寒水蘆花雪滿天傅大士忘却門槌拍版寶志公失却鏡尺剪刀拍手仰天開口笑鴈行斜處桂輪高上堂萬壑春歸緑陰遍野榴花吐火鶯囀喬林安排不得處却自現成著意追求時還成錯過所以道大道體寬無易無難小見狐疑轉急轉遲如是則放得下時無一事擬思量處隔千山大衆祇如不擬議不思量又作麼生一枕夢回新雨後數峰高插暮天寒上堂拈拄杖曰竪去橫來該天括地頂𩕳上一向壁立無古無今腳跟下不露絲毫絶凡絶聖不是心不是佛不是物漆桶放光非風動非幡動非心動野狐吐氣直饒聞佛掩耳聞法嗽口掀倒禪牀驀面便唾也是鸕語鶴總不恁麼未免尊體無頓處無頓處有來由寒風才凜冽花發舊枝頭卓拄杖下座壬戌冬周王殿下請師説法薦國母慈孝皇后賜僧伽黎旌異甚至年七十乃作退休計河南府登封嵩山竹菴子忍禪師鄧州內鄉王氏子上堂舉法鐙欽開堂曰法鐙本欲棲藏巖竇養䂐過時奈緣先師有未了底公案出來與他了却僧遽問如何是先師未了底公案鐙便打曰祖禰不了殃及兒孫曰過在甚麼處鐙曰過在我殃及你天童覺曰者僧若是箇漢出來便與掀倒禪牀不惟自己有出身之路亦免見祖禰不了殃及兒孫師曰山僧則不然今日若有問如何是不了底公案拈拄杖便打曰獅子咬人韓獹逐塊佛巖稔禪師上堂英雄識英雄豪傑喜豪傑山僧非二者一生友難結獨有七尺藤相憐還相悅夜來忽反目要椎我腰折諸兄弟你道他為何如此謂我太把達磨心髓為人都漏泄河南府登封華嚴遇禪師上堂説到不如行到行到不如忘套且道作麼生始得忘套去乃靠却拄杖曰白雲不約來青嶂緑水無心弄碧蟾古蔡元禪師小參今夜不答話僧出師曰討棒喫的漢有甚了期僧曰何不便棒師曰賊是小人拽拄杖便歸方丈空相圭禪師法嗣河南府天寧壽禪師上堂驢事未了馬事到來忙忙大地誰是放懷阿呵呵歸去來無根樹子清風起不待春回花自開天慶讓禪師法嗣河南府陝州熊耳山嵩溪子定禪師偃師馬氏子七歲禮古巖祝髮巖化往參息菴讓讓命典藏鑰因白事次言下豁然大悟出住熊耳有年其入室勘辨凜凜然若秋霜烈日隨機應對則又如盤走珠小參宗門中事號曰單傳一心之外更無餘法只為你好在言句裡著倒甘在道理坑埋殺於一心法轉增迷悶所以祖師西來特為你打翻舊日窠臼闢開別樣乾坤非是好奇立異祇是見病與藥要人平復如故而已豈有他哉如始到少林九年壁立萬仞坐斷千差單提向上一機直使你窺伺無門鑽研沒縫者裡還許你以有言會麼還許你以無言會麼全彰諸佛之法印直顯列祖之大機按一指則地轉天旋行一令則山崩海竭又安同彼割截虗空巧立門戶輩而終日隨波逐浪妄生枝節者哉大衆還會麼就是洞山玉線金針也是花前弄影臨濟主賓玄要無乃醉後添杯諸人還覷得破麼良久曰夜靜水寒魚不餌滿船空載月明歸一日謂門人曰吾順化時至汝輩甚勿以世情眷戀有乖道誼末後一句聽吾分付言訖就枕泊然而逝大鑑下第二十九世萬安嚴禪師法嗣河南府嵩山凝然了改禪師嵩陽金店任氏子齠年繫念空宗依止少林訓剃落二十納具初參月印於香山鮮克契入會松庭主天慶師往依之師舉印示衆路逢死蛇莫打殺無底籃兒盛將歸與麼説話若是鹵莾禪和者裡如何透得語問曰者箇莫是背觸不得底意麼庭曰笑破山僧口師罔措庭曰你在鬼窟裡討甚麼碗師愈不安一日庭上堂曰一言逈脫獨拔當時師當下釋然尋匿迹二祖菴洪武庚午繼席少林上堂莫向言中取則直須句外明宗擲拄杖便下座上堂祖師心印不是有言不是無言不屬有知不屬無知豈可向句下研窮意中揣度復舉可大師問初祖弟子心不安乞師與我安心祖曰將心來我與你安可曰覓心了不可得祖曰我與你安心竟師曰缺齒胡販得箇陳年滯貨攤向街頭若不得箇孟八郎承虗接響幾乎無著落處總好與三十棒永樂辛丑無恙忽集衆敘別説偈曰行年八十七相為在今夕撒手威音前金烏呌天碧偈畢儼然而寂師行止端莊毫無放逸雖密室如對大賓周蜀伊三殿下嘗登山尊以師禮珍錫甚至師皆泊如也大鑑下第三十世嵩山改禪師法嗣河南府嵩山俱空契斌禪師晉毫邑王氏子從重興院無相剃染永樂丙申參凝然求示心要然曰你向達磨未西來時道一句看師窘無以對於是疑之不知飲食之為何味者久之一日覩秦封槐豁然契悟上丈室擬呈似然遽曰契斌參得禪也師便喝然曰作麼師曰和尚何得贓誣平人自是愈加鍛鍊日新日益一日然問趙州勘破婆子婆子敗缺在甚麼處師曰一對無孔鐵錘曰趙州意又作麼生師曰荊棘林中重加陷穽曰石頭道書亦不達信亦不通是何意旨師曰千里同風曰青原垂足又作麼生師曰禍事禍事然為點首曰洞上一宗在汝躬矣正統戊辰出領嵩山院事僧問如何是君師曰九重深密敢誰窺曰如何是臣師曰萬里殷勤宣至化曰如何是君視臣師曰寶殿光含萬化新曰如何是臣向君師曰玉階仙杖覲龍顏曰如何是君臣道合師曰端拱無為天下治曰還有向上事也無師曰有曰如何是向上事師曰請闍黎尊重問如何是正中偏師曰夜半烏雞帶雪眠曰如何是偏中正師曰老翁曉抱石烏龜曰如何是正中來師曰出匣吹毛寒逼天曰如何是兼中至師曰公孫舞劍難思議曰如何是兼中到師曰黑狗銀蹄無處討曰五位既蒙師指示少林直指事如何師曰砂裡無油麥中有麵問如何是空劫已前自己師曰烏龜向火曰如何是成劫已後底事師曰龍馬負圖師以景泰壬申示寂塔於少林西塢世壽七十鄭州福禪師僧問鄭州梨何似青州棗師曰多𭪿阿師慣潦草曰和尚也須別垂一隻手師曰那討間錢賞落花汝州風穴古潭本深禪師山西絳州張氏子處胎時母數夢異光入口父怪之髫齓捨金臺村大覺洪處出家二十五參凝然於少室執侍一紀受衣囑永樂甲午奉敕校證藏經宣德丁未主風穴庚戌八月十五集衆辭世説偈曰雲來雲去天元淨漚滅漚生體自同若問箇中端的意一輪明月伴清風遂化去門人建塔於開山沼公之壟西大鑑下第三十一世嵩山斌禪師法嗣河南府定國寺無方可從禪師洛陽許氏子投福先芘峰剃落初參嵩陽龍潭順密縣超化宗入室參請俱有契入後乃參俱空於嵩山山以綿密閫奧重加淘鍊一日舉天衣以五行者俱召實上座因緣師當下於五位奧旨親證無遺受囑後隱於郟鄏定國寺尋開法菩提明成化癸巳主法少室示衆向上宗乘本無言説當人一著非假外求直須向自己胸襟中迸出偏不附物正不立玄不涉程途方得到家穩坐雖然你還知九峰不肯首座麼百丈五百生墮在狐窩麼金鎞刮膜擬則成乖有志此宗大須仔細珍重成化壬寅鈞州徽藩聘住觀音寺六月示寂世壽六十四臘四十塔全身於少室祖墳大鑑下第三十二世定國從禪師法嗣河南府嵩山月舟文載禪師別號虗白北通州人世系蔚州廣寧王氏子祖才從明成祖靖內難贈武德將軍遂居通州生師於景泰甲戌時父夢僧寄宿翌日得誕師成化丙戌脫白於本州萬安寺師白菴空癸巳詣杭納具丙申北還掩關閲萬松拈提從上古德機緣竟若面牆一日忽省曰此宗非絶後再蘇懸崖撒手者要望他針線細密盤旋回互不觸當頭兔子搆牛奶萬萬不可得既而翻然出關參無方從問承師有言當人一著非假外求直須向自己胸襟中迸出方得到家祇如本無自己當體全空的人來如何接他語未絶從劈面便掌曰你恁麼那師大悟呈偈曰劈面攔腮電光石火立命安身絶影蹤臘月蓮花開朵朵一日從問二祖三拜歸位是何意旨師曰褊衫破衲襖從曰未在更道師曰草履著羶靴從喝曰怪事師拂袖便出從撫而印之曰子異日支吾宗當大播天下慎之哉無忽也弘治壬戌開法登封華嚴正德改元丙寅奉敕遷少林參徒雲集撾鼓無虗日上堂舉金峰因僧問訊次乃把住曰輒不得向人道我有一則因緣舉似你僧作聽勢峰與一掌僧曰為什麼打某甲峰曰我要者話行師曰鴟腐鼠鷹銜死蛇蓋緣種類汙下只作者般伎倆纍他金峰却成話柄當時華嚴若見他道輒不得向人道我有一則因緣舉似你即掩耳而出為什麼不見道師子翻身處金剛正眼開上堂世人住處我不住世人行處我不行不是與人難共住大都緇素要分明古人恁麼兢兢業業日日惟新只解登高不能放下大似抱橋柱洗澡若是山僧即不然是非海裡橫身入聲色場中信腳行烈焰亘天休覓火誰教日午打三更舉僧問石門年窮歲盡時如何門曰東村王老夜燒錢話頌曰東村王老夜燒錢喚鬼呼神到曰前黑漆崑崙戴紙帽夜明簾外打鞦韆舉女子出定話頌曰三間茅草屋六箇大煙熜驀地瞋心發遍界暖烘烘示衆達磨西來以一乘法直指單傳令人見性成佛至我少室如九鼎繫以單絲言之魄墮汝諸人趂色力康健打辦箇事急須努力莫間過日大衆且喚什麼作一乘法聻良久曰切忌喚甕作鐘伊鄭徽三府嚮師德風勤從問道而師之法道益可想見矣嘉靖甲申年七十有一倦接納乃命門人於三十六峰煙霞中結菴投老焉大鑑下第三十三世嵩山載禪師法嗣順天府宗鏡菴大章宗書禪師別號小山順德南和李氏子生明孝宗弘冶庚申時與羣兒戲好作佛事十歲能通經史大義一日忽置卷歎曰此治世事非出世間了生脫死法遂白父投郡之開元法堂鈿剃染聞月舟道眼精明往參焉入室請益潛淘密踐者八載一日因看舟語録見定國投機悟道因緣有省私計曰此赤眼撞著火柴頭耳即入室問面壁九年即不問斷臂安心事若何舟曰只為當初留毒害兒孫洗土不成泥師曰不因和尚舉怎見少林人舟便噓兩噓師曰不奈船何打破戽斗便出又一日入室舟問入門須有語莫將問來問師曰日面佛月面佛舟曰腦後見腮師曰和尚也須仔細舟縮身曰山僧行年在坎師禮拜曰某甲罪過舟乃以大法囑纍焉壬辰開法興德次主天慶五臺世宗嘉靖丁巳少室疏請再四師乃歎曰先師化後三十年宗風逮弱盡前輩有言禪林下衰弘法者多假我偷安不急急撑拄之其崩隤可須也某雖慙付囑其如付囑何遂欣然主之丙寅上京主宗鏡隆慶改元丁卯遊西山至谷集山三學洞師喜其幽寂遂結夏焉至冬疾作臘月十六日索筆書偈儼然坐脫世壽六十八僧臘三十六茶毗身骨分為三處一留宗鏡一送順德祖塋一歸少室先是謝院日法鼓墮地疾作日秦槐枝摧寂後樹竟仆師之去世其關法運如此開封府鄢陵顯慶曙菴悟寅禪師幼祝髮禮僧可標為師參月舟有契囑以偈嘉靖己丑住柏梁尚書劉訒請上堂師登座曰月落星疏夜色濃日華迥揭帝京東翻經自愛虗窗白入定空搖蠟炬紅禪榻擁蒲青鬱鬱曉山臨水碧溶溶客來石鼎堪聯句簾卷晴嵐滿座中便下座丙辰四月十三示衆辭謝畢説偈泊然而逝順德府內丘表善觀音院金山德寶禪師山東陽津劉氏子幼從北京海眼寺惟安剃染受學三載乃參無念於山西榆次縣依七載大有發明次參月舟於嵩少又九載得法後趙燕聞師之道相迎開堂無虗日坐道場凡二十有餘末乃就觀音休老焉忽一日將道具盡付門人祖通代揚法化乃説偈辭世曰來時無影去無蹤生死輪回好説空今日翻身雲外路一輪明月任西東遽瞑目而逝門人塔於舊隱之南礪水之北寂日當隆慶庚午三月初四世壽八十有五大鑑下第三十四世宗鏡書禪師法嗣河南府登封嵩山少室幻休常潤禪師字大千南昌進賢黃氏子幼失二親從從父遊嘗目攝群優灑然若有所創諸幻皆局也無常謂何乃入伏牛禮坦然平祝髮居三載初攝心如浮瓜起滅相乘茫無所厝始南參萬松林於徑山通所疑林詰曰疑是何人厝者何物師未諭抵九華一夕覺身同虗空就客質之客以為理障閲楞嚴至圓明了知不因心念處有省廓然如鏡中象不落幻空乃知前境直塵勞一息耳次參大方蓮問現鏡中象時如何蓮曰直須打破師曰打破後如何蓮曰亦未離心境師亦未決聞小山書法道異諸方往參焉舉前話書曰何必打破師曰其奈鏡象何書曰鏡象安在師默而已一日書問疇昔之疑決不師舉掌書曰毋以罔象問景耶師曰此外更復何有書曰子試披衣檢看師於是益加精進力究者二年書一日舉洞山偈問曰既不是渠畢竟是何人師豁然契悟呈偈曰若要識此人有箇真消息無相滿虗空有形沒蹤迹曾為佛祖師常作乾坤則龜毛拂子清風生兔角杖挑明月出書復把住曰子毋勦説更須自入悟門師曰尚不借緣何從門入書曰既不借緣何為至此師曰因不借緣所以至此書曰就不借緣一語為我道看師曰彩鳳翻飛身自在鐵牛奔㖃意常間書乃付以大法有定作人天主當思少室秋之句師後應詔過獲嘉止一精舍諸僧預設至恭師詢所以諸僧曰昨夢伽藍神掃門云旦日有祖師過此師曰祖師過去久矣逮書遷化輿議繼席者非師不可衆再請師再却有舉書所以付囑意師始允之以萬曆甲戌秋入院拈提説法人皆歎未曾有臨衆肅然有上古風度司馬汪道昆謂師魁然修碩容止莊嚴其響應如洪鐘其溥渡如廣筏其砥波流如山立其隨機而顯化如珠走盤至其秉大覺覺群迷日孳孳然以道自任云云蓋實録也乙酉四月七日説偈告寂備載全録宗伯陸樹聲文其石塔本山建昌府廩山蘊空常忠禪師本郡氏子從鶴林老宿剃落甲子參少林小山值山外出乃前問曰達磨面壁石何在山指那青青黯黯處師曰指東話西作麼山曰杜撰禪和如麻似粟師曰者老漢在者裡魔魅人那山便打侍山遷宗鏡師服勤三載受囑還旴江隱從姑山日唯趺坐有問者師但搖手曰汝不會我語曰試説看師曰南城城外水滔滔向北流問者目瞪師曰向道汝不會我語後縛茅廩山二十年不與世接縉紳過謁唯默坐而已羅近溪輩相與論理學師則以向上語直掃之僧有以經論旨趣見難者師呵曰宗眼不明非為究竟僧便問如何是宗眼師振衣而起無明參呈所得師曰悟則不無更須受用得著始得不然祇是箇汞銀禪遂舉南泉打破鍋因緣問曰古人意在甚處明曰拂袖便行鈎有餌鍋兒打破玉無瑕師曰去牧牛場上待汝久在萬曆戊子忽一日告衆曰我有件要了底大事汝等須知衆茫然師竪拳曰會麼衆無對乃揮案一下曰吽吽為汝了去遂趨寂塔於本山之麓壽七十五臘五十生平言行縝密非有真心為法者槩不輕示順德府蓬鵲山石河菴天然圓佐禪師字少溪本郡仙人鄉范氏子幼從普利灜祝髮性好學偕大方往參小山於少室機契受大法之託歸里隱蓬鵲山堅不赴請柱史蓬巖吳相勸請再四始起而從之上堂諸葛昔年稱隱者茅廬堅請出山來松花若也沾春力根在深巖也著開我豈敢哉古蓋如此今既推委無由只得與諸人眉毛廝結以拂子作圓相曰會麼向上一路千聖不傳學者勞形如猿捉影苟非忘形去智喪耦息機到虗靈不昧了了常知的田地過來要見他拈花之旨面壁之宗大似數他桃李宮牆外終非己有諸人還要知佛祖直指的消息麼乃以拂擊案曰適來山僧已自告報了也便下座僧問拈椎竪拂舉古明今皆是止啼黃葉如何是金錢師曰只見雷霆施號令那知星斗煥文章曰和尚是把火行其如學人何師曰閉目中秋坐却怨月無光吳蓬巖問如何是般若體師曰寂然不動曰如何是般若用師曰感而遂通曰如何是下手得力處師曰罔象到時光燦爛曰如何是不得力處師曰離婁行處浪滔天曰恁麼則儒釋未始有異也師指空曰此儒耶釋耶同耶異耶巖作禮曰謝指示自是畿南河北靡不望風而歸萬曆乙酉亥月坐化於本菴門人建塔於受業舊隱大名府大伾山興國如進禪師廣平永年陳氏子年十七投東山曉剃染受具抵京都遊講肆知非究竟於是抽身南遊結伴渡河參小山於少室久之有所得室中徵詰皆當仁不讓山慮師性不通情嘗誡之曰吾宗漸與世異慧命如一絲之繫九鼎貴有得力兒孫深心保護子既知石龜夜步可如木馬遊春直須處處忘機方見頭頭顯露然尚有向上一路猶當審悉嗣囑偈曰長羽石龜月下行渠今覿面得分明直須收斂藏箱篋不遇知音決莫呈尋隱舊里影不出山不喜見內客久之開法機如走珠衲子日益盛一日應聘北上途宿三教堂堂西壁向有憨布袋像後為羽士居安雙髻改呼鍾離權遷供東壁每以緇衣黃冠一樣兩人爭衡代位妖孽一方住僧求師除之師以杖指像曰者塊泥團變怪無端髠頭了髻魔魅閭閻妄生喜怒東那西遷不遇老僧親點破空教冷地受牽纏咄四大各復識取本源從此長安風月舊大家安享太平年遂連棒像為粉碎法化聞帝闕賜紫伽黎褒寵甚至寂後塔於寺左懷慶府龍岡寺大方如遷禪師號松谷生鳳翔岐山落星里族李氏有夙根見佛寺如舊居年十七父母從其志乃捨依本郡無蹤本剃染嘉靖丁巳以己躬下事未明首參悅菴喜力究向上一路秉具後尋入青峰山弔影苦參忽有省辛酉走少林謁大章決擇大事朝夕入室陶鎔從上機緣久之蒙印可有針頭玉線海底風牛之囑且系以偈曰帶子鐵牛海底藏憑伊尋得細調降既欣性善歸牢圈異日肥充耕大於是遍參諸方回京窮性相宗旨末抵懷慶鄭世子讓國潛修白業聞師至致禮參請深相印契乃於府城北建龍岡精舍延師弘法四方學者由是至萬曆丁亥遷大都慈雲戊子遷千佛寺庚寅奉聖母慈聖皇太后懿旨領大慈壽寺間及淨土唯心法門衆盈千餘欽頒大藏法寶御書大法寶藏四字甲午春送回龍岡安供戊戌八月十一示寂世壽六十一臘四十五全身塔於龍岡寺西原舉萬松問雪庭曰從何得箇消息便恁麼來庭曰老老大大向學人納敗闕松曰老僧過在甚處庭曰學人且禮拜暫為和尚蓋覆却頌曰襁褓才離便放驕還他家世擅英標堪矜巖桂秋風好萬斛天香透紫霄大鑑下第三十五世少室潤禪師法嗣順天府大覺寺慈舟方念禪師別號清涼古唐楊氏子生嘉靖壬子十歲失父投京廣德大慈義為師十五剃染登具草一遊講肆知文字非究竟法乃參幻休於少林休問甚處來師曰北方休曰北方法道何似此間師曰水分千派流出一源休曰恁麼何用到此師曰流出一源水分千派休可之命典維那一日遊初祖面壁處忽然大悟乃曰五乳峰前好箇消息大小石頭塊塊著地呈休休知為克家種草遂囑曰從上佛祖以自己所證相承襲欲令一切人知有此事余得之小山先師今授於汝汝當體佛祖心紹續慧命然尚宜晦迹林泉乘時而出付以偈曰無上涅槃心佛祖相分付吾今授受時雲淨峰頭露時年方二十八既而以差別智不可不明遂遍參諸方備行苦行明萬曆丁亥在古華嚴石城精厲過分雙口失明乃思惟曰幻身非有病從何來身心一齊收下端坐七晝夜眼仍平復如常尋入吳渡江歷補陀辛卯説法越之止風塗廣濟蘭若有澄鐵𭪿者以所得來見師勘驗間知為法門梁棟乃出休所授囑纍焉有五乳峰前無鏃箭射得南方半箇兒之句師以大法肩承得人可謂無事乃遊吳抵秀州福城整飭東塔次走江西雲居匡廬將赴臺山請而越中緇白力挽之主寶林當萬曆甲午也未幾示寂嗣子迎遺骨塔於顯聖之南山先是師在越以寶林眷眷於懷汰如河公以為必清涼後身乃載之高僧傳焉河南府嵩山少室無言正道禪師洪都新建胡氏子投上藍璘剃染十五遇老宿知休指示禪要從其遊憩南嶽淨瓶巖力事參究一日休以張䂐頌示師師曰真如尚不可趨何頌之有休奇之乃指往參嵩山幻休休一日上堂師出問如何是洞上家風休曰月下三花樹峰前雙桂枝師曰和尚還有否休曰唯此一事實無二亦無三師言下頓契呈偈曰雲攢絶頂月鎖幽巖石人撫掌木女舒顏休可之乃印以偈曰無言的旨不離言玄唱玄提妙有傳今日單傳親印授芬芳雙桂利人天明萬曆庚寅主少林時汴梁周籓汝寧崇籓皆請師説法崇籓有世子患足非杖不立師為引之周行七步而足疾頓瘳其道德動人如此僧問外道問世尊不問有言不問無言而世尊但良久意旨如何師曰動容揚古路不墮悄然機問如何是新年頭佛法師曰靈春已有新條令不必重重為指陳有老宿問如何是無言師曰四時行焉又一老宿問如何是無言師曰萬物生焉師之對機敏捷有如是生平襟懷磊落誨人真實初無浮華示寂門人塔全身於本山祖塋之側保寧府廣元漢王山實相善真禪師南昌熊氏子幼業儒嘗以三教誰尊為問人以佛對遂往廬山禮湛堂落䰂入武夷聽默菴拈提無所入乃之楚興國州建寺安衆道望聞州牧俄捨去參幻休於少林有間事遍參縛茅頂山獨棲雪夜負薪忽大悟嗣入終南居九坪旋聞休訃為位哭之乃入蜀興復漢王山不數年頓成叢林以萬曆戊戌五月示寂有樂去論一行三昧説山房夜話及詩偈行世
