body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十一世徑山端禪師法嗣杭州府徑山復原福報禪師台之寧海方氏子母張出家杭良渚祟福時石湖美主淨慈師從祝髮受具戒參徑山元叟叟問近離甚處師曰淨慈叟曰來作甚麼師曰久慕道風特來禮拜叟曰趙州見南泉作麼生師曰頭頂天腳踏地叟曰見後如何師曰饑來喫飯困來打眠叟曰何處學得者虗頭來師曰今日親見和尚叟頷之出世慈溪蘆山次遷越州東山四明智門洪武初驛召道行沙門師赴京館天界屢入內庭應對稱旨留三年仍賜還智門後兩主徑山焉上堂舉一不得舉二放過一著落在第二古人恁麼說話正是抱贓呌屈東山即不然舉一不得舉二放過一著落在第七到者裡更須知有向上一路始得如何是向上一路良久曰莫戀寒巖異草青坐却白雲宗不妙上堂一葉落天下秋一塵起大地收誰謂北鬱單越不是南贍部洲剛自騎牛更覓牛上堂語是謗默是誑還有二俱不涉者麼拍禪牀曰洎合停囚長智上堂終日著衣未嘗挂著一縷絲終日喫飯未嘗咬著一粒米似地擎山不知山之孤峻如石含玉不知玉之無瑕不著佛求不著法求不著僧求拈拄杖曰有時乘好月特地過滄洲一日病革侍者請偈師叱曰吾世壽尚有三年已而果然及化之日忽拍手曰阿呵呵大衆是甚麼看取竟寂世壽八十四僧夏六十四全身瘞寂照之右岡杭州府靈隱性原慧朗禪師別號幻隱台州黃巖項氏子依樂清寶冠寺魯山出家首參竺元道於紫籜山繼詣徑山謁元叟叟問東嶺來西嶺來師指腳下草鞋曰者是三文錢買得的叟曰未在更道師曰某甲只恁麼未審和尚作麼生叟曰念汝遠來放汝三十棒師大悟出世鄞之五峰遷金峨洪武壬子召天下高僧建會鍾山師與季潭泐與焉季奉旨住天界師居第一座提綱舉要得表率叢林體明年舉師主金山戊午升靈隱浴佛日上堂舉藥山因遵布衲浴佛次山問你祇浴得者箇還浴得那箇麼遵曰把將那箇來山便休去師曰者一箇那一箇一一從頭都浴過藥山布衲謾商量仔細看來成話墮成話墮轉誵訛拍禪牀曰武林春已老臺榭緑陰多佛誕上堂世尊才生下一手指天一手指地周行七步目顧四方曰天上天下唯吾獨尊真成大人相不是小兒嬉雲門曰我當時若見一棒打殺與狗子喫貴圖天下太平要作老胡種族直須恁麼始得法昌曰好一棒太遲生未離兜率腳跟下好與一椎豈到今日雖然如是大似賊過後張弓將謂鬍鬚赤更有赤鬚鬍黃面老子末上賣俏固是旁若無人雲門法昌雖則見義勇為爭奈劍去刻舟以拄杖畫一畫曰還會麼一把柳絲收不得和煙搭在玉闌干上堂今朝閏五月初一依舊日從東畔出衲僧箇箇解知音短咏長吟皆中律梅雨晴樹陰密林下優游何得失無位真人赤肉團等閒靠倒維摩詰佛涅槃日上堂涅槃生死等是空華佛及衆生皆為剩語諸人到者裡作麼生良久拍禪牀曰但見落花隨水去不知流出洞中春浴佛上堂香嚴道去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年貧錐也無衆中若有箇漢出來道長老錯了也今朝四月八是佛生日如何舉此公案山僧只對他道住持事繁便下座為碧峰和尚闍維奠茶五臺山拾得來誠非凡種關西子沒頭腦却是靈根惟茲一盞清茶蕩滌衆生熱惱只如則川拋下茶籃仰山撼動茶樹畢竟明甚麼邊事乃度盞曰踏翻生死海靠倒涅槃城室中垂語曰昨夜蓮華峰被蜉蝣食却半邊你因甚麼不知冷泉亭吞却壑雷亭即不問南高峰北高峰鬬額是第幾機衆莫有契者無何遭誣罔被逮或勸師早自為計師不顧怡然詣所司未鞫即廡下說偈端坐而逝時洪武丙寅六月二十三也壽六十九坐夏五十八杭州府上竺我菴本無禪師黃巖人從淨慈方山落髮依寂照於中竺掌綱維有舅氏教庠老成挽之更宗於是見湛堂澄于演福研精教部寂照惜其去作偈寄之曰從教入禪今古有從禪入教古今無一心三觀門雖別水滿千江月自孤後出世弘教既為湛堂嗣仍爇一香報寂照不以跡異而二其心也寂照示寂時師住四明延慶照特遺書囑其力弘大蘇少林二家宗趣餘無他言師於祭筵拈香乃曰妙喜五傳最光焰寂照一代甘露門等閒觸著肝腦裂氷霜忽作陽春溫我思打失鼻孔日是何氣息今猶存天風北來歲云暮掣電討甚空中痕後臨終無疾坐蛻于白雲臺蘇州府開元愚仲善如禪師吳江人上堂佛身充滿于法界普現一切群生前為甚麼滬瀆居民黃老之流迎之而風濤駭吐像即沉沒吳縣朱膺東靈帛尼請之而靈相峩峩雙泛試就提捧忽爾升舟今山中所奉維衛迦葉二石相是也豈非隨緣赴感靡不周而恆處此菩提座乎然雖如是若作恁麼會大蟲看水磨不作恁麼會真州望長蘆恁麼不恁麼總拈却又作麼生清平世界不用訛言示草菴僧偈曰國師萬代善知識鴈宕草菴天下聞得在其中居住者生難遭想報深恩度牒親從天上降得來何翅萬黃金時中若不修僧行孤負皇王一片心晚年因法門從子瓛瑩中住萬壽闢一室延之養老及相本空繼席待之尤至故得優游以樂其道嘗居葑門直指菴人因稱之曰直指和尚將終呼諸子訣別泊然而逝杭州府靈隱朴隱天鏡元瀞禪師會稽倪氏子狀貌魁偉性度坦夷世間機穽不識為何物初從雪庭立祝髮從昭慶濡受具戒又從天岸濟習台衡止觀嗣有遠志乃謁無見于華頂復遊玉几叩石室室令參元叟于不動軒入門叟為厲聲一喝師不覺汗下黏縛盡脫遽稽首三拜而已叟命居侍司尋掌記室至正丙申出世里之長慶升天衣洪武壬子詔天下名桑門建會鍾阜師應召入內從容問道賜食而退丙辰繼席靈隱上堂聲不是聲觀音三昧色不是色文殊法門聲色無礙普賢境界拈拄杖畫一畫曰大鵬展翹蓋十洲籮邊燕空啾啾上堂即心即佛嘉州牛喫禾非心非佛益州馬腹脹不是心不是佛天下覓醫人灸豬左膊上良久曰啼得血流無用處不如緘口過殘春未浹旬嬰誣坐謫陝西至寶應謂從者曰吾報身頗異常時殆將盡乎夜宿寧國寺其住持總虗了者與師有舊相見甚歡師曰我骨有所託矣是夜聚談飲食如常翌旦忽合爪端坐泊然而逝時洪武戊午正月十九日也法孫梵譯携骨以還骨間舍利叢布如珠於浴佛日結竁于祖隴之側瘞焉壽六十七臘五十有五台州府護聖迪原啓禪師臨海人為書生時拜叔父堅上人于里之寶藏寺偶閲首楞嚴經至山河大地皆是妙明心中所現物處置卷紬繹良久豁然有省白父母求出家禮寂照為師服頭陀行久而益勤出世護聖後退居東堂七年著有書曰大普幻海曰法運通略曰贅談曰疣說曰儒釋精華總若干卷又作佛祖大統賦終時壽四十三蘇州府萬壽佛初智淳禪師送忠侍者偈曰鳥窠吹起布毛侍者當下悟去一對無孔鐵鎚賣弄鬼家活計若是靈利阿師別有天然氣宇恢張本地風光顯出衲僧巴鼻以大千攝入毫端將須彌納向芥子直踏毗盧頂上行千手大悲攔不住寧波府天寧歸菴仲猷祖闡禪師鄞縣陳氏子從佛智匡剃染參寂照于徑山得旨出世蘆山遷香山升郡之天寧上堂即心即佛非心非佛不是心不是佛五臺山上雲蒸飯佛殿階前狗尿天剎竿頭上煎䭔子三箇猢猻夜簸錢上堂若論第一句三世諸佛道不得六代祖師道不得天下老和尚道不得山僧道不得大衆道不得拈拄杖曰拄杖子道得麼道得也是第二句元宵上堂十五日已前腳頭腳尾黃金蓮十五日已後白牯狸奴成隊走正當十五日樓臺上下火照火車馬往來人看人好大衆且道好在甚麼處衆眼難瞞便下座江心萬禪師法嗣府報恩無方智普禪師桂陽龍氏子住後上堂六月行人口吐煙區區只為利名牽爭如林下無心客一覺和衣到曉眠拍禪牀曰乾明不惜口業為你說破臘月三十日閻老子要問你索飯錢在上堂春色濃春日融園林暖野花紅昔日靈雲一見透脫色空而今諸人總見因甚不悟若也不悟眼被色籠擊拂子曰錯教人恨五更風南康府雲居小隱師大禪師終日方丈危坐淡如也剃餘鬚髮侍者鑷生爭取藏之信次即生舍利嘗有示信禪人偈曰信是道元功德母藥如有驗不消多有人直下承當得佛祖安能奈爾何徑山熙禪師法嗣江寧府大龍翔集慶寺笑隱大欣禪師九江義門陳氏子從郡之水陸院芟染自幼開爽絶倫初見一山萬既而遣詣百丈參晦機機一見器重命掌記室一日問黃龍既得旨於泐潭及見慈明氣索汗下過在甚麼處師抗聲曰千年桃核裡覓甚舊時仁又室中侍立次機舉野狐話詰曰不落因果便墮野狐身不昧因果便脫野狐身且道利害在甚麼處師擬答機遽震威一喝師當下渙然氷釋因同參苦問師答頌曰百丈野狐野狐百丈埋作一坑伏惟尚饗後出世湖之烏回遷杭之報國中竺至順庚午文宗以潛邸為大龍翔集慶寺妙簡名德開山師首膺其選賜號廣智全悟大禪師復驛召赴闕入見奎章閣賜坐咨問法要及順帝御極待遇益隆後以老病求退優詔不許敕外臺護祝使安居終老上堂安養國中水鳥樹林悉皆念佛知足天上樹相撑觸演說苦空竪拂子曰山僧拂子穿却諸人鼻孔諸人向甚處出氣聻入新寺上堂第一義諦明如杲日寬若太虗萬彚森然纖塵不立若乃明今舉古無非節外生枝立主立賓何異虗空釘橛然聖旨建寺諸官臨筵不可只恁麼休去還有共相激揚底麼問答不録乃曰釋迦世尊捨金輪而登佛位今上皇帝從佛位而御金輪收攝三千剎海於一印中具足八萬法門於一毫上如華嚴會上菩薩得無盡福德藏解脫門於一器中出生種種美味飲食又於衆會仰觀空中而雨種種珍寶隨衆生心悉令滿足然後得其寶者盡證法門食其味者咸成妙道無一塵而不具足佛事無一法而不圓滿正宗即今崇建寶坊闡揚法施諸天音樂不鼓自鳴梵唄詠歌自然敷奏十方菩薩咸集道場八部天龍同伸慶讚還有不歷化城徑登寶所者麼遂擊拂子曰四海已歸皇化裡時清休唱太平歌上堂孤峰頂上目視雲霄無乃埋沒己靈十字街頭和泥合水且貴流通正眼拈拄杖曰釋迦已滅彌勒未生正當今日千聖命脈列祖鉗鎚總在新報國手裡拈起也七穿八穴頭頭現無邊妙身放下也鑑地輝天處處彰寶王剎海說甚麼溪山各異雲月是同至化無為功不宰蕩然一片古皇風復舉志公令人傳語思大曰何不下山教化衆生去一向目視雲漢作甚麼思大曰三世諸佛被我一口吞盡何處更有衆生可度師曰思大被志公一拶直得倒退三千進退兩序上堂心空及第選佛何必選官荷負叢林為衆一以為己報國為法擇人量材授職如樂奏九成左右進退無不合度只如一喝分賓主照用一時行諸人作麼生甄別喝一喝曰九萬里鵬才奮迅三千年鶴便翱翔上堂言發非聲色前不物著甚來由聲色裡睡眠聲色裡坐臥却較些子所以道即此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分驀拈拄杖曰水流黃葉來何處牛帶寒鴉過遠村卓拄杖下座上堂舉黃龍南室中垂語曰我手何似佛手我腳何似驢腳人人有箇生緣那箇是上座生緣師曰黃龍三關如商君立法法雖立而先王之道廢矣故當時出其門者甚多得其傳者益寡使其恪守慈明家法子孫未致斷絶僧侍立次師展兩手曰八字打開了也為甚麼不肯承當僧曰恐鈍置和尚師曰許多時沒一點氣息便打問衆曰青州布衫重七斤古人已道過了也畢竟萬法歸一一歸何處一僧出曰東廊頭西廊下師曰甚麼處見趙州僧擬議師曰棒下不成龍僧參師曰竪拂拈椎古人榜樣擎叉舞劍列祖條章衲僧門下合作麼生僧珍重便行師曰不消一劄問僧甚處來曰遊山來師曰笠子下拶破洛浦遍參底作麼生曰未入門時已呈似和尚了也師曰即今為甚麼不拈出僧擬議師便打至正甲申五月示微疾作手書別交游囑其徒以兩朝所賜金幣作萬佛閣上報國恩二十四日書偈趺坐而寂其年秋八月十有六日葬於石頭城塔院之後岡壽六十一臘四十六洪武甲寅遷葬於撥雲山與康僧會古塔相鄰江寧府保寧仲方天倫禪師象山張氏子幼而岐嶷投廣德天寧竺源剃落源俾其見虎丘東州永偶過栴檀林同一僧看傳燈録僧曰千七百則公案渾如生鐵鎖子一般只要鎖匙入手師言下點首默契乃參晦機於淨慈才入門機曰湖山靄靄湖水漾漾浸爛你鼻孔塞破你眼睛因甚不知師曰通身無影象步步絶形蹤機曰未在更道師拂袖便出機俾居侍司旋掌藏鑰師憚其繁嘆曰世降道衰人根浮薄即宿師碩德具大知見猶不為學者信服無他蓋表裡不純故也自是遂縛茅於吳興桃華塢一日灌園次忽驟雨疾風摧析林木霹𮦷一聲胸中疑礙頓釋乃曰大奇大奇也大奇掇轉虗空顛倒騎蟭螟吞却五須彌曩於南屏室中屢叩老和尚終不肯為我說使當時說破安有今日耶元泰定丁卯出主廣德東泉遷明之佛巖笑隱居龍翔招師分座說法南臺治書吐魯舉師主保寧僧參師曰好箇師僧恁麼行腳僧曰撥草瞻風豈圖別事師曰喫得棒也未僧擬議師便喝問如何是和尚家風師曰誰人看不見問如何是一相三昧師曰青黃赤白問如何是鳳臺境師曰鳳臺有甚麼境上堂初三十一中九下七七九六十三九九八十一朝往西天暮歸唐土一馬生三寅石牛欄古路臘八上堂昨夜覩明星悟道後園風打籬笆倒曉來無蹟可追尋雪山依舊生青草上堂言無展事語不投機承言者喪滯句者迷與麼也不得不與麼也不得與麼不與麼總不得你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子上堂舉僧問雲門久雨不晴時如何門曰劄師曰雲門一劄猿啼巴峽熊耳峰高石頭路滑師晚年卜築鳳臺之西曰新菴將終謂淨覺曇曰欲以後事相凂今日何日覺曰二十九日師曰月窮日不宜去明日五月一吾行矣至期召門人付囑舉手作別端坐而逝壽六十六臘五十一寧波府育王石室祖瑛禪師吳江陳氏子幼出家普向寺年十五祝髮受具戒初從虗谷陵于仰山聞徑山晦機道望亟往投之一見契合遂留掌記後出世明之隆教遷杭之萬壽明之雪竇育王謝天童平石砥問疾有偈曰是身無我病根深慚愧文殊遠訪臨自有巖華談不二青燈相對笑吟吟法身遍在一切處噇飯噇空得自由太白鄮峰煙雨裡笋輿來往亦風流晚年得痿痺疾造一龕曰木裰日坐其中不涉世事至正癸未三月見一蓑衣婦人扣頭請師應身為國王師曰吾不願生天王家逾十七日趺坐而化臨終偈曰五十三年弄巧成䂐踏破虗空赤腳行萬象森羅笑不輟闍維遵治命以遺骨煅之炭盡益以香薪百煉不回鎔作金銅色扣之有聲附葬於三藏道法師塔右杭州府中竺一關正逵禪師鄱陽方氏子參晦機于淨慈機問甚處人師曰鄱陽機曰鄱陽湖水深多少師曰瞪目不見底機曰恁麼則浸爛衲僧鼻孔也師曰終不借和尚鼻孔出氣機曰畢竟借誰鼻孔出氣師曰恭惟和尚萬福機肯之命充侍者逾二年往依中峰于天目復謁徑山元叟典記室笑隱主中竺俾師分座出世金陵崇因帝師授以佛日普照之號遷鳳山資福升主報國再遷中竺示衆心不是佛智不是道一念涉思惟全身入荒草所以道目前無法意在目前不是目前法非耳目之所到古今天地古今日月古今山河古今人倫頭頭顯露物物全彰不從千聖借不向萬機求內外絶承當古今無處所恁麼解會猶是錯認驢鞍橋作阿爺下頷雖然既是泗州大聖因甚麼在揚州出現良久曰參後示寂世壽五十七僧臘四十四紹興府天衣業海子清禪師上堂三歲孩兒抱華鼓八十翁翁輥繡毬嬌羞老醜都呈露直得諸人笑不休山僧昔在南屏山下糞掃堆頭拾得一領破襴衫子抖擻將呈天目不為顧采後過崇德撞著惡辣漢被渠扯破七孔八穿收拾歸南屏深藏四十餘年不將輕與外人無端今日來天衣比看破舊相似顏色一般著來嫌袖大抖擻覺天寬直得十峰齊起舞雙㵎共鳴湍盡看當場鮑老不知笑倒傍觀遂大笑拈拄杖畫一畫曰更把一枝無孔笛等閒吹出萬年歡復舉三聖逢人則出話師曰二大老竊得臨濟些子家私各自賣弄檢點將來好與一坑埋却同參至上堂颯颯凉風景同人訪寂寥煮茶山下水燒鼎洞中樵慈祖將常住物作人情天衣則不然供佛懶拈華延賓不煮茶莫嫌無禮數冷淡是僧家師出世天衣時年已八十六矣嘉興府祥符梅屋念常禪師華亭黃氏子父文祐母楊夢老僧託宿因而有娠元世祖至元壬午三月十二日誕生是夜神光燭室異香襲人既長喜孤坐年十二依平江圓明院體志出家十四剃髮受具至大戊申佛智晦機自江西百丈遷淨慈師往參承值上堂舉太原孚上座聞角聲悟道因緣頌曰琴生入滄海太史遊名山從此揚州城外路令嚴不許早開關師於言下豁然有省投丈室呈所解佛智頷之俾掌記室延祐乙卯智遷徑山師職後版表率一衆丙辰奉朝廷遴選出世祥符至治癸亥赴京出入金門討論墳典自帝師以下皆尊愛之南還主姑蘇萬壽所著有佛祖通載二十二卷行世杭州府淨慈元菴會藏主臨安人參晦機於淨慈居蒙堂因修涅槃堂有偈曰涅槃一路盡掀翻觸處工夫見不難洗面驀然摸著鼻繡針眼裡好藏山晦機稱賞之松江府南禪寶洲覺岸禪師吳興吳氏子從獨孤明落髮受具與梅屋同出佛智之門一日偶為衆演楞嚴至七徵心處忽淨瓶水騰湧注師懷聽衆驚愕師笑曰此偶然耳徑山高禪師法嗣九江府東林古智禪師都昌巢氏子初住興國興聖遷東林上堂過去諸佛已說未來諸佛當說現在諸佛今說且道畢竟說箇甚麼卓拄杖下座上堂盡令提綱聖凡罔測放開一線道普請同參良久曰薰風自南來殿閣生微凉上堂明來暗謝智起惑亡黑牛臥死水癩馬繫枯樁何似東村王四老黃昏伸腳睡一覺到天光山僧與麼道切忌錯承當上堂祖師道圓同太虗無缺無餘三條椽下七尺單前切忌依他作解莫有向天外出頭底麼乃曰巡堂喫茶禮暹道者塔偈曰髑髏元自有靈光雪竇何曾抖尿腸截斷婆婆三寸舌至今雙劍倚天長杭州府中竺一溪自如禪師閩人幼值元兵下江南遭遊卒挾至浙遺之臨安胡氏收養令伴子讀師隅立默識無所失胡氏因子之既長俾隸里中無相寺為僧參雲峰於徑山遂得旨初住萬壽天曆年中竺笑隱欣奉詔開山龍翔因舉代住者三人御筆獨點師名住未幾化去茶毗多靈異其居萬壽時寺後有大家黃氏者重師道行嘗供伊蒲塞饌一日請歸其家進供愈勤乃開私帑所藏金玉示師師歸語徒衆曰彼黃氏以帑中寶示我將欲誘我死去為其子耳出家兒視金玉當如瓦礫古來墮此轍者頗多非但為其子為其牛馬者有之遂與黃氏絶杭州府徑山本源善達禪師仙居柴氏子早年同及菴信行腳誓不歷職初見雪巖於仰山尋還浙參徑山雲峯入室有省峰可之適慧雲虗席命師補處後遷保寧淨慈徑山皆有成績可紀居常不設臥榻夜則焚香然燭端坐達旦率以為常又體所稟與人異遇嚴寒則衣絺綌大熱則衣繒絮嘗以資建大圓院於東路半山接待雲侶一日自知時至會衆敘平生行腳事畢端坐而寂寧波府天童怪石奇禪師示衆此事如人饑渴相似說飲說食豈能救療直須自飲水自喫飯方有實效處示衆舉從上先德痛切語要為諸人開發顯示諸人倘能向者裡虗却心不即法相不離法相一聞頓悟便是涅槃會上廣額屠兒放下屠刀立地成佛底時節是即是不得恁麼會言多去道轉遠且截斷葛藤喝一喝下座示衆參禪本無難易只要具大信根有決烈志萬機休罷千聖不携坐斷諸緣不存一法如太虗空了無朕迹如須彌廬吃然不動無上真乘方可希冀龍巖真首座諸方屢聘高臥不起常作樂閒歌其略曰即心是佛無心是道萬事但隨緣自覺身心好院子從來不要住便是佛也不要做律亦不曾持戒亦不曾破放行把住總由人執法修行驢拽磨要行便行要坐便坐也不精進也不懶惰一卷無字經逐目為功課有時深深海底行有時高高山頂臥幾生修得做閒人肯為虗名被羈鎖云云何山明禪師法嗣寧波府恭都寺者廉介自持日誦法華因聆鐵鏡上堂語遂得心要嘗夜坐有偈曰點盡山窗一盞油地爐無火冷如秋話頭留向明朝舉道者敲鐘又上樓鐵鏡因升堂特稱賞之臨終無疾更衣坐逝闍維舌根不壞人爭奇之天童鑒禪師法嗣湖州府道場玉溪思珉禪師象山張氏子首參雲峰于徑塢次謁止泓于天童泓問近自何來師曰徑山泓曰未離徑山一句作麼生道師曰平如鏡面險似懸崖泓曰昨夜山前因甚虎咬大蟲師擬進語泓與一掌師忽有省一日侍次泓舉外道問世尊不問有言不問無言世尊良久意旨如何師叉手進前泓曰外道讚歎曰世尊大慈開我迷雲令我得入又作麼生師曰君子愛財取之有道泓喜其類己令典藏元大德庚子出世郡之吉祥遷金文大梅保福帝師賜佛心明妙之號至順壬申廣教府聘主婺之雙林元統甲戌行省選住道場示衆此事如鐵壁銀山如大火聚湊泊不得回避不得你輩合作麼生直饒腳不點地別有通霄活路也是不快漆涌上堂依經解義三世佛冤離經一字即同魔說拈拄杖卓一下曰六月不熱正穀不結至元丁丑四月示微疾至二十八日書偈而逝蘇州府萬壽竺田汝霖禪師四明昌國王氏子從慈溪永樂寺梅㵎福祝髮受具參止泓于天童典侍者一日室中舉趙州狗子無佛性話師忽然有省已而見悅堂誾於靈隱堂命典記室其受業師祖方會赴隆興上藍以師侍行因遊百丈謁晦機機命分座未幾繼會席出世上藍久之升明之雪竇閲三載松江澱山虗席屈師俄寺師為新之晚主萬壽僅一載臨寂更衣書偈訣衆而逝當至正乙酉五月草五茶毗設利五色如菽粟者不可勝數壽六十六臘五十靈隱誾禪師法嗣九江府東林無外宗廓禪師南昌魏氏子久依悅堂一日室中舉溪聲盡是廣長舌因緣機契遂授記莂出世雲居晚遷東林送僧之東吳偈曰佛是西天老比丘何緣臥倒在蘇州憑君此去輕扶起問取二千年話頭臨終集衆說偈曰吾年七十一世緣今已畢挨倒五須彌夜半日頭出語畢而逝
