body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十六世龍門遠禪師法嗣衢州府烏巨雪堂道行禪師處州葉氏子依泗州普照英得度參佛眼聞舉玄沙築著脚指話遂大悟出世住南明遷薦福末領烏巨上堂會即便會玉本無瑕若言不會碓𭪿生華試問九年面壁何如鷲嶺拈華南明恁麼商確也是順風撒沙參上堂雲籠嶽頂百鳥無聲月隱寒潭龍珠自耀正當恁麼時直得石梁忽然大悟石洞頓爾心休虗空開口作證溪北石僧點頭諸人總在者裡瞌睡笑殺陝府鐵牛上堂佛說三乘十二分頓漸偏圓痴人面前不得說夢祖師西來直指人心見性成佛痴人面前不得說夢臨濟三玄洞山五位雲門三句痴人面前不得說夢南明恁麼道還免得遭人檢責麼良久曰石人機似汝也解唱巴歌汝若似石人雪曲也應和還有和得雪曲底麼若有喚來與老僧洗脚上堂通身是口說得一半通身是眼用得一橛用不到處說有餘說不到處用無盡所以道當用無說當說無用用說同時用說不同時諸人若也擬議西峰在你脚底上堂句亦剗意亦剗絕毫絕釐處如山如嶽句亦到意亦到如山如嶽處絕毫絕釐忽若拶通一線意句俱到俱不到俱剗俱不剗直得三句外絕牢籠六句外無標的正當恁麼時一句作麼生道傾葢同途不同轍相將携手上高臺上堂趙州道老僧除却二時齋粥是雜用心處烏巨今朝六月旦行者擊鼓長老陞堂你諸人總來者裡雜用心上堂舉僧問雲門如何是驚人句門曰響師曰雲門答者僧話不得便休為甚麼却來鼓粥飯氣以當平生上堂黃梅雨麥秋寒恁麼會太無端時節因緣佛性義大都須是髑髏乾示眾舉璣問僧禪以何為義眾下語皆不契璣自代云以謗為義師曰三世諸佛是謗西天二十八祖是謗唐土六祖是謗天下老和尚是謗諸人是謗山僧是謗於中還有不謗者麼談玄說妙河沙數爭似雙峰謗得親示疾次門弟子教授汪喬年至師以後事委之示以偈曰識則識自本心見則見自本性識得本心本性正是宗門大病復曰爛泥中有刺莫道不疑好黎明沐浴更服跏趺而逝闍維煙所至處纍然皆五色舍利齒舌不壞塔於寺西撫州府白楊法順禪師綿州文氏子依止佛眼聞眼普說舉傅大士心王銘云水中鹽味色裡膠青決定是有不見其形師於言下有省後觀寶藏迅轉頓明大法趨丈室作禮呈偈曰頂有異峰雲冉冉源無別派水冷冷游山未到山窮處終被青山礙眼睛眼笑而可之住後上堂好事堆堆疊疊來不須造作與安排落林黃葉水推去橫谷白雲風卷回寒雁一聲情念斷霜鐘纔動我山摧白楊更有過人處盡夜寒爐撥死灰忽有箇衲僧出來道長老少賣弄得恁麼窮乞相山僧祇向他道却被你道著上堂我手何似佛手天上南星北斗我脚何似驢脚往事都來忘却人人盡有生緣箇箇足方頂圓大愚灘頭立處孤月影射深灣會不得見還難一曲漁歌過遠灘示眾染緣易就道業難成不了目前萬緣差別祇見境風浩浩凋殘功德之林心火炎炎燒盡菩提之種道念若同情念成佛多時為眾如為己身彼此事辦不見他非我是自然上敬下恭佛法時時現前煩惱塵塵解脫上堂鷄啼曉月狗吠枯樁只可默會難入思量看不見處動地放光說不到處天地玄黃撫城尺六狀紙元來出在清江大眾分明話出人難見昨夜三更月到牕上堂風吹茆茨屋脊漏雨打闍黎眼睛溼恁麼分明却不知却來者裡低頭立因病示眾久病未甞推木枕人來多是問如何山僧據問隨緣對窓外黃鸝口更多只如七尺之軀甚處受病眾中具眼者試為山僧指出看眾下語皆不契師自拊掌一下作嘔吐聲又曰好箇木枕子師律身清苦出入唯杖笠獨行示寂闍維收舍利目睛齒舌數珠同靈骨塔于寺西南康府雲居法如禪師丹丘胡氏子依護國瑞祝髮登具徧參諸老晚至龍門以平日所證白佛眼眼曰此皆學解非究竟事欲了生死當求妙悟師駭然一日命主香積以道業未辦固辭眼勉曰姑就職其中大有人為汝說法未幾晨興開廚門望見聖僧忽契證趨白佛眼眼曰者裡還見聖僧麼師詣前問訊叉手立眼曰向汝道大有人為汝說法住後上堂一法若有毗盧墮在凡夫萬法若無普賢失其境界向者裡有無俱遣得失兩亡直得十方世界三世諸佛總不可得見前諸人且道十二時中向甚麼處安身立命披蓑側立千峰外引水澆蔬五老前上堂乾坤之內宇宙之間中有一寶秘在形山雲居又且不然乾坤之內宇宙之間中有一寶擲下拄杖曰大眾也須識取南康府歸宗真牧正賢禪師潼川陳氏子世為名儒幼從三聖澄為苾芻具戒游成都依大慈秀習經論過目成誦義亦頓曉秀稱為經藏子出蜀扣佛眼一日入室眼舉殷勤抱得栴檀樹語聲未絕師頓悟眼曰經藏子漏逗了也因手書真牧二字授之紹興己巳出住歸宗上堂且第一句如何道汝等若向世界未成時父母未生時佛未出世時祖師未西來時道得已是第二句且第一句如何道直饒你十成道得未免左之右之卓拄杖下座上堂良久召大眾曰者裡作麼生若也擬議賢上座謾你諸人去也打地和尚瞋他秘魔巖主擎箇叉兒胡說亂道遂將一摑成韲粉散在十方世界還知麼舉拂子曰而今却在拂子頭上說一切智智清淨無二無二分無別無斷故還聞麼閻老子知得乃曰賢上座你若相當去不妨奇特或不相當總在我手裡却向他道閻老子你也退步摸索鼻孔看擊禪牀下座僧問久默斯要已泄真機學人上來請師開示師曰耳朵在甚麼處曰一句分明該萬象師曰分明底事作麼生曰台星照臨枯木回春師曰換却你眼睛湖州府吉安州道場正堂明辯禪師本郡俞氏子幼事報本蘊圓顱受具後謁諸方至少林聞僧舉佛眼以古詩發明師子尊者被難話曰楊子江頭楊柳春楊華愁殺渡江人一聲羗笛離亭晚君向瀟湘我向秦師默有所契即趨龍門求入室佛眼問從上祖師方𠕋因緣許你會得忽舉拳曰者箇因何喚作拳師擬對眼築其口曰不得作道理於是頓去知見住後上堂猛虎口邊拾得毒蛇頭上安排更不釘樁搖艣回頭別有生涯婆子被我勘破了大悲院裡有村齋上堂淨五眼湧金春色晚得五力吹落桃華碧唯證乃知難可測卓拄杖曰一片何人得流經十萬家上堂三祖道但莫憎愛洞然明白當時老僧若見便與一摑且道是憎邪是愛邪近來經界稍嚴不許詭名挾佃解制上堂十五日已前不得去少林隻履無藏處十五日已後不得住桂子天香和雨露正當十五日又且如何阿呵呵風流不在著衣多上堂舉僧問投子大死底人却活時如何子曰不許夜行投明須到師曰我疑千年蒼玉精化為一片秋水骨海神欲護護不得一旦鰲頭忽擎出上堂華開隴上柳綻堤邊黃鶯調叔夜之琴芳草入謝公之句何必聞聲悟道見色明心非唯水上覓漚已是眼中著屑擘開胸曰汝等當觀吾紫磨金色之身今日則有明日則無大似無風起浪全不知羞且道今日事作麼生好箇迷逢達磨不知誰解承當僧問如何是佛師乃鳴指三下問語默涉離微如何通不犯師曰橫身三界外獨脫萬機前曰祇如風穴道長憶江南三月裡鷓鴣啼處百華香又作麼生師曰說者箇不唧𠺕漢作麼曰嫰竹搖金風細細百華鋪地日遲遲師曰你向甚麼處見風穴曰眼裡耳裡絕瀟灑師曰料掉無交涉問如何是佛師曰無柴猛燒火曰如何是法師曰貧做富裝裹曰如何是僧師曰賣扇老婆手遮日曰如何是和尚栗棘蓬師曰不答此話曰為甚麼不答師大笑曰吞不進吐不出問蓮華未出水時如何師曰未過冬至莫道寒曰出水後如何師曰未過夏至莫道熱曰出與未出時如何師曰三十年後不要錯舉問如何是一喝如金剛王寶劍師曰古墓毒虵頭戴角曰如何是一喝如踞地師子師曰虗空笑點頭曰如何是一喝如探竿影草師曰石人拍手笑呵呵曰如何是一喝不作一喝用師曰布袋裡猪頭曰四喝已蒙師指示向上還有事也無師曰有曰如何是向上事師曰鋸解秤鎚隨聲便喝佛眼忌拈香龍門和尚闡提潦倒不信佛法滅除禪道拶破毗盧向上關貓兒洗面自道好一炷沈香爐上然換手搥胸空懊惱遂搖手曰休懊惱以坐具搭肩上作女人拜曰莫怪下房媳婦觸忤大人好室中垂問曰猫兒為甚麼愛捉老鼠又曰板鳴因甚麼狗吠師家風嚴冷初機多憚之有達磨贊曰昇元閣前懡㦬洛陽峰畔乖張皮髓傳成話隻履無處埋藏不是一番寒徹骨爭得梅華樸鼻香雪堂行見曰先師猶有此人在只消此贊可以坐斷天下人舌頭由是衲子奔湊臨終登座拈拄杖於左邊卓一下曰三十二相無此相於左邊卓一下曰八十種好無此好僧繇一筆畵成誌公露出草稿又卓一下顧大眾曰莫懊惱直下承當休更討下座歸方丈趺坐儼然而逝火後收靈骨設利藏所建之塔曰僊人山長沙府方廣深禪師僧問一法若有毗盧墮在凡夫萬法若無普賢失其境界未審意旨如何師曰富嫌千口少貧恨一身多世寄首座者成都人遍依師席晚造龍門一日燕坐瞌睡間群蛙忽鳴誤聽為淨髮版響亟趨往有曉之者曰蛙鳴非版也師恍然詣方丈剖露佛眼曰豈不見羅睺羅師遽止曰和尚不必舉待去自看未幾有省乃占偈曰夢中聞版響覺後蝦䗫啼蝦䗫與版響山嶽一時齊由是益臻玄奧眼命分座師固辭曰此非細事也如金針刺眼毫髮若差睛則破矣願生生居學地而自煅煉眼因以偈美之曰有道只因頻退步謙和元自慣回光不知已在青雲上猶更將身入眾藏暮年學者力請不容辭後因說偈曰諸法空故我心空我心空故諸法同諸法我心無別體祇在而今一念中且道是那一念眾罔措師喝一喝而終溫州府淨居尼慧溫禪師上堂舉法眼示眾曰三通鼓罷簇簇上來佛法人事一時周畢師曰山僧道三通鼓罷簇簇上來拄杖不在苕帚柄聊與三十給事馮楫濟川居士自壯扣諸名宿最後造龍門從佛眼再歲一日同眼經行法堂偶童子趨庭吟曰萬象之中獨露身眼拊公背曰好聻公於是契入紹興丁巳除給事會大慧就明慶開堂慧下座公挽之曰和尚嘗言不作者蟲豸今日因甚麼又在者裡慧曰盡大地是箇杲上座又作麼生公擬對慧便掌公曰是我招得越月特丐祠坐夏徑山榜其室曰不動軒一日慧陞座拈藥山參石頭及馬祖公案罷公隨至方丈曰適來和尚所舉底因緣某有個會處慧曰你如何會公曰恁麼也不得囌嚧娑婆訶不恁麼也不得㗭唎娑婆訶恁麼不恁麼總不得囌嚧㗭唎娑婆訶慧印以偈曰梵語唐言打成一塊咄哉俗人得此三昧後知卭州所至宴晦無倦嘗自詠曰公事之餘喜坐禪少曾將脇到牀眠雖然現出宰官相長老之名四海傳紹興廿三年癸酉秋乞休政預報親知期以十月三日報終至日令後廳置高座見客如平時至辰巳間降堦望關肅拜請漕使攝卭事著僧衣履踞高座囑諸官吏及道俗各宜向道扶持教門建立法幢遂拈拄杖按膝蛻然而化漕使請曰安撫去住如此自由何不留一頌以表罕聞公張目索筆書曰初三十一中九下七老人言盡龜哥眼赤竟爾長往先是建炎後名山巨剎教藏多不存公累以己俸印施凡一百二十八藏用祝君壽以康兆民門人蒲大聘嘗誌其事有語錄頌古行世開福寧禪師法嗣長沙府大溈月菴善果禪師信州余氏子上堂奚仲造車一百輻拈却兩頭除却軸以拄杖打一圓相曰且莫錯認定盤星卓一卓下座謝供頭上堂解猛虎頷下金鈴驚群動眾取蒼龍穴裡明珠光天照地山僧今日到此讚歎不及汝等諸人合作麼生竪起拂子曰眨上眉毛速須薦取擲拂子下座上堂心生法亦生心滅法亦滅心法兩俱忘烏龜喚作鼈諸禪德道得也未若道得道林與你拄杖子其或未然歸堂喫茶去僧問達磨九年面壁意旨如何師曰魚行水濁曰二祖禮三拜為甚麼却得其髓師曰地肥茄子大曰祇如一華開五葉結果自然成明甚麼邊事師曰賊以贓為騐曰有時乘好月不覺過滄洲師曰闍黎無分問有句無句如藤倚樹時如何師曰驗盡當行家曰樹倒藤枯句歸何處又作麼生師曰風吹日炙曰嬾安呵呵大笑聻師曰波斯讀梵字曰今日足見老師七通八達師曰仰面哭蒼天僧禮拜師曰過問蓮花未出水時如何師曰乾坤無異色曰出水後如何師曰徧界有清香大隨靜禪師法嗣重慶府釣魚山護國寺石頭自回禪師東川合州人世為石工雖不識字志慕空宗每從人口授法華能誦之棄家投大隨供掃灑取崖石手不釋鎚鑿而誦經不輟隨見而愍之令看趙州勘婆因緣久之因鑿石稍堅盡力一鎚瞥見火光電迸忽然省徹走至方丈禮拜呈頌曰用盡工夫渾無巴鼻火光迸散元在者裡復獻趙州勘婆頌曰三軍不動旗閃爍老婆正是魔王脚趙州無柄鐵掃帚掃蕩煙塵空索索隨忻然可之曰子徹也遂授以僧服人以其嘗為石工故稱回石頭有頌曰石頭和尚咬嚼不入打破虗空露些子跡既而歸釣魚山建護國禪林化道彌著上堂參禪學道大似井底呌渴殊不知塞耳塞眼回避不及且如十二時中行住坐臥動轉施為是甚麼人使作眼見耳聞何處不是路頭若識得路頭便是大解脫場方知老漢共山河大地與你證明所以道十方薄伽梵一路涅槃門諸仁者大凡有一物當途要見一物之根源見得根源源無所源所源既非何處不圓諸禪德老漢亦無甚麼勝你處諸人又有甚麼不如老漢處還會麼太湖三萬六千頃月在波心說向誰下座嘗自甃石二十四片為龕一日別眾自入掩門而逝潼川州護聖愚丘居靜禪師成都楊氏子年十四禮白馬安慧為師參南堂堂舉香嚴枯木裡龍吟話往返酬詰師於言下大悟一日堂問曰莫守寒巖異草青坐却白雲宗不妙汝作麼生師曰直須揮劍若不揮劍漁父棲巢堂矍然曰者小廝兒師珍重便行出住東巖上堂月生一東巖乍住增愁𡧯紅塵世路有多端米麵倉儲無顆粒崖為伴泉為匹颯颯清風來滿室山神土地暗中忙雲版鐘魚偷淚滴人世莫道守空巖亦有東籬打西壁嘗謂眾曰參學至要不出先南堂道最初句及末後句透得過者一生事畢儻或未然更與你分作十門各各印證自心還得穩當也未一須信有教外別傳二須知有教外別傳三須會無情說法與有情說法無二四須見性如觀掌中物了了分明一一田地穩密五須具擇法眼六須行鳥道玄路七須文武兼濟八須摧邪顯正九須大機大用十須向異類中行凡欲紹隆法種須盡此綱要方坐得者曲彔牀子受得天下人禮拜敢與佛祖為師若不到恁麼田地祇一向虗頭他時異日閻老子未放你在間有學者各門頌出呈師師以頌示曰十門綱要掌中施機會來時自有為作者不須排位次大都首末是根基成都府簡州南巖勝禪師上堂召眾曰護生須是殺殺盡始安居會得箇中意分明在半途且道到家一句又作麼生釋迦彌勒沒量大看來猶祇是他奴僧問放行五位即不問把定三關事若何師曰橫按鏌鎁全正令曰把定三關蒙指示放行五位事如何師曰大平寰宇斬痴頑曰恁麼則南巖門下土曠人稀師曰靈利衲僧祇消一點問自古自今同生同死時如何師曰家賊難防曰今日學人小出大遇去也師便打曰須是老僧打你始得僧禮拜師曰切忌詐明頭常德府梁山廓菴師遠禪師合州魯氏子上堂舉楊岐三脚驢子話乃召眾曰揚其湯者莫若撲其火壅其流者莫若杜其源智人明鑒佛法至論無出斯也者因緣如今叢林中提唱者甚多商量者不少有般底祇道宗師家無固必凡有所問隨口便答似則也似是即未是若恁麼祇作箇乾無事會不見楊岐用處乃至祖師千差萬別方便門庭如何消遣又有般底祇向佛邊會却與自己沒交涉古人道凡有言句須是一一消歸自己又作麼生又有般底一向祇作自己會棄却古人用處唯知道明自己事古人方便却如何消遣既消遣不下却似抱橋柱澡洗要且放手不得此亦是一病又有般底却去驢脚多少處會若恁麼會病最難醫也所以他語有巧妙處參學人卒難模索纔擬心則差了也前輩謂之楊岐宗旨須是他屋裡人到恁麼田地方堪傳授若不然者總是守死善道直須是箇透頂徹底漢方能了得自餘禪和子莫道會不得即天下出世為人稱宗師底亦少有會得者若要會去須向威音那畔空劫已前輕輕一提起便行捺著便轉却向萬仞峰前進一步可以籠古今坐斷天下人舌頭如今還有恁麼者麼有則出來道道看如無更聽一頌三脚驢子弄蹄行直透威音萬丈坑雲在嶺頭閒不徹水流㵎下太忙生上堂天得一以清地得一以寧君王得一以治天下者箇說話是家常茶飯須知衲僧家別有奇特處始得且道衲僧門下有甚奇特處天得一斗牛女虗危室壁地得一萬象森羅及瓦礫君王得一上下四維無等匹且道衲僧得一時如何笑看客從何處來閒持經卷倚松立浴佛上堂舉藥山浴佛公案拈云者僧問處依稀越國髣髴揚州藥山答來眼似流星機如掣電點檢將來二俱不了若是山僧即不然當時纔見問只浴得者箇且不浴得那箇但轉木杓柄與伊待他擬議之間攔面便潑藥山縱有大神通大智慧也無施展處敢問大眾者箇即且置喚甚麼作那箇下座佛殿燒香為你說破師有十牛圖并頌行于世嘉定州能仁默堂紹悟禪師結夏上堂最初一步十方世界現全身末後一言一微塵中深鎖斷有時提起如倚天長劍光耀乾坤有時放下似紅爐點雪虗含萬象得到恁麼田地天魔外道拱手歸降三世諸佛一時稽首便可以大圓覺為我伽藍於一毫端現寶王剎朝往西天暮歸東土亦是禁足百花叢裡坐婬坊酒肆行亦是禁足雖然不僧動著者裡一步所以道九旬無虗棄之功百劫有今時之用堪報不報之恩以助無為之化敢問大眾作麼生得到者田地去良久拍案曰如人上山各自努力上堂舉趙州訪二菴主公案頌曰一重山盡一重山坐斷孤峰子細看霧卷雲收山嶽靜楚天空濶一輪寒成都府彭縣土溪智陀子言菴主綿州人初至大隨聞舉石頭示眾偈倐然有得歸隱土溪懸崖絕壑間有石若蹲異獸師鑿以為室中發異泉無涸溢四眾訝之居三十年化風盛播室成日作偈曰一擊石菴全縱橫得自然清涼無暑氣涓潔有甘泉寬廓含沙界寂寥絕眾緣箇中無限意風月一牀眠保寧府劍門南修道者淳厚之士也自大隨一語契投服勤不怠歸謁崇化贇坐次贇以宗門三印問之南曰印空印泥印水平地寒濤競起假饒去就十分也是靈龜曳尾莫將尚書字少虗家世豫章分寧因官西蜀謁南堂咨決心要堂使其向好處提撕適如廁俄聞穢氣急以手掩鼻遂有省以偈呈曰從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來元在鼻尖頭堂答曰一法纔通法法周縱橫妙用更何求青虵出匣魔軍伏碧眼胡僧笑點頭龍圖王蕭居士字觀復留昭覺日聞開靜版聲有省問南堂曰某有箇見處纔被人問却開口不得未審過在甚處堂曰過在有箇見處堂却問朝斾幾時到任公曰去年八月四日堂曰自按察幾時離衙公曰前月二十堂曰為甚麼却道開口不得公乃契悟五祖自禪師法嗣黃州府蘄州龍華高禪師上堂象王行師子住赤脚崑崙眉卓竪寒山拾得笑呵呵指點門前老松樹且道他指點箇甚麼忽然風吹倒時好一堆柴
