body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十五世伏龍長禪師法嗣蘇州府鄧尉萬峰時蔚禪師溫州樂清金氏子襁褓中見僧輒微笑合掌十六得度十九至杭受具戒參虎跑止巖巖令參不是心不是佛不是物話抵明州達蓬山佛趾寺側卓菴晝夜力參一日聞寺主舉溈山踢倒淨瓶話驀地觸發說偈曰顛顛倒倒老南泉纍我工夫費半年當日有人親在側如何不進劈胸拳遂往謁無見於華頂見囑師住山仍返達蓬單丁十載後造千巖巖曰將甚麼來與老僧相見師竪起拳曰者裡與和尚相見巖曰死了燒了向何處安身立命師曰漚生漚滅水還在風息波平月印潭巖曰莫要請益受戒麼師掩耳而出明日普請砍松次師拈圓石作獻珠狀曰請和尚酬價巖曰不直半文錢師曰瞎巖曰我也瞎你也瞎師曰瞎瞎即呈偈曰龍宮女子將珠獻價直三千與大千却被傍觀人抉破誰知不直半文錢巖謂左右曰蔚山主頗有衲僧氣息遂命居第一座一日巖升座舉無風荷葉動決定有魚行語師出衆震聲一喝拂袖便出乃卓菴於蘭溪之嵩山凡九載巖寄以偈曰鬱鬱黃花滿目秋白雲端坐碧峰頭無賓主句輕拈出一喝千江水逆流三為手書招之愛重彌至旋𢍁以法衣頂相僧問如何是嵩山境師曰四面好山擎日月一湖秋水浸青天曰如何是境中人師曰三仙描不就終不與君傳問如何是目前事師曰眉毛眼上橫曰莫是他安身立命處也無師曰錯認定盤星二僧參師問那裡來僧曰隴西師曰我聞隴西有鸚鵡是否僧曰是師曰還會吟詩作賦麼僧曰會師曰會吟甚麼詩試道看僧無對師便打曰妄語漢汝不從隴西來第二位道看僧作舞勢師曰似即似爭奈口口不同自代曰上大人丘乙己開堂拈香畢乃曰千聖難明不了因遞代相傳古到今今日嵩山重舉似鐵樹華開別是春向無影樹下打眠宏開飯店於虗空背上經行大闡宗乘塵塵剎剎全彰物物頭頭合轍擊碎魔王窠臼斷送衲子命根不作奇特商量不作玄妙解會直得淨名杜口共贊升平巖頭密啓咸宣至化正與麼時祝聖報恩一句作麼生道一片精光輝宇宙直教萬國奉君恩上堂舒兩手曰大開方便門便從者裡入復握拳曰閉却牢關說家裡話且道不開不閉一句又作麼生斂僧伽黎便下座上堂三世諸佛如是說歷代祖師如是說天下老和尚如是說嵩山亦如是說若有不如是說者與他三十棒若有如是說者亦與他三十棒何故卓拄杖曰嵩山門下令不虗行上堂月頭是初一光明漸漸出月尾是三十光明何處覓假饒老釋迦也道拈不出拈得出萬事畢有人道得出來道看如無嵩山與諸人露箇消息展兩手曰我見燈明佛本光瑞如此後遊姑蘇鄧尉喜其山水盤結遂駐錫焉未幾四衆咸集成大伽藍名曰聖恩明洪武辛酉正月二十九日集衆曰老僧時節至矣即說偈曰七十九年一味杜田懸崖撒手杲日當天語畢泊然而寂奉全身瘞於院西岡塔曰永光世壽七十九僧臘六十松江府華亭松隱唯菴德然禪師里之張氏子幼從無用貴祝髮遍叩諸方未有所契後於千巖會中聞上堂語豁然悟入石屋珙謂師曰子緣當在華亭因書松隱二字授之於是歸里築室於郭匯之陽遂名松隱足不踰閫者三載嘗刺血書華嚴有天華滿庭之異感居民為建寶坊洎千巖遷化衆請繼席開堂日僧問遠離松水來據龍峰海衆臨筵請師祝聖師曰萬年松在祝融峰曰祝聖已蒙師指示列祖家風事若何師曰冬到寒食一百五曰莫便是和尚為人處也無師曰斧頭是鐵作曰恁麼則龍門無宿客也師曰早已點額曰若不登樓望焉知滄海深師曰你道老僧眉毛有幾莖曰一堂風冷淡千古意分明師曰蹉過不少問承古有言向上一路千聖不傳還端的也無師曰那裡得者消息來曰賣金須遇買金人師便喝曰金屑雖貴落眼成翳又作麼生師曰好向繡湖湖上看月明夜夜散金波曰三十年後此話大行師曰杜撰禪和如麻似粟曰大衆證明學人體拜師乃曰第一義諦已被東白和尚一槌擊碎了也未免向第二義門露箇消息山僧數年搓得一條龜毛索子今日拈來將三世諸佛西天四七東土二三天下老和尚鼻孔一串穿却且道山河大地草木叢林森羅萬象有情無情甚處得來良久曰莫將閒學解埋沒祖師心復舉三聖道我逢人則不出出則便為人興化道我逢人則出出則不為人師曰者兩箇老漢同門出入宿世冤家人一向孤峰頂上臥月眠雲一人向十字街頭揚塵簸土點檢將來二俱漏逗各與三十拄杖且道新龍峰與麼提持是賞渠是罰渠驀拈拄杖卓一卓曰天上有星皆拱北世間無水不朝東上堂日可冷月可熱衆魔不能壞真說有來由無途轍六月炎炎撒氷雪文殊無處著渾身普賢特地呈醜拙是真說非真說若無閒事挂心頭便是人間好時節喝一喝謝藏主維那上堂天無門地無戶俊快衲僧一任來去藏裡摩尼照徹十方洞裡桃花千葩競吐假劫外之春風應今時之律呂海神夜半看鮫珠眼光挂在扶桑樹喝一喝結制上堂暖氣相接正在斯時深深冷灰裡撥著星兒之火向死柴頭上發機燎起互天烈焰燒却舜若多神面皮敢問諸人作麼生回避擲拄杖下座上堂達磨西來不立文字直指人心見性成佛大衆作麼生說箇見性成佛底道理良久曰幸是無瘡勿傷之也結制上堂蠟人為驗始於今日九十日中推功辨的黃面老瞿曇結住布袋頭百萬人天咸皆受屈松隱結制總不恁麼以手作搖櫓勢曰山僧即今駕無底鐵船普請大衆同入大圓覺海遊戲去也喝一喝曰看取定南針歲旦上堂元正啓祚萬物咸亨驀拈拄杖曰拄杖子昨夜抽條今朝吐蕊花開五葉香遍大千且道還當得新年頭佛法也無卓拄杖一下喝一喝臘八上堂明星一見出山來剛道娘生兩眼開不是髑髏乾得盡爭知春色上桃腮上堂德山棒臨濟喝拈放一邊諸人腳跟下道將一句來以拄杖畫一畫曰毗婆尸佛早留心直至如今不得妙示衆佛是衆生界中了事漢衆生是佛界中不了事人若欲決了此事但向十二時中四威儀內折旋俯仰與人酬酢處看是甚麼道理忽爾妄想滅知見忘突出自家一段光明洞徹十虗無絲毫隔礙始知佛與衆生本性平等一身清淨多身清淨一世界清淨多世界清淨無一塵不是真如境界無一剎不是解脫道場所以永嘉道一月普現一切水一切水月一月攝諸佛法身入我性我性同供如來合斯言豈欺我哉示醫士話頭一則耆婆藥大藏諸經和劑方抹過二途開口笑不勞針砭起膏肓化燈油劫初一點光明種猛烈工夫拶出來瀉入碧琉璃裡去三千諸佛笑顏開洪武初以有道徵未幾以病還嘗曰學佛法人無徒恃見地一知半解濟得何事顧力行何如耳戊辰四月十四示寂塔全身於松隱金華府清隱蘭室德馨禪師義烏方氏子年二十五投伏龍祝髮執侍數載始遍參諸方久之歸覲千巖至正壬辰乃結茅城西榜曰清隱會巖遷化後出主聖壽蘇平仲嘗過訪寒溫外不措一辭蘇曰千巖老師見客口如懸河師今默然何也師曰道無隱顯焉有語默昔吾先師未嘗不言然而未嘗言今吾未嘗言然而未嘗不言也蘇乃擊節稱賞洪武壬子十一月十四日示微疾集衆訣別端坐而逝留龕七日顏色如生茶毗五色舍利無數世壽七十僧臘四十有六杭州府天龍水菴無用守貴禪師婺州甄氏子十八歲投康侯山芟染泰定間遊逝西適千巖居龍華師叩之默有所契龍華去天龍密邇大道平力圖起廢挽師與巖主之會巖去義烏師與俱焉至正丙戌謁中峰羣疑頓釋旋居嘉禾一夕夢大道曰我已棄人間世師驚疑拏舟訪之由是復主天龍辛丑八月一日忽索筆書偈曰一蝸臭殼內外穢惡撒手便行虗空振鐸天龍一指今猶昨擲筆而逝行省丞相達識鐵木爾為主後事築慈濟堂院於天龍西岡奉全身瘞焉師生平不畜長物寒暑一衲律身甚嚴嘗墮一齒弟子函櫝中生舍利五色世壽七十有二僧臘五十有五金華府華山明叟昌菴主浦江人縛茅里之華山往謁千巖巖示以入道旨要旋歸晝夜孳孳不怠一日忽辭衆說偈曰生本無生滅亦無滅撒手便行長空片月語畢端坐而逝時洪武丙辰十月三日也江寧府天王山般若法秀禪師嘗居婺之聖壽為第一座元大德末棲遲此山至正甲午明洪武主渡江單騎入山與話相契時遣繆總制者送供焉師久之遊廬山莫知所之而所居佛龕亦蕪矣洪武丁卯上憶其事詔工部侍郎黃立恭諭之曰然渡江來曾謁法秀禪師與語卓有識見今其亡矣爾可選一辦道僧即舊地重新創建一菴以見朕意立恭乃舉僧紹義引見受命而去于其山蓮菂上立菴賜名般若禪院左春坊鄒濟作般若禪院記紀其事甚詳高仰友禪師法嗣鎮江府金山慈舟濟禪師西竺作禮曰某甲拏得賊來請和尚決斷師曰贓存甚麼處竺拍案一下師往復徵詰復曰諸佛不說列祖不傳除却搖脣鼓舌瞚目揚眉還我到家一句來竺默然師曰去聖時遙尚有此子善自護持一峰寧禪師西竺呈見解師為勘驗示偈曰青山疊疊雨濛濛師子金毛撥不鬆我也自知時未至十回放箭九回空白蓮安禪師法嗣湖州府碧巖空谷景隆禪師姑蘇洞庭黿山陳氏子初見懶雲後於虎丘禮石菴祝髮會菴遷靈隱師相隨七載因往天目禮祖塔憩錫歲餘忽有省入還懶雲雲為助喜後住碧巖僧問如何是佛法的的大意師曰此問最親切曰覿露堂堂時如何師曰途路未為真曰南人如問雪我道是楊花師曰喚鐘作甕又爭得晚年於西湖修吉山卜地為生壙築室以居名曰正傳塔院復自製塔銘其略曰嗚呼死生一夢骨塔奚為蓋表佛法流芳靈蹤不斷即幻明真以致佛祖命脈源遠流長矣幻身雖滅佛性不遷後之來者見窣堵峻嶒峰巒蒼翠鳥鳴喬木泉瀉幽巖不馳外境不執內心盡忘愛惡陶然泰和始知法界為身虗空為口萬象為舌晝夜說法未嘗間歇於此見得明透得徹如醉忽醒廓然領悟便見佛祖不曾涅槃老僧不曾圓寂大圓鏡中覿面相見西來祖意兩手分付如古師嗣雲門青師嗣太陽無前後無去來大千沙界自他不隔於毫端十世古今始終不離於當念懶雲和尚是景隆受業師之受業師景隆心法受印可於懶雲即南極安禪師也得臨濟正傳二十世上泝天真則無極源雪巖欽前後嗣法亦無定規理貫古今詣實為至銘曰廓周法界空蕩無涯群靈升墜恆無已時佛祖垂應為導為師宿膺微幸值斯化儀不善弘道隨力所宜卒於武林骨窆山崖窣堵奠安山同壽期以幻歸幻有為無為成住壞空斯道坦夷正統八年癸亥春景隆五十二歲其所著有空谷集尚直尚理編福林度禪師法嗣江寧府天界古䂐俊禪師姑蘇松陵人年十三投越州日鑄寺出家十五祝髮受具戒首謁石屋珙次見三衢懶牧得禪定工夫復往叩古梅於高仰禮拜起依實供通梅打趂出如是三度被打遂結伴歸里立限壁觀九年每三年燃一指歷燃三指一日忽然瞥地乃往參福林法戰相契遂留首衆時年二十八矣衆推出世師遁跡出山留偈曰半載相依唱祖機幾番談道奉嚴威出山便說歸時路又是重添眼上眉韜光巖壑三十餘年有平生最愛隈巖谷三十年來懶送迎之句洪武間奉旨剃度千僧至繁昌衆請東廬山開堂示衆禪之一字亦是強名云何曰參在信而已擬議即乖開口即錯若是發心不真志不猛利者邊經冬那邊過夏今日進前明日退後久久摸索不著便道佛法無靈驗却向外邊記一肚抄一部如臭糟甕相似是者般野狐精直饒到彌勒下生有甚交涉真正道流若要脫生死須透祖師關祖關透生死脫不是說了便休要將從上諸祖做箇樣子趙州四十年不雜用心為甚麼事長慶坐破蒲團七箇為甚麼事香林四十年方成一片為甚麼事乃至歷代真實履踐尅苦勵志為甚麼事山僧今日口喃喃地引古驗今為甚麼事諸禪德既有從上不惜身命積功纍德妙悟親證底樣子何不發大勇猛起大精進對三寶前深發重願若生死不明祖關不透誓不下山如是發頭截斷千差路頭不與萬法為侶向長連牀上七尺單前高挂囊壁立千仞寬立限期急下手腳盡此一生做教徹去若辦此心決不相賺我今為汝保任此事終不虗也永樂丁亥復奉旨于天界終老焉大鑑下第二十六世鄧尉蔚禪師法嗣蘇州府鄧尉山寶藏普持禪師萬峰付偈曰大愚肋下痛還拳三要三玄絶正偏臨濟窟中獅子子燈燈續𦦨古今傳後繼席聖恩為第二代虗白參師問心不是佛智不是道汝云何會白向前問訊叉手立師呵曰汝在此許多時還作者見解白乃發憤至第二夜大徹師示寂後塔于萬峰之側武昌府九峰無念勝學禪師隨州應山陳氏子九歲從本州寶林緣受業初謁無聞聞示以高峰一歸何處話遂入嵩山苦心研究一日有省述偈有萬象全彰一鏡中之句乃奮志遍參後抵姑蘇見萬峰于喝下領旨峰付偈曰五派傳來臨濟宗入門一喝露全鋒老婆心切能容易試看泥蛇化作龍後住九峰明洪武壬戌孝慈皇后賓天楚王聘諸山名衲集於洪山見師驚異特留邸館請問法要上召見便殿賜坐應對稱旨禮遇優渥欲留主京剎師力辭命中官送還九峰丙子御製懷僧無念詩文一軸命中官賫送諭慰彌至敕曰前者僧無念戒行精於皎月定慧穩若巍山暫來一見此去常懷懷之不已遣人就見特以松實松華供之兼以詩文勞之師亦以偈進曰萬機之暇究真玄百草頭邊大有禪毛孔遍含塵剎土毫端現出性中天定回坐看雲橫谷行樂閒觀石湧泉林下衲僧何以報祝延聖壽萬斯年中官回奏上大悅永樂甲申一日集衆說偈曰世尊七十九無念八十年踏翻華藏海依舊水連天泊然而逝奉全身塔於師子巖諡清福廣慧禪師杭州府東明海舟普慈禪師蘇州常熟錢氏子幼出家破山聽楞嚴至但有言說都無實義處有疑往參萬峰問但有言說都無實義如何是實義峰劈頭兩棒欄胸一踏踢兩踢曰只者是實義師起曰是即是太費和尚心力峰然之嗣以偈付之曰龜毛付囑與兒孫兔角拈來問要津一喝耳聾三日去箇中消息許誰親復囑曰子當匿跡護持莫輕為人師範師領旨結廬洞庭山塢二十九年一日過訪東明明曰和尚曾見甚人師曰見即見一人說出恐驚人明曰但說何妨師曰萬峰明與論宗旨喜甚乃曰東明一席敢煩和尚相繼也慧旵不出月亦去也明至二十八辭衆草九夜示寂當正統辛酉六月也師欲歸洞庭衆堅請乃繼其席上堂舉僧問睦州一言道盡時如何州曰老僧在你囊裡師曰者僧如出林虎被睦州收入重網深坑裡埋却了也時有僧問未審那裡是他重網流坑處師曰你禮拜著僧拜起理前問師哭曰我爺㖿我娘㖿僧罔措師直打出上堂舉僧問智門如何是般若體門曰蚌含明月曰如何是般若用門曰兔子懷胎師曰古人如此問答饒你通身是眼也覷不見通身是手也摸不著還委悉麼以拂作圓相曰一念不生全體現六根才動被雲遮舉雪峰因僧禮拜起峰打五棒僧曰某甲有甚麼過峰又打五棒師拈曰前是殺人刀後是活人劍無奈者僧不悟若悟管教雪峰喫拳有分舉黃檗見趙州來便閉却方丈門州入法堂呌曰救火救火檗開門捉住曰道道州曰賊過後張弓話頌曰一擒一縱兩施能戟去鎗來展大勳彼此機關誰識得至今疑殺李將軍舉巴陵示衆祖師道不是風動不是幡動既不是風幡向甚處著有人與祖師作主出來與巴陵相見頌曰商鞅立法太嚴酷連纍鄰人膽寒如有縱橫無犯者秦王高拱樂函關舉趙州訪茱萸才上法堂萸便曰看箭州亦曰看箭萸曰過州曰中頌曰季春芣苡生前徑三月桃花茂小園可惜芳春人不識樹頭百舌更能言沈貫問圓覺經云修多羅教如標月指若復見月了知所標畢竟非月此理如何師舉手曰經也月也指也貫罔措師拍案一下曰月落寒潭貫有省乃曰吾師之道非凡情所能測師年臘竝尊出世僅十載遽唱滅臨終說偈曰九十六年在世七十四載為僧中間多少誵訛今日一齊鎖殞釋迦至我有不可數老和尚乃以拂作圓相曰都向者裡安身咄擲拂而逝當景泰康午門人塔全身於東明左側蘇州府鄧尉山果林榮禪師虗白參師擲蒲團曰汝試道看白曰只此消息本無言說破蒲團上地迸天裂師曰且道裂後如何白擬議師便打出松隱然禪師法嗣道安禪師失録姓氏矢志礪行有乃父風常行般舟三昧永樂丙申示寂遺偈曰不會掘地討天也解虗空打橛驚起須彌倒舞海底蝦蟆吞月踏翻生死大洋說甚漚生漚滅世壽七十有七金山濟禪師法嗣建昌府新城壽昌西竺本來禪師崇仁裴氏子七歲出家觀音寺年十三參一峰執侍七載一日聞讀清淨經有省偈曰幾年外走喪真魂今日相逢逈不同身伴金毛石獅子回頭吞却鐵崑崙峰寂走見慈舟於金山禮拜起便問某甲拏得賊來請和尚斷舟曰贓在何處師拍案一下舟便喝復舉香嚴上樹話反覆徵詰有當乃承印可初住劍江壽聖寧藩致書聘師三返不赴僅答問道書授慧光普照頓悟圓通之號永樂乙酉開法壽昌上堂拈香畢乃曰天日高明暑漸隆榴花噴火耀庭中衲僧眼裡真機露無位真人覿面逢直下知端的擬議隔千重要達己躬事黃龍最上峰便下座後往閩之杉關重開福田壬寅十月八日忽索筆書偈曰者箇老乞兒教化何時了顛顛倒倒只隨流是聖是凡人莫曉咄來來來去去去海湛空澄風清月皎書畢趺坐而逝世壽六十八僧臘五十五奉全身於法堂供養天界俊禪師法嗣府東普道林無際明悟禪師別號蠶骨蜀之安嶽通賢鎮莫氏子年二十棄家初習禪定工夫後參樓山清清舉趙州無字話師當下有省行住坐臥常在定中一日坐次忽然光明洞照無一毫可得占偈有虗空包不住大地載不起之句西江悟首座指見無念會念謝世遂參古䂐禮拜次䂐謂侍者曰者僧有福德相拈拄杖靠椅坐命師供說行腳師為直敘䂐曰你且去我不知你者樣工夫一日復上方丈䂐震聲一喝拈拄杖作打勢師呈身就棒䂐曰我棒頭有眼不打者般死漢拽拄杖便出師拱立不動䂐復還坐驀劄問曰大地平沉你在甚麼處師曰全露法王身䂐曰萬法歸一一歸何處速道速道師曰不道䂐曰因甚不道師曰亘古亘今䂐曰亘古亘今即且置你在西川甚麼物恁麼來師不語良久䂐曰啞子得夢向誰說一日䂐為更號無際師曰恁麼則無際亦未在天下老和尚盡向者裡成道歷代祖師盡向者裡成佛即今有說佛說祖底出來盡教伊出門去不如某甲者裡打睡䂐笑曰者漢此後不受人瞞去也走馬燈偈曰團團馳走不停留無箇明人指路頭滅却心中些子火刀鎗人馬一齊休門下法嗣七人有付法偈曰我無法可付汝無心可受無付無受心何人不成就河南府伏牛物外無念圓信禪師金臺高氏子生宣德己酉九歲出家受具首見無際于隆恩有省入天須己卯歸牛山結茅辛巳復詣繁昌參月幻幻問何處來師曰牛山幻曰人在者裡牛聻師曰覿面不相識全體露堂堂幻曰雖然爭奈頭角不全在師曰某甲今日山行困幻復拈起竹篦曰喚作竹篦則觸不喚作竹篦則背上座作麼生師曰有勞神用幻曰未在更道師便進前奪竹篦擲於地幻軒渠大笑師曰某甲罪過便作禮幻乃撫而印之師菴居三十載開法伏牛僧問龐居士道一種沒絃琴惟師彈得妙今日請和尚彈看師咳嗽一聲僧曰不會師曰鐘作鐘鳴鼓作鼓響曰意旨如何師曰馬祖去世久矣問如何是即心即佛師曰富兒易嬌曰非心非佛又作麼生師曰窮坑難滿曰某甲不會師曰若道即心即佛大似好肉剜瘡若言非心非佛何異灸瘡加艾直饒道不是心不是佛不是物也是平地喫交且道畢竟如何良久曰坐來拭几添香火粥罷呼童洗盂江寧府祖堂幽棲性天如皎禪師四明周氏子從正菴中芟染往謁古䂐一夕推簾見月有省乃曰元來恁麼翌旦趨見䂐便震聲一喝䂐曰貧人得寶邪師曰寶即不得得即非寶䂐曰憑何如是師趨前問訊叉手而立䂐曰還我向上一句來師遽掩耳便出復呈偈曰午夜推簾月一灣輕輕踏破上頭關不須向外從他覓只麼怡怡展笑顏䂐為助喜度嶺至西坑築菴影不出山者二十年宣德壬子赴武林虎跑請後應祖堂幽棲臨終示衆曰文章佛法空中色名相身心柳上煙唯有死生真大事殷勤了辦莫遷延大衆且道如何了辦良久曰吾今無暇為君說聽取松風㵎水聲語畢而逝弟子奉全身塔于菴左壽七十何密菴居士法嗣揚州府素菴田大士僧問補陀路向甚麼門出士曰上座即今從甚麼門入僧曰抑勒人作麼士曰看腳下僧擡頭進前三步士曰錯僧便退後三步士曰錯復曰且道是你錯是我錯僧曰未舉已前早知錯了也士曰正好喫棒僧無語士曰若到諸方分明舉似去示衆近來篤志參禪者少才提箇話頭便被昏散二魔纏縛殊不知昏散與疑情正相對治信心重則疑情必重疑情重則昏散自無工夫斯得之矣咄
