body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十七世華藏民禪師法嗣杭州府徑山別峰寶印禪師嘉州李氏子世居娥媚之麓幼通六經厭俗從德山清素得度具戒聽華嚴起信既盡其說棄依密印於中峰一日印舉僧問巖頭起滅不停時如何巖喝曰是誰起滅師即豁然大悟會圓悟歸昭覺印遣師往省因隨眾入室悟問從上諸聖以何接人師竪拳悟曰此是老僧用底作麼生是從上諸聖用底師以拳揮之悟亦舉拳相交大笑而止後至徑山謁大慧慧問甚麼來師曰西川慧曰未出劍門關與汝三十棒了也師曰不合起動和尚慧忻然掃室延之慧南遷師乃西還連主數剎後再出峽住保寧金山雪竇徑山開堂陞座曰世尊初成正覺於鹿野苑中轉四諦法輪憍陳如比丘最初悟道真淨曰今日新豐洞裡祇轉箇拄杖子遂拈拄杖著左邊曰還有最初悟道者麼若無丈夫自有衝天志莫向如來行處行遂喝一喝下座若是印上座則不然今日向鳳凰山裡初無工夫轉四諦法輪亦無氣力轉拄杖子祇教諸人行須緩步語要低聲何故欲得不招無間業莫謗如來正法輪上堂三世諸佛以一句演百千萬億句收百千萬億句祇在一句祖師門下半句也無祇恁麼合喫多少痛棒諸仁者且諸佛是祖師是若道佛是祖不是祖是佛不是取捨未忘若道佛祖一時是佛祖一時不是顢頇不少且截斷葛藤一句作麼生道大蟲裹紙帽好笑又驚人復舉僧問嵒頭浩浩塵中如何辨主頭曰銅砂鑼裡滿盛油師曰大小嵒頭打失鼻孔忽有人問保寧浩浩塵中如何辨主祇對他道天寒不及卸帽上堂六月初一燒空赤日十字街頭雪深一尺掃除不暇回避不及凍得東村廖鬍子半夜穿靴水上立上堂將心除妄妄難除即妄明心道轉迂桶底趯穿無忌諱等閒一步一芙蕖師至徑山孝宗召對選德殿稱旨入對日賜肩輿於東華門內乾道壬辰二月上註圓覺經遣使馳賜命作序師年邁益厭住持淳熙丁酉冬奏乞菴居紹熙庚戌十一月往見交承䇿言別䇿問行日師曰水到渠成歸索紙書十二月初七夜雞鳴時九字如期而化奉蛻質返寺之法堂留七日顏色明潤髮長頂溫越七日塟于菴之西岡諡慈辯禪師塔曰智光壽八十二臘六十四昭覺元禪師法嗣南康府鳳棲慧觀禪師上堂前村落葉盡深院桂華殘此夜初冬節從茲特地寒所以道欲識佛性義當觀時節因緣時節若至其理自彰喝一喝曰恁麼說話成人者少敗人者多靈隱遠禪師法嗣寧波府東山全菴齊己禪師卭州謝氏子上堂舉修山主偈曰是柱不見柱非柱不見柱是非已去了是非裡薦取召大眾曰薦得是移華兼蝶至薦得非擔泉帶月歸是也好鄭州梨勝青州棗非也好象山路入蓬萊島是亦沒交涉踏著秤錘硬似鐵非亦沒交涉金剛寶劍當頭截阿呵呵會也麼知事少時煩惱少識人多處是非多蓮社會上堂漸漸雞皮鶴髮父少兒子老看看行步躘蹱疑殺木上座直饒金玉滿堂照顧白拈賊豈免衰殘老病正好著精彩任汝千般快樂渠儂合自由無常終是到來歸堂喫茶去唯有徑路修行依舊打之遶但念阿彌陀佛念得不濟事復曰噁者條活路已被善導和尚直截指出了也是你諸人朝夕在徑路中往來因甚麼當面蹉過你若向者裡薦得不致蹉過便可除迷倒障猶豫箭截疑惑網斷癡愛河伐心稠林浣心垢濁正心諂曲絕心生死然後轉入那邊擡起脚向佛祖踐履不到處進一步開却口向佛祖言詮不到處說一句喚回善導和尚別求徑路修行其或準前捨父逃走流落他鄉撞東磕西苦哉佛陀耶撫州府疎山歸雲如本禪師台城人上堂久雨不晴戊在丙丁通身泥水露出眼睛且道是甚麼眼睛卓拄杖曰林間泥滑滑時呌兩三聲覺阿上人日本國滕氏子十四得度受具習大小乘有聲二十九屬商者自中都回言禪宗之盛阿奮然拉法弟金慶航海而來袖香謁靈隱海海問其來阿輙書而對復書曰我國無禪宗唯講五宗經論國主無姓氏號金輪王以嘉應改元捨位出家名行真年四十四王子七歲令受位今已五載度僧無退納而講義高者賜之某等仰服聖朝禪師之名特遠投誠願傳心印以度迷津且如心佛及眾生是三無差別離相離言假言顯之禪師如何開示海曰眾生虗妄見見佛見世界阿書曰無明因何而有海便打阿即命海陞座決疑明年秋辭游金陵抵長蘆江岸聞皷聲忽大悟始知佛海垂手旨趣旋靈隱述五偈敘所見辭海東歸偈曰航海來探教外傳要離知見脫蹄筌諸方參遍草鞋破水在澄潭月在天掃盡葛藤與知見信手拈來全體現腦後圓光徹太虗千機萬機一時轉妙處如何說向人倒地便起自分明驀然踏著故鄉地到裹幞頭孤路行求真滅妄元非玅即妄明真都是錯堪笑靈山老古錐當陽拋下破木杓竪拳下喝少賣弄說是說非入泥水截斷千差休指注一聲歸笛囉囉哩海稱善書偈贈行歸本國住叡山寺洎通嗣法書海已入𡧯矣杭州府淨慈濟顛道濟禪師出家靈隱性不稽甞與市井浮沉喜打筋斗不著褌形媟露人姍笑自視夷然與明顛同時師為尤甚飲酒居常為寺僧唾罵笞逐走居淨慈為人誦經下火得酒食便赴有詩曰何須林景勝瀟湘只願西湖化為酒和身臥倒西湖邊一浪來時吞一口時從市喜息人之諍救人之死戲謔笑談神出鬼沒人罕有能測之者年七十三而沒一日與明顛偶識於朱涇明目之曰咦濟顛乃贈以詩詩曰青箬笠前天地濶碧蓑衣底水雲寬不言不語知何事只把人心不自瞞內翰曾開居士字天游久參圓悟往來大慧之門有年紹興辛未佛海補三衢光孝公與趙超然訪之問如何是善知識海曰燈籠露柱貓兒狗子公曰為甚麼贊即歡喜毀即煩惱海曰侍郎曾見善知識否公曰某三十年參問何言不見海曰向歡喜處見煩惱處見公擬議海震聲便喝公擬對海曰開口底不是公罔然海召曰侍郎向甚麼處去也公猛省遂點頭說偈曰咄哉瞎驢叢林妖孽震地一聲天機漏泄有人更問意如何拈起拂子劈口截海曰也祇得一橛知府葛郯居士字謙問號信齋少擢上第玩意禪悅首謁無菴全菴令究即心即佛久無所契請曰師有何方便使某得入菴曰居士太無厭生已而佛海來居劍池公因從游乃舉無菴所示之語請為眾普說海發揮之曰即心即佛眉拖地非心非佛雙眼橫蝴蝶夢中家萬里子規枝上月三更留旬日而返一日於不是心不是佛不是物話豁然頓明頌曰非心非佛亦非物五鳳樓前山突兀艶陽影裡倒翻身野狐跳入金毛窟無菴肻之即遣書頌呈佛海海報曰此事非紙筆可既居士能過我當有所聞矣遂復至虎丘海迎之曰居士見處止可入佛境界入魔境界猶未得在公加禮不已海正容曰何不道金毛跳入野狐窟公乃脫然甞問諸禪曰夫婦二人相打通兒子作證且道證父即是證母即是或菴體著語曰小出大遇孝宗淳熙六年守臨川八年感疾一夕忽索筆書偈曰大洋海裡打鼓須彌山上聞鐘業鏡忽然撲破翻身透出虗空召僚屬示之曰生之與死如晝與夜無足怪者若以道論安得生死若作生死會則去道遠矣語畢端坐而化文殊導禪師法嗣長沙府楚安慧方禪師本郡許氏子參文殊於大別未幾適改寺為神霄宮附商舟過湘南舟中聞岸人操鄉音勵聲云呌那由是有省述偈曰沔水江心喚一聲此時忽得契平生多年相別重相見千聖同歸一路行住後上堂臨老方稱住持全無些子玄機開口十字九乖問東便乃答西如斯出世討甚施為有時拈三放兩有時盡令而施雖然如是同道方知且道知底事作麼生鼻孔從來向下垂上堂達磨祖師在脚底踏不著兮提不起子細當頭放下看病在當時誰手裡張公會看脉李公會使藥兩箇競頭醫一時用不著藥不相投錯錯常德府文殊思業禪師世為屠宰一日戳猪次忽洞徹心源即棄業為比丘述偈曰昨日夜叉心今朝菩薩面菩薩與夜叉不隔一條線往見文殊殊曰你正殺猪時見箇甚麼便乃剃頭行脚師遂作鼓刀勢殊喝曰者屠兒參堂去師便下參堂後繼席文殊上堂舉趙州勘破話乃曰勘破婆子面青眼黑趙州老漢瞞我不得何山珣禪師法嗣金華府義烏稠巖了贇禪師上堂舉趙州狗子無佛性話頌曰趙州狗子無佛性萬疊青山藏古鏡赤脚波斯入大唐八臂那吒行正令咄侍制潘良貴居士字義榮年四十回心祖闈所至隨眾參扣後依佛燈不契因訴曰某祇欲死去時如何燈曰好箇封皮且留著使用而今不了不當後去忽被他換却封皮卒無整理處公曰南泉斬猫話某甲看久終未透徹奈何燈曰你祇管理會別人家猫兒不知走却自家狗子公於言下如醉得醒燈曰不易公進此一步更須知有向上事始得如今士大夫說禪說道祇依著義理便快活大率似將錢買油餈喫了便不饑其餘便道是瞞他亦可笑也公唯唯泐潭明禪師法嗣成都府漢州無為隨菴守緣禪師本郡史氏子年十三病目依棲禪能圓具出峽至寶峰值峰上堂舉永嘉曰一月普現一切水一切水月一月攝師聞釋然領悟住後上堂以一統萬一月普現一切水會萬歸一一切水月一月攝展則彌綸法界收來毫髮不存雖然收展殊途此事本無異致但能於根本上著得一隻眼去方見三世諸佛歷代祖師盡從此中示現三藏十二部一切修多羅盡從此中流出天地日月萬物森羅盡從此中建立三界九地七趣四生盡從此中出沒百千法門無量妙義乃至世間工巧諸伎藝盡現行此事所以世尊拈華迦葉便乃微笑達磨面壁二祖於是安心桃花盛開靈雲疑情盡淨擊竹作響香嚴頓忘所知以至盤山於肉案頭悟道彌勒向魚市裡接人誠謂造次顛沛必於是經行坐臥在其中既有如是奇特更有如是光輝既有如是廣大又有如是周徧你輩諸人因甚麼却有迷有悟要知麼幸無偏照處剛有不明時龍翔珪禪師法嗣南康府雲居頑菴德昇禪師漢州何氏子二十得度習講棄謁文殊導以佛法省要問殊示偈曰契丹打破波斯寨奪得寶珠村裡賣十字街頭窮乞兒腰間挂箇風流袋師擬對殊曰莫錯師退參三年方得其旨往見佛性不契入閩謁竹菴於鼓山便問國師不跨石門句意旨如何菴應聲喝曰閒言語師頓領悟住後僧問應真不借三界高超即不問如何是無位真人師曰聞時富貴見後貧窮曰擡頭須掩耳側掌便翻身師曰無位真人在甚麼處曰老大宗師話頭也不識師曰放你三十棒揚州府通州狼山蘿菴慧溫禪師福州鄭氏子徧參諸老晚依竹菴於東林未幾菴謝事復謁高菴悟南華昺草堂清皆蒙賞識會竹菴徙閩之乾元師歸省次菴問情生智隔相變體殊不用停囚長智道將一句來師當下釋然述偈曰拶出通身是口何妨罵雨訶風昨夜前村猛虎咬殺南山大蟲菴為首肻住後上堂釋迦老子四十九年坐籌帷幄彌勒大士九十一劫帶水拖泥凡情聖量不能剗除理照覺知猶存露布佛意祖意如將魚目作明珠大乘小乘似認橘皮為猛火諸人須是豁開胸襟寶藏運出自己家珍向十字街頭普施貧乏眾中忽有箇靈利漢出來道美食不中飽人餐山僧只向他道幽州猶自可最苦是新羅雲居悟禪師法嗣金華府雙林德用禪師本郡戴氏子上堂拈槌竪拂將黃葉以止啼說妙談玄望梅林而止渴際山今日去却之乎者也更不指東話西向三世諸佛命脉中六代祖師骨髓裡盡情傾倒為諸人說破良久曰啼得血流無用處不如緘口過殘春台州府萬年無著道閑禪師本郡洪氏子上堂全機敵勝猶在半途啐同時白雲萬里纔生朕兆已落二三不露鋒𨦵成何道理且道從上來事合作麼生良久曰誣人之罪以罪加之上堂舉乾峰示眾曰舉一不得舉二放過一著落在第二雲門出眾曰昨日有人從天台來却往徑山去峰曰典座來日不得普請師曰相見不須瞋君窮我亦貧謂言侵早起更有夜行人福州府中際善能禪師嚴陵人往來龍門雲居有年未有所證一日普請擇菜次高菴忽以貓兒擲師懷中師擬議菴攔胸踏倒於是大事洞明上堂萬古長空一朝風月不可以一朝風月昧却萬古長空不可以萬古長空不明一朝風月且如何是一朝風月人皆畏炎熱我愛夏日長薰風自南來殿閣生微凉會與不會切忌承當南康府雲居普雲自圓禪師綿州雍氏子年十九試經得度留教苑五祀出關南下歷扣諸大尊宿始詣龍門一日於廊廡間覩繪胡人有省夜白高菴菴舉法眼偈曰頭戴貂鼠帽腰懸羊角錐語不令人會須得人譯之復筴火示之曰我為汝譯了也於是大法明了呈偈曰外國言音不可窮起雲亭下一時通口門廣大無邊際吞盡楊岐栗棘蓬菴遣師依佛眼眼謂師曰吾道東矣上堂舉僧問雲門如何是透法身句門曰北斗裡藏身師曰南北東西萬萬千乾坤上下兩無邊相逢相見呵呵笑屈指擡頭月半天西禪璉禪師法嗣遂寧府西禪第二代希秀禪師上堂秋光將半暑氣漸消鴻鴈橫空點破碧天似水猿猱挂樹撼翻玉露如珠直饒對此明機未免認龜作鼈且道應時及節一句作麼生道野色併來三島月溪光分破五湖秋黃龍忠禪師法嗣成都府信相戒修禪師上堂舉馬祖不安公案乃曰兩輪舉處超玄旨電急星馳烏足比目前不礙往來機正令全施無表裡丈夫意氣自衝天我是我兮你是你袁州府慈化普菴印肅禪師本郡宜春余氏子母黃生宋徽宗政和乙未十一月廿七誕時有異徵年十五往從壽隆受業隆以法華授師師曰諸佛玄旨貴悟自心數墨循行何益於道隆異之閱七載始獲剃染遂參牧菴於溈山問萬法歸一一歸何處菴舉拂示之師當下契旨紹興癸酉出住慈化不數載梵宇金碧如從天降師猶自以所詣為未足乾乾朝夕脇不沾席者十有二年一日閱華嚴合論至達本情忘知心體合處豁然大悟述偈曰揑不成團撥不開何須南嶽又天台六根門首無人用惹得胡僧特地來後於乾道己丑七月廿一日忽索筆書偈於壁沐浴更衣跏趺而逝世壽五十五僧臘三十五奉全身塔於本山有語錄四卷行世烏巨行禪師法嗣饒州府薦福退菴休禪師上堂風動邪幡動邪風鳴邪鈴鳴邪非風鈴鳴非風幡動此土與西天一隊黑漆桶誑惑世間人看看滅胡種山僧沒奈何趂後也打閧咦瓠子曲彎彎冬瓜直儱侗上堂結夏時左眼半斤解夏時右眼八兩謾云九十日安居贏得一肚皮妄想直饒七穴八穿未免山僧拄杖雖然如是千鈞之弩不為鼷鼠而發機上堂先師尋常用腦後一鎚卸却學者胸中許多屈曲當年克賓維那曾中興化此毒往往天下叢林喚作超宗異目非唯孤負興化亦乃克賓受辱若是克肖兒孫終不依草附木資福喜見同參今日傾腸倒腹遂卓拄杖喝一喝曰還知先師落處麼伎死禪和如麻似粟上堂言發非聲是箇甚麼色前不物莫亂針錐透過禹門風波更險咄廣信府龜峰晦菴慧光禪師建寧人上堂數日暑氣如焚一箇渾身無處安著思量得也是煩惱人者箇未是煩惱己躬下事不明更是煩惱所以達磨大師煩惱要為諸人吞却又被咽㗋小要為諸人吐却又被牙齒礙取不得捨不得煩惱九年若不得二祖不惜性命往往轉身無路煩惱教死所謂祖禰不了殃及兒孫後來蓮華峰菴主到者裡煩惱不肻住南嶽思大到者裡煩惱不肻下山更有臨濟德山用盡自己查梨煩惱盂無柄龜峰今日為他閒事長無明為你諸人從頭點破卓拄杖一下曰一人腦後露腮一人當面無齒更有數人鼻孔沒半邊不勞再勘你諸人休向者裡立地磕睡殊不知家中飯籮鍋子一時失却了也你若不信但歸家檢點看揚州府儀真長蘆且菴守仁禪師越州上虞人依雪堂於烏巨聞普說曰今之兄弟做工夫正如習射先安其足後習其法後雖無心以久習故箭發皆中喝一喝曰只今箭發也看看師不覺倒身作避箭勢忽大悟上堂百千三昧無量妙門今日且菴不惜窮性命祇做一句子說與諸人乃卓拄杖下座甞頌臺山婆話曰開箇燈心皂角舖日求升合度朝昏只因風雨連綿久本利一空愁倚門白楊順禪師法嗣吉安府青原如禪師僧問達磨未來時如何師曰生鐵鑄崑崙曰來後如何師曰五彩畵門神雲居如禪師法嗣太平府隱靜圓極彥岑禪師台城人上堂韓信打關未免傷鋒犯手張良燒棧大似曳尾靈龜既然席卷三秦要且未能囊弓裹革煙塵自靜我國晏然四海九州盡歸皇化自然牛閒馬放風以時雨以時五糓熟萬民安大家齊唱村田樂月落參橫夜向闌上堂今朝八月初五好事分明為舉嶺頭漠漠秋雲樹底鳴鳩喚雨昨夜東海鯉魚吞却南山猛虎雖然有照有用畢竟無賓無主唯有文殊普賢住住我識得你上堂舉正堂辯室中問學者蚯蚓為甚麼化為百合話頌曰客舍并州已十霜歸心日夜憶咸陽無端更度桑乾水却望并州是故鄉武昌府報恩成禪師上堂秋雨乍寒汝等諸人青州布衫成就也未良久喝曰雲溪今日冷處著一把火便下座道場辯禪師法嗣蘇州府覺報清禪師上堂舉僧問雲門如何是諸佛出身處門曰東山水上行師曰諸佛出身處東山水上行石壓笋斜出崖懸華倒生湖州府安吉州何山然首座姑蘇人久侍正堂入室次堂問貓兒為甚麼偏愛捉老鼠曰物見主眼卓竪堂欣然因命分座淨居溫禪師法嗣溫州府淨居尼無相法燈禪師上堂卓拄杖曰觀音出普賢入文殊水上穿靴立擡頭子過新羅石火電光追不及咄大溈果禪師法嗣荊州府玉泉窮谷宗璉禪師合州董氏子開堂日問答已乃曰衲僧向人天眾前一問一答一擒一縱一卷一舒一挨一拶須是具金剛眼睛始得若是念話杜家君向西秦我之東魯於宗門中殊無所益者一段事不在有言不在無言不礙有言不礙無言古人垂一言半句正如國家兵器不得已用之橫說竪說祇要控人箇入處其實不在言句上今時人不能一徑徹證根源祇以語言文字而為至道一句來一句去喚作禪道喚作向上向下謂之菩提涅槃謂之祖師巴鼻正似鄭州出曹門從上宗師以行脚為事底纔有疑處便對眾決擇祇一句下見諦明白造佛祖直指不傳之宗與諸有情盡未來際同得同證猶未是泊頭處豈是空開脣皮胡言漢語所以南院道諸方祇具啐同時眼不具啐同時用時有僧問如何是啐同時用院曰作家不啐啐同時失僧曰此猶未是學人問處院曰你問處作麼生僧曰失院便打其僧不契後至雲門會中聞二僧舉此話一僧曰當時南院棒折那其僧忽契悟即回南院院已遷化乃謁風穴穴見便問你是問先師啐同時話底麼僧曰是穴曰你當時如何曰我當時如在燈影裡行相似穴曰你會也師乃召大眾曰暗穿玉線密度金針如水入水似金博金敢問大眾啐同時是親切處因甚却失若也會得便可橫身宇宙獨步大方堪報不報之恩共助無為之化若跳不出依前祇在架子下上堂拈拄杖曰破無明暗截生死流度三有城泛無為海須是識者箇始得乃召眾曰喚作拄杖則觸不喚作拄杖則背若也識得荊棘林中撒手是非海裡橫身脫或未然普賢乘白象土宿跨泥牛參上堂一切數句非數句與吾靈覺何交涉永嘉恁麼道大似含元殿上更覓長安殊不知有水皆含月無山不帶雲雖然如是三十年後趙婆酤醋上堂宗乘一唱殊途絕萬別千差俱泯滅通身是口難分雪金剛腦後三斤鐵好大哥僧問寶壽開堂三聖推出一僧寶壽便打意旨如何師曰利動君子曰為復棒頭有眼為復見機而作師曰獼猴繫露柱曰祇如三聖道你恁麼為人瞎却鎮州一城人眼又作麼生師曰錦上鋪華又一重問行脚逢人時如何師曰一不成二不是曰行脚不逢人時如何師曰虎咬大蟲曰祇如慈明道釣絲絞水意作麼生師曰水浸鋼石卵問三聖道我逢人即出出則不為人意旨如何師曰兵行詭道曰興化道我逢人則不出出則便為人又作麼生師曰綿裹秤鎚問不落因果為甚麼墮野狐身師曰廬山五老峰曰不昧因果為甚麼脫野狐身師曰南嶽三生藏曰祇如不落不昧未審是同是別師曰倚天長劍逼人寒問初生孩子還具六識也無趙州道急水上打毬子意旨如何師曰兩手扶犂水過膝曰祇如僧又問投子急水上打毬子意旨如何曰念念不停流又作麼生師曰水晶甕裡浸波斯問楊岐道三脚驢子弄蹄行意旨如何師曰過蓬州了便到巴州長沙府大溈山行禪師上堂橫拄杖曰你等諸人若向者裡會去如紀信登九龍之輩不向者裡會去似項羽失千里烏騅饒你總不恁麼落在無事甲裡若向者裡撥得一路轉得身吐得氣山僧與你拄杖子遂靠拄杖下座上堂不是心不是佛不是物且道是箇甚麼不在內不在外不在中間畢竟在甚麼處苦苦有口說不得無家何處歸長沙府道林淵禪師僧問鐘未鳴鼓未響拓向甚麼處去德山便低頭歸方丈意旨如何師曰奔雷迸火曰巖頭道者老漢未會末後句在又作麼生師曰相隨來也曰巖頭密啟其意未審那裡是他密啟處師曰萬年松在祝融峰曰雖然如是祇得三年三年後果遷化還端的也無師曰嚤呢噠唎吽㗶吒臨示𡧯上堂拈拄杖曰離却色聲言語道將一句來眾無對師曰動靜聲色外時人不肻對世間出世間畢竟使誰會言訖倚杖而逝德安府隨州大洪老訥祖證禪師潭州潘氏子上堂萬象之中獨露身如何說箇獨露底道理竪拂子曰到江吳地盡隔岸越山多僧問雲門問僧光明宗照徧河沙豈不是張拙秀才語僧云是門曰話墮也未審那裡是者僧話墮處師曰鮎魚上竹竿問離却言句請師直指師竪拂子僧曰還有向上事也無師曰有曰如何是向上事師曰速禮三拜南昌府泐潭山堂德淳禪師上堂俱胝一指頭一毛拔九牛華嶽連天碧黃河徹底流截却指急回眸青箬笠前無限事綠蓑衣底一時休常州府宜興保安復菴可封禪師福州林氏子上堂天寬地大風清月白此是海宇清平底時節衲僧家等閒問著十箇有五雙知有祇如夜半華嚴池吞却楊子江開明橋撞倒平山塔是汝諸人還知麼若也知去試向非非想天道將一句來其或未然擲下拂子曰須是山僧拂子始得南昌府石亭野菴祖璿禪師上堂喫粥了也未趙州無忌諱更令洗盂太煞沒巴鼻悟去由來不丈夫者僧那免受塗糊有指示無指示韶石四楞渾塌地入地獄如箭射雲岫清風生大廈相逢携手上高山作者應須辨真假真假分若為論午夜寒蟾出海門長沙府石霜宗鑒禪師上堂送舊年迎新歲動用不離光影內澄輝湛湛夜堂寒借問諸人會不會若也會增瑕纇若不會依前昧與君指箇截流機白雲更在青山外贛州府報恩文爾禪師福州長溪李氏子十六為僧十八參月菴至忘寢食每聞更漏鐘鼓輒嘆曰又過一日也後有省典侍司數年去遊廬陵眾請出住吉水清涼徙興國梵山寧都桃林紹興辛未郡守李子楊迎住報恩居十年引疾求去移慶雲乾道丙戌冬示𡧯壽四十六坐夏三十塟慶雲之西園石頭回禪師法嗣南康府雲居蓬菴德會禪師川重慶何氏子上堂教中道若見諸相非相即見如來作麼生是非相底道理佯走詐羞偷眼覰竹門斜掩半枝華
