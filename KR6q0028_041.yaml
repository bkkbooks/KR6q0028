body:
  text: 南海普陀嗣祖沙門西蜀性統編集未詳法嗣杭州徑山雲菴慶禪師建陽人舉僧問楊岐如何是佛岐曰三脚驢子弄蹄行曰莫只者便是麼岐曰湖南長老頌曰楊岐一頭驢眼光如電爍踏殺天下人說甚三隻脚先淨照禪師問講主經中道若能轉物即同如來若被物轉即名凡夫祇如昇元閣作麼生轉主無對公期和尚因往羅漢路逢一騎牛公子師問羅漢路向甚麼處去公子拍牛曰道道師喝曰者畜生公子曰羅漢路向甚麼處去師却拍牛曰道道公子曰直饒恁麼猶少蹄角在師便打公子拍牛便走唐朝因禪師微時嘗運槌擊土次見一大塊戲槌猛擊之應手而碎豁然大悟福州府東山雲頂禪師泉州人以再下春闈往雲臺大吼寺剃染具戒即謁大愚芝神鼎諲後見羅漢下尊宿始徹己事道學有聞叢林稱為頂三教僧問如何是和尚日用事師曰我喫飯汝受饑曰法法不相到又作麼生師曰汝作罪我皆知問如何是和尚一枝拂師曰打破修行窟曰恁麼則本來無一物也師曰知無者是誰曰學人罪過師曰再思可矣居士問洞山道有一物上拄天下拄地未審是甚麼物師曰擔鐵枷喫鐵棒曰天地黑山河走師曰閻老殿前添一鬼北邙山下臥千年士呌快活快活師曰也是野狐吞老鼠九龍觀道士并三士人請上堂儒門畫八卦造契書不救六道輪回道門朝九皇鍊真氣不達三祇劫數我釋迦世尊洞三祇劫數救六道輪回以大願攝人天如風輪持日月以大智破生死若劫火焚秋毫入得我門者自然轉變天地幽察鬼神使須彌鐵圍大地大海入一毛孔中一切眾生不覺不知我說此法門如虗空俱含萬象一為無量無量為一若人得一即萬事畢珍重金華府雲幽重惲禪師初謁雪峰次依石霜有悟旋里隱雲幽蔽形唯一衲住後上堂雲幽一隻箭虗空無背面射去遍十方要且無人見時有僧問如何是雲幽一隻箭師曰盡大地人無髑髏雲幽今改法雲杭州府大安如玉禪師號雙溪布衲閑卿嵩戲以詩悼曰繼祖當吾代生緣行可規終身常在道識病懶尋醫貌古筆難寫情高世莫知慈雲布何處孤月自相宜師讀罷舉筆答曰道契平生更有誰閑卿於我最心知當初未欲成相別恐誤同參一首詩投筆坐亡於六十年後塔戶自啟其真容儼然安慶府桐城投子通禪師僧問達磨未來時如何師曰兩岸唱僧歌曰來後如何師曰大海涌風波問如何是孤峰頂上節操長松師曰能為萬象主不逐四時凋問如何是和尚者裡佛法師曰東壁打西壁處州府法海立禪師因旨革法海為神霄宮師陞座謂眾曰都緣未徹所以說是說非葢為不真便乃分彼分此我身尚且不有身外烏足為道正眼觀來一場笑具今則聖君垂旨更僧寺作神霄佛頭上添箇冠兒算來有何不可山僧今日不免橫擔拄杖高挂囊向無縫塔中安身立命於無根樹下嘯月吟風一任乘雲仙客駕鶴高人來此呪水書符叩牙作法他年成道白日上昇堪報不報之恩以助無為之化祇恐不是玉是玉也大奇雖然如是且道山僧轉身一句作麼生道還委悉麼擲下拂子竟爾趨𡧯郡守具奏其事旨下復寺額曰真身汝州天寧明禪師改德士日師登座謝聖恩畢乃曰木簡信手拈來坐具乘時放下雲散水流去寂然天地空即斂目而逝西蜀仁王欽禪師僧問如何是佛師曰聞名不如見面曰如何是祖師西來意師裡弄猢猻曰如何是道曰大蟲看水磨樓子和尚不知何許人也一日偶遊街市於酒樓下整襪帶次聞樓上人唱曲云你既無心我也休忽然大悟因號樓子焉神照本如法師甞以經旨請益四明尊者者震聲曰汝名本如師忽悟呈偈曰處處逢歸路頭頭達故鄉本來成現事何必待思量杭州府靈隱普覺淳朋禪師宋仁宗嘉祐庚子一日奉旨斷還九里松集慶所占路上堂山前一片閒田地曠大劫來無界至今朝恢復又歸來坐斷脚頭并脚尾東也是西也是南北縱橫無不是且畢竟酬恩一句作麼生十里荷華九里松直指堂前香一炷嘉興府聖壽宜翁可觀禪師年十六依南屏出家從車溪有省宋高宗紹興初主嘉禾聖壽遷當湖德藏退隱竹菴一室翛然每自怡曰松風山月我無盡衣也孝宗乾道辛卯丞相魏𣏌請主吳之北禪入院日適當九日指座曰胸中一寸灰已冷頭上千莖雪未消老步只宜平地去不知何事又登高青州府佛覺禪師雲門宗頌仰山雪師子話曰一色無過指示人白銀世界裡嚬呻超然推倒還扶起爭似東風煦日新圓通善國師雲門宗嗣佛覺佛日自江右至燕寓大聖安一夕與佛覺晦堂夜話次時師年方十二座右侍立日曰山僧自南方來拄杖頭不曾撥著一箇會佛法者師叉手進前曰自是和尚拄杖短日大驚曰可乞此子續吾濟宗師曰雲門臨濟豈有二邪日稱賞不已金世宗幸聖安瑞像殿問師曰禮即是不禮即是師曰禮則相敬相重不禮則各自稱尊帝大悅後住延聖示眾舉洞山解制上堂秋初夏末兄弟或東去西去直須向萬里無寸草處去又曰只如萬里無寸草作麼生去石霜曰出門便是草太陽曰直饒不出門亦是草漫漫地師曰且道諸人即今脚跟下一句作麼生道若道萬里無寸草許你參見洞山若道出門便是草許你參見石霜若道不出門亦是草漫漫地許你參見太陽若總道不得許你參見延聖何故唯有好風來席上更無閒話落人間示眾舉雲門觀音買餬餅話師曰韶陽老人可謂唱彌高和彌寡如今却向延聖拂子頭上入方網三昧東方入定四方起乃至男身入定女身起還會麼野色更無山間斷天光直與水相連順天府慶壽寺玄悟玉禪師雲門宗嗣圓通金顯宗遣中使持紙一張書心佛二字問師者是甚麼字師曰不是心不是佛稱旨次日賜十一字句詩曰但能了淨萬法因緣何足問日用無為十二時中更勿疑常須自在識取從來無𦊱礙佛佛心心心若依佛也是塵師答曰無為無作認作無為還是縛照用同時電卷星流已是遲非心非佛喚作非心猶是物人境俱空萬象森羅一鏡中揚州府高郵州定禪師雲門宗嗣玄悟初參玄悟悟室中舉僧問玄沙如何是清淨法身沙曰膿滴滴地師于是有省僧問透網金鱗以何為食師曰乾屎橛老素首座生平一關深隱罕有識之者元明宗天曆問有僧得其與居述懷三偈手蹟詣紫籜求竺元道著語竺元曰諸方皆以其不出世不說法為恨今讀此三偈如金鐘一擊眾響俱廢謂之不說法可乎其偈曰傳燈讀罷𩯭先華功業猶爭幾洛叉午睡起來塵滿案半簷斜日落庭花尖頭屋子不教低上有長林下有池夜久驚飇掠黃葉却疑蓬底雨來時浮世光陰日已斜題詩聊復答年華今朝我在長松下背立西風數亂鴉溫州府鴈山羅漢寺證首座見道明白晨朝躬自汛掃或問者片田地掃得乾淨也未座竪起苕帚示之又問真淨界中本無一塵掃箇甚麼座亦竪起苕帚示之甞題九牛山偈曰四五成羣知幾年春來秋去飽風煙清溪有水無心飲綠野不耕長自眠箇箇脚跟皆點地腰頭鼻孔盡撩天尋常只在千峰頂大地人來不敢牽寧波府雪竇常藏主橫山之高弟也不諳文字專習禪定儕輩呼為常達磨所作偈頌事理圓融音律調暢其頌鐵牛曰紅爐百煉出將來頭角崢嶸體絕埃打又不行牽不動者回端不入胞胎海門偈曰猛風吹起浪如山多少漁翁著脚難拌命捨身挨得入方知玉戶不曾關苦筍偈曰紫衣脫盡白如銀百沸鍋中轉得身自是苦心人不信等閒嚼著味全真息菴偈曰百尺竿頭罷問津孤峰絕頂養閒身雖然破屋無遮葢難把家私說向人松江府清谷禪師曰坱北子姓蔣生不委處通經史言簡辭𨗉至正初抵松江坐太古圓室已則入市廛沈蒲團施地為菴融然一室足不踰閫有問曰近思錄定然後有光明是金丹否師曰賢且去味中庸甞示沈以偈曰萬紫千紅總是春何須饒舌問東君啞人得夢向誰說竪起空拳指白雲又曰不偏不倚立于中不著西兮不著東超出古今情量外一毫頭上釣蒼龍一日進沈曰吾乘化盡矣若等勉之言訖泊然蛻去太原府五臺鐵勒院子範慧洪大師因閱楞嚴至一人發真歸元十方虗空悉皆消殞處忽大悟遂造河朔汶處陳所見汶可之臨終說偈曰六十春光又八年浮雲收盡露青天臨行踢倒須彌去後夜山頭月正圓更衣坐脫建寧府蔣山慧空元模禪師古田蘇氏子元成宗大德庚子定中遊蔣山山為昔玄獎禪師道場有老人迎謁曰吾為師守此山五百年矣言畢化黑龍而去既寤乃曰吾常還此山也遂往卓菴一日謂眾曰吾昔於佛所號慧空菩薩今化緣既畢即當入滅因為眾說偈曰四十餘年寄俗塵如今却顯箇中尊巖頭一夜東風起吹得華開滿樹春鐵船無柁亦無蓬撐入金蓮性海中末後一機今說破白雲元不離長空大地山河無處覓虗空撞破見端的縱使鐵輪頂上旋本性靈明原不失復曰西天第三代商那和修尊者隱象白山現龍奮迅三昧說法調伏諸外道然後化火自焚吾今象鼻巖前亦當如是言畢雲霧四起雷雨大作化火自焚塔於菴之西開封府鄭州普照寺佛光道悟禪師臨洮蘭州宼氏子偶宿灣子店聞馬嘶豁然大悟歸告母曰某於途中拾得一物母曰何物師曰無始來不見了底母掌曰何喜之有遂辭母參方母曰將何之師曰水流須到海鶴出白雲頭遂往參白雲海海為印記金大定甲辰出主普照久之退居竹閣菴晚年浮沉洛川人莫之測嘗曰道我凡耶曾向聖位中來道我聖耶又向凡位中去道我非凡非聖耶我却向你眼睛鼻孔裡七顛八倒去金泰和乙丑五月十三無疾而逝壽五十五臘三十九真定府嘉山來禪師僧問鐵牛和尚塔何在師以手指之僧忽省發乃示頌曰鐵牛鐵牛更莫別求有人問我竪起指頭杭州府天目一山魁菴主蘇州人天資敏捷通內外典與平石砥友善棲遲巖谷不與世接僅有山麓洪氏子往來送供一夕洪氏婦夢魁乘肩輿而至覺而產一子翌旦登山候之魁化去矣因名應魁字士元幼讀書補邑庠至年三十一旦忽自猛省棄家縛茅於東峰絕頂晝夜精勤行道一日空室因避宼自徑山過其廬見其舉止閒雅應對從容叩其所以乃知其為一山後身也因謂之曰你前身與平石翁為莫逆交翁今年垂九十尚耳目聰明何不通箇信息亦見一夢兩覺而夢覺一如乎魁欣然揮毫作偈寄之曰寄語天童老平石一念非今亦非昔欲聽寒山夜半鐘吳江依舊連天碧溫州府靈雲省菴思禪師性方介台之寧海人兄弟四人師居長同時發心出家徧叩諸方後出世靈雲次遷靈巖結夏上堂以大圓覺牛角馬角為我伽藍瓜籃菜籃上堂舉趙州狗子無佛性話頌曰狗子佛性無狗子佛性有猴愁摟搜頭狗走抖擻口晚秊退居靈雲之前山元至正甲申空室通偕數衲往謁時師年已九十龐眉皓髮拽履而出且行且問何處來通曰江心師曰深幾百丈通曰謾老和尚不得師曰且坐喫茶壁間題有詈僧詩格調頗肖寒山辭曰五瘟不打頭自髠黃布遮身便是僧佛法世法都不會噇豬噇狗十分能通讀之凜然須臾拜辭不敢再犯其鋒寧波府育王勉侍者空室之族姪也少年有志不幸命促嘗有送同事僧遊台鴈偈曰鳥窠吹布毛侍者便悟去雖不涉言詮早已成露布天台嶺上雲鴈宕山中樹此去好商量莫觸當頭諱臨終偈曰生本不生死亦非死祕魔擎杈俱胝竪指江寧府永寧古淵清禪師聞雞鳴有省占偈曰喔喔金雞報曉時不因渠響詎能知三千世界渾如雪井底泥蛇舞柘枝寧波府育王虗菴實首座寄臥雲菴主偈曰黃金園裡馬交馳徑寸多成按劍疑月曬梅華千樹雪臥雲一枕夢回時寧波府天童幻菴住首座禮應菴祖塔偈曰眈眈睡虎管窺斑便把中峰作靠山不得破沙盆一箇兒孫乞活也應難寧波府天童默中唯西堂詠蠶偈曰桑空柘盡始心休綿密工夫一繭收爐炭鑊湯拌得入為人只在一絲頭常州府宜興佛隴可上座聽雨偈曰簷頭滴瀝甚分明迷己眾生喚作聲我亦年來多逐物連宵攲枕夢難成瑞州府九峰壽首座臨終偈曰七十二年者邊那邊慣喫十方飯不參達磨禪今朝一擲翻身去笑破傍觀𭪿半邊吉安府武功山白雲明星禪師閩長汀張氏子醉心內典從龍歸通落髮受具專修止觀一日自歎曰大丈夫道業未就其如生死何遂矢志參方徧叩名宿機緣或契師矍然不自少肯曰道固如是乎乃謁匡廬本源陳所見源皆不諾師發憤寢食俱廢繼聞盤龍陽遂往咨決一見頓釋凝滯依久陽以衣拂源流付之隱居瀟峰二十餘年太守請出世師以老固辭復移茅深入久之又成精藍矣一日示微疾集眾敘謝曰吾去矣眾問師何往師示偈曰明月落波心白雲橫嶺上欲識往來機鐵牛吞大象語畢端坐而逝全身塔於本山世壽八十有四揚州府長蘆登禪師嘗鼎新院宇畢一夜夢神人乞為土地師謂神人曰君愛見僧過恐不能許神人曰某有長誓遂下一臂置師前師慜其誠許之翌日遂與建祠迨塑土地像成則一臂之墮屢屢修復不可得至今土地尚缺一臂四川太瘤禪師因項有癭故名嘗歎佛法混濫異見蠭起乃曰我參禪有悟當不惜口業遂耑志禮馬祖塔久之塔忽放光得大悟於是所至以勘騐為事過雪竇乃曰者老漢口裡水漉漉地竇曰你不肯老僧那師曰果然口裡水漉漉地以坐具一摵便去直歲不甘趂至中路損師一足師曰此是老漢使然他日須折一足償我竇果如其語後放意都下市肆中有官人留供家中甚恭每使侍妾醜食師辭官愈敬一日官至乃故意挑妾乃得辭不日坐化鬧市中紹興府上虞長慶法慈禪師居常宴坐一室士大夫喜從其遊深談名理嘉泰初忽謝客閉門一日方盛暑浴出易衣端坐就寂徒輩亟呼曰和尚既如是何不留偈示後師乃曰無始劫來不曾生今日當場又誰滅又誰滅萬里炎天飛白雪語畢而逝順天府潭柘道玄覺宗禪師別號松溪扶風南氏子母夢法門坦授玉像吞之遂娠其日適坦寂生而有異喜跏趺會蒙古兵作被執入武川軍主喜令出家投媯川青山寺剃染遊講有聲知說食罕充腸於是走見聖因因問來此何為師曰生死事大曰自從識得曹溪路了知生死不相干子如何會師擬議因喝師趨出因召上座師回首因曰分明領取師豁然次日白因曰昨蒙一喝某甲有箇見處因曰試舉看師拂袖便出因可之憲宗元年礬山令遺書聖因求主靈山者因以師應其命付以偈曰十載志如鐵玄關皆透徹跳出荊棘林踏破澄潭月好向孤峰頂上行從前佛祖皆超越至元癸未會潭柘龍泉文退隱西堂師遷補其席後坐蛻塔于本山順天府潭柘古淵福源禪師賜號佛性普明太原李氏子祖父居宦師幼喜學佛父母送妙覺從朗剃落興定中避兵山谷後走真定西牛參廓樂一典侍司次參圓明照照舉僧問雲門如何是啐之機門曰響汝作麼生會師曰今日痛領和尚一問曰意旨如何師曰一聲齊和處千古意分明照寂復見廓樂樂曰你來耶親切處道一句看師進前曰即日恭惟和尚尊候萬福曰如何是佛法大意師曰滿口牙是骨耳朵兩片皮樂作色曰何曾見圓明來師却問如何是佛法大意樂喝師擬議樂打曰滿口牙是骨耳朵兩片皮師始大悟樂印可焉出世三遷大剎價重諸方海雲嘗極口稱之至元間坐化塔潭柘蘇州府茅椒太古菴道亨禪師字清音子自言姓楊宋末引一猱自金陵來淞大如人能供使給師夜坐有光淞人爭飯之豐薄不謝但曰分定人異之相與搆菴接納師為眾赤脚乞米市中故又號赤脚道人偶軍士戲烹其猱師嘆甚因辭眾說偈曰八十一年饒舌終日化緣不歇重陽時節歸家一路清風明月遂趺坐而逝府寶頂曉山元亮禪師河南信陽蕭氏子幼却葷以父官棠遂家棠因寶林至福有道從落䰂福示以禪要有省且指參古渝幽谷纔入室針芥相投洪武壬子歸棠建寶頂被詔住報恩遷大慈宸章屢降力求退乃賜還山初蜀藩亦嘗請說法內庭示眾甕裡何曾走却鼈蝦跳元來不出斗出世若無堅固心六道輪迴空自走兄弟們即今入寶山還有不空手而歸者麼設有正須朝打三千暮打八百庚申十月十三時天淨無雲日午忽轟雷三震圓光空際亦三遂化去茶毗舍利如注順天府大千佛寺徧融真圓禪師西蜀營山綫氏子家世業儒書史過目不忘族人曰振吾宗者必此子至年將立感生死無常遂捨家入雲華山禮可公為師薙染抵京師聽講華嚴至若人欲識佛境界當淨其意如虗空處倐然頓悟身超虗空不覺屋廬為礙私謂曰法界玄宗毗盧性海無外吾之方寸矣且道離文字孰衍孰聽畵餅不能充饑斯言信矣翌日曳杖東下至洪州居馬祖菴時同氣相求者畢至歷七載乃入匡廬躬鬻薪易米供眾不避風雨寒暑者二十餘年居獅子巖時常橫一棒坐巖口僧來輒熱棒棒之惜無有契其機者前後四入京師初住龍華次住栢林又迻世剎海最後慈聖太后建千佛叢林請師居之嘗在杲日寺講華嚴有狂僧觸太宰繫獄因併逮師至于㭱師稱大經名而鐵索檀㭱轟然為盡裂人皆感其異相率皈依而圓扉中皆浩浩佛聲矣刑部獄中苦逼萬端師處之晏然同刑者驚其異操師曰無他術也心存中正雖處患難而不知有患難也張大岳上章明師無罪得免慈聖皇后命復居世剎海陸五臺問如何是文殊智師曰不隨心外境曰如何是普賢行師曰調理一切心曰如何是毗盧法界師曰事事無礙陸嘆曰今而後萬殊一體我知之矣趙大州問孔子方佛奚若師曰仲尼治世聖人也佛則治出世之聖人也懲惡勸善理誠無異剖裂玄微佛氏方罄州為首肯明神宗萬曆甲申九月師命送龕無緩適一孤鴈集方丈師曰爾來耶至九日尚坐繩牀聞晚課誦願生西方句遂泊然而化壽七十九臘五十全身瘞德勝門外普同塔武昌府黃檗無念深有禪師黃州麻城熊氏子偶遊蕩山有宿衲謂師曰十方一粒米重如須彌山若還不了道披毛戴角還師悚然又聞僧舉僧問大休如何是西來意休曰黃瓜茄子師大疑遂往五臺伏牛遍叩知識抵廬山參大安安問汝號甚麼師曰無念安曰那箇是無念師茫然無對一夕聞哭笑二聲相觸有省又一日開櫃失手被櫃葢打頭渾身汗流乃撫掌笑曰遍大地是箇無念何疑之有往龍湖同卓吾居士到駟馬山會有講主至士問主曰清淨本然云何忽生山河大地主依文講罷士顧謂師曰你試說看師擬開口士將師膝上一推曰者箇聻師忽大悟有偈曰四十餘年不住功窮來窮去轉無踪而今窮到無依倚始悔從前錯用功住後僧問道果有耶果無耶師曰說有說無二俱成謗曰如何即得師曰無求即得曰如何是道之體師曰滿口道不著曰四大離散時如何師竪起拳曰者箇不屬四大問古人曰迸却咽喉唇吻道將一句來者一句如何道師曰我不迸却咽喉唇吻你且道一句看僧無對師曰你被音聲塞却口問見性成佛是否師曰是曰性是無形底如何得見師曰性是有形底只你不見曰請和尚指出看師曰我說汝不見問如何出離生死師召僧僧應諾師曰從者裡出曰和尚說底話某甲不曉得師曰等你曉得堪作甚麼復友人書曰學道要趂初心猛利立刻就要討箇分曉日間對境逢緣纔得出脫不然日久月深漸忘精進依舊流落世情近時學人只圖口舌利便恃己見識聰明忘却本分及至惡病臨身手脚忙亂一些也用不著又不肯歸咎自己念頭不切立志差錯反說先聖佛祖也只如是毀謗正法輪自夢未醒且莫錯會好他古聖一言半句如吹毛劍鐵釘飯木札羹塗毒鼓直是無你側耳處無你下口處無你著意處無你近傍處纔眨眼來便成蹉過真學道人時中必須情枯想絕思盡神窮寒暑兩忘寢食俱廢於無可捉摸處驀地猛省將來從前馳求心一時頓息知見全消是非泯跡到此田地自然慶快平生更不隨聲逐色但是聰明解會能所神通脫手讓與他人拚教終日如癡似虗其腹閒其心舉世莫能知鬼神莫能覰就是黑面閻老子亦無處著眼者纔是吾學道之人真自在也杭州府雲棲蓮池袾宏大師郡之仁和沈氏子年十七補邑庠每書生死事大四字於案頭一日失手碎茶甌有省作七筆勾見志投西山性天祝髮北遊參徧融次謁笑巖於柳巷求開示巖曰阿你三千里外來開示我我有甚麼開示你師恍然辭歸過東昌道中聞樵樓鼓聲廓爾大悟述偈三十年前事可疑三千里外遇何奇焚香擲戟渾閒事魔佛空爭是與非尋歸浙建幢雲棲侍郎王宗沐問夜來老鼠唧唧說盡一部華嚴師曰猫兒突出時如何王無語師自代曰走却法師留下講案遂頌曰老鼠唧唧華嚴歷歷奇哉王侍郎却被畜生惑猫兒突出畫堂前牀頭說法無消息有消息大方廣佛華嚴經世主妙嚴品第一因饑荒疫癘餓莩載道當道發儲賑濟命醫救療舉師董其事銓部虞淳熙舉慧日點五百病僧因緣請師判斷師為拈之曰慧日自甘窮子捨己從人西院屈陷平民將生就死可惜五百僧只解點著便行曾無一箇高臥不起致令慧日顯異惑眾禍及兒孫郡主深切民瘼山僧急趨時難倉卒中失帶了竹杖子不免奮空拳向居士癰腫上劈地一下敢保沉疴潰散毒血淋漓六脉調和百骸舒畼雖然如是云何一人能令眾起不見道陽回片葉春滿千林者事且置祇如終日把竹杖子東指西揮不如一直在木頭上朝持暮守守來守去忽然枯木重榮便是死人再活說甚麼竹木管取盡大地草木叢林悉皆成佛去也何以故青青物外虗空體即是如來堅實心問參禪念佛可融通否師曰若然是兩物用得融通著舉世尊默然良久外道謂開我迷雲空生宴座不言帝釋曰善說般若話拈曰良久處欲望開迷陰霾萬里宴座邊擬聞般若說竟多時雖然鞭頭得旨空裡飛花者畢竟見箇甚麼示採蕨者曰心訣教我如何談蹉過山前好時節蕨蕨竪起拳頭向君說又新春日示眾今日賀新春歲時重換却昨日作麼生十二月廿八自像贊十畵九不像惱殺丹青匠庶幾此近之權留作供養若道者便是依然成兩樣不兩樣三十棒臨寂預於半月前別眾曰吾將他往矣眾莫諭至期微疾面西端坐而逝當萬曆庚辰四月日世壽八十臘六十塔全身於本山南康府雲居顓愚觀衡禪師行脚時甞過雲間因訪陳眉公三度通刺適公有事未及接見師乃留偈而去偈曰硯池三泖秀筆架九峰高堂上讀書子清風吹布袍公見偈急呼舟追之至蘇州而師却杜門不見初出住楚寶慶五臺菴次遷金陵紫竹林萬曆末年領吉州青原晚遷雲居僧參拜起便問如何是西來意師曰請坐僧坐又問師曰何必忙曰某甲特特遠來乞師指示師曰病僧實不知佛法僧懡㦬而退時有聞上座謂師曰諸方手段縱好殺人必有血痕和尚殺人莫道血痕氣息也無師曰你又來塗污病僧問普門大士今在何處師作咳𠻳勢曰問甚麼僧罔措又僧問大士今在何處師曰大士且置上座今在何處曰現親覲和尚師曰病僧不受親覲曰某甲何曾親覲師曰者前言不顧後語漢出去鎬上座依久一日辭去索師舊行脚為信師曰我一向擔板有甚舊行脚只有一頂破樺皮帽子不嫌收取去曰就請師舉足示之鎬禮謝師示以偈曰禪人索我舊行脚只有一頂破樺帽舉足為君重指陳若陰若晴莫忘却問婆子具何手段便燒却菴師曰諸供養中法供養最曰菴主便去未審是何意思師曰明鎗易躲暗箭難防問一口氣不來畢竟向甚麼處去師曰鏡面明鏡背暗曰不會師曰雲歸山水歸海問如何是二種根本師曰火性燥水性溼問如何是常住真心師曰青山㟮屼綠水長流曰真心與妄想相去幾何師曰黃花熳熳翠竹珊珊問和尚是誰家兒孫師曰臨濟曰臨濟機如雷電和尚為甚綿軟如泥師曰好兒不住爺屋又僧問和尚是誰家兒孫師曰曹洞曰憨大師親見笑巖為甚道是曹洞師曰將此深心奉塵剎是則名為報佛恩問和尚主持此宗為甚教人禮大士及生淨土師曰家家門口長安路曰何不決定一門師曰活人不做做死漢有圓通頌百首一曰展脚長眠白月下光明不讓水晶宮睡濃不做圓通夢佛祖都為過耳風一曰廣大普門深復深九重窅寞更沉沉玉階青鎖行人斷鎮日簾垂鳥不音一曰誰家公子慣風流淺履輕衫錦市遊醉倒春臺迷出處正知身在岳陽樓一曰眼底笙簧聽不盡耳邊朱紫任參差飛刀雨矢盈空下正是圓通自在時憨山清嗣悞列此佛妙禪師昆明人也出家於天華寺洪武十六年赴京賜衣錫杖遊兩浙宣德四年十二月沐浴更衣書偈曰去年七十九今年滿八十萬里為參尋世緣今已畢擲筆端坐而化紫栢達觀真可大師句曲沈氏子性忼慨激烈弱不好弄不喜見婦人年十七剃髮遊方聞誦張拙偈斷除妄想重增病趨向真如亦是邪大疑之一日齋次忽大悟乃曰使我在臨濟德山座下一掌便醒安用如何若何北遊京師參徧融萬曆癸卯秋忽妖書發師罹難先是神宗手書般若經偶汗下漬紙疑當易函遣近侍質于師師以偈進曰師汗一滴萬世津梁無窮法藏從此放光上大悅由是注意焉適見章奏意甚憐之在法不能免因逮及旨下著審而已拷訊時師神色自若持議甚正以衰老殘軀備甞笞楚抵死不屈十二月五日入獄法司定罪欲死師師說偈曰一笑繇來別有因那知大塊不容塵從茲收拾孃生足鐵橛華開不待春又曰世法若此久住何為乃索浴罷囑侍者曰吾去矣幸謝江南諸護法復說偈曰事來方見英雄骨達老吳生豈宿緣我自西歸君自北多生晤語更冷然語畢端坐而逝所著有紫栢集潮州鳳棲孝禪戲蘆澄心禪師海陽楊氏子依無得剃度受具於黃檗後遊吳越叢席中擬置師籌室師固辭願居學地以自煅煉有百花叢裏過一葉不沾身之句素性少攀緣絕請謁每日危坐如入禪觀或有過客口辯捷相對久之塵囂之念自消故自題肖贊云墮甑之屑風蕉之葉作如是觀祇同一橛淡於水冷於石不可得而親疎貴賤觀之令人心絕本是韓山一點青於今化作千巖雪師因葬親回潮親友遮留築室於鳳棲今為孝禪蘭若起南和尚未脫白時曾請開示其詞曰博地凡夫業識錮蔽平日只向冊子上口頭邊依他作解幻妄中又增幻妄命根不斷枝葉增長要得截斷葛藤須是金剛寶劍當頭直截是即是只是無人代你下手還宜自著忙一番不負學道初心到底作箇英烈丈夫始得生平拈頌詩偈甚多不令存稿或有私記見即焚之甲辰夏示微恙謂眾曰夢幻之軀勢不久停終歸滅盡我沒後不得建塔投諸江中足矣至七月初一日奄然而逝
