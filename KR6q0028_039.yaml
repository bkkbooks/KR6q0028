body:
  text: 南海普陀嗣祖沙門西蜀性統編集曹洞宗大鑑下第三十七世雲門澄禪師法嗣湖州府苕溪指南明徹禪師金華應氏子年草二投古卓剃染卓示萬法歸一話令參久之恨無所入兩斷其指遍參明宿愈覺茫然還依真寂及無擇雖有省終覺礙膺次從龍池以追逼過度狂發幾死後參雲門呈所見門為痛下針錐始得脫略一日門曰僧問法眼如何是佛眼對即汝便是僧便拜倘問汝汝作麼生師曰但向道清風度廊下門曰未在更道師曰到者裡道箇甚麼即得門默之異日囑以偈曰心是本來心法亦無他法心法祇如是源源不可絶當萬曆壬子也同明因侍立雲門次門曰老僧四大不和汝能療之否師曰蒼天蒼天門顧因因曰譫語作麼門曰不如者不識字的後住靜苕溪偶至土橋示疾僧問大師得力宗門今日臨行一句如何分付師震威一喝僧視之則師已逝矣紹興府明因麥浪明懷禪師山陰王氏子五歲驅烏天王寺十七秉具雲棲遊講肆有聲聞宗門事有疑遂參雲門門問見猶離見見不能及如何是見不及處師下語無當乃再拜求示旨要門曰者裡無甚旨要汝時中但看箇見不及處自有所詣師參究之久愈覺茫然一日看雲門推出旁僧曰大衆證明話以對雲棲舉海底泥牛銜月走之問忽然有省走見門門即席拈盤果曰我用處不換機你喚他作甚麼師撲果落地門曰汝適道佛祖舌頭瞞你不得一盤胡桃汝便破他瞞也師曰却是和尚破明懷瞞門曰你檢點話頭看師曰胡桃只是胡桃門休去門赴徑山乃令師首衆顯聖丙辰省門於東塔會定林同席師問大德尊號曰定林師曰葉落歸根時如何定擬對師曰何不道本來無枝節到底赤條條定乃問大德尊號師曰麥浪曰無風時甚處安身立命師劈面一掌定曰未在師曰三尺浪高魚化龍癡人猶戽夜塘水門曰麥浪行劍刃上事若無後語都成布袋裡老鴉時埭山虗席延師主之拈提宗旨大有長處門始付以偈曰如是之法宗説兼備汝今得之其善保芘後住明因示衆洛陽牛犢飲禾頭荊益田疇減半收舜若多神拐腹死江河淮濟淚長流是汝諸人還委悉麼便下座示衆昨日雨今日風非空非色天台來徑山去是聖是凡孟八郎漢檢點得七穿八穴猶是隔靴抓癢黃口雛禪縱饒能打瓦鑽龜都來接竹點天何如懶道人飢來喫飯困來打眠後示寂塔於明因之前山杭州府寶壽石雨明方禪師別號斷拂嘉興武塘陳氏子以明萬曆癸巳正月甲申墮地慧業生知靈根夙種年二十二偶遊雙塔寺觸昔緣遂辭親棄室投武林法相剃染一日與老宿課佛號次忽擲魚曰不惟西方東土亦可生矣獨於南泉三不是語礙膺如塊時雲門説法嘉禾東塔師往參呈所得門無他示但以俚言熱罵之而向所礙膺忽消落嗣閲楞嚴至我真文殊無是文殊若有是者則二文殊處不覺身心世界打成一片然冷地拶著未免吞吐不下復走見門門示以本色鉗錘不少假借次參博山憨山二老俱有得己未納戒雲門壬戌辭門住山飢寒毗佛洞風雨西方菴者久之心灰智泯如大死人却恨死了活不得復下西峰再參雲門一日門上堂曰放下著師乃豁然通身慶快呈偈曰平空一擲絶躊躇轉眼風波徹太虗會得竿頭舒卷意放生原是釣來魚門閲畢佯為叱之經行次聞僧舉大慧語禮侍者淨剝荔枝話忽軒渠一笑首座搊住曰道道師曰恰值某甲持不語戒座奇之時有僧問話而身甚抖戰門曰問話且置把者抖戰的去了著師突出曰和尚何得以貌取人門擬答師却作抖戰勢門曰賊師曰賊賊自是機鋒人莫敢犯一日入室門問如何是一口道不盡底句師曰晨昏禮拜和尚也是尋常事門曰趙州道無意作麼生師曰和尚喜著棋某甲粗知門曰他道有又作麼生師矢口頌曰家家有幅遮羞布放下便能當雨露獨怪當年老趙州擲却頭巾頂却褲門遂以大法囑纍之當天啓癸亥臘八也於是走楚謁黃檗養靜兒山下丁卯奔計雲門南入香柏峰決志活埋崇禎辛未始起象田壬申開法天華甲戌領顯聖院事丙子主餘杭寶壽兼理龍門戊寅住西禪己卯主法雪峰壬午復結制天華甲申主東塔順治丙戌住佛日上堂未離兜率已降皇宮及其降也一場㦬懡未出母胎度人已畢及其出也一場㦬懡致使後來一隊釘樁搖櫓漢盡道不動步而周遍十方不開口而言滿天下蒼天蒼天總不如東村西舍胡張三黑李四朝隨流水去暮踏白雲歸醉忘春草緑侵扉上堂閙市裡識得天子念念不違於北闕百草頭薦得祖意時時奉重於尊堂不許義斷功忘尤當竭忠盡孝雖然更須知我者裡別有生涯且道是甚麼生涯良久曰富沙灘上撈魚蝦東塔上堂指塔曰多寶佛塔為汝轉根本法輪了也是汝諸人還委悉麼良久曰若將耳聽終難會眼處聞來方始知乃顧謂侍者曰山僧今日眉毛在麼上堂夜半金烏突出難辨日中玉兔覿面猶迷齊彭殤一死生儒宗之妙唱即生滅非生滅釋氏之玄提露柱懷胎特牛生子且道是妙唱是玄提咄無將送客風翻為留客雨上堂四十九年三百餘會決定不是第一義摩竭掩室毗耶默然決定不是第一義九載面壁千七百則決定不是第一義畢竟如何是第一義良久曰心不負人面無慙色上堂智人一言快馬一鞭便恁會去猶涉聯纖驀拈拄杖曰看看松篁橋水逆流也你輩要點鐵成金轉凡為聖喝消得龍王多少風上堂在日用中錯過喫飯穿衣向筵席上去覓酸梨甜棗貪觀天上月失却手中橈深為可憫大衆且喚甚麼作手中橈癡人面前不得説夢上堂寶壽山高突兀中有人不相識中有境取不得欲擬心身命失奇花幽木不知年古塔新開舊石田此日為君重説破寶龍橋下水連天喝一喝下座法相上堂古定光今法相驀地相看難度量短十尺長一丈橫看成嶺側成峰幾希惱殺丹青匠無底盂一箇斷鼻草鞋一緉海角天涯走一回兩耳依然在肩上象田上堂者片田地人人都有只是不會料理致使荒却所以勞他上古象為之耕鳥為之耘梵卿禪師為之灌蔭念首座為之扶耒靈禪者為之繼耕今日衆中若有能向前承賃善於料理者驀拈拄杖曰山僧有全紙契書兩手分付有麼有麼良久衆無語乃度拄杖與侍者曰且收著上堂舉趙州因婆子遣使請轉藏州下禪牀繞一匝向使者道轉藏已竟使歸語婆婆曰我比來要轉全藏為甚麼只轉得半藏師曰且如那半藏還曾有人轉得麼山僧今日為諸人轉去也良久曰如是如是又良久曰不是不是上堂木童撫掌石女嚬呻三家村裡廖鬍子十字街頭等箇人且道等箇甚麼人雪消溪水活又見一年春梅花枝上月三更小參識得破意不過不知把住要津即是私通一路隨爾顛倒以緇為素帶纍三世諸佛也要在草裡坐驀竪拂子曰者是草還有出得三世諸佛者麼良久擲下拂子曰令人長憶李將軍萬里天邊飛一鶚開示諸方有貴見識不貴操履者有責操履不貴見識者殊不知古人論見識即是操履邊的見識論操履即是見識邊的操履言行相符初無先後黃龍南坐事入獄者六十日後謂弟子曰我當時在獄中得法華遊戲三昧弟子請問其説南曰凡獄吏之治有罪者痛加槌楚欺詐情盡雖有嚴刑酷法無所施於是就死無恨今學者有狂妄心欺詐心不以知見智慧之力治之又何由而得安其心哉故山僧屢屢教你不要求安樂一切苦來病來痛來不如意事來都是你親切的善知識不可錯過若是恣汝身心頭頭順適者却是你的生冤家不可不先覷破也然則與麼説話現前大衆無不盡知但到對境臨場未免暗自走作所以道説時似有貪瞋藥對境全無戒定方嗟嗟者逆順二境尚不能安間自由又説甚麼見地又説甚麼操履你輩有志參學切須仔細僧問玄沙道諦當甚諦當敢保老兄未徹在意旨如何師曰腦後見腮莫與往來問那吒柝骨還父柝肉還母未審將何説法師曰冬不寒臘後看問凡有言句盡屬染污如何得不染污師曰巡人犯夜問不是心不是佛不是物畢竟是箇甚麼師曰老鼠吞大象問馬祖道藏頭白海頭黑是何意旨師曰猩猩自古惜猩猩問一悟永悟因甚却有大法未明師曰無米熟熬油問併却咽喉脣吻請師答話師曰此問不答曰為甚不答師曰恐犯咽喉脣吻問此土無佛向那裡描畫師曰賊身已露問渠不是我我不是渠渠我兩不立何處得逢渠師曰堯眉八彩舜目重瞳問佛祖談不及處請和尚下一轉語師曰沒有者間工夫曰和尚舌頭長也師曰你那裡見得曰學人把臂共高歌師曰且緩緩石車乘同師坐次黃元公問雨石相磕時如何師曰只可自怡悅不堪持贈君問父母未生前還許學人會也無師曰問即不得曰恁麼則不弄鶯啼舌解吟無字師曰易拾爐中雪難分海底燈曰肯諾不全蒙師指不犯師顏請借賓師曰好炊無米飯供養莫將來曰祇如將來又作師生師曰恐喪我兒孫曰恁麼則借他香燭稱他壽去也師曰新荔枝新荔枝順治乙酉送散木老人木主人徑山祖堂丁亥八閩部使者遣官致幣請興雪峰芝山師堅辭不赴一日忽語衆曰世界勿寧不如歸去好每結冬必以元正小盡解戊子初三即撾鼓上堂曰人人藤斗笠箇箇水雲包出門踏著草途路轉迢遙到者裡不倒斷得一回直饒説箇回途得妙就路還家便是千里萬里者也只因你不能向異類中行且道異類又如何行乃屈指曰一雞二犬三豬四羊五牛六馬為甚麼七不道參至晚示衆諄諄次早辭衆出山首座問和尚幾時回師曰初八九初六至寶壽囑院事初七上龍門晚示微恙付託殷勤次早命浴罷端坐不語門人問還有分付也無師曰恰有箇分付遂坐脫當八日申時也闍維塔於龍門金龜巖下壽五十六臘三十五師行道一十八載住持名剎凡十餘穎悟逸格靈變天生故機用殺活不可測識其愛才作人出於性成雖鉗錘嚴厲人皆親如父母包荒馮河中行是尚故諸方皆稱為熱惱中之清涼幢云杭州府愚菴三宜明盂禪師錢塘丁氏子生而有異八歲與群兒戲喜歌梵唄十四斷暈喜習定有禪者叱其非令看高峰主人公話忽一日觸龐公語成偈曰鐵牛解吼木人善走心境如何打箇筋斗但於托産難話有疑年二十三投真寂印剃染喜博聞印嘗挫抑之一夕經行憶婆子轉藏因緣觸香桌有省舉似印印曰汝悟道耶師曰道即不悟捉敗趙州印曰甚處見趙州師乃敘所得印曰如何是那半藏師曰此是透法身事印遽劈面一掌師退次參雲門入堂約不語戒正提撕忽門入堂高聲曰放下著師不覺掀眉一笑門問懷州牛喫禾為甚麼益州馬腹脹師曰問取露柱門曰祇如樹倒藤枯畢竟句歸何處師曰長江翻白浪門曰如何是一口道不盡的句師曰小月落孤峰門曰尚疑你在師遂成偈曰石傘峰前玉一溪逢源那説動舟迷落花無限春山暮得路還家聽鳥啼門揶揄之師拂袖出一日入室門曰狗子佛性無意作麼生師應聲頌曰佛性無佛性無稱錘落井却能浮曾經捉敗趙州後拍手終朝唱鷓鴣門可之遂囑纍焉嗣是事遍參抵黃麻謁無念有有見詬罵不已師問南泉斬貓意旨如何有憑陵曰我殺不得汝邪師曰殺即任殺斬貓意旨畢竟如何有曰待趙州來與汝道師拂袖便出聞雲門訃歸哭影堂衆請小參舉石霜遍界不曾藏因緣畢曰大衆不曾藏東風搖拽柳絲長紅肥緑瘦紛紛蛺蝶度危牆燕子雙雙繞畫梁作彈琵琶勢曰謾剔銀缸夜深獨自理宮商復喝一喝下座乙亥住龍門次住化山崇禎癸未繼席顯聖戊子結制宗會己丑説戒真寂次結菴湖濵養母庚寅主梵受丙申主朱明上堂無縫塔蓋覆官家喫油糍難瞞土地三世諸佛有智而沉下僚白牯狸奴無德而居上位直賤非賤直貴非貴總不若露柱燈籠善于和會卓拄杖曰此是無諍三昧上堂點得無油燈豁開頂門竅走入閙市叢中左右逢源得妙如何寒山子忘却來時道阮籍猖狂孫登長嘯上堂百草頭識取祖師草枯了也閙市裡識取天子市散了也諸人向甚處相見良久以手招曰猩猩我與你相見了也上堂日上海門東雲裡越山無數前村紅樹欲與杏花相妒橫橋野水杖藜徐步祇恁劉郎前度一切智智清淨無二無二分無別無斷故上堂大衆世尊拈花後還有人舉著箇事麼良久曰要識來年米價問取東村王大上堂好休休去不休休白首登科戀黑裘黃菊謾誇霜後色白雲紅樹滿荒丘舍利弗沒來由劍去徒勞更刻舟果然世纍金輪子豈肯要功萬戶侯小參新豐一句當陽道破不涉脣吻已成露布細雨濛濛黃花滿路打失衲僧鼻孔忘却邯鄲故步古鏡臺前幾多錯誤顧大衆曰露小參雨後遠山風致美窗前紅樹看花蕊樓頭清夜洞簫聲月下相將步煙水委不委切忌錯過棚頭傀儡小參牛頭未見四祖已前百鳥銜花見後野鬼飛沙堪笑長汀布袋子却從閙市作生涯大衆歸堂喫茶僧問洞山道吾常於此切意旨如何師曰我二十年亦曾疑著今日被你一問直得口啞問如何是透法身的句師曰青荷葉上耍孩兒問萬法歸一一歸何處師曰我清早割菜晚上擡水那裡有間氣力與你們纏僧無語師曰菩提薩婆訶僧參師曰還委悉麼曰香煙與和尚道甚麼師曰朝打三千暮打八百東家杓柄長西家杓柄短還有話會也無僧擬議師便打問僧你在者裡做甚麼曰參主人公師打噴喋一下僧罔措師曰誰在那裡説我了僧作禮師曰老僧入地獄有分師應機説法不循途轍故領略者鮮其歸隱愚菴時嘗有示衆曰遠山如黛野水碧波清漾邪橋隱隱聽雞鳴村舍草籬門巷鷺鷥刷羽蘆汀征鴈數聲嘹喨風中簫管短長聲夜來月自凋桐上政黃牛橘皮湯止渴懶殘師芋香無恙髮長籍草坐南薰白眼視公侯卿相愚菴老僧船子和尚堪笑箇不唧𠺕漢擯出院又罰饡飯良久曰十洲春盡花凋殘珊瑚枝頭紅日上師恥禪者空腹高心不明一經故時及講演應機接物有古雲門風即動上諧謔一皆密義康熙乙巳十月十一辭世壽六十七臘四十五塔全身於顯聖前山之陰紹興府東山爾密明澓禪師別號散伊會稽王氏子生而雄偉力能仆牯賦性爽直見義敢為年二十二謁貞白珊於大慈決志力參殆忘寢食偶德清舟中聞鑼聲有省述偈曰鑼震空身世觀音獨露身泥牛銜月走木馬報新春年二十七潛往開元剃髮復依珊於光明寺珊沒訪一金融融知為法器使參雲門以聞鑼之得呈之門曰此宿根所致耳尚須知有向上一著師唯唯一日門上堂曰放下著師忽全身脫落呈偈曰夜半霜寒月忽低行人到此盡遲疑翻身踏斷來時路點點星輝斗柄垂門可之越二年以偈囑纍曰鑼鳴與鼓響觀音塞耳門真得圓通意騎月上崑崙當天啓癸亥佛成道日也師以授受重晦迹東山香雪塢有大溈之風無何門示寂師以育王殿事抵金陵適博山來説法天界師謁之與論法門細大及物不遷旨徵辨竟日無少讓山曰江南佛法洵有人矣崇禎戊辰東山國慶寺延師為重興不數年規制大備丙子冬開法梅墅彌陀次年領顯聖院事庚辰仍歸東山有以徑山雪竇請師皆力辭唯以顯聖不可一日無主於是復理焉上堂少林九載面壁言滿天下釋迦四十九年説法初無一字多不在添少不在減今日東山與他踢翻窠臼不刻華文不書梵篆直是箇無文印子尋常逢逆則譏訶怒罵遇順則四海春風兄弟們猶道者漢面皮少黃黑在然則畢竟添多即是減少即是有人緇素得出許伊具一隻眼緇素不出亦許伊具一隻眼為甚麼且要賞罰分明上堂舉琅琊問舉上座近離甚處因緣畢師曰衆兄弟向二尊宿舌頭上打得箇鞦韆過來方得知道出常情非特不被是非絆却且能即是非而作佛事其或未然君向西秦我之東魯少參興化擯維那要顯吾道一貫大顛打首座始信教外別傳我顯聖者裡有時綿包特石拶得萬象成狂天上有星皆拱北有時鐵裹胡蔥逼得千林盡櫱人間無水不朝東驀竪拂子曰尚有者箇不與諸人道破何故擲下拂子曰海神知貴不知價留與人間光照夜小參立功勳存照用大似緣木求魚收視聽黜聰明何異牯牛取乳又道道非見聞覺知不離聲色言語據如上説且道畢竟如何行履始得恰好良久曰路逢死蛇莫打殺無底籃子盛將歸除夕小參三十六旬渾具吉凶悔吝七十二候無非加減乘除須知雲裡千峰自秀劫前萬象常新寒松帶露亭亭獨立巖頭修竹欺霜凜凜全超物外諸人向者裡倒斷得一回年年是好年日日是好日其或未然來朝更有新條在惱亂春風卒未休舉僧問風穴塵鹿成群如何射得塵中塵穴云釣船載到瀟湘岸氣咽無聊問白鷗頌曰帝遠天高罵至尊偶逢國士降絲綸詔宣率土歸皇化羽族銜蘆過鴈門舉僧問投子三身中那一身説法子彈指一下頌曰鳥啼花落昧當人説法何曾假數身折箸拈來旋北海魚龍方識水為親舉青林虔因僧問學人竟往時如何師著語曰切忌流連忘返林云死蛇當大路勸子莫當頭拍嬭唬小兒僧云當頭時如何拚命喫河魨林云喪子命根今日堂中幾人喪身失命僧云不當頭時如何燒却了也林云亦無回避處滿眼滿耳沒蹤迹僧云正恁麼時如何弗得黏皮帶骨林云失却了也船不漏針僧云畢竟向甚麼處去果然果然林云草深無覓處打則打了你還見麼僧云和尚也須隄防引得孩兒會打爺林撫掌云一等是箇毒氣慷慨殺身易從容就義難復曰山僧與麼批判諸人且作麼生會良久曰借問漁舟何處去夜深依舊宿蘆花師行道一十五載視人無高下接物善權變其住院領衆威而不猛寬而有節祕重大法不輕以隋珠彈鞭龍撻象摧鋒破堅槩出諸從容指顧間言到行到宗通説通誠不虗博山之預識也崇禎壬午夏示微疾絶食旬餘而示誨談笑不異平昔六月十六寅刻説偈而化壽五十二臘二十五塔全身於顯聖之南山紹興府香雪菴具足明有禪師會稽楊氏子弱齡事親至孝父病嘗割股救之年草二出家參念佛是誰聞雲門家法迥別諸方遂往參焉聞僧舉北斗面南看話疑情頓發一日殿上經行次舉首見前山豁然大悟述偈呈門曰虗空粉碎無偏正大地平沉孰是親從今了却相思債石虎泥牛笑轉新門印以偈曰孝為至道之先孰能於此兩兼時中護念如是諸佛慧命可全當天啓乙丑也後出住上虞香雪斷拂老人問古人道堪與佛祖為師未審佛祖又學箇甚麼師曰佛祖聻拂曰與佛祖為師聻師曰黃山谷後園種菜拂曰不問佛不問祖不管你佛不管你祖速道速道師曰東村桃樹西隴梅花僧問久滯不通時如何師曰數珠在手曰音聲未息時如何師曰葶藶子曰六窗未淨時如何師曰相見了也示寂日象田問古人云病有不病者如何是不病者師默然田曰恁麼莫便是那師曰三十棒領出自打田曰臨末稍頭一句作麼生師喝一喝田曰此後如何師曰南山雲北山雨時未有繼嗣乃以如意法衣法卷寄斷拂老人為求法器偈曰香柏枝分秀隨緣折一枝花開香雪遠何必異苗為示寂塔於顯聖之南山湖州府辨山瑞白明雪禪師別號入就桐城楊氏子生於萬曆甲申子月草六方毀齓遽脫左髦事母卓有孝聞年二十從九華聚龍剃落紫柏可授以毗舍浮佛偈令持戊申納戒雲棲庚戌參雲門門問向來作甚麼師對以持毗舍偈門曰四大是假妄心是空阿誰拖你者死尸來師鈍置疑甚至痛哭抵死一日聞門舉南泉斬貓話當下知有遂將蒲團拋出門曰一語下徐州會隨衆侍門橋上門曰溪水潺潺汝等各道一句看師曰敲空有響擊木無聲門笑之越六日聞鐘聲頓爾大徹自是有機辨出衆中丙辰縛茅皖公山己未遍參基隆博山諸老機語契甚庚申歸省雲門明年屏居天柱峰癸亥門擢師為座二座嗣住靜鐵壁居有僧請益高峰主人公話師示以頌曰打破碧琉璃卸却珍御服枕子開口笑雙髻罵天目丙寅秋復還雲門呈偈有欲識老胡親的旨金烏夜半麗中天句門以為語無滲漏善解回互遂付以偈曰誕生原是妄安名空裡栽花忒現成滿口道來無可道威音那畔少知音無何門逝衆推師繼席當崇禎己巳冬也庚午剪榛湖州辨山復古龍華寺至若越之戒珠延慶湖之白台之護國則以其請應之丙子遁隱贛州崆洞庚辰建安王迎主洪都百丈住世七坐道場上堂開疆展土彌勒樓現於當處伐木誅茅普光殿建在目前一任朝野高人出出入入乾坤道者往往來來性海悟於剎那行門成於頃爾正恁麼時煙霞散彩日月舒光則且置祇如成家樂業一句作麼生道四海水雲明正化萬黎庶樂無為上堂覿面無向背當處絶遮攔無向背處嚴密不通風絶遮攔時行藏難著眼直得三際凝然十方不隔者裡要用便用棒喝交馳彰祖令要歇便歇寂然無縫顯單傳大衆正偏兼帶則且置不涉離微一句作麼生舉卓拄杖曰鐵馬騎牛騰碧漢烏龜跨鶴上崑崙上堂飄零黃葉振古佛之家風遊衍行雲顯當人之面目快覩戒珠𠒼耀爐嶽崔巍一道神光貫徹今古雖然更須知有轉身一路且作麼生是轉身一路化功歸己琴堂冷退位朝君古殿寒上堂一葉扁舟浪裡顛絲綸拋去看浮錢鈎頭若得錦鱗現不負漁翁冒曉煙以拂子作垂綸勢曰莫有負命的鯨鯤麼出來吞啖看一僧才出師曰單蝦隻鯉何足為意便歸方丈小參一向恁麼一華一彌勒一葉一釋迦一向不恁麼三世諸佛無開口處歷代祖師無厝足地更須知恁麼中不恁麼不恁麼中却恁麼不恁麼中却恁麼把住不礙放行恁麼中不恁麼解制何妨結制所以道太陽門下日日三秋明月堂前時時九夏者且置祇如功位俱隱正偏不立又作麼生無陰陽地草常秀花發寒巖不帶春示衆今日天中佳節畫龍艾虎鬬額奪得錦標歸來特與諸君漏泄且作麼生是漏泄底事石榴紅似火楊花白如雪示衆赤水有玄珠精光生四澤離婁不可求罔象偏能得既得必須護不護還成失欲識護珠人問取幻禪客大衆護則且置作麼生是珠喝一喝僧問善財初見文殊已得根本智末上又見文殊是何意旨師曰騎虎頭收虎尾問若人識得心大地無寸土現前山河大地是有是無師曰鏡裡莫攀花問最初威音王佛參見何人師曰鬍張三黑李四問桂輪孤朗為甚麼清光不照師曰忘功體更賒問如何是不思議境界師曰螺螄吞大象問如何是本來面目師曰紅日上粉牆曰不會師曰光明燦爛問發真歸元者十方虗空悉皆銷殞如何是鎖殞底事師曰玉人夢破一聲雞師指桃華問衆曰靈雲見桃華悟道諸人見桃花為甚麼不悟道衆答不契一僧進曰和尚見桃花未審如何師曰山僧不解眼花曰怎奈即今何師乃作咳嗽勢曰山僧有病出去師參學時無被臥不解帶者十三年質朴不文端方可重鍛鍊學者不假辭色察有志可操者鉗錘尤加嚴峻諸方於法門有所左者則力闢之或諫之師則曰摧邪輔正令法久住吾豈畏刀斧哉師性倔強行止自斷嘗曰我為法王於法自在晚居百丈風規愈肅人咸謂大智再來辛巳穀日示微疾領衆益篤談論倍常三月望日令淨髮十九侵晨索浴畢謂侍僧曰扶老僧入龕且搦管書偈曰來亦無一物去亦無一物要知端的意百丈花梢月擲筆以手招衆衆前師已逝矣壽五十八臘三十八塔全身於辨山龍華寺之右側紹興府鴈田柳湞居士山陰人參雲門首以日用不得力請示門曰但舉箇是甚麼看看來看去忽地放心始有箇安樂士為密密提究者有年一日問趙州狗子畢竟是有佛性無佛性門抗聲曰道甚麼士擬舉門趨步便歸方丈士隨入方丈曰不是柳湞幾成錯過門曰放你三十棒他日又問世尊升座意旨為復在白椎處下座處門隨與一掌士曰分明勾賊破家門曰還要第二掌那士舉張天覺頌本因緣請判門曰判且置如何是頌本士擬議門一喝曰喚作頌本則瞎一日呈偈曰是甚麼有些些對著家君莫問爺金不博金隨處使從來常御白牛車門曰且道甚處是趙州勘破婆子處士曰壁外蓋茅屋門曰不是更道士曰雷聲甚大雨點全無門曰不信道南昌府葉曇茂居士參雲門有省值普茶次出曰曇茂昨日偏衆解制了也門合掌曰恭喜士曰和尚莫塗污人好門曰如何是解制的事士曰仲冬嚴寒請和尚萬福門曰似則似是則未是士曰大衆散去遂歸位門頷之後以母老歸里養親有年覺浪盛説法上藍時士過訪次盛問雲門得力句還記得麼士曰當時恨不唧𠺕盛曰如今又作麼生士曰却放過和尚一著盛曰咦
