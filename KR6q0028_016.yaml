body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十四世小菴密禪師法嗣二仰圓欽禪師禾之秀水人遍參諸方毫無所契入西京謁小菴於旅舍菴問浙中有箇伶俐人汝還見麼師曰圓欽鈍漢菴曰我要箇鈍漢作監收汝還知麼師罔措菴曰數千里來可惜錯過師遂猛參一日見鼠從架上過撲翻油甕忽爾頓契走見菴曰某已捉得了也菴搊住曰道道師曰一粒鼠糞污却鍋羹菴曰瞎漢參堂去成化甲午師居二仰四十餘年足不越閫四方尊宿高其行師一味謝絶塵世力追汾州高峰之為人末後智有來參師歷示本色鉗錘俾深入閫奧始授大法靈谷謙禪師法嗣江寧府靈谷潔菴正映禪師金溪人泉州開元虗席舉得師師奉敕以戊寅六月入院開堂僧問法筵肇啓四衆具瞻皇恩佛恩如何報答師曰甘露泉開流大地師報恩一句蒙師指西來祖意若為宣師曰庭前石塔聳寒空曰與麼則遍界不曾藏也師曰汝見箇甚麼曰某甲終不敢自瞞師曰眼花不少問如何是和尚為人一句師曰兔角杖挑天上月龜毛拂散海濵雲曰恁麼則人天胥慶四海歸仁也師曰且合取口乃曰山僧比蒙天語以清心潔己四字敕住此剎諸人還知聖意麼只者四字是傳佛心印是鎮海明珠山僧南來特特拈出普施大衆要須知世法佛法落霞與孤鶩齊飛古佛今佛秋水共長天一色天心罔測山益高而海益深聖語難窮天溥蓋而地溥載諸人還會麼莫是不染世塵麼莫是不貪法味麼莫是不飲無為酒不坐涅槃牀麼若恁麼會非固不非是則不是山僧今日不敢久閟為諸人當陽指出去也乃拈拄杖卓一卓曰木人舞出法堂前一任炎天飛白雪師居後百廢俱新永樂壬午朝京回諸山舉住福州雪峰法道之振不減真覺洪熙甲辰奉旨住南京靈谷宣德改元卒有語録題名古鏡三昧行於世淨慈聯禪師法嗣杭州府普明立中成禪師錢塘孫氏子年十三投慈光若山出家首謁祖芳芳室中舉臘月火燒山話師呈頌曰白雲迷却舊行蹤臘月燒山火正紅忽地慈風來扇發冷氷氷處暖烘烘芳器之後於北郭建普明寺以接方來未幾請歸慈光正統辛酉六月十三日上堂住世今年八十一老病隨緣且遣日今年記著後年事後年記著今朝日至癸亥如期坐化壽八十三茶毗舍利無算建塔於普明杭州府淨慈照菴宗靜禪師號恬軒叟郡之高氏子自幼剃落本山適祖芳聯領院事師依之久乃得旨旋典藏鑰永樂辛卯應選出住護國尋遷雪竇正統乙丑僧録以淨慈虗席舉師補之丁卯朝廷頒賜大藏師詣闕謝恩止於彌陀寺示微疾謂左右曰吾緣止矣沐浴更衣危坐而寂世壽七十六僧臘六十塔於藕華之祖丘大鑑下第二十五世二仰欽禪師法嗣壽州無念智有禪師蜀之漢州人發足南方遊四明登天目後參二仰仰問曰行腳甚處師曰南方仰曰彼中佛法如何師曰山川無異仰曰我手何似佛手師良久仰曰莫道無異後看興化打維那機緣始浩然大徹作偈曰興化打維那平地遭殃禍昨夜南山雲飛向北山朵仰見為之助喜曰不孤到此至嘉靖初闡化壽州十有三年而終焉大鑑下第二十六世無念有禪師法嗣荊山懷寶禪師渚宮人遊壽州謁無念念曰躐縣遊州畢竟為著何事師曰生死大事求師度念曰汝是荊州人麼師曰是念曰闍黎即今在甚麼處師擬對念曰若便恁麼猶較些子佛法不是商量參堂去師自此潛心座下念一日喚曰闍黎師應諾念曰在甚麼處師於言下領旨乃曰和尚大慈真人天師也念滅度後師於嘉靖三十七年以法付鐵牛遠公隱終南大鑑下第二十七世荊山寶禪師法嗣秦嶺鐵牛德遠禪師自印心於荊山後菴居秦嶺一日身披紅布袴頂笠揮鋤地中朝陽來參見曰者漢好似一頭軍師曰看箭陽作躲箭勢師近前携手行至一菴乃曰我乃徑山之裔在此待人數十年矣汝今既來當為我求人中興祖道留住三月付偈曰就身能打劫劈筈善奪窩三玄從此出三要不為多探竿影草主賓分獅子迷蹤奈我何大鑑下第二十八世鐵牛遠禪師法嗣敘州府朝陽月明聯池禪師郡之范氏子係范郡司馬之後也幼居林下一日有僧過訪不遇因題聯於壁曰阿彌陀佛間也念忙也念念得佛也無念也無無也無扭落鼻孔最上乘禪朝亦參暮亦參參到禪亦寂參亦寂寂亦寂劈開面門師見之忽然厭世便祝髮就之彼僧已先去矣遂杖笠南遊苦辛萬狀單以是聯為提撕話久之洛伽道逢一僧偉儀殊相師在前失腳念佛一聲僧曰此敲門瓦子著他何用師遂問拋却後如何僧曰葉落歸根來時無口師始豁然復遊少林會無言語默深契但師懷念佛祖道脈擔荷非易終不自肯竟入關中過秦嶺受鐵牛之囑語載鐵牛章由峩眉返敘州居郡之朱提山朝陽洞二十年聚雲來參師問曰如何是古佛心雲即拱手云請師尊重又問不用音聲與色身將何喚作本來人雲便出令一僧參只者是僧曰只者是還參箇甚麼師曰放汝三十棒又應一座主請至祭壇指壇問曰此是甚麼所在主曰北壇師曰久聞北壇原來在者裡主罔措崇禎十一年十二月二十四日端坐而逝師壽六十有六全身塔於洞之傍大鑑下第二十九世朝陽池禪師法嗣忠州聚雲吹萬廣真禪師敘州宜賓人姓李氏其先三世為婆羅門父無後禱佛生焉降神之日大士八人臨其舍一人指語父曰此八寶應真出興於世母即厭腥食素三年離乳至十五歲在窗下與同學讀書偶覽菊華歎曰此華今歲凋零來春發生嘗聞生死事大無常迅速讀書寧免生死竟絶學登少峩參浩翁久之返里得大慧録並獲正法眼藏如臨舊物朝暮參禮如有所失後遇一僧見訪問曰如何是佛師擬對曰不是再進曰不是師被者一劄塵念如灰至午值僧磨刀次急問如何是佛僧云我今日磨剃刀師於言下有省次入朱提參朝陽月明和尚深蒙敲擊即以白衣歸為祖母説法祖母逝後服闋二年方謀出家先是有氅衣道者謂里人曰此處不久當有至人出世師果於萬曆四十一年癸丑秋踰城入山禮月明和尚受具一日明謂曰汝猶有一句未會師即問是那一句曰不用音聲色身默然良久與我現出真空來師拂袖便出乃自惟曰此事不可草草是中必有玄要遂辭之別山汲水伐薪自炊自力經行危坐脅不至席苦參三載復入朱提親近月明和尚師才拜起便問曰畢竟如何現出明引師手掩其口豁然大悟乃曰縱然奇特終是尋常明遂出臨濟正宗源流付之後閲華嚴至入法界品毗目仙人執善財手一須臾間歷過佛剎微塵數世界參見微塵諸佛法法不昧至事事無礙法界始解圓悟示張無盡用處從此五宗誵訛悉皆妙契初住郡之翠屏得法者四人俱先化去乃杖䇿入吳涉海過閩踵至萬曆戊午開法瀟湘之湖東還蜀住忠州之聚雲巴臺夔州之寶峰興龍上堂劈面迎風掌當胸輥肚拳具眼衲僧向者裡用得猶是三五一輪在在光輝火樹銀花時時燦爛若也半明半暗未夢見在呵呵不是法門無面目只怕蜈蚣太多足咦上堂一不做二不休殺人須究親下手捉賊要識真領頭平息了萬事丟一顆明珠衣下收焰山疊嶂從茲破愛海波濤信不流卓拄杖下座上堂出衆者三十棒不出衆者三十棒出衆不出衆三十棒有僧出衆問話不契乃曰直下三玄已露何曾三要無施落花流水空去殿前古柏當機營盆上堂颯颯凄風繞樹寒夜深林裡靄雲煙錢飛粉蝶千家紙露溼綺羅萬淚衫獨有長空輝月面斗牛銀漢玉闌干小參高聲喚云看箭遂以拂子向東指云者一箭射透十方世界一切衆生性靈只令山頭翻巨浪海底熱烽煙枯木口喃喃髑髏淚潸潸又以拂向西指云者一箭射斷十方世界一切衆生命根只令撒手墮懸嚴吐舌如扁擔打碎頻伽瓶扯斷紅絲線又以拂向上指云者一箭射開十方世界一切衆生慧眼只令頂門光亞竪驀直走金蛇百千手臂百千執萬億毫端萬億華此是涅槃經上三點老僧今日用作三箭却也當箭即當即箭僧問命根射斷後如何師曰斬釘截鐵進云如何是衲僧鼻孔掉轉師曰斑竹筒問如何是父母未生前面目師曰黑漆桶問僧僧是自己又歸箇甚麼僧云和尚也須歸方丈師云用歸作麼僧趨前而立師云好箇臨終西方境僧云用臨終作麼師曰我是死了不曾埋底僧曰若活來西方則無也師曰如佛度一切僧曰既是死了不曾埋底又如何答得話師曰唐以劉瓚為秦王傅僧問一句當軒八萬門永絶生死如何是絶生死句師曰毗盧頂上行師寓金陵觀音菴朝宗禪師來參師問曰甚處來宗曰天童師曰天童近日何如宗曰大家在者裡師曰不要脫空宗曰和尚何不往天童去師便喝宗曰落在甚麼處師便打師出世三十年雖嚴冷孤峻而又柔易雍和室中驗人不擅許可故其椎拂之下所得之士類皆銅頭鐵額能世其家者生平所記語録之外訓世羣集總計三十種近百卷流布宇內偶示疾山神夜哭樹木摧折病中歌唱自娛三月前謂侍僧曰我臨終須大喝而去崇禎十二年己卯七月三十索筆書偈曰朝打三千暮打八百要會聚雲眉毛出血投筆危坐至午果大喝一聲而逝師壽五十有八臘三十闍維煙至松結為五彩荷香遍地起骨得黃金鎖子三莖齒化為紫色五色舍利三百餘顆入土者無數平都地藏院迎十二顆建塔餘皆塔於本寺三目山之陽大鑑下第三十世聚雲真禪師法嗣忠州治平慶忠鐵壁慧機禪師營山羅氏子家世以一經傳多科甲師生而貌偉氣骨不凡八歲父見背即隨母持齋是夕見黃龍長數十丈凌霄騰於師頂師指謂兄兄曰龍也有精唐舉術者見師相而異之視師指掌中有龍鳳蓮華麟魚鳥獸文稱許不置師方就童孰業鉛塹日記數百行漸能工羔鴈且膾炙人口里中名俊咸稱之曰此羅氏龍文也時有元白道者隱邑之大蓬山師往來叩問雅意玄學道者石扃巖戶辟穀半載師慕之母兄為師親迎師辭之兄曰汝清姿映玉摛藻過人淡墨紅綾木天一鳳奈何作出塵想從黃冠遊耶師曰人各有志從所願耳遂於天啓壬戌二月十九潛遁圖入山計行次大竹築室松間掩關危坐無晝夜日食米二握沸湯淡飲五味俱斷關中三載心形益暢目中屢矚異相種種疑情頓起欲扣元白以釋其惑出關訪之而白去終南路多阻師方剃髮束包行腳竟抵終南參聚雲雲曰奚往師白以終南尋道者事雲笑曰子真昧於尋師者師見雲丰儀逈異神光陸離願居弟子之列雲曰若向來事道固善矣猶落傍蹊子欲豫言夏後可也夏滿欲求開示妬者恐師暗承衣每以計隔之忽雲出方丈師跪乞雲大笑而去師自泣曰遇至人而不得一授遂欲捐軀赴水僧有諭以從講肆者師至聽畢復參聚雲未幾聞朝陽老人來酆陵師侍雲溯舟往見隨衆參禮因請益朝陽陽曰只者是師曰只者是還參甚麼陽曰放汝三十棒參扣久之未得開悟轉增迷悶從前之志漸漸稍怠欲辭雲南下雲曰豫有徑山之往子可稍待一日命入侍寮乃問曰不許夜行投明須到你如何會師才開口雲厲聲曰者是甚麼所在汝還如是見解速道速道師彈指一下雲曰快參後侍雲往金陵聞密雲悟禪師唱道天童師欲暫辭適浙雲曰天童接人固直截孤硬但恐一去便不遇老僧宗旨負汝數年辛苦矣於是奉侍還蜀乃命師總院事自疑此生果與禪無緣乎遂盡力院中經七日隨衆念誦畢登塌忽覺渾身骨碎大笑不止遂拈偈進呈是夜普茶次雲以臨濟四喝出三𪹼竹召衆曰會麼師便喝雲曰不是師又喝雲曰是何等音聲師復喝雲歸方丈命師入問玄要宗旨口呈一頌雲不之印復力究三年忽一日大徹無論玄要宗旨祖意教意有庖丁解牛之勢入室密啓雲笑曰汝會老僧意麼師曰和尚大慈為人徹底自後開堂師皆首衆焉崇禎己卯師繼席聚雲後遷酆都地藏涪州吟翁石砫三教長溪雲集萬縣雲來梁山慶忠忠州雲巖南濵寶聖晚年罷寶聖席將謀退隱忠人士依戀不忘請主龍昌院龍昌係唐白香山植柳處先記云柳茂寺興柳衰寺敗師至而柳復新蓋今治平也開法上堂方丈已出了座已登了香已拈了還要觀甚麼第一義且向第二頭著眼竪拂子云三世諸佛也不識汝等還會麼汝等既未會山僧喚作甚麼若無山僧喚底怎知汝等未會若無汝等未會怎知三世諸佛不識三世諸佛為汝等出世山僧為三世諸佛出世更有為山僧出世者麼速道速道一僧出衆云踏破梅梢月休云火煉丹師曰撞木鐘進云踏破了也師曰撞木鐘僧歸衆師曰撞木鐘又僧出師曰問話且止須聽吾偈聚雲新木鐘扣擊得玲瓏千聖齊掩耳雪火一爐紅若是伶俐衲僧自具一付快便手腳才見宗師眼目定動早已錯過了也所以下雨地必滑天晴日光達喝中主賓棒下縱奪敲骨取髓痛下針錐玄節要關拈一放一謹嚴高古細密簡明末後轉身異類親切只得葫蘆苕四方八面一場打閧且道如何是山僧即今為人處有意掩爐還點雪無心張弩更開弓上堂一棒一條痕久雨復還晴一摑一掌血凄風驚落葉須彌頂上著錐子海底波斯痛不徹到此方知世界寬珊瑚枝枝撑著月上堂橫按拄杖云慣弄靈蛇之勢赫赫萬層活捉生馬之威昂昂千里撒縵天網打稱意魚放破空矢落沖霄鶴點即不到到即不點正與麼時且問是誰家風月卓一卓曰一箇星子三隻腳家家稱錘五箇眼僧競出問話師下座以拄杖一時打散舉眉首座立僧上堂黃面瞿曇拈示自是桃華貪結子金色頭陀破顏錯教人恨五更風一人傳虗百人傳實直至於今郎當不少今日不著便與伊重打算節候不相饒錯過成疚患成何等疚患只為鐵老漢口門太寬除非汝等一齊擡舉眉山出來塞却猶較些子上堂貴買朱砂畫月打牛打車不別憎檻欣籠奈何磨磚作鏡爭得鳧脛天然不長截鶴續之則疾召大衆云且道阿膩吒峰今日有幾人作舞上堂天可載地可覆山可浪水可烈日可冷月可熱惟有佛法不可説設或可説也是捫鐘捫籥上堂年來不欲施慧智竪箇空拳也勞力朝粥午飯信口餐早眠晏起沒瞌睡雲水諸方去去來西來大意誰相憶啓我毗尼兩片皮開口令人成笑具上堂世界恁麼濶為甚鐘聲披七條三三五五七七八八鳥豈是鸞鹿焉為馬白雪陽春為誰歌無端畫地之乎也喝一喝云東桃西李柳花楊花文縣令請上堂擊禪牀三下云起去拂一拂曰伺候著良久曰隙晷偷光杖兔角星芒射眼拂龜毛不是山僧行正令崑崙呌屈舜若逃喝一喝曰畫公打口鼓喝退堂聲下座上堂天一半地一半蘇州有常州有打破蔡州城踢倒黃幡綽不笑牛首伏羲則罵孔明諸葛惡惡四時無春夏一雨便秋冬上堂天之高也奚足高地之厚也奚足厚海之深也奚足深空之大也奚足大惟有拄杖子頭頭越格卓一卓曰今日郎向二施主有齋解夏上堂今歲結衆一夏大似三人證龜成鱉且道是何三人莫是總府袁寶善麼莫是副戎王一喝麼莫是善士傅性一麼莫是月維二知事麼如明鏡當臺瞞諸人一點不得還見麼主山高案山低左青龍右白虎年年三百六月月二十五逆數順數數到牛首山雲巖寺大殿裏恰似佛幻三月前鞔底鹿皮鼓上堂迦文如來未能鄭重口角四十九年拋沙撒土歷代祖師未能鄭重口角牽藤引蔓公案不獨千七百則之多天下大和尚未能鄭重口角施伎倆使機關恰似把火燒空獼猿弄月且道即今人天座上又作麼生良久曰喜得老僧無口師六十歲衆請升座甲子三百六看看今日足過此更如何滿散清齋粥前三三後三三豐干子歸去來作接引勢下座問僧昔日潤侍者今朝松西堂侍者西堂相去多少云鐵腳波斯三隻眼銅頭羅剎一根鬚師曰如何是侍者事曰與和尚過杯茶來師曰如何是西堂事曰大衆不得亂語師曰著眉山三山侍師山行次師指二鵲巢曰且道子在那一窠三山曰放過某甲罷眉山曰者邊放過那邊放不過三曰請道看眉曰兒孫得力祖父不知師曰恁麼又爭得眉曰婆心太切師曰我也未卵三作抱勢眉曰且莫僥幸師歸方丈師在聚雲作參頭告香請普説師插香依式請問因緣雲曰還知落處也未師曰野火泛鐵船雲歸方丈謂書記曰即此一語徑山血脈猶在雲示衆曰識得兵中意快活過一世那裡是他快活處衆下語不契持以問師師曰殺人不眨眼僧問如何是祖師西來意師曰人遠話近又問達磨面壁意旨如何師曰他是異鄉人問如何是玄旨師曰葫蘆葫蘆問如何是正法眼師曰烏龜開夜市問一切智通無障礙時如何師曰船子和尚泛華亭師主法三十二年十坐道場自親炙嗣法外公侯籓郡文武士夫登其門者不啻百十餘人凡演化之地屢有異迹四方之供者傾倉倒廩似非人力所能至於劻扶祖道荷負大法提挈正宗酷類洞山文履踐明驗氷操玉潔宛如積翠南英邵武故出其門者英逸高遠司理陳蝶菴曰奇表雖同滿月慈心不比死灰蓋師不愧古人矣先是師童子時相者言師掌中有龍鳳蓮華麟魚鳥獸文云是帶果行因淨土儼然在握當時名德咸以法身大士無量壽如來之化迹往往見師於假寐中或於升堂説法中突然自謂曰豐干子歸去來一談一笑間不覺露出風采康熙戊申秋八月二十一日偶示微疾凡來問安者或談六波羅蜜而尚精進或以遊戲而竪指掌危坐經行了無病意至九月二十一日遺偈別諸檀越事畢索浴整衣命衆雲集乃曰日前諸事分示明白大衆勤理佛事謹守遺規即是報德便取涅槃門人請留遺語師張目索筆大書曰儘力難説出驢年想不來信口道箇偈非是強安排豐干子觀自在歸去來吽吽只當打箇瞌睡呵呵乃顧首座曰我去即來瞑目而逝師壽六十有六臘五十闍維得黃金鎖子數莖鬚髮化為琉璃雙目變為青白色齒骨不壞五色舍利無數嗣法門人三山來遵遺命迎師靈骨一半建塔高峰餘皆塔於寺西白鹿洞之旁正録外著有藥病隨宜慶忠等集傳於叢林
