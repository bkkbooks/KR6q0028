body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十六世昭覺勤禪師法嗣臨安府徑山宗杲大慧普覺禪師宣城奚氏子夙有英氣年十二入鄉校一日因與同窓戲以硯投之悞中先生帽償金而歸曰大丈夫讀世間書曷若究出世法即詣東山慧雲院事慧齊年十七薙髮具毗尼偶閱古雲門錄恍若舊習往依廣教珵禪師棄遊四方從曹洞諸老宿既得其說去登寶峰謁湛堂準禪師堂一見異之俾侍巾裓指以入道捷徑師橫機無所讓堂訶曰汝曾未悟病在意識領解則為所知障堂疾革囑師曰吾去後當見川勤必能盡子機用勤即圓悟堂卒師趨謁無盡居士求堂塔銘盡門庭高峻少許可與師一言相契下榻延之名師菴曰妙喜洎後再謁且囑令見圓悟師至天寧一日聞悟陞堂舉僧問雲門如何是諸佛出身處門曰東山水上行若是天寧即不然忽有人問如何是諸佛出身處只向他道熏風自南來殿閣生微凉師於言下忽然前後際斷雖然動相不生却坐在淨躶躶處悟謂曰也不易你得到這田地可惜死了不能得活不疑言句是為大病不見道懸崖撒手自肯承當絕後再蘇欺君不得須信有這箇道理遂令居擇木堂為不釐務侍者日同士大夫入室擇木乃朝士止息處悟每舉有句無句如藤倚樹問之師纔開口悟便曰不是不是經半載遂問悟曰聞和尚當時在五祖曾問這話不知五祖道甚麼悟笑而不答師曰和尚當時須對眾問如今說亦何妨悟不得已謂曰我問有句無句如藤倚樹意旨如何祖曰描也描不成畵也畵不就又問樹倒藤枯時如何祖曰相隨來也師當下釋然曰我會也悟遂舉數因緣詰之師酧對無滯悟曰始知吾不汝欺遂著臨濟正宗記付之俾掌記室未幾令分座室中握竹篦以騐學者叢林浩然歸重名振京師右丞相呂公舜徒奏賜紫衣佛日之號會女真之變其酋欲取禪僧十數人師在選得免趨吳虎丘度夏因閱華嚴至菩薩登第七地證無生法忍洞曉向所請問湛堂殃崛摩羅持至產婦家因緣時圓悟詔住雲居師往省覲至山次日即請為第一座時會中多龍象以圓悟久虗座元俟師之來頗有不平之心及冬至秉拂昭覺元禪師出眾問云眉間挂劍時如何師曰血濺梵天圓悟於座下以手約云住住問得極好答得更奇元乃歸眾叢林由是改觀圓悟歸蜀師於雲居山後古雲門舊址創菴以居學者雲集久之入閩結茅於長樂洋嶼從之得法者十有三人又徙小溪雲門菴後應張丞相魏公浚徑山之命開堂日僧問人天普集選佛場開祖令當行如何舉唱師云鈍鳥逆風飛曰徧界且無尋覓處分明一點座中圓師曰人間無水不朝東復有僧競出師約住云假使大地盡末為塵一一塵有一口一一口具無礙廣長舌相一一舌相出無量差別音聲一一音聲發無量差別言詞一一言詞有無量差別妙義如上塵數衲僧各各具如是口如是舌如是音聲如是言詞如是妙義同時致百千問難問問各別不消長老咳𠻳一聲一時答了乘時於其中間作無量無邊廣大佛事一一佛事周徧法界所謂一毛現神變一切佛同說經於無量劫不得其邊際便恁麼去鬧熱門庭即得正眼觀來正是業識茫茫無本可據祖師門下一點也用不著況復勾章棘句展弄詞鋒非唯埋沒從上宗乘亦乃笑破衲僧鼻孔所以道毫釐繫念三塗業因瞥爾情生萬劫羈鎖聖名凡號盡是虗聲殊相劣形皆為幻色汝欲求之得無累乎及其厭之又成大患看他先聖恁麼告報如國家兵器豈得已而用之本分事上亦無這箇消息山僧今日如斯舉唱大似無夢說夢好肉剜瘡檢點將來合喫拄杖只今莫有下得毒手者麼若有堪報不報之恩共助無為之化如無倒行此令去也驀拈拄杖云橫按鏌鎁全正令太平寰宇斬癡頑卓拄杖喝一喝便下座道法之盛冠於一時眾二千餘皆諸方俊乂侍郎張公九成亦從之遊灑然契悟一日因議及朝政與師連禍紹興辛酉五月毀衣牒屏居衡陽乃裒先德機語間與拈提離為三帙目曰正法眼藏凡十年移居梅陽又五年高宗皇帝特恩放還明年春復僧伽棃四方虗席以邀率不就後奉朝命居育王逾年有旨改徑山道俗歆慕如初孝宗皇帝為普安郡王時遣內都監入山謁師師作偈為獻及在建邸復遣內知客詣山供五百應真請師說法祝延聖壽親書妙喜菴三字并製贊寵寄之上堂欲識佛性義當觀時節因緣時節若至其理自彰舉起拂子曰還見麼擊禪牀曰還聞麼聞見分明是箇甚麼若向這裡提得去皇恩佛恩一時報足其或未然徑山打葛藤去也復舉起拂子曰看看無量壽世尊在徑山拂子頭上放大光明照不可說不可說又不可說佛剎微塵數世界中轉大法輪作無量無邊廣大佛事其中若凡若聖若正若邪若草若木有情無情遇斯光者皆獲無上正等菩提所以諸佛於此得之具一切種智諸大菩薩於此得之成就諸波羅蜜辟支獨覺於此得之出無佛世現神通光明諸聲聞眾洎夜來迎請五百阿羅漢於此得之得八解脫具六神通天人於此得之增長十善修羅於此得之除其憍慢地獄於此得之頓超十地餓鬼傍生及四生九類一切有情於此得之隨其根性各得受用無量壽世尊放大光明作諸佛事已竟然後以四大海水灌彌勒世尊頂與授阿耨多羅三藐三菩提記當於補處作大佛事無量壽世尊有如是神通有如是自在有如是威神到這裡還有知恩報恩者麼若有出來與徑山相見為汝證明如無聽取一頌十方法界至人口法界所有即其舌祇憑此口與舌頭祝君聖壽無間歇億萬斯年注福源如海滉漾永不竭師子窟內產狻猊鸑鷟定出丹山穴為瑞為祥徧九垓草木昆蟲盡歡悅稽首不可思議事喻若眾星拱明月故今宣暢妙伽陀第一義中真實說上堂祖師道一心不生萬法無咎無咎無法不生不心能隨境滅境逐能沈境由能境能由境能大小祖師却作座主見解徑山即不然眼不自見刀不自割喫飯濟饑飲水定渴臨濟德山特地迷枉費精神施棒喝除却棒拈却喝孟八郎漢如何止遏上堂拈拄杖卓一下喝一喝曰德山棒臨濟喝今日為君重拈掇天何高地何濶休向糞掃堆上更添搕𢶍換却骨洗却腸徑山退身三步許你諸人商量且道作麼生商量擲下拄杖喝一喝曰紅粉易成端正女無錢難作好兒郎上堂正月十四十五雙徑椎鑼打鼓要識祖意西來看取村歌社舞上堂久雨不曾晴豁開天地清祖師門下事何用更施呈上堂舉圓通秀禪師示眾曰少林九年冷坐剛被神光覰破如今玉石難分祇得麻纏紙裹這一箇那一箇更一箇若是明眼人何須重說破徑山今日不免狗尾續貂也有些子老胡九年話墮可惜當時放過致令默照之徒鬼窟長年打坐這一箇那一箇更一箇雖然苦口叮嚀却似樹頭風過結夏上堂文殊三處安居誌公不是閒和尚迦葉欲行正令未免眼前見鬼且道徑山門下今日事作麼生下座後大家觸禮三拜上堂僧問有麼有麼菴主竪起拳頭還端的也無師便下座歸方丈上堂水底泥牛嚼生鐵憍梵提咬著舌海神怒把珊瑚鞭須彌燈王痛不徹上堂纔方八月中秋又是九月十五卓拄杖曰唯有這箇不遷擲拄杖曰一眾耳聞目覩上堂衝開碧落松千尺截斷紅塵水一谿不識本來真面目將謂人題德嶠詩上堂去年臘月二十五有恁麼消息今年臘月二十五無恁麼消息有恁麼消息是諸人分上事徑山不預無恁麼消息是徑山分上事諸人無分或有人問徑山未審是甚麼消息驀拈拄杖云不得動著動著打折你驢腰擲拄杖下座歲旦上堂拈拄杖空中作書字勢云正朝把筆萬事皆吉應時納祐慶無不宜若作世諦流布平地喫交更在佛法商量眉鬚墮落卓拄杖下座上堂買鐵得真金求雨得瑞雪五峰玉琢成千樹銀華結龍王降吉祥普賢呈醜拙三世如來祕密門今日一時都漏泄雖然如是這裡有一處可疑且道疑箇甚麼恐日出後一場漏逗上堂拈拄杖卓一下召大眾云還聞麼復舉起云觀世音菩薩來也在徑山拄杖頭上口喃喃地道諸行無常是生滅法生滅既滅寂滅現前拈須彌盧於掌上向針眼裡打鞦韆直饒便恁麼見得徹去猶較拄杖子十萬八千且道徑山拄杖子有甚麼奇特擲下云不直半分錢上堂徑山無寸土莊田今夏隨宜結眾緣慵論道嬾談禪拄杖挑來箇箇圓不用息心除妄想大家喫飯了噇眠噇眼則不無或若夢中有人索飯錢又作麼生依稀似曲纔堪聽又被風吹別調中上堂顛倒想生生死續顛倒想滅生死絕生死絕處涅槃空涅槃空處眼中屑涅槃既空喚甚麼作眼中屑白雲乍可來青嶂明月難教下碧天上堂月生一鐵輪天子寰中勅月生二豐干騎虎入鬧市月生三蟭螟眼裡巨鼇飜驀拈拄杖云莫有同生同死底麼出來與徑山拄杖子相見良久云見義不為何勇之有擲下拄杖上堂心生法滅性起情亡這裡悟去揑怪有甚麼難舉起拂子云看看觀音彌勒普賢文殊盡向徑山拂子頭上聚頭打葛藤若也放開從教口勞舌沸若也把住不消一擊以拂子擊禪牀下座上堂古者道了得一萬事畢今朝是九月一諸人作麼生了驀拈拄杖云不得喚作拄杖子便了取好既不喚作拄杖子作麼生了擲下云差之毫氂失之千里圓悟禪師忌師拈香曰這箇尊慈平昔強項氣壓諸方逞過頭底顢頇用格外底儱侗自言我以木槵子換天下人眼睛殊不知被不孝之子將斷貫索穿却鼻孔索頭既在徑山手裡要教伊生也由徑山要教伊死也由徑山且道以何為騐遂燒香曰以此為騐僧問達磨西來將何傳授師曰不可總作野狐精見解曰如何是麤入細師曰香水海裡一毛孔曰如何是細入麤師曰一毛孔裡香水海問古鏡未磨時如何師曰火不待日而熱曰磨後如何師曰風不待月而凉曰磨與未磨時如何師曰交問不與萬法為侶者是甚麼人待汝一口吸盡西江水即向汝道意作麼生師曰釘釘膠黏問一法若有毗盧墮在凡夫萬法若無普賢失其境界去此二途請師速道師曰脫殻烏龜飛上天問高揖釋迦不拜彌勒時如何師曰夢裡惺惺問大修行底人還落因果也無前百丈曰不落因果為甚麼墮野狐身師曰逢人但恁麼舉曰祇如後百丈道不昧因果為甚麼脫野狐身師曰逢人但恁麼舉曰或有人問徑山大修行底人還落因果也無未審和尚向他道甚麼師曰向你道逢人但恁麼舉問明頭來時如何師曰頭大尾顛纖曰暗頭來時如何師曰野馬嘶風蹄撥剌曰明日大悲院裡有齋又作麼生師曰雪峰道底問過去心不可得現在心不可得未來心不可得時如何師曰親言出親口曰未審如何受持師曰但恁麼受持決不相賺問我宗無語句實無一法與人時如何師曰五味饡秤鎚問心佛俱忘時如何師曰賣扇老婆手遮日問教中道塵塵說剎剎說無間歇未審以何為舌師拍禪牀右角一下僧曰世尊不說說迦葉不聞聞也師拍禪牀左角一下僧曰也知今日令不虗行師曰識甚好惡師室中問僧不是心不是佛不是物你作麼生會僧曰領師曰領你屋裡七代先靈僧便喝師曰適來領而今喝干他不是心不是佛不是物甚麼事僧無語師打出僧請益夾山境話聲未絕師便喝僧茫然師曰你問甚麼僧擬舉師連打喝出師纔見僧入便曰不是出去僧便出師曰沒量大人被語脉裡轉却次一僧入師亦曰不是出去僧却近前師曰向你道不是更近前覓箇甚麼便打出復一僧入曰適來兩僧不會和尚意師低頭噓一聲僧罔措師打曰却是你會老僧意問僧我前日有一問在你處你先前日答我了也即今因甚麼瞌睡僧曰如是如是師曰道甚麼僧曰不是不是師連打兩棒曰一棒打你如是一棒打你不是舉竹篦問僧曰喚作竹篦則觸不喚作竹篦則背不得下語不得無語速道速道僧曰請和尚放下竹篦即與和尚道師放下竹篦僧拂袖便出師曰侍者認取這僧著又舉問僧僧曰甕裡怕走却鼈那師下禪牀擒住曰此是誰語速道僧曰實不敢謾昧老師此是竹菴和尚教某恁麼道師連打數棒曰分明舉似諸方師年邁求解辛巳春得旨退居明月堂隆興改元一夕星殞於寺西流光赫然尋示微恙八月九日學徒問安師勉以弘道徐曰吾翌日始行至五鼓親書遺奏又貽書辭紫巖居士侍僧了賢請偈復大書曰生也祇恁麼死也祇恁麼有偈與無偈是甚麼熱大擲筆委然而逝平明有虵尺許腰首白色伏於龍王井欄如義服者乃龍王示現也四眾哀號皇帝聞而歎惜上製師真贊曰生滅不滅常住不住圓覺空明隨物現處丞相以次致祭者沓來門弟子塔全身於明月堂之側壽七十有五夏五十有八詔以明月堂為妙喜菴諡曰普覺塔名寶光淳熙初賜其全錄八十卷隨大藏流行蘇州府虎丘紹隆禪師和州含山人九歲謝親依佛慧院踰六年得度受具又五年荷包謁長蘆信禪師得其大略有傳圓悟語至者師讀之歎曰想酢生液雖未澆腸沃胃要且使人慶快遂由寶峰依湛堂客黃龍叩死心次謁圓悟一日入室悟問見見之時見非是見見猶離見見不能及舉拳曰還見麼師曰見悟曰頭上安頭師聞脫然契證悟叱曰見箇甚麼師曰竹密不妨流水過悟肯之尋俾掌藏教有問悟曰隆藏主柔易若此何能為哉悟曰瞌睡虎耳後歸邑住城西開聖建炎之擾乃結廬銅峰下郡守延居彰教次徙虎丘道大顯著上堂僧問為國開堂一句作麼生道師云一願皇帝萬歲二願羣臣千秋僧云只如生佛未興時一著落在甚麼處師云吾常於此切僧云恁麼則擺手出長安也師云逢人不得錯舉僧云爭奈目前何師云識法者懼僧云官不容針私借一問時如何師云踞虎頭收虎尾僧云中間事作麼生師云草繩自縛漢僧云毗婆尸佛早留心直至如今不得妙師云幾行嵒下路不見白頭人乃云大眾我本無心有所希求今此法王大寶自然而至敢問諸仁作麼生說箇法王大寶竪起拂子云還見麼若也於此辨得三世諸佛以此接物利生歷代祖師以此流通正脉天下老和尚以此揭示頂門正眼破塵破的萬古徽猷徧界徧空真風不墜如天普葢似地普擎堪報不報之恩用助無為之化澄澄光彩瑩徹十虗堯日與佛日增輝金輪與法輪竝轉生凡育聖統三界以為家自利利他作四生之依怙隨緣赴感靡不繇他如鑑當臺舉無遺照大中現小小中現大卷舒立方外乾坤縱橫掛域中日月如斯舉唱猶落今時豈不見長沙道三世諸佛共法界眾生盡是摩訶般若光光未發時尚無佛無眾生消息只如光未發時諸人向甚麼處委悉直饒向箇裡悟去未免平地喫交且安家樂業一句作麼生道狼煙一掃盡萬方賀太平復舉阿育王問賓頭盧尊者承聞尊者親見佛來是否尊者以兩手䇿起眉毛良久云會麼王云不會尊者云阿耨達池龍王請佛齋吾亦預數師云賓頭盧得大機顯大用不謾親見佛來雖然賴阿育王放過若不放過洎合打失眉毛放過即且置尊者䇿起眉毛又作麼生還會麼當臺一鑑明如日萬古晴空絕是非上堂僧問九旬禁足意如何師云理長即就僧云只如六根不具底還禁得也無師云穿過鼻孔僧云學人今日小出大遇也師曰降將不斬僧云恁麼則和尚放某甲逐便也師云停囚長智乃云朱明啟候九夏初臨四海高人罷搖金錫心猿頓歇意馬休征戒潔滄海之珠性朗碧天之月纖塵莫染帝網交光離相絕名真機獨露正當恁麼時安居一句作麼生道誰知鷲嶺當年事一念迴光尚宛然上堂豁開戶牗萬里不掛片雲杲日騰空四顧清風滿座湖光浩渺野色澄明萬象森羅全彰海印直得頭頭妙用物物真機心境一如纖塵不立正當恁麼時萬機休罷千聖不𢹂坐斷毗盧頂不稟釋迦文婢視聲聞奴呼菩薩德山臨濟直得目瞪口呿有棒有喝一點也用不著且道忽遇其中人來時如何傾葢相逢元故舊何妨來喫趙州茶請知事上堂掩室摩竭杜口毗耶面壁九年黃梅夜渡點簡將來翻成計較殊不知日不待火而熱月不待風而凉雲從龍風從虎作無作為無為恁麼會得便能恢張法席毗贊叢林共建法幢流通正脉敢問大眾據令一句作麼生道祇園今古饒春色朵朵渾開薝蔔華上堂悠悠世事空浮沉自愛白雲歲月深舉眼盡非凡草木剛然斷臂覓安心雖然如是事無一向拈拄杖云達磨來也在山僧拄杖頭上為諸人說安心法門還信得及麼若信得及當下便心安其或未然海枯終見底人死不知心上堂摩竭掩室毗耶杜詞斯皆理為神御故口以之而默豈曰無辯辯所不能言也放出陝府鐵牛觸殺嘉州大象撞透天關掀翻地軸看看磕破諸人髑髏還有識痛痒者麼良久云萬山不隔今宵月一片清光分外明上堂僧問古人道盡乾坤大地撮來如粟米粒大撒向諸人面前漆桶不會打鼓普請看未審此意如何師云一畞之地三蛇九鼠僧云未曉師意乞師再垂指示師云海口難宣僧云盡大地既如粟米粒大只如森羅萬象人畜草芥著在甚麼處師云此問不惡僧云豈無方便師云棒打不死乃云寰中天子勅塞外將軍令一句定乾坤一劍平天下便見時康道泰四海晏清向我衲僧門下又且不然拄杖子吞却乾坤了也綿綿不漏絲毫何處更有一物與諸人為緣為對還會麼良久云各請歸堂喫茶解夏上堂問僧問雲門達磨九年面壁意作麼生門云念七未審古人意旨如何師云還丹一粒點鐵成金僧云學人為甚麼失却鼻孔師云與達磨雪屈乃云有佛處不得住上無攀仰無佛處急走過下絕己躬從來無向背本自絕羅籠出門撞著須菩提寸草不生千萬里自是長觜鳥休言芳樹不棲謾自說禪說道摩斯吒直饒心掛樹頭未免身沉海底莫動著動著三十棒且置休夏自恣一句作麼生道青山綠水元依舊明月清風共一家上堂僧問如何是大道真源師云和泥合水僧云便恁麼去時如何師云截斷草鞋跟乃云大道只在目前要且目前難覩欲識大道真體不離聲色言語風吹不入處和泥合水和泥合水處風吹不入如今不免又向頭上安頭乃竪起拂子云還見麼者箇是色復呵呵大笑云者箇是聲大道真體在甚麼處繡出鴛鴦無背面不知誰解覓金針上堂大智圓明體無向背凝然湛寂彌滿太虗覆葢乾坤常光獨露削蹤滅跡離相絕名正當恁麼時本地不動一句作麼生道一切水月一月攝上堂一滴水一滴凍喝下風雷彰大用棒頭點出眼睛來照了諸相悉空洞出門撞著須菩提拶破虗空全體露一片虗凝絕謂情萬里清光飛玉兔上堂目前無法萬象森然意在目前突出難辨不是目前法觸處逢渠非耳目之所到不離見聞覺知雖然如是也須是踏著它向上關捩子始得所以道羅籠不肯住呼喚不回頭佛祖不安排至今無處所如是則不勞斂念樓閣門開寸步不移百城俱到驀拈拄杖劃一劃云路逢死蛇休打殺無底籃子盛將歸上堂日日日東出日日日西沒人命在呼吸百年輕倐忽驀地得逢渠掀翻生死窟卓拄杖云放出遼天鶻萬重雲一突傳樞密請陞座僧問萬機休罷千聖不𢹂時如何師云未足觀光僧云還有奇特事也無師云獨坐大雄峰僧云恁麼則主山高案山低也師云一切坐斷乃云佛語心為宗一切即一無門為法門一即一切是汝諸人高肩拄杖天下橫行還踏著此門也未若也踏著此門年年是好年月月是好月日日是好日時時是好時明如杲日寬若太虗三世諸佛以此門生凡育聖廣利羣品歷代祖師以此門以心契心流通正續天下宗祖以此門揭示人天眼目提持向上一路乾坤以此門為覆藏日月以此門為照臨四時以此門為寒暑國王以此門治天下百官以此門盡忠盡孝庶人以此門治生產業衲僧以此門撥轉天關掀飜地軸失口說著佛之一字潄口三年雖然如此事無一向若或尚留門外不免露箇消息去也遂拈拄杖云還見麼復卓一卓云還聞麼已為諸人八字打開了也直須無見而見是名真見無聞而聞是名真聞無說而說是名真說真見真聞真說是甚麼熱椀鳴聲豈不見道從無住本流出萬端便知歿故太夫人於無相中示現受生一切諸相悉皆真實於無滅中示現入滅一切生滅之相本來空寂凝然不動正體如如亘古亘今曾無變易正當恁麼時畢竟如何風恬波浪靜直下見青天復舉陸亘大夫問南泉和尚云弟子家中有一片石亦曾坐亦曾臥欲䥴作佛得麼泉云得大夫云莫不得麼泉云不得師云南泉雖似鏡之臨形胡來胡現漢來漢現只是不通簡點當時待他道弟子家中有一片石亦曾坐亦曾臥欲鑴作佛得麼只對道莫惜高名鑴石上維摩傾盡此時心上堂大地撮來粟米粒一毛頭上現乾坤居家不離途中事常在途中不出門喝一喝留首座上堂田地穩密鬼家活計從空放下坐井窺天虎丘門下不說老婆禪只要諸人眼橫鼻直三十年後免得敲甎打瓦何故物宜求新人宜求舊不起於座現諸威儀且道出格一句作麼生良久云落霞與孤鶩齊飛秋水共長天一色滕樞密宅請陞座僧問雪峰示眾道盡大地是箇解脫門把手牽不入未審在門外者是甚麼人師云胡張三黑李四僧云為甚麼不肯入師云他具行脚眼僧云恁麼則穿過從上祖師鼻孔去也師云闍黎還跳得出麼僧云若然者三步雖活五步須死師云猶欠一問在僧云和尚豈不是為學人著灸師云錯認定盤星乃云世尊出世為一大事因緣祖師西來直指人心見性成佛所以道佛佛授手祖祖相傳便有教外別傳不立文字單提直截究本明宗令一切人離諸執著況此一事不以心思不以意想思慮知解盡是鬼家活計若是向上人赤條條地直向父母未生前承當却來者邊行履出生入死得大解脫要識諸佛出世處麼現在諸人眉毛眼睫上轉大法輪演說摩訶般若離四句絕百非要識祖師西來意麼現在諸人六根門頭晝夜放大光明交光相羅如寶𮈔網以至山河大地草木叢林盡在諸人大光明中發現只如光未發時上無諸佛下無眾生消息是汝諸人向甚麼處安身立命若也知得去處便知故樞密相公落處苟或未然萬古碧潭空界月再三撈摝始應知任觀察請陞座顧視大眾云還會麼塵劫來事盡在如今好不資一毫醜不減一毫謂之萬法根源千聖窟宅空洞無像緣會即彰所以道淨法界身本無出沒大悲願力示現受生興無緣慈示殊勝相作不請友開方便門明大機顯大用發大智自利利他生凡育聖從無住本流出萬端於是應以宰官身得度者即現宰官身而為說法應以長者居士等身得度者即現長者居士身而為說法如天普葢似地普擎出沒卷舒得大解脫敢問大眾且道其中人畢竟作麼生還會麼芥城有盡年無盡長在堯天日月傍上堂凡有展拓盡落今時不展不拓墮坑落塹直饒風吹不入水灑不著檢點將來自救不了豈不見道直似寒潭月影靜夜鐘聲隨叩擊以無虧觸波瀾而不散猶是生死岸頭事拈拄杖劃一劃云劃斷生法師多年葛藤點頭石不覺撫掌呵呵大笑且道笑甚麼腦後見腮莫與往來上堂當陽正體露堂堂休謂當年付飲光彼既丈夫我亦爾莫將好肉更剜瘡上堂百鳥不來春又暄凭欄溢目水如天無心還似今宵月照見三千及大千上堂放一線道曲為今時性地未明須憑指注還見麼直得山從海湧塔聳雲霄非風鈴鳴我心鳴耳不勞斂念樓閣門開頭頭現彌勒家風歷歷顯文殊境界還同按指海印發光萬象森羅纖塵不立如印印空如印印泥如印印水起無前後逈絕見知覿面提持更無回互還有當陽證據得底麼豈不見生公臺畔空落雨華頑石點頭妄通消息雖然如是忽然撞著德山臨濟老漢放過即不可若不放過驀拈拄杖卓一卓云填溝塞壑無人會千古萬古黑漫漫請修造上堂如來三轉於大千趙州半藏亦如然其輪本來常清淨一念承當誰後先雖然也是個英靈漢始得便乃橫身擔荷紹續宗風立吾家萬世不朽之功顯大丈夫特達之志抱荊山玉握靈虵珠光耀叢林揮戈佛日直得龍唫霧起虎嘯風生象王行處絕狐踪獅子窟中無異獸雖然如是且道應緣垂手一句又作麼生道栴檀葉葉古風清吹落人間香馥郁謝知事頭首上堂鋒芒未露如天普葢古帆未掛似地普擎所以道天不言四時行焉地不言萬物生焉萬物生則遷謝不停四時行則寒暑流轉各居其位去寒時大家寒熱時大家熱是法住法位世間相常住無一法不為妙用無一物不為真如處處真無回互塵塵爾絕承當須是其中人方能恁麼去便能橫身擔荷翊贊叢林自利利他得大解脫其或未然好事不須頻話會留將和氣暖丹田上堂脫身已曉南柯夢始覺人間萬事空吹起還鄉無孔笛夕陽斜照碧雲紅上堂從來無相貌森羅萬象歷然超出威音王當機無向背所以道昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分通古通今凝然湛寂葢聲葢色正體如如諸人若善參詳要且即非外物盡是各各當仁屋裡事豈不見釋迦老子見明星悟道便云我觀一切眾生具有如來智慧德相皆為妄相執著而不證得如今只要諸人心空境寂內外無依方有自由分還恁麼證據得麼其或未然未明心地印難過趙州關上堂摩竭陀國親行此令驀拈拄杖卓一卓云大盡三十日小盡二十九上堂一二三四五梅雨炎蒸暑碓觜也生華道芽知幾許古佛與露柱交參猫兒咬殺猛虎為圓悟和尚舉哀云釋迦已滅彌勒未生正當今日流通佛祖正脉委在我圓悟大和尚直得七據寶剎統三界以為家四海馳聲作羣生之眼目不謂法幢摧折佛日掩光後學無聞叢林失所雖然如是盡落今時何故豈不見道淨法界身本無出沒既無出沒師今不死我何疑惑大眾既然不死還知圓悟老人落處麼若也知得落處不勞指注倘或未然仰師之道地久天長却請真前大家燒香復指真云見麼拘尸城畔當時大事曾興濯錦江頭此時還循舊轍放光現瑞攝化歸真法海珠沉人天眼滅雖然如是恁麼中有不恁麼不恁麼中却恁麼便見無生死中示有生死無去來而示有去來雖然要且無生死去來之相故我圓悟大和尚禪河渺邈津濟無窮名動至尊道滿天下且能事已畢隻履西歸穩坐家堂末後一句作麼生道諸人若向者裡道得圓悟老人猶在若不然者與諸人道去也良久却顧侍者云道甚麼遂舉哀宋高宗紹興丙辰示微疾大書伽陀曰無法可說是名說法所以佛法無有剩語珍重擲筆而逝塔全軀於寺之西南隅壽六十﨟四十五
