body:
  text: 南海普陀嗣祖沙門西蜀性統編集曹洞宗大鑑下第二十四世報恩秀禪師法嗣順天府萬壽雪庭福禪師字好問太原文水張氏子生宋寧宗嘉泰癸亥九歲日誦千言里中有聖小兒稱未幾遭世變失天倫所在煢絶無依道逢老比丘勸令學佛且曰汝能誦法華足矣師曰學佛止是乎比丘異之偕謁休林古佛於仙巖古佛納之為祝髮受具當嘉定甲申與雙溪廣同事者七年次參萬松於燕之報恩松一見便許入室問子從何得箇消息便恁麼來師曰老老大大向學人手裡納敗曰老僧過在甚處師曰學人禮拜暫為和尚蓋覆却松奇之於是親炙者十年值壬辰之變祖剎荒蕪尋承萬松海雲見招遂有少林之命自是道益隆名益著學者日益廣元世祖居潛邸命師作資戒會元定宗戊申詔住和林興國辛亥憲宗徵至北庭行在所問道言簡帝心庚申元世祖踐祚俾師總領釋教復僧尼得廢寺二百三十有六區仍賜光宗正辨禪師號為師建精舍於故里曰報恩給田飯衆寵錫甚至時萬壽虗席衆請師主之尋分建和林燕薊長安太原洛陽諸剎至元辛未春詔天下釋子大集京師師之衆居三之一濟濟可觀上喜之師穎悟異常三閲大藏成誦而後已誘掖後學無倦色通群書善翰墨吟咏其上堂普說幾十萬言門人請梓師叱曰此吾一時遊戲所發佛祖妙道安可以形迹為哉竟止之既老倦於接納歸隱嵩陽焉僧問如何是祖師西來意師曰待乳峰點頭即向汝道問如何是向上尊貴一路師曰漁歌驚起沙汀鷺飛入蘆花不見蹤問僧道源不遠性海非遙且道畢竟在甚麼處僧擬議師便喝問如何是西來大意師曰官不容針曰一花五葉時如何師曰私通車馬曰與麼則少林一曲國師唱去也師曰誰買黃金鑄子期問逢山開路遇水安橋時如何師曰四十九年空費力一千七百枉施功曰如何得超然獨拔今時去師曰逢山開路遇橋渡水問僧面壁石有人看見達磨麼曰今日幸遇和尚師曰拄杖子亦幸遇上座遂打僧作禮曰恩大難酬師擲下杖曰脹殺懷州牛師襟度夷坦丰神閒靜說法三十餘年如鼓雷霆揭日月繼踵前賢標準後學綽有古上遺風至於涸池出泉古殿光生屢致祥瑞師皆誡勿言乙亥秋七月二十日示微疾書偈告終壽七十三臘五十二塔於寺西塢後至仁宗履位初贈號追封命詞臣撰文表其塔尊隆特甚其為天子追慕永歎有如此順天府報恩林泉從倫禪師參萬松於阿那律得天眼因緣有省悟向上眼舉似松松問如何是向上眼師曰瞎松曰真箇瞎那師曰瞎瞎松頷之後出世住萬壽上堂禪禪非正非偏無意路有單傳超今邁古絶後光前但能亡影迹何必守蹄筌直指人心即佛乘槎客是張驀九年面壁無餘事夜半金烏挂碧天元至元壬申世祖詔入內殿與帝師論道且命師發揮禪學大旨師為舉圭峰禪源詮對曰禪梵語也此云思惟修亦名靜慮皆定慧之通稱為萬德之源故名法性亦是衆生迷悟之源故名如來藏亦即諸佛萬德之源故名佛性然不無淺深階級之殊其帶異計欣上厭下而修者名外道禪正信因果亦以欣厭而修者是凡夫禪悟我空偏真之理而修者是小乘禪悟我法二空真理而修者是大乘禪若頓悟自心本來清淨元無煩惱及與菩提一切智慧本自具足依此而修是最上乘禪亦名如來最清淨禪達磨西來代相傳者是也帝曰在先有問皆言無說如今何却有說喋喋耶師曰理本無說事則千差帝曰何謂理無言說師曰理與神會如人食蜜若問蜜之色相可以紫白言若味則有難於啓口帝謂帝師曰此語非耶是耶帝師曰此與教中甚深般若無異帝復問祖師公案師舉六祖非風幡動仁者心動話對之帝師詰曰實風幡動何名心動師竪拂子拂一拂曰且道是甚麼動帝師無語師曰不可更道一切唯心萬法唯識也帝為稱善示衆北斗似杓南斗似瓢任伊斟酌暖日凉飇冬至寒食一百五須知節令不相饒到此莫有解吞吐者麼僧問法眼道我二十年只作境話會既不作境話會畢竟作麼生會師曰猿抱子歸青嶂裡鳥銜花落碧巖前示衆若論此事如丹鳳衝霄不留朕迹直得星攢碧落月浸丹墀翡翠簾垂燭香人靜當此之際那容喘息寧許窺窬密室不通風玄關難厝足雖然要不出一點靈犀明宇宙那分東土與西乾至元辛巳十月二十聖旨就大都憫忠寺聚道藏僞經除道德經外盡行燒命師舉火師承旨以火炬打圓相曰諸仁者祇如上清玉樞三洞靈文還曾證此火光三昧也無若也證得家有北斗經人口保安寧其或未然從此灰飛煙滅盡任伊到處覓天尊急著眼看遂擲火炬僞經隨炬而盡吾捨從寬禪師臨終問其次兄曰佛祖父母我今一箭射殺二哥以為何如隨整襟坐脫焉順天府華嚴全一至溫禪師字其玉刑州郝氏子生宋寧宗嘉定丁丑幼聰敏異常兒六歲見寂照善應對照曰汝其為釋乎師心許之會照避亂遠隱遼西乃從照上首辨菴訥祝髮當理宗紹定戊子也聞無還富開法萬壽蒞衆甚嚴師偕十僧往佐之師好學博記多聞論辨無礙參萬松典侍司凡松所示一聞輒了松常令代應對機鋒不可犯遂得記太保劉文貞以師有經世才數薦於上世祖詔見與語大悅留內庭者三載於王化多有贊翊理授以官師辭曰天下佛法流通實僧至願富貴非所望也世祖嘉之賜號佛國普安大禪師憲宗末年緇羽之士各為違言以相傾上命聚訟於和林剖決真僞師從少林諸師辨之道士義墮自是法道大興至元丁卯五月示寂於桓州天宮寺異香遠聞者三晝夜火浴心舌牙齒不壞後有掊其地深數尺皆得舍利者世壽五十一臘四十河南府少林法王復菴圓照禪師上黨李氏子幼穎悟不嗜暈茹年十一出家於紫團山慈雲寺十六登具遂遊學精教乘後依萬松有年得悉禪旨出世德州大寧次遷齊河之普照鵲里之崇孝登封之法王京師之萬壽後仍歸宿普照至元癸未三月六日示寂壽七十八僧臘六十二塔於本山其臨瘞時有鶴百數盤旋其上丞相移剌真卿居士字楚材本姓耶律及金滅遼歸金改姓移剌初京師禪宿居多唯聖安澄獨尊士常訪以祖道屢舉古尊宿語録中所得扣之安間有許可士亦自恃為得及遭憂患薄功名而求道之心益切遂再以前得訪聖安安為大翻前案不然所見士甚惑焉問其故安乃從容諭之曰昔公居要地易為喜怒又儒者多無諦信搜摘語録不過一資談枘故余不即痛下鉗錘耳今揣公之心果為本分事問余余豈敢更孤負乎於是乎不吝苦口然余老矣萬松老人宗門大匠公能見之自當了公大事士唯唯走參萬松於報恩甚相契合於是杜絶人迹苦心力究者幾三年始獲印記因號湛然居士嘗敘萬松評唱其略曰佛祖諸師埋根千丈機緣百則見世生苗天童不合抽枝萬松那堪引蔓湛然向枝蔓上更添芒索穿過尋香逐氣者鼻孔絆倒行玄體妙底腳跟向去若要腳跟點地鼻孔撩天却須向者葛藤裡穿過始得先是元世祖將西征有司奏五臺等處僧徒有能呪術武略及有膂力者可為部兵從西征士為言於上曰釋氏之高行者必守不殺戒奉慈忍行故有危身不證鵝珠守死不拔生草者法王法令拳拳奉持雖死不犯用之行兵奚其宜哉其不循法律者必無志行在彼既違佛制在此豈忠王事故皆不可以之從王師也帝從之乃寢其奏太宗十五年卒壽五十五當南宋理宗淳祐癸卯也仙巖德禪師法嗣順德府天寧弘明虗照禪師遼州申氏子禮太原王山枝足出家為大僧未幾足命遍參因謁仙巖後聞版聲豁然有悟尋受記焉去止燕之歸義元太宗己丑同門圓福無還超請師開法淨土戊戌遷刑臺之天寧憲宗壬子五月八日沐浴更衣辭衆曰四大無常汝輩善自珍重索筆書偈曰兩處住持無法可說打破虗空一輪明月擲筆而逝茶毗舍利百餘顆五色燦然門人子顏子淇塔於墳菴次年世祖遷舍利於天寧壽五十七臘三十八大鑑下第二十五世萬壽禪師法嗣河南府登封嵩山靈隱文泰禪師太原汾州陽城魏氏子宿秉靈知穎悟過人父母聽剃染受具後遊學太行經入東魯稍涉教乘知算沙非了生死計乃棄之參雪峰恆有年次參太原深皆有所詣然心頭終不能無事聞雪庭主少室往參焉庭問當機一句試拈出看師擬開口庭遽曰家産被人籍沒了也還在者裡呌屈師乃撫掌曰爭奈我何庭曰者風顛漢出去師曰仁義道中且與一拜於是執侍十載終始如一受囑後奉旨開法少林風規整肅機用越倫當時稱雪庭高弟有二泰一肅者師其一焉上堂塵劫來事只在于今河沙妙德總在心源試教伊覿面相呈便不解當風拈出且道過在甚麼處良久卓拄杖曰只為分明極翻令所得遲僧參提坐具擬拜師曰天網恢恢疏而不漏曰本欲投誠被和尚撐住拜不下時如何師曰撐汝飯袋子到骨出有甚麼用曰也須將錯就錯便拜師曰錯你九玄七祖當甚麼碗僧無語師曰有頭無尾漢出去元世祖至元己丑正月示微疾謂維那曰古人坐脫立化即不無於衲僧分上皆餘事也山僧則不然言畢遂掩息右脅吉祥而逝當正月小盡日也門人舉闍維分靈骨建窣堵於少林寶應兩處太原府報恩寺中林智泰禪師汾陽魚城溫氏子剷髮於華嚴專業經律一日喟然嘆曰大丈夫當體究大事作超佛越祖一流人焉能區區於此耶時雪庭主法萬壽師依之有年一日以事觸庭庭曰有頭無尾東西有甚交涉師猶出語不遜庭曰不但無尾亦且無頭師生平疑礙忽然頓釋庭以其契悟超絶遂囑纍焉朝庭響師名宣住報恩其入室勘驗爪牙過諸方嘗為諸方歎服僧問如何是萬里無寸草處師曰不是闍黎境界曰如何是出門便是草師曰擬動即乖曰如何是不出門亦是草漫漫地師曰住著即錯曰如何得不涉動靜去師曰遍界絶纖塵通身無影象臨寂示衆曰吾緣止此汝等所得善自護持當惜分陰勿令虗度聞者皆感泣索筆書偈曰修起忠師無縫塔推倒自家無相身無相無身真自在大地山河絶點塵擲筆怡然而逝濟南府泰安州靈巖足菴淨肅禪師保定金臺永平張氏子禮香山壽聖為師究心二十餘年歷參宗匠十餘輩最後參雪庭於萬壽陶鑄有年遂得入室初繼席開法次主少室靈巖上堂白露橫江黃花滿圃砧聲敲夜月蛩語泣秋風蟬噪岸邊之樹葉辭檻外之柯色色現海印三昧塵塵轉根本法輪諸人若能會得如鏡對面眉目分明然只可喚作半箇衲僧俗氣未盡除在到者裡若能打破鏡來方好與你相見祇如打破鏡來相見後又作麼生良久曰三十棒且待別時僧問胡來胡現漢來漢現胡漢不來時如何師曰桃華歲歲皆相似人面年年多不同曰此意如何師曰不因你來問山中太寂寥且喫一頓便打後退席香山一日升座辭衆右脅而逝塔於中林泰為之銘曰撩天鼻孔點地腳跟心明眼正行古顏溫其事愈大其志愈敦諸方老宿遍叩其門受雪庭囑為萬松孫機輪迅速電掣雷奔高標覺樹密固靈根慧燈朗耀銷鑠羣昏全機大用搖蕩乾坤掀翻渤海踢倒崑崙三世諸佛一口橫吞二邊不滯中道寧淪三居大剎四衆咸尊去來絶朕動靜亡痕虗空爛壞斯道常存師生平語録雖毀於兵燹而讀泰公此銘則法施之妙與夫牙爪之殺活縱橫可以窺其十一矣府和林北寺覺印禪師上堂良久曰會麼若道我有說須無却我舌若道我無說須有却我舌金剛推倒一堆泥踏著稱鎚不是鐵且道是有說是無說良久曰等閒失却手中橈只為貪觀天上月僧參師問曾見我雪庭老師麼曰不曾見師曰瞎漢亂走作麼曰也知和尚有此一機師曰拾馬糞當飯喫有甚好腸胃出去成都府昭覺仲慶禪師上堂良久曰喫鹽添得㵣便下座僧便問喫鹽添得㵣時如何師曰吠影狗子無屎喫真定府安平守讓禪師示衆殺人刀活人劍是上古風規山僧者裡不費磨礱用得恰好且道此箇把柄從何處得來嵩山千丈雪熊耳一輪月復喝一喝太原府太子文善禪師住後上堂舉僧問大龍色身敗壞如何是堅固法身龍云山花開似錦㵎水湛如藍師曰大龍恁麼道山僧則不然若有問色身敗壞如何是堅固法身向他道山花瞎人眼㵎水毒人耳鶴不戀幽巢龍不藏死水順天府長慶德鉁禪師上堂僧問師唱誰家曲宗風嗣阿誰師曰騎牛戴席帽無端到洛陽曰恁麼則乳峰嫡派洞水逆流也師曰牧笛吹來天地靜野老門前不立牌府平水慧圓禪師一日謂門人曰老僧當年被人呼作噇酒糟漢便憤志不平踏破幾緉草鞋不得箇入處後問萬壽如何是禪壽曰猢猻上樹尾連顛你若不會却又猛火著油煎于是始得箇慶快以是知人不可不遭人激發雖然也須是你皮下有血始得僧便問罵人不刺骨時如何師曰你者無賴漢皮也無說甚麼骨報恩倫禪師法嗣順天府鞍山月泉同新禪師字仲益燕京房山郭氏子從鞍山堅剃落能以苦行事衆忽一日聰慧頓發與同行序所得衆雜笑之師憤甚以偈書壁而去偈曰氣宇衝霄大丈夫尋常溝瀆豈能拘手提三尺吹毛劍直取驪龍頷下珠往謁清安方方問欲窮千里一步為初如何是最初一步師進前叉手立方曰爭奈腳跟不點地何師拂袖便出次見大明皓杖拂之下多所資發終以未盡為歉復還清安又三年始大豁然次參林泉遂承印記尋受請靈巖泉為引座師一音才唱萬衆歡呼能於言下得旨者甚衆未幾元世祖旨下命主靈巖後退歸鞍山一日赴濟南結夏觀音院忽疾作說偈曰來無所從去亦無方驀竪拳曰且道者箇還有窒礙也無放拳曰撒手縱橫雲天蒼蒼瞑目便逝壽六十六臘四十五復菴照禪師法嗣西安府彬禪師僧問如何是正中偏師曰木人夜半打鞦韆曰如何是偏中正師曰羣僚怕見秦臺鏡曰如何是正中來師曰木童土偶笑咍咍曰如何是兼中至師曰忿怒那吒擎八臂曰如何是兼中到師曰拄杖風前還自靠大鑑下第二十六世嵩山泰禪師法嗣河南府寶應還源福遇禪師霍州靈石王氏子依邑之兜率剃染遍遊諸方雄辨無敢或當者企靈隱泰道眼精明乃屈膝參請焉泰嘗謂師曰我舉拂子你便向拂子上會我才良久你便向良久處會恁麼地如何透得本分事師面熱汗下無以對一日聞泰上堂舉切忌從他覓迢迢與我疏語師當下大悟越二年遂承印可元至元丙戌開法永慶己丑次主寶應成宗元貞乙未奉旨住少室武宗至大辛亥退居白馬僧問如何是祖師西來的的大意師曰風送泉聲來枕畔月移花影到窗前問如何是誕生王子師曰雖有尊貴分不是尊貴人曰如何是朝生王子師曰不同金榜貴終是老朝臣曰如何是末生王子師曰歷盡艱辛苦方得覲堯天曰如何是化生王子師曰與父無異體權操閫外機曰如何是內生王子師曰長在深宮內咫尺面龍顏曰向上一路又且如何師曰沒絃琴有韻人天那得聞仁宗皇慶癸丑十月示寂壽六十九臘四十九濟南府靈巖秋江潔禪師因雪軒成參師問甚處來曰青州師曰帶得青州布衫來麼曰呈似和尚了也師曰三十棒且待別時靈巖肅禪師法嗣河南府寶應月巖永達禪師汾州劉氏子落髮本州天寧寺時中惟以生死事大為懷南詢參扣聞靈巖肅法韻鏗鏘趼足往參之肅一見直以大器期之久之遂為入室弟子師忽自謂曰啓悟由師行之在己知之而不之行可乎於是掩關泰安州後以寶應虗席循衆請遂應之上堂鹿門老人道盡大地是當人一卷經盡乾坤是當人一隻眼以如是眼看如是經千萬億劫無有間斷萬松老人計窮力盡亦祇道得箇看讀不易諸人還看讀得麼須知者一卷經阿誰不具者一隻眼誰人不圓要長則千萬億劫難盡要短則一剎那頃便周寶應今日不惜眉毛為諸人指出乃彈指一聲曰看讀了也諸人切莫蹉過良久擊拂曰自是不歸歸便得五湖煙景有誰爭真定府封龍山古巖普就禪師滹陽劉氏子幼不茹葷十五禮封龍禪慶讚出家至元乙丑年十九受具戒即事遍參首見淨土成崇孝安雖皆蒙賞識終不敢自足辛巳參足菴于萬壽菴知為法器以本分鉗鎚日加鍛鍊一日𪹼然頓悟尋受記莂後辭菴乃於寶積閒居者十年癸巳桂菴住靈巖延師為第一座大德壬寅月菴海退院本寺請師繼其席開堂丁未成宗特賜妙嚴弘法禪師號次遷封龍皇慶癸丑住少林祖庭為之大振僧問如何是類墮師曰不是披皮戴角底曰如何是隨墮師曰不是聞聲見色底曰如何是尊貴墮師曰不是當堂正坐底曰若恁麼如何有墮名師曰鴈過長空影沉寒水曰古人道三墮是了事人底病既是了事人如何有病師曰祇為了事所以病生曰此病何時得愈師曰直待無身此病方愈因示頌曰金鎖重重早豁開三處悠然獨往來鴈過長空無繫著影沉寒水任渠猜師簡重少緣飾進退有節世壽七十二僧臘五十八大鑑下第二十七世寶應遇禪師法嗣南陽府鄧州香嚴淳䂐文材禪師平陽臨汾姚氏子生而有異喜見僧凡一動一止不類常兒稍長請學佛父母知其志從之依絳州福嚴普出家閲證道歌至幻化空身即法身處欣然有省往參還源呈所解源詰曰祇如道君不見是指阿誰師曰覿面親呈更無回互源曰墮坑落塹漢作恁麼語話師曰和尚又作麼生源曰塞斷汝口師曰勘破了也源可之尋閲藏於龍門山三載元泰定甲子主少室上堂滿盤打算了只有者一著最便宜敢問諸人且道是那一著卓拄杖曰切忌卜度問如何是道師曰針錐不容曰如何是禪師曰車馬有路曰和尚為甚麼翻古人公案師曰舉直錯諸枉晚隱香嚴箋釋般若心經及華嚴法界觀僧問如何是理法界師曰虗空撲落地粉碎不成文曰如何是事法界師曰到來家蕩盡免作屋中愚曰如何是理事無礙法界師曰三冬枯木秀九夏雪花飛曰如何是事事無礙法界師曰清風伴明月野老笑相親順帝至正壬辰五月十七日沐浴更衣呼門人申教誡翌日吉祥而逝瘞全身於雪庭塔右春秋八十河南府熊耳空相圭禪師示衆我若喝汝便作喝會到處信口胡喝亂喝我若棒汝便作棒會到處信手胡棒亂棒我若除却棒喝教他向本分中道一句子他不是打之繞便作女人拜不是揑兩句鬼話出來便如啞羊相似如此等輩皆是狂狗逐塊何曾夢見有獅子奪迅的牙爪驀喚曰者裡還有獅子麼試弄弄牙爪看一僧出師便打曰逐塊尋香未為好狗僧擬對師又打曰棒折也未放你在曰恁麼則雲巖路絶也師曰是你上天無計怎怪我雲巖路絶乃連棒打出曰寄與天下亂統漢河南府嵩山龍潭深禪師示衆山僧當年於般若經顛倒夢想處得箇究竟涅槃後乃知一切聖賢皆以究竟涅槃成了箇顛倒夢想及乎見我還源老和尚問他古冢不為家如何是禪老和尚曰此是死語山僧道如何是活語被老漢劈面一掌曰得恁麼死郎當山僧擬對又被老漢一掌山僧當時不覺如暗得燈乃大宣曰此回不是夢真箇是廬山今日山僧不敢昧却來源特為舉似汝諸人也須恁麼親見一回始得乃拍案一下曰噫山僧今日太殺漏逗靈巖潔禪師法嗣江寧府天界寺雪軒道成禪師一字鷲峰雲州趙大王遠孫也父徙保定遂家焉十五出家郡之興國師廣顙平額雄偉有志納戒後結三人為侶居青州土窟中密究密參者有年忽一老人謂曰汝三人他日當作法門棟梁師叱之老人遂隱師於是益加精鋭聞秋江大弘宗旨往參之語見秋江章中江默俾參堂陶鍊久之自覺無疑一日趨丈室江曰金鎖玄關曾打開盡也未師曰千年桃核裡覓甚舊時仁江頷之乃囑曰是汝本有之事善自護持後還青社衆請住普照次遷東來大澤山洪武壬戌應選道契親王殿下睿眷尤隆丁丑詔至殿命住持天界師奏不會佛法上製詩鐫金榜令懸法堂其尊重甚至上堂白雲萬頃卷舒露劫外真機紅葉千峰燦爛顯箇中妙旨亘古今而不昧經塵劫以常存鳥道虗通運步玄關綿密獅絃錯落按指古韵鏗鏘直得石女點頭木人拍手拈起金針玉線穿過機先截來兔角龜毛發明向上正偏獨露隱顯全該所以物物頭頭塵塵剎剎未有一絲毫缺少大衆會麼夜來木馬雲中過驚起南辰北斗藏上堂陰極陽回化日長梅花處處噴清香箇中消息無多子遍界何曾有覆藏如是則明明兼帶百草頭邊相逢密密宣揚萬象光中獨露利名場上薦取無位真人人我山中顯示本來面目影含宗鑑心生則種種法生身是道境心滅則種種法滅石女高提寶印文彩全彰木人暗度金梭絲毫不昧牽動劫外機輪烜赫寰中日月潛通遐邇直得枯木生花該括古今解使寒氷發𦦨雲籠古路依依野色還迷月滿寒巖皎皎神光遍照六門機息何妨宛轉旁參一色功圓切忌當頭印破白牛運步已蒙建化之緣玉馬嘶風總是利生邊事且道如何是向上事咄兔角杖挑潭底月龜毛拂挂嶺頭雲元旦上堂三陽交泰萬物咸新顯一真之妙用總造化之淵源塵塵合道處處通津法筵大啓覺苑宏開國運佛運齊興皇風宗風並扇只如道舊歲已去新歲到來未審去從何去來自何來者且置敢問大衆祇如衲衣下一著子還有增減去來也無者裡話會得便見臘盡陽和無影樹春回花發未萌枝上堂五月榴花照眼明熏風啼鳥遍巖扄機先一著無玄妙切忌當人認色聲記得夾山道目前無法意在目前不是目前法非耳目之所到天童覺曰夾山老子解開布袋將差珍異寶撒向諸人面前了也正當恁麼時又作麼生路不拾遺君子稱美大衆二老見處固有所長檢點將來總成漏逗鳳山則不然若是色見聲求即非家珍了知目前無一法頭頭物物總相應其或未然更聽末後一句道泰不傳天子令時清休唱太平歌壬午永樂登位奉使日本師往宣聖化癸未回奏上大悅仁宗在春宮時有忌師之寵者搆詞間之及御極遂謫師海南宣宗嗣位首召師還引見便殿慰勞甚至丁亥春命師於鍾山說法宣德丁未表辭歸山帝遣內臣護送南還天界西菴養老壬子臘八示微疾辭衆說偈而逝上遣官致祭有文師年八十一僧臘六十七闍維官貴四衆萬餘人收舍利圓紅者無數建塔於應天府安德門外敕賜塔所為鷲峰禪寺師三坐道場歷事四君道契王臣有光朝野送學侍者偈曰布毛拈起慧華開不是從門學得來昨夜一番秋雨過淮山依舊碧崔嵬寶應達禪師法嗣汝寧府光山石盤山遇禪師上堂諸方尊宿皆好舉話接待衲僧山僧今日效顰也舉一則供養大衆良久曰莫怪空疏便下座復顧謂侍僧曰拄杖聻侍僧曰在者裡師曰各各自領取一頓太原府斌禪師上堂以手屈指數之曰西天四七東土二三算到一千七百總出我者指頭不得噫罷罷得歸去時且歸去莫落他人指數中便下座封龍就禪師法嗣河南府天慶息菴義讓禪師真定李氏子丱歲剃落遍參宗匠末抵封龍扣古巖巖見器之一日呈達磨皮髓頌巖問達磨皮肉骨髓皆被諸子得之且道隻履歸西者是箇甚麼師曰且喜和尚猶記得巖曰是則是我終有些疑你師曰恁麼則老胡有賴也巖顧謂侍者曰如何元英宗至治壬戌開法天慶次遷熊耳之空相泰山之靈巖洛之嵩少問無功之功還有偏正否師曰偏正歷然曰如何是無功的偏正師曰石牛慣吐三春霧靈鳥不棲無影林問如何是直指人心師曰舌在口裡曰如何是見性成佛師曰金屑雖貴落眼成塵曰如何是莫向言中取則師曰道火何曾燒著口曰如何是句外明宗師便打順帝至元庚辰夏遘疾謂門人曰吾往必矣急須營塔塔畢集衆辭世書偈曰來時本靜去亦圓周虗空作舞任意優遊擲筆右脅而化計五月十二也泰安州泰山靈巖容禪師初參萬法歸一一歸何處話有省但於青州布衫與師子一吼祖父俱盡語未透一日與同參遊泰山日觀峰偶失跌幾絶良久起乃蘇遂厲聲曰得非祖父俱盡時耶古人未必到恁麼田地因謁封龍呈所見龍曰更須知有向上關棙子始得師喝一喝而出龍喜而印之
