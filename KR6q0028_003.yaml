body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十六世昭覺勤禪師法嗣嶽州府君山佛照覺禪師上堂古者道仰之彌高鑽之彌堅瞻之在前忽焉在後諸人還識得麼若也不識為你注破仰之彌高不隔絲毫要津把斷佛祖難逃鑽之彌堅真體自然鳥啼華笑在碧巖前瞻之在前非正非偏十方坐斷威鎮大千忽焉在後一場漏逗堪笑雲門藏身北斗咄蘇州府寶華顯禪師本郡人上堂喫粥了也頭上安頭洗𥁊盂去為蛇畫足更問如何自納敗闕良久高聲召大衆衆舉首師曰歸堂喫茶上堂禪莫參道休學歇意忘機常廓落現成公案早周遮祇箇無心已穿鑿直饒坐斷未生前良久曰錯錯錯紹興府東山覺禪師後住因聖上堂三通鼓罷諸人各各上來擬待理會祖師西來意還知劍去久矣麼設使直下悟去也是斬頭覓活東山事不獲已且向第二頭鞠拶看拍禪牀下座上堂花爛熳景暄妍休説壺中別有天百草頭邊如薦得東高三丈西濶八寸上堂廣額屠兒一日至佛所揚下屠刀曰我是千佛一數世尊曰如是如是今時叢林將謂廣額過去是一佛權現屠兒如此見廣額且喜沒交涉又曰廣額正是箇殺人不眨眼底漢揚下屠刀立地成佛且喜沒交涉又道廣額揚下屠刀曰我是千佛一數者一佛多少分明且喜沒交涉要識廣額麼夾路桃華風雨後馬蹄何處避殘紅台州府鴻福子文禪師上堂舉百丈野狐話頌曰不昧不落作麼會會得依前墮野狐一夜涼風生畫角滿船明月泛江湖台州府天封覺禪師上堂無生國裡未是安居萬仞崖頭豈容駐足且望空撒手直下翻身一句作麼生道人逢好事精神爽入火真金色轉鮮成都府昭覺道祖首座初見圓悟於即心是佛語下發明久之悟命分座一日為衆入室餘二十許人師忽問曰生死到來如何回避僧無對師擲下拂子奄然而逝衆皆愕然亟以聞悟悟至召曰祖首座師張目視之悟曰抖擻精神透關去師點頭竟爾趨寂南康府雲居宗振首座丹丘人依圓悟於雲居一日仰瞻鐘閣倐然契證有詰之者座酬以三偈其後曰我有一機直下示伊青天霹𮦷電卷星馳德山臨濟棒喝徒施不傳之妙於汝何虧悟見大悅嘗書壁曰住在千峰最上層年將耳順任騰騰免教名字挂人齒甘作今朝百䂐僧樞密徐俯字師川號東湖居士每侍先龍圖謁法昌及靈源語論終日公聞之藐如也及法昌歸寂在笑談間公異之始篤信此道後丁父憂念無以報罔極命靈源歸孝址説法源登座問答已乃曰諸仁者祇如龍圖平日讀萬卷書如水傳器涓滴不遺且道尋常著在甚麼處而今捨識之後者著萬卷書底又却向甚麼處著公聞灑然有得遂曰吾無憾矣源下座問曰學士適來見箇甚麼便恁麼道公曰若有所見則鈍置和尚去也源曰恁麼則老僧不如公曰和尚是何心行源大笑欽宗靖康年為尚書外郎與朝士同志者挂天寧擇木堂力參圓悟悟亦喜其見地超邁一日至書記寮指悟頂相曰者老漢腳跟猶未點地在悟面曰甕裡何曾走却鱉公曰且喜老漢腳跟點地悟曰莫謗他好公休去郡王趙令矜字表之號超然居士任南康政平事簡多與禪衲遊公堂間為摩詰丈室適圓悟居甌阜公就其鉗錘悟不少假公固請悟曰此事要得相應直須是大死一回始得公默契嘗自疏之其略曰家貧遭劫誰知盡底不存空屋無人幾度賊來亦打悟見囑令加護紹興庚申冬公與汪內翰藻李參政邴曾侍郎開諧徑山謁大慧慧聞至乃令擊鼓入室公欣然袖香趨之慧曰趙州洗盂話居士作麼生會公曰討甚麼碗拂袖便出慧起搊住曰古人向者裡悟去你因甚麼却不悟公擬對慧𢮁之曰討甚麼碗公曰還者老漢始得侍郎李彌遜號普現居士少時讀書五行俱下年十八中鄉舉登第京師旋歷華要二十八為中書舍人入圓悟室一日早朝回至天津橋馬躍忽有省通身汗流直造天寧適悟出門遙見便喚曰中書且喜大事了畢公厲聲曰和尚眼華作麼悟喝公亦喝於是機鋒迅捷凡與悟問答當機不讓後遷吏部乞祠祿歸閩連江築菴自娛忽一日示微恙遽索浴浴畢趺坐書偈曰謾説從來牧護今日分明呈露虗空拶倒須彌説甚向上一路擲筆而逝覺菴道人祖氏建寧遊察院姪女也幼志不出適留心祖道於圓悟示衆語下了然明白悟曰更須揚却所見始得自由祖答偈曰露柱抽橫骨虗空弄爪牙直饒玄會得猶是眼中沙令人本明號明室自機契圓悟遍參名宿皆蒙印可紹興庚申二月望親書三偈寄草堂清微露謝世之意至旬末別親里而終草堂為跋其偈刊行於世大慧嘗垂語發揚之其偈曰不識煩惱是菩提若隨煩惱是愚癡起滅之時須要會過新羅人不知不識煩惱是菩提淨華生淤泥人來問我若何為喫粥喫飯了洗盂莫管他莫管他終日癡憨算海沙要識本來真面目便是祖師一木叉道不得底叉下死道得底也叉下死畢竟如何不許夜行投明須到成都府范縣君者嫠居常坐不臥聞圓悟住昭覺往禮拜請示入道因緣悟令看不是心不是佛不是物是箇甚麼久無所契范泣告悟曰和尚有何方便令某易會悟曰却有箇方便遂令祇看是箇甚麼後有省曰元來恁麼地近那太平勤禪師法嗣常德府文殊正導禪師眉州丹稜徐氏子年三十得度詣成都習唯識自以為至同舍詰之曰三界唯心萬法唯識今目前萬象摐然心識安在師茫然不知對遂出關周流江淮既抵舒之太平聞佛鑑夜參舉柏樹子話至覺鐵𭪿云先師無此語莫謗先師好因大疑提撕既久一旦豁然趨丈室敘所悟鑑見來便閉却門師曰和尚莫謾某甲鑑曰十方無壁落何不入門來師以拳擉破窗紙鑑即開門搊住曰道道師以兩手捧鑑頭作口啐而出遂呈偈多趙州有箇柏樹話禪客相傳遍天下多是摘葉與尋枝不能直向根源覺公説道無此語正是惡言當面罵禪人若具通方眼好向此中辨真假鑑然之後命分座襄守請開法天寧未幾擢大別之文殊上堂師子嚬呻象王哮吼雲門北斗裡藏身白雲因何喚作手三世諸佛不能知狸奴白牯却知有且道作麼生是他知有底事雨打梨花蛺蝶飛風吹柳絮毛毬走上堂拈拄杖直上指曰刺破憍尸迦腳跟卓一下曰卓碎閻羅王頂骨乃指東畔曰穿過東海鯉魚眼睛指西畔曰塞却西王母鼻孔且道總不恁麼時如何今年雨水多各宜頻曬朗宣和改元己亥下詔改僧為德士師上堂曰祖意西來事今朝特地新昔為比丘相今作老君形鶴氅披銀褐頭包蕉葉巾林泉無事客兩度受君恩所以道欲識佛性義當觀時節因緣且道即今是甚麼時節毗盧遮邢頂戴寶冠為顯真中有俗文殊老叟身披鶴氅且要俯順時宜一人既爾衆人亦然大家成立叢林喜得羣仙聚會共酌迷仙酎同唱步虗詞或看靈寶度人經或説長生不死藥琴彈月下指端發太古之音棊布軒前妙著出神機之外進一步便到大羅天上退一步却入九幽城中祇如不進不退一句又作麼生道直饒羽化三清路終是輪回一幻身庚子九月復僧上堂不挂田衣著羽衣老君形相頗相宜一年半內間思想大底興衰各有時我佛知法有難教中明載無不委知魔得伺便惑亂正宗鐃鈸停音盂添足多般矯詐欺罔聖君所賴我皇聖德聖明不忘付囑特賜宸章仍還僧像重新披削實謂寒灰再焰枯木重榮迷仙酎變為甘露瓊漿步虗詞翻作還鄉曲子放下銀木簡拈起尼師壇昨朝稽首擎拳今日和南不審祇改舊時相不改舊時人敢問大衆作麼生是舊時人良久曰秋風也解嫌狼藉吹盡當年道教灰建炎己酉春示衆舉臨濟入滅囑三聖因緣曰正法眼藏瞎驢滅臨濟何曾有是説今古時人皆妄傳不信但看後三月至閏三月鍾相叛其徒欲舉師南奔者師曰學道所以了生死何避之有賊至師竟被害血皆白乳賊駭驚悔而去師之視生死可謂如夢幻矣韶州府南華知昺禪師蜀之永康人初行腳離鄉未久聞受業一夕遺火成灰燼師得書擲之於地曰徒亂人意耳其為人嚴冷諸方謂之昺鐵面上堂此事最希奇不礙當頭説東鄰田舍翁隨例得一橛非唯貫聲色亦乃應時節若問是何宗八字不著人擊禪牀下座上堂日日説時時舉似地擎山爭幾許隴西鸚鵡得人憐大都祇為能言語休思惟帶伴侶智者聊聞猛提取更有一般事大奇貓兒偏解捉老鼠下座上堂以拄杖向空中攪曰攪長河為酥酪蝦蟹猶自眼搭眵卓一下曰變大地作黃金窮漢依前赤骨力為復自家無分為復不肻承當可中有箇漢荷負得行多少人失錢遭罪再卓一下曰還會麼寶山到也須開眼勿使忙忙空手回上堂春光爛熳華爭發子規啼落西山月憍梵波提長吐舌底事分明向誰説嗄上堂迷不自迷對悟立迷悟不自悟因迷説悟所以悟為迷之體迷為悟之用迷悟兩無從箇中無別共無別共撥不動祖師不將來鼻孔千斤重長沙府龍牙智才禪師舒州施氏子服勤佛鑑局務不辭難晚至黃龍適死心在三門問所從來稱名知為太平才莊主翌日入室死心問會得最初句便會末後句會得末後句便會最初句最初末後拈放一邊百丈野狐話作麼生會師曰入戶已知來見解何須更舉轢中泥心曰新長老死在上座手裡也師曰語言雖有異至理且無差心曰如何是無差底事師曰不扣黃龍角焉知頷下珠心便打初住嶽麓上堂僧問德山棒臨濟喝今日請師為拈掇師曰蘇嚕蘇嚕曰蘇嚕蘇嚕還有西來意也無師曰蘇嚕蘇嚕叢林因呼為才蘇嚕後遷龍牙欽宗登位衆官請上堂祝香罷就座拈拄杖卓一下曰朝奉疏中道本來奧境諸佛妙場適來拄杖子已為諸人説了也於斯悟去理無不顯事無不周如或未然不免別通消息舜日重明四海清滿天和氣樂升平延祥拄杖生歡喜擲地山呼萬歲聲擲拄杖下座上堂永嘉道彈指圓成八萬門剎那滅却三祇劫若也見得行得健即經行困即歇其或未然兩箇鸕扛箇鱉上堂舉死心道若論此事如人家有三子第一子聰明智慧孝養父母接待往來主掌家業第二子𠒋頑狡猾貪淫嗜酒倒街臥巷破壞家業第三子盲聾瘖啞菽麥不分是事不能祇會喫飯三人中黃龍要選一人用更有四句死中有活活中有死死中常死活中常活將此四句驗天下衲僧師曰喚甚麼作四句三人姓甚名誰若也識得與黃龍把手並行更無纖毫間隔如或未然不免借水獻華去也三人共體用非用四句同音空不空欲識三人并四句金烏初出一團紅師居龍牙十三載以清苦蒞衆衲子敬畏太師席公震遷住雲溪經四稔紹興戊午八月望俄集衆付寺事仍書偈曰戊午中秋之日出家住持事畢臨行自己尚無有甚虗空可覓其垂訓如常二十三日再集衆垂問曰涅槃生死盡是空華佛及衆生並為增語汝等諸人合作麼生衆皆下語不契師喝曰苦苦復曰白雲湧地明月當天言訖奄然而逝火浴獲設利五色併靈骨塔於寺之西北隅寧波府蓬萊卿禪師上堂有句無句如藤倚樹且任諸方點頭及乎樹倒藤枯上無衝天之計下無入地之謀靈利漢者裡著得一隻眼便見七縱八橫舉拂子曰看看一曲兩曲無人會雨過夜塘秋水深上堂舉法眼道識得凳子周匝有餘雲門道識得凳子天地懸殊師曰此二老人一人向高高山頂立一人向深深海底行然雖如是一不是二不成落花流水裡啼鶯間亭雨歇夜將半片月還從海底生上堂杜鵑聲裡春光暮滿地落花留不住琉璃殿上絶行蹤誰人解插無根樹舉拄杖曰者箇是無根底且道還解開華也無良久曰祇因連夜雨又過一年春湖州府安吉州何山佛燈守珣禪師郡之施氏子參廣鑑瑛不契遂造太平久無所入乃封其衾曰此生若不徹去誓不開展於是晝坐宵立如喪考妣逾七七日聞佛鑑上堂曰森羅及萬象一法之所印師忽頓悟往見鑑鑑曰可惜一顆明珠被者風顛漢拾得乃詰之曰靈雲道自從一見桃華後直至如今更不疑如何是他不疑處師曰莫道靈雲只今覓箇疑處了不可得鑑曰玄沙道諦當甚諦當敢保老兄未徹在那裡是他未徹處師曰深知和尚老婆心切鑑然之師拜起呈偈曰終日看天不舉頭桃花爛熳始擡眸饒君更有遮天網透得牢關即便休遂入衆厲聲曰者回珣上座穩睡去也圓悟聞疑其未然令人召至拉與遊山偶到一水潭悟推師入水遽問曰牛頭未見四祖時如何師曰潭深魚聚曰見後如何師曰樹高招風曰見與未見時如何師曰伸腳在縮腳裡悟大稱之鑑移蔣山命分座説法出住吉州禾山退藏故里道俗迎居天聖後徙何山及天寧上堂𨍏轢鑽住山斧佛祖出頭未輕與縱使醍醐滿世間你無寶器如何取阿呵呵神山打鑼道吾作舞甜瓜徹蒂甜苦瓠連根苦上堂如來禪祖師道切忌將心外邊討從門所得非家珍特地埋藏衣裡寶禪家流須及早撥動祖師關棙抖擻多年布襖是非毀譽付之空竪濶橫長渾恰好君不見寒山老終日嬉嬉長年把掃人問其中事若何入荒田不揀信手拈來草參僧問如何是賓中賓師曰客路如天遠侯門似海深曰如何是賓中主師曰長因送客處憶得別家時曰如何是主中賓師曰相逢不必問前程曰如何是主中主師曰一朝權祖令誰是出頭人曰賓主已蒙師指示向上宗乘事若何師曰大海若知足百川應倒流嘗謂衆曰兄弟如有省悟處不拘時節請來露箇消息雪夜有僧扣方丈門師起秉燭震威喝曰雪深夜半求決疑情因甚麼威儀不具僧顧視衣裓師遂堅逐出院紹興甲寅解制退天寧之席謂鄭績曰十月八日是佛鑑忌辰吾時至矣乞還鄣南十月四日鄭遣弟僧道如訊之師曰汝來正其時也先一日不著便後一日蹉過了吾雖與佛鑑同條生終不同條死明早可為我尋一隻小船子來高五尺足矣越三日雞鳴端坐如平時侍者請偈師曰不曾作得言訖而逝闍維舌根不壞郡人陳師顏以寶函藏其家門弟子奉靈骨塔於普應院之側南昌府泐潭擇明禪師舉趙州訪茱萸探水因緣頌曰趙老雲收山嶽露茱萸雨過竹風清誰家別館池塘裡一對鴛鴦畫不成舉德山托話頌曰從來家富小兒嬌偏向江頭弄畫橈引得老爺把不住又來船上助歌謠上堂永嘉道一月普現一切水一切水月一月攝竪起拂子曰看看千江競注萬派爭流若也素善行舟便諳水脈可以優遊性海笑傲煙波其或未然且歸林下坐更待月明時台州府寶藏本禪師上堂清明已過十餘日花雨闌珊方寸深春色惱人眠不得黃鸝飛過緑楊陰遂大笑下座吉安府祥符大中清海禪師初見佛鑑鑑問三世諸佛一口吞盡何處更有衆生可教化此理如何師擬進語鑑喝之師忽領旨述偈曰實際從來不受塵箇中無舊亦無新青山況是吾家物不用尋家別問津鑑曰放下著師禮拜而出漳州府淨衆佛真了燦禪師泉南羅氏子初住淨衆遷太平興國上堂重陽九日菊花新一句明明該古今楊廣橐馳無覓處夜來足迹在松陰南昌府谷山海禪師上堂一舉不再説已落二三相見不揚眉翻成造作設使動絃別曲告往知來見鞭影便行望剎竿回去腳跟下好與三十棒那堪更向者裡撮摩石火收捉雷光工夫枉用渾間事笑倒西來碧眼胡卓拄杖下座龍門遠禪師法嗣溫州府龍翔竹菴士圭禪師成都史氏子初依大慈雅醉心楞嚴逾五秋南遊挂龍門以所得白佛眼眼曰汝解心已極但欠開眼耳遂俾職堂司一日侍立次問絶對待時如何眼曰如汝僧堂中白椎相似師罔措至晚眼抵堂司寮師理前話眼曰間言語師於言下大悟政和末出世和之天寧屢遷名剎紹興間奉詔開山鴈蕩能仁時真歇居江心聞師至恐緣未熟特過江迎歸方丈大展九拜以誘溫人溫人由是翕然歸敬未視篆舊住僧懼行規法深夜放火鞠為瓦礫之墟師毫不介意乃就樹縛屋升座示衆曰愛間不打鼓山鼓投老來看鴈蕩山傑閣危樓渾不見溪邊茆屋兩三間還有共相出手者麼喝一喝下座聽法檀施併力營建未幾復成寶坊次補江心上堂萬年一念一念萬年和衣泥裡輥洗腳上牀眠歷劫來事祇在如今大海波濤湧小人方寸深拈起拄杖曰汝等諸人未得箇入頭須得箇入頭既得箇入頭須有出身一路始得大衆且作麼生是出身一路良久曰雪壓難摧澗底松風吹不動天邊月卓拄杖下座上堂萬機不到眼見色耳聞聲一句當空頭戴天腳踏地你諸人祇知今日是五月初一殊不知金烏半夜忙忙去玉兔天明上海東以拂子擊禪牀下座上堂明明無悟有法即迷諸人向者裡立不得諸人向者裡住不得若立則危若住則瞎直須意不停玄句不停意用不停機此三者既明一切處不須管帶自然現前不須照顧自然明白雖然如是更須知有向上事久雨不晴咄上堂一葉落天下秋欲窮千里目更上一層樓一塵起大地收嘉州打大像陝府灌鐵牛明眼漢合作麼生良久曰久旱簷頭句橋流水不流卓拄杖下座上堂見見之時見非是見見猶離見見不能及落華有意隨流水流水無心戀落華諸可還者自然非汝不汝還者非汝而誰長恨春歸無覓處不知轉入此中來喝一喝曰三十年後莫道能仁教壞人家男女上堂僧問如何是祖師西來意師曰東家點燈西家暗坐曰未審意旨如何師曰馬便搭鞍驢便推磨僧禮拜師曰靈利衲僧祇消一箇遂曰馬搭鞍驢推磨靈利衲僧祇消一箇縱使東家明點燈未必西家暗中坐西家意旨問如何多口阿師自招禍僧問如何是第一義師曰你問底是第二義問狗子還有佛性也無趙州道無意旨如何師曰一度著蛇咬怕見斷井索問燕子深談實相善説法要此理如何師曰不及鴈銜蘆問如何是佛師曰華陽洞口石烏龜問有句無句如藤倚樹時如何師曰作賊人心虗曰國師三喚侍者又作麼生師曰打鼓弄猢猻鼓破猢猻走問魯祖面壁意旨如何師曰金木水火土羅睺計都星高宗紹興丙寅七月十八日召法屬長老宗範付後事次日沐浴聲鐘集衆就座泊然而逝茶毗日送者均獲設利奉靈骨塔於鼓山南康府雲居高菴善悟禪師洋州李氏子年十一去家業經得度有夙慧聞僧沖舉武帝問達磨因緣如獲舊物遽曰我既廓然何聖之有沖異其語勉之南詢獲記莂于龍門一日有僧被蛇傷足佛眼問曰既是龍門為甚麼却被蛇咬師應聲曰果然現大人相眼益器之有傳此語到昭覺覺曰龍門有此僧耶東山法道未至寂寥住後上堂少林面壁懷藏東土西天歐阜升堂充塞四維上下致使山巍巍而砥掌平水昏昏而常自清華非艷而結空果風不搖而片葉零人無法而得咨問佛無心而更可成野淡飯延時日任運隨緣道自靈畢竟如何日午打三更遂寧府西禪文璉禪師郡之張氏子上堂一向恁麼去直得凡聖路絶水泄不通鐵蛇鑽不入鐵鎚打不破至於千里萬里鳥飛不度一向恁麼來未免灰頭上面帶水拖泥唱九作十指鹿為馬非唯孤負先聖亦乃埋沒己靈敢問大衆且道恁麼去底是恁麼來底是芍藥華開菩薩面棕櫚葉散夜叉頭上堂諸方浩浩談玄每日撞鐘打鼓西禪無法可説勘破燈籠露柱門前不置下馬臺免被旁人來借路若借路須照顧腳下若參差邯鄲學唐步上堂心生種種法生森羅萬象縱橫信手拈來便用日輪午後三更心滅種種法滅四句百非路絶直饒達磨出頭也是眼中著屑心生心滅是誰木人携手同歸歸到故鄉田地猶遭頂上一鎚上堂正月孟春猶寒直下言端語端拈起衲僧鼻孔穿過祖佛心肝知有者達磨不來東土二祖不往西天不知有者誰知當面蹉過迢迢十萬八千山僧為你重説偈言大衆莫教孤負孟春猶寒僧問師子未出窟時如何師曰爪牙已露曰出窟後如何師曰龍頭蛇尾曰出與未出時如何師曰正好喫棒問以一重去一重即不問不以一重去一重時如何師曰闍黎有許多工夫南昌府黃龍牧菴法忠禪師四明姚氏子十九試經得度悟一心三觀旨以未能泯迹遍參名宿至龍門觀水磨旋轉發明心要述偈曰轉大法輪目前包裹更問如何水推石磨呈佛眼眼曰其中事作麼生師曰澗下水長流眼曰我有末後一句待分付汝師即掩耳而去後至廬山於同安枯樹中絶食清坐宣和間湘潭大旱禱而不應師躍入龍淵呼曰業畜當雨一尺雨隨至居南嶽每跨虎出遊儒釋望塵而拜住後上堂張公喫酒李公醉子細思量不思議李公醉醒問張公恰使張公無好氣無好氣不如歸家且打睡上堂今朝正月半有事為君斷切忌兩眼睛被他燈火換上堂我有一句子不借諸聖口不動自己舌非聲氣呼吸非情識分別假使淨名杜口於毗耶釋迦掩室於摩竭大似掩耳偷鈴未免天機漏泄直饒德山入門便棒臨濟入門便喝若向牧菴門下祇得一橛千種言萬般説祇要教君自家歇一任大地虗空七凹八凸僧問如何是佛師曰莫向外邊覓曰如何是心師曰莫向外邊尋曰如何是道師曰莫向外邊討曰如何是禪師曰莫向外邊傳曰畢竟如何師曰靜處薩婆訶問大衆臨筵請師舉唱師竪起拂子僧曰乞師再垂方便師擊禪牀下座後示寂塔于香原洞
