body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十八世西禪瑞禪師法嗣棠城寶文洪印禪師古渝棠城張氏子禮雪峰蓄養有年因峰遷化未獲印可遠扣楚山值定王薨世三周除𧝓請山陞座師出問雷音動地選佛場開一會靈山儼然未散未審皇恩佛恩如何補報山曰蕩蕩皇風清六合明明佛日照三千師曰祝讚已聞師的旨拈花微笑意如何山曰機前有語難容舌獨許頭陀一笑傳師曰玉梅破雪紅葉凋霜適官家除𧝓之辰乃鶴駕仙遊之日未審薨世主人金容即今何在山竪拂曰在山僧拂子頭上成等正覺放大光明與如來共轉法輪汝還見麼師曰與麼則徧界絕遮藏也山曰要且有眼覰不見師曰只者覰不見處不隔纖毫山曰未是妙師曰未審如何是妙山曰二邊俱抹過始見劫前人師曰蒙師點出金剛眼死去生來不更疑山曰俊哉衲子透網金鱗出語標宗不忝西禪之嗣更須保任切勿自欺師曰人天證明謝師印可性空無極聞和尚甞作顯宗歌曰達此宗無今古拶破虗空還自補聲色堆頭妙覺場放去收來無間阻體中妙夜半木人臨鏡照波斯南岸嚼寒氷塞北湖兒街市閙用中玄石女吹笙碧樹巔趙州葫蘆挂東壁村中王老夜燒錢玄中玄妙中妙寶絲網裡鬬明珠須向暗中通一竅海潮音熾然說師子筋琴彈白雪兩岸青山笑點頭百年古調翻來別聞嗣投子琦悞列此古庭堅禪師法嗣太原府五臺山顯通大巍淨倫禪師雲南康氏子生宣德丁未正統間從無極泰芟染古庭居浮山師往叩室中機契後住顯通上堂無孔鐵鎚當面擲黑漆崑崙攔路坐莫有挨拶得入拈弄得出底出來道看僧問如何是臺山境師曰不是天晴便是下雨曰如何是境中人師曰金剛窟裡萬菩薩曰未審尋常所說何法師曰清風吹幽松近聽聲愈好問如何是佛法的的大意師曰今年調雨水農家好春麥問如何是祖師西來意師曰待飯仙山轉身即向汝道乃曰拈砒霜作醍醐亦曾有也撒珍珠如瓦礫誰箇不然開眼上樹特地喪全身夢昇兜率也是揚家醜未動情思轉魔女盡成菩提寶器不勞腕力指娑婆便為妙喜淨長水濬嶽積而來瑯琊覺氷消而去信脚踏翻瑠璃穽等閒擊碎珊瑚枝上堂三聖震威一喝正法眼裡撒沙南泉白刃高揮古佛家風掃土何必不必探竿豈在人手湘南潭北塔樣脫體持來不萌枝上放春回烈𦦨堆中飛片雪有斯作略可謂其人誰家井底無天到處波心有月上堂體相用三大齊彰塵塵攝入因果智五周頓證法法圓融百城煙水不出一毫十世古今匪移當念紅藕華開聞水香觸著蟭螟蟲半邊鼻青山低處見天濶展開瘦蚊子一莖眉百川競注水體不流萬竅共號風本自寂金師子不勞踞地水牯牛隨分納些動容滿目家山依舊青天白日冬至示眾五頂瓊瑤堆千松珠玉枝盡臺山泉石煙雲飛樓涌殿總是文殊一隻智眼真光是汝諸人常在於其中經行及坐臥還知從不曾動著渠一莖眉毛麼若也與麼見得便爾攝大千於毫端廣塵沙於法界其或未然切忌東卜西卜我為汝諸人真實告報今朝冬至一陽生珍重示眾山高海濶月朗風清松蒼石臼夏暑冬寒如是歷歷分明一一成現且道衲僧分上成得箇甚麼邊事莫有道得底麼不妨出來道看若無老僧自道去也拈拄杖便下座示眾演祖道有則奇特因緣舉似諸人欲說又被說礙不說又被不說礙大小演祖大似靈龜曳尾一言既落人耳如何諱得老僧也有一則奇特因緣索性舉似大方令他倚門傍戶者一箇箇壁立千仞便下座示眾老僧者裡也不說東村李大郎太儉也不說西村王二姊太奢也不會安角呼兔也不會添足畫蛇早起一盂白粥午後一盌清茶誰管他陳年爛葛藤冷地開華展兩手曰汝等諸人來者裡討甚麼乾木查山居吟曰無事山房門不開土堦春雨綠生苔此心將謂無人委幽鳥一聲何處來後示寂於本山佛蹟真禪師法嗣處州府白雲無量滄禪師示眾二六時中隨話頭而行隨話頭而住隨話頭而坐隨話頭而臥心如栗棘蓬相似不被一切人我無明五欲三毒之所吞噉施為動靜通身是箇疑團疑來疑去終日獃樁樁地聞聲見色管取㘞地一聲去在雖然切忌喚鐘作甕喝一喝和菴忠禪師法嗣寧波府用剛宗軟禪師示眾大凡做工夫只要起大疑情不失正念千疑萬疑祇是一疑纔有間斷即落空也見汝等做工夫未曾半月一月打成一片焉得不走作果若真疑現前撼搖不動自然不怕惑亂又不得起一念歡喜心纔有絲毫異念即打作兩橛只管勇猛忿將去終日如箇死漢子相似到者般時節那怕甕中走却鼈大眾忽然甕中捉著鼈時如何切忌認奴作郎大鑑下第二十九世金陵慈禪師法嗣江寧府高峰寶峰明瑄禪師吳江范氏子俗業斵因海舟令造塔院足傷索酒舟曰幸傷足若斫去頭雖千酲汝能喫不師媿遂求為僧一日燒火般柴次舟曰是甚麼師曰是柴舟曰是柴將去燒師致疑通夕不寐忽為火燎去眉毛面如刀刈以鏡照之大悟趨見舟舟拈棒師奪棒曰者條六尺竿多時不用今日又要重拈舟大笑師呈偈有笑裡藏刀子細看句舟曰即此偈可紹吾宗遂以偈付之有臨濟兒孫獅子子之句後住金陵高峰寺天奇瑞參師問甚處來奇曰北京師曰只在北京為復別有去處曰隨方瀟灑師曰曾到四川麼曰曾到師曰四川境界與此間何如曰江山雖異雲月一般師舉拳問四川還有者箇麼曰無師曰因甚却無曰非我境界師曰如何是汝境界曰諸佛不能識誰敢強安名師曰汝豈不是著空曰本瑞終不向鬼窟裡作活計師曰西天九十六種外道汝是第一奇拂袖便出師喜為克家種草堪支吾道遂書偈付之曰濟山棒喝怒如霆殺活臨機手眼親聖解凡情俱坐斷曇華放出一枝新師於成化辛卯臘月九日示寂塔全身於東明寺左九江府廬山雲溪碧峰智瑛禪師少壯苦不識字晚年信口成章時多稱之囑門人智素偈曰見徹孃生親面目尤宜勤守護天真爪牙養就崢日哮吼一聲百獸驚君峰通禪師法嗣邵武府君峰清祥上座久依大闡一日忽有省呈偈曰法性空無礙平等觀自在截斷兩頭機是名超三界闡為是之思南府正法雪光禪師族趙氏徧歷諸方至靈峰度夏聞舉嚴陽尊者問趙州公案有省舉似寂照照曰無功用處正好用功莫認些子光影有悞生平復結冬於景德一日定中聞巖瀑聲觸發默舉從上佛祖機緣一一透得遂往參潔空從頭舉似已空曰不見道莫謂無心云是道無心猶隔一重關道了便入寢室師自是茫無意緒懷疑不決一日見寒山詩吾心似秋月之句凝滯頓釋後菴居古山臨終書偈而逝天寧宣禪師法嗣杭州府徑山天才英禪師示眾默堂老人平地上湧起波濤虗空裡敲出木楔中人毒氣回來剛道親見寶月不知瞎却多少人眼睛啞洎合饒舌大岡寧禪師法嗣杭州府天目寶芳進禪師付法偈曰真性本無性真法本無法了知無法性何處不通達性空聞禪師法嗣荊州府圓通夢菴嬾牧湛覺禪師長安曲江張氏子幼慕禪悅從藍田秀芟染矢志究明生死朝夕孜孜至於寢食俱廢一日有省往見性空求決擇既而蒙印證明成化丙戌開法圓通上堂選佛場草深三尺空王殿浪捲千尋圓通有一句子囫圇吐不出吐出不囫圇若有人檢點得出許他具一隻眼淨慈休禪師法嗣杭州府昭慶幻寄雪庭禪師仁和桂氏子成化癸巳謁休休於仙林一見契合因閱楞嚴至於一毫端現寶王剎有疑後詣江陰乾明寺覩萬佛閣金碧崢嶸忽有省明弘治戊申除夕聞鐘聲從前履踐不覺瓦解述偈曰圓響心非聞大千同一照抹過上頭關更不存玄妙乙卯休休應淨慈請師復依侍乃蒙印可年四十開法昭慶上堂心不是境境全是心觸處不逢渠何背汝所以心不自心鄰雞唱曉露觀音境不自境庭樹花開吐光影塵中總是自來賓堂內主人須喚惺良久曰切忌瞌睡便下座上堂洪鐘有口元無舌一擊全聲四海聞拶得錦鱗頭角露竚看平地卷風雲舉巖頭示眾吾教意如塗毒鼓擊一聲遠近聞者皆喪時有小嚴問如何是塗毒鼓頭以手按膝亞身云韓信臨朝底嚴無語頌曰烏藤攪動四溟水鰕蟹魚龍喪膽魂進退觸波遭點額那堪𨁝跳聽雷崩舉雪峰示眾飯籮邊餓死人無數海水裡渴殺人無數至雲門云通身是飯通身是水話頌曰小店梨花酒正香牧童指出幾人甞任渠點滴不沾口已是渾身臥醉鄉舉南泉見鄧隱峰來指淨瓶曰淨瓶是境你不得動著境與我將水來峰將瓶傾水於泉前泉休去頌曰落英片片逐東風狼藉春光滿地紅設使向前收拾得餘香猶有隔牆東舉僧問玄沙如何是學人自己沙曰用自己作麼話頌曰平生不作江南夢怪殺人來說鷓鴣衣錦未能歸故國三家村裡覓皇都舉洞山初言無展事語不投機承言者喪滯句者迷話頌曰白圭三復瑕難掩一默如緘語路差稍變動已迷家萬頃秋光天水碧一聲漁笛隔蘆花又甞有詠黃鸝詩曰多情自信惜春光飛入園林錦繡鄉記得小窓驚我夢滿庭紅杏帶斜陽大鑑下第三十世寶峰瑄禪師法嗣安陸府荊門州天奇本瑞禪師南昌鍾陵人父江堂母徐氏年廿二棄家遠投荊門無說能薙髮能示萬法歸一一歸何處話令參後遇高郵全首座同往襄陽途中偶聞婦人呼猪聲全曰阿孃牆裡喚哪哪途路師僧會也麼拶破者些關棙子孃孃依舊是婆婆師矍然汗下一日病甚有暉禪者勉師曰病中工夫切不可放過因舉大慧在徑山患背瘡晝夜呌喚或問慧還有不痛底麼慧曰有曰作麼生是不痛底慧曰痛殺人痛殺人師於言下豁然透得孃孃依舊是婆婆意旨又一日聞山鹿呌喚會得日用之中無不是底道理遂往蜀中謁楚山問某甲閒時看來了然明白及至臨機因甚茫然山曰毫釐有差天地懸隔後遊金陵路次忽然如從夢覺從前所得一場懡㦬遂參寶峰於高峰鍼芥相契遂蒙印證語具寶峯章中住後落堂開示祖師西來不立文字直指人心見性成佛更無別法若向者裡知箇落處定也有分慧也有分宗也有分教也有分佛法世法無可不可腰纏十萬貫騎鶴上揚州其或不然定也不是慧也不是宗也不是教也不是葢為不識本心名為狂妄經云虗妄浮心多諸巧見不能成就圓覺方便諸佛諸祖惟傳一心不傳別法汝等不達本心便向外求於妄心中起妄功用如邀空華欲結空果縱經塵劫只名有為須知所謂見性成佛者見性不是見他人之性成佛不是成他人之佛決定是汝諸人本有之性與十方法界秋毫不昧人人本具箇箇不無但向二六時中一切處回光返照看是阿誰不得執定一處須是於一切處大起疑情將高就下將錯就錯一絲一毫毋令放過行住坐臥時便看者行住坐臥底是誰見色聞聲時便看者見底聞底是誰覺一觸時便看者覺底是誰知一法時便看者知底是誰乃至語默動靜周旋往返一一返看晝夜無疲倘若一念忘了便看者忘了底是誰妄想起時便看者妄想底是誰你道不會只者不會底又是阿誰現今疑慮你看者疑慮底又是阿誰如是看來看去萬境不能侵諸緣不能入得失是非都無縫罅明暗色空了無彼此山河大地日月星辰盡聖盡凡都盧祇是一箇誰字更無別念上下無路進退無門山盡水窮情消見絕豁然𪹼地一聲方知非假他求咄示眾閒花野草露真機劍號巨闕蛺蝶穿園拍板扉珠稱夜光兩岸蘆花齊點首雲騰致雨一條江水伴鷗飛露結為霜山僧於此盡情吐露更有一句尚未曾道會麼那邊不坐空王殿爭肯耘苗向日輪寂後門人於弘治十一年戊午建塔於衛輝府輝縣白鹿山之白雲寺左雲溪瑛禪師法嗣九江府匡山天池林隱靜菴智素禪師東萊趙氏子生景泰甲戌八月十八早年父母俱喪十五從五臺天成寺大用祝髮謁雲溪得旨後住天池上堂體露金風光皎潔一色明明無間歇𦏪羊挂角覓無蹤海底蟾蜍吞却月荊藩請住東山上堂在天天高在地地厚一毫端上應時納佑此猶是者邊事且道那邊事作麼生拊几曰釋迦睡重彌勒起遲下座吉菴祚禪師法嗣嘉興府天寧法舟道濟禪師郡之思賢里張氏子年二十一投天寧為行者時默堂宣受寶月記歸自繁昌師往謁服勤久之復詣東禪從昂祝髮參吉菴菴門庭孤峻師能朝夕咨叩一日聞磬聲豁然洞徹尋趨方丈菴曰子著賊也師曰賊已收下曰贓在甚處師振坐具曰狼藉狼藉曰者掠虗漢狼藉箇甚麼師一喝歸眾菴可之未幾長安覺王寺請居第一座室中秉拂機用莫能湊泊嘉靖初住金陵安隱僧問如何是安隱境師曰三山半落青天外二水中分白鷺洲曰如何是安隱家風師曰石虎山前鬬泥牛水底眠曰不會師曰用會作麼精嚴寺晚參精嚴寺裡撞鐘府譙樓上擂鼓同時顯大神通穿透千門萬戶大眾還聞麼若道不聞爭奈鐘鼓分明人人有耳若道聞將甚麼聞即今鼓絕鐘消聞底事又作麼生試道看卓拄杖曰黃金自有黃金價終不和沙賣與人陸五臺問畫前元有易不師曰若無伏羲將甚麼畫臺曰畫後如何師曰元無一畫臺曰現有六十四卦何得言無師曰莫著文字臺曰請和尚離文字發一爻看師召居士臺應諾師曰者一爻從何處起又問至人無夢何也師曰常人於現前虗幻分別境界不知全體是夢認為實有而以昏昧想心繫念神識紛飛境界為夢所謂寤寐俱夢夢中復作夢也至人於自心境界如實而知故於現前虗幻境界妙用冷然通徹無礙而睡夢亦自明明而知歷歷而覺所謂寤寐一如者也故至人無夢之說非有無之無乃是無夢無非夢夢與非夢一而已矣又問夢裡須臾何以歷涉萬里師彈指一下曰千里萬里只在者裡問聖人有妄念不師曰無曰既無妄念何用兢兢業業師曰兢兢業業故無妄也問為政如何得無倦師曰榮辱得喪毀譽是非一切不管但虗其心行其所無事則無倦矣問終日喫飯何故不曾齩著一粒米師曰喫飯底人居士還曾見不問四方上下有窮盡不師曰居士試返觀自己心量有窮盡不士良久曰實無窮盡師曰世界亦然又問地獄實有不師曰人作了惡歷歷自知雖經久遠憶持不忘便是業鏡自心明知自惡不能自釋便是法王心地不空地獄實有心若空了地獄隨空示禪人偈曰工夫不間四威儀聽板聞鐘好下疑打破未生時面目好來爐畔受鉗鎚道本無為豈屬修有修頭上更安頭虗空若使重加柄野草閒華正好愁將謂衣中有寶珠衣穿方信寶珠無前年尚有無珠說今日無珠說也無內不尋思外不求大千沙界一毫收塵塵剎剎蓮華藏認著依然是外頭後遷弁山晚退歸天寧嘉靖庚申秋示寂壽七十四臘五十二茶毗塔禪悅堂天通顯禪師法嗣湖州府天池月泉玉芝法聚禪師嘉禾富氏子母馮生弘治壬子子月晦日兒時每藉地趺坐折草念佛母曰此兒佛弟子也稍長通經史年十四從資聖堅受業受具後矢志參學夙夜匪懈一日閱壇經有省往謁吉菴不契復見法舟舟多所啟發一日聞僧舉僧問大顛如何是見性顛曰見即是性不覺釋然一笑述偈曰湖光倚杖三千頃山色開門五六峰觸目本來成現事蒲團今不鍊頑空未幾結制於漏澤之雲峰忽憶雪巖問高峰正睡著時無夢無想無見無聞主人公在甚麼處話便見得生死一致寤寐一如一日聞友人誦天通夢居碧峰寺裡有如來之句遂詣碧峰纔見便問碧峰寺裡有如來莫便是和尚不峰曰上座還見麼師曰縱見也是金屑落眼峰曰者漢死去多少時汝來為他乞命便歸方丈次日峰上堂舉古德曰打破大唐國覓箇不會佛法底也無又曰向南方走了一轉拄杖頭不曾撥著一箇會佛法底此二語甚有誵譌試為酬一語看師曰前不構村後不迭店峰曰未在更道師曰不遇知音者徒勞話歲寒峰曰有甚得力句試舉看師遂呈二偈峰曰未免落人圈䙡師曰如何得不落人圈䙡峰便掌曰是落不落師豁然大悟平昔所蘊皆氷釋已而侍峰過杭遊南屏至宗鏡堂峰登座曰此處正好說法師曰說法已竟峰便下座顧師問曰還記得我所說底法麼師曰劍去久矣峰頷之遂為印可後出住天池示眾至道無為非有為無以造其深絕學無學非力學無以臻其極譬猶玉之在璞珠之在淵非剖鑿探求終無以獲故趙州三十年不雜用心香林四十年方成一片孜孜矻矻廢寢忘餐惟欲究明大事此皆參禪學道之榜樣也奈茲禪林秋暮法道荒凉逐妄隨邪無復自振惟知粥飯現成不愧虗消信施或遊心異學肆志辨聰或穿鑿機緣馳求義解是皆唐喪光陰徒增業識如舍父窮子飄零無據可勝嘆哉若是英靈漢直須於生死岸頭猛著精彩一念純真纖塵不立如遇怨敵單刀直入不顧危亡如墮深井念念無他但求出路若能具如是深心管取到家有日也上堂舉趙州勘二菴主公案頌曰舖席經過只一般爭知死貨活人拈東行賣貴西行賤看破方知不直錢上堂釋迦世尊降誕於毗藍園中一手指天一手指地周行七步目顧四方曰天上天下唯我獨尊已是漏逗不少末後拈華示眾曰吾有正法眼藏涅槃妙心分付摩訶迦葉露布重彰便恁麼休去猶較些子使再揚家醜以聾瞽後昆豈予之所願哉只如眾兄弟久參練達者舉著便知寧堪矢上加尖若是初參晚進不免曲垂方便還有問話者麼僧問金軀初降九龍吐水聖誕重逢未審有何祥瑞師曰金鳳銜花呈瑞彩錦鶯翻調奏新篁曰周行指顧示真機今日如何露消息師拈拄杖曰拄杖子上透三十三天築著帝釋鼻孔下透十八重地獄擊破閻羅王頂門俯應群機萬象森羅咸稽首宣揚般若大地山河側耳聽僧曰恁麼則昔時靈鷲今日天池師曰一道神光輝宇宙莫將今古較疎親便下座陸五臺問東土一千七百善知識即今總在甚麼處師指庭樹鳴蟬曰者裡也有一箇士曰聲響便是麼師曰喚作聲響即蹉過也士又指石問無情說法只如者箇作麼說得師曰居士喚者箇作甚麼士曰石頭師曰又道說不得師於嘉靖癸丑五月十九日示寂世壽七十二僧臘五十八有語錄二卷行世金臺覺禪師法嗣杭州府徑山萬松慧林禪師郡之仁和沈氏子從天自平野獲聞心要後遊金陵聞僧誦丹霞上堂語遂大徹時伏牛空幻寓廣德師往謁呈所見即蒙印可後住徑山一日辭眾書偈曰七十六年萍踪何倚本無去來應緣而已書畢而逝天目進禪師法嗣嘉興府東塔野翁曉禪師無趣空參每呈見解師皆不諾一日謂趣曰我有一言要與汝說趣聳耳而聽師但笑而不語趣再四懇請師復笑趣始具威儀作禮跽而哀懇師乃曰祖師西來直指人心見性成佛貴在直下體究子若果信得及可放下萬緣參箇一歸何處趣從此死心看話頭經三載一日聞雞鳴有省詣師求證師反覆徵詰有緒乃付以大法偈曰非法非非法非性非非性非心非非心付汝心法竟壽堂松禪師法嗣建寧府斗峰古音淨琴禪師本郡建陽蔡氏子幼卓犖不羈每嘆世間有求皆苦年二十五從東峰祝髮初見大闡無所啟發次謁性空關主得遇宿衲靜晃鄰席一日見晃閱古梅語錄中有僧上方丈曰某有箇入處梅便打出僧又進方丈梅復打出晃笑曰者僧實有悟處只是大法未明耳師聆晃語便起身設禮求示入道旨要晃曰佛性雖人人本有若不以智慧攻化只名凡夫今欲成辦此事直須盡掃葛藤枝蔓只將一句無義味話頭自疑自問自逼自拶不肯求人說破不肯依義穿鑿決要命根頓斷親證親悟如此晝三夜三迫勒將去年深月久忽然心華發明如雲開見日古人公案一一洞了始知無禪可參無佛可做頭頭上了物物上通如人到家不問路也師蒙示誨即死心研究看萬法歸一一歸何處話復過滇南參壽堂抵雞鳴灘忽然大悟洎見壽堂鍼芥相投即承記莂歸隱斗峰正德壬申遷瑞巖示眾學道人當截斷諸緣屏息雜念單提本參話頭於行住坐臥苦樂逆順一切時中不得忘失凡靜中所見善惡影象皆繇不正思惟致見種種境界若是正因衲子做工夫當睡便睡一覺便醒起來抖摟精神摩娑兩眼齩定牙關揑緊拳頭專心正念切切思思疑來疑去到水窮山盡時節忽然疑團迸散頓見自己一段本地風光非從外得到者箇時節纔名入門亦名得地更要求明眼宗匠決擇不可便休一法不明直須辨明一理不通直須通透假使悟後不能通達化門古人謂之坐在百尺竿頭不能透徹一切智海懸崖撒手自肯承當絕後再甦欺君不得珍重
