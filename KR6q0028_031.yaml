body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第三十三世善果寶禪師法嗣常州府宜興龍池一心幻有正傳禪師溧陽李氏子年二十二投荊溪靜樂院樂菴芟染菴示以本分事師遂矢志曰若不見性明心決不將身倒睡一夕聞琉璃燈華熚𪹼聲有省舉似菴菴頷之未幾菴遷化師直造燕都謁笑巖於觀音菴巖問上座何來師曰南方巖曰來此擬需何事師曰但乞和尚印證心地工夫巖曰若果識得心地何須印證師曰雖然不得不舉似一過巖曰參堂去師珍重便出至晚入室方具述所以巖驀踢出隻履曰向者裡道一句看遂把話頭一時打斷懡㦬而出通夕不寐翌日巖出方丈見師猶立簷下驀喚上座師回顧巖翹一足作修羅障日月勢師豁然悟旨後禮辭巖乃書曹溪源流付之復贈一笠曰覆之毋露圭角師受囑徑往臺山縛茅祕魔巖居十有三載會太常唐鶴徵問道懇師南還住荊溪龍池六載復遊燕都寓普照後仍歸龍池上堂無上法王有大陀羅尼門名為圓覺驀竪拂子曰子已飛天外去呆郎猶向月邊尋上堂一切法不有一切法不無若能如是會水上按葫蘆佛誕上堂今晨四月八日是我釋迦如來示生降誕之時山僧忽然思量思量二千五百餘年已來不知有多少路見不平之輩務要別尋一箇人來與我釋迦老子比勝負較優劣殊不知我釋迦如來是何等一箇面孔汝諸人還知得我釋迦如來腳跟立地處麼還曾夢見我釋迦如來頂相麼良久曰舉手扳南斗翻身倚北辰出頭天外看誰是箇般人驀竪拂子曰雲門大師來也擲拂子便下座上堂老僧者裡不問久參晚進貴要正知正見知見若正了生死如反掌自不落他斷常有無二乘偏見更有甚麼商量若有僧問作麼生是正知正見但向他道老僧在你腳下良久喝一喝下座僧問如何是祖師西來意師曰屋北鹿獨宿曰不會師曰溪西雞齊啼問如何是奇特事師曰蝦蟆捕大蟲曰恁麼則不奇特也師曰猫兒捉老鼠僧禮拜師便喝曰老和尚為甚麼放某甲不過師厲聲曰老僧有事你且去有士人舉僧問雲門如何是諸佛出身處門曰東山水上行問意作麼生師曰無孔笛幾人解吹士曰弟子得否師曰得士曰如何是諸佛出身處師曰西河火裡坐士大夫從師遊師每舉門前冷落車馬稀老大嫁作商人婦二語罕有契者山居偈曰五峰雲頂古文殊盡日跏趺總笑余半點苦寒禁不得躊躇未了又躊躇師風度簡易神觀凝肅以法道為己任而機用妙密迥出常情於萬曆甲寅二月十二日示寂先一日有僧自臺山來師與劇談宿昔抵暮索浴衆察師意懇請遺訓師舉所著帽者三衆無語師撫膝奄然而逝世壽六十六僧臘四十四茶毗靈骨塔于本山之右江寧府靈谷曇芝禪師參笑巖問曰古人道打破鏡來相見未審打破鏡向甚麼處相見巖曰慚惶殺人師於言下釋然領旨遂忘却禮拜舞蹈而出服勤數載巖付偈曰微笑拈華第一機相傳八八未知非今將從上非非法分付英賢力荷歸太原府五臺瑞峰三際廣通禪師久侍笑巖室中機契付以偈曰一念不生諸數滅萬機休罷十方空界空數滅漚澄海諸佛衆生影現中後居臺山壽昌經謁問臨濟大師道佛法無多子畢竟是何意旨師曰向道無多子又覓甚意旨曰玄沙道敢保老兄未徹在未審甚處是靈雲未徹處師曰却是玄沙未徹曰趙州道臺山婆子我為汝勘破了也且道婆子甚處是趙州看破處師曰却是婆子看破趙州昌索頌師曰知是般事便休老僧不解恁麼嘉興府天寧幻也佛慧禪師會稽史氏子母夢僧託宿而娠年十四禮天台松谷受業一日晨課至白毫宛轉五須彌處忽有悟舉呈谷谷奮挺逐之於是遍參諸方機契笑巖遂為笑巖室中子出住燕山天寧優曇苑晚南還寓天寧上堂簫吹鳳至琴奏鶴來展龍降杖携虎伏因緣會遇針芥相投正恁麼時莫有道得底麼良久曰鐘聲徹曉雞唱黃昏若欲了知也不消得唵穆栗臨娑訶示衆西來大意乾屎橛多少人咬嚼不徹當時我悔來遲好與推他一跌管教他喫得進屙不出免使兒孫費脣舌咦日出千山曉春回大地華柳煙門外緑遊子未歸家喝示衆生一乾坤死一乾坤聖一法界凡一法界何曾謾得諸人若也謾得那討甚麼是非好惡賢善財能灼然些子謾不得缺不得你道是甚麼境界會麼滿目塵埃千聖眼一身落魄五宗心僧參師曰甚處神祗何方靈聖曰金粟師曰在彼作甚麼曰司園師曰蔬菜割時還呌痛麼僧作負痛聲師曰老僧刀也未下呌喚作麼曰今日親見和尚師曰盲人摸象師生平丈室翛然不廢萬行凡利物邊事靡不樂為然皆出自以緣未嘗干謁天啓丙寅月將示寂撿曆示侍僧曰過二日可侍僧驚問師曰吾將有所適侍僧涕泣固留師笑諾曰更留三日亦可至期浴出更衣跏趺榻上適報製龕工埈遂趨寂壽九十一臘七十八徑山冲禪師法嗣嘉興府興善南明慧廣禪師海寧韓氏子出家本寺參無字話有疑請益車溪後入雙徑於地拾片紙有觀方知彼去去者不至方之句有省往呈溪溪可之住後示衆箇般奇特事難言驀直臯亭跳上天帝釋鼻梁遭磕破波斯痛倒海門前雙徑示衆前年年鼻孔無半邊去年年兩眼不能全今年年三十精骨獻青天我禪已說了汝等作麼生參聞谷問了即業障本來空為甚麼師子尊者被罽賓國王斬却師曰本來空曰爭奈頭何師曰本來空曰為甚國王一臂墮地師曰本來空泰昌改元仲冬草七囑後事畢奄然而逝骨瘞徑山普同塔大鑑下第三十四世龍池傳禪師法嗣寧波府天童密雲圓悟禪師常州宜興蔣氏子父曦母潘兒時喜兀坐若有所憶持者長讀壇經知有宗門事一日過山灣突見堆柴有省年三十乃投龍池祝髮時中看得心境兩立請益於池池曰你若到者田地便乃放身倒臥師昏惑池無他示日惟罵詈師益慙坐臥不寧一日自外歸過銅棺山頂忽覺情與無情煥然頓現覓纖毫過患不可得時池居燕都普照師往覲池曰汝離三載還有新會處麼師曰有池曰何不呈似老僧師曰一人有慶萬民樂業池曰汝又作麼生師曰圓悟特來省覲和尚池曰念子遠來放子三十棒師珍重便出又嘗侍立次池曰忽有人問汝如何抵對師向前竪起拳池亦舉拳曰老僧不曉得者箇是甚麼師曰莫道和尚直是三世諸佛也不曉得南還事遍參會池再主龍池師歸侍池上堂舉拂子問諸方還有者箇麼師出震聲一喝池曰好喝師連喝兩喝歸位立池曰更喝一喝看師便出法堂次日池召入室曰老僧昨夜起來走一轉把柄都在手裡了汝等為我扶持佛法師曰若據圓悟扶持佛法任他都來總與三十棒莫道分明為賞罰池於是以衣拂付之萬曆丁巳師出繼席龍池天啓壬戌遷天台通玄甲子遷金粟崇禎庚午赴閩黃檗辛未領育王四月升天童上堂開方便門示真實相拈拄杖擊香几曰方便門開也竪拄杖曰真實相示也諸人還委悉麼若也見得徹去便可以拈拄杖作丈六金身用將丈六金身作拄杖子用然後拄杖子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾汝諸人切莫向古廟裡去躲一棒打折你驢腰莫言不道上堂六月日頭真箇熱赤肉團邊如火逼試問現前諸兄弟無位真人徹未徹若也徹向無陰陽地上竪去橫來若也未徹未免明日熱如今日熱上堂一葉落天下秋一塵起大地收今朝七月六日無論一葉落不落而天下秋衆兄弟已備知矣舉拂子曰一塵起也作麼生是大地收的道理擲拂曰若知撲落非他物始信縱橫不是塵上堂竪拄杖曰舉一不得舉二放過一著落在第二擲下杖曰老僧落二去也且一又如何舉便下座解制上堂八月一結制畢腰間包頭上笠通玄寺裡放開門行腳衲僧攙先出為人拶著要翻身切莫被他穿却鼻復舉洞山曰秋初夏末兄弟東去西去亂走作麼直須向萬里無寸草處去坐斷路頭石霜曰出門便是草奴見婢殷勤太陽曰直饒不出門亦是草漫漫地同坑無異土者隊老古錐總被山僧折倒了也諸人還知出身處也無若也知得日消萬兩金不為分外其或未然萬古碧潭空界月再三撈摝始應知喝一喝上堂到座前作病勢曰老僧氣喘不能說法遂咳嗽吐痰於地曰衆兄弟試道道看良久衆默然師乃以腳抹却歸方丈上堂今朝五月五日知事頭首要老僧升座應箇時節老僧再三思量無可計較何也雄黃燒酒固是不宜要且無錢買糯穀思量到計窮力極忽然得箇富不有餘貧無不足的平等法門正可與世移風易俗遂擎起兩拳曰只將者兩箇大糭子供養大衆一任橫咬竪咬忽然咬著自家底管取人人飽足免得窮廝煎餓廝炒為甚如此到底輸却自家寶上堂諸人盡道解制殊不知天童之制結解不結解總不必論祇如老僧終日趕著諸人不般磚便擔瓦不運土便擡石見你們稍遲縮不是喊便是罵汝諸人作麼生會還知老漢為人處麼良久曰三生六十劫普請上堂據衆兄弟擔了飯米來伴悟上座各各要明己躬下事固不合輕易動靜然而諺有之曰有例不可滅無例不可興百丈創叢林立規矩有普請例諸方尊宿亦有普請說所謂作則均其勞饑則同其食以今觀之似乎不然作者應當作閒者應當閒致令古風凋喪法門淡薄無他蓋主法者阿容之過也要且者般事無處得藏竄所以謂之大道謂之公案擔荷者般事須是者般漢若是畏刀避箭躲懶偷安不足為伴雖然却有箇驗處且道以何為驗良久曰打鼓普請看問如何是奪人不奪境師曰百萬軍中斬顏良曰如何是奪境不奪人師曰取了荊州放魯肅曰如何是人境兩俱奪師曰殺却陳友諒并吞數十州曰如何是人境俱不奪師曰當今天下太平國王萬歲曰料揀已蒙師指示全提向上事若何師以拄杖擉曰速退速退問如何是五眼圓明師曰老僧者裡祇有兩隻問學人到此一月不見堂頭時如何師曰者老漢甚處去也僧擬議師便打問如何是三寶師曰一頓胡餅兩頓粥曰不問者三寶師曰老僧日日奉持問狹路相逢髑髏粉碎正恁麼時無位真人在甚麼處安身立命師曰天上天下唯我獨尊曰恁麼則萬里無雲一輪迥照去也師曰腳跟下好與三十棒問如何是暗中明師曰東村王老夜摩肩曰如何是明中暗師曰南海波斯晝洗面曰明暗相去幾何師曰分身兩處看問大悟底人還有憎愛也無師曰能愛人能惡人曰此是儒家世間之說豈大悟出世之事師曰汝是甚麼人僧擬議師喝出師凡六坐道場二十五年宗風大振其接人無論初機積學唯以本分鉗錘不少假借故席下多英傑者其一去一就纖毫不苟崇禎辛巳國戚康宇田公為皇貴妃賫紫衣入山請師升座說法復命俞旨住持金陵報恩師以衰老遜謝壬午春拽杖歸通玄七月三日示微疾五日作書辭護法六日有僧自都中來問喝作喝會棒作棒會入地獄如箭射畢竟作麼生會師便打僧禮拜師曰千句萬句皆從自了自己不了喫棒不了七日晨興巡閲匠工如平日及午歸丈室登榻跏趺未竟泊然而逝世壽七十七僧臘四十八塔全身於天童之南幻智菴右隴常州府磬山天隱圓修禪師本郡宜興閔氏子依龍池剃染參父母未生前話一日讀楞嚴至佛叱阿難此非汝心處默有所省但於乾峰一路涅槃門話有疑後聞驢鳴豁然大悟於是遍謁妙峰幻也諸老既而復歸龍池一日入室問歷歷孤明時如何池曰待你到者田地與你道師便喝池曰汝還起緣心麼師拂袖便出久之受印可洎池遷化師於萬曆庚申縛茅磬山不數載漸成精藍次遷法濟後住苕之報恩上堂一塵不立猶在半途截斷衆流尚居門外且到家一句作麼生顧視左右曰數聲清磬是非外一箇閒人天地間上堂禪非解會道絶功勳妙體湛然真機獨露不可以心思不可以意想不可以言宣不可以默照不可以色見不可以聲求說甚麼覩明星方可悟道聞擊竹遂乃明宗似者般漢到衲僧門下棒折猶未放在且道衲僧有甚長處卓拄杖曰丈夫自有衝天志不向如來行處行上堂資生貴圖求富參禪貴圖求悟求悟若似資生箇箇成佛作祖大小高峰末後兩句曰咄甜瓜徹蒂甜苦瓠連根苦恰似首尾不相照應報恩則不然資生何必求富參禪何待求悟者裡直下承當人人超佛越祖喝一喝卓拄杖曰炎天汗流脊解衣林下凉小參舉南院一棒話畢乃曰風穴當時悟則不無爭奈落在第二頭山僧若作南院待他道和尚此間一棒作麼商量劈脊便打管教渠七通八達雖然今時有等莾鹵漢便作一棒會埋沒先聖瞎人眼目不少諸人又作麼生會喝一喝曰劍為不平離寶匣藥因救病出金瓶示衆山僧住箇破院子多病不能為汝等提持佛法賴土木瓦石為諸人轉大法輪發大機用諸人切不得當面蹉過若蹉過只知事逐眼前過不覺老從頭上來示衆舉雲門到灌溪有僧舉溪語曰十方無壁落四面亦無門淨裸裸赤灑灑沒可把問門作麼生虧你記者一絡索門曰舉即易出也大難驀頭一點僧曰上座不肯和尚與麼道那逐句尋言門曰你適來與麼舉那還著於本人僧曰是好不識羞門曰你驢年夢見灌溪復與一拶僧曰某甲話在猶自不知門曰我問你十方無壁落四面亦無門你道大梵天與帝釋商量甚麼事慣得其便僧曰豈干他事隨語生解門喝曰逐隊喫飯漢果然果然者僧不惟孤負灌溪亦且蹉過雲門若是伶俐衲僧達其端倪不妨一生參學事畢今日衆中還有救得者僧底麼山僧為汝證據良久曰更聆一頌當場體用得全機著著分明何更疑只為從前皆學解到頭難作克家兒一日驀地入堂一喝衆駭然無語師四顧而出次晚乃召衆曰山僧昨晚為汝等立在萬仞巖頭命如懸絲今晚為汝等用老婆禪亦命如懸絲復喝一喝曰且道今日者一喝與昨日一喝是同是別會得者出衆道看一僧出才禮拜師拈棒劈脊便打僧起師曰速道速道僧擬議師復打僧退師卓拄杖曰瞎漢乃曰臨濟道我有時一喝如金剛王寶劍有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用遽喝一喝曰且道者一喝是金剛王寶劍耶是踞地獅子耶是探竿影草耶是一喝不作一喝用耶者裡會得方作得我臨濟兒孫若會不得切忌亂統以拄杖旋風打散問如何是理藏鋒師曰虗空撲落地曰如何是事藏鋒師曰湖州蘿蔔宣州薑曰如何是理事藏鋒師曰有水皆含月無花不帶春曰如何是俱不涉理事藏鋒師曰無手人行拳問既是師子兒為甚麼被文殊騎却師曰理能伏豹問山嶽傾頽為甚煙霞不散師曰捨大戀小曰獨臨玉鏡為甚眉目不覩師曰打破鏡來相見問如何是正法眼師曰腦後看曰與麼則飲光生面重開煥殘榴飛處笑顏新師曰過那一邊曰只如大悲千眼阿那箇是正眼師拈起拄杖曰還見麼曰傑侍者喚作破沙盆還有報恩分也無師曰無曰恁麼則瞎驢滅却風猶振臨濟綱宗千古威師曰賴遇闍黎師於崇禎乙亥九月草三示寂塔全身於報恩順治戊戌遷葬荊溪海會之左壽六十一臘三十七紹興府雲門雪嶠圓信禪師鄞縣朱氏子年九歲聞僧誦水鳥樹林皆悉念佛念法念僧語遂知信向佛乘二十九棄家訪秦望禎山主禎舉他心問僧何處來僧曰天竺心曰我聞有三天竺你從那一竺來速道速道其僧茫然無對師聞舉疑情頓發次日拽杖登石高聲提曰從那一竺來速道速道忽然前後際斷如空中迸出日輪相似乃說偈曰石貼背脊骨翻身脅肋骨仔細看將來動也動不得復喝曰張三殺人李四償命次往天台擡頭見古雲門三字豁然大悟述偈曰一上天台雲更深腳跟踏斷草鞋繩比丘五百無蹤影若見他時打斷筋遂返縛茅雙髻峰一日謁雲棲呈偈曰不解西方不學禪偶來塵世只隨緣三間茅屋傍溪住兩扇竹窗關月眠碎盡衲衣那有結養長頭髮欲成顛自從會得西來意白雪飄飄六月天後參龍池室中機契萬曆乙卯住靜徑山千指菴崇禎戊寅開法廬山開先癸未結制嘉興東塔晚住雲門僧問如何是雙髻家風師曰一堆土竈幾箇峰頭曰大師法嗣何人師曰遠山終日看雲裡鐵牛嘶曰如何是祖師西來意師曰破二作三曰意旨如何師曰常言俗語問月生雲際時如何師曰甚麼時節曰樹凋葉落時如何師曰鳥不宿問四大分散時向甚麼處去師曰棺材裡曰意旨如何師曰深埋黃土僧禮拜師便喝出上堂四十年來恁麼行斬開碧落血腥腥其中果有希奇事獅子遊行不問程稽首燈王如來普願微塵國土衆生同入般若波羅蜜門大衆且道般若波羅蜜門作麼生入舉拂子曰鑒升座見身無實是佛身了心如幻是佛幻了得身心本性空斯人與佛何殊別信上座則不然鮎魚水底聚子貼天飛會得箇中意成佛更無疑崇禎乙亥開府余大成司理黃端伯等訪師請於徑山大殿上堂咄咄咄徑山乃唐宋已來之徑山擊拂子曰八十一人在此經過非今日之徑山非一日之徑山也千年常住一朝僧今日祖令當行十方坐斷且道還有祥瑞也無鐘樓生耳朵佛殿又懷胎黃公問如何是鐘樓生耳朵師拈起香曰會取者箇曰如何是佛殿又懷胎師曰産下也黃禮拜曰須是和尚始得師乃曰今承衆護法命山僧登於此座理荒殘之祖席扶陳爛之頽綱者箇喚作狗尾續貂那管家家門前火把子釣魚船上謝三郎即不問媳婦騎驢阿家牽道將一句來還有人道得麼良久曰一拂擊開金殿月萬家無箇不光明即日赴齊於寒翠樓齊畢師謂衆曰山僧今年六十六復輪指曰丙丁戊己庚良久曰怪道把人牽來拽去元來水牯牛入命宮拖泥帶水東觸西觸雖然且喜水足草足一日示微疾書訣衆偈曰小兒曹生死路上須逍遙皎月氷霜曉喫杯茶坐脫去了書畢擲筆而逝當順治丁亥八月二十六日也世壽七十八臘四十八全身塔於雲門右麓湖州府淨名抱朴大蓮禪師臨安駱氏子年十五投青山妙嚴祝髮二十二受具雲棲久遊講席一日自念教相旨趣雖有理會處生死岸頭全用不著遂入徑山坐禪三七日中廓然洞徹述偈曰自幼失親娘遍覓於他鄉驀然一相見更不再思量解制往參龍池問自遠趨風乞師指示池曰老僧牙齒疏缺師曰親切處更乞一言池據座師喚侍者點茶來池曰上座不妨伶俐師曰某甲耳聾池休去一日辭去池曰老僧猶有語言未盡在師曰和尚言雖未盡其意某甲巳知池曰且道老僧意作麼生師便喝池曰再喝喝看師轉身便出池以源流拂子付之住後僧問佛是何義師曰覺義曰佛還迷否師曰迷曰既覺云何復迷師曰不迷又問作麼曰也須問過師拈棒打出問如何是奪人不奪境師曰蛺蝶穿華影曰如何是奪境不奪人師曰掀眉掃白雲曰如何是人境兩俱奪師曰彼此無消息曰如何是人境俱不奪師曰推窗看月明熊魚山問萬法歸一一歸何處師舉茶杯曰請茶曰我在青州作一領布衫重七斤意作麼生師曰脫殼烏龜飛上天問如何是麻三斤師曰斤兩分明日用相應頌曰並行黑白却同年芳草茸茸到處眠一旦秋空雲翳盡夜深何處是家園師於崇禎己巳八月二十四日示寂塔於興善廣禪師法嗣建寧府普明鴛湖妙用禪師海寧鄭氏子年十二出家禾之興善從南明廣受業秉具雲棲偶一日閲思益梵天經有省述偈呈廣廣呵之執侍數載終覺礙膺後閲五祖演下載清風話始得釋然一日廣舉香嚴偈問師師擬答廣便喝師將啓口廣又喝師頓領玄旨廣付以偈曰無傳無受法無傳無受心付與無手者掣斷虗空筋崇禎己卯入閩重建普明辛巳冬始開法示衆若論佛法山僧無下口處今日新山門拏我拄杖子浪蕩遊戲穿過果子嶺直到火燒橋失腳一跌落在深溪幸有舊佛殿肻來相救不惟相救且騎却項歸來新山門呌屈要山僧判斷新山門舊佛殿各與三十拄杖理不曲斷還有證據者麼良久擲下拄杖曰一任旁人道長短大家歸去暖房中斷拂老人住靈峰師晉謁衆請升座舉拂子曰會麼即心即佛猶是誵訛非心非佛可無趨向不是心不是佛不是物穿花蝴蝶深深見取不得捨不得不可得中只麼得點水蜻蜓欵欵飛大衆還知普明恁地舉踏抓著靈峰癢處麼是他能濶步大方踏倒諸聖頂𩕳峭巍巍孤迥迥有時把住有時放行有時放行中把住有時把住中放行栴檀林裡純是栴檀獅子窟中無非獅子衆中忽有箇伶俐漢出來道靈峰底蘊無端為普明露布山僧但向道祇因曾與同牀睡是故深知被底穿卓拄杖下座同雲門信玩新月次門指問那半箇在那裡去了師良久曰會麼門曰也只得半箇師却問那半箇在那裡去了門亦良久師曰也只得半箇門乃呵呵大笑介菴進再參才跨門師曰是甚麼進擬答師震威一喝進掩耳便出師可之一日示疾告衆曰大凡禪衆上者參禪學道中者乘戒俱急次者肯心辦道其餘碌碌不足齒也病朽亦從此過來今風火將散乃得覷破一機不被昔緣纏縛你且道是那一機清風鴈落聲聲羽秋雨梧桐脈脈山復索筆著偈曰生也錯死也錯鐵牛掣斷黃金索擲筆曰咄遂泊然而逝當崇禎壬午十月十一辰時也壽五十六臘四十四門人介菴進一初元奉靈骨建塔於禾之興善
