body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第十七世徑山杲禪師法嗣泉州府教忠晦菴彌光禪師閩之李氏子兒時寡言笑聞梵唄則喜十五依幽巖慧圓頂猶喜閲羣書一日棄之出嶺謁圓悟於雲居次參黃檗祥高菴悟皆有契以淮楚盜起歸謁佛心會大慧寓廣因往從之慧曰汝在佛心處所得者試舉一二看師舉佛心上堂拈普化公案曰佛心即不然總不恁麼來時如何劈脊便打從教遍界分身慧曰汝意如何師曰某不肯他後頭下箇注腳慧曰此正是以病為法師毅然無信可意慧曰汝但揣摩看師竟以為不然經旬因記海印信拈曰雷聲浩大雨點全無始無滯趨告慧慧以舉道者見琅琊并玄沙未徹語詰之師對已慧笑曰雖進得一步祇是不著所在如人斫樹根下一刀則命根斷矣汝向枝上斫其能斷命根乎今諸方浩浩說禪者多皆如此何益於事其楊岐正傳三四人而已師慍而去翌日慧問汝還疑否師曰無可疑者慧曰祇如古人相見未開口時已知虗實或聞其語便識淺深此理如何師悚然汗下莫知所詣慧令究有句無句話一日慧過雲門菴師侍行問曰某到者裡不能得徹病在甚處慧曰汝病最癖世醫拱手何也別人死了活不得汝今活了未肯死要到大安樂田地須是大死一回始得師疑情愈深後入室慧問喫粥了也洗盂了也去却藥忌道將一句來師曰裂破慧震威喝曰你又說禪也師即大悟慧撾鼓告衆曰龜毛拈得笑咍咍一擊萬重關鎖開慶快平生在今日孰云千里賺吾來師亦以頌呈之曰一拶當機怒雷吼驚起須彌藏北斗洪波浩渺浪滔天拈得鼻孔失却口住後上堂有句無句如藤倚樹放憨作麼及乎樹倒藤枯句歸何處情知汝等諸人卒討頭鼻不著為甚如此祇為分明極翻令所得遲上堂夢幻空華何勞把捉得失是非一時放却擲拂子曰山僧今日已是放下了也汝等諸人又作麼生復曰侍者收取拂子僧問文殊為甚麼出女子定不得師曰山僧今日困曰罔明為甚麼却出得師曰令人疑著曰恁麼則擘開華嶽千峰秀放出黃河一派清師曰一任卜度九江府東林卍菴道顏禪師潼川鮮于氏子久參圓悟微有省洎悟還蜀囑依妙喜仍以書致喜曰顏川彩繪已畢但缺點眼耳他日嗣其後未可量也喜居雲門及洋嶼師皆侍焉朝夕質疑方大悟住後上堂一葉落天下秋一塵起大地收鳥窠吹布毛便有人悟去今時學者為甚麼却不識自己良久曰莫錯怪人好上堂欲識諸佛心但向衆生心行中識取欲識常住不凋性但向萬物遷變處會取還識得麼欲得不招無間業莫謗如來正法輪上堂諸人知處良遂總知良遂知處諸人不知作麼生是良遂知處乃曰鸕語鶴上堂仲冬嚴寒三界無安富者快樂貧者饑寒不識玄旨錯認定盤何也牛頭安尾上北斗面南看上堂一滴滴水一滴滴凍天寒人寒風動幡動雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾不出諸人十二時中尋嘗受用上堂圓通門戶八字打開若是從門入得不堪共語須是入得無門之門方可坐登堂奧所以道過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法從上諸聖幸有如此廣大門風奈之何不能繼紹甘自鄙棄穿窬牆壁好不丈夫敢問大衆無門之門作麼生入良久曰非唯觀世音我亦從中證上堂元宵已過化主出門六羣比丘各從其類此衆無復枝葉純有真實如是增上慢人退亦佳矣麒麟不為瑞鸑鷟不為榮麥秀兩岐禾登九穗總不消得但願官中無事林下棲禪水牯牛飽臥斜陽擔板漢清貧長樂粥足飯足俯仰隨時筯籠不亂攙匙老鼠不咬甑山家活計淡薄長情不敬功德天誰嫌黑暗女有智主人二俱不受良久曰君子愛財取之以道上堂去年寒食後今年寒食前日日是好日不是正中偏上堂客舍久留連家鄉夕照邊簷懸三月雨水沒兩湖蓮鑊漏燒燈盞柴生滿竈煙已忘南北念入望盡平川上堂栴檀林無雜樹鬱密深沉師子住所以栴檀叢林栴檀圍繞荊棘叢林荊棘圍繞一人為主兩人為伴成就萬億國土士農工商若夜叉若羅剎見行魔業優哉游哉聊以卒歲僧問香嚴上樹話意旨如何師曰描不成畫不就曰李陵雖好手爭奈陷番何師曰甚麼處去來問如何是佛師曰汝是元固僧近前曰喏喏師曰裩無襠袴無口問如何是佛師曰志公和尚曰學人問佛何故答志公和尚師曰志公不是閒和尚曰如何是法師曰黃絹幼婦外孫臼曰是甚麼章句師曰絶妙好辭曰如何是僧師曰釣魚船上謝三郎曰何不直說師曰玄沙和尚曰三寶已蒙師指示向上宗乘事若何師曰王喬詐仙得仙僧呵呵大笑師乃叩齒福州府西禪懶菴鼎需禪師本郡林氏子幼舉進士有聲年二十五因讀遺教經忽曰幾為儒冠誤欲去家母難之以親迎在期師乃絶之曰夭桃紅杏一時分付春風翠竹黃花此去永為道伴竟依保壽樂為比丘一錫湖湘遍參名宿歸里結菴於羌峰絶頂不下山者三年佛心才挽出首衆於大乘嘗問學者即心即佛因緣時妙喜菴洋嶼師之友彌光與師書曰菴主手段與諸方別可來少欵如何師不答光以計邀師飯師往赴之會妙喜入室舉僧問馬祖如何是佛祖云即心是佛作麼生師下語妙喜詬之曰你見解如此敢妄為人師耶鳴鼓普說訐其平生珍重得力處排為邪解師淚交頤不敢仰視默計曰我之所得既為所排西來不傳之旨豈止此耶遂執弟子禮一日喜問內不放出外不放入正恁麼時如何師擬開口喜拈竹篦劈脊連打三下師於此大悟厲聲曰和尚已多了也喜又打一下師禮拜喜笑曰今日方知吾不汝欺也遂印以偈曰頂門竪亞摩醯眼肘後斜懸奪命符瞎却眼卸却符趙州東壁挂葫蘆於是聲動叢林住後上堂句中意意中句須彌聳于巨川句剗意意剗句烈士發乎狂矢任待如牙劍樹口似血盆徒逞詞鋒虗張意氣所以淨名杜口早涉繁詞摩竭掩關已揚家醜自餘瓦棺老漢巖頭大師向羌峰頂上拏風鼓浪玩弄神變腳跟下好與三十且道過在甚麼處良久曰機關不是韓光作莫把胸襟當等閒至節上堂二十五日已前羣陰消伏泥龍閉戶二十五日已後一陽來復鐵樹開花正當二十五日塵中醉客騎驢騎馬前街後街遞相慶賀物外閒人衲帔蒙頭圍爐打坐風蕭蕭雨蕭蕭冷湫湫誰管你張先生李道士胡達磨上堂懶翁懶中懶最懶懶說禪亦不重自己亦不重先賢又誰管你地又誰管你天物外翛然無箇事日上三竿猶打眠上堂舉僧問趙州如何是古人言州曰諦聽諦聽師曰諦聽即不無切忌喚鐘作甕室中問僧萬法歸一一歸何處曰新羅國裡師曰我在青州作一領布衫重七斤聻曰今日親見趙州師曰前頭見後頭見僧乃作斫額勢師曰上座甚處人曰江西師曰因甚麼却來者裡衲敗缺僧擬議師便打出福州府東禪蒙菴思嶽禪師江州人上堂牆壁瓦礫說一切法蛾羊蟻子現無邊身見處既精明聞中必透脫所以雪峰凡見僧來輥出三箇木毬如弄雜劇相似玄沙便作斫牌勢卑末謾道將來普賢今日謗古人千佛出世不通懺悔者裡有人謗普賢定入舌犂耕地獄且道不謗者是誰良久曰心不負人面無慚色上堂達磨來時此土皆知梵語及乎去後西天悉會唐言若論直指人心見性成佛大似羚羊挂角獵犬尋蹤一意乖疏萬言無用可謂來時他笑我不知去後我笑他唐言梵語親分付自古齊僧怕夜茶上堂臘月初歲云徂黃河凍已合深處有嘉魚活鱍鱍跳不脫又不能相煦以溼相濡以沫慚愧菩薩摩訶薩春風幾時來解此黃河凍令魚化作龍直透桃花浪會即便會癡人面前且莫說夢上堂僧問如何是初日分以恆河沙等身布施師曰從苗辨地因語識人曰如何是中日分復以恆河沙等身布施師曰築著磕著曰如何是後日分亦以恆河沙等身布施師曰向下文長付在來日復曰一轉語如天普蓋似地普擎一轉語舌頭不出口一轉語且喜沒交涉要會麼慚愧世尊面赤不如語直大小嶽上座口似磉盤今日為者問話僧講經不覺和注腳一時說破便下座上堂啞却我口直須要道塞却你耳切忌蹉過昨日有人從天台來却道泗洲大聖在洪州打坐十字街頭賣行貨是甚麼斷跟草鞋尖簷席帽福州府西禪此菴守淨禪師開堂拈香罷就座白椎曰法筵龍象衆當觀第一義師隨聲便喝曰此是第幾義久參先德已辨來端後學有疑不妨請問僧問阿難問迦葉世尊傳金襴外別傳何物迦葉喚阿難阿難應諾未審此意如何師曰切忌動著曰祇如迦葉道倒却門前剎竿著又作麼生師曰石牛橫古路曰祇如和尚於佛日處還有者箇消息也無師曰無者箇消息曰爭奈定光金地遙招手智者江陵暗點頭師曰莫將庭際柏輕比路傍蒿僧禮拜師乃曰定光金地遙招手智者江陵暗點頭已是白雲千萬里那堪於此未知休設或於此便休去一場狼籍不少還有檢點得出者麼如無山僧今日失利上堂談玄說妙撒屎撒尿行棒行喝將鹽止渴立主立賓華擘宗乘設或總不恁麼又是鬼窟裡坐到者裡山僧已是打退鼓且道諸人尋常心憤憤口悱悱合作麼生莫將閒學解埋沒祖師心上堂若也單明自己不悟目前此人有眼無足若也祇悟目前不明自己此人有足無眼直得眼足相資如車二輪如鳥二翼到西禪者裡正好勘過了打上堂九夏炎炎大熱木人汗流不輟夜來一雨便凉莫道山僧不說以拂子擊禪牀下座上堂若欲正提綱直須大地荒欲來衝雪刃未免露鋒鋩正當恁麼時釋迦老子出頭不得即不問你諸人祇如馬鐙裡藏身又作麼生話會上堂道是常道心是常心汝等諸人聞山僧恁麼道便道我會也大盡三十日小盡二十九頭上是天腳下是地耳裡聞聲鼻裡出氣忽若四大海水在汝頭上毒蛇穿你眼睛蝦蟆入你鼻孔又作麼生上堂文殊普賢談事理臨濟德山行棒喝東禪一覺到天明偏愛風從凉處發咄上堂善鬬者不顧其首善戰者必獲其功其功既獲坐致太平太平既致高枕無憂罷拈三尺劍休弄一張弓歸馬于華山之陽放牛於桃林之野風以順而雨以時漁父歌而樵人舞雖然堯舜之君猶有化在爭似乾坤收不得堯舜不知名渾家不管興亡事偏愛和雲占洞庭上堂閉却口時時說截却舌無間歇無間歇最奇絶最奇絶眼中屑既是奇絶為甚麼却成眼中屑了了了時無可了玄玄玄處亦須呵上堂佛祖頂𩕳上有潑天大路未透生死關如何敢進步不進步大千沒遮護一句絶言詮那吒擎鐵柱僧問佛佛授手祖祖相傳未審傳箇甚麼師曰速禮三拜問不施寸刃請師相見師曰逢強即弱曰何得埋兵掉鬬師曰祇為闍黎寸刃不施曰未審向上還有事也無師曰有曰如何是向上事師曰敗將不斬問古佛堂前甚麼人先到師曰無眼村翁曰未審如何趣向師曰楖𣗖橫擔建寧府開善道謙禪師本郡游氏子世業儒早失恃怙願出家以報親恩初之京師依圓悟無所省發後隨妙喜泉南及喜領徑山師亦侍行未幾令師往長沙通張紫巖書師自謂我參禪二十年無入頭處更作此行決定荒廢意欲無行友人宗元叱曰不可在路便參禪不得也去吾與汝俱往師不得已而行在路泣語元曰我一生參禪殊無得力處今又途路奔波如何得相應去元告之曰你但將諸方參得底悟得底圓悟妙喜為你說得底都不要理會途中可替底事我盡替你只有五件事替你不得你須自家支當師曰五件者何事元曰著衣喫飯屙屎放尿駝箇死尸路上行師於言下脫然不覺手舞足蹈元曰你此回方可通書宜前進吾先歸矣元即回徑山師半載方返妙喜一見便曰建州子你者回別也住後上堂竺土大仙心東西密相付如何是密付底心良久曰八月秋何處熱上堂壁立千仞三世諸佛措足無門是則是太殺不近人情放一線道十方剎海放光動地是則是爭奈和泥合水須知通一線道處壁立千仞壁立千仞處通一線道橫拈倒用正按傍提雷激雷奔崖頺石裂是則是猶落化門到者裡壁立千仞也沒交涉通一線道也沒交涉不近人情和泥合水總沒交涉只者沒交涉也則沒交涉是則是又無佛法道理若也出得者四路頭管取乾坤獨步且獨步一句作麼生道莫怪從前多意氣他家曾踏上頭關上堂去年也有箇六月十五今年也有箇六月十五去年六月十五少却今年六月十五今年六月十五多却去年六月十五多處不用減少處不用添既不用添又不用減則多處多用少處少用乃喝一喝曰是多是少良久曰箇中消息子能有幾人知上堂洞山麻三斤將去無星稱子上定過每一斤恰有一十六兩二百錢重更不少一犛正如趙州殿裡底一般祇不合被大愚鋸解稱鎚却教人理會不得如今若要理會得但問取雲門乾屎橛上堂有句無句如藤倚樹撞倒燈籠打破露柱佛殿奔忙僧堂回顧子細看來是甚家具咄祇堪打老鼠上堂諸人從僧堂裡恁麼上來少間從法堂頭恁麼下去竝不曾差了一步因甚麼却不會良久曰祇為分明極翻令所得遲寧波府育王佛照德光禪師臨江彭氏子志學之年依本郡東山光化吉落髮一日入室吉問不是心不是佛不是物是甚麼師罔措遂致疑通夕不𥧌次日詣方丈請益曰昨日蒙和尚垂問既不是心又不是佛不是物畢竟是甚麼望和尚慈悲指示吉震威一喝曰者沙彌更要我與你下注腳在拈棒劈脊打出師於是有省後謁月菴果應菴華百丈震終不自肯適大慧領育王師參焉慧問喚作竹篦則觸不喚作竹篦則背不得下語不得無語師擬對慧便棒師豁然大悟從前所得瓦解氷消初住台之鴻福次徙光孝僧問浩浩塵中如何辨主師曰中峰頂上塔心尖上堂臨濟三遭痛棒大愚言下知歸興化於大覺棒頭明得黃檗意旨若作棒會入地獄如箭射不作棒會入地獄如箭射衆中商量盡道赤心片片恩大難酬總是識情卜度未出陰界且如臨濟悟去是得黃檗力得大愚力若也見得許你頂門眼正肘後符靈其或未然鴻福更為諸人通箇消息丈夫氣宇衝牛斗一踏鴻門兩扇開上堂七手八腳三頭兩面耳聽不聞眼覷不見苦樂逆順打成一片且道是甚麼路逢死蛇莫打殺無底籃子盛將歸上堂聞聲悟道落二落三見色明心錯七錯八生機一路猶在半途且道透金剛圈吞栗棘蓬底是甚麼人披蓑側立千峰外引水澆蔬五老前淳熙丙申被旨住靈隱入對選德殿孝宗問眹心佛心是同是別對曰直下無第二人曰若是則佛即是心心即是佛耶對曰成一切性即心離一切相即佛又問釋迦佛入山修道六年而成所成者何事師曰將謂陛下忘却上悅賜佛照禪師號自是召見無時嘗留內觀堂五宿而出嘉泰癸亥三月十五作遺書集衆敘別大書云八十三年彌天罪過末後殷勤盡情說破泊然而逝僧臘六十塔全身於鄮峰東菴諡普慧宗覺大禪師塔曰圓鑑常州府華藏遁菴宗演禪師福州鄭氏子上堂拈起拄杖曰識得者箇一生參學事畢古人恁麼道華藏則不然識得者箇更須買草鞋行腳何也到江吳地盡隔岸越山多臘旦上堂一九與二九相逢不出手世間出出間無剩亦無少遂出手曰華藏不惜性命為諸人出手去也劈面三拳攔腮一掌靈利衲僧自知痛癢且轉身一句作麼生道巡堂喫茶去上堂南泉道我十八上便解作活計趙州道我十八上便解破家散宅南泉趙州也是徐六擔板祇見一邊華藏也無活計可作亦無家宅可破逢人突出粗拳要伊直下便到且道到後如何三十六峰觀不足却來平地倒騎驢寧波府天童無用淨全禪師諸暨翁氏子初謁妙喜于徑山山問有何能師曰能打坐山曰打坐何為師曰若問何為直是無下口處一日採椒師作頌曰含煙帶露已經秋顆顆通紅氣味周突出眼睛開口笑者回不戀舊枝頭自是乃祝髮受戒山舉靈雲見桃花悟道話師頌曰靈雲一見兩眉橫引得漁翁良計生白浪起時拋一釣任教魚鱉競頭爭住後上堂學佛止言真不立參禪多與道相違忘機忘境急回首無地無錐轉步歸佛不是心亦非覿體承當絶所依萬古碧潭空界月再三撈摝始應知上堂良久召衆曰還知麼復曰敗缺不少便下座上堂長沙道百尺竿頭坐底人雖然得入未為真百尺竿頭重進步十方世界現全身妙喜老人道要見長沙麼更進一步保寧則不然要見長沙麼更退一步畢竟如何換骨洗腸重整頓通身是眼更須參師到靈隱上堂靈山正派達者猶迷明來暗來誰當辨的雙收雙放孰辨端倪直饒千聖出來也祇結舌有分何故人歸大國方為貴水到瀟湘始見清復曰適來松源和尚舉竹篦話令天童納敗缺諸人要知麼聽取一頌黑漆竹篦握起迅雷不及掩耳德山臨濟茫然懵底如何插𭪿自贊曰匙挑不上箇村夫文墨胸中一點無曾把虗空揣出骨惡聲贏得滿江湖開禧丁卯示寂壽七十一﨟四十五塔于本山寺之西長沙府大溈山法寶禪師福州人上堂千般言萬種喻祇要教君早回去夜來一片黑雲生莫教錯却山前路咄上堂喚作竹篦則觸不喚作竹篦則背直須師子咬人莫學韓獹逐塊阿呵呵會不會金剛腳下鐵崑崙捉得明州憨布袋福州府玉泉曇懿禪師久依圓悟自謂不疑紹興初出住興化祥雲大慧入閩知其所見未諦致書令來師遲遲慧小參且痛斥仍榜告四衆師不得已破夏謁之慧鞫其所證乃曰汝恁麼見解敢嗣圓悟老人邪師退院親之一日入室慧問我要箇不會禪底做國師師曰我做得國師去也慧喝出居無何語之曰香嚴悟處不在擊竹邊俱胝得處不在指頭上師乃頓明出住玉泉為慧拈香後省慧於小溪慧升座舉雲門一日拈拄杖示衆曰凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空衲僧見拄杖子但喚作拄杖子行但行坐但坐總不得動著慧曰我不似雲門將虗空剜窟竉驀拈拄杖曰拄杖子不屬有不屬無不屬幻不屬空卓一下曰凡夫二乘緣覺菩薩盡向者裡各隨根性悉得受用唯於衲僧分上為害為冤要行不得行要坐不得坐進一步則被拄杖子迷却路頭退一步則被拄杖子穿却鼻孔即今莫有不甘底麼試出來與拄杖子相見如無來年更有新條在惱亂春風卒未休正恁麼時合作麼生下座煩玉泉為衆拈出師登座敘謝畢遂舉前話曰適來堂頭和尚恁麼批判大似困魚止濼病鳥棲蘆若是玉泉則又不然拈拄杖曰拄杖子能有能無能幻能空凡夫二乘緣覺菩薩卓一下曰向者裡百雜碎唯於衲僧分上如龍得水似虎靠山要行便行要坐便坐進一步則乾坤震動退一步則草偃風行且道不進不退一句作麼生道良久曰閒持經卷倚松立笑問客從何處來饒州府薦福悟本禪師江州人自江西雲門參侍妙喜最久所至受喜印可者多矣師私謂其棄己且欲發去妙喜曰汝但專意參究如有所得不侍開口吾自能識既而有聞師入室者故謂師曰本侍者參禪許多年逐日只道得箇不會師詬之曰者小鬼你未生時我已三度霍山廟裡退牙了好教你知由是益鋭志究狗子無佛性話一夕將三鼓倚殿柱昏寐間不覺無字出口吻忽爾頓悟後三日妙喜自外歸師見未及吐詞妙喜曰本鬍子者回方是徹頭也初住信州博山規模法道最為嚴整次移薦福上堂高揖釋迦不拜彌勒者好與三十拄杖何故為他祇會步步登高不會從空放下東家牽犂西家拽杷者好與三十拄杖何故為他祇會從空放下不會步步登高山僧恁麼道還有過也無衆中莫有點檢得出者麼若點檢得出須彌南畔把手共行若點檢不出布袋裡老鴉雖活如死上堂釋迦掩室淨名杜口須菩提唱無說以顯道釋梵絶視聽而雨華大衆者一隊不唧𠺕漢無端將祖父田園私地結契各據四至界分方圓長短一時花擘了也致令後代兒孫上無片瓦蓋頭下無卓錐之地博山當時若見十字路頭掘箇無底深坑喚來一時埋却免見遞相鈍置何謂如此不見道家肥生孝子國霸有謀臣上堂乾闥婆王曾奏樂山河大地皆作舞爭如跛腳老雲門解道臘月二十五博山今日有條攀條無條攀例也要應箇時節驀拈拄杖橫按膝上作撫琴勢曰還有聞絃賞音者麼良久曰直饒便作鳳凰鳴畢竟有誰知指法卓一下下座寧波府育王大圓遵璞禪師福州人幼同玉泉懿問道圓悟數載後還里佐懿於莆中祥雲紹興甲寅大慧居洋嶼師往訊之入室次慧問三聖興化出不出為人不為人話你道者兩箇老漢還有出身處也無師於慧膝上打一拳慧曰祇你者一拳為三聖出氣為興化出氣速道速道師擬議慧便打復謂曰你第一不得忘了者一棒後因慧室中謂僧曰德山見僧入門便棒臨濟見僧入門便喝雪峰見僧入門便道是甚麼睦州見僧便道現成公案放你三十棒你道者四箇老漢還有為人處也無僧曰有慧曰劄僧擬議慧便喝師聞遽大悟慧欣然許之溫州府鴈山能仁枯木祖元禪師閩林氏子初謁雪峰預次依佛心才皆不甚契及依大慧於雲門菴夜坐睹僧剔燈始徹證有偈曰剔起燈來是火歷劫無明照破歸堂撞見聖僧幾乎當面蹉過不蹉過是甚麼十五年前奇特依前祇是者箇慧以偈贈之曰萬仞崖頭解放身起來依舊却惺惺饑餐渴飲渾無事那論昔人非昔人初居連江福嚴菴食指甚衆日不暇給揭偈於伽藍祠曰小菴小舍小叢林土地何須八九人若解輪流來打供免教碎作一堆塵是夕神致夢山前檀越願如所戒紹興己巳春出住能仁上堂有佛處不得住踏著稱鎚硬似鐵無佛處急走過腳下草深三尺三千里外逢人不得錯舉北斗挂須彌恁麼則不去也棒頭挑日月摘楊華摘楊花眼裡瞳人著繡鞋卓拄杖下座上堂鴈山枯木實頭禪不在尖新語句邊背手忽然摸得著長鯨吞月浪滔天揚州府儀真靈巖東菴了性禪師上堂勘破了也放過一著是衲僧破草鞋現修羅相作女人拜是野狐精魅打箇圜相虗空裡下一點是小兒伎倆攔腮贈掌拂袖便行正是業識茫茫無本可據直饒向黑豆未生芽已前一時坐斷未有喫雲巖拄杖分在敢問大衆且道為人節文在甚麼處還相委悉麼自從春色來嵩少三十六峰青至今上堂一葦江頭楊柳春波心不見昔時人雪庭要識安心士鼻孔依前搭上脣竪起拂子曰祖師來也還見麼若也見得即今薦取其或未然此去西天路迢迢十萬餘僧問人天交接如何開示師曰金剛手裡八稜棒曰忽被學人橫穿凡聖擊透玄關時又作麼生師曰海門橫鐵柱問如何是獨露身師曰牡丹華下睡貓兒江寧府蔣山一菴善直禪師德安雲夢人初參妙喜喜問甚處人師曰安州喜曰我聞你安州人會廝撲是否師便作相撲勢喜曰湖南人喫魚因甚湖北人著鯁師打筋斗而出喜曰誰知冷灰裡有粒豆𪹼後出住保寧上堂諸佛不曾出世人人鼻孔遼天祖師不曾西來箇箇壁立千仞高揖釋迦不拜彌勒理合如斯坐斷千聖路頭獨步大千沙界不為分外若向諸佛出世處會得祖師西來處承當自究不了一生受屈莫有大丈夫承當大丈夫事者麼出來與保寧爭交其或未然不如拽破好便下座一日留守陳丞相俊卿會諸山茶話舉有句無句如藤倚樹公案令諸山批判諸山皆以奇語取奉師最後曰張打油李打油不打揮身只打頭陳大喜延平府萬壽自護禪師上堂古者道若人識得心大地無寸土萬壽即不然若人識得心未是究竟處且那裡是究竟處拈拄杖卓一下曰甜瓜徹蒂甜苦瓠連根苦長沙府大溈了菴景暈禪師上堂雲門一曲臘月二十五瑞雪飄空積滿江山塢峻嶺寒梅華正吐手把須彌槌笑打虗空鼓驚起憍梵提冷汗透身如雨忿怒阿修羅王握拳當胸問云畢竟是何宗旨咄少室峰前亦曾錯舉杭州府靈隱誰菴了演禪師福州人上堂面門拶破天地懸殊打透牢關白雲萬里饒伊兩頭坐斷別有轉身三生六十劫也未夢見在喝一喝下座揚州府泰州光孝寺致遠禪師上堂舉女子出定話畢乃曰從來打鼓弄琵琶須是相逢兩會家佩玉鳴鸞歌舞罷門前依舊夕陽斜
