body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十二世筏渡慈禪師法嗣洛京相國一言道顯禪師鴈門人生而岐嶷穎悟英特年十二自願出家父母難之師曰兒志決矣未可強留遂落䰂於郡之西山聽圓覺至知幻即離章頓然默契恍若舊識乃辭師師曰汝志宗門正其時也遊汾州謁筏渡渡一見器之命入侍寮一日渡舉竹篦問曰畢竟喚作甚麼師方進語渡驀頭便打忽然大悟便禮拜曰和尚且止古人道佛法無多子非虗語也渡曰汝今方知吾意耶師曰和尚大恩碎身難報渡囑曰汝年且幼時至理彰師執勞座下一十七載洪武丙辰出住汝州風穴上堂臨濟燒黃檗禪板禍起蕭墻香嚴哭溈山拄杖勾賊破家有般漢聞風穴與麼道暗自差排道老漢辱他先聖破釜沉舟箇樣師僧何堪共語山僧亦有先師所付底正欲舉似諸仁隨拈拄杖曰看看且道與古人差多少乃擲下拄杖永樂癸巳五月十三忽告衆曰吾將行矣囑諸弟子皆法門大事泊然而化壽八十有五夏七十有七塔於汴京之南阜徑山銘禪師法嗣嘉興府天寧西白力金禪師蘇之姚氏子幼依寶積院出家造徑山見古鼎銘銘舉德山見龍潭因緣示師師繹之久而有契至正丁酉出世瑞光洪武初遷淨慈辛亥春詔住天界壬子冬敕建無遮大會命師升座車駕幸臨一日示微疾而逝塔于嘉興城西徑山及禪師法嗣杭州府靈隱空叟悟禪師洪武庚戌住崇寧閲八年遷中竺會靈隱虗席師補焉居無何以前住持舊事逮至京病卒於途臨終書偈曰我年五十五嘗把虗空補踏斷死生關夜半日卓午門人道淨等依法茶毗舌根數珠不壞奉骨歸瘞靈隱東岡復分餘骼葬西溪九曲之原時洪武年辛未五月三日也杭州府天龍斯道道衍禪師長洲姚氏子諱廣孝自號逃虗子年十四出家於妙智菴元季兵亂遨遊江湖深自韜晦參徑山愚菴及盡得心髓掌內記三年出世普慶遷天龍嘗自題肖像曰看破芭蕉拄杖子等閒徹骨露風流有時搖動龜毛拂直得虗空笑點頭洪武中以高僧應選侍文皇於燕邸永樂中以佐命功上欲官之不可一日召見上潛令人以冠服被體進爵太子少師亟命宣謝不得已拜命故人皆以少師稱然終不蓄髮戒行尤謹賜妻妾堅辭弗受嘗有閒居詩曰春燕雛成辭舊壘午雞啼罷陰階讀此可以想見師半矣後病篤上幸其第問後事對曰出家人復何所戀強之終無言遂泊然而化世壽八十有五上贈榮國公諡恭靖所著有道餘録一卷行世有贊靈谷定巖戒道影曰以此見定巖指槐為柳不以此見定巖認辰作斗然則何以見定巖廓太虗而為量湛秋水以為神其于說也無說而說其於聞也無聞而聞行猶霜潔貌若春溫榮領非常巨剎欽承莫大鴻恩名無遠而不屆德不孤而有鄰是誠謂先龍翔欣大師之嫡孫也耶萬壽仁禪師法嗣杭州府徑山南石文琇禪師崑山李氏子出家紹隆菴禮智興為師行中仁住雲頂師往從之針芥相契初住蘇州普門次遷靈巖三主萬壽永樂初詔天下儒釋道流之精通文義者纂修永樂大典師應詔書成陛辭南還主席徑山上堂僧問法筵已啓法鼓已鳴四衆雲臨請師祝聖師曰日月為天眼須彌作壽山曰世尊出世天雨四華和尚出世有何祥瑞師曰一牛飲水五馬不嘶曰恁麼則熙怡的旨傳千古寂照宗風播四方師曰好事不如無乃曰如來出世是擔屎漢祖師西來是賣卜人自餘德山臨濟洞山雲門溈山雪峰玄沙南泉趙州輩各逞機鋒互分照用盡是販私鹽賊新普門者裡一時與他掃蕩何故幸逢堯舜世自合樂無為復舉僧問楊岐如何是佛岐曰三腳驢子弄蹄行曰莫只者便是麼岐曰湖南長老師曰大小楊岐被者僧一問未免手腳俱露上堂十方無異路為甚麼南尋天台北尋五臺目前無異草為甚麼桃華紅李華白良久曰打破祖師關都是自家底靈巖上堂盡大地是自己森羅萬象從何而有會不得底三十拄杖會得底亦與三十拄杖諸方盡是粥罷上堂靈巖寺裡參退喫茶上堂今朝七月初一門前金風淅瀝特地打鼓升堂一字也道不出露柱禮拜釋迦燈籠問訊智積獨有無事衲僧依然眼橫鼻直敢問大衆那箇是無事衲僧良久曰𭪿長三尺萬壽謝頭首兼祈雨上堂伶俐衲僧轉轆轆地對賓客側身而立結衆緣化炭化糧聽闌雞鼓翅而鳴看茶瓢從地𨁝跳卓拄杖曰夜來江上雨分作萬家流解夏上堂圓覺能出一切法一切法未嘗離圓覺螻蟻知雨而封穴石𧉧應節而揚葩粘手粘腳底有甚數十字縱橫底有甚數上堂舉古德曰日出心光耀天陰性地昏不知天地者剛道有乾坤與麼說話古今徹悟者如稻麻竹葦錯會者亦如稻麻竹葦以拂子畫一畫曰阿耨達池深四十丈濶四十丈除夜小參龍樹滿盛水迦提擲下繡針德山隔江招手高亭橫趨而去朝鳴鐘暮擊鼓風動塵起鵲噪雅鳴無一處不是者箇時節今當臘月三十夜敢問諸人還會得麼有際天之雲濤方可容吞舟之魚有九萬里風乃可負垂天之翼佛涅槃上堂釋迦老子從兜率天託生大術胎中早是染却生死重病及乎降生便乃一手指天一手指地可見是攢簇不得底逮見明星出現豁然悟道正是病眼見空華四十九年三百餘會廣說略說直說曲說顯說密說豈非熟睡饒譫語至於臨末稍頭摩胸告衆曰汝等善觀吾紫磨金色之身瞻仰取足毋令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子病入膏肓莫能療治非但世醫拱手便是耆婆神醫只得倒退三舍北山遠孫今日却要為他療治若療治不得後代兒孫永失恃怙若療治得便見紫磨金色之身巍巍堂堂煒煒煌煌觸處顯現擊拂子曰柳色黃金嫩梨華白雪香徑山上堂森羅及萬象一法之所印前面是盂峰後面是凌霄峰中間是佛殿喚甚麼作一法良久曰國一祖師元是崑山人上堂馬大師道自從胡亂後三十年不少鹽醬此地無金二兩俗人沽酒三升上堂但參活句莫參死句頭頭上顯物物上明是死句舉步踏著南辰轉身觸翻北斗是死句作麼生是活句蘇州街雨過著繡鞋衆擬議擲拂子下座上堂目前無法意在目前不是目前法非耳目之所到洗硯池頭雲冉冉埋雞冢上草離離室中垂語曰道源不遠在甚麼處祖師西來為甚麼事菩提無樹誰為立名僧問如何是賓中賓師曰扶杖傍人門曰如何是賓中主師曰堂前倚露柱曰如何是主中賓師曰性命屬他人曰如何是主中主師曰手握金剛杵見僧庭中過師厲聲曰屋簷㘱下來也僧仰望師曰子過新羅見僧入門便曰你者踏州縣漢腳跟下好與三十棒曰某甲話也未問便蒙賜棒師曰待你開口堪作甚麼僧擬議師便喝出僧參展坐具師曰我者裡無殘羹餿飯不用使破炊巾曰和尚慈悲師曰笑倒門前青石幢師凡四坐道場皆有成績可觀晚年引退卜地寂照塔左結廬以居壽七十餘示寂有增集續傳燈行世龍翔欣禪師法嗣江寧府天界覺原慧曇禪師天台楊氏子母夢明月墮懷吞之有娠生貌嶷如稍長依越之法果大均出家年十六為大僧聞笑隱主中竺往參叩備陳求道之切隱斥曰從門入者即非家珍道在自己奚向人求耶師退而有省一日聞舉百丈野狐話豁然大悟曰佛法落吾手矣隱曰汝見何道理師展兩手曰不直半文錢隱頷之一日師入門隱問何處來師曰遊山來隱曰笠子下拶破洛浦遍參底作麼生師曰未入門時呈似和尚了也隱曰即今因甚不拈出師擬議隱便喝師從此脫然又一日隱展兩手曰我八字打開也你因甚不肯承當師曰休來鈍置隱曰近前來為汝說師掩耳而出後隱主龍翔俾師分座至正壬辰出世牛首祖堂三年遷清凉廣慧上堂一句子墨漆黑無把柄有準則良久曰會麼碓搗東南磨推西北上堂經有經師論有論師龍河今日放一線道分科列段去也拈拄杖卓一下曰且道是何章句上堂者箇現成公案古今領解者雖多錯會者亦不少所以金鍮不辨玉石不分總似今日達磨一宗教甚麼人擔荷龍河者裡直下分辨去也張上座李上座一箇手臂長一箇眼睛大良久乃噓一聲下座示衆春風浩浩春日遲遲黃鶯啼在百華枝箇中無限意消息許誰知僧問心意識遏捺不住時如何師厲聲喝曰是誰遏捺室中謂僧曰二六時中無你啖分無你趣向分會麼僧罔措師曰未明三八九難免自沉吟帝師授淨覺妙辨禪師號乙未年遷保寧丙申王師定建業師謁於轅門上一見嘆曰真福德僧也命主蔣山踰年改龍翔為大天寧寺詔師主之設廣薦法會命師升座說法車駕幸臨恩數優洽御書天下第一禪林洪武戊申賜紫衣及金襴方袍御制誥命授演梵善世利國崇教大禪師住持大天界寺統諸山釋教事當是時遴選有序詮衡至公宗社有志之流山林抱道之士聯鑣而起庚戌夏六月庭議西域未臣伏上以彼國敦尚佛乘特詔師往師承命即日登途自閩之洋凡歷國邑莫不聞風來歸辛亥秋七月至合剌國布宣天子威德館佛山寺其王待以師禮九月師示微疾王臣咸來相慰須臾沐浴更衣謂左右曰某幻緣已盡不能復命矣跏趺端坐夜參半師問曰日將出否曰未也已而復問至再四曰日出矣師怡然而逝世壽六十八僧臘五十三踰五日顏色如生王斫香為龕築壇茶毗之薪火滅盡舍利無數舌根齒牙不壞收舍利靈骨及不壞者祔葬其國辟支佛塔中甲寅九月同行還朝奏陳其事上嗟悼之敕天界蔣山二寺住持宗泐等以師之遺衣藏於雨華臺之左有五會法語行世江寧府天界善世全室宗泐禪師字季潭台之臨海周氏子元仁宗延祐戊午七月十七日生八歲從中竺笑隱受業十四剃髮二十具戒一日隱問國師三喚侍者侍者三應汝意如何師曰何得剜肉作瘡隱曰將謂汝奇特元來無所得師喝一喝隱擬拈棒師拂袖便出尋參元叟於徑山叟留掌記室後出世宣之水西洪武戊申遷中竺四月十五日入寺上堂金剛王劍橫揮千妖屏跡爍迦羅眼洞照萬有潛形到者裡卷舒在我殺活臨時直得千歲巖中天𨁝跳錢塘水東海逆流諸人還知有也無舉拂子曰庭前石筍抽條也會見高枝宿鳳凰復舉南泉初入院大衆送進方丈僧問端居丈室將何指示於人泉曰昨夜三更失却牛天明起來失却火師曰大小南泉不唯瞞人亦且自瞞新天竺用處也要大家知忽有人問端居丈室將何指示於人劈脊便棒且道與古人是同是別卓拄杖下座辛亥遷雙徑是年冬詔徵江南有道浮屠十人詣京就太平興國寺建廣薦法會列師居首上齊戒御製章疏車駕親臨服皮辨服搢玉圭北面禮佛羣臣各衣法服以從先是上命師撰獻佛樂曲進呈御署曲凡八章曰善世昭信延慈法喜禪悅遍應妙濟善成敕太常歌舞以節奏之復命師升座說法窮理盡性徹果該因顯密淺深無機不被上大悅未幾總持西白金以母老告退舉師自代上命師主天界嘗欲師蓄鬚髮以官之師再懇得免後以逆黨坐罪著做散僧執役至鳳陽槎峰建寺徐察其非召還上賜詩有泐翁去此問誰禪朝夕常思在目前之句高皇后薨臨葬忽風雨雷電暴作帝不樂召師至曰今太后將就壙為朕宣偈送之師應聲曰雨落天垂淚雷鳴地舉哀西天諸佛子同送馬如來上意稍解後以老求退賜歸槎峰渡江示疾於江浦石佛寺謂左右曰人之生滅如水一漚漚生漚滅復歸於水何處非寂滅之地耶言訖復顧侍者曰者箇聻者茫然師曰苦遂寂時洪武庚子九月十四日也春秋七十四闍維舍利無算塔於撥雲山笑隱欣窣堵波之右杭州府中竺用彰懶翁廷俊禪師久依笑隱出世明之龍峰次遷瑞巖後主中竺據室拈拄杖曰室中若無棒頭取證底我拄杖子誓不喚作拄杖子有麼僧出師曰敕點飛龍馬跛鱉出頭來佛涅槃日上堂古德道涅槃後有大人相釋迦老子涅槃久矣大人相在甚麼處以拂子打圜相曰還見麼容顏甚奇妙光明照十方我適曾供養今復還親覲上堂近來衆中兄弟聰敏者多徹到者亦不少莫不自謂得之於心應之於手臨機見境踢將出來活鱍鱍地不費纖毫氣力到龍峰門下正好從頭按過拈拄杖卓一下曰譬如油蠟作燈燭不以火點終不明上堂真淨道天心得自在盛夏復清凉衲僧如薦得珍重法中王即今孟秋改旦盛夏已退清凉復生且問諸人天心還得自在也未直饒自在更須識取法中王始得其或未然吽吽前頭大有熱在謝首座知客侍者直歲上堂索犀牛扇子無風起浪問眉間挂劍平地干戈二俱莫涉別有條章撲碎玻璃盞子拈起無柄钁頭淺鋤明月深種白雲時時歌堯舜之風日日樂羲皇之化且知恩報恩一句作麼生道九萬里鵬才展翼一千年鶴便翱翔上堂函蓋乾坤天光回照截斷衆流伏惟尚饗隨波逐浪放汝一線道如此著語還契得雲門意麼拈拄杖曰一即三三即一火向水中焚石從空裡立以拄杖卓一下喝一喝上堂釋迦世尊未離兜率已自七錯八錯何況達磨航海東來其錯猶甚俊上座既是他家兒孫只得將錯就錯拈拄杖曰三世諸佛歷代祖師總在新瑞巖拄杖頭上提向上機指其中事只要諸人明自本心證自本法驀忽一箇半箇心法雙忘管教他穿山渡口虎咬大蟲剪月亭前蛇吞鱉鼻雖然祇如廣額屠兒放下屠刀道我是千佛一數且道是從本心中發現耶從本法中發現耶以拄杖畫一畫曰天下有星皆拱北人間無水不朝東臘八上堂晝見日夜見星大地衆生阿誰不曉釋迦老子揑目生華剛道於中有箇悟處二十一日杜口不言幸自可憐生四十九載脫空謾語著甚死急噓一聲下座上堂拈拄杖卓一下曰大衆會麼良久曰欲得不招無間業莫謗如來正法輪便下座上堂春山疊亂青春水漾虗碧寥寥天地間獨立望何極好諸禪德不經一事不長一智結夏小參結却布袋口三世諸佛歷代祖師天下老和尚眼不得妄視耳不得妄聽口不得妄言足不得妄舉一禁禁住無絲毫走作謂之圓覺伽藍九旬禁制酢甕中蟲子有甚出頭分殊不知此道如淨日輪升太虗空無幽不燭如塗毒鼓輕輕一撾聞者皆喪雖然只如道居有破有居空破空二幻既空中亦不立畢竟喚甚麼作塗毒鼓喚甚麼作淨日輪喝一喝曰大丈夫兒合自由信腳踏翻知見窟解夏小參秋江清淺時白露和煙裊本無迷悟人只要今日了既是本無迷悟又要了箇甚麼好諸禪德頂門正眼照古照今腦後神光無內無外雖則人人本具各各現成其奈妄想執著不能了此茲值聖制將圓僧欲自恣便從今日了將去不妨七穿八穴十字縱橫若了不去三十年後換手捶胸莫言不道除夕小參一年將盡夜萬里未歸人咄寐語作麼即今簇簇上來兀兀立地面面相看眼眼相對阿那箇是未歸人樓上已吹新歲角聽不出聲底分明聽取窗前猶點舊年燈見不超色底端的見來是箇皮下有血誰家竈裡無煙說甚麼到與未到歸與未歸雖然否極泰來結交頭一句子也要諸人共委拈拄杖卓一下曰梅蕚香傳春谷暖松風聲度夜堂寒舉五通仙人問世尊如何是那一通公案拈曰那一通既不識者五通敢保未徹不見道射人先射馬擒賊須擒王舉外道問佛不問有言不問無言話拈曰外道饑求王膳世尊和盤托出阿難索短不搆深泉却向鞭影裡著倒舉傅大士講經公案拈曰大士講經揮尺一下百千三昧無量妙義已自昭彰志公道講經竟言多去道轉遠舉盤山作街坊公案拈曰歌聲哭聲在在有之因甚盤山聽得便解悟去良久曰開池不待月池成月自來洪武建元寓鍾山端坐而逝茶毗舍利無數塔於杭之南屏九江府廬山圓通約之崇禪師毗陵陳氏子首參元叟嗣見佛慧次走中竺參笑隱隱舉無位真人話師不覺釋然下拜隱曰汝何所見而便作禮師曰更無第二人隱曰從門入者不是家珍師曰和尚慎毋壓良為賤留侍十餘年盡得其道後住南禪次遷圓通育王洪武壬子秋召高僧建大會於鍾山師應詔至便殿上問佛法大意師以偈酬之上大悅賜食上前師假寐鼻息作聲鄰座引裾覺之上笑曰此老人無機心真善知識也後示寂塔於石耳峰生於元成宗大德甲辰嘉興府資聖克新仲銘禪師鄱陽盧里余氏子久依笑隱於大龍翔掌內記至正間住嘉禾資聖時了菴退居南堂與師雅相契合洎菴示寂師為文祭之略曰哲人云亡宗教陵替豫來醉李惟師宿契或往或來於今五歲論核道真窮根極底又曰矧彼妄庸傲然高位利鬻豪爭善類喪氣老成真萎弛焉何恃師嘗却宣讓王之命有偈曰數椽茅屋萬株松蒲榻高眠海日紅不是賢王招不起山人只合住山中所著有雪廬稿杭州府靈隱介菴用真輔良禪師吳縣范文正公十葉孫也自幼聰穎經書若素習十五從迎福院剃髮受具戒參方天平白雲杓指見笑隱遂詣龍翔相見問答頃情解頓忘石室瑛主育王令掌藏鑰至正壬午出世嘉禾資聖歷十三載遷越之天章尋移中竺最後補靈隱嘗示衆曰達磨一宗陵夷殆盡汝等努力如救頭然百千法門無量妙義於一毫端可以周知如知之變大地為黃金受之當無所讓否則素餐之愧咎將誰歸歲月流電向上事請各急著眼洪武辛亥正月十五日親理後事謂左右曰翌日巳時吾逝矣及期澡浴端坐書偈而寂世壽五十五僧臘四十闍維齒牙舌根不壞設利無算瘞歸雲塔中杭州府淨慈竹菴清遠懷渭禪師南昌魏氏子實全悟俗姓甥也幼誦書攻文不待師授悟挽致座下不數年其學大進一日悟垂問衆罕對者師直前應對悟叱之師氣不少沮悟詰難再四師皆不少滯悟乃謂之曰吾四十年接人非不夥能弘大慧之道唯爾與宗泐耳悟既寂虞文靖歐陽玄雅重師文行僉曰是無忝於舅氏也師曰佛法與世法不相違背吾故以餘力及之將光潤其宗教耳苟用此相夸豈知我哉元至正末避地匡廬悍兵來索金帛師瞋目呵之曰僧家何有是物耶兵怒欲害之師引頸就刃兵不敢嘆息而去師出世四坐道場住淨慈則入聖朝矣鍾山之會名德咸集後退居良渚問道益至洪武乙卯十二月示微恙召弟子囑以後事怡然而逝壽五十九茶毗不壞者三法語有四會録詩文有集行世萬壽霖禪師法嗣杭州府淨慈孤峰明德禪師昌國朱氏子母夢僧玠託宿覺而有娠幼好跏趺端坐諸父明上座奇之挾至金鵝俾侍灑掃年十七得度為大僧遊方首謁竺西坦聆上堂語有省復造淨慈見晦機機問甚麼物恁麼來師曰胡張三黑李四機拈棒師拂袖徑出復抵雙林見明極俊會日本遣使迎俊師送至海濵適晤竺田於明州田挽師歸雪竇處以第一座一日田上堂舉隱山泥牛入海公案音聲如雷師不覺廓然述偈呈田田歎曰人天眼目儼然猶在自是提唱宗乘稱性而說嘗與仲方倫結菴桃華塢相與激揚足不踰戶者五年後出住松江東禪再遷集慶保寧湖之道場杭之淨慈帝師授圓明定慧之號洪武壬子退居道場竹林菴一日示微疾戒飭其徒曰汝等一真圓性與如來等世相起滅無異石火電光晝夜勤行毋生退轉吾沒後當遵佛制依法茶毗勿令衣麻而哭言畢書偈泊然而逝世壽七十九僧臘六十二茶毗頂骨不壞舍利叢布灰燼中建塔瘞於東岡大鑑下第二十三世相國顯禪師法嗣西京小菴行密禪師初以白衣禮一言師凡見便禮拜言一日謂曰道人禮拜且止佛法在甚麼處師方舉首忽聞板聲鳴言曰只者是師從此入遂求度言曰汝誠精進宜名行密力參座下三年言偶舉南泉三不是等問語未絶師曰畢竟如何言笑曰已多了也師言下得大安樂言曰佛法下衰正宜潛隱毋拘城隍得安身處最為佳耳宣德丙午出住西京小菴入院上堂句能剗意意能剗句意句交馳無你立處吹糠見米退一取三汝諸人腳下還有許多般也無乃拈拂子擊案兩下又示衆云天無私覆地無私載上是白雲青天下是石頭土塊靈鷲山中拈花金色尊者破顏正是與賊人過梯一箇渾沒縫底弄得七穿八穴莫怪張郎底是李郎底却不是乃冷笑一聲天順戊寅八月十一日告衆曰吾自住此二十餘年不曾將一字腳點染諸方隨拈拄杖曰者箇交與何人衆無對倚杖而化天寧金禪師法嗣江寧府保寧敏機慧禪師吳興人得法西白出世嘉禾祥符尋主保寧宋文憲公濂嘗為師作沖默齊記竺曇敷禪師法嗣杭州府淨慈佛鑑簡菴希古師頤禪師住杭之崇福徙萬壽明永樂中徵修大典師應詔事竣敕主淨慈宣德壬子忽語衆曰吾行矣書偈曰須彌一拳大海一口海竭山崩烏飛兔走遂危坐而寂塔雷峰之陽雙林誾禪師法嗣杭州府徑山月江宗淨禪師蘭溪倪氏子十七從正覺院文譯受業誦楞嚴至如人以手指月示人是人因指應當見月處豁然有省往參雙林正菴菴問黃檗打臨濟你作麼生會師曰按牛頭喫草菴奇之命典維那後出世徑山示衆坐斷凌霄已十年拖犂拽杷飽蒼煙如今休去便休去嘯月吟風樂自然晚退居東堂正統壬戌十月三日示疾當午集衆說偈曰祖師門下客開口論無生老我百不會日午打三更泊然而逝壽六十七臘五十全身塔於圓照菴天界曇禪師法嗣江寧府靈谷定巖淨戒禪師吳興人參覺原於天界原舉桶篐𪹼因緣問師師擬議原厲聲曰早遲八刻了也師言下大悟洪武初詔住靈谷舉長慶道總似今日老胡有望保福道總似今日老胡絶望話頌曰平展機籌不用誇抑揚元屬當行家曹溪波浪如相似那得兒孫若稻麻有續刻聯珠頌古行世天界泐禪師法嗣寧波府天童佛朗湛然自性禪師雲陽韓氏子出家於溧陽慧照菴禮慧海智為師一日海問父母未生前那箇是你本來面目師不能對自此懷疑者七年時得旌川草菴一幻生福二友切磨之力菴一日舉有句無句如藤倚樹話問師師擬議菴擘脊便打師憤然徹夜不睡天明聞敲火筯聲豁然洞徹乃謂草菴曰夜來公案今日要與汝決斷菴握拄杖問句歸何處語未絶師劈手奪菴杖拗作兩橛攛向窗外曰別處燒徑入堂臥幻生聞特問曰且喜性兄大事了畢也師喝曰賊不打貧兒家一日問菴祖意教意是同是別菴曰秋樹飄黃葉寒天掘地爐師曰我且不問他後謁天界全室舉此話問曰某昔年曾問一師友祖意教意是同是別他道秋樹飄黃葉寒天掘地爐今日請和尚決斷室曰病翁年來腕無力拄杖牀頭且靠壁師曰有人不肯和尚與麼道室拈拄杖打曰待他露柱眼自開鐵蒺藜槌當面擲師便禮拜後出世里之普光明洪武丁巳遷常州永慶公選住撫州疏山復被旨住持天童僧問牛過窗櫺頭角四蹄都過了因甚尾巴過不得師曰碗脫丘曰恁麼則昔時大慧今朝佛朗也師曰莫認六龍城作舅家曰的旨師分付回程事若何師曰急須吐却上堂一即三三即一是聖是凡分不出木人著錦衣石女風流急慣操沒絃琴能吹無孔笛深深海底行高高峰頂立露柱來稽首虗空齊應拍萬象側耳聽大家笑一擲且道笑箇甚麼飯籮裡餓死人不肯自家開口喫饒你到三十三天本來饑苦爭消得卓拄杖曰吽吽便下座上堂今朝十月旦衲子修冬辦撥開爐焰火更莫問柴炭渴飲銅汁羹饑餐鐵釘飯大衆還知囊無繫蟻之絲廚乏聚蠅之糝麼到與麼地不可躲懶卓拄杖下座謝頭首上堂布毛才吹化現無邊華藏世界金槌在握縱擒一切諸佛如來撲碎茶甌遍地金聲玉振挈漏燈盞觸處耀古騰今兔角杖挑大千日月龜毛拂轉塵劫法輪還見佛國山𨁝跳撞破汝諸人鼻孔𭣟瞎汝諸人眼睛麼喝一喝曰春風夏雨應時來李白桃紅次第開上堂去年今日居楞伽山彼四衆喜此處少一人今年此日居佛國山此四衆喜彼處少一人擊拂子曰一身為無量身無量身為一身行則普天普地行坐則遍一切處坐說甚麼東西南北他方此界雖然此猶在化城且道寶所一句作麼生便下座上堂貪瞋癡戒定慧戒定慧貪瞋癡無明解脫知見解脫知見無明一切衆生諸佛諸佛一切衆生月落山無影風來樹有聲大千無對待露柱鬧縱橫喝一喝下座上堂今朝十月初一衲子備炭開爐汝善知時識節吾不者也之乎生佛已前茅草令清風自在滿皇都一日有一峰會下數僧到師問汝等是寧和尚弟子否曰是師曰借問汝家事得麼曰得師曰錯復問峽富山前三草二木晝夜作師子吼是一峰語否曰是師復曰錯僧無語師曰汝等何得五戒也不持晚年退歸普光作終焉計成都府大隋無初德始禪師日本信州神氏子幼聰穎遇羣兒嬉戲輒引去見僧則喜動顏色從州之天寧出家受具博極羣書已而念覺阿之為人得請命其王隨國使宣聞溪詣闕使還師願留華夏上許首參全室掌內記久之盡得其道會室有西域之行師遊古幽都憩慶壽時當洪武壬戌適獨菴衍來蒞寺事衍視師為猶子相與激揚臨濟宗旨甚相得庚午師告去禮娥眉獻王命出世彭州大隋瓣香為全室拈出矣一住七年法席甚盛永樂壬辰特旨卑領龍泉寺師高提祖印勘辨方來一出言象之表平昔喜賑恤貧困薄己厚人善於誘物宣德戊申九月無病端坐書偈寂於退處之金剛室茶毗獲舍利百餘弟子輩為建塔瘞焉薦嚴義禪師法嗣杭州府淨慈祖芳道聯禪師四明鄞縣陸氏子年十四禮崑山薦嚴悅堂顏得度秉戒於鄞之五臺還侍物先義於薦嚴有所造詣洪武丙辰侍佛心住靈谷天界曇延居記室穆菴康恕中慍木菴聰咸作忘年交後出世台之廣孝遷紫籜及麻峪景山明之補陀越之能仁末主淨慈壬申淨慈厄熒惑師為一新蜀王賜衲衣盂永樂丙戌朝廷徵師為釋教總裁嗣還築室湖濵曰藕華居丁亥以事赴召至京上令住五臺祐國寺未及升陛忽語左右曰吾世緣殆盡後三日沐浴更衣跏趺而化當己丑七月三日也歸葬藕華居之陰世壽六十四僧臘五十有䂐逸語録行世道場德禪師法嗣杭州府靈隱無文本褧禪師四明定海謝氏子年十四出家郡之五臺寺剃染習毗尼聞孤峰旺化保寧往叩之峰問聞汝和梁山十牛頌試舉看師擬對峰遽掩其口曰牛在甚麼處師曰已犯和尚苗稼了也峰曰未在更道師掩耳而出峰異之命為侍者時仲芳倫退居寺右新菴師往來決擇至正丙午開法姑蘇覺嚴洪武中宜興靜樂院請師易講為禪未幾詔徙蔣山於孝陵之東賜額靈谷敕物外羲住持命師居第一座為衆表率乙亥補靈隱居五載建文己卯春示微疾蒙室範堂洪候問值師氣喘洪曰趙州道諸人被十二時辰使老僧使得十二時辰和尚作麼生師竦身曰喚甚麼作十二時辰洪曰爭奈氣急何師震聲一喝問左右今朝是幾曰二月二十七日乃索筆書偈曰吾年七十有五涅槃生死不墮虗空背上翻身靠倒飛來小朵擲筆泊然而化闍維頂骨不壞舍利無算門人宗衍等斂諸不壞塔於雙桂菴分爪髮瘞於靜樂
