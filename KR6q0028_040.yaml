body:
  text: 南海普陀嗣祖沙門西蜀性統編集曹洞宗大鑑下第三十七世博山來禪師法嗣廣信府博山雪關智誾禪師本郡上饒傅氏子父喪早八歲辭母依景德傳出家傳矜師體羸令頂禮大士號一夜獲大士摩頂肢節漸強及覽羣書無不意了第閲壇經有火燒海底句不明遂疑之年草六參博山山令看船子藏身處沒蹤迹沒蹤迹處莫藏身話久之一日於槽廠見磨鼻拽脫忽然有省以偈呈山曰直下相逢處由來絶覆藏舌頭元是肉嚼碎也無妨山曰子參得禪也吾助汝喜示以偈有未及朝天子回機却有妨句因矢志服役曉夕無違一日侍山山指衲衣曰此是壽昌老漢的我嘗以一偈博得子能如我當不子惜師曰莫是師翁睡著被和尚竊來山曰子試竊看師立成五頌山曰據子見處天下人攔把不住我者裡未肯點頭在師曰謝和尚衲衣便出山一日謂師曰子根利當鈍却利使死却全心始得師拜受即掩關六載關中懸大鏡日坐對之才覺業識心起無明發現便指鏡中唾罵凡紙筆書籍之類槩不畜唯以一念萬年萬年一念是計忽一日作雪關歌倩人寫呈山山為擊節稱善令開關說偈贈之曰始行大事六年雪頓入圓明一片氷今日幸親無縫塔掣開關鎖萬千層旋命師秉拂晚率衆入室山問堂中首座人天眼目如何是人天眼目師曰頂門上山曰還假照鑑也無師曰君不見山曰不虗參見作家來師掩耳而出一日受灜山請山堅留師因問把住時如何山曰放開一線師曰放開時如何山曰把住不容行師曰如何是放行中把住山曰闍黎看腳下師曰如何是把住中放行山曰拂子在我手裡師曰大善知識也須讓人出得羅籠入得羅籠山曰爭奈老僧何師曰衝霄還彩鳳透網是金鱗山休去師於天啓丁卯出住灜山崇禎辛未繼席博山丙子赴浙之虎跑大慈妙行諸剎請上堂譬如琴瑟箜篌雖有妙音若無妙指終不能發寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起黃面老人五百生前曾做樂官來一等習氣可謂熟處難忘山僧者裡素乏師傳指法椎鈍祇有一曲沒絃琴彈得最熟今日舉似諸人也竪拂子曰者是妙指喚甚麼作妙音擊拂子曰者是妙音喚甚麼作妙指擲下拂子曰曲終人不見江上數峰青上堂欲識佛性義當觀時節因緣今夜是除夕明旦是元朝者是時節作麼生說箇自彰底理拈拄杖曰者木上座二十年前寒不知寒熱不知熱桃符換不管春來爆竹響那知臘去雖則如癡似懵要且能為物主二十年後寒則知寒熱則知熱迎新歲也貼門符送殘冬還橈榾柮雖則隨波逐浪要且不為時凋卓拄杖曰到如今說知也得說不知也得說知不知總得不萌枝上不妨暗辨春秋無影峰前猶得明占氣候諸禪德祇如年更歲換臘去春來諸人分上還是知即是不知即是若道知喚作毛道凡夫謾道花枝偏有色空勞鶯語為誰嬌若道不知坐在淨白窠臼只為氷堅難躍鯉却緣水淺不藏龍去此二途畢竟作麼生擲拄杖曰鶻臭布衫都脫却穿婆帔子拜婆年上堂山僧開箇貨鋪慣行兌換不誤主顧且道是甚麼貨鋪你若把一副熱心腸來我便將一副冷的換與你若把一副冷心肝來我便將一副熱的換與何故為他熱的太傷熱冷的太傷冷冷熱不均所以作病忽有箇不冷不熱的出來你道山僧將甚麼換與乃震威一喝時有僧出禮拜起擬問師曰想君不是金牙將怎解彎弓射尉遲便下座小參釋迦老子解揑怪向無生處說生破院道人不曾生無生可說釋迦老子會裝巧向無滅處說滅破院道人不曾滅無滅可說與麼則釋迦老子全身墮在生滅破院道人全身跳出生滅且道跳出的是不跳出的是不見道他人住處我不住他人行處我不行不是與人難共住大都緇素要分明示衆南人不夢千人帳北人不夢萬斛舟以耳目所接不同故也祇如香臺佛像夢作國王此聖境冥符法華所謂常有是好夢是也山僧適來偶得一夢既非熟習亦非聖境且道是甚麼夢試舉看昨夢一人入方丈求偈山僧道我要睡問取木上座去他道和尚說的才好山僧為他逼不得已向道借拳行令打虗空大地河山切恨同至道從來嫌揀擇趙州齒缺不關風惺來恰以讓居士請示衆山僧肚腸乾索無可應酬只得將此偈拈出顧視左右曰大衆三十年後莫道山僧與你說夢好問如何是不呈的句師曰賊贓已露問婆子燒菴者僧如何師曰任從風浪起穩坐釣魚舟問那邊不坐空王殿是何旨趣師曰為他不墮尊貴問如何是殺人刀師曰倒挂眉間曰如何是活人劍師曰不斬死漢問如何是真實信師曰鐵輪天子璽曰如何是真實疑師曰一堵牆百堵調曰如何是真實見師曰一點瞞不得曰如何是真實用師曰鈎錐都放下呼遣聽臨時師鶴立牛行賦性寬厚色莊容敬望者意消說法不假思議落筆無半點塵故士大夫樂與之遊所著有摘燈録炊香堂詩文書復語録若干卷行世丁丑浙歸抵瀛山示微恙閴然謐公問和尚安否師彈指一下謐曰末後句也須分付師曰你道我生耶死耶謐顧視間則師已逝矣壽五十三臘三十七建塔於博山蓮華峰之西原淮安府檀度嵩乳道密禪師泗州唐氏子生而胎素幼歲便有出塵志事親以孝聞年十四投景會驅烏二十事包笠初歷講肆閲楞嚴至雖得多聞不成聖果句歎曰不耽幻身世而反耽此幻學耶遂棄之首參壽昌基隆次參博山山門庭嚴重師為心死焉久之倣三登九上意遍參雲門金粟罷復還博山明年隨衆採茶次忽白雲從㵎底起師覩之有省歸以偈呈山山曰者且置祇如一口氣不來向甚麼處安身立命師曰不向和尚通去處在山曰莫便是你安身立命處麼師曰道密終不作此見解山曰好與三十痛棒嗣是山與命名授戒且贈以偈曰新豐一曲傳來遠鳳嶺煙霞猶冉冉裂石穿雲和不齊一毫端上乾坤轉潛行密運貴深藏古殿含春待晚香萬里海天能獨笑金針繡出玉鴛鴦於是辭山縛茅郁洲山數年始開法淮安檀度次住安東能仁徐州雲龍乃若青峰菩提法起等處皆隨機隨時初無作意上堂恁麼也得落花有意隨流水不恁麼也得流水無心送落花恁麼不恁麼總得常憶江南三月裡鷓鴣啼處百花香上堂拈拄杖曰識得一萬事畢設若一亦不立又作麼生擲下拄杖曰門簾乍被風吹去明月光贏四壁生小參五九四十五木馬嘶風舞海底泥牛驚翻浪乘風鼓𨁝跳上梵天摩醯目撞瞽萬象沒逃生千賢呌冤苦忽然燕谷一聲雷依舊泥牛還復土喝一喝小參藥山久不升座依俙似曲院主曰大衆久思法誨請和尚說法好肉剜瘡山令打鐘却被風吹大衆方集錯過也不知山升座良久便下座疑殺天下人院曰許為說法何得不垂一言姹女已歸霄漢去呆郎猶向火邊蹲山曰經有經師論有論師爭怪得老僧老老大大是何心行大衆還委悉麼山僧與你旁通一線乃頌曰杲日麗中天高低靡不照爭奈無眼人反怪光不到徒禱告含元殿問長安道僧問了即業障本來空未了應須還宿債祇如師子二祖是了未了師曰兩彩一賽問如何是無佛無衆生者師曰幾乎恁麼答汝曰是非不到處是甚麼人分上事師曰汝要棒喫那問如何是兼帶一路師曰蝶穿芳草雙眉溼蜂撩殘花兩股肥問如何是類墮師曰靈犀玩月曰如何是隨墮師曰木馬遊春曰如何是尊貴墮師曰坐不當堂問萬法歸一一歸何處師曰雲籠嶽頂曰意旨如何師曰月照波心問如何是君師曰天然貴異曰如何是臣師曰武緯文經曰如何是君視臣師曰天覆於下曰如何是臣向君師曰地載於上曰如何是君臣道合師曰天地位焉萬物育焉僧問如何是金針雙鎖備師曰石女繡雙鳳冲開碧落天曰如何是交互明中暗師曰蘆花兩岸雪烟水一江秋曰如何是理事俱不涉師曰前村煙浪裡別有好思量示雪照座主偈非風非幡澄潭不許蒼龍蟠是標是月打刀須用邠州鐵言外旨句中玄石虎雙翎頭戴雪拏吒八臂手擎煙見即便見傳無可傳擬議雲飛萬里眨眼過三千海月雲山拋教盡男兒鼻孔自撩天師德重感人杖頭到處緇素雲委性喜誦說諸方間有妄為雌黃者即厲色叱止之故及門之士皆厚重明年七十與答之間皆寓訣別意旋取道漣水登青峰度夏法起歸休菩提順治戊戌三月五日遂絶食示誨諄諄書偈有石火電光平田荊棘之語十一日沐浴端坐而逝壽七十一臘五十八塔全身於菩提社之右福州府長慶宗寶道獨禪師廣州陸氏子六歲聞鄰嫗發願來生童真出家見性成佛語遂觸宿因堅出世志乃披剃唯事苦參年十四有省三十出嶺參博山山與語器之一日呈偈曰貪程不覺曉愈求愈轉渺相逢不是渠才是却顛倒蟻子牽大磨石人撫掌笑別有活生機不落宮商調山見以為深入堂奧乃謂人曰山僧開三十年飯店從無一箇還飯錢者獨子其庶幾乎初住廬山次開法廣州羅浮後主福州長慶僧問一切諸佛皆從此經出如何是此經師震聲一喝舉六祖風幡話頌曰不是風兮不是幡關山把住路行難愚人只管貪程去那想全身在此間舉高峰無夢無想話頌曰無夢無想上在麼相隨來也沒如何誰家門首無明月頗奈夜行人更多江寧府獨峰竹山道嚴禪師順慶大竹縣沈氏子總角染衣南遊初預講肆一日走京口登凌雲亭忽身心世界頓然一空遂罷講往參博山於天界乃問和尚離博山來天界為人事作麼生山曰今日特為先君設奠師曰還有向上事也無山曰有師曰如何是向上事山曰請坐喫茶於是命典第二座其領衆入室當機應對動合宗旨山喜之嘗曰博山一枝橫出祕在汝躬乃授名道嚴且囑曰汝當以道法嚴持也時年三十有四當崇禎己巳也自是韜迹承恩閲四年開極樂祇園兩剎於滁上又五年住錫金陵獨峰入院時恍然如舊師於是作投老計嘗榜三問語勘驗方來一曰不是心不是佛不是物畢竟是箇甚麼二曰此經深固幽遠無人能到且道喚甚麼作此經三曰獨峰路險把關令嚴欲到者試借公驗看師嘗應請姑孰之興國正覺萬壽三院晚仍歸獨峰順治壬辰師五十初度忽寺門菩提樹傾折一株三月四日集衆垂誡諄諄六日午刻浴畢長逝壽五十九臘四十說法二十一載計坐道場凡五塔全身於本山龍山之陽建寧府回龍古航道舟禪師泉州晉江鄭氏子生萬曆乙酉幼失父事母有孝聲母逝乃棄家寓承天寺閲壽昌録至問僧死了燒了作麼生是你本性處有疑往參博山山為剃染圓具嘗坐不語堂目不交睫者三月參究益切適余集生至與語有契延師閉關金陵一日洗面脫然有省自謂吾於無可奈何處得箇巴鼻會博山說法天界上堂師出問鐘未鳴鼓未響還有佛法也無山曰木人井底吹師曰石女溪邊舞山曰祇如語中帶玄一句又如何道師曰夜半正明天曉不露山便下座山回博山乃以如意付之曰當慎重勿負老僧師復掩關明年奔訃博山乃入閩主法回龍復隱里之戴雲山丙子林宗伯季翀請結制承天丁丑繼席雪峰結冬長慶戊寅還回龍己卯住博山辛巳菴建陽祀二親木主所住之處不循開堂請唯有示衆而已故有示衆曰老僧不上堂蓋因無法說性不近人情恰似箇鐵橛一味放癡憨任人道朽䂐雖然稱住持直是口無舌之句蓋實録也示衆拈華示衆有口難開斷臂歸來無法可得四七祖師無非望空啓告遞代兒孫總是掘地討天老僧當年不識好惡誤入博山社火被伊熱瞞至今有屈難伸雖領衆住持三緘其口蓋不敢鈍置諸人亦恐有玷法門大衆且道恁麼住院是為人不是為人不見道啼得血流無用處不如緘口過殘春示衆夜夜抱佛眠情真罪當朝朝還共起死欵親招起坐鎮相隨刀斧斫不開如形影相似去離亦不可欲識佛去處未敢相許祇者語聲是切忌錯認諸昆仲還識傅大士麼只知開口易不顧舌頭長僧問真覺有言石卵𪹼盡柳枝掃地吾當再來師今繼席莫非再來麼師曰誣人之罪以罪加之曰恁麼則據欵結案了也師曰一狀領過師病次僧問和尚何病師曰針灸不得的病曰與麼則神醫拱手也師曰須知有不病者曰如何是不病者師拈如意便打示荊州親藩惠王法語宗門無語句實無一法與人只要人自參自悟自證自修以見自己本來面目而已非有他術蓋此本來面目不以聖賢而莊嚴不以庸愚而醜陋王公與士庶同士庶與含生等凡囑有情體元無二特以迷而不參昧却自己精光謂之衆生若參究一明如天普蓋似地普擎則謂之佛祖矣佛祖衆生只一迷悟間參究不參究斯有天地之殊耳達磨西來直指人心見性成佛靈俐漢一覷便了更無許多周折所以寶志云欲識大道真體不離聲色言語者裡無疑說箇見性說箇成佛早成剩語也如未然者必須猛著精彩二六時中看是誰見誰聞誰為覺知是誰穿衣御是誰起居動作看到無可看處自然大悟徹底洞明迷雲破散智日高升始知大地衆生由來一體森羅萬象共貫同條且無情與非情之異又何有貴賤凡聖之殊哉師骨鯁性成於衲子中即英靈絶無肯諾語故於壁立萬仞無愧也順治乙未示微疾視事如常八月二十五酉刻趺坐而逝壽七十一臘三十三塔全身於建陽鳳山之陽廣信府博山雪澗道奉禪師建陽龔氏子夙根敏異幼不茹葷十七聽楞嚴有感遂投支提剃染草六隨杖人於鳳山羅山玄沙間僅二載知有己躬下事乃抵浙參真寂有年次參博山山問甚處來師曰窑中山曰天不能蓋地不能載因甚却埋在窑中師曰今朝且喜得見和尚山曰向來作何所務師曰看一歸何處山曰即今看者何在師曰伸手只在縮手裡山曰甚處學得者虗頭來師曰某甲終不敢自瞞後於勺菴聞雞鼓翅大呌乃頓悟述偈曰柏子焚殘𦦨欲無鄰雞忽聽一聲呼昔年錯認驢窺井今日方知井驢走呈山山頷之順治丙戌開法灜山丙申繼席博山高泉普寧間嘗應之上堂水之濵山之麓是處是桃花是處是修竹紅者紅兮緑者緑一般性質出天然直者直兮曲者曲知歸謾謂許靈雲善用休誇只多福究竟其中委宛情總是畫蛇重添足不添足六六誰云三十六拈頭作尾尾為頭饑喫飯兮困就宿咄小參今朝九月初五天氣半晴半雨最好時節因緣一衆耳聞目覩且道覩聞的是箇甚麼南山老大蟲咬殺重牙虎萬象森羅一齊起舞大衆虎咬大蟲則且置萬象因甚麼起舞不見道甜瓜徹蒂甜苦瓠連根苦康熙己酉春以院事託座元明年六月二十日示寂臨寂時黃龍岑按師身問屋破不蔽風雨時如何師曰乾坤翻轉更由誰曰與麼則一衆景仰有分也師拱手而逝壽七十九臘六十二塔靈骨於本山蓮華峰之陽開府大成余公居士字集生法名道裕別號布衲桐城人參博山覩法堂聯密移一步語有省自是決信無疑上山書曰自見和尚後覺向來胸臆雜毒被少分醍醐洗括頓盡歸來硯筆付之祖龍書籍付之㹠犢丈室而外一物不將獨是坐斷十方密移一步粗知奉教而行而長安甚閙我國晏然且喜歸源有路中間自信得力處是去冬解組歸時於凍舟中結八十日不語期所謂佛也沒奈何良然良然若問某甲見箇甚麼開口便自肉麻了也一日與同參持論互相不肯公乃曰我最喜長慶道唯人自肯乃方親同參曰此箇公案被和尚改了也他道唯人不肯乃方親公曰者老漢惑亂人無有了日雪關誾問閉門作活為何事公曰出賣𨍏轢鑽曰補網張風成何用公曰添箇黑撈波曰八卦正位如何排公曰初忌當頭曰路逢猛虎如何避公曰一任𨁝跳曰一條直路如何入公曰巍巍堂堂曰斜街曲巷如何通公曰婆婆和和曰中心樹子如何斫公曰亞交空勞樽爼計曰關津把斷如何過公曰蘇卿元是漢朝臣曰如何是透頂的人公曰腳跟點地曰如何是透底的人公曰鼻孔撩天斷拂老人住雪峰時公問當年真覺大師所遺三箇毬子和尚還是一時用次第用總不用斷拂答以偈曰雪峰毬子總不用死爛蛇頭能活弄次第拈來舉向人眉毛與眼一齊動一時拋出大家看波斯乞命無門縫三轉語酬余石頭莫教磕破人間夢公於是竭力雪峰者無倦容晚嘗與黃元公輩結社究心禪學所著有五燈華行世東苑鏡禪師法嗣江寧府天界覺浪道盛禪師別號杖人閩柘浦張氏子于明萬曆壬辰十二月十六戌時生幼而聰慧天縱性成聞大父坐化輒疑曰此箇靈明向何處去一日街行聞猫聲有省適瑞巖源過浦密投剃落時年二十隨掩關夢筆一日閲百丈再參因緣忽有悟會博山來主董巖往求具戒且問從上佛祖如何行履山曰須從工夫透脫始得師曰佛祖行履豈因工夫耶山曰子且去做到那田地著師辭擬參壽昌道經書林見東苑苑問曾聞博山提唱維摩經否師曰曾聞苑曰彌勒得一生受記作麼生師曰大有人疑著苑曰你又恁麼去師異之圍爐次師舉僧問古德劫火洞然大千俱壞未審者箇壞不壞有云壞有云不壞此意如何苑曰你又恁麼來師遂折節過冬因呈生平所見苑喜一日以偈付之時年丙辰也次年隨苑禮足壽昌昌勘問明驗奇之因問東苑當時答一語和尚便滿口見許若是道盛決不輕易放過昌曰祇如他道和尚莫作怪你作麼生師才啓口昌便劈面一掌師曰也是賊過後張弓昌曰且喜有人喫掌在嗣以臨濟趙州玄沙諸公案詰之師以六頌發明昌頷之戊午昌寂為父兄攙歸浦次年結制羅山冬之興化開法國歡天啓壬戌禮足博山乙亥結制楚之龍湖次主寶筏黃檗丙子繼席壽昌戊寅主匡埠圓通己卯復入楚主芝佛赴荊王請內庭說法庚辰主豫章泰定建安王請說法上藍次應鼓山請冬還壽昌時師年五十矣癸未結制靈谷甲申結制祖堂乙酉住徑山次年結制天界又次年主太平萬壽及無相寺是冬江院王公閲師原道七論謂不應稱明太祖三字坐師獄中師不辨陳大宰命吏省師索偈師為書問豫何事棲碧山笑而不答心自閒桃花流水杳然去別有天地非人間詩遺之宰為嘉甚操江李公過太平特入獄詢其事時當道畢集索七論閲之李公曰此論道書也刻在崇禎年稱明太祖禮也況明亦稱元世祖遂一笑而釋師出略無異色李公顧當事曰禁之無慍釋之無喜非真道人何如辛卯再主萬壽壬辰主攝山棲霞丙申住浙虎跑因得興復崇先坐道場五十餘處語録如之內集三十三種外集三十一種師為人機雖孤峻而性實溫和凡示誨人不豁然則不已故士大夫願就刀尺者比比然皆以道為懷絶無他念不喜索隱形怪不喜別戶分門唯參同是任弘法是職雖屢經患難至死不怠海以內莫不咸尊為宗門巨匠也上堂以如意打圓相曰會麼逈日輪而叶夢夜半正明乘象駕以投機曉來不露天然貴胤才生即指顧稱尊正位青宮初立便紹承大統優曇示現長春之花萼方新寶祚隆膺億代之本枝遠茂紹天地祖宗慧命啓朝廷社稷光輝則且置今當皇太子睿誕辰且作麼生舉揚慶贊永祝千秋同日月常瞻萬壽等乾坤上堂偶向江頭採白蘋閒隨年少賽江神衆中不敢分明說暗擲金錢卜遠人良久曰噫無限相思空自委尋常觸著最難禁上堂雙輪合璧泥牛入海如神五曜經天石馬回途自妙微雲淡河漢秋露滴梧桐路逢達道人不將語默對若有箇漢向者裡發得一笑許他親見歇祖八字打開別施手眼衣被萬化乳育羣英使箇箇遮天蓋地去還會麼夜排月戶清光遠秋拭山稜秀色多上堂十字街頭結制唯有石橛子自肯承當急水灘上白椎祇許竹篙兒全機活脫杖人恁麼舉忽有箇出來捲却席子也好與三十棒且道是賞伊罰伊檢點得出黃頭碧眼剜肉成瘡檢點不出白牯黧奴開眼作夢祇如今日與衆造箇欵端又作麼生巨靈抬手無多子劈破華山千萬重上堂人從賢溪來請擊皋亭鼓䇿杖獨登堂一喝驚古今是誰直下耳聾又誰當央舌吐不勞象骨更拋毬且看玄沙是甚虎巢知風穴知雨動植飛潛各有主電卷星馳龍驤鳳翥者些兒須自許太平一曲韵深長流水高山何足譜示衆石女夜拋梭織錦密彰文彩木人朝結網得魚疾透波瀾相將活計以成家因此勤勞而樂業草野渾忘治象宸廷冥契天然祇如此外還更有向上事也無寒來破衲蒙頭坐醒後敲氷自煮茶小參一二三四五六七萬仞峰頭獨足立翻身撞倒老空王捉敗真贓還呌屈誰見此真贓誰雪此冤屈要識真金火裡看杖頭有眼明如日示衆三七日前釋迦掩室於摩竭三七日內海底波斯嚼生鐵三七日後大家笑龜不成鱉無論是七後七前只要你自奮自烈不有傷人心爭解死冤結說甚為人須為徹殺人須見血若作一場鬼戲徒自捉棒打月問僧甚處來僧曰和尚試定當看師曰野狐精𨁝跳作麼曰情知和尚有此一機師曰苦不是新羅僧便拜師曰村夫喫橄欖閩僧參師問你是延平來的麼曰是師曰交劍潭兩條龍還在否曰不知師曰蚯蚓穿過東海蝦蟆撞倒須彌跂死禪和打瞌睡未曾醒在問如何是常住三寶師曰兩粥一飯曰如何奉持師曰朝看東南晚觀西北問有問石頭如何是道頭曰木頭如何是禪頭曰碌磚此意如何師曰藝壓當行曰或問和尚如何是道作麼生師曰好皮不染皂曰如何是禪師曰好人不倩錢曰此與石頭同別師曰石馬廟前有傘鋪曰不會師曰木屐店在對門開師應機超脫不肯蹈人蹊徑類是己亥歸天界休夏毗盧閣九月四日命移几杖入舊方丈七日起禮佛巡各堂寮舍開示諄諄回室索筆書偈曰萬象指頭明卓異縱擒不換機何利無端拶斷破蒲鞋翻然直入千峰去擲筆而逝塔於棲霞天開巖壽六十八臘四十九鼓山永覺賢禪師法嗣福州府鼓山為霖道霈禪師參鼓山針芥契合親炙三十秋鼓山八旬大慶舉為首座始垂記莂住後上堂庾嶺一鋪功德無量劫來成就今日一回拈出便見光輝宇宙不須雪點紅爐一切萬法仍舊春水盈盈競流春山叠叠挺秀春鳥關關和鳴春樹𦵇𦵇鬱茂若能直下便見即是瞿曇之後更作佛法商量此人却不唧𠺕乃舉拂召大衆曰見麼是大神呪是大明呪擊案下座上堂人人有箇本爹娘如影隨形處處彰無奈衆生自違背今朝突出在中央前是佛殿後是法堂左是廚庫右是僧堂且道中間底本爹娘是何面目良久曰切忌觸諱上堂秋風凉秋夜長未歸客思故鄉拍禪牀曰者裡是甚麼所在切忌開眼尿牀師到南山二勝和尚請上堂賣松風於臘月煞不知時撾布鼓於雷門尤堪捧腹雖然只得將錯就錯向虗空裡打箇筋斗貴得主賓道合正脉流通拈拄杖曰滿口道不出信手拈將來卓一卓曰瞎驢正法眼滅却又重開開後如何良久曰不是我堂頭道兄和尚誰共相委又卓一卓下座上堂今朝十月草二日伐鼓敲鐘衆雲集時節因緣既現前聽取唱箇波羅蜜乃舉拂子召大衆曰君不見又放下拂子曰君不見良久曰呵呵不是知音者徒勞話歲寒上堂菩提本無樹稱錘是鐵鑄明鏡亦非臺光明遍九垓本來無一物千足與萬足何處惹塵埃蓮華火裡開諸人還見祖師麼良久曰清源方舉首紫帽笑咍咍
