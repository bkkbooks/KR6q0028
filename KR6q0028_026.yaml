body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十四世天童一禪師法嗣杭州府徑山呆菴敬中普莊禪師台之仙居袁氏子依天童左菴芟染久之不契出遊參了堂於天寧堂問何來師曰天童堂曰冒雨衝寒著甚死急師曰正為生死事急堂曰如何是生死事師以坐具作摵勢堂曰敢來者裡捋虎鬚參堂去一日室中舉庭前柏樹子話師擬開口堂劈口便掌從此悟入初出世撫州北禪後遷雲居洪武癸酉詔徵天下高行沙門師應詔對揚稱旨是年秋銜命祀廬山禮成詔主徑山僧問如何是雲居境師曰路轉溪回空院靜曰如何是境中人師曰太平時代自由身曰人境已蒙師指示願聞一句接初機師曰無毛子貼天飛問路逢達道人不將語默對時如何師曰達道者方知曰和尚何得干戈相待師曰捉賊不如嚇賊曰明眼人瞞他一點不得師曰情知你不是好心問新到我者裡虎狼塞路荊棘參天上人到來有何忙事曰特來禮拜和尚師曰入門一句則不問腳跟下草鞋甚處得來僧擬議師便喝又問昨離何處曰廬山師曰不勞再勘師嘗勘僧曰近奉公文務要打點上座僧曰某甲不是奸細師曰也須勘過始得曰和尚莫倚勢欺人師展手曰把將公驗來僧擬議師便掌一僧曰久聞和尚有此機要師曰山僧失利一僧問承聞和尚有打點之機是否師熟視曰汝來自首那曰學人掀倒禪牀去也師曰汝是甚處人曰高著眼師曰者依草附木底精靈鏟草次僧問者片田地幾時剗得乾淨師舉起鋤頭曰未審上座喚作甚麼僧無語師拋下鋤頭曰者片田地幾時剗得乾淨問騎虎頭收虎尾中間事作麼生師曰渠儂得自由曰只如古人道我也弄不出意旨如何師曰入水見長人徑山上堂日僧問九重天上承恩澤五髻峰頭據祖關四海禪流齊側耳願聞一曲萬年歡學人上來請師舉唱師曰須彌頂上擊金鐘曰與麼則過量人明過量事太平時唱太平歌師曰毫釐有差天地懸隔曰和尚遠辭京國近到徑山如何是不動尊師曰待盂峰𨁝跳即向汝道曰適聞疏中道千年枯木逢春一代曇華現瑞可謂誠實之言師曰汝用許多心識計較作麼曰龍象筵開當此日等閒掣取錦標歸師曰不是龍門客切忌遭點額僧請益師曰汝自己分上少箇甚麼却來請益僧擬對師曰只知貪程不覺蹉路問如何是祖師西來意師曰盂口向天曰此是古人底師曰老僧用得恰好曰如何是奇特事師曰千年田八百主曰學人不會師曰至今將不去留與老農耕問如何是道師曰木落崖石出曰只如先德云山上有鯉魚井底有蓬塵意作麼生師曰見之不取思之千里上堂舉雲門曰平地上死人無數出得荊棘林是好手時有僧曰恁麼則堂中上座有長處門曰蘇嚧蘇嚧師曰雲門與麼道雲居則不然平地上活人無數入得荊棘林是好手忽有人出來說長說短拈拄杖劈脊便打何故水流溼火就燥禍福無門惟人自召示衆宗師家不得已一言半句無非為學者抽釘楔解粘去縛如善舞太阿自然不傷其手近代據師位訓學徒記持文字崇飾語言誇耀後來增長惡習不知有自己出身路如衣壞絮行棘林中不能自由少林直指之宗於此墜地良可痛傷汝輩行腳各須帶眼莫教墮他網中出頭不得只如古人道入此門來莫存知解若約山僧見處直饒知解頓忘猶是門外漢到者裡須辨緇素始得珍重上堂觸目不會道運足安知路古人與麼道大似勞而無功山僧見處也要諸人共知驀拈拄杖卓一下曰但得雪消盡自然春到來浴佛上堂真佛無形浴箇甚麼毗藍園裡妄見空華雲門令行不到今日驀拈拄杖召大衆曰今日事作麼生昆明池裡失却劍曲江江上撈得鋸卓拄杖下座上堂老僧開荒時於法堂基上掘得一箇鈯斧子久聚兄弟若有用得著者兩手分付若是荷負不去老僧收得來著甚死急不如揚向擸𣜂堆頭從他日炙風吹去也驀拈拄杖卓一下曰鞭起鐵牛耕大地誰能井底種林檎上堂舉盤山示衆心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物洞山曰光境未忘復是何物師曰二尊宿弄物不知各各與二十拄杖不見道見義不為何勇之有冬至上堂舉洞山冬夜與泰首座喫果子次問曰有一物明如日黑如漆常在動用中動用中收不得過在甚麼處坐曰過在動用中洞山令侍者掇退果桌師曰當斷不斷反招其亂若是徑山見他道過在甚麼處便與掀翻果桌亦使旁觀知有宗門爪牙雖然也須腳踏實地始得拈拄杖曰不向藍田射石虎何人知是李將軍卓拄杖下座上堂一迷一切迷一悟一切悟一暗一切暗一明一切明所以道具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即同凡夫凡夫若知即是聖人到者裡塵勞煩惱菩提解脫縛作一塊且道非非想天即今有幾人修因證果拈拄杖曰一年三百六十日一日日從今日始拄杖子亦從今日始卓拄杖曰擊碎三玄三要門普天匝地清風起上堂舉玄沙因鼓山至畫一圓相山曰人人出者箇不得沙曰情知你向驢駘馬腹裡作活計山曰和尚又作麼生沙曰人人出者箇不得山曰為甚和尚恁麼道却得某甲恁麼道却不得沙曰我得你不得師曰玄沙與鼓山難兄亦難弟若要出得者箇總缺悟在雪竇曰只知貪觀白浪不知失却手橈緇素眼何在驀拈拄杖畫一畫曰一把柳絲收不得和煙搭在玉闌干浴佛上堂舉藥山因遵布衲浴佛話師曰藥山能縱不能奪布衲能奪不能縱總未具超宗眼在黃龍南曰二尊宿一出一入未見輸贏三十年後不得錯舉早是錯下名言徑山見處也要諸人共知今日殿中普請浴佛者箇那箇不得動著杓柄到手更莫顢頇擊拂子曰將此深心奉塵剎是則名為報佛恩永樂癸未十月二十三日示寂於不動軒世壽五十八僧臘四十五闍維煙焰所至舍利如貫珠塔于凌霄之陽壽昌源禪師法嗣寧波府天童元明原良禪師寧海周氏子初住瑞巖後遷天童有侑宏智祖塔辭曰嗚呼山不讓塵故能成其高海不讓流故能成其深師非宿備六度萬行之願輪則曷由樹斯大法之功於古今聖人出興作百世師千載一時惟師得之巍巍窣堵鎮茲東谷洞上一宗真規復復昭告菲詞深勒崖谷願師再來為法作則徑山悅禪師法嗣寧波府慈溪定水見心來復禪師南昌豐城王氏子至正壬午祝髮于邑之西方寺走雙徑謁南楚久之乃得證入無何避兵會稽遂主慈溪定水凡廢者煥然一新以干戈間阻不能省母作室于㵎東名蒲菴取陳尊宿義後遷鄞之天寧杭之靈隱舉馬祖遣人送圓相上徑山話頌曰緘回特地謝殷勤海月山雲見處親莫怪南陽太饒舌乾坤誰是不疑人舉僧問馬祖離四句絶百非話頌曰一幅氷綃五色新玉梭巧織鳳池春鴛鴦繡出從君看不把金針度與人舉文殊維摩各說不二法門話頌曰妙喜天中問疾過機先勘破老維摩剎塵常說虗空聽一默相酬早是多舉文殊令善財採藥話頌曰是藥拈來會得麼神方不必問耆婆若言殺活全工巧大地羣生病轉多舉靈雲見桃花玄沙未徹話頌曰盡向長安踏早春紫騮隨處逐芳塵年年歌管東風裡解識桃花有幾人洪武戊申召至京賜食內庭慰勞優渥適建鍾山大會敕師升座說法復命蜀王椿從師問道有答蜀王問參禪法要書一千餘言又答晉王問禪要書五百餘言所著有蒲菴集及蒲菴外集行世靈隱明禪師法嗣杭州府淨慈休菴無旨可授禪師台州臨海李氏子年十二依季父沙門仲智於石門寺十九得度為大僧參普覺於靈隱問答之頃疑情頓釋至正丙戌出世台州安聖閲五年遷隆恩又二年補真如明年行宣政院選主龍華一坐十三夏洪武癸丑杭郡侯命主中竺至則淨慈諸勤舊相與力爭屢却不聽不得已強居二載退臥竹院一日示疾召左右曰吾逝矣左右進觚翰師麾去曰吾宗本無言說泊然而寂世壽六十九僧臘五十火浴齒牙貫珠不壞設利光瑩色如金晶其徒斂諸不壞并遺骼歸龍華塔而藏焉天界信禪師法嗣溫州府江心覺初慧恩禪師久依孚中信信居護龍河上師嘗分座說法後信示寂師出世建業之聖泉次遷永嘉雅山未幾江心虗席牧守請主之所著有三會語録天目本禪師法嗣金華府義烏伏龍無明千巖元長禪師蕭山董氏子年七歲從諸父比丘曇芳於富陽法門院十九剃髮受具戒學律於靈芝會行丞相府飯僧中峰適在座遙見師呼而問曰汝日用如何師曰念佛峰曰佛今何在師擬議峰厲聲叱之師作禮求示法要峰以狗子無佛性話授之縛茅靈隱脅不沾席者三年一日聞聲有省亟往見峰峰復叱之師憤然歸夜靜忽鼠翻食猫器墮地作聲恍然開悟復往質峰峰曰趙州何故云無師曰鼠餐猫飯峰曰未也師曰飯器破矣峰曰破後如何師曰築碎方甓峰乃微笑囑曰善自護持時節若至其理自彰師受囑隱天龍之東菴笑隱主中竺力薦起之宣政院脫歡亦遣使見迫師皆不諾居亡何諸山爭相勸請師度不為時所容遂杖錫踰濤江東至義烏之伏龍山山如青蓮華乃卓錫巖際曰山有水吾將止焉俄山泉溢出作白乳色師遂依大樹以居時泰定丁卯十月也初山有禪寺名聖壽久荒廢師入山鄉民咸夢異僧來遂相率為伐木構精廬尋因舊號成大伽藍朝廷三遣重臣降香錫號佛慧圓鑒普濟禪師并賜金襴法衣僧問如何是祖師西來意師曰野馬入牛欄問如何是佛師曰今日好雨曰如何是道師曰此去義烏不遠問如何是賓中賓師曰當胸叉手問他人曰如何是賓中主師曰堂上坐來日正午曰如何是主中賓師曰有時歡喜有時瞋曰如何是主中主師曰橫按鏌鎁無佛祖問如何是露地白牛師曰草裡臥曰甚麼人騎得師曰無髭鬚鬍子曰三身中那身說法師曰賣油婆子水梳頭曰德山棒臨濟喝意旨如何師曰惡人先做大問如何是和尚家風師曰無力竪拳頭問達磨面壁意旨如何師曰有口開不得問浩浩塵中如何辨主師舉拳示之曰辨後如何師曰你主在甚麼處問釋迦彌勒猶是他奴未審他是阿誰師曰糞掃堆頭破苕帚曰學人不會師曰問取淨頭上堂僧問如何是第一句師曰有口如啞曰如何是第二句師曰有眼如盲曰如何是第三句師曰棒折也未放你在乃擲下拂子曰此是老僧第二句如何是第一句便下座上堂僧問如何是奪人不奪境師曰日照山河影動搖曰如何是奪境不奪人師曰背水陳圓增勇健曰如何是人境俱奪師曰任是鋒刀常坦坦假饒毒藥也閒閒曰如何是人境俱不奪師曰野老不知堯舜力鼕鼕打鼓祭江神僧禮拜師曰有麝自然香何用當風立乃曰轉山河國土歸自己則易轉自己歸山河國土則難拈了也父母未生前道將一句來示衆今朝初一上殿已畢喝囉怛那西方日出示衆舉德山托因緣拈曰末後句子德山巖頭雪峰總跳不出乃喝一喝曰大丈夫當作真王何以假為示衆良久曰大衆會麼會則事同一家不會則萬別千差臨濟道我在黃檗喫六十痛棒如蒿枝拂相似如今更思量一頓誰為下手時有僧出曰某甲下手濟度杖與僧僧擬接濟便打看他的的顯示者些子無你近傍處豈常情所能測老僧尋常痛口罵你痛棒打你你不作無明會便作佛法會又何曾夢見我先祖門風所以古人云臨濟之道將墜于地痛哉正與麼時合作麼生超群須是英靈漢敵勝還他師子兒示衆傅大士曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止分毫不相離如形影相似欲識佛去處只者語聲是玄沙曰大小傅大士祇認得箇昭昭靈靈洞山聰曰且道衲僧家日裡還曾睡也無保寧勇曰要眠時即眠要起時即起水洗面皮光啜茶溼却𭪿大海紅塵生平地波濤起呵呵阿呵呵哩哩哩囉哩三尊宿大似徐六擔版傅大士又俗氣不除若論向上宗乘總缺悟在且道無明具甚麼眼目不見道直須揮劍若不揮劍漁父棲巢示衆今朝臘月二十五雲門一曲曾無譜爭似無明調轉高等閒唱出千山舞大地為琴虗空為鼓拍拍相隨聲聲相助汝諸人須聽取白雪陽春何足數箇中端的孰知音寥寥永夜松風度示衆舉文殊普賢起佛見法見被世尊威神貶向二鐵圍山師曰大衆不起佛見法見還免得貶向二鐵圍山麼世尊也是憐兒不覺醜示衆舉琅琊覺有句無句如藤倚樹樹倒藤枯好一堆爛柴大慧曰作賊人心虗雖然如是恩大難酬師曰一人作佛法商量一人作世諦流布檢點將來總缺悟在無明見處也要諸人共知有句無句如藤倚樹樹倒藤枯響示衆江月照松風吹面面青山展笑眉經有經師論有論師莫怪老僧無法說勞汝諸人立片時示衆一喝分賓主照用一時行要會箇中意日午打三更諸禪德與麼說話四稜塌地了也乃喝一喝曰且道是賓是主是照是用又喝一喝曰只者是賓只者是主只者是照只者是用又喝一喝曰且不是賓且不是主且不是照且不是用是箇甚麼又喝一喝曰進前求解會特地斬精靈示衆龍門水急一句截流茅屋風高千山起浪三世諸佛望風結舌六代祖師斫額有分天下老和尚仰羡不及是汝諸人到者裡作麼生與無明相見驀拈拄杖曰與麼與麼人境俱奪不與麼不與麼照用同時卓一下曰龍生金鳳子衝破碧琉璃喝一喝示衆世尊拈華眼裡撒沙迦葉微笑全身落草達磨面壁皇天苦屈二祖安心老鼠居金德山行棒莽莽蕩蕩臨濟下喝喫鹽止渴僞山水牯泥裡洗土仰山插鍬性命難逃俱胝竪指是何道理雪峰輥毬老不知羞石鞏張弓誑呼盲聾趙州勘婆大有誵訛玄沙未徹話作兩橛者一隊不唧𠺕老凍膿生前鹵莽死後顢頇罪犯彌天髑髏遍野無明忍俊不禁與渠一坑埋却拈拄杖卓一下曰直得十方世界風凜凜地法堂前何止草深一丈汝諸人向甚麼處出氣良久曰擬心湊泊二鐵圍山放之自然七穿八穴復卓一下客至上堂披衣登法座道者是高僧將謂多奇特元來百不能西風吹細雨落葉滿空庭有客來相訪青山自送迎日本國請法衣上堂舉石門聰曰西天二十八祖盡得傳衣付法東土六祖之後得道者多只傳其法不傳其衣無明則不然衣以表法故謂之法衣人能弘道故謂之法身無處不遍無處不明故謂之法眼高峰老祖法衣一頂今日對衆請與高麗國金剛山供養去也幻住先師法衣一頂我得來三十年矣如今大拙首座又要請歸供養雖然如是從上諸祖各各有三十棒分無明亦有三十棒分衆中莫有下得者般毒手者麼有則出來如無他時後日不得向背地裡呌苦呌屈擊拂下座元順帝至正丁酉六月十四日示微疾沐浴更衣集衆說偈曰平生饒舌今日敗闕一句轟天正法眼滅奄然而逝世壽七十四僧臘五十六弟子用陶龕奉全身瘞于青松菴諡佛慧鑑禪師蘇州府師子林天如惟則禪師吉安廬陵談氏子受業禾山得法中峰住後僧問佛佛授手祖祖相傳畢竟傳箇甚麼師曰腳未跨門與你三十棒了也問達磨不來東土二祖不往西天還有為人處也無師曰有曰如何是為人處師曰浴院裡燈籠笑破半邊口曰莫便是學人轉身處麼師曰上天無路入地無門曰今日多幸得聞師子吼也師便喝僧禮拜師曰拜則任你拜者一喝不曾倒地在問如來一音演說法衆生隨類各得解未審和尚如何為人師曰蝦蟆𨁝跳上天蚯蚓驀過東海曰恁麼則超佛越祖去也師曰你向那裡見得曰今古應無墜分明在目前師曰杜撰禪和華嚴會僧問無邊剎境自他不隔於毫端既有自他如何不隔師曰懷州牛喫禾益州馬腹脹曰十世古今始終不離於當念既有始終如何不離師曰天下覓醫人灸猪左膞上曰此會翻宣教典毋勞說禪且望和尚直談教文師曰山僧無兩箇舌頭曰一真法界十種玄門還有自他終始也無師喝曰那得許多骨董來曰既無許多骨董畢竟華嚴所說何義師曰說華嚴曰離却法界玄門華嚴經在甚處師曰在你諸人手裡曰與麼則信受奉行去也師曰贈你三文買草鞋問德山小參不答話問話者三十棒意作麼生師曰我者裡不打有問即答曰無法可說是名說法又作麼生師拈棒僧便走師曰作賊人心虗問禪門一派分為五宗其間還有優劣也無師曰五五二十五曰臨濟一宗兒孫遍地他有何長處師曰細魚咬斷鸕腳白鷺驚飛上樹梢曰涅槃心易曉差別智難明五宗異同請師開示師曰退身三步示衆趙州道箇無字開口見心肝因甚諸人自生障礙有僧請益曰蠢動含靈皆有佛性為甚狗子獨無師曰莫說狗子直饒你問他釋迦彌勒還有佛性也無他也道無僧曰趙州禪在口唇邊因甚只會道箇無字師曰趙州見處只到者裡僧曰和尚不肯趙州那師曰是僧曰趙州是古佛因甚不肯他師曰趙州在那裡隨後便喝示衆諸方有海蠡禪海蚌禪鐵剗禪老僧者裡却似水上葫蘆觸著便動捺著便轉活鱍鱍地無你奈何處昨日一陽來復見說生根了也諸人為我提起看示衆有時伸出佛手有時放出驢腳錯有時拍禪牀有時擊香桌錯有時舌生毛脣生醭拄杖長年靠壁角臨濟德山鼻孔一時穿却錯諸禪德向者三箇錯處認得老僧請你喫無䬪飥示衆臨濟大師道我者裡是活祖師西來意一切臨時要用便用遂拈拂子搖曳曰我者裡也是活底要用便用一切臨時且道與臨濟底是同是別擊一擊擲下曰臨濟大師猶缺者一著在示衆佛祖行不到處行取一步佛祖說不到處說取一句召衆曰一鋪是九里三鋪草七里者箇是佛祖行不到處老僧行到今日初三明日初四後日初五者箇是佛祖說不到處老僧說到喝一喝曰寧與有智人廝罵莫與無智人說話示衆舉譬如牛過窗櫺頭角四蹄都過了惟有尾巴過不得師曰者箇是東山演祖不了事處老漢參方三十年也有兩件不了底事是甚麼兩件事饑來要喫飯困來要打眠示衆跛者命在杖渡者命在舟有來由沒來由一身還有一身愁衲僧門下奪食驅牛擬著眼看便與閉却戶牗擬開口道便與塞却咽喉夜廊無月不點火露柱從教撞破頭示衆慈悲不是佛忿怒不是魔明州布袋橫拖竪拖人人自屎不覺臭淨潔地上正好放屙金窠草窠相去幾何歲寒落葉無人掃一任門前堆積多示衆天如老漢一箇呆僧爭奈諸人認他不著道他卓卓巍巍他却藞藞䕢䕢道他藞藞䕢䕢他又卓卓巍巍或時做善知識模樣談玄說妙或時現三頭六臂發瞋發惡如是等處一一認他不著殊不知老漢不在諸人眼睛裡却在諸人鼻孔裡諸人不信伸手摸看總饒摸他不著也摸著自家鼻孔示衆舉臨濟道我在黃檗先師處喫六十痛棒如蒿枝拂相似師曰好箇頑皮癩骨不知痛癢底粗漢何似近代兒孫箇箇皮下有血動著他絲毫不得也奇哉示衆舉百丈野狐因緣師曰前云不落後云不昧引得野狐隨群逐隊喝當時若下得者一喝前後五百生一時粉碎示衆釋迦老子推不開達磨大師趕不出引得一畝之田三蛇九鼠盡道呼蛇易遣蛇難拍膝曰有甚麼難家有白澤之圖必無如是妖怪示衆女子臨出嫁時治家作活之法一一請教父母惟有生子養子不待教而自能所以俗書曰未有學養子而後嫁者也誠哉近代宗門衲子則不然先學說法然後學做佛寧可不做得佛不可不會說法怪哉師不領院事居恆隨機開導行省平章咸稽顙執弟子禮屢起浙江諸名山堅却不赴遁跡吳淞間弟子就吳中構地結屋如叢林規制名師子林居十有三年道價日振元至正甲午帝師錫以佛心普濟文慧大辨禪師號兼賜金襴法衣示寂後塔于水西原日本國建長古先印原禪師本國相州藤氏子藤為國中貴族師生有異徵年十三父母頓捨出家航海南詢初謁無見于天台見指參中峰峰命給侍師屢呈見解峰呵之曰根塵不斷如纏縛何師退而悲泣食寢俱廢峰憐其誠因語之曰此心包羅萬象迷則生死悟則涅槃生死之迷固是未易驅斥涅槃之悟猶是入眼金塵當知般若如大火聚近之則焦首爛額惟存不退轉一念生與同生死與同死自然與道相符脫使未悟千釋迦萬慈氏傾出四大海水入汝耳根總是虗妄塵勞皆非究竟師聞悚然汗下一日有省趨告峰曰印原撞入銀山鐵壁去也峰曰既入銀山鐵壁來此何為師釋然領解峰因囑曰善自護持復參虗谷陵古林茂東嶼海月江印諸老咸以師子兒稱之會清拙澄歸國載師同返遐邇欽敬初出主甲州之慧林歷遷八剎後住相州之建長一日示疾謂侍者曰時至矣可持觚翰來乃曰吾塔已成未書額耳大書心印二字端坐而逝時甲寅春正月也初門人欲畫師像預索讚語師作一圓相題其上曰妙相圓明如如不動觸處相逢是何面孔世壽八十僧臘六十七般若誠禪師法嗣建寧府高仰山古梅正友禪師貴溪丁氏子依末山本受業後參絶學發明宗旨流寓江淮垂三十年入閩初主南浦之天心泰定甲子建陽簿蔣德懋洎長者陳益宗捨園作菴迎師開山敕額大覺妙智室中每舉狗子無佛性話鉗錘勘不少假借結制上堂仰山結制尋常活計眼裡放光鼻孔斢氣遇饑而餐遇困即睡諸方撒土揚沙高仰心空及第解夏上堂九旬禁足特地成錯三月安居無繩自縛布袋解開乾坤寥廓放去若龜毛收來懸兔角試將兩眼挂虗空一陳凉風生殿角上堂九旬禁足又過一半心地未明如牽火鑽光陰莫虗度了却閒公案平地無端捉得賊老僧出來為汝斷小參月落山頭慘雲橫谷口陰欲明生死事直見本來人還有會得本來人底麼良久曰夜靜不勞重借月玉蟾常挂太虗空師生於元至元乙酉寂於元至正壬辰說法二十九夏住世六十八秋全身塔于本山智者義禪師法嗣杭州府淨慈德隱普仁禪師蘭溪趙氏子年十歲依寶石秋潭受業十四祝髮二十參方時了然義弘道智者寺師往叩機鋒觸發旋命侍香復見南楚於雙徑分座說法至正乙未出世西峰淨土戊戌明高帝親帥六師至婺州幸智者寺詔師主之甲辰遷淨慈一日示微疾屈指計曰今夏五月矣左右曰然師曰八月八日最良吾將逝矣至期整衣端坐而逝世壽六十有四僧臘五十有山居詩三會語録行世淨慈林禪師法嗣杭州府止菴德祥禪師本郡人與同菴俱為平山嗣德業風雅為時賢所重一日將涅槃衆請說偈師忽倚座曰者一隊噇酒糟漢我爭如你何竟趨寂江寧府天界同菴易道夷簡禪師洪武戊午主南屏淨慈兵燹之餘殿堂鐘鼓為之一新父子繼席傳為盛事二十五年壬申奉旨主大天界寺海門則禪師法嗣湖州府辨山白蓮南極懶雲智安禪師嘉興沈氏子出家海寧淨妙謁天真發明別傳之旨韜光晦迹交聘不赴晚居辨山之白蓮示衆萬法歸一無孔鐵鎚當面擲一歸何處抹過西天並此土青州布衫重七斤寒巖古木璚華春仁者殷勤問端的娘生鼻孔從來直倘然言下解知歸九九方明八十一後退歸淨妙示寂塔于辨山之南阡所著有南極語要華頂覩禪師法嗣處州府白雲福林智度禪師麗水吳氏子年十五從禪智寺空中假剃染習定楞伽菴越數夏出遊七閩旋還里之白雲築室以居曰福林後參靈石芝於淨慈謁斷崖義於西峰俱不契聞無見說法華頂往叩之曰西來密意未審何如見曰待娑羅峰點頭却與汝道師擬進語見便喝師曰娑羅峰頂白浪滔天華開芒種後葉落立秋前見曰我者裡無殘羹餿飯師曰此非殘羹餿飯而何見頷之遂服勤數載辭去見囑以大法師佩服之復往長沙見無方普雲居謁小隱大至正甲午還福林尋主龍泉之普慈移茆山遷武峰明洪武己酉詔徵天下高僧建法會蔣山師應詔事解嚴還至杭居虎跑秋趨華頂明春示微疾仍回福林五日忽沐浴索筆書偈曰無世可辭有衆可別太虗空中何必釘橛擲筆而逝壽六十七臘五十三闍維舍利五色齒牙數珠皆不壞建塔瘞於西院天童砥禪師法嗣寧波府大梅護聖無作文述禪師明之慈溪人幼不御不潔讀書入口成誦子史百家無不遍覽一日閲佛書忽心融神會如素習者白父母從東溪牧落髮就大用諿具戒首參元叟東嶼皆以器許之然不自許可遂入天童見怪石與語契合典藏鑰甚得深旨出世住鳳躍山等慈寺次遷大梅為衆說法脫略窠臼一時名緇奇衲風靡而至帝師錫以覺智圓明號後歸老福昌而士夫名宿益勤過從焉年七旬畏煩退居花嶼湖居恆臨衆甚嚴至接賓則又津津然喜見眉目示寂於元皇慶癸丑九月也
