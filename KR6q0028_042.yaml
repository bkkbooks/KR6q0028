body:
  text: 南海普陀嗣祖沙門西蜀性統編集補遺台州府天台山上雲峰無盡祖燈禪師四明王氏子初見口溪詠於天寧繼參方山寶師資契合尋卓錫上雲峰影不出山者五十載洪武己酉二月八日示微疾夜將半顧左右曰天向明乎曰未也或曰和尚正當此際何如師破顏笑曰昔德山坐疾僧問還有不病者麼德曰有僧曰如何是不病者德曰阿㖿阿㖿恁麼喚作病得麼衆無語師曰色身無常早求證悟時至吾去矣侍者執紙乞偈師曰終不然無偈便未可死耶侍者請益堅乃書曰生滅與去來本是如來藏拶倒五須彌廓然無背向投筆端坐而逝瑞巖寶嗣大鑑下第二十三世太原府臺山妙峰福登禪師山西平陽徐氏子從蒲州萬固朗出家有願行普賢行始於讚嘆寺立禪三載遇異僧指示曰普賢行乃潛行密用調一切心非勞筋苦骨之謂也師遂南遊金陵參雲谷谷拈念佛是誰話令參同憨山清北游參遍融圓嘯巖寶大千潤諸公萬曆初再參大千於少林一日請益千曰九年面壁坐耶非坐耶千曰坐不坐兩頭語須知旋嵐偃嶽就中原自不遷師不解問憨曰物不遷耶憨曰諸法元無去來遷箇甚麼師有省隱居臺山獲文殊摩頂授記豁然大悟道望隆重至有猛虎引路菩薩送燈建橋梁修梵剎功行多不及録神宗夢師像徵赴京賜紫衣師號示寂塔於臺山敕封真正佛子佛巖際嗣大鑑下第二十三世夔州府白馬寺儀峰方彖禪師達州羅氏子參金佛山雲菴菴令看如何是鬼神不破之機三年有省出峽遍謁知識結茅雙溪一日午炊聞甑作聲大悟作頌曰三玄三要沒來由用盡機思無處求驀地一聲何所作白雲青峰齊點頭齊點頭南嶽天台輸一籌又曰二八女子嫁新郎續麻捻線一如常稱家豐儉隨時過懶插堂前一炷香嘗游浙居杭之清平山聞谷印嘗依之一日師舉青峰丙丁童子來求火話詰之曰青峰恁麼道法眼亦恁麼道為甚麼有悟不悟印曰初以識心湊泊所以不悟後乃直下承當故能大悟師遽舉拳揮案厲聲曰恁麼則汝今大悟耶印擬議師便痛罵趂出印直得汗流夾背繇茲憤志力參萬曆壬辰師歸白馬僧問如何是西來意師曰兩頭燒火一頭煙師手中常執一鼗鼓一面書矗字一面書奔字凡應機多舉而搖之示寂塔於龍神山佛巖際嗣大鑑下第三十三世杭州府苕溪真寂聞谷廣印禪師別號掌石嘉善周氏子父珊母趙氏夢神率甲士護門覺而生師兒時左眼角常有塔影父命習儒不願乃送杭開元剃染一日指法界圖問其師曰十界從心生心從何處生師不能對時儀峰結廬清平山師往參理前問峰曰汝要會須從妙悟始得乃令看雲門露字久之閲七賢女遊尸陀林話忽有省見峰峰舉丙丁童子來求火話詰師曰青峰法眼一般恁麼道為甚有悟不悟師曰初以識心湊泊所以不悟後以直下承當乃大悟也峰舉拳揮案厲聲曰恁麼則汝大悟耶痛罵驅出師直得白汗夾背自是益力參年二十四會峰還蜀師乃秉具雲棲次謁無幻單丁法華山禁足白雲峰下共十年於亮座主參馬祖因緣未決一日覩黃瑞香花忽大悟述偈曰却是虗空講得經碌磚瓦礫正堪聽向來扭揑娘生鼻錯認葫蘆作帝瓶於是出山圓戒雲棲因深得雲棲之至到龍池適池負暄階下師曰和尚在那裡池曰恰好不在師便作禮池携手入坐定池曰昨日上堂舉黧奴白牯話進語者皆不愜老僧意子試道看師矢口曰三世諸佛不知有黧奴白牯却知有從來迷悟不相干如何教他出得手池又舉托話令頌師頌曰末後句有也無德山父子太誵訛同條生不同條死活得三年恨轉多池喜甚師辭行池門送驀詰曰如何是密啓其意師曰今日不打宜興轉池呵呵大笑師便行於是首衆坐禪徑山連居永慶諸處萬曆壬子興復真寂戊午退隱楚之黃安建之寶善晚復歸真寂示衆徑山啓此禪期要你人人領荷須知本自圓成實無功夫可做六門晝夜放光照徹山河萬朵更欲直下承當豈止全身話墮雖然覓他不著却又同行同坐眉毛祇在眼上饅頭定是麵做直饒體貼得來早是覿面錯過老實告報諸兄泥多自然佛大汝若再要如何看取老僧下座戒壇示衆諸大德戒是何物受者是誰會須從苗辨地見水知源始得祇如世尊拈花迦葉微笑當恁麼時且道有言說無言說若道無言說孤負世尊若道有言說曾說箇甚麼來向者裡開得一隻眼放出大光明方明得究竟尸羅無作梵行於身無所取於修無所著於法無所住三世悉空寂無作業者無受報者此中何法名為梵行尚不見有身心孰為持犯所以高沙彌道長安雖閙我國宴然大珠道身口意清淨是名佛出世身口意不淨是名佛滅度是則定共道共有作無作離心則別無有矣諸大德盲龜值木際遇實難在當發希有想生歡喜心勇猛堅強必在此席發起無作妙善戒體庶於順逆境界若身若心任運不犯而五分法身當從茲建立矣對曹安祖大參靈小參無有涅槃佛亦無佛涅槃以證無生者未始有生死而亦同夫生死者也於戲公以預知緣盡灑然長往且道是生耶死耶五十年剎那一夢延耶促耶曹居士惺惺著你向來參詳博問息慮安禪所求者為何事還記得麼靈山有一機少林無半語覿面露堂堂分明為君舉會不會清風拄杖頭知不知白雲千萬里伏惟珍重除夕小參欲識佛性義當觀時節因緣即今是年盡月盡日盡之時正是智窮力竭處者裡雖轉輪天帝不能用其威福可不懼哉祇如遷上人昨日尚語笑歡呼今日向甚處去也不可道本自不生今亦無滅必須討箇真實落處始得若是生不知所從來死不知所從去必須奮起新鮮意志定不似今年因循仍前錯過將箇本參話頭頓在胸中生與同生死與同死直待打破漆桶那時出來方好道生也不道死也不道為甚不道不道不道還會麼風光人不覺已入後園梅參舉玄沙答僧我是謝三郎話頌曰月滿蘆花雪滿舟小舠輕泛自悠悠金鱗忽向波間躍拋下絲綸用直鈎牧牛頌雙泯曰杳杳人牛不見踪一團秋月炯高空可中若問還源旨風落巖花點翠叢有答古岑嶧四問語答六觀十問語答志西二問語答心城五問語答心涵灜六問語皆精妙入神非過量人不能有此崇禎丙子臘月十七示寂塔全身於孔青山之陽壽七十一臘五十八白馬彖嗣大鑑下第三十四世韶州曹溪憨山德清禪師字澄印全椒蔡氏子七歲見叔母生子又見叔死即抱生死去來之疑年十二禮南京報恩寺西林寧公為師時嘉興雲谷會住棲霞報恩師執侍甚勤谷開發悟明心地師即請西林剃落盡燒所習外學謁無極受具聽講華嚴玄談有省乙丑谷結禪期於天界舉師入堂示以向上巴鼻辛未辭谷北遊谷曰吾之大法在汝肩頭慎勿容易邸中閲物不遷論至梵志出家頓了旋嵐偃嶽之句生死去來之疑乃作偈曰生死晝夜水流花謝今日乃知鼻孔向下乙亥禮文殊結茅五臺之龍門匡山徹空雲棲蓮池相繼入山與師語契辛巳仲冬慈聖皇太后為神廟建祈儲道場於五臺大塔寺百有二十二日師與妙峰主其事壬午八月光廟誕生癸未春遁居東海牢山恢復那羅延窟慈聖再徵不得甲申乃得師輒賜內幣師倣古矯詔賑饑事以賑山東民丙戌慈聖頒藏經布金造寺賜額海印丁亥工竣即開爐鞴己丑請藏至南京報恩感寶塔放光乙未方士流言侵攘逮赴詔獄按驗無實坐以私創寺院戍雷州衛道出江西鄒元標迎至鐵佛菴與師一語投契頓翻前案丙申禮六祖抵戍寓城西坡公亭雷州饑癘師收埋骸骨萬計建盂蘭會說幽冥戒天大雨癘隨止戊戌修曹溪通志戒靈通侍者酒歸侵田斥僦舍屠門酒肆皆為寶所大鑑之道勃焉中興雲谷會嗣大鑑下第三十二世洪都翠巖古雪真禪師甌寧陳氏子生萬曆甲寅父之奇為邑庠生嘗謂人曰吾先代多好善樂施後世子孫必有起者觀此子沉潛溫敏動止有則似非常兒可比因名國賓稍長隨父讀書山寺喜聞梵唄之聲年十六矢志出世投黃巖體空剃染一日閲中峯警䇿歌恍然自得即事遍參首謁覺浪盛嘗疑青州布衫話次參天童相見次便問向上一路千聖不傳棒喝交馳合明何事童便打師曰明知生是不生之法為甚被生死之所流轉童打云還知麼師曰便恁麼去時如何童曰賺殺闍黎由是死心座下執侍者事每請益童唯大棒打出二六時中猶如木人日則隨衆作息夜則倚柱為牀尋出山參雪嶠永覺雪關爾密諸老皆蒙器重久之復還天童童屢勘驗知其見諦穩密喜曰汝今方作得老僧侍者未幾出住洪都翠巖遷建寧黃巖白法建州佛頂所在法席稱盛上堂佛祖頂𩕳一機佛祖罔測天人腳下一著天人莫知沒蹤跡處萬象䙕然正見聞時纖塵不立所以道聖名凡號總是虗聲殊相劣形皆為幻色若是大丈夫漢有殺人不眨眼底作略直下承當便可橫揮寶劍獨據寰中截斷葛藤掀翻窠臼二六時中壁立萬仞見佛見祖如生冤家偶然道箇佛字漱口三日特地說箇受戒掩耳而趨到者裡聖解尚不生況復更隨世間喜怒哀樂殺盜淫妄貪瞋癡等習氣所轉所以道幾回生幾回死生死悠悠無定止自從頓悟了無生於諸榮辱何憂喜且道如何是無生底句寶山一寶親披露遍界騰輝不染塵上堂今朝臘月十五屋角梅花正吐長連床上衲僧承當切忌莾鹵不莾鹵焦尾大蟲原是虎喝一喝小參若論此事譬如野火燒山一般星星之火順風一吹縱使萬壑千峯枯枝腐草一時鞠為灰燼且道燒盡後如何青山依舊白雲中小參一期曾未竟心識已紛飛壁角抄方語閒房話別離曲談猶夢夢直指謾孜孜珍重參玄客精神莫浪施問如何是死句師曰嘉州大象陝府鐵牛如何是活句師曰陝府鐵牛能哮㖃嘉州大象念摩訶問如何是藏身處沒蹤跡師曰月落潭無影如何是沒蹤跡處莫藏身師曰雲生山有衣問趙州道佛之一字吾不喜聞是如何師曰一翳在眼空花亂墜問丹霞燒木佛意旨如何師曰因風吹火用力不多院主眉鬚墮落又作麼生師曰不因夜來雁爭見海門秋密雲悟嗣大鑑下第三十五世王臣附宋太宗帝一日幸相國寺見僧看經問曰是甚麼經僧曰仁王經帝曰既是寡人經因甚却在卿手裡僧無對雪竇代云皇天無親唯德是輔幸開寶塔問僧卿是甚人對曰塔主帝曰朕之塔為甚麼卿作主僧無對雪竇代曰合國咸知一日因僧朝見帝問甚處來對曰廬山臥雲菴帝曰朕聞臥雲深處不朝天為甚到此僧無對雪竇代云難逃至化僧入對次奏曰陛下還記得麼帝曰甚處相見來奏曰靈山一別直至如今帝曰卿以何為驗僧無對雪竇代曰貧道得得而來京寺回祿藏經悉為煨燼僧欲乞宣賜召問昔日摩騰不燒如今為甚却燒僧無對雪竇代曰陛下不忘付囑帝嘗夢神人報曰請陛下發菩提心因早朝宣問左右街菩提心作麼生發街無對雪竇代曰實謂今古罕聞智寂大師進三界圖帝問朕在那一界中寂無對保寧勇代曰陛下何處不稱尊一日朝罷帝擎問丞相王隨曰既是大庾嶺頭提不起為甚麼却在朕手裡隨無對宋徽宗帝政和三年嘉州巡補官奏本部路傍有大古樹因風摧折中有一僧禪定鬚髮披體指爪繞身帝降旨令肩輿入京命西天總持三藏以金罄出其定遂問何代僧曰我乃東林遠法師之弟名慧持因遊峩嵋入定於樹遠法師無恙否藏曰遠法師晉人也化去七百年矣持不復語藏問師既至此欲歸何所持曰陳留縣復入定帝製三偈令繪像頒行偈曰七百年來老古錐定中消息許誰知爭如隻履西歸去生死何勞木作皮藏山於澤亦藏身天下無藏道可親寄語莊周休擬議樹中不是負趍人有情身不是無情彼此人人定裡身會得菩提本無樹不須辛苦問盧能有官人入鎮州天王院覩神像因問院主曰此是甚麼功德曰護國天王曰祇護此國遍護餘國曰在秦為秦在楚為楚曰臘月二十九日打破鎮州城天王向甚處去主無對黃山趙文孺居士有偈曰妄想元來本自真除時又起一重塵言思動靜承誰力仔細看來無二人金華府義烏文獻黃潛居士字晉卿元天曆年詔天下僧儒善書者集杭州淨慈泥金書大藏經士亦預焉每食必與衆僧共有別為治具則不樂不食而去嘗題懸崖墨蘭曰嫋嫋春風一樣吹託身高處擬何為從他自作顛倒想要見懸崖撒手時又題東坡像曰五祖禪師世外人娑婆久已斷生因誰將描邈虗空手去覓當年身外身題山谷像曰笑殺當牛老晦堂相逢剛道桂花香披圖面目渾依舊鼻孔何曾有短長士以文章名世蔚為一代儒宗以其造詣入微不覺冥符聖意況與僧雜處不肯自異亦可尚矣建康府待詔沈士榮居士洪武中為翰林院待詔嘗著續原教論辨解一十四篇其論略曰人之為類不同故聖人之教不一此教之迹所以異也然為善不同同歸於治窮其至妙不出一心此教之理所以同也此心也此理也天下未嘗有異也迹之雖異若推而極之必當致其同也又曰若得本忘末不為迹之所惑研窮心性之原直趨至善之地則殊途同歸無有彼此之間矣又曰是心也變而不動死而不滅斯理之明昭如皎日且安得而自蔽歟若人識此心悟此理在儒為真儒在僧為聖僧矣心昏理迷莫知所往本之既失諍論復何益哉又曰儒者志在排佛故作人死斷滅之說以破生死輪回之論不知反違周孔聖人之意甚則撥無因果廢滅天理以造物歸於無知善惡皆無果報至仁夭暴壽敬慎蒙禍淫佚獲福小人僥幸君子無辜不明前因曲為之說理則不通障正知見惑亦甚焉又曰自漢以來經書迭至究其指歸誠所謂窮心性之原入至善之地者也又非但文字而已至如日月雲霞飛潛動植色聲香味而咸臻妙理此教之體也得失違順生死苦樂事物遷流而常住真性此教之相也文音語默食作動息威儀典章而隨機普應此教之用也具是三者其道大行矣孰能排而毀之拒而絶之乎智者體吾佛之理觀孔聖之道性理之學益加詳焉而勸善戒惡之文尤為緊切大有功於名教豈可自生違背蔽吾心之良知也哉其觀心解略曰心該萬法法徹心源至理難知觀心斯得故世尊初成正覺嘆曰奇哉我今普見一切衆生具有如來智慧德相但以妄想執著而不能證得蓋人由迷此心體不知反求外為六塵所惑內生沉掉二病是以局促無知偏僻異見唯佛如來返觀此心頓悟本性成等正覺故於世間無量百千法門出世間無量百千法門莫不洞明無礙廓徹無違故號三界大師十方慈父今儒者尚不自識本心豈能以心觀物哉又曰蓋不識自心則其本已失安能觀物明理哉又曰虞書曰人心惟危道心惟微惟精惟一允執厥中者此心學之源也人心妄想也由執著顛倒故危道心天理也非思議之所能及故微精者不昧一者不雜由無思故不昧無為故不雜乃能盡其至誠固守此中道也中者即中庸之中在心而不在物在內而不在外子思所謂喜怒哀樂未發者是也子思但以情識未動即是中義與吾佛一念無生之理相近止缺悟耳儒者釋中曰不偏不倚無過不及乃已發中節之和也便違子思之意矣蓋喜怒哀樂未發之時無有形相可見豈有偏倚過與不及之事乎又曰彼既不知觀心之妙徒欲以遍計之妄心觀物以窮理譬如塵鏡未磨水漩未止擬求鑒物未之有也自不知此理在內惟務外求故學解益多去道愈遠矣又曰一日觀心證理則天下萬物萬事之理皆貫通焉夫子亦曰一日克己復禮天下歸仁焉則亦求其在內者矣其內教外教辨略曰教有內外不同故造理有淺深之異求之於內心性是也求之於外學解是也故心通則萬法皆融著相則目前自昧嗚呼外求之失斯為甚矣今儒學之弊浮華者固以辭章為事純實者亦不過以文義為宗其視心學則皆罔然也宋之大儒深知其病又知吾心上工夫為有本是當敦本抑末以斥其言語文字之非可也何自為矛盾歟又曰昔者聖人皆以內學為本而推其用於外後世文儒務外遂不知有心學之源乃以學解為事惟宋河南之學始言性理而有實踐之跡然但知心之用而不究心之體遂不知養未發之中又昧太極之理在兩儀未判之先或以物理為性理故本末體用於是乎不明而堯舜周孔之道微矣又曰悟則謂之內解則謂之外此內教外教所以不同也儒者專用力於外凡知解所不能及者不復窮究故不知允執厥中之道天理流行之處皆在思慮不起物欲淨盡之時履踐雖專終不入聖人之域矣其作用是性解略曰大覺無思乃遍知於世界識情有著徒妄起於塵勞佛與衆生本同一體但因迷悟見有殊途佛性只在眼耳鼻舌之間妙用不離見聞覺知之際直是一塵不受一法不舍名為直至道場頓見本來面目又曰經云如我按指海印發光汝暫舉心塵勞先起若無心體會則森羅萬象一鑑昭然此按指發光所謂一念不生全體現也若說是性即是認著影子使毫釐繫念瞥爾情生業相宛然仍前迷倒此舉心塵起所謂六根才動被雲遮也到此著力不得又曰三代而上未有佛可名惟聖帝繼天立極推本於天言人得此明覺知理於天故曰天命之謂性性者言人皆以此明覺為體也率依此覺性而常不昧謂之道修者即養其喜怒哀樂未發之中也中者私欲未起之時純乎天理者也私欲未起則無思無為寂然不動寂者誠也至誠無思故曰道不可須臾離也繼之以戒謹恐懼不覩不聞之際不使隱微之或動皆是養此未發之中常覺不昧故發為中節之和則仁義禮智不待思而中矣斯所以為教後章言誠者寂也明者覺也寂而覺曰天之道覺而寂曰人之道皆修道之義也又曰聖人得此理乃立世間治教之法吾佛得此理乃立世間出世間解脫之法儒門但明天人之道吾佛則明四聖六凡之道若盡天人之道則可以趨佛道矣其於性理不明則天人之理有所不明又安能究佛氏之理乎士識遠材全深達法相議論縱橫無礙剖發幽覗直明心宗而辭旨尤善巧精妙其曰續原教亦可謂克纘鐔津之緒者哉鑷工張生諱德鄞之下水人世為大慈供堂隨衆聽法有省值大雪有團雪作佛形像衆皆述偈生亦隨占一偈曰一華擎出一如來六出團團笑臉開識得髑髏元是水摩尼宮裡不投胎
