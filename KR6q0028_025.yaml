body:
  text: 南海普陀嗣祖沙門西蜀性統編集臨濟宗大鑑下第二十三世天目玅禪師法嗣杭州府天目中峰明本禪師錢塘孫氏子母夢無門開道者持燈籠至其家覺而生師神儀挺異具大人相喜跏趺能言即歌梵唄凡嬉戲必為佛事九歲喪母十五決志出家甫冠閱傳燈至菴摩羅女問曼殊明知生是不生之理為甚麼却被生死之所流轉有疑已而往參高峰峰孤峻嚴冷不假辭色見師獨懽然許為祝髮一日誦金剛至荷擔如來處恍然有解時年二十有四當至元丙戌明年從高峰薙染又明年受具戒未幾觀流泉有省詣峰求證峰為打趂出既而民間譌傳官選童男女師因問忽有人來問和尚討童男女時如何峰曰我但度竹篦子與他師於言下洞然徹法源底峰為書真贊付師曰我相不思議佛祖莫能識獨許不肖兒得見半邊鼻或問高峰諸弟子優劣峰曰若初院主等一知半解不道全無如義首座固是莖老竹其如七曲八曲惟本維那却是竿上林梓楠他日成材未易量也迨峰遷化師領院事以王臣問道為煩因謝事遨遊江湖或船或菴居無定處咸榜曰幻住仁宗聘召不至賜金襴袈裟并佛慈圓照廣慧禪師號復敕師子禪院為師子正宗禪寺時宣政院虗靈隱徑山待師師皆不就先是駙馬太尉瀋王王璋當遣人問法以為未足復請旨親賷御香入山參謁師為陞座普說英宗特旨降香賜金襴伽黎師每斥學者但尚言通不求實悟甞示眾曰今之參禪不靈騐者第一無古人真實志氣第二不把生死無常當做一件大事第三拌捨積劫以來所習所重不下又不具久遠不退轉身心畢竟病在於何其實不識生死根本故也夫根本者性真圓明本無生滅去來之相良由不覺瞥起妄心迷失本源虗受輪轉以故道迷之則生死始悟之則輪迴息葢根乎迷而本乎妄也當知山河大地明暗色空五陰四大至於動不動法皆是生死根本若不曾向真實法中脫然超悟更於悟外別立生涯別存窠臼豈堪向生死岸畔劄脚纖毫不盡未免復為勝妙境緣惑在那邊起諸異想雖曰曉了其實未然惟有痛以生死大事為己重任者死盡偷心方堪凑泊儻存毫髮許善惡取捨愛憎斷續之見則枝葉生矣可不慎乎示眾瞻在前忽在後竹雞晝啼華鯨夜吼未了聽一言如今誰動口嗟夫學人將此一等言句作箇相似底道理商量把自家一片潔白田地添者般野狐涎沫點污了也却不思古人開口處如大火聚如大風輪無你湊泊處又如吹毛劍等閒拈出直要斷人命根此豈可以心意識卜度而為得哉若然則阿難不假再修二祖不勞斷臂何則彼阿難二祖聰慧過人意識明了如汝所解者彼豈未聞耶葢是心不妙悟則見地不脫若見地不脫則動是情意識輥作一團在處依草附木承虗接響致使上味醍醐蘊在不淨器中變成毒藥一切時中如箇不解脫鬼相似見人說心說性便乃扶籬摸壁湊泊將去纔見人舉起沒巴鼻捩轉面皮突出牙爪處未免意識不行便乃渾圇吞棗如此等輩日用一心中常有二主互相起滅有時緣般若則忘世諦緣世諦則忘般若自不知是脚跟下蹉過却謂我工夫未熟履踐未純便乃精修白業作有漏因以為資助又有一等顢頇佛性儱侗真如者遇一切境界只作一箇道理硬自排遣乃至破律儀犯禁戒皆無忌憚及乎弄到差別境中排遣不行處自不知是當面著謾却謂我力量未克聞見不廣便乃參求古教該博見聞又或忘形死心停機息念以資狂慧如上二種學者葢為自無正念況是打頭不曾遇著箇齩猪狗手脚底宗師與之滌蕩坐在病中不自覺知終日肆口而談縱舌而辯總是隔㧓癢如此參學要於生死岸頭一念相應如吹網欲滿非愚即狂近世為人師者往往不能窮源只欲學人速得知解暖熱門庭多將箇瑞巖主人公臨濟無位真人即心即佛他是阿誰等語與人打交輥亦不顧他立脚未穩恐他不能領解又向他道參底是誰學底是誰要見本性底是誰只欲他便向者裡認箇光影使其擎拳竪指進前退後不離當處便是西來大意學人不識好惡墮他窠臼如油入麵不得出頭誠可哀憫良由不知眾生心中圓淨湛然元無汙染只為情生智隔相變體殊一妄瞥興萬緣各立外則妄見山河大地明暗色空內則妄見四大五蘊見聞知覺乃至八萬四千塵勞及與菩提真如涅槃佛性等相皆不出此一妄而有然此妄念若欲去除須是工夫純熟脫落根蔕坐斷聖凡劃然開悟不然饒你見超二祖慧過阿難正坐在第八識中以識去識以妄遣妄如避身影於日中滅眼華於空裡徒自勞神轉成差別所以從上諸老宿不奈伊何拈出一把折柄刀子刺在伊命根上待伊捱到轉身不得處奮命一挨卒地斷𪹼地折妄消想滅見謝執忘便見森羅萬象廓爾平沉聞見覺知當處解脫併百千世界融歸一心自然法法全真頭頭顯露然雖如是若要向衲僧面前開口吐氣更須朝打三千暮打八百待伊死髑髏上活眼重開方有語話分小參大道在目前山是山水是水玄機超物表聖非聖凡非凡一念洞然萬機廓爾水晶宮秋容澹澹森羅萬象吞吐明月珠雪松齋浩氣沉沉屏几六牕交徹寶絲網無一物不彰至化無一事不演真乘莊周雖蝶夢枕邊敢保其當機罔措子韶固蛙聞月下未許其覿面施呈者一著子名不得狀不得即其知處已陷重圍事亦然理亦然與麼會時早沉識海所以道神光獨耀萬古徽猷入此門來莫存知解且不存知解底句如何指陳玉宇秋高無界限金園春事政敷腴示眾慧劍單提日用中天然元不犯磨礱神號鬼哭喪魂膽徧野尸橫不露鋒古人與麼說話已是自傷己命了也殊不知我王庫內無如是刀臘八示眾玄玄絕待妙妙無依獨露真常全彰至體名不得狀不得雪老氷枯理無礙事無礙天荒地逈萬里雲收五夜四方星燦長空揭開威音那畔腦門圓陀陀光灼灼擉瞎髑髏背後眼光淨躶躶赤灑灑勒回三萬劫風飛雷厲之神機突出五千軸海涌雲屯之寐語大眾釋迦老子來也即今在諸人眼睛裡仰見明星頂𩕳上成等正覺諸人還覺眉毛動也無如其未委各請歸堂示眾龍牙云學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人本上座今日為伊翻欵去也學道之人不識真用識作麼只為從前認識神也不較多生死本即不問如何是本來人喝一喝曰切忌錯下註脚至治癸亥八月十五說偈辭眾曰我有一句分付大眾更問如何無本可據置筆安坐而逝世壽六十一僧臘三十七奉全身塔於本山之西岡天曆己巳文宗敕諡智覺塔曰法雲元統甲戌賜廣錄三十卷入藏號普應國師杭州府天目正宗斷崖了義禪師德清楊氏子年十七聞誦高峰上堂語遂往參謁侍峰於死關峰令看萬法歸一一歸何處話因名從一他日峰為眾舉牛過窓櫺話師聞有疑日夕體究偶過盂塘見松枝雪墜有省詣峰呈頌曰不問南北與東西大地山河一片雪聲未絕峰痛棒打出不覺隕身崖下人意其必死同學捫蘿救之無所損乃自誓七日取證未至期豁然大悟復馳至死關大呼曰老和尚今日謾我不得也復說偈曰大地山河一片雪太陽一照便無蹤自此不疑諸佛祖更無南北與西東峰乃上堂曰山僧二十餘年布縵天網子打鳳羅龍不曾遇得一蝦一蟹今日有箇蟭螟蟲撞入網中固是不堪上眼三十年後向孤峰絕頂揚聲大呌去在且道呌箇甚麼舉拂子曰大地山河一片雪師謂同學曰盡大地有一人發真歸元從一皆知之峰歎其俊快尋回省親乃奉母入武康上栢結茅以居養親事畢還山見峰峰曰大有人見你拖泥帶水師曰兩眼對兩眼遂為薙落改名了義峰既示寂師益韜晦頹然居下版四眾累請乃勉住師子正宗焉示眾若要超凡入聖永脫塵勞直須去皮換骨絕後再甦如寒灰發𦦨枯木重榮豈可作容易想我在老和尚處多年每被大棒打徹骨髓不曾有一念遠離心直至如今纔觸著痛處不覺淚流豈似你等歡喜踴躍齩著些子苦味便乃掉頭不顧殊不知苦味能除百病大凡工夫若到省力時如順水流舟只要梢公牢牢把舵纔有絲毫異念生管取喪身失命若到純一處不可起一念精進心不可起一念懈怠心不可起一念求悟心不可起一念得失心纔有念生即有一切邪魔入你心腋使你顛狂胡說亂道永作魔家眷屬佛也難救你戒之戒之順帝元統癸酉除日謂侍者曰有一件事天樣大你還委悉麼良久曰明日是年朝正月六日詣法雲塔西指空地曰更好立箇無縫塔其晚與禪者談笑如平時至夜分乃曰老僧明日天台去也者曰某甲隨師去師曰你走馬也趂我不及翌旦跏趺而化世壽七十二僧臘四十九藏全身於獅子巖後之雲深菴化之日雷砰雨射白晝晦瞑及葬雪華繽紛林木縞素送葬者數千初中峰會葬齋次師謂眾曰後十二年更為老僧一會眾未深信至昰始驗至元丙子七月朝廷欽師道行敕諡佛慧圓明正覺普度大師杭州府大覺布衲祖雍禪師明州寧海人侍高峰最久躬事舂㸑貌甚黑瘠戇而少文初為院主後首眾提唱超卓辛卯鶴沙瞿提舉為高峰施巨莊贍眾峰力辭瞿乃別營大覺請師領寺事及峰臨寂乃囑師以後事焉甞有山居偈曰就樹縛茅成屋住拾荊編戶傍溪開是他嬾瓚無靈驗惹得天書三度來高風遠韻槩可想見云後於中竺桂子堂書偈坐逝處州府白雲山禪智寺空中以假禪師得旨高峰後棲遲白雲四方禪侶聞風來赴屨滿戶外至元丙子夏一日援筆書偈曰地水火風先佛記掘地深埋第一義一免檀那幾片柴二免人言無舍利擲筆趺坐而化靈雲定禪師法嗣南昌府般若絕學世誠禪師示眾有志之士趂眾中柴乾水便僧堂溫暖三年不出門決定有大受用有等纔作工夫覺得胸次輕安目前清淨便一時放下作偈作頌口快舌便將謂是大了當悞了一生可惜前來許多心機中途而廢三寸氣斷將何保任眾兄弟若欲出離生死參須實參悟須實悟閻羅大王不怕你能言能語徑山陵禪師法嗣金華府寶林桐江紹大禪師嚴州吳氏子世居桐江因以為號幼入里之鳳山剃染受具戒參虗谷于徑山佩服心印歷事徧參一日曰吾今而後乃知法之無異味也遂罷參翻大藏凡三過內外學咸通其旨東嶼居淨慈命典藏鑰至順壬申出世里之烏龍後遷雲黃寶林法會稱極盛一日示微疾鳴鼓集眾敘謝眾請偈師接筆擲地曰縱書到彌勒下生寧復離此言畢而化世壽七十四僧臘五十八闍維舍利如紺珠齒牙不壞有三會語錄杭州府徑山竺遠正源禪師歐陽文忠公之裔世居南康年二十七棄家薙染受具參方首謁虗谷谷舉龍潭吹滅紙燭話問意旨如何師曰焦石可破層氷谷曰破後如何師曰探索乃知谷曰所知者何事師擬對谷劈脊便棒師悚然喻旨後出世觀音興聖次補道場靈隱後遷徑山賜號佛慧慈照普應禪師以至正辛丑六月示寂全身塔于徑山弟子分爪髮舍利藏于道場世壽七十三僧臘四十五道場信禪師法嗣湖州府福源石屋清珙禪師常熟溫氏子生咸淳初幼依崇福寺薙染受具戒首參高峰峰示萬法歸一一歸何處話令參服勤三年無所發明辭峰峰曰溫有瞎驢淮有及菴宜往見之因至建陽參及菴菴問何來師曰天目菴曰有何指示師曰萬法歸一一歸何處菴曰汝作麼生會師無語菴曰此是死句甚麼害熱病底教汝與麼師拜求指的菴曰有佛處不得住無佛處急走過意旨如何師不契菴曰者也是死句師不覺悚栗汗下一日入室菴再理前話師曰上馬見路菴呵曰汝在此六年猶作者箇見解師發憤而去中途忽舉首見風亭豁然有省遂返語菴曰某甲今日會得活句也菴曰汝作麼生會師曰清明時節雨初晴黃鶯枝上分明語菴頷之因復親炙久之辭去菴門送之曰他日與汝同龕未幾菴遷道場師復依之典藏鑰悅堂誾主靈隱師居第二座罷參後結菴湖之霞霧山喜吟咏有山居諸偈至順辛未四月出住當湖福源上堂把住也鋒鋩不露放行也十字縱橫水雲深處相逢却在千峰頂上千峰頂上相逢却在水雲深處今朝福源寺裡開堂演法昨日天湖菴畔墾土耕煙所以道法無定相遇緣即宗可傳真寂之風仰助無為之化正與麼時如何拈拄杖卓一下曰九萬里鵬纔展翼一千年鶴便翱翔謝專使并三塔和尚首座都寺上堂睦州唆臨濟喫棒不是好心楊岐逼慈明晚參不是好心趙州訪道吾不是好心福源專使逼人住院且道是好心不是好心珊瑚枕上兩行淚半是思君半恨君謝殿主淨頭上堂一身清淨則多身清淨一世界清淨則多世界清淨東司頭臭氣佛殿裡蓬塵且道從甚麼處得來以手掩鼻曰又是一點也中秋謝藏主上堂天上月正圓人間月方半諸人恐未知打鼓普請看道是如來藏裡摩尼珠又似賓頭盧尊者手中瑠璃盌比也不可比辯也不可辯天風吹露溼桂花香浸雲邊廣寒殿上堂我有一句子欲與諸人說破又恐諸人罵我不與諸人說破又恐諸人疑我且道如今說即是不說即是撫膝曰知我罪我吾無辭焉上堂黃梅俾老盧踏碓石頭譏藥山不為有一丈蓬可以使八面風無三尺鞭難以控千里馬伊蘭園裡不生栴檀黃檗樹頭討甚蜜果上堂動若行雲止猶谷神水中醎味色裡膠青細雨溼衣看不見閒花落地聽無聲上堂所聞不可聞所見不可見昨夜五更風吹落桃華片蒼苔面上生紅霞百鳥不來春爛熳上堂喫飯要止饑飲水要止渴著衣要免寒歸鄉要到家學道要到三世諸佛開口不得處參禪要到歷代祖師插脚不入處若不如此倚他門戶傍他牆壁聽人指揮喫人洟唾總不丈夫福源與麼說話良藥苦口忠言逆耳上堂是聖是凡入門便見波斯鼻孔開眼便見蚌蛤心肝開口便見諸人兩莖眉毛橫在眼上因甚看他不見明眼人前三尺暗上堂臘月一水生骨虗明自照不勞心力白鷗寒鴈蘆華無處尋他蹤蹟待得日暖氷融水面寬依舊飛來照破湖光碧上堂即心即佛也不是非心非佛也不是不是心不是佛不是物也不是恁麼也不是不恁麼也不是恁麼不恁麼總不是子細看來直教你無用心處正好用心卓拄杖曰藕穿平地為荷葉笋過東家作竹林住持七年後以老引退復歸天湖至正間順帝降香幣皇后賜金襴法衣聞天湖之風者莫不心爽神慕以為真得古先德遺型至正壬辰七月二十四云微疾中夜集眾訣別眾請後事師索筆書偈曰青山不著臭屍骸死了何須掘土埋顧我也無三昧火光前絕後一堆柴書畢擲筆而逝闍維舍利五色塔于天湖之原以及菴之塔配之示不忘同龕意也壽八十一臘五十四高麗國師太古愚甞侍師得旨王聞欽渴表達朝廷敕諡佛慈慧照禪師仍乞移文江浙請淨慈平山林入天湖分師舍利之半歸國供養金華府羅山正覺石門至剛禪師世居山麓得法遊歷罷歸里建寶坊文其楣曰正覺歲除日謝道德首座順侍者看病上堂歲事除年華畢尊莫尊乎道貴莫貴乎德覺即般若因順即菩提佛當知種豆不生麻因果自然明歷歷然雖如是且道如何見得八福田中看病第一小參踏翻生死海涓滴不留推倒涅槃城纖塵不立且是不勞餘力如壯士揮戈鋒鋩不犯如人善射毫髮無差自然處處逢源頭頭合轍不假修證本自圓成盡大地是勝妙覺塲徧法界是真如實地悟取人人有分了知箇箇無虧一念不生入三摩地一塵不動轉大法輪自利利他俱登彼岸全身放下總得自繇到者裡說甚涅槃生死真如佛性了無一法當情直得十方坐斷今日舉揚般若端為追薦上峰最菴主不動脚跟高超樂土不勞舉念即證無生擊拂子曰見徹本來無隱蔽紛紛桂子散天香臨終訣眾偈曰七十六年了然寬廓拶破虗空須彌倒卓杭州府淨慈平山處林禪師本郡仁和王氏子生時有異徵年十二父母命投廣嚴寺出家十七受具戒參方母為治裝使行謁及菴於金華菴留居侍司一夕菴撚紙燭舉示師曰龍潭吹滅汝作麼生師方擬答菴遽以手掩其口從此悟入菴遷道塲命典藏鑰未幾秉拂陞座機如缾瀉眾咸慴伏洎菴示寂往依虗谷陵于仰山陵處以第二座皇慶癸丑出世大慈定慧瓣香為及菴嗣復開山當湖福源再遷中竺至正癸未行宣政院使請主淨慈十八年中殿堂鐘鼓為之一新丞相達識鐵睦爾請移靈隱正謀起廢值張吳自蘇入杭師謂眾曰吾緣盡矣乃還淨慈更衣沐浴集眾說偈而化當辛丑五月一日世壽八十三僧臘六十六敕諡普慧性悟禪師塔淨居菴右匡山源禪師法嗣杭州府海門天真惟則禪師別號氷檗老人吳興費氏子母夢異僧分衛到門覺而有娠及誕異香襲人髫年禮杭之祐福高林壽為師年十六受具戒二十三遊方謁楚石千巖無見無聞等一十八員尊宿因緣不契後之匡廬遇無極極終日不語無所啟發一日值極如廁師急趨前問曰如何是祖師西來意極擒住曰道道師豁然頓悟于是遨遊江湖平山居靈隱招致典藏後因受業老病遂歸省侍四方學者麔至固請開法開堂日僧問作麼生是佛祖為人處師曰狗䑛熱油鐺曰和尚今日開堂還有為人處麼師曰猛虎當途坐曰豈無方便師震威一喝問如何是日面佛師曰今日雲生曰如何是月面佛師曰夜來再看上堂舉明果道十五日已前提水放火十五日已後鵲噪鴉鳴正當十五日風恬浪靜國泰民安有一句到你啞却我口無一句到你瞎却你眼十字街頭潘四郎頭不梳面不洗知他是凡是聖師曰應菴老漢大似倚富欺貧賣弄不少海門即不然十五日已前明不離暗十五日已後暗不離明正當十五日明暗頓忘古今絕待你諸人向甚麼處體究擊拂子曰閒中不契林泉樂坐久但閒風雨聲臘八上堂威音王已前未曉一法一字時早是超佛越祖黃面老子因甚臘月八夜方始成道者噇酒糟漢惑亂世間何有了期海門今日點破了也汝諸人即今道得也未良久卓拄杖曰將謂胡𩯭赤更有赤鬚胡上堂顧左右曰著甚死急雖然到者裡也不得放過喝一喝便下座上堂道火被火燒說水被水溺會禪被禪縛以手指左邊曰却被者僧勘破臘八上堂晝見日夜見星登舟疑岸動揑目便華生老瞿曇昔年到而不點則上座今日點而不到諸人要見明星麼以拂子打圓相喝一喝便下座上堂我若向上舉揚如下戈箭佛來祖來俱中汝等向何處逃避若能具此眼目堪為人天之師如或不然自救不了倘有人問我西來祖意只向他道今日輸了一轉語也還有人免得此箭麼卓拄杖下座上堂我坐汝立誰得誰失縱然佛祖到來亦難辨的以拂子打圓相曰咄天下衲僧跳不出上堂蟋蟀鳴曉庭芙蓉照秋水遙望海天晴鷗鷺多如雨若也別解參隔越三千里往往事從叮囑起洪武初詔徵天下高僧赴京天界住持西白金首以師名薦俄以足疾請歸癸丑仲春示微疾一日侵晨告眾遂瞑目而逝茶毗獲舍利無數頂骨牙齒舌根不壞閱世七十有一坐夏五十有八弟子智旻等建塔于本山永樂甲午更名天真宣德甲寅敕賜海門禪寺瑞巖寶禪師法嗣台州府華頂無見先覩禪師仙居葉氏子生咸淳間從古田垕薙染初參藏室珍于天封次謁方山寶于瑞巖築室華頂乾乾朝夕一日作務次渙然省發平生所疑一旦氷釋趨白方山山說偈印之復歸華頂一坐四十夏足不越戶限闢娑羅軒以導來學示眾風冷冷日杲杲薝蔔花開滿路香池塘一夜生春草堪悲堪笑老瞿曇四十九年說不到阿呵呵拍禪牀下座示眾若論此事一大藏教詮註不及天下老和尚拈提不起直饒有傾湫之辯倒嶽之機到者裡一點也用不著諸仁者饑則喫飯困則打眠熱則乘凉寒則向火一一天真一一明妙何得踏步向前論禪論道將魚目為珠認橘皮作火不見道大機須透徹大用須直截不識東家孔丘翁却向他尋禮樂卓拄杖一下元統甲戌五月望日遺書謝道侶說偈跏趺而逝闍維白乳如注舍利凝結成五色彩瘞于所居之西錫號真覺塔曰寂光壽七十﨟五十寧波府松巖秋江元湛禪師久從龍象遊後參方山得旨偶遊松巖愛其清勝不忍去遂趺坐石上俄有二虎踞坐其側若護衛狀師命之伏枕其背熟睡山民異之即其處剏建精藍師居之不涉世事法施之外澹如也將化別眾就龕說偈曰洗浴著衣生祭了跏趺宴坐入龕藏華開鐵樹泥牛吼一月長輝天地光復謂眾曰十五年後寺當火啟龕則火可止至期果然眾亟開龕師神色如生爪髮俱長杭州府鳳山一源靈禪師寧海人從徑山雲峰芟染參方山於瑞巖充堂司一日入室請益趙州勘婆話山曰維那你試下一語看師曰盡大地人無奈者婆子何山曰山僧則不然盡大地人無奈趙州何師當下如病得汗後住鳳山上堂舉世尊陞座文殊白椎公案師曰世尊已是錯說文殊已是錯傳新鳳山今日已是錯舉會麼字經三寫烏焉成馬一日見僧擲選佛圖師示偈曰百千諸佛及眾生休向圖中強較量心印當陽輕擲出堂堂安坐寂光場復曰古人無剪爪之工汝輩後生忍唐喪光陰且擲圖選佛到極合煞時擲得一箇印出便懽喜道我成佛了殊不知一切時一切處皆是汝成佛處汝却不知鍼工丁生天台人參瑞巖方山甞蒙印許有詠瑠璃偈曰放下放下提起提起一點靈光照天照地天童日禪師法嗣寧波府天童平石砥禪師送慍藏主省徑山叟偈曰山頭老漢八十一我此東南大法城雙𩯭又添新歲白片言能使古風清為人不用擊虎術養子寧忘䑛牘情明月堂前坐深夜餘光分得到長庚高峰日禪師法嗣日本國南禪夢窓智曤國師本國勢州源氏宇多天王九世孫九歲出家十八為僧每夢遊中國疎山石頭二剎一老僧授以達磨像遂名疎石乃決志參方初謁無隱範次見一山寧備陳求法之誠山曰我宗無語句亦無一法與人師曰豈無方便乎山曰本來廓然是大方便師疑悶不輟復謁高峰峰曰一山有何指示師述前語峰厲聲喝曰何不道和尚漏逗不少師於言下有省益自奮勵一夕坐久忽倚壁身踣豁然大悟作偈有等閒擊破虗空骨之句呈似峰峰為印可乃出無學元公淵源以𢌿之後於本國大弘宗教賜號普濟國師師志在煙霞出世非所願聘至皆力辭之其國主起師主南禪入見引坐求退王曰吾非有他欲期朝夕問道耳復強師入天龍錫師號手書後於兜率內院示寂世壽七十九僧臘六十全身塔于院之後存日所剪爪髮瘞雲居者髮中累累生舍利
